<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colixo - Acceptation des CGV</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script data-cfasync="false" src="config.js?v=20260462"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: #ffffff;
    }

    .wrap {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: #141419;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .accent {
      color: #ff8a1d;
    }

    .muted {
      color: #b9b9c7;
      font-size: 14px;
      line-height: 1.5;
    }

    .cgv-box {
      background: #101015;
      border: 1px solid #30303b;
      border-radius: 12px;
      padding: 18px;
      max-height: 420px;
      overflow: auto;
      line-height: 1.55;
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 18px;
      line-height: 1.5;
    }

    .check-row input {
      margin-top: 4px;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-primary {
      background: #ff7a00;
      color: #fff;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #2a2a35;
      color: #fff;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #b9b9c7;
    }

    a {
      color: #ff9d3b;
    }

    .meta {
      margin-top: 12px;
      padding: 12px;
      background: #111116;
      border: 1px solid #2c2c37;
      border-radius: 10px;
      font-size: 14px;
      color: #d9d9e3;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Acceptation des <span class="accent">Conditions Générales</span></h1>
      <p class="muted">
        Avant d’accéder au portail client Colixo, vous devez accepter la version en vigueur
        des Conditions Générales de Transport.
      </p>
      <div id="cgvMeta" class="meta">Chargement de la version active...</div>
    </div>

    <div class="card">
      <h2 id="cgvTitle">Conditions Générales</h2>
      <div id="cgvContent" class="cgv-box">
        Chargement...
      </div>

      <label class="check-row">
        <input type="checkbox" id="acceptCgvCheckbox">
        <span>
          Je confirme avoir pris connaissance des Conditions Générales de Transport Colixo
          et j’accepte leur application à l’utilisation du portail client et aux prestations commandées.
        </span>
      </label>

      <div class="btn-row">
        <button type="button" class="btn-secondary" id="logoutBtn">Se déconnecter</button>
        <button type="button" class="btn-primary" id="acceptBtn" disabled>J’accepte et continuer</button>
      </div>

      <div id="statusMsg" class="status"></div>
    </div>
  </div>

<script>
  const db = window.SUPABASE_CLIENT;

  async function getActiveCgvVersion() {
    const { data, error } = await db
      .from("cgv_versions")
      .select("*")
      .eq("is_active", true)
      .order("created_at", { ascending: false })
      .limit(1)
      .maybeSingle();
    if (error) throw error;
    return data || {
      version_code: "v1.0_colixo_2026",
      title: "Conditions Générales de Transport Colixo",
      content_html: "<p>Aucune version active trouvée.</p>"
    };
  }

  async function getClientIp() {
    try {
      const res = await fetch("https://api.ipify.org?format=json");
      const data = await res.json();
      return data.ip || null;
    } catch (e) { return null; }
  }

  async function main() {
    const statusMsg = document.getElementById("statusMsg");
    const checkbox = document.getElementById("acceptCgvCheckbox");
    const acceptBtn = document.getElementById("acceptBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const cgvTitle = document.getElementById("cgvTitle");
    const cgvContent = document.getElementById("cgvContent");
    const cgvMeta = document.getElementById("cgvMeta");

    if (!db) throw new Error("SUPABASE_CLIENT introuvable dans config.js");

    // Récupère l'utilisateur : session Supabase OU code USR (localStorage)
    let userId = null;
    let userName = null;
    const { data: { session } } = await db.auth.getSession();
    if (session?.user) {
      userId = session.user.id;
      userName = session.user.email;
    } else {
      try {
        const cu = JSON.parse(localStorage.getItem('colixo_user') || 'null');
        if (cu?.id) { userId = cu.id; userName = [cu.prenom, cu.nom].filter(Boolean).join(' ') || cu.email || '-'; }
      } catch (e) {}
    }

    if (!userId) {
      window.location.href = "login/index.html";
      return;
    }

    // Charge l'utilisateur depuis utilisateurs (pour CGV USR code)
    const { data: utilisateur } = await db.from('utilisateurs').select('*').eq('id', userId).maybeSingle();
    const currentCgv = await getActiveCgvVersion();

    cgvTitle.textContent = currentCgv.title || "Conditions Générales";
    cgvContent.innerHTML = currentCgv.content_html || "<p>Aucun contenu disponible.</p>";
    cgvMeta.innerHTML = `
      <strong>Version active :</strong> ${currentCgv.version_code || "-"}<br>
      <strong>Utilisateur :</strong> ${utilisateur ? ([utilisateur.prenom, utilisateur.nom].filter(Boolean).join(' ') || utilisateur.email || '-') : userName}
    `;

    if (utilisateur?.cgv_version_accepted === currentCgv.version_code) {
      window.location.href = "admin/client/portal.html";
      return;
    }

    checkbox.addEventListener("change", () => {
      acceptBtn.disabled = !checkbox.checked;
    });

    logoutBtn.addEventListener("click", async () => {
      await db.auth.signOut();
      try { localStorage.removeItem('colixo_user'); } catch(e) {}
      window.location.href = "login/index.html";
    });

    acceptBtn.addEventListener("click", async () => {
      try {
        acceptBtn.disabled = true;
        statusMsg.textContent = "Enregistrement de votre acceptation...";

        const ip = await getClientIp();

        const { error } = await db
          .from("utilisateurs")
          .update({ cgv_version_accepted: currentCgv.version_code })
          .eq("id", userId);

        if (error) throw error;

        // Met à jour le localStorage si USR code
        try {
          const cu = JSON.parse(localStorage.getItem('colixo_user') || 'null');
          if (cu?.id === userId) {
            cu.cgv_version_accepted = currentCgv.version_code;
            localStorage.setItem('colixo_user', JSON.stringify(cu));
          }
        } catch(e) {}

        statusMsg.textContent = "Acceptation enregistrée. Redirection...";
        window.location.href = "admin/client/portal.html";
      } catch (err) {
        console.error(err);
        statusMsg.textContent = "Erreur : " + (err?.message || err);
        acceptBtn.disabled = false;
      }
    });
  }

  main().catch(err => {
    console.error("Erreur détaillée accept-cgv:", err);
    document.getElementById("statusMsg").textContent =
      "Erreur de chargement : " + (err?.message || err);
  });
</script>
</body>
</html>
