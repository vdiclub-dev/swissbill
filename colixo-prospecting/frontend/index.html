<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260512d">
    <link rel="alternate icon" href="/favicon.ico?v=20260512d">
<meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colixo Prospecting System</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

<div id="app">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">C</div>
        <div class="brand-text">
          <strong>COLIXO</strong>
          <span>Prospecting System</span>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-group">
        <div class="nav-group-label">Vue générale</div>
        <button class="nav-item active" data-view="dashboard" onclick="navigate('dashboard')">
          <span class="nav-icon">📊</span> Dashboard
        </button>
        <button class="nav-item" data-view="pipeline" onclick="navigate('pipeline')">
          <span class="nav-icon">🔄</span> Pipeline CRM
        </button>
        <button class="nav-item" data-view="agenda" onclick="navigate('agenda')">
          <span class="nav-icon">📅</span> Agenda
          <span class="nav-badge nav-badge-hidden" id="nav-tasks-count"></span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Prospects</div>
        <button class="nav-item" data-view="prospects" onclick="navigate('prospects')">
          <span class="nav-icon">🏢</span> Liste
          <span class="nav-badge" id="nav-count">0</span>
        </button>
        <button class="nav-item" data-view="add" onclick="navigate('add')">
          <span class="nav-icon">➕</span> Nouveau prospect
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Outils</div>
        <button class="nav-item" onclick="exportData('csv')">
          <span class="nav-icon">📥</span> Export CSV
        </button>
        <button class="nav-item" onclick="exportData('json')">
          <span class="nav-icon">📋</span> Export JSON
        </button>
      </div>
    </nav>

    <div class="demo-banner" id="demoBanner" style="display:none;">
      <strong>🎭 Mode démo</strong>
      Données fictives. Configurez <code>.env</code> pour le mode production.
    </div>
  </aside>

  <!-- Mobile backdrop -->
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

  <!-- ── MAIN ─────────────────────────────────────────────── -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="topbarTitle">Dashboard</span>
      <div class="topbar-right" id="topbarRight"></div>
    </header>

    <!-- Content area -->
    <div class="content" id="content">
      <div class="empty-state">
        <div class="empty-state-icon">⏳</div>
        <div class="empty-state-title">Chargement...</div>
      </div>
    </div>

  </div><!-- /main -->

</div><!-- /app -->

<!-- ── MODALS ──────────────────────────────────────────────── -->

<!-- Modal Prospect (Add/Edit) -->
<div class="modal-overlay" id="modalProspect">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalProspectTitle">Nouveau prospect</span>
      <button class="modal-close" onclick="closeModal('modalProspect')">✕</button>
    </div>
    <div class="modal-body">
      <form id="prospectForm" onsubmit="submitProspect(event)">
        <div class="form-grid">
          <div class="field form-full">
            <label>Entreprise *</label>
            <input type="text" name="entreprise" placeholder="Ex: Dupont SA" required/>
          </div>
          <div class="field">
            <label>Ville</label>
            <input type="text" name="ville" placeholder="Ex: Lausanne"/>
          </div>
          <div class="field">
            <label>Secteur</label>
            <input type="text" name="secteur" placeholder="Ex: E-commerce, Industrie..."/>
          </div>
          <div class="field form-full">
            <label>Site web</label>
            <input type="text" name="site_web" placeholder="https://exemple.ch"/>
          </div>
          <div class="field">
            <label>Nom du contact</label>
            <input type="text" name="contact_nom" placeholder="Ex: Jean Dupont"/>
          </div>
          <div class="field">
            <label>Rôle</label>
            <input type="text" name="contact_role" placeholder="Ex: Directeur logistique"/>
          </div>
          <div class="field">
            <label>Email</label>
            <input type="email" name="email" placeholder="jean@exemple.ch"/>
          </div>
          <div class="field">
            <label>Téléphone</label>
            <input type="tel" name="telephone" placeholder="+41 XX XXX XX XX"/>
          </div>
          <div class="field form-full">
            <label>LinkedIn URL</label>
            <div style="position:relative;">
              <input type="text" name="linkedin_url" id="linkedinUrlInput" placeholder="https://linkedin.com/in/... ou /company/..." autocomplete="off"/>
              <span id="linkedinPrefillSpinner" style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--accent2);">⏳</span>
            </div>
            <span class="field-hint" id="linkedinPrefillHint">✨ Collez une URL LinkedIn — le formulaire se remplit automatiquement</span>
          </div>
          <div class="field form-full">
            <label>Notes</label>
            <textarea name="notes" placeholder="Infos utiles, contexte, source de la lead..."></textarea>
          </div>
        </div>
        <input type="hidden" name="id"/>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalProspect')">Annuler</button>
      <button class="btn btn-primary" onclick="submitProspect()">💾 Sauvegarder</button>
    </div>
  </div>
</div>

<!-- Modal Réponse assistant -->
<div class="modal-overlay" id="modalReply">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">💬 Assistant de réponse</span>
      <button class="modal-close" onclick="closeModal('modalReply')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field" style="margin-bottom:16px;">
        <label>Source</label>
        <select id="replySource">
          <option value="email">Email</option>
          <option value="linkedin">LinkedIn (reçu)</option>
          <option value="phone">Téléphone</option>
          <option value="other">Autre</option>
        </select>
      </div>
      <div class="field" style="margin-bottom:16px;">
        <label>Collez ici la réponse du prospect</label>
        <textarea id="replyText" style="min-height:120px;" placeholder="Ex: Bonjour, merci pour votre message. Nous avons actuellement un prestataire mais je suis ouvert à regarder vos tarifs..."></textarea>
      </div>
      <div id="replyResults"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalReply')">Fermer</button>
      <button class="btn btn-primary" id="btnAnalyzeReply" onclick="analyzeReply()">🤖 Analyser la réponse</button>
    </div>
  </div>
</div>

<!-- Modal Tâche -->
<div class="modal-overlay" id="modalTask">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <span class="modal-title">📌 Nouvelle tâche</span>
      <button class="modal-close" onclick="closeModal('modalTask')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field" style="margin-bottom:12px;">
        <label>Type de tâche</label>
        <select id="taskTemplate" onchange="fillTaskTemplate()">
          <option value="">— Choisir ou saisir —</option>
          <option value="Relancer dans 3 jours">Relancer dans 3 jours</option>
          <option value="Relancer dans 7 jours">Relancer dans 7 jours</option>
          <option value="Envoyer email de suivi">Envoyer email de suivi</option>
          <option value="Envoyer message LinkedIn">Envoyer message LinkedIn (manuel)</option>
          <option value="Appel téléphonique">Appel téléphonique</option>
          <option value="Préparer offre commerciale">Préparer offre commerciale</option>
          <option value="Marquer rendez-vous">Marquer rendez-vous</option>
        </select>
      </div>
      <div class="field" style="margin-bottom:12px;">
        <label>Titre</label>
        <input type="text" id="taskTitle" placeholder="Description de la tâche"/>
      </div>
      <div class="field">
        <label>Échéance</label>
        <input type="date" id="taskDue"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalTask')">Annuler</button>
      <button class="btn btn-primary" onclick="submitTask()">💾 Créer la tâche</button>
    </div>
  </div>
</div>

<!-- ── TOAST CONTAINER ─────────────────────────────────────── -->
<div class="toast-container" id="toastContainer"></div>

<!-- ── LOADER ──────────────────────────────────────────────── -->
<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <div class="loader-text" id="loaderText">Chargement...</div>
</div>

<script src="app.js?v=5"></script>
</body>
</html>
