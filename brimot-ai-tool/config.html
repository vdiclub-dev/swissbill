<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brimot AI Tool - Configuration</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="layout">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">BAI</div>
        <div class="brand-text">
          <div class="brand-title">Brimot AI Tool</div>
          <div class="brand-sub">Parametres tarifs</div>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-link" href="index.html">Dashboard</a>
        <a class="nav-link" href="ai.html">Assistant IA</a>
        <a class="nav-link active" href="config.html">Tarifs</a>
        <a class="nav-link" href="history.html">Historique</a>
      </nav>
    </header>

    <section class="card" style="max-width:760px;">
      <h1>Configuration des tarifs</h1>
      <p>Modifie les valeurs de calcul utilisees par le dashboard et l'assistant IA.</p>

      <form id="configForm" class="stack" style="margin-top:14px;">
        <div class="row">
          <div>
            <label class="label" for="standardHourlyRate">Prix heure standard (CHF)</label>
            <input id="standardHourlyRate" class="input" type="number" min="0" step="0.1" required>
          </div>
          <div>
            <label class="label" for="diogeneHourlyRate">Prix heure Diogene (CHF)</label>
            <input id="diogeneHourlyRate" class="input" type="number" min="0" step="0.1" required>
          </div>
        </div>

        <div class="row">
          <div>
            <label class="label" for="endOfLeasePerM2">Prix m2 fin de bail (CHF)</label>
            <input id="endOfLeasePerM2" class="input" type="number" min="0" step="0.1" required>
          </div>
          <div>
            <label class="label" for="windowsPerM2">Prix vitres (CHF / m2)</label>
            <input id="windowsPerM2" class="input" type="number" min="0" step="0.1" required>
          </div>
        </div>

        <div>
          <label class="label" for="travelPerKm">Prix deplacement km (CHF / km)</label>
          <input id="travelPerKm" class="input" type="number" min="0" step="0.1" required>
        </div>

        <div class="button-row">
          <button class="btn btn-primary" type="submit">Sauvegarder</button>
          <button id="resetConfig" class="btn btn-ghost" type="button">Reinitialiser</button>
        </div>
      </form>

      <p class="footer-note">Stockage local uniquement (localStorage). Export JSON possible en phase 2.</p>
    </section>
  </main>

  <script src="common.js"></script>
  <script src="config-page.js"></script>
</body>
</html>
