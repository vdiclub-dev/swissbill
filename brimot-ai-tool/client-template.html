<!doctype html>
<html lang="fr">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260512a">
    <link rel="alternate icon" href="/favicon.ico?v=20260512a">
<meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brimot Nettoyage - Demande Client</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="layout" style="max-width:860px;">
    <section class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
        <div>
          <h1 style="margin-bottom:6px;">Votre page de demande Brimot</h1>
          <p id="welcomeLine">Bienvenue.</p>
        </div>
        <img src="logo.png" alt="Brimot Nettoyage" style="width:88px;height:88px;object-fit:contain;border-radius:10px;border:1px solid var(--line);background:#fff;">
      </div>

      <div class="kpis" style="margin-top:14px;">
        <div class="kpi">
          <div class="kpi-label">Delai reponse</div>
          <div class="kpi-value">24h</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Devis</div>
          <div class="kpi-value">Sans engagement</div>
        </div>
      </div>

      <div class="stack" style="margin-top:16px;">
        <div>
          <label class="label" for="needType">Type de besoin</label>
          <select id="needType" class="select">
            <option value="fin de bail">Fin de bail</option>
            <option value="entretien regulier">Entretien regulier</option>
            <option value="remise en etat">Remise en etat</option>
            <option value="vitres">Vitres</option>
            <option value="autre">Autre</option>
          </select>
        </div>

        <div class="row">
          <div>
            <label class="label" for="surface">Surface approximative (m2)</label>
            <input id="surface" class="input" type="number" min="1" step="1" placeholder="Ex: 95">
          </div>
          <div>
            <label class="label" for="city">Ville</label>
            <input id="city" class="input" type="text" placeholder="Ex: Lausanne">
          </div>
        </div>

        <div>
          <label class="label" for="details">Details utiles</label>
          <textarea id="details" class="textarea" style="min-height:130px;" placeholder="Etat du lieu, date souhaitee, contraintes, etc."></textarea>
        </div>

        <div class="button-row">
          <button id="btnMail" class="btn btn-primary" type="button">Envoyer ma demande</button>
          <a class="btn btn-ghost" href="tel:+41796467442">Appeler maintenant</a>
        </div>
      </div>

      <p class="footer-note">Brimot Nettoyage, Impasse des Griottes 3, 1462 Yvonand - info@brimot.ch - +41 79 646 74 42</p>
    </section>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var name = params.get("name") || "";
      var company = params.get("company") || "";
      var email = params.get("email") || "";

      var welcomeLine = document.getElementById("welcomeLine");
      if (name || company) {
        welcomeLine.textContent = "Bonjour " + (name || "") + (company ? " (" + company + ")" : "") + ". Dites-nous votre besoin et nous revenons vers vous rapidement.";
      }

      document.getElementById("btnMail").addEventListener("click", function () {
        var needType = document.getElementById("needType").value;
        var surface = document.getElementById("surface").value;
        var city = document.getElementById("city").value;
        var details = document.getElementById("details").value;

        var subject = "Demande devis - " + needType;
        var lines = [
          "Bonjour Brimot,",
          "",
          "Je souhaite un devis.",
          "Type de besoin: " + needType,
          "Surface: " + (surface || "-"),
          "Ville: " + (city || "-"),
          "",
          "Details:",
          details || "-",
          "",
          "Contact:",
          name || "-",
          company || "-",
          email || "-"
        ];

        var mailto = "mailto:info@brimot.ch?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(lines.join("\n"));
        window.location.href = mailto;
      });
    })();
  </script>
</body>
</html>
