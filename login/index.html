<!-- ================================================================
     COLIXO — 2 SOLUTIONS D'AUTHENTIFICATION
     ================================================================

     ╔══════════════════════════════════════════════════════════════╗
     ║  SOLUTION 1 — GUARD (protège chaque page)                   ║
     ║  Colle ce bloc JUSTE APRÈS <script src="../config.js">       ║
     ║  sur CHAQUE page protégée (dashboard, magasinier, etc.)      ║
     ╚══════════════════════════════════════════════════════════════╝

     Ce script vérifie la session Supabase au chargement.
     Si pas connecté → renvoi vers /login/
     Si connecté mais mauvais rôle → renvoi vers sa page
-->

<!-- ── GUARD : colle sur chaque page protégée ── -->
<script>
(async function colixoGuard() {
    // Pages autorisées par rôle
    const ROLE_PAGES = {
        super_admin: ['/admin/'],
        admin:       ['/admin/'],
        chauffeur:   ['/admin/driver-app', '/chauffeur/'],
        magasinier:  ['/magasinier/'],
        client:      ['/admin/client/']
    };

    // Attendre que Supabase soit prêt
    if (!window.SUPABASE_CLIENT) {
        window.location.href = '/login/';
        return;
    }
    const db = window.SUPABASE_CLIENT;

    // Vérifier session
    const { data: { session } } = await db.auth.getSession();
    if (!session) {
        window.location.href = '/login/?next=' + encodeURIComponent(location.pathname);
        return;
    }

    // Récupérer rôle
    const { data: user } = await db
        .from('utilisateurs')
        .select('role')
        .eq('id', session.user.id)
        .single();

    if (!user) {
        await db.auth.signOut();
        window.location.href = '/login/';
        return;
    }

    const role = user.role;
    const currentPath = location.pathname;

    // Super admin → accès total, aucune restriction
    if (role === 'super_admin' || role === 'admin') return;

    // Vérifier que le rôle a accès à cette page
    const allowedPaths = ROLE_PAGES[role] || [];
    const allowed = allowedPaths.some(p => currentPath.startsWith(p));

    if (!allowed) {
        // Rediriger vers sa page selon son rôle
        const redirects = {
            chauffeur:  '/admin/driver-app.html',
            magasinier: '/magasinier/dashboard.html',
            client:     '/admin/client/portal.html'
        };
        window.location.href = redirects[role] || '/login/';
    }
})();
</script>


<!-- ================================================================
     SOLUTION 2 — CONNEXION PAR CODE UNIQUE (USR-XXXX)
     ================================================================

     A) Dans ta table Supabase "utilisateurs", ajoute une colonne :
        ALTER TABLE utilisateurs ADD COLUMN code_acces TEXT UNIQUE;

     B) Pour générer un code automatiquement à l'inscription,
        crée ce trigger SQL dans Supabase (Dashboard → SQL Editor) :

        CREATE OR REPLACE FUNCTION generate_code_acces()
        RETURNS TRIGGER AS $$
        BEGIN
            NEW.code_acces := 'USR-' || UPPER(SUBSTRING(MD5(NEW.id::TEXT || NOW()::TEXT) FROM 1 FOR 4));
            RETURN NEW;
        END;
        $$ LANGUAGE plpgsql;

        CREATE TRIGGER trigger_code_acces
        BEFORE INSERT ON utilisateurs
        FOR EACH ROW
        WHEN (NEW.code_acces IS NULL)
        EXECUTE FUNCTION generate_code_acces();

     C) Ajoute l'onglet "Code client" dans ton login.html :
        Remplace le bloc <div class="tabs"> et ajoute le panneau ci-dessous.
     ================================================================ -->

<!-- ================================================================
     SOLUTION 2 — JAVASCRIPT à ajouter dans ton bloc <script> principal
     Colle ces fonctions à la fin de ton IIFE (avant la dernière ligne })();
     ================================================================ -->
<script>
// ── Mise à jour de switchTab pour gérer le nouvel onglet "code" ──
// Remplace entièrement ta fonction window.switchTab par celle-ci :
window.switchTab = function(tab) {
    clearError();
    const isClientPortal = new URLSearchParams(window.location.search).get('portal') === 'client';
    if (isClientPortal && tab === 'signup') return;

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));

    if (tab === 'login') {
        document.getElementById('tabLogin').classList.add('active');
        document.getElementById('panelLogin').classList.add('active');
    } else if (tab === 'signup') {
        document.getElementById('tabSignup').classList.add('active');
        document.getElementById('panelSignup').classList.add('active');
    } else if (tab === 'forgot') {
        document.getElementById('panelForgot').classList.add('active');
    } else if (tab === 'code') {
        document.getElementById('tabCode').classList.add('active');
        document.getElementById('panelCode').classList.add('active');
        // Formater automatiquement le code en majuscules
        const input = document.getElementById('codeInput');
        if (input) {
            input.addEventListener('input', function() {
                this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
            });
        }
    }
};

// ── Connexion par code unique ──
// Colle ceci dans ton IIFE, avant la dernière ligne })();
document.getElementById('formCode').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearError();

    const code = document.getElementById('codeInput').value.trim().toUpperCase();

    if (!code || code.length < 4) {
        showError('❌ Code invalide. Format attendu : USR-XXXX');
        return;
    }

    showLoad();
    try {
        // Chercher l'utilisateur avec ce code dans Supabase
        const { data: user, error } = await db
            .from('utilisateurs')
            .select('id, role, email, nom, prenom, code_acces')
            .eq('code_acces', code)
            .single();

        if (error || !user) {
            hideLoad();
            showError('❌ Code introuvable. Vérifiez votre code client.');
            return;
        }

        // Connexion "magique" via un token custom (nécessite une Edge Function Supabase)
        // OU redirection directe vers le portail avec le code en paramètre sécurisé
        // Solution simple : stocker le profil en sessionStorage et rediriger
        sessionStorage.setItem('colixo_code_user', JSON.stringify({
            id:     user.id,
            role:   user.role,
            nom:    user.nom,
            prenom: user.prenom,
            code:   user.code_acces
        }));

        toast('success', 'Code valide — redirection…');

        setTimeout(() => {
            // Rediriger vers le portail client avec le code en paramètre
            window.location.href = '/admin/client/portal.html?code=' + encodeURIComponent(code);
        }, 800);

    } catch (err) {
        hideLoad();
        showError('❌ Erreur : ' + err.message);
    }
});
</script>


<!-- ================================================================
     SOLUTION 2 — AFFICHER LE CODE dans le profil admin
     Dans ton dashboard admin (gestion des utilisateurs),
     ajoute cette colonne pour voir et copier le code de chaque user.
     ================================================================ -->
<script>
/**
 * Fonction utilitaire à appeler dans ton dashboard admin
 * pour afficher le code d'un utilisateur
 */
function renderCodeBadge(code) {
    if (!code) return '<span style="color:rgba(255,255,255,0.3);font-size:12px;">— non généré —</span>';
    return `
        <span style="
            background:rgba(232,49,26,0.12);
            border:1px solid rgba(232,49,26,0.3);
            color:#e8311a;
            padding:4px 10px;
            border-radius:6px;
            font-family:monospace;
            font-size:13px;
            font-weight:700;
            letter-spacing:2px;
            cursor:pointer;
            user-select:all;
            title='Cliquez pour copier'
        " onclick="navigator.clipboard.writeText('${code}').then(()=>alert('Code copié : ${code}'))">
            ${code}
        </span>`;
}

/**
 * Générer un code manuellement depuis le dashboard
 * (si le trigger SQL n'est pas encore en place)
 */
async function generateCodeForUser(userId) {
    const db = window.SUPABASE_CLIENT;
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // sans 0/O/1/I pour éviter confusion
    let code;
    let unique = false;

    while (!unique) {
        const rand = Array.from({length: 4}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        code = 'USR-' + rand;

        // Vérifier unicité
        const { data } = await db
            .from('utilisateurs')
            .select('id')
            .eq('code_acces', code)
            .maybeSingle();

        if (!data) unique = true;
    }

    await db
        .from('utilisateurs')
        .update({ code_acces: code })
        .eq('id', userId);

    return code;
}
</script>
