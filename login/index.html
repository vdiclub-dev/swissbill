<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Connexion — Colixo</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></noscript>
    <script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script data-cfasync="false" src="../config.js?v=20260431"></script>
    <style>
        :root {
            --red:#e8311a; --red-dark:#c0280f; --red-glow:rgba(232,49,26,0.2);
            --night:#0a0a0f; --night2:#111118; --night3:#18181f; --surface:#1e1e28;
            --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
            --white:#ffffff; --muted:rgba(255,255,255,0.38); --muted2:rgba(255,255,255,0.6);
            --green:#22c55e;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;}
        body{
            font-family:'Outfit',sans-serif;
            background:var(--night);
            color:var(--white);
            display:flex;align-items:center;justify-content:center;
            min-height:100vh;
            padding:20px;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:
                linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
                linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
            background-size:60px 60px;
            pointer-events:none;
        }
        .glow{position:fixed;width:700px;height:700px;background:radial-gradient(circle,rgba(232,49,26,0.07) 0%,transparent 65%);top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;}

        .box{
            background:var(--night2);
            border:1px solid var(--border2);
            border-radius:24px;
            padding:44px;
            width:100%;max-width:400px;
            box-shadow:0 40px 100px rgba(0,0,0,0.5);
            position:relative;z-index:1;
            animation:fadeUp 0.5s ease both;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

        .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:8px;}
        .logo-mark{width:52px;height:52px;background:var(--red);border-radius:14px;display:grid;place-items:center;font-size:24px;box-shadow:0 6px 24px var(--red-glow);}
        .logo-text{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:1px;}
        .logo-text em{color:var(--red);font-style:normal;}
        .subtitle{text-align:center;font-size:13px;color:var(--muted);margin-bottom:36px;line-height:1.6;}

        .field{margin-bottom:14px;}
        .field label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}

        /* Input code grand format */
        .field input.code-field{
            width:100%;padding:18px 15px;
            background:var(--night3);
            border:1.5px solid var(--border2);
            border-radius:11px;
            font-family:'Outfit',sans-serif;
            font-size:28px;font-weight:700;
            color:var(--white);
            letter-spacing:8px;
            text-align:center;
            text-transform:uppercase;
            transition:border-color 0.2s,box-shadow 0.2s;
        }
        .field input.code-field:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow);}
        .field input.code-field::placeholder{color:rgba(255,255,255,0.15);letter-spacing:4px;font-size:20px;}

        /* Input standard (admin) */
        .field input.std-field{
            width:100%;padding:13px 15px;
            background:var(--night3);
            border:1.5px solid var(--border2);
            border-radius:11px;
            font-family:'Outfit',sans-serif;font-size:15px;
            color:var(--white);
            transition:border-color 0.2s;
        }
        .field input.std-field:focus{outline:none;border-color:var(--red);}
        .field input.std-field::placeholder{color:rgba(255,255,255,0.2);}

        .code-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6;}
        .code-hint strong{color:var(--muted2);}

        .login-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--night3);border-radius:12px;padding:4px;border:1px solid var(--border2);}
        .login-tabs button{flex:1;padding:12px 14px;border:none;border-radius:10px;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s,color .2s;}
        .login-tabs button.active{background:var(--red);color:#fff;box-shadow:0 4px 16px var(--red-glow);}
        .login-tabs button:not(.active):hover{color:var(--white);}
        .panel-register{display:none;}
        .panel-register.active{display:block;}
        .reg-note{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:16px;padding:12px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-radius:10px;}

        .btn-submit{
            width:100%;padding:15px;
            background:var(--red);color:var(--white);
            border:none;border-radius:11px;
            font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;
            cursor:pointer;
            display:flex;align-items:center;justify-content:center;gap:10px;
            box-shadow:0 6px 24px var(--red-glow);
            transition:all 0.2s;
            margin-top:20px;
        }
        .btn-submit:hover{background:var(--red-dark);transform:translateY(-1px);}
        .btn-submit:active{transform:scale(0.99);}
        .btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

        .error-box{
            background:rgba(232,49,26,0.08);border:1px solid rgba(232,49,26,0.25);
            border-radius:10px;padding:11px 14px;font-size:13px;color:var(--red);
            margin-bottom:16px;display:none;text-align:center;
        }

        /* Toast */

        /* Toast */
        .toast{position:fixed;top:20px;right:20px;padding:12px 18px;border-radius:10px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;background:var(--night3);border:1px solid var(--border2);box-shadow:0 12px 40px rgba(0,0,0,0.4);z-index:9999;transform:translateX(calc(100% + 40px));transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);}
        .toast.show{transform:translateX(0);}
        .toast.success .ti{color:var(--green);}
        .toast.error .ti{color:var(--red);}
        .ti{font-size:15px;}

        /* Loader */
        .loader{display:none;position:fixed;inset:0;background:rgba(10,10,15,0.85);backdrop-filter:blur(4px);place-items:center;z-index:2000;}
        .loader.on{display:grid;}
        .spin{width:40px;height:40px;border:2.5px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div class="glow"></div>
<div class="toast" id="toast"><span class="ti" id="tIco"></span><span id="tTxt"></span></div>
<div class="loader" id="loader"><div class="spin"></div></div>

<div class="box">
    <div class="logo">
        <div class="logo-mark">🚚</div>
        <div class="logo-text">Coli<em>xo</em></div>
    </div>
    <div class="subtitle" id="loginSubtitle">Connexion uniquement avec le code fourni par Colixo</div>

    <div class="error-box" id="errorBox"></div>

    <div class="login-tabs" role="tablist">
        <button type="button" class="active" id="tabConnexion" role="tab" aria-selected="true">Connexion</button>
        <button type="button" id="tabInscription" role="tab" aria-selected="false">Demande d'accès</button>
    </div>

    <!-- ── CODE ── -->
    <form id="formCode">
        <div class="field">
            <label>Code d'accès</label>
            <input
                type="text"
                id="codeInput"
                class="code-field"
                placeholder="CLT-7290"
                maxlength="8"
                inputmode="text"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="characters"
                spellcheck="false"
                required>
        </div>
        <div class="code-hint">
            3 lettres, tiret, 4 chiffres · Ex. <strong>CLT-7290</strong>
        </div>
        <button type="submit" class="btn-submit">
            <i class="fas fa-arrow-right"></i> Accéder à mon espace
        </button>
    </form>

    <!-- ── DEMANDE (pas de mot de passe — l'admin valide et vous envoie un code) ── -->
    <div id="panelRegister" class="panel-register" aria-hidden="true">
        <p class="reg-note">
            Remplissez le formulaire. <strong>Aucun mot de passe</strong> : notre équipe traite votre demande, définit votre rôle et vous communique votre <strong>code d'accès</strong> (format XXX-1234).
        </p>
        <form id="formRegister">
            <div class="field-row" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <div class="field"><label>Prénom *</label><input type="text" id="regPrenom" class="std-field" required autocomplete="given-name"></div>
                <div class="field"><label>Nom *</label><input type="text" id="regNom" class="std-field" required autocomplete="family-name"></div>
            </div>
            <div class="field"><label>Email *</label><input type="email" id="regEmail" class="std-field" required autocomplete="email"></div>
            <div class="field"><label>Téléphone</label><input type="tel" id="regTel" class="std-field" autocomplete="tel"></div>
            <div class="field"><label>Entreprise</label><input type="text" id="regEntreprise" class="std-field" placeholder="Nom de la société" autocomplete="organization"></div>
            <div class="field"><label>Adresse</label><input type="text" id="regAdresse" class="std-field" placeholder="Rue, NPA, ville" autocomplete="street-address"></div>
            <div class="field"><label>Message</label><textarea id="regMessage" class="std-field" rows="3" placeholder="Besoin particulier, volume, etc." style="min-height:72px;resize:vertical;"></textarea></div>
            <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Envoyer la demande</button>
        </form>
    </div>

</div>

<script>
(function () {
    'use strict';

    if (!window.SUPABASE_CONFIG) {
        if (new URLSearchParams(location.search).get('logout') === '1') {
            try { localStorage.removeItem('colixo_user'); } catch (e) {}
            var h0 = (typeof window.colixoHref === 'function') ? window.colixoHref('/index.html') : '../index.html';
            window.location.replace(h0);
        }
        document.body.innerHTML = '<div style="padding:40px;color:#e8311a;font-family:sans-serif;max-width:500px;"><h2>❌ config.js manquant</h2><p>Le fichier config.js est introuvable. Rechargez la page.</p><br><button onclick="location.reload()" style="padding:10px 20px;background:#e8311a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">Recharger</button></div>';
        return;
    }

    // Récupérer ou réinitialiser le client Supabase si le SDK a échoué au chargement
    var db = window.SUPABASE_CLIENT;
    if (!db) {
        if (window.supabase && window.supabase.createClient) {
            try {
                db = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.key, {
                    auth: { persistSession: true, storageKey: 'Colixo-auth', autoRefreshToken: true }
                });
                window.SUPABASE_CLIENT = db;
            } catch (e) { db = null; }
        }
    }
    if (!db) {
        document.body.innerHTML = '<div style="padding:40px;color:#e8311a;font-family:sans-serif;max-width:500px;"><h2>⚠️ Service temporairement indisponible</h2><p>La connexion au service d\'authentification a échoué. Vérifiez votre connexion internet et réessayez.</p><br><button onclick="location.reload()" style="padding:10px 20px;background:#e8311a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">Recharger</button></div>';
        return;
    }

    if (new URLSearchParams(location.search).get('logout') === '1') {
        (async function () {
            try { await db.auth.signOut(); } catch (e) {}
            try { localStorage.removeItem('colixo_user'); } catch (e) {}
            var hOut = (typeof window.colixoHref === 'function') ? window.colixoHref('/index.html') : '../index.html';
            window.location.replace(hOut);
        })();
        return;
    }

    function showLoginTab(which) {
        var isReg = which === 'register';
        document.getElementById('tabConnexion').classList.toggle('active', !isReg);
        document.getElementById('tabInscription').classList.toggle('active', isReg);
        document.getElementById('tabConnexion').setAttribute('aria-selected', !isReg);
        document.getElementById('tabInscription').setAttribute('aria-selected', isReg);
        document.getElementById('formCode').style.display = isReg ? 'none' : 'block';
        document.getElementById('panelRegister').classList.toggle('active', isReg);
        document.getElementById('panelRegister').setAttribute('aria-hidden', !isReg);
        document.getElementById('loginSubtitle').innerHTML = isReg
            ? 'Demande d\'accès — <strong>pas de mot de passe</strong>, uniquement un code après validation'
            : 'Connexion uniquement avec le code fourni par Colixo';
        clearError();
    }
    document.getElementById('tabConnexion').addEventListener('click', function () { showLoginTab('login'); });
    document.getElementById('tabInscription').addEventListener('click', function () { showLoginTab('register'); });
    if (new URLSearchParams(window.location.search).get('register') === '1') {
        showLoginTab('register');
    }

    /* ── Helpers UI ── */
    const toastEl  = document.getElementById('toast');
    const loaderEl = document.getElementById('loader');
    let tt;

    function toast(type, msg) {
        clearTimeout(tt);
        toastEl.className = 'toast ' + type + ' show';
        document.getElementById('tIco').textContent = type === 'success' ? '✓' : '✕';
        document.getElementById('tTxt').textContent = msg;
        tt = setTimeout(() => toastEl.classList.remove('show'), 5000);
    }
    const showLoad = () => loaderEl.classList.add('on');
    const hideLoad = () => loaderEl.classList.remove('on');

    function showError(msg) {
        const el = document.getElementById('errorBox');
        el.textContent = msg;
        el.style.display = 'block';
    }
    function clearError() {
        document.getElementById('errorBox').style.display = 'none';
    }

    /* ── Formatage code en majuscules automatique ── */
    document.getElementById('codeInput').addEventListener('input', function () {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
    });

    /* ── Redirection selon rôle ── */
    function redirectByRole(role) {
        const routes = {
            super_admin: '/admin/dashboard.html',
            admin:       '/admin/dashboard.html',
            chauffeur:   '/admin/driver-app.html',
            magasinier:  '/magasinier/dashboard.html',
            client:      '/admin/client/portal.html'
        };
        window.location.href = routes[role] || '/admin/client/portal.html';
    }

    /* ── Vérifier session existante (code USR déjà connecté) ── */
    const existingUser = localStorage.getItem('colixo_user');
    if (existingUser) {
        try { redirectByRole(JSON.parse(existingUser).role); } catch(e) {}
    }

    /* ── DEMANDE D'ACCÈS (table demandes_inscription — exécuter demandes_inscription.sql dans Supabase) ── */
    document.getElementById('formRegister').addEventListener('submit', async function (e) {
        e.preventDefault();
        clearError();
        var prenom = document.getElementById('regPrenom').value.trim();
        var nom = document.getElementById('regNom').value.trim();
        var email = document.getElementById('regEmail').value.trim();
        if (!prenom || !nom || !email) {
            showError('❌ Prénom, nom et email sont requis.');
            return;
        }
        showLoad();
        try {
            var payload = {
                prenom: prenom,
                nom: nom,
                email: email,
                telephone: document.getElementById('regTel').value.trim() || null,
                entreprise_nom: document.getElementById('regEntreprise').value.trim() || null,
                adresse: document.getElementById('regAdresse').value.trim() || null,
                message: document.getElementById('regMessage').value.trim() || null
            };
            var ins = await db.from('demandes_inscription').insert([payload]);
            if (ins.error) throw ins.error;
            toast('success', 'Demande enregistrée. L’accès au tableau de bord n’est possible qu’avec un code : vous le recevrez après validation par l’équipe.');
            document.getElementById('formRegister').reset();
            showLoginTab('login');
        } catch (err) {
            var msg = (err && err.message) ? err.message : String(err);
            if (msg.indexOf('relation') !== -1 && msg.indexOf('does not exist') !== -1) {
                showError('❌ Table non créée : exécutez le fichier SQL demandes_inscription.sql dans Supabase.');
            } else {
                showError('❌ ' + msg);
            }
        } finally {
            hideLoad();
        }
    });

    /* ── CONNEXION PAR CODE ── */
    document.getElementById('formCode').addEventListener('submit', async function (e) {
        e.preventDefault();
        clearError();

        const code = document.getElementById('codeInput').value.trim().toUpperCase();
        var okStandard = /^[A-Z]{3}-\d{4}$/.test(code);
        var okLegacy = /^[A-Z]{2,4}-[A-Z0-9]{4,10}$/.test(code);
        if (!code || (!okStandard && !okLegacy)) {
            showError('❌ Format attendu : trois lettres, tiret, quatre chiffres (ex. CLT-7290). Les anciens codes restent acceptés.');
            return;
        }

        showLoad();
        try {
            const { data: user, error } = await db
                .from('utilisateurs')
                .select('id, role, nom, prenom, code_usr, actif')
                .eq('code_usr', code)
                .maybeSingle();

            if (error) {
                hideLoad();
                showError('❌ Erreur : ' + error.message);
                return;
            }
            if (!user) {
                hideLoad();
                showError('❌ Code introuvable. Vérifiez votre code.');
                return;
            }

            if (user.actif === false) {
                hideLoad();
                showError('❌ Compte désactivé. Contactez votre administrateur.');
                return;
            }

            /* Stocker le profil en sessionStorage pour les pages suivantes */
            localStorage.setItem('colixo_user', JSON.stringify({
                id:     user.id,
                role:   user.role,
                nom:    user.nom,
                prenom: user.prenom,
                code:   user.code_usr
            }));

            toast('success', 'Bienvenue ! Redirection en cours…');
            setTimeout(() => redirectByRole(user.role), 800);

        } catch (err) {
            hideLoad();
            showError('❌ Erreur : ' + err.message);
        }
    });


})();
</script>
</body>
</html>
