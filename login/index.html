<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion – Swissbill</title>

  <!-- Styles simples, tu peux garder ton design original -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 320px;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 1rem;
    }

    input {
      width: 100%;
      padding: .5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-top: .3rem;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: .7rem;
      background: #0084ff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      margin-top: 1.3rem;
      cursor: pointer;
    }

    button:hover {
      background: #005fcc;
    }

    .error {
      color: red;
      margin-top: 1rem;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h2>Portail Swissbill</h2>

    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="adresse@email.com" required />

      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" required />

      <button type="submit">Se connecter</button>
    </form>

    <div id="error-message" class="error"></div>
  </div>

  <!-- Script fonctionnel Supabase -->
  <script type="module">
    import { supabase } from "/js/core/supabase-client.js";
    import { login } from "/js/core/auth.js";

    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("error-message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = form.email.value.trim();
      const password = form.password.value;

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          errorBox.textContent = "❌ " + error.message;
          return;
        }

        const { user } = data;

        // Récupère le rôle dans les métadonnées Supabase
        const role = user?.app_metadata?.role || "client";

        // Redirige selon le rôle
        switch (role) {
          case "admin":
            window.location.href = "/admin/dashboard.html";
            break;
          case "chauffeur":
            window.location.href = "/chauffeur/dashboard.html";
            break;
          case "magasinier":
            window.location.href = "/magasinier/dashboard.html";
            break;
          default:
            window.location.href = "/client/dashboard.html";
        }

      } catch (err) {
        errorBox.textContent = "⚠️ Erreur inattendue : " + err.message;
        console.error(err);
      }
    });
  </script>
</body>
</html>
