<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Connexion | Léman-Courses</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 48px;
            color: #e53935;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #0f172a;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e53935;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover {
            background: #c62828;
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            color: #e53935;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <i class="fas fa-truck"></i>
        </div>
        <h2>Connexion Léman-Courses</h2>
        
        <div class="form-group">
            <label>Identifiant</label>
            <input type="text" id="username" placeholder="Votre identifiant">
        </div>
        
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="********">
        </div>
        
        <div class="form-group">
            <label>Je suis</label>
            <select id="role">
                <option value="admin">Administrateur (dispatch)</option>
                <option value="client">Client</option>
                <option value="staff">Magasinier</option>
            </select>
        </div>
        
        <button class="btn" onclick="login()">Se connecter</button>
        
        <div class="links">
            <a href="../client/signup.html">Créer un compte client</a>
        </div>
    </div>
    
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            // SIMULATION - À remplacer par Supabase
            if (username && password) {
                // Stocker l'utilisateur
                localStorage.setItem('user', JSON.stringify({
                    username: username,
                    role: role,
                    loggedIn: true
                }));
                
                // Rediriger selon le rôle
                if (role === 'admin') {
                    window.location.href = '../dispatch/';
                } else if (role === 'client') {
                    window.location.href = '../client/dashboard.html';
                } else if (role === 'staff') {
                    window.location.href = '../staff/';
                }
            } else {
                alert('Identifiant ou mot de passe incorrect');
            }
        }
    </script>
</body>
</html>
