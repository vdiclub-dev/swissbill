<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Connexion — Colixo</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></noscript>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <style>
        :root {
            --red:#e8311a; --red-dark:#c0280f; --red-glow:rgba(232,49,26,0.2);
            --night:#0a0a0f; --night2:#111118; --night3:#18181f; --surface:#1e1e28;
            --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
            --white:#ffffff; --muted:rgba(255,255,255,0.38); --muted2:rgba(255,255,255,0.6);
            --green:#22c55e;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;}
        body{
            font-family:'Outfit',sans-serif;
            background:var(--night);
            color:var(--white);
            display:flex;align-items:center;justify-content:center;
            min-height:100vh;
            padding:20px;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:
                linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
                linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
            background-size:60px 60px;
            pointer-events:none;
        }
        .glow{position:fixed;width:700px;height:700px;background:radial-gradient(circle,rgba(232,49,26,0.07) 0%,transparent 65%);top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;}

        .box{
            background:var(--night2);
            border:1px solid var(--border2);
            border-radius:24px;
            padding:44px;
            width:100%;max-width:400px;
            box-shadow:0 40px 100px rgba(0,0,0,0.5);
            position:relative;z-index:1;
            animation:fadeUp 0.5s ease both;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

        .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:8px;}
        .logo-mark{width:52px;height:52px;background:var(--red);border-radius:14px;display:grid;place-items:center;font-size:24px;box-shadow:0 6px 24px var(--red-glow);}
        .logo-text{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:1px;}
        .logo-text em{color:var(--red);font-style:normal;}
        .subtitle{text-align:center;font-size:13px;color:var(--muted);margin-bottom:36px;line-height:1.6;}

        .field{margin-bottom:14px;}
        .field label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}

        /* Input code grand format */
        .field input.code-field{
            width:100%;padding:18px 15px;
            background:var(--night3);
            border:1.5px solid var(--border2);
            border-radius:11px;
            font-family:'Outfit',sans-serif;
            font-size:28px;font-weight:700;
            color:var(--white);
            letter-spacing:8px;
            text-align:center;
            text-transform:uppercase;
            transition:border-color 0.2s,box-shadow 0.2s;
        }
        .field input.code-field:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow);}
        .field input.code-field::placeholder{color:rgba(255,255,255,0.15);letter-spacing:4px;font-size:20px;}

        /* Input standard (admin) */
        .field input.std-field{
            width:100%;padding:13px 15px;
            background:var(--night3);
            border:1.5px solid var(--border2);
            border-radius:11px;
            font-family:'Outfit',sans-serif;font-size:15px;
            color:var(--white);
            transition:border-color 0.2s;
        }
        .field input.std-field:focus{outline:none;border-color:var(--red);}
        .field input.std-field::placeholder{color:rgba(255,255,255,0.2);}

        .code-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6;}
        .code-hint strong{color:var(--muted2);}

        .btn-submit{
            width:100%;padding:15px;
            background:var(--red);color:var(--white);
            border:none;border-radius:11px;
            font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;
            cursor:pointer;
            display:flex;align-items:center;justify-content:center;gap:10px;
            box-shadow:0 6px 24px var(--red-glow);
            transition:all 0.2s;
            margin-top:20px;
        }
        .btn-submit:hover{background:var(--red-dark);transform:translateY(-1px);}
        .btn-submit:active{transform:scale(0.99);}
        .btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

        .error-box{
            background:rgba(232,49,26,0.08);border:1px solid rgba(232,49,26,0.25);
            border-radius:10px;padding:11px 14px;font-size:13px;color:var(--red);
            margin-bottom:16px;display:none;text-align:center;
        }

        /* Lien admin discret */
        .admin-link{text-align:center;margin-top:24px;padding-top:18px;border-top:1px solid var(--border);font-size:12px;}
        .admin-link a{color:var(--muted);text-decoration:none;transition:color 0.2s;}
        .admin-link a:hover{color:var(--muted2);}

        /* Panneau admin */
        .admin-panel{display:none;margin-top:20px;padding-top:20px;border-top:1px solid var(--border2);}
        .admin-panel.visible{display:block;}
        .back-link{display:block;text-align:center;margin-top:10px;font-size:12px;color:var(--muted);cursor:pointer;text-decoration:none;}
        .back-link:hover{color:var(--muted2);}

        /* Toast */
        .toast{position:fixed;top:20px;right:20px;padding:12px 18px;border-radius:10px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;background:var(--night3);border:1px solid var(--border2);box-shadow:0 12px 40px rgba(0,0,0,0.4);z-index:9999;transform:translateX(calc(100% + 40px));transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);}
        .toast.show{transform:translateX(0);}
        .toast.success .ti{color:var(--green);}
        .toast.error .ti{color:var(--red);}
        .ti{font-size:15px;}

        /* Loader */
        .loader{display:none;position:fixed;inset:0;background:rgba(10,10,15,0.85);backdrop-filter:blur(4px);place-items:center;z-index:2000;}
        .loader.on{display:grid;}
        .spin{width:40px;height:40px;border:2.5px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div class="glow"></div>
<div class="toast" id="toast"><span class="ti" id="tIco"></span><span id="tTxt"></span></div>
<div class="loader" id="loader"><div class="spin"></div></div>

<div class="box">
    <div class="logo">
        <div class="logo-mark">🚚</div>
        <div class="logo-text">Coli<em>xo</em></div>
    </div>
    <div class="subtitle">Entrez votre code d'accès<br>pour accéder à votre espace Colixo</div>

    <div class="error-box" id="errorBox"></div>

    <!-- ── FORMULAIRE CODE (principal) ── -->
    <form id="formCode">
        <div class="field">
            <label>Code d'accès</label>
            <input
                type="text"
                id="codeInput"
                class="code-field"
                placeholder="USR-XXXX"
                maxlength="8"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="characters"
                spellcheck="false"
                required>
        </div>
        <div class="code-hint">
            Code fourni par Colixo · Exemple : <strong>USR-A3F9</strong>
        </div>
        <button type="submit" class="btn-submit">
            <i class="fas fa-arrow-right"></i> Accéder à mon espace
        </button>
    </form>

    <!-- Lien admin discret -->
    <div class="admin-link">
        <a href="#" id="showAdminLink">Accès équipe Colixo (admin)</a>
    </div>

    <!-- ── FORMULAIRE ADMIN (caché par défaut) ── -->
    <div class="admin-panel" id="adminPanel">
        <form id="formAdmin">
            <div class="field">
                <label>Email</label>
                <input type="email" id="adminEmail" class="std-field" placeholder="vous@exemple.ch" required autocomplete="email">
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <input type="password" id="adminPwd" class="std-field" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit" style="margin-top:8px;">
                <i class="fas fa-sign-in-alt"></i> Connexion équipe
            </button>
        </form>
        <a href="#" class="back-link" id="hideAdminLink">← Masquer</a>
    </div>
</div>

<script>
(function () {
    'use strict';

    if (!window.SUPABASE_CONFIG || !window.SUPABASE_CLIENT) {
        document.body.innerHTML = '<div style="padding:40px;color:#e8311a;font-family:sans-serif;max-width:500px;"><h2>❌ config.js manquant</h2><p>Le fichier config.js est introuvable.</p></div>';
        return;
    }
    const db = window.SUPABASE_CLIENT;

    /* ── Helpers UI ── */
    const toastEl  = document.getElementById('toast');
    const loaderEl = document.getElementById('loader');
    let tt;

    function toast(type, msg) {
        clearTimeout(tt);
        toastEl.className = 'toast ' + type + ' show';
        document.getElementById('tIco').textContent = type === 'success' ? '✓' : '✕';
        document.getElementById('tTxt').textContent = msg;
        tt = setTimeout(() => toastEl.classList.remove('show'), 5000);
    }
    const showLoad = () => loaderEl.classList.add('on');
    const hideLoad = () => loaderEl.classList.remove('on');

    function showError(msg) {
        const el = document.getElementById('errorBox');
        el.textContent = msg;
        el.style.display = 'block';
    }
    function clearError() {
        document.getElementById('errorBox').style.display = 'none';
    }

    /* ── Formatage code en majuscules automatique ── */
    document.getElementById('codeInput').addEventListener('input', function () {
        this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
    });

    /* ── Afficher/masquer panneau admin ── */
    document.getElementById('showAdminLink').addEventListener('click', function (e) {
        e.preventDefault();
        clearError();
        document.getElementById('adminPanel').classList.add('visible');
        this.style.display = 'none';
        document.getElementById('adminEmail').focus();
    });
    document.getElementById('hideAdminLink').addEventListener('click', function (e) {
        e.preventDefault();
        clearError();
        document.getElementById('adminPanel').classList.remove('visible');
        document.getElementById('showAdminLink').style.display = 'inline';
    });

    /* ── Redirection selon rôle ── */
    function redirectByRole(role) {
        const routes = {
            super_admin: '/admin/dashboard.html',
            admin:       '/admin/dashboard.html',
            chauffeur:   '/admin/driver-app.html',
            magasinier:  '/magasinier/dashboard.html',
            client:      '/admin/client/portal.html'
        };
        window.location.href = routes[role] || '/admin/client/portal.html';
    }

    /* ── Vérifier session existante (admin connecté) ── */
    async function checkExistingSession() {
        try {
            const { data: { session } } = await db.auth.getSession();
            if (!session) return;
            const { data: user } = await db.from('utilisateurs').select('role').eq('id', session.user.id).single();
            if (user) redirectByRole(user.role);
        } catch (e) {}
    }
    checkExistingSession();

    /* ── CONNEXION PAR CODE ── */
    document.getElementById('formCode').addEventListener('submit', async function (e) {
        e.preventDefault();
        clearError();

        const code = document.getElementById('codeInput').value.trim().toUpperCase();
        if (!code || code.length < 4) {
            showError('❌ Code invalide. Format attendu : USR-XXXX');
            return;
        }

        showLoad();
        try {
            const { data: user, error } = await db
                .from('utilisateurs')
                .select('id, role, nom, prenom, code_acces')
                .eq('code_acces', code)
                .single();

            if (error || !user) {
                hideLoad();
                showError('❌ Code introuvable. Vérifiez votre code.');
                return;
            }

            /* Stocker le profil en sessionStorage pour les pages suivantes */
            sessionStorage.setItem('colixo_user', JSON.stringify({
                id:     user.id,
                role:   user.role,
                nom:    user.nom,
                prenom: user.prenom,
                code:   user.code_acces
            }));

            toast('success', 'Bienvenue ! Redirection en cours…');
            setTimeout(() => redirectByRole(user.role), 800);

        } catch (err) {
            hideLoad();
            showError('❌ Erreur : ' + err.message);
        }
    });

    /* ── CONNEXION ADMIN (email + mot de passe) ── */
    document.getElementById('formAdmin').addEventListener('submit', async function (e) {
        e.preventDefault();
        clearError();

        const email = document.getElementById('adminEmail').value.trim();
        const pwd   = document.getElementById('adminPwd').value;

        showLoad();
        try {
            const { data, error } = await db.auth.signInWithPassword({ email, password: pwd });
            if (error) throw error;

            const { data: user } = await db
                .from('utilisateurs')
                .select('role')
                .eq('id', data.user.id)
                .single();

            const role = user?.role || 'client';
            toast('success', 'Connexion réussie — redirection…');
            setTimeout(() => redirectByRole(role), 800);

        } catch (err) {
            hideLoad();
            showError('❌ ' + (err.message.includes('Invalid') ? 'Email ou mot de passe incorrect.' : err.message));
        }
    });

})();
</script>
</body>
</html>
