<!DOCTYPE html>
<!-- colixo-build:20260419 -->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script>
    (function(){try{
      var u=new URL(location.href);
      if(u.searchParams.has('cx')){
        u.searchParams.delete('cx');
        history.replaceState(null,'',u.pathname+u.search+u.hash);
        return;
      }
      if(sessionStorage.getItem('cx_html')==='1')return;
      sessionStorage.setItem('cx_html','1');
      u.searchParams.set('cx',Date.now());
      location.replace(u.toString());
    }catch(e){}})();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Connexion — Colixo</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script data-cfasync="false" src="../config.js?v=20260419"></script>
    <style>
        :root {
            --red:#e8311a; --red-dark:#c0280f; --red-glow:rgba(232,49,26,0.2);
            --night:#0a0a0f; --night2:#111118; --night3:#18181f; --surface:#1e1e28;
            --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
            --white:#ffffff; --muted:rgba(255,255,255,0.38); --muted2:rgba(255,255,255,0.6);
            --green:#22c55e;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;}
        body{
            font-family:'Outfit',sans-serif;
            background:var(--night);
            color:var(--white);
            display:flex; align-items:center; justify-content:center;
            min-height:100vh;
            padding:20px;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size:60px 60px;
            pointer-events:none;
        }
        .glow{position:fixed;width:700px;height:700px;background:radial-gradient(circle,rgba(232,49,26,0.07) 0%,transparent 65%);top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;}

        .box{
            background:var(--night2);
            border:1px solid var(--border2);
            border-radius:24px;
            padding:44px;
            width:100%; max-width:400px;
            box-shadow:0 40px 100px rgba(0,0,0,0.5);
            position:relative; z-index:1;
            animation:fadeUp 0.5s ease both;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

        .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:8px;}
        .logo-mark{width:52px;height:52px;background:var(--red);border-radius:14px;display:grid;place-items:center;font-size:24px;box-shadow:0 6px 24px var(--red-glow);}
        .logo-text{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:1px;}
        .logo-text em{color:var(--red);font-style:normal;}
        .subtitle{text-align:center;font-size:13px;color:var(--muted);margin-bottom:32px;}

        /* Tabs */
        .tabs{display:flex;background:var(--night3);border-radius:11px;padding:3px;margin-bottom:24px;}
        .tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);border-radius:8px;cursor:pointer;transition:all 0.2s;}
        .tab.active{background:var(--surface);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,0.3);}

        .form-panel{display:none;}
        .form-panel.active{display:block;}

        .field{margin-bottom:14px;}
        .field label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
        .field input{width:100%;padding:13px 15px;background:var(--night3);border:1.5px solid var(--border2);border-radius:11px;font-family:'Outfit',sans-serif;font-size:15px;color:var(--white);transition:border-color 0.2s;}
        .field input:focus{outline:none;border-color:var(--red);}
        .field input::placeholder{color:rgba(255,255,255,0.2);}
        .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

        .btn-submit{
            width:100%;padding:14px;
            background:var(--red);color:var(--white);
            border:none;border-radius:11px;
            font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;
            cursor:pointer;
            display:flex;align-items:center;justify-content:center;gap:8px;
            box-shadow:0 6px 24px var(--red-glow);
            transition:all 0.2s;
            margin-top:8px;
        }
        .btn-submit:hover{background:var(--red-dark);transform:translateY(-1px);}
        .btn-submit:active{transform:scale(0.99);}
        .btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

        .foot-link{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
        .foot-link a{color:var(--red);font-weight:600;text-decoration:none;}
        .foot-link a:hover{text-decoration:underline;}

        .error-box{
            background:rgba(232,49,26,0.08);border:1px solid rgba(232,49,26,0.25);
            border-radius:10px;padding:11px 14px;font-size:13px;color:var(--red);
            margin-bottom:14px;display:none;
        }

        /* Toast */
        .toast{position:fixed;top:20px;right:20px;padding:12px 18px;border-radius:10px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;background:var(--night3);border:1px solid var(--border2);box-shadow:0 12px 40px rgba(0,0,0,0.4);z-index:9999;transform:translateX(calc(100% + 40px));transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);}
        .toast.show{transform:translateX(0);}
        .toast.success .ti{color:var(--green);}
        .toast.error   .ti{color:var(--red);}
        .ti{font-size:15px;}

        /* Loader overlay */
        .loader{display:none;position:fixed;inset:0;background:rgba(10,10,15,0.85);backdrop-filter:blur(4px);place-items:center;z-index:2000;}
        .loader.on{display:grid;}
        .spin{width:40px;height:40px;border:2.5px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div class="glow"></div>
<div class="toast" id="toast"><span class="ti" id="tIco"></span><span id="tTxt"></span></div>
<div class="loader" id="loader"><div class="spin"></div></div>

<div class="box">
    <!-- Logo -->
    <div class="logo">
        <div class="logo-mark">🚚</div>
        <div class="logo-text">Coli<em>xo</em></div>
    </div>
    <div class="subtitle" id="loginSubtitle">Colixo — transport express · Suisse romande</div>
    <p id="portalClientBack" style="display:none;text-align:center;margin:-8px 0 18px;font-size:12px;">
        <a href="/admin/client/index.html" style="color:var(--muted2);text-decoration:none;font-weight:600;">← Retour au site Colixo</a>
    </p>

    <!-- Tabs (masqués pour les expéditeurs : écran = connexion uniquement) -->
    <div class="tabs" id="clientTabs">
        <div class="tab active" id="tabLogin"  onclick="switchTab('login')">Connexion</div>
        <div class="tab"        id="tabSignup" onclick="switchTab('signup')">Inscription</div>
    </div>

    <!-- Error box -->
    <div class="error-box" id="errorBox"></div>

    <!-- ── CONNEXION ── -->
    <div class="form-panel active" id="panelLogin">
        <form id="formLogin">
            <div class="field">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="vous@exemple.ch" required autocomplete="email">
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <input type="password" id="loginPwd" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-sign-in-alt"></i> Me connecter</button>
        </form>
        <div class="foot-link"><a href="#" id="linkForgot">Mot de passe oublié ?</a></div>
        <div class="foot-link" id="portalClientNewAccount" style="display:none;margin-top:4px;">
            Pas encore de compte ?
            <a href="/admin/client/portal.html?register=1" style="color:var(--red);font-weight:600;text-decoration:none;">Créer mon espace expéditeur</a>
        </div>
    </div>

    <!-- ── INSCRIPTION ── -->
    <div class="form-panel" id="panelSignup">
        <form id="formSignup">
            <div class="field">
                <label>Email *</label>
                <input type="email" id="signupEmail" placeholder="vous@exemple.ch" required autocomplete="email">
            </div>
            <div class="field">
                <label>Mot de passe *</label>
                <input type="password" id="signupPwd" placeholder="6 caractères min." minlength="6" required autocomplete="new-password">
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Nom</label>
                    <input type="text" id="signupNom" placeholder="Dupont" autocomplete="family-name">
                </div>
                <div class="field">
                    <label>Prénom</label>
                    <input type="text" id="signupPrenom" placeholder="Jean" autocomplete="given-name">
                </div>
            </div>
            <div class="field">
                <label>Téléphone</label>
                <input type="tel" id="signupTel" placeholder="+41 79 000 00 00" autocomplete="tel">
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-user-plus"></i> Créer mon compte</button>
        </form>
        <div class="foot-link">Déjà un compte ? <a href="#" onclick="switchTab('login')">Se connecter</a></div>
    </div>

    <!-- ── MOT DE PASSE OUBLIÉ ── -->
    <div class="form-panel" id="panelForgot">
        <p style="font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;">
            Entrez votre email pour recevoir un lien de réinitialisation.
        </p>
        <form id="formForgot">
            <div class="field">
                <label>Email</label>
                <input type="email" id="forgotEmail" placeholder="vous@exemple.ch" required autocomplete="email">
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Envoyer le lien</button>
        </form>
        <div class="foot-link"><a href="#" onclick="switchTab('login')">← Retour à la connexion</a></div>
    </div>

    <div id="loginCrossLinks" class="login-cross" style="text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border2);font-size:12px;color:var(--muted2);line-height:1.65;"></div>
</div>

<script>
(function () {
    'use strict';

    if (!window.SUPABASE_CONFIG) {
        document.body.innerHTML = '<div style="padding:40px;color:#e8311a;font-family:sans-serif;max-width:520px;"><h2>❌ config.js introuvable</h2><p>Ouvrez le site via <strong>http://localhost:8080</strong> (racine du dépôt), pas en <code>file://</code>.</p></div>';
        return;
    }
    if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
        document.body.innerHTML = '<div style="padding:40px;color:#e8311a;font-family:sans-serif;max-width:520px;"><h2>❌ SDK Supabase bloqué</h2><p>Le script CDN n’a pas chargé (réseau, pare-feu, bloqueur, navigation privée stricte). Désactivez les extensions ou essayez un autre réseau.</p></div>';
        return;
    }
    if (!window.SUPABASE_CLIENT) {
        var err = window.COLIXO_SUPABASE_INIT_ERROR || 'Client non initialisé';
        document.body.innerHTML = '<div style="padding:40px;color:#e8311a;font-family:sans-serif;max-width:520px;"><h2>❌ Connexion Supabase impossible</h2><p style="font-size:13px;opacity:0.9;">' + String(err).replace(/</g, '&lt;') + '</p></div>';
        return;
    }
    const db = window.SUPABASE_CLIENT;
    var h = window.colixoHref || function (p) { return p; };

    (function portalClientHint() {
        const q = new URLSearchParams(window.location.search);
        if (q.get('portal') !== 'client') return;
        document.title = 'Connexion — Colixo';
        const sub = document.getElementById('loginSubtitle');
        if (sub) sub.textContent = 'Espace client Colixo — connectez-vous pour commander et suivre vos colis.';
        const back = document.getElementById('portalClientBack');
        if (back) back.style.display = 'block';
        const tabs = document.getElementById('clientTabs');
        if (tabs) tabs.style.display = 'none';
        const na = document.getElementById('portalClientNewAccount');
        if (na) na.style.display = 'block';
    })();

    (function chauffeurHint() {
        const q = new URLSearchParams(window.location.search);
        if (q.get('portal') === 'client') return;
        if (q.get('chauffeur') !== '1' && q.get('app') !== 'chauffeur') return;
        const sub = document.getElementById('loginSubtitle');
        if (sub) sub.textContent = 'Compte chauffeur — après connexion, ouverture de l’app chauffeur (Colixo Driver).';
    })();

    (function equipeHint() {
        const q = new URLSearchParams(window.location.search);
        if (q.get('equipe') !== '1') return;
        if (q.get('portal') === 'client') return;
        const sub = document.getElementById('loginSubtitle');
        if (sub) sub.textContent = 'Équipe Colixo (admin, dispatch, chauffeur, magasinier) : un seul formulaire — redirection selon votre rôle.';
    })();

    (function loginCrossLinks() {
        const el = document.getElementById('loginCrossLinks');
        if (!el) return;
        const clientUrl = '/login/index.html?portal=client&next=' + encodeURIComponent('/admin/client/portal.html');
        const equipeUrl = '/login/index.html?equipe=1';
        const registerUrl = '/admin/client/portal.html?register=1';
        const q = new URLSearchParams(window.location.search);
        if (q.get('portal') === 'client') {
            el.innerHTML = '<div><strong>Pas un compte expéditeur ?</strong> Vous êtes <strong>admin, dispatch ou chauffeur</strong> : utilisez <a href="' + equipeUrl + '" style="color:var(--red);font-weight:700;text-decoration:none;">la connexion équipe Colixo</a> (mêmes identifiants, sans espace client expéditeur).</div>';
        } else if (q.get('equipe') === '1' || q.get('chauffeur') === '1' || q.get('app') === 'chauffeur') {
            el.innerHTML = '<div>Vous êtes <strong>client / expéditeur</strong> ? <a href="' + clientUrl + '" style="color:var(--red);font-weight:700;text-decoration:none;">Connexion espace client Colixo</a> · <a href="' + registerUrl + '" style="color:var(--muted2);font-weight:600;text-decoration:none;">Créer mon espace expéditeur</a></div>';
        } else {
            el.innerHTML = '<div style="display:flex;flex-direction:column;gap:10px;">' +
                '<div>· <strong>Expéditeur</strong> : <a href="' + clientUrl + '" style="color:var(--red);font-weight:600;text-decoration:none;">connexion espace client</a> ou <a href="' + registerUrl + '" style="color:var(--muted);font-weight:600;text-decoration:none;">créer un compte</a></div>' +
                '<div>· <strong>Équipe Colixo</strong> (admin, chauffeur…) : <a href="' + equipeUrl + '" style="color:var(--red);font-weight:600;text-decoration:none;">connexion équipe</a></div></div>';
        }
    })();

    /* ── Helpers ── */
    const toastEl = document.getElementById('toast');
    let tt;
    function toast(type, msg) {
        clearTimeout(tt);
        toastEl.className = 'toast ' + type + ' show';
        document.getElementById('tIco').textContent = type === 'success' ? '✓' : '✕';
        document.getElementById('tTxt').textContent = msg;
        tt = setTimeout(() => toastEl.classList.remove('show'), 5000);
    }
    const loaderEl = document.getElementById('loader');
    const showLoad = () => loaderEl.classList.add('on');
    const hideLoad = () => loaderEl.classList.remove('on');

    function showError(msg) {
        const el = document.getElementById('errorBox');
        el.textContent = msg;
        el.style.display = 'block';
    }
    function clearError() {
        document.getElementById('errorBox').style.display = 'none';
    }

    /* ── Tabs ── */
    window.switchTab = function(tab) {
        clearError();
        const isClientPortal = new URLSearchParams(window.location.search).get('portal') === 'client';
        if (isClientPortal && tab === 'signup') return;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
        if (tab === 'login') {
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('panelLogin').classList.add('active');
        } else if (tab === 'signup') {
            document.getElementById('tabSignup').classList.add('active');
            document.getElementById('panelSignup').classList.add('active');
        } else if (tab === 'forgot') {
            document.getElementById('panelForgot').classList.add('active');
        }
    };

    document.getElementById('linkForgot').addEventListener('click', e => { e.preventDefault(); switchTab('forgot'); });

    if (new URLSearchParams(window.location.search).get('forgot') === '1') {
        switchTab('forgot');
    }

    /* ── Redirection selon rôle ── */
    function redirectByRole(role) {
        const driverApp = h('/admin/driver-app.html') + '?_=' + Date.now();
        const routes = {
            admin:        h('/admin/dashboard.html'),
            super_admin:  h('/admin/dashboard.html'),
            chauffeur:    driverApp,
            magasinier:   h('/magasinier/dashboard.html'),
            client:       h('/admin/client/portal.html')
        };
        window.location.href = routes[role] || h('/admin/client/portal.html');
    }

    /** Évite les redirections ouvertes : seul le portail client est autorisé via ?next= */
    function getSafeNextPath() {
        let raw;
        try {
            raw = new URLSearchParams(window.location.search).get('next');
        } catch (e) { return null; }
        if (!raw || typeof raw !== 'string') return null;
        let dec;
        try { dec = decodeURIComponent(raw.trim()); } catch (e) { return null; }
        if (dec !== '/admin/client/portal.html') return null;
        return dec;
    }

    function redirectAfterAuth(role) {
        const next = getSafeNextPath();
        if (next && role === 'client') {
            window.location.href = h(next);
            return;
        }
        redirectByRole(role);
    }

    /* ── Vérifier session existante ── */
    async function checkExistingSession() {
        const q = new URLSearchParams(window.location.search);
        /* Depuis le site (Connexion équipe ?equipe=1) ou lien chauffeur : afficher le formulaire, pas renvoi auto vers l'app driver */
        if (q.get('equipe') === '1' || q.get('chauffeur') === '1') return;
        const { data: { session } } = await db.auth.getSession();
        if (!session) return;
        const { data: user } = await db.from('utilisateurs').select('role').eq('id', session.user.id).single();
        if (user) redirectAfterAuth(user.role);
    }
    checkExistingSession();

    /* ── CONNEXION ── */
    document.getElementById('formLogin').addEventListener('submit', async e => {
        e.preventDefault();
        clearError();
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPwd').value;
        showLoad();
        try {
            const { data, error } = await db.auth.signInWithPassword({ email, password });
            if (error) throw error;
            const { data: user } = await db.from('utilisateurs').select('role').eq('id', data.user.id).single();
            const role = user?.role || 'client';
            toast('success', 'Connexion réussie — redirection…');
            setTimeout(() => redirectAfterAuth(role), 800);
        } catch (err) {
            hideLoad();
            const msg = err.message.includes('Invalid') ? 'Email ou mot de passe incorrect.' : err.message;
            showError('❌ ' + msg);
        }
    });

    /* ── INSCRIPTION ── */
    document.getElementById('formSignup').addEventListener('submit', async e => {
        e.preventDefault();
        clearError();
        const email    = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPwd').value;
        const nom      = document.getElementById('signupNom').value.trim();
        const prenom   = document.getElementById('signupPrenom').value.trim();
        const tel      = document.getElementById('signupTel').value.trim();
        showLoad();
        try {
            const { data, error: authErr } = await db.auth.signUp({ email, password });
            if (authErr) throw authErr;
            const { error: dbErr } = await db.from('utilisateurs').insert([{
                id: data.user.id, email,
                nom: nom || null, prenom: prenom || null,
                telephone: tel || null, role: 'client'
            }]);
            if (dbErr && !dbErr.message.includes('duplicate')) throw dbErr;
            hideLoad();
            toast('success', 'Compte créé ! Vérifiez vos emails pour confirmer.');
            setTimeout(() => switchTab('login'), 1500);
        } catch (err) {
            hideLoad();
            showError('❌ ' + err.message);
        }
    });

    /* ── MOT DE PASSE OUBLIÉ ── */
    document.getElementById('formForgot').addEventListener('submit', async e => {
        e.preventDefault();
        clearError();
        const email = document.getElementById('forgotEmail').value.trim();
        showLoad();
        try {
            const { error } = await db.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/admin/reset-password.html'
            });
            if (error) throw error;
            hideLoad();
            toast('success', 'Email envoyé ! Vérifiez votre boîte mail.');
            setTimeout(() => switchTab('login'), 2000);
        } catch (err) {
            hideLoad();
            showError('❌ ' + err.message);
        }
    });

})();
</script>
</body>
</html>
