<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Léman-Courses</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(-20px); }
            to { opacity:1; transform:translateY(0); }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo i {
            font-size: 60px;
            color: #e53935;
            background: #fee2e2;
            padding: 15px;
            border-radius: 50%;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #0f172a;
        }
        
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
            box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn:hover {
            background: #c62828;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229,57,53,0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .links a {
            color: #e53935;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        /* Message d'erreur */
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            border-left: 4px solid #e53935;
        }
        
        .error-message i {
            font-size: 18px;
        }
        
        /* Loading spinner */
        .btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn.loading i {
            animation: spin 1s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Infos démo */
        .demo-info {
            margin-top: 20px;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #475569;
        }
        
        .demo-info p {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .demo-info i {
            color: #e53935;
            width: 16px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <i class="fas fa-truck"></i>
        </div>
        
        <h2>Bienvenue</h2>
        <div class="subtitle">Connectez-vous à votre espace</div>
        
        <!-- Message d'erreur -->
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Identifiant ou mot de passe incorrect</span>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-user"></i> Identifiant</label>
            <input type="text" id="username" placeholder="Votre identifiant" value="demo">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Mot de passe</label>
            <input type="password" id="password" placeholder="********" value="1234">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-user-tag"></i> Je suis</label>
            <select id="role">
                <option value="admin">👑 Administrateur (dispatch)</option>
                <option value="client">👤 Client</option>
                <option value="staff">🔧 Magasinier</option>
            </select>
        </div>
        
        <button class="btn" id="loginBtn" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> Se connecter
        </button>
        
        <div class="links">
            <a href="../client/signup.html">
                <i class="fas fa-user-plus"></i> Créer un compte client
            </a>
        </div>
        
        <!-- Informations de démonstration -->
        <div class="demo-info">
            <p><i class="fas fa-info-circle"></i> <strong>Démonstration :</strong></p>
            <p><i class="fas fa-user"></i> N'importe quel identifiant fonctionne</p>
            <p><i class="fas fa-key"></i> Mot de passe: 1234</p>
            <p><i class="fas fa-shield-alt"></i> Choisissez votre rôle</p>
        </div>
    </div>
    
    <script>
async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const role = document.getElementById('role').value;
    
    if (!username || !password) {
        showError('Veuillez remplir tous les champs');
        return;
    }
    
    try {
        const { data, error } = await supabase
            .from('users')
            .select('*')
            .eq('username', username)
            .eq('password', password)
            .eq('role', role);
        
        if (error) throw error;
        
        if (data && data.length > 0) {
            const user = data[0];
            
            localStorage.setItem('user', JSON.stringify({
                id: user.id,
                username: user.username,
                role: user.role,
                loggedIn: true
            }));
            
            if (role === 'admin') window.location.href = '../dispatch/';
            else if (role === 'client') window.location.href = '../client/dashboard.html';
            else if (role === 'staff') window.location.href = '../staff/';
        } else {
            showError('Identifiant, mot de passe ou rôle incorrect');
        }
    } catch (error) {
        console.error('Erreur:', error);
        showError('Erreur de connexion');
    }
}
</script>
</body>
</html>
