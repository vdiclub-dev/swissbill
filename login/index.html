<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260512d">

<meta charset="UTF-8">
    <!-- colixo-build:20260512d -->
    <script>
    (function(){try{
      // Skip cache-busting redirect in native app (Capacitor WebView)
      if(navigator.userAgent.indexOf('ColixoApp')!==-1)return;
      var BUILD='20260512d';
      try{
        if(localStorage.getItem('colixo_deploy')!==BUILD){
          localStorage.setItem('colixo_deploy',BUILD);
          sessionStorage.removeItem('colixo_index_bust');
          sessionStorage.removeItem('colixo_login_bust');
        }
      }catch(e){}
    }catch(e){}})();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">

<link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></noscript>

    <style>
        :root {
            --red:#e8311a; --red-dark:#c0280f; --red-glow:rgba(232,49,26,0.2);
            --night:#0a0a0f; --night2:#111118; --night3:#18181f; --surface:#1e1e28;
            --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
            --white:#ffffff; --muted:rgba(255,255,255,0.38); --muted2:rgba(255,255,255,0.6);
            --green:#22c55e;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;}
        body{
            font-family:'Outfit',sans-serif;
            background:var(--night);
            color:var(--white);
            display:flex;align-items:center;justify-content:center;
            min-height:100vh;
            padding:20px;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:
                linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
                linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
            background-size:60px 60px;
            pointer-events:none;
        }
        .glow{position:fixed;width:700px;height:700px;background:radial-gradient(circle,rgba(232,49,26,0.07) 0%,transparent 65%);top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;}

        .box{
            background:var(--night2);
            border:1px solid var(--border2);
            border-radius:24px;
            padding:44px;
            width:100%;max-width:400px;
            box-shadow:0 40px 100px rgba(0,0,0,0.5);
            position:relative;z-index:1;
            animation:fadeUp 0.5s ease both;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

        .logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:8px;}
        .logo-mark{width:52px;height:52px;background:var(--red);border-radius:14px;display:grid;place-items:center;font-size:24px;box-shadow:0 6px 24px var(--red-glow);}
        .logo-text{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:1px;}
        .logo-text em{color:var(--red);font-style:normal;}
        .subtitle{text-align:center;font-size:13px;color:var(--muted);margin-bottom:36px;line-height:1.6;}

        .field{margin-bottom:14px;}
        .field label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
        .code-wrap{position:relative;}

        /* Input code grand format */
        .field input.code-field{
            width:100%;padding:18px 58px 18px 15px;
            background:var(--night3);
            border:1.5px solid var(--border2);
            border-radius:11px;
            font-family:'Outfit',sans-serif;
            font-size:28px;font-weight:700;
            color:var(--white);
            letter-spacing:8px;
            text-align:center;
            text-transform:uppercase;
            transition:border-color 0.2s,box-shadow 0.2s;
        }
        .field input.code-field.is-masked{
            -webkit-text-security: disc;
        }
        .field input.code-field:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow);}
        .field input.code-field::placeholder{color:rgba(255,255,255,0.15);letter-spacing:4px;font-size:20px;}
        .toggle-code{
            position:absolute;right:10px;top:50%;transform:translateY(-50%);
            width:40px;height:40px;border:none;border-radius:10px;
            background:rgba(255,255,255,0.04);color:var(--muted2);
            display:grid;place-items:center;cursor:pointer;
            transition:background .2s,color .2s,transform .2s;
            font-size:18px;font-family:inherit;line-height:1;
        }
        .toggle-code:hover{background:rgba(255,255,255,0.08);color:var(--white);}
        .toggle-code:focus{outline:none;box-shadow:0 0 0 3px var(--red-glow);color:var(--white);}

        /* Input standard (admin) */
        .field input.std-field{
            width:100%;padding:13px 15px;
            background:var(--night3);
            border:1.5px solid var(--border2);
            border-radius:11px;
            font-family:'Outfit',sans-serif;font-size:15px;
            color:var(--white);
            transition:border-color 0.2s;
        }
        .field input.std-field:focus{outline:none;border-color:var(--red);}
        .field input.std-field::placeholder{color:rgba(255,255,255,0.2);}

        .code-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6;}
        .code-hint strong{color:var(--muted2);}

        .login-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--night3);border-radius:12px;padding:4px;border:1px solid var(--border2);}
        .login-tabs button{flex:1;padding:12px 14px;border:none;border-radius:10px;background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s,color .2s;}
        .login-tabs button.active{background:var(--red);color:#fff;box-shadow:0 4px 16px var(--red-glow);}
        .login-tabs button:not(.active):hover{color:var(--white);}
        .panel-register{display:none;}
        .panel-register.active{display:block;}
        .reg-note{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:16px;padding:12px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-radius:10px;}

        .btn-submit{
            width:100%;padding:15px;
            background:var(--red);color:var(--white);
            border:none;border-radius:11px;
            font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;
            cursor:pointer;
            display:flex;align-items:center;justify-content:center;gap:10px;
            box-shadow:0 6px 24px var(--red-glow);
            transition:all 0.2s;
            margin-top:20px;
        }
        .btn-submit:hover{background:var(--red-dark);transform:translateY(-1px);}
        .btn-submit:active{transform:scale(0.99);}
        .btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

        .error-box{
            background:rgba(232,49,26,0.08);border:1px solid rgba(232,49,26,0.25);
            border-radius:10px;padding:11px 14px;font-size:13px;color:var(--red);
            margin-bottom:16px;display:none;text-align:center;
        }

        /* Toast */

        /* Toast */
        .toast{position:fixed;top:20px;right:20px;padding:12px 18px;border-radius:10px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;background:var(--night3);border:1px solid var(--border2);box-shadow:0 12px 40px rgba(0,0,0,0.4);z-index:9999;transform:translateX(calc(100% + 40px));transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);}
        .toast.show{transform:translateX(0);}
        .toast.success .ti{color:var(--green);}
        .toast.error .ti{color:var(--red);}
        .ti{font-size:15px;}

        /* Loader */
        .loader{display:none;position:fixed;inset:0;background:rgba(10,10,15,0.85);backdrop-filter:blur(4px);place-items:center;z-index:2000;}
        .loader.on{display:grid;}
        .spin{width:40px;height:40px;border:2.5px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div class="glow"></div>
<div class="toast" id="toast"><span class="ti" id="tIco"></span><span id="tTxt"></span></div>
<div class="loader" id="loader"><div class="spin"></div></div>

<div class="box">
    <div class="logo">
        <div class="logo-mark">🚚</div>
        <div class="logo-text">Coli<em>xo</em></div>
    </div>
    <div class="subtitle" id="loginSubtitle">Connexion uniquement avec le code fourni par Colixo</div>

    <div class="error-box" id="errorBox"></div>

    <div class="login-tabs" role="tablist">
        <button type="button" class="active" id="tabConnexion" role="tab" aria-selected="true">Connexion</button>
        <button type="button" id="tabInscription" role="tab" aria-selected="false">Demande d'accès</button>
    </div>

    <!-- ── CODE ── -->
    <form id="formCode">
        <div class="field">
            <label>Code d'accès</label>
            <div class="code-wrap">
                <input
                    type="text"
                    id="codeInput"
                    class="code-field is-masked"
                    placeholder="Code d'accès"
                    maxlength="8"
                    inputmode="text"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="characters"
                    spellcheck="false"
                    required>
                <input type="hidden" id="codeInputRaw" value="">
                <button type="button" class="toggle-code" id="toggleCode" aria-label="Afficher le code" aria-pressed="false" title="Afficher le code">👁</button>
            </div>
        </div>
        <div class="code-hint">
            3 lettres, tiret, 4 chiffres · Le code reste masqué pendant la saisie.
        </div>
        <button type="submit" class="btn-submit">
            <i class="fas fa-arrow-right"></i> Accéder à mon espace
        </button>
    </form>

    <!-- ── DEMANDE (pas de mot de passe — l'admin valide et vous envoie un code) ── -->
    <div id="panelRegister" class="panel-register" aria-hidden="true">
        <p class="reg-note">
            Remplissez le formulaire. <strong>Aucun mot de passe</strong> : notre équipe traite votre demande, définit votre rôle et vous communique votre <strong>code d'accès</strong> (format XXX-1234).
        </p>
        <form id="formRegister">
            <div class="field-row" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <div class="field"><label>Prénom *</label><input type="text" id="regPrenom" class="std-field" required autocomplete="given-name"></div>
                <div class="field"><label>Nom *</label><input type="text" id="regNom" class="std-field" required autocomplete="family-name"></div>
            </div>
            <div class="field"><label>Email *</label><input type="email" id="regEmail" class="std-field" required autocomplete="email"></div>
            <div class="field"><label>Téléphone</label><input type="tel" id="regTel" class="std-field" autocomplete="tel"></div>
            <div class="field"><label>Entreprise</label><input type="text" id="regEntreprise" class="std-field" placeholder="Nom de la société" autocomplete="organization"></div>
            <div class="field"><label>Adresse</label><input type="text" id="regAdresse" class="std-field" placeholder="Rue, NPA, ville" autocomplete="street-address"></div>
            <div class="field"><label>Message</label><textarea id="regMessage" class="std-field" rows="3" placeholder="Besoin particulier, volume, etc." style="min-height:72px;resize:vertical;"></textarea></div>
            <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Envoyer la demande</button>
        </form>
    </div>

</div>

<script>
(function () {
    'use strict';

    /* config.js est injecté dans le <head> : sans attendre l’événement « load », ce script
       s’exécutait avant la fin du chargement → SUPABASE_CONFIG encore absent (sans erreur console). */
    function colixoLoginApp() {

    if (!window.SUPABASE_CONFIG || !window.SUPABASE_CLIENT) {
        if (new URLSearchParams(location.search).get('logout') === '1') {
            try { localStorage.removeItem('colixo_user'); localStorage.removeItem('colixo_access_code'); } catch (e) {}
            try { sessionStorage.removeItem('colixo_user'); sessionStorage.removeItem('colixo_access_code'); } catch (e) {}
            try { document.cookie = "colixo_code=; max-age=0; path=/; SameSite=Strict"; } catch (e) {}
            var h0 = (typeof window.colixoHref === 'function') ? window.colixoHref('/index.html') : '../index.html';
            window.location.replace(h0);
        }
        var hint = '';
        if (window.SUPABASE_CONFIG && !window.SUPABASE_CLIENT) {
            hint = '<p style="margin-top:12px;font-size:14px;opacity:.9">' + (window.COLIXO_SUPABASE_INIT_ERROR || 'Initialisation du client Supabase impossible (réseau, bloqueur, SDK).') + '</p>';
        } else {
            hint = '<p>Le fichier <code>config.js</code> n’a pas pu être chargé (404 ou mauvais chemin). Vérifiez le déploiement à la racine ou sous-dossier, ou rechargez en forcé (Cmd+Shift+R).</p>';
        }
        document.body.innerHTML = '<div style="padding:40px;color:#e8311a;font-family:sans-serif;max-width:520px;"><h2>❌ config.js manquant</h2>' + hint + '</div>';
        return;
    }
    const db = window.SUPABASE_CLIENT;

    if (new URLSearchParams(location.search).get('switch') === '1') {
        (async function () {
            try { await db.auth.signOut(); } catch (e) {}
            try { localStorage.removeItem('colixo_user'); localStorage.removeItem('colixo_access_code'); } catch (e) {}
            try { sessionStorage.removeItem('colixo_user'); sessionStorage.removeItem('colixo_access_code'); } catch (e) {}
            try { document.cookie = "colixo_code=; max-age=0; path=/; SameSite=Strict"; } catch (e) {}
        })();
        return;
    }

    if (new URLSearchParams(location.search).get('logout') === '1') {
        (async function () {
            try { await db.auth.signOut(); } catch (e) {}
            try { localStorage.removeItem('colixo_user'); localStorage.removeItem('colixo_access_code'); } catch (e) {}
            try { sessionStorage.removeItem('colixo_user'); sessionStorage.removeItem('colixo_access_code'); } catch (e) {}
            try { document.cookie = "colixo_code=; max-age=0; path=/; SameSite=Strict"; } catch (e) {}
            var hOut = (typeof window.colixoHref === 'function') ? window.colixoHref('/index.html') : '../index.html';
            window.location.replace(hOut);
        })();
        return;
    }

    var _lsp = new URLSearchParams(location.search);
    if (_lsp.get('switch') !== '1' && _lsp.get('register') !== '1' && _lsp.get('fresh') !== '1') {
        (async function () {
            try {
                var auth = await window.colixoGetAuthContext({
                    roles: ['super_admin', 'admin', 'chauffeur', 'magasinier', 'client', 'gestionnaire', 'comptable', 'sous_utilisateur'],
                    legacyRoles: ['super_admin', 'admin', 'chauffeur', 'magasinier', 'client', 'gestionnaire', 'comptable', 'sous_utilisateur']
                });
                if (auth && auth.profile && auth.role) {
                    redirectByRole(auth.role);
                }
            } catch (e) {
                if (typeof window.colixoClearAuthStorage === 'function') window.colixoClearAuthStorage();
            }
        })();
    }

    function showLoginTab(which) {
        var isReg = which === 'register';
        document.getElementById('tabConnexion').classList.toggle('active', !isReg);
        document.getElementById('tabInscription').classList.toggle('active', isReg);
        document.getElementById('tabConnexion').setAttribute('aria-selected', !isReg);
        document.getElementById('tabInscription').setAttribute('aria-selected', isReg);
        document.getElementById('formCode').style.display = isReg ? 'none' : 'block';
        document.getElementById('panelRegister').classList.toggle('active', isReg);
        document.getElementById('panelRegister').setAttribute('aria-hidden', !isReg);
        document.getElementById('loginSubtitle').innerHTML = isReg
            ? 'Demande d\'accès — <strong>pas de mot de passe</strong>, uniquement un code après validation'
            : 'Connexion uniquement avec le code fourni par Colixo';
        clearError();
    }
    document.getElementById('tabConnexion').addEventListener('click', function () { showLoginTab('login'); });
    document.getElementById('tabInscription').addEventListener('click', function () { showLoginTab('register'); });
    if (new URLSearchParams(window.location.search).get('register') === '1') {
        showLoginTab('register');
    }

    /* ── Helpers UI ── */
    const toastEl  = document.getElementById('toast');
    const loaderEl = document.getElementById('loader');
    let tt;

    function toast(type, msg) {
        clearTimeout(tt);
        toastEl.className = 'toast ' + type + ' show';
        document.getElementById('tIco').textContent = type === 'success' ? '✓' : '✕';
        document.getElementById('tTxt').textContent = msg;
        tt = setTimeout(() => toastEl.classList.remove('show'), 5000);
    }
    const showLoad = () => loaderEl.classList.add('on');
    const hideLoad = () => loaderEl.classList.remove('on');

    function showError(msg) {
        const el = document.getElementById('errorBox');
        el.textContent = msg;
        el.style.display = 'block';
    }
    function clearError() {
        document.getElementById('errorBox').style.display = 'none';
    }

    function withTimeout(promise, ms, message) {
        let timer;
        const timeout = new Promise((_, reject) => {
            timer = setTimeout(() => reject(new Error(message)), ms);
        });
        return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
    }

    async function loginWithCodeDirect(code) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 15000);
        try {
            const res = await fetch(window.SUPABASE_CONFIG.url + '/rest/v1/rpc/login_with_code', {
                method: 'POST',
                cache: 'no-store',
                signal: ctrl.signal,
                headers: {
                    apikey: window.SUPABASE_CONFIG.anonKey,
                    Authorization: 'Bearer ' + window.SUPABASE_CONFIG.anonKey,
                    'Content-Type': 'application/json',
                    Accept: 'application/json'
                },
                body: JSON.stringify({ p_code: code })
            });
            const text = await res.text();
            let body = null;
            try { body = text ? JSON.parse(text) : null; } catch (e) { body = text; }
            if (!res.ok) {
                const msg = body && body.message ? body.message : (text || ('HTTP ' + res.status));
                throw new Error(msg);
            }
            return Array.isArray(body) ? (body[0] || null) : body;
        } catch (error) {
            if (error && error.name === 'AbortError') {
                throw new Error('Connexion trop longue: Supabase ne répond pas depuis ce navigateur.');
            }
            throw error;
        } finally {
            clearTimeout(timer);
        }
    }

    /* ── Formatage du code d'accès ── */
    const codeInput = document.getElementById('codeInput');
    const codeInputRaw = document.getElementById('codeInputRaw');
    const toggleCode = document.getElementById('toggleCode');

    function normalizeAccessCode(value) {
        return String(value || '').toUpperCase().replace(/[^A-Z0-9-]/g, '').slice(0, 8);
    }

    function isCodeVisible() {
        return !codeInput.classList.contains('is-masked');
    }

    function maskAccessCode(value) {
        return '•'.repeat(String(value || '').length);
    }

    function renderCodeInput() {
        const raw = codeInputRaw.value || '';
        codeInput.value = isCodeVisible() ? raw : maskAccessCode(raw);
    }

    function updateRawCode(nextValue) {
        codeInputRaw.value = normalizeAccessCode(nextValue);
        renderCodeInput();
        requestAnimationFrame(() => {
            const pos = codeInput.value.length;
            try { codeInput.setSelectionRange(pos, pos); } catch (e) {}
        });
    }

    codeInput.addEventListener('keydown', function (e) {
        const key = e.key;

        if (key === 'Tab' || key === 'Enter') return;

        if ((e.ctrlKey || e.metaKey) && ['a', 'c', 'x'].includes(key.toLowerCase())) return;

        if ((e.ctrlKey || e.metaKey) && key.toLowerCase() === 'v') {
            e.preventDefault();
            return;
        }

        if (key === 'Backspace') {
            e.preventDefault();
            updateRawCode((codeInputRaw.value || '').slice(0, -1));
            return;
        }

        if (key === 'Delete') {
            e.preventDefault();
            updateRawCode('');
            return;
        }

        if (key.startsWith('Arrow') || key === 'Home' || key === 'End') {
            e.preventDefault();
            requestAnimationFrame(() => {
                const pos = codeInput.value.length;
                try { codeInput.setSelectionRange(pos, pos); } catch (err) {}
            });
            return;
        }

        if (key.length === 1) {
            e.preventDefault();
            updateRawCode((codeInputRaw.value || '') + key);
        }
    });

    codeInput.addEventListener('paste', function (e) {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text') || '';
        updateRawCode((codeInputRaw.value || '') + pasted);
    });

    codeInput.addEventListener('focus', function () {
        renderCodeInput();
        requestAnimationFrame(() => {
            const pos = codeInput.value.length;
            try { codeInput.setSelectionRange(pos, pos); } catch (e) {}
        });
    });

    // Android WebView envoie keydown avec key="Unidentified" — on utilise input event à la place
    codeInput.addEventListener('input', function (e) {
        if (e.data && e.data.length === 1) {
            // Caractère tapé sur Android
            updateRawCode((codeInputRaw.value || '') + e.data);
        } else if (e.inputType === 'deleteContentBackward') {
            // Backspace sur Android
            updateRawCode((codeInputRaw.value || '').slice(0, -1));
        } else {
            renderCodeInput();
        }
    });

    toggleCode.addEventListener('click', function () {
        const isVisible = !codeInput.classList.contains('is-masked');
        codeInput.classList.toggle('is-masked', isVisible);
        this.setAttribute('aria-pressed', String(!isVisible));
        this.setAttribute('aria-label', isVisible ? 'Afficher le code' : 'Masquer le code');
        this.setAttribute('title', isVisible ? 'Afficher le code' : 'Masquer le code');
        this.textContent = isVisible ? '👁' : '🙈';
        renderCodeInput();
        codeInput.focus();
    });

    renderCodeInput();

    /* ── Redirection selon rôle ── */
    function bustHtml(path) {
        const u = new URL((typeof window.colixoHref === 'function') ? window.colixoHref(path) : path, window.location.origin);
        u.searchParams.set('_cb', Date.now());
        return u.pathname + u.search + u.hash;
    }

    function redirectByRole(role, user) {
        if (['client', 'gestionnaire', 'comptable', 'sous_utilisateur'].includes(role) &&
            user && !user.cgv_version_accepted) {
            window.location.href = bustHtml('/accept-cgv.html');
            return;
        }
        const routes = {
            super_admin: '/admin/dashboard.html',
            admin:       '/admin/dashboard.html',
            chauffeur:   '/admin/driver-app.html',
            magasinier:  '/magasinier/dashboard.html',
            client:      '/admin/client/portal.html',
            gestionnaire: '/admin/client/portal.html',
            comptable: '/admin/client/portal.html',
            sous_utilisateur: '/admin/client/portal.html'
        };
        const path = routes[role] || '/admin/client/portal.html';
        window.location.href = bustHtml(path);
    }

    /* Ne pas auto-rediriger depuis localStorage :
       l'utilisateur peut vouloir changer de compte depuis l'écran de connexion
       (ex. quitter le portail client puis se connecter en super admin). */

    /* ── DEMANDE D'ACCÈS (table demandes_inscription — exécuter demandes_inscription.sql dans Supabase) ── */
    document.getElementById('formRegister').addEventListener('submit', async function (e) {
        e.preventDefault();
        clearError();
        var prenom = document.getElementById('regPrenom').value.trim();
        var nom = document.getElementById('regNom').value.trim();
        var email = document.getElementById('regEmail').value.trim();
        if (!prenom || !nom || !email) {
            showError('❌ Prénom, nom et email sont requis.');
            return;
        }
        showLoad();
        try {
            var payload = {
                prenom: prenom,
                nom: nom,
                email: email,
                telephone: document.getElementById('regTel').value.trim() || null,
                entreprise_nom: document.getElementById('regEntreprise').value.trim() || null,
                adresse: document.getElementById('regAdresse').value.trim() || null,
                message: document.getElementById('regMessage').value.trim() || null
            };
            var ins = await db.from('demandes_inscription').insert([payload]);
            if (ins.error) throw ins.error;
            toast('success', "Demande enregistree. L'acces au tableau de bord n'est possible qu'avec un code : vous le recevrez apres validation par l'equipe.");
            document.getElementById('formRegister').reset();
            showLoginTab('login');
        } catch (err) {
            var msg = (err && err.message) ? err.message : String(err);
            if (msg.indexOf('relation') !== -1 && msg.indexOf('does not exist') !== -1) {
                showError('❌ Table non créée : exécutez le fichier SQL demandes_inscription.sql dans Supabase.');
            } else {
                showError('❌ ' + msg);
            }
        } finally {
            hideLoad();
        }
    });

    /* ── CONNEXION PAR CODE ── */
    document.getElementById('formCode').addEventListener('submit', async function (e) {
        e.preventDefault();
        clearError();

        const code = normalizeAccessCode(codeInputRaw.value || codeInput.value);
        var okStandard = /^[A-Z]{3}-\d{4}$/.test(code);
        var okLegacy = /^[A-Z]{2,4}-[A-Z0-9]{4,10}$/.test(code);
        if (!code || (!okStandard && !okLegacy)) {
            showError('❌ Format attendu : trois lettres, tiret, quatre chiffres (ex. CLT-7290). Les anciens codes restent acceptés.');
            return;
        }

        showLoad();
        try {
            if (typeof window.colixoClearAuthStorage === 'function') window.colixoClearAuthStorage();
            let user = null;
            try {
                user = await loginWithCodeDirect(code);
            } catch (directError) {
                console.warn('[Colixo] login direct échoué, fallback RPC Supabase', directError);
                const { data, error } = await withTimeout(
                    db.rpc('login_with_code', { p_code: code }),
                    15000,
                    'Connexion trop longue. Supabase ne répond pas depuis ce navigateur.'
                );
                if (error) throw error;
                user = Array.isArray(data) ? (data[0] || null) : (data || null);
            }
            if (!user) {
                hideLoad();
                showError('❌ Code introuvable. Vérifiez votre code.');
                return;
            }

            if (user.actif === false) {
                hideLoad();
                showError('❌ Compte désactivé. Contactez votre administrateur.');
                return;
            }

            /* Stocker le profil : localStorage + sessionStorage + cookie (30j, Edge efface localStorage entre sessions) */
            var _profileData = JSON.stringify({
                id:           user.id,
                role:         user.role,
                nom:          user.nom,
                prenom:       user.prenom,
                email:        user.email,
                telephone:    user.telephone || user.tel || user.phone,
                code:         user.code_usr || user.code || user.code_acces || user.code_connexion || code,
                entreprise_id: user.entreprise_id
            });
            try { localStorage.setItem('colixo_user', _profileData); } catch (e) {}
            try { sessionStorage.setItem('colixo_user', _profileData); } catch (e) {}
            try { localStorage.setItem('colixo_access_code', code); } catch (e) {}
            try { sessionStorage.setItem('colixo_access_code', code); } catch (e) {}
            try { document.cookie = "colixo_code=" + encodeURIComponent(code) + "; max-age=2592000; path=/; SameSite=Strict"; } catch (e) {}

            toast('success', 'Bienvenue ! Redirection en cours…');
            hideLoad();
            redirectByRole(user.role, user);

        } catch (err) {
            hideLoad();
            showError('❌ Erreur : ' + (err && err.message ? err.message : String(err)));
        }
    });

    }

    if (document.readyState === 'complete') {
        colixoLoginApp();
    } else {
        window.addEventListener('load', colixoLoginApp);
    }
})();
</script>
</body>
</html>
