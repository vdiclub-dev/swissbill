<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script>
    (function(){try{
      var u=new URL(location.href);
      if(u.searchParams.has('cx')){
        u.searchParams.delete('cx');
        history.replaceState(null,'',u.pathname+u.search+u.hash);
        return;
      }
      if(sessionStorage.getItem('cx_html')==='1')return;
      sessionStorage.setItem('cx_html','1');
      u.searchParams.set('cx',Date.now());
      location.replace(u.toString());
    }catch(e){}})();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Commandes Clients | Colixo Dispatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script data-cfasync="false" src="config.js?v=20260425"></script>
    <style>
        :root{
            --red:#e8311a;--red-dark:#c0280f;
            --night:#0a0a0f;--night2:#111118;--night3:#18181f;--surface:#1e1e28;
            --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
            --white:#ffffff;--muted:rgba(255,255,255,0.38);--muted2:rgba(255,255,255,0.6);
            --green:#22c55e;--blue:#3b82f6;--yellow:#f59e0b;--orange:#f97316;--purple:#a855f7;
            --sidebar:220px;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;}
        body{font-family:'Outfit',sans-serif;background:var(--night);color:var(--white);display:flex;}

        .sidebar{width:var(--sidebar);flex-shrink:0;background:var(--night2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;}
        .sb-logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;text-decoration:none;}
        .sb-mark{width:34px;height:34px;background:var(--red);border-radius:9px;display:grid;place-items:center;font-size:15px;}
        .sb-text{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:1px;color:var(--white);}
        .sb-text em{color:var(--red);font-style:normal;}
        .nav-sec{padding:14px 12px 5px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
        .nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin:2px 8px;font-size:13px;font-weight:500;color:var(--muted2);text-decoration:none;transition:all 0.2s;border:1px solid transparent;}
        .nav-item i{width:16px;text-align:center;font-size:14px;}
        .nav-item:hover{background:var(--night3);color:var(--white);}
        .nav-item.active{background:rgba(232,49,26,0.1);color:var(--white);border-color:rgba(232,49,26,0.2);}
        .nav-item.active i{color:var(--red);}
        .nav-badge{background:var(--red);color:var(--white);font-size:10px;font-weight:700;padding:1px 7px;border-radius:100px;margin-left:auto;}
        .sb-footer{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border);}
        .user-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--night3);}
        .user-av{width:30px;height:30px;background:var(--red);border-radius:8px;display:grid;place-items:center;font-family:'Bebas Neue',cursive;font-size:13px;flex-shrink:0;}
        .user-name{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .btn-logout{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;}

        .main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
        .topbar{background:var(--night2);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
        .page-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px;}

        .tabs{display:flex;border-bottom:1px solid var(--border);padding:0 32px;background:var(--night2);}
        .tab{padding:14px 20px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;display:flex;align-items:center;gap:7px;}
        .tab.active{color:var(--white);border-bottom-color:var(--red);}
        .tab-badge{background:var(--red);color:var(--white);font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px;}

        .content{padding:28px 32px;flex:1;overflow-y:auto;}
        .tab-pane{display:none;}
        .tab-pane.active{display:block;}

        .btn{font-family:'Outfit',sans-serif;font-weight:600;font-size:13px;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;white-space:nowrap;}
        .btn-red{background:var(--red);color:var(--white);}
        .btn-red:hover{background:var(--red-dark);}
        .btn-green{background:var(--green);color:var(--night);font-weight:700;}
        .btn-green:hover{filter:brightness(1.1);}
        .btn-ghost{background:transparent;color:var(--muted2);border:1px solid var(--border2);}
        .btn-ghost:hover{color:var(--white);}
        .btn-blue{background:var(--blue);color:var(--white);}
        .btn-sm{padding:5px 12px;font-size:12px;border-radius:7px;}

        /* ORDER CARDS */
        .order-card{background:var(--night2);border:1.5px solid var(--border2);border-radius:16px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;transition:all 0.2s;}
        .order-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
        .order-card.pending_validation::before{background:var(--yellow);}
        .order-card.accepted::before{background:var(--blue);}
        .order-card.refused::before{background:var(--red);}
        .order-card.dispatched::before{background:var(--green);}
        .oc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;}
        .oc-left{flex:1;}
        .oc-num{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1px;}
        .oc-client{font-size:13px;color:var(--muted2);margin-top:2px;}
        .oc-date{font-size:11px;color:var(--muted);margin-top:2px;}
        .oc-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:100px;flex-shrink:0;}
        .badge-pv{background:rgba(245,158,11,0.12);color:var(--yellow);border:1px solid rgba(245,158,11,0.25);}
        .badge-ok{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
        .badge-no{background:rgba(232,49,26,0.12);color:var(--red);border:1px solid rgba(232,49,26,0.25);}
        .badge-ds{background:rgba(59,130,246,0.12);color:var(--blue);border:1px solid rgba(59,130,246,0.25);}

        .oc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
        .oc-field{background:var(--night3);border-radius:10px;padding:10px 12px;}
        .oc-field-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
        .oc-field-val{font-size:13px;color:var(--muted2);line-height:1.4;}
        .oc-field-val strong{color:var(--white);}

        .oc-actions{display:flex;gap:8px;flex-wrap:wrap;}

        /* Modal */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);z-index:500;align-items:center;justify-content:center;padding:20px;}
        .modal.open{display:flex;}
        .modal-box{background:var(--night3);border:1px solid var(--border2);border-radius:22px;padding:32px;width:100%;max-width:480px;box-shadow:0 40px 100px rgba(0,0,0,0.6);animation:boxIn 0.3s cubic-bezier(0.4,0,0.2,1);max-height:90vh;overflow-y:auto;}
        @keyframes boxIn{from{opacity:0;transform:scale(0.94) translateY(14px)}to{opacity:1;transform:none}}
        .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
        .modal-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px;}
        .modal-close{width:30px;height:30px;background:var(--surface);border:none;border-radius:50%;cursor:pointer;display:grid;place-items:center;font-size:13px;color:var(--muted);}
        .field{margin-bottom:12px;}
        .field label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
        .field input,.field select,.field textarea{width:100%;padding:10px 12px;background:var(--surface);border:1.5px solid var(--border2);border-radius:9px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--white);}
        .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--red);}
        .field select option{background:var(--night3);}
        .modal-actions{display:flex;gap:10px;margin-top:18px;}
        .modal-actions .btn{flex:1;justify-content:center;padding:12px;}

        /* QR Modal */
        .qr-wrap{display:flex;justify-content:center;margin:20px 0;background:white;border-radius:12px;padding:16px;}
        .pdf-info{background:var(--surface);border-radius:12px;padding:16px;margin-bottom:16px;font-size:13px;line-height:1.8;}

        /* TOAST */
        .toast{position:fixed;top:18px;right:18px;padding:12px 18px;border-radius:10px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;background:var(--night3);border:1px solid var(--border2);box-shadow:0 12px 40px rgba(0,0,0,0.4);z-index:9999;transform:translateX(calc(100% + 40px));transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);}
        .toast.show{transform:translateX(0);}
        .toast.success .ti{color:var(--green);}
        .toast.error   .ti{color:var(--red);}
        .toast.info    .ti{color:var(--blue);}
        .ti{font-size:14px;}

        .loader{display:none;position:fixed;inset:0;background:rgba(10,10,15,0.85);backdrop-filter:blur(4px);place-items:center;z-index:2000;flex-direction:column;gap:12px;}
        .loader.on{display:grid;}
        .spin{width:40px;height:40px;border:2.5px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;}
        .loader-txt{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;color:var(--muted2);}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty{padding:60px 20px;text-align:center;}
        .empty-ico{font-size:36px;opacity:0.12;margin-bottom:12px;}
        .empty-txt{font-size:14px;color:var(--muted);}
    </style>
</head>
<body>

<div class="toast" id="toast"><span class="ti" id="tIco"></span><span id="tTxt"></span></div>
<div class="loader" id="loader"><div class="spin"></div><div class="loader-txt" id="loaderTxt">Chargement…</div></div>

<!-- MAIN -->
<div class="main">
    <header class="topbar">
        <div class="page-title">COMMANDES CLIENTS</div>
        <div style="display:flex;gap:10px;">
            <button class="btn btn-ghost" onclick="loadAll()"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active" data-tab="validation">
            <i class="fas fa-clock"></i> À valider
            <span class="tab-badge" id="badgeValidation">0</span>
        </div>
        <div class="tab" data-tab="accepted"><i class="fas fa-check"></i> Acceptées</div>
        <div class="tab" data-tab="dispatched"><i class="fas fa-truck"></i> En dispatch</div>
        <div class="tab" data-tab="refused"><i class="fas fa-times"></i> Refusées</div>
        <div class="tab" data-tab="all"><i class="fas fa-list"></i> Toutes</div>

        <div class="tab-pane active" id="pane-validation"></div>
        <div class="tab-pane" id="pane-accepted"></div>

        <div class="tab-pane" id="pane-refused"></div>
        <div class="tab-pane" id="pane-all"></div>
    </div>
</div>

<!-- MODAL REFUS -->
<div id="modalRefus" class="modal">
    <div class="modal-box">
        <div class="modal-head">
            <div class="modal-title">REFUSER LA COMMANDE</div>
            <button class="modal-close" onclick="closeModal('modalRefus')">✕</button>
        </div>
        <input type="hidden" id="refusOrderId">
        <div class="field">
            <label>Motif du refus *</label>
            <textarea id="refusNote" rows="3" placeholder="Ex: Zone non desservie, poids trop élevé…" style="resize:none;"></textarea>

</div>

<!-- MODAL PDF -->
<div id="modalPDF" class="modal">
    <div class="modal-box">
        <div class="modal-head">
            <div class="modal-title">BON DE LIVRAISON</div>
            <button class="modal-close" onclick="closeModal('modalPDF')">✕</button>
        </div>
        <div class="qr-wrap"><div id="qrCode"></div></div>
        <div class="pdf-info" id="pdfInfo"></div>
        <div class="modal-actions">
            <button class="btn btn-green" onclick="printBon()"><i class="fas fa-print"></i> Imprimer</button>
            <button class="btn btn-ghost" onclick="closeModal('modalPDF')">Fermer</button>
        </div>
    </div>

<script>
(function() {
    'use strict';
    if(!window.SUPABASE_CONFIG){ document.body.innerHTML='<div style="padding:40px;color:red;">❌ config.js manquant</div>'; return; }
    const db = window.SUPABASE_CLIENT;

    // Timestamp heure locale suisse (évite décalage UTC)
    function nowCH() {
        const d = new Date();
        const off = -d.getTimezoneOffset();
        const sign = off >= 0 ? '+' : '-';
        const hh = String(Math.floor(Math.abs(off)/60)).padStart(2,'0');
        const mm = String(Math.abs(off)%60).padStart(2,'0');
        const local = new Date(d.getTime() - d.getTimezoneOffset()*60000);
        return local.toISOString().slice(0,-1) + sign + hh + ':' + mm;
    }

    let allOrders=[], entreprises=[];

    /* ── Helpers ── */
    const toastEl=document.getElementById('toast');
    let tt;
    function toast(type,msg){ clearTimeout(tt); toastEl.className='toast '+type+' show'; document.getElementById('tIco').textContent=type==='success'?'✓':type==='error'?'✕':'ℹ'; document.getElementById('tTxt').textContent=msg; tt=setTimeout(()=>toastEl.classList.remove('show'),4000); }
    const loaderEl=document.getElementById('loader');
    function showLoad(t='Chargement…'){ document.getElementById('loaderTxt').textContent=t; loaderEl.classList.add('on'); }
    function hideLoad(){ loaderEl.classList.remove('on'); }
    function openModal(id){ const m=document.getElementById(id); if(m){m.style.display='flex';m.classList.add('open');} }
    window.closeModal=id=>{ const m=document.getElementById(id); if(m){m.style.display='none';m.classList.remove('open');} };
    document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) window.closeModal(m.id); }));
    const shortAddr=a=>a?a.split(',').slice(0,2).join(',').trim():'—';

    /* ── TABS ── */
    document.querySelectorAll('.tab').forEach(t=>{
        t.addEventListener('click',()=>{
            document.querySelectorAll('.tab,.tab-pane').forEach(x=>x.classList.remove('active'));
            t.classList.add('active');
            document.getElementById('pane-'+t.dataset.tab)?.classList.add('active');
            renderAll();
        });
    });

    /* ── LOAD ── */
    window.loadAll = async function() {
        showLoad();
        const [{data:orders},{data:ents}] = await Promise.all([
            db.from('transport_orders_simple').select('*')
                .not('admin_status','is',null)
                .order('created_at',{ascending:false}),
            db.from('entreprises').select('id,nom')
        ]);
        allOrders  = orders||[];
        entreprises= ents||[];

        const pending=allOrders.filter(o=>o.admin_status==='pending_validation').length;
        document.getElementById('badgeValidation').textContent=pending;
        document.getElementById('navBadge').textContent=pending;

        renderAll();
        hideLoad();
    };

    function renderAll(){
        const activeTab=document.querySelector('.tab.active')?.dataset.tab||'validation';
        const filters={
            validation: o=>o.admin_status==='pending_validation',
            accepted:   o=>o.admin_status==='accepted',
            dispatched: o=>['planned','in_transit','delivered'].includes(o.status)&&o.admin_status==='accepted',
            refused:    o=>o.admin_status==='refused',
            all:        ()=>true
        };
        const list=allOrders.filter(filters[activeTab]||filters.all);
        document.getElementById('pane-'+activeTab).innerHTML=list.length
            ? list.map(o=>renderCard(o)).join('')
            : `<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Aucune commande dans cette catégorie</div></div>`;
    }

    function renderCard(o) {
        const ent=entreprises.find(e=>e.id===o.entreprise_id);
        const ast=o.admin_status||'pending_validation';
        const astLabel={pending_validation:'⏳ En attente',accepted:'✅ Acceptée',refused:'❌ Refusée'}[ast]||ast;
        const astClass={pending_validation:'badge-pv',accepted:'badge-ok',refused:'badge-no'}[ast]||'badge-ds';

        return `<div class="order-card ${ast}">
            <div class="oc-header">
                <div class="oc-left">
                    <div class="oc-num">${o.order_number||o.id.slice(0,8)}</div>
                    <div class="oc-client"><i class="fas fa-building" style="color:var(--blue)"></i> ${ent?.nom||'Client inconnu'}</div>
                    <div class="oc-date">${new Date(o.created_at).toLocaleString('fr-CH')}</div>
                </div>
                <span class="oc-badge ${astClass}">${astLabel}</span>
            </div>

            <div class="oc-grid">
                <div class="oc-field">
                    <div class="oc-field-lbl">📍 Enlèvement</div>
                    <div class="oc-field-val">${o.pickup_address||'—'}</div>
                </div>
                <div class="oc-field">
                    <div class="oc-field-lbl">🏁 Livraison</div>
                    <div class="oc-field-val"><strong>${o.delivery_address||'—'}</strong></div>
                </div>
                <div class="oc-field">
                    <div class="oc-field-lbl">👤 Destinataire</div>
                    <div class="oc-field-val"><strong>${o.destinataire_nom||'—'}</strong>${o.destinataire_tel?`<br>${o.destinataire_tel}`:''}</div>
                </div>
                <div class="oc-field">
                    <div class="oc-field-lbl">📦 Colis</div>
                    <div class="oc-field-val"><strong>${o.quantity||1}×</strong> ${o.weight||0}kg · ${o.package_type||'colis'}<br><span style="color:var(--orange)">⚡ ${o.service_type||'normal'} ${o.night_delivery?'🌙':''}</span></div>
                </div>
                ${o.instructions?`<div class="oc-field" style="grid-column:1/-1;">
                    <div class="oc-field-lbl">📋 Instructions</div>
                    <div class="oc-field-val">${o.instructions}</div>
                </div>`:''}
                ${o.admin_note?`<div class="oc-field" style="grid-column:1/-1;border:1px solid rgba(232,49,26,0.2);">
                    <div class="oc-field-lbl" style="color:var(--red)">Motif refus</div>
                    <div class="oc-field-val">${o.admin_note}</div>
                </div>`:''}
            </div>

            <div class="oc-actions">
                ${ast==='pending_validation'?`
                    <button class="btn btn-green" onclick="acceptOrder('${o.id}')"><i class="fas fa-check"></i> Accepter</button>
                    <button class="btn btn-red"   onclick="openRefus('${o.id}')"><i class="fas fa-times"></i> Refuser</button>
                `:''}
                ${ast==='accepted'?`
                    <button class="btn btn-blue" onclick="sendToDispatch('${o.id}')"><i class="fas fa-map"></i> Envoyer au dispatch</button>
                `:''}
                <button class="btn btn-ghost btn-sm" onclick="openPDF('${o.id}')"><i class="fas fa-file-pdf"></i> Bon de livraison</button>
                <button class="btn btn-ghost btn-sm" onclick="openPDFqr('${o.id}')"><i class="fas fa-qrcode"></i> QR Code</button>
            </div>
        </div>`;
    }

    /* ── ACTIONS ── */
    window.acceptOrder = async function(id) {
        showLoad('Validation…');
        try {
            await db.from('transport_orders_simple').update({
                admin_status: 'accepted',
                validated_at: nowCH(),
                status: 'pending'
            }).eq('id',id);

            // Notifier le client via notifications
            const{data:o}=await db.from('transport_orders_simple').select('*,entreprise:entreprises(*)').eq('id',id).single();
            // Trouver le compte client lié à cette entreprise
            const{data:users}=await db.from('utilisateurs').select('id').eq('entreprise_id',o.entreprise_id).eq('role','client');
            for(const u of users||[]){
                await db.from('notifications').insert([{
                    user_id: u.id,
                    title: `✅ Commande ${o.order_number} acceptée`,
                    body: `Votre expédition vers ${o.delivery_address?.split(',')[0]||'—'} a été validée. Un chauffeur vous sera assigné sous peu.`,
                    read: false
                }]);
            }

            toast('success','Commande acceptée ✓ — client notifié');
            await loadAll();
        } catch(e){ toast('error',e.message); }
        finally{ hideLoad(); }
    };

    window.openRefus=function(id){
        document.getElementById('refusOrderId').value=id;
        document.getElementById('refusNote').value='';
        openModal('modalRefus');
    };

    window.confirmRefus = async function() {
        const id  =document.getElementById('refusOrderId').value;
        const note=document.getElementById('refusNote').value.trim();
        if(!note){ toast('error','Motif obligatoire'); return; }
        showLoad('Refus…');
        try {
            await db.from('transport_orders_simple').update({
                admin_status: 'refused',
                admin_note:   note,
                status:       'refused'
            }).eq('id',id);

            // Notifier le client
            const{data:o}=await db.from('transport_orders_simple').select('*').eq('id',id).single();
            const{data:users}=await db.from('utilisateurs').select('id').eq('entreprise_id',o.entreprise_id).eq('role','client');
            for(const u of users||[]){
                await db.from('notifications').insert([{
                    user_id: u.id,
                    title: `❌ Commande ${o.order_number} refusée`,
                    body: note,
                    read: false
                }]);
            }

            toast('info','Commande refusée — client notifié');
            window.closeModal('modalRefus');
            await loadAll();
        } catch(e){ toast('error',e.message); }
        finally{ hideLoad(); }
    };

    window.sendToDispatch = async function(id) {
        window.location.href = `dispatch.html?highlight=${id}`;
    };

    /* ── PDF ── */
    window.openPDF = window.openPDFqr = async function(id) {
        showLoad();
        const{data:o}=await db.from('transport_orders_simple').select('*').eq('id',id).single();
        const ent=entreprises.find(e=>e.id===o.entreprise_id);
        hideLoad();

        document.getElementById('qrCode').innerHTML='';
        new QRCode(document.getElementById('qrCode'),{
            text:JSON.stringify({id:o.id,num:o.order_number,poids:o.weight,dest:o.destinataire_nom}),
            width:160,height:160,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M
        });

        document.getElementById('pdfInfo').innerHTML=`
            <div style="font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1px;margin-bottom:10px;">${o.order_number}</div>
            <div style="display:grid;gap:5px;font-size:13px;">
                <div><b>Client :</b> ${ent?.nom||'—'}</div>
                <div><b>Départ :</b> ${o.pickup_address||'—'}</div>
                <div><b>Livraison :</b> ${o.delivery_address||'—'}</div>
                <div><b>Destinataire :</b> ${o.destinataire_nom||'—'} ${o.destinataire_tel?'· '+o.destinataire_tel:''}</div>
                <div><b>Colis :</b> ${o.quantity||1}× ${o.weight||0}kg (${o.package_type||'colis'})</div>
                <div><b>Service :</b> ${o.service_type||'normal'} ${o.night_delivery?'🌙 Nuit':''}</div>
                <div><b>Statut :</b> ${o.admin_status||'—'}</div>
                ${o.instructions?`<div><b>Instructions :</b> ${o.instructions}</div>`:''}
            </div>`;
        openModal('modalPDF');
    };

    window.printBon = function() {
        const qr  =document.getElementById('qrCode').innerHTML;
        const info=document.getElementById('pdfInfo').innerHTML;
        const w=window.open('','_blank','width=700,height=900');
        w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Bon de livraison</title>
        <style>
            body{font-family:Arial,sans-serif;padding:30px;color:#000;max-width:600px;margin:0 auto;}
            .header{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #e8311a;padding-bottom:16px;margin-bottom:20px;}
            h1{font-size:22px;color:#e8311a;margin:0;}
            .company{font-size:12px;color:#666;}
            .qr{display:flex;justify-content:center;margin:20px 0;border:1px solid #eee;border-radius:8px;padding:12px;}
            .info{font-size:14px;line-height:1.8;border:1px solid #eee;border-radius:8px;padding:16px;}
            .info b{color:#000;}
            .footer{margin-top:24px;font-size:11px;color:#999;text-align:center;border-top:1px solid #eee;padding-top:10px;}
            .sign{margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:30px;}
            .sign-box{border:1px solid #ccc;border-radius:4px;padding:12px;min-height:60px;}
            .sign-lbl{font-size:11px;color:#666;margin-bottom:4px;}
        </style></head><body>
        <div class="header">
            <div><h1>🚚 BON DE LIVRAISON</h1><div class="company">Colixo · www.colixo.ch</div></div>
            <div style="font-size:12px;color:#666;">${new Date().toLocaleDateString('fr-CH')}</div>
        </div>
        <div class="qr">${qr}</div>
        <div class="info">${info}</div>
        <div class="sign">
            <div class="sign-box"><div class="sign-lbl">Signature expéditeur</div></div>
            <div class="sign-box"><div class="sign-lbl">Signature destinataire</div></div>
        </div>
        <div class="footer">Colixo SA · info@colixo.ch · +41 XX XXX XX XX</div>
        </body></html>`);
        w.document.close();
        w.print();
    };

    /* ── AUTH ── */
    async function init() {
        const{data:{session}}=await db.auth.getSession();
        if(!session){window.location.href='index.html';return;}
        const{data:user}=await db.from('utilisateurs').select('*').eq('id',session.user.id).single();
        if(user){
            document.getElementById('sbAv').textContent=((user.prenom?.[0]||'')+(user.nom?.[0]||'')).toUpperCase()||'SA';
            document.getElementById('sbName').textContent=[user.prenom,user.nom].filter(Boolean).join(' ')||'Admin';
        }
        document.getElementById('btnLogout').addEventListener('click',async()=>{await db.auth.signOut();window.location.href='index.html';});

        // Realtime
        db.channel('commandes_client')
            .on('postgres_changes',{event:'INSERT',schema:'public',table:'transport_orders_simple'},payload=>{
                if(payload.new.admin_status==='pending_validation'){
                    toast('info',`📦 Nouvelle commande : ${payload.new.order_number||'—'}`);
                    loadAll();
                }
            }).subscribe();

        await loadAll();
    }

    init();
})();
</script>
</body>
</html>
