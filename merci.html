<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merci — Colixo</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #141414;
      --line: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #c9c9c9;
      --accent: #ff6a00;
      --accent-2: #ff8a33;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
    }

    a { text-decoration: none; color: inherit; }

    .side {
      position: fixed;
      right: 0;
      top: 0;
      width: 20px;
      height: 100vh;
      background: linear-gradient(180deg, var(--accent), #ff7d1f);
      box-shadow: -8px 0 30px rgba(255,106,0,.25);
    }

    .wrap {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 18px 50px rgba(0,0,0,.28);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 22px;
      position: relative;
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,106,0,.18), transparent 65%);
      filter: blur(20px);
      z-index: -1;
    }

    .badge {
      display: inline-flex;
      min-height: 30px;
      align-items: center;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,106,0,.12);
      border: 1px solid rgba(255,106,0,.2);
      color: #ffc79b;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .center { text-align: center; }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(40px, 6vw, 68px);
      line-height: .95;
      letter-spacing: -.045em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 1.05rem;
    }

    .accent { color: var(--accent); }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 26px;
    }

    .info {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
    }

    .info strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1.05rem;
      color: var(--text);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .btn, .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 22px;
      border-radius: 999px;
      font-weight: 800;
      transition: .2s;
    }

    .btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #111;
