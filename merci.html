<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci — Colixo</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0a0a0a;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      text-align:center;
      padding:20px;
    }
    .box{
      max-width:700px;
      background:#141414;
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:40px 30px;
    }
    h1{
      margin:0 0 16px;
      font-size:48px;
    }
    p{
      color:#ccc;
      line-height:1.6;
    }
    .accent{
      color:#ff6a00;
    }
    .btn{
      display:inline-block;
      margin-top:24px;
      padding:14px 22px;
      border-radius:999px;
      background:#ff6a00;
      color:#111;
      font-weight:bold;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Merci <span class="accent">!</span></h1>
    <p>Votre demande a bien été envoyée.<br>Colixo reviendra vers vous rapidement.</p>
    <a class="btn" href="https://www.colixo.ch">Retour au site</a>
  </div>
</body>
</html>
