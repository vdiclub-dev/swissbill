<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Mon espace client</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: #f1f5f9;
            min-height: 100vh;
        }
        
        /* HEADER */
        .header {
            background: #0f172a;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e53935;
        }
        
        .logo {
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo i {
            color: #e53935;
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-badge {
            background: #1e293b;
            padding: 8px 16px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-badge i {
            color: #facc15;
        }
        
        .btn-logout {
            background: #e53935;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-logout:hover {
            background: #c62828;
        }
        
        /* CONTAINER */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        /* WELCOME CARD */
        .welcome-card {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .welcome-text h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .client-number {
            background: #e53935;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
        }
        
        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #e2e8f0;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            background: #fee2e2;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e53935;
            font-size: 24px;
        }
        
        .stat-info h3 {
            font-size: 24px;
            margin-bottom: 4px;
        }
        
        .stat-info p {
            color: #64748b;
            font-size: 14px;
        }
        
        /* QUICK ACTIONS */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .action-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }
        
        .action-card:hover {
            border-color: #e53935;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(229,57,53,0.2);
        }
        
        .action-card i {
            font-size: 40px;
            color: #e53935;
            margin-bottom: 15px;
        }
        
        .action-card h3 {
            margin-bottom: 10px;
        }
        
        .action-card p {
            color: #64748b;
            font-size: 14px;
        }
        
        /* TRANSPORTS LIST */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .transport-list {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        
        .transport-header {
            display: grid;
            grid-template-columns: 80px 120px 1fr 1fr 100px;
            padding: 15px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
        }
        
        .transport-item {
            display: grid;
            grid-template-columns: 80px 120px 1fr 1fr 100px;
            padding: 15px 20px;
            border-bottom: 1px solid #e2e8f0;
            align-items: center;
        }
        
        .transport-item:hover {
            background: #f8fafc;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
        }
        
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-transit { background: #dbeafe; color: #1e40af; }
        .status-delivered { background: #dcfce7; color: #166534; }
        .status-urgent { background: #fee2e2; color: #991b1b; }
        
        /* NEW TRANSPORT FORM */
        .new-transport-form {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid #e2e8f0;
            display: none;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #475569;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
        }
        
        .btn {
            background: #e53935;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn-secondary {
            background: #64748b;
        }
        
        /* MAP */
        .map-section {
            margin-top: 30px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 20px;
        }
        
        #client-map {
            height: 250px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        /* NOTIFICATION */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 15px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* UNAUTHORIZED */
        .unauthorized {
            text-align: center;
            padding: 50px;
            max-width: 500px;
            margin: 100px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .unauthorized i {
            font-size: 60px;
            color: #e53935;
            margin-bottom: 20px;
        }
        
        .unauthorized h2 {
            margin-bottom: 10px;
        }
        
        .unauthorized p {
            color: #64748b;
            margin-bottom: 30px;
        }
        
        .loader {
            text-align: center;
            padding: 30px;
            color: #64748b;
        }
        
        .loader i {
            font-size: 30px;
            color: #e53935;
            animation: spin 1s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../dispatch/config.js"></script>

    <script>
        // ===== VÉRIFICATION CONFIG =====
        if (!window.SUPABASE_CONFIG) {
            document.body.innerHTML = '<div class="unauthorized"><i class="fas fa-exclamation-triangle"></i><h2>Erreur</h2><p>Fichier de configuration manquant</p></div>';
            throw new Error("Configuration manquante");
        }
        
        const supabase = window.supabase.createClient(
            window.SUPABASE_CONFIG.url,
            window.SUPABASE_CONFIG.key
        );
        
        // ===== VÉRIFICATION AUTHENTIFICATION =====
        (function() {
            const user = localStorage.getItem('user');
            
            if (!user) {
                document.body.innerHTML = `
                    <div class="unauthorized">
                        <i class="fas fa-lock"></i>
                        <h2>Accès non autorisé</h2>
                        <p>Vous devez être connecté en tant que client.</p>
                        <button class="btn" onclick="window.location.href='../login/'">Se connecter</button>
                    </div>
                `;
                return;
            }
            
            const userData = JSON.parse(user);
            
            if (!userData.loggedIn || userData.role !== 'client') {
                document.body.innerHTML = `
                    <div class="unauthorized">
                        <i class="fas fa-shield-alt"></i>
                        <h2>Accès restreint</h2>
                        <p>Cette page est réservée aux clients.</p>
                        <button class="btn" onclick="window.location.href='../'">Accueil</button>
                    </div>
                `;
                return;
            }
            
            // Afficher le dashboard
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div class="logo">
                        <i class="fas fa-truck"></i> Léman-Courses
                    </div>
                    <div class="user-section">
                        <div class="user-badge">
                            <i class="fas fa-user"></i>
                            <span>${userData.username}</span>
                        </div>
                        <button class="btn-logout" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Déconnexion
                        </button>
                    </div>
                </div>
                
                <div class="container">
                    <!-- WELCOME CARD -->
                    <div class="welcome-card">
                        <div class="welcome-text">
                            <h1>Bonjour ${userData.username}</h1>
                            <p>Bienvenue dans votre espace client</p>
                        </div>
                        <div class="client-number">${userData.username}</div>
                    </div>
                    
                    <!-- STATS -->
                    <div class="stats-grid" id="statsGrid">
                        <div class="loader"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
                    </div>
                    
                    <!-- QUICK ACTIONS -->
                    <div class="quick-actions">
                        <div class="action-card" onclick="showNewTransportForm()">
                            <i class="fas fa-plus-circle"></i>
                            <h3>Nouveau transport</h3>
                            <p>Créer une demande en 30 secondes</p>
                        </div>
                        <div class="action-card" onclick="showTracking()">
                            <i class="fas fa-map-marked-alt"></i>
                            <h3>Suivre mes colis</h3>
                            <p>Visualisez vos transports en direct</p>
                        </div>
                        <div class="action-card" onclick="showHistory()">
                            <i class="fas fa-history"></i>
                            <h3>Historique</h3>
                            <p>Consultez vos anciens transports</p>
                        </div>
                    </div>
                    
                    <!-- NOUVEAU TRANSPORT FORM -->
                    <div class="new-transport-form" id="newTransportForm">
                        <h3 style="margin-bottom:20px;">📦 Nouveau transport</h3>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Ville de ramassage</label>
                                <input type="text" id="pickupCity" placeholder="Lausanne">
                            </div>
                            <div class="form-group">
                                <label>Ville de livraison</label>
                                <input type="text" id="deliveryCity" placeholder="Genève">
                            </div>
                            <div class="form-group">
                                <label>Poids (kg)</label>
                                <input type="number" id="weight" value="1" step="0.1">
                            </div>
                            <div class="form-group">
                                <label>Type</label>
                                <select id="type">
                                    <option value="Colis">Colis</option>
                                    <option value="Fragile">Fragile</option>
                                    <option value="Palette">Palette</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Instructions</label>
                            <textarea id="instructions" rows="2" placeholder="Fragile, code d'accès..."></textarea>
                        </div>
                        
                        <div style="display:flex; gap:10px;">
                            <button class="btn" onclick="createTransport()">Créer la demande</button>
                            <button class="btn btn-secondary" onclick="hideNewTransportForm()">Annuler</button>
                        </div>
                    </div>
                    
                    <!-- TRANSPORTS RÉCENTS -->
                    <div class="section-header">
                        <h2>📋 Transports récents</h2>
                    </div>
                    
                    <div class="transport-list">
                        <div class="transport-header">
                            <div>N°</div>
                            <div>Date</div>
                            <div>Départ</div>
                            <div>Arrivée</div>
                            <div>Statut</div>
                        </div>
                        <div id="transportsList" class="loader">
                            <i class="fas fa-spinner fa-spin"></i> Chargement...
                        </div>
                    </div>
                    
                    <!-- MAP SECTION -->
                    <div class="map-section">
                        <h3>🗺️ Suivi en direct</h3>
                        <div id="client-map"></div>
                    </div>
                </div>
                
                <div id="notification" class="notification"></div>
            `;
            
            startApp();
        })();
        
        function logout() {
            localStorage.removeItem('user');
            window.location.href = '../login/';
        }
        
        async function startApp() {
            const user = JSON.parse(localStorage.getItem('user'));
            
            try {
                // Récupérer le client_id à partir du username
                const { data: clientData, error: clientError } = await supabase
                    .from('clients')
                    .select('id, client_number')
                    .eq('client_number', user.username)
                    .single();
                
                if (clientError) throw clientError;
                
                // Charger les transports de ce client
                const { data: transports, error } = await supabase
                    .from('transport_orders')
                    .select('*')
                    .eq('client_number', user.username)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                // Mettre à jour les stats
                updateStats(transports);
                
                // Afficher les transports
                updateTransportsList(transports);
                
                // Initialiser la carte
                initMap(transports);
                
            } catch (error) {
                console.error('Erreur chargement:', error);
                document.getElementById('statsGrid').innerHTML = '<div style="color:red; padding:20px;">Erreur de chargement</div>';
            }
        }
        
        function updateStats(transports) {
            const total = transports.length;
            const enCours = transports.filter(t => t.status === 'transit' || t.status === 'prepared').length;
            const livres = transports.filter(t => t.status === 'delivered').length;
            const urgents = transports.filter(t => t.priority === 'urgent' || t.speed === '6h').length;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-box"></i></div>
                    <div class="stat-info"><h3>${total}</h3><p>Transports total</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-info"><h3>${enCours}</h3><p>En cours</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info"><h3>${livres}</h3><p>Livrés</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="stat-info"><h3>${urgents}</h3><p>Urgents</p></div>
                </div>
            `;
        }
        
        function updateTransportsList(transports) {
            if (!transports || transports.length === 0) {
                document.getElementById('transportsList').innerHTML = '<div style="text-align:center; padding:20px;">Aucun transport</div>';
                return;
            }
            
            let html = '';
            transports.slice(0, 5).forEach(t => {
                let statusClass = 'status-pending';
                let statusText = 'En attente';
                
                if (t.status === 'transit' || t.status === 'prepared') { statusClass = 'status-transit'; statusText = 'En transit'; }
                if (t.status === 'delivered') { statusClass = 'status-delivered'; statusText = 'Livré'; }
                if (t.priority === 'urgent' || t.speed === '6h') { statusClass = 'status-urgent'; statusText = 'Urgent'; }
                
                const date = t.created_at ? new Date(t.created_at).toLocaleDateString('fr-CH') : 'Date inconnue';
                
                html += `
                    <div class="transport-item">
                        <div><strong>${t.order_number || 'N/A'}</strong></div>
                        <div>${date}</div>
                        <div>${t.pickup_city || '?'}</div>
                        <div>${t.delivery_city || '?'}</div>
                        <div><span class="status-badge ${statusClass}">${statusText}</span></div>
                    </div>
                `;
            });
            
            document.getElementById('transportsList').innerHTML = html;
        }
        
        function initMap(transports) {
            const map = L.map('client-map').setView([46.8, 8.2], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            // Filtrer les transports en cours pour la carte
            const enCours = transports.filter(t => t.status !== 'delivered');
            
            enCours.forEach(t => {
                if (t.delivery_city) {
                    let lat = 46.8, lng = 8.2;
                    
                    // Coordonnées approximatives (à remplacer par du vrai géocodage)
                    if (t.delivery_city.toLowerCase().includes('lausanne')) { lat = 46.52; lng = 6.63; }
                    if (t.delivery_city.toLowerCase().includes('geneve')) { lat = 46.20; lng = 6.14; }
                    
                    let color = '#3b82f6';
                    if (t.priority === 'urgent') color = '#ef4444';
                    
                    L.circleMarker([lat, lng], {
                        radius: 8,
                        fillColor: color,
                        color: '#fff',
                        weight: 2,
                        fillOpacity: 0.8
                    }).addTo(map).bindPopup(`${t.pickup_city} → ${t.delivery_city}`);
                }
            });
        }
        
        function showNewTransportForm() {
            document.getElementById('newTransportForm').style.display = 'block';
        }
        
        function hideNewTransportForm() {
            document.getElementById('newTransportForm').style.display = 'none';
        }
        
        async function createTransport() {
            const user = JSON.parse(localStorage.getItem('user'));
            const pickup = document.getElementById('pickupCity').value;
            const delivery = document.getElementById('deliveryCity').value;
            
            if (!pickup || !delivery) {
                alert('Veuillez remplir les villes');
                return;
            }
            
            const newTransport = {
                order_number: 'TR-' + new Date().getFullYear() + '-' + String(Math.floor(Math.random() * 1000000)).padStart(6, '0'),
                client_number: user.username,
                pickup_city: pickup,
                delivery_city: delivery,
                weight: parseFloat(document.getElementById('weight').value) || 1,
                parcel_type: document.getElementById('type').value,
                instructions: document.getElementById('instructions').value,
                status: 'pending',
                priority: 'normal',
                created_at: new Date()
            };
            
            try {
                const { error } = await supabase
                    .from('transport_orders')
                    .insert([newTransport]);
                
                if (error) throw error;
                
                showNotification('✅ Demande de transport envoyée');
                hideNewTransportForm();
                
                // Recharger les données
                startApp();
                
            } catch (error) {
                console.error('Erreur:', error);
                alert('❌ Erreur: ' + error.message);
            }
        }
        
        function showTracking() {
            alert('Suivi en direct - Fonctionnalité à venir');
        }
        
        function showHistory() {
            alert('Historique complet - Fonctionnalité à venir');
        }
        
        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.style.display = 'block';
            setTimeout(() => { notif.style.display = 'none'; }, 3000);
        }
    </script>
    
</body>
</html>
