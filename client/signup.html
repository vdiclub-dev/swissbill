<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Créer un compte client</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .signup-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo i {
            font-size: 48px;
            color: #e53935;
            background: #fee2e2;
            padding: 15px;
            border-radius: 50%;
        }
        
        .logo h1 {
            margin-top: 15px;
            color: #0f172a;
        }
        
        .logo p {
            color: #64748b;
            margin-top: 5px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0f172a;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .checkbox-group input {
            width: auto;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn:hover {
            background: #c62828;
        }
        
        .btn-secondary {
            background: white;
            color: #e53935;
            border: 2px solid #e53935;
        }
        
        .btn-secondary:hover {
            background: #fee2e2;
        }
        
        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .login-link a {
            color: #e53935;
            text-decoration: none;
            font-weight: 600;
        }
        
        .info-note {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-note i {
            font-size: 20px;
        }
        
        .required::after {
            content: " *";
            color: #e53935;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #e53935;
        }
        
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="logo">
        <i class="fas fa-truck"></i>
        <h1>Créer un compte client</h1>
        <p>Rejoignez Léman-Courses pour gérer vos transports</p>
    </div>
    
    <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
    </div>
    
    <form onsubmit="event.preventDefault(); createAccount();">
        <div class="form-grid">
            <div class="form-group">
                <label class="required">Civilité</label>
                <select id="civility">
                    <option value="M.">M.</option>
                    <option value="Mme">Mme</option>
                    <option value="Société">Société</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="required">Nom / Raison sociale</label>
                <input type="text" id="name" placeholder="Dupont Jean / SA Dupont" required>
            </div>
            
            <div class="form-group">
                <label class="required">Email</label>
                <input type="email" id="email" placeholder="contact@exemple.ch" required>
            </div>
            
            <div class="form-group">
                <label class="required">Téléphone</label>
                <input type="tel" id="phone" placeholder="079 123 45 67" required>
            </div>
            
            <div class="form-group full-width">
                <label class="required">Adresse</label>
                <input type="text" id="address" placeholder="Rue du Simplon 12" required>
            </div>
            
            <div class="form-group">
                <label class="required">NPA</label>
                <input type="text" id="npa" placeholder="1000" required>
            </div>
            
            <div class="form-group">
                <label class="required">Ville</label>
                <input type="text" id="city" placeholder="Lausanne" required>
            </div>
            
            <div class="form-group">
                <label class="required">Numéro client souhaité</label>
                <input type="text" id="clientNumber" placeholder="CL2025-001" value="CL2025-" required>
            </div>
            
            <div class="form-group">
                <label class="required">Code d'accès (4 chiffres)</label>
                <input type="password" id="password" placeholder="1234" maxlength="4" pattern="[0-9]{4}" required>
            </div>
            
            <div class="form-group">
                <label class="required">Confirmer le code</label>
                <input type="password" id="confirmPassword" placeholder="1234" maxlength="4" pattern="[0-9]{4}" required>
            </div>
            
            <div class="form-group full-width">
                <label>Instructions de livraison (optionnel)</label>
                <textarea id="deliveryInstructions" rows="2" placeholder="Code d'accès, horaires préférés..."></textarea>
            </div>
        </div>
        
        <div class="info-note">
            <i class="fas fa-info-circle"></i>
            <div>
                <strong>Votre numéro client vous servira d'identifiant unique.</strong><br>
                Tous vos transports seront associés à ce numéro.
            </div>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="terms" required>
            <label for="terms">J'accepte les <a href="#" style="color:#e53935;">conditions générales</a> de service</label>
        </div>
        
        <button type="submit" class="btn">
            <i class="fas fa-user-plus"></i> Créer mon compte
        </button>
        
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button type="button" class="btn btn-secondary" style="flex:1;" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i> Retour
            </button>
            <button type="button" class="btn btn-secondary" style="flex:1;" onclick="fillDemoData()">
                <i class="fas fa-flask"></i> Remplir démo
            </button>
        </div>
        
        <div class="login-link">
            Déjà un compte ? <a href="index.html">Connectez-vous ici</a>
        </div>
    </form>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../dispatch/config.js"></script>

<script>
    // ===== INITIALISATION SUPABASE =====
    if (!window.SUPABASE_CONFIG) {
        document.body.innerHTML = '<div style="color:red; padding:20px;">❌ Erreur: config.js non trouvé</div>';
        throw new Error("Configuration manquante");
    }
    
    const supabase = window.supabase.createClient(
        window.SUPABASE_CONFIG.url,
        window.SUPABASE_CONFIG.key
    );
    
    console.log("✅ Supabase prêt pour inscription");
    
    // ===== FONCTIONS =====
    function fillDemoData() {
        document.getElementById('civility').value = 'M.';
        document.getElementById('name').value = 'Dupont Jean';
        document.getElementById('email').value = 'jean.dupont@email.ch';
        document.getElementById('phone').value = '079 123 45 67';
        document.getElementById('address').value = 'Rue du Simplon 12';
        document.getElementById('npa').value = '1000';
        document.getElementById('city').value = 'Lausanne';
        document.getElementById('clientNumber').value = 'CL2025-' + Math.floor(Math.random() * 1000);
        document.getElementById('password').value = '1234';
        document.getElementById('confirmPassword').value = '1234';
    }
    
    function showError(message) {
        document.getElementById('errorText').textContent = message;
        document.getElementById('errorMessage').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('errorMessage').style.display = 'none';
        }, 5000);
    }
    
    async function createAccount() {
        const clientNumber = document.getElementById('clientNumber').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const terms = document.getElementById('terms').checked;
        
        // Cacher les erreurs précédentes
        document.getElementById('errorMessage').style.display = 'none';
        
        // Validations
        if (!terms) {
            showError('Veuillez accepter les conditions générales');
            return;
        }
        
        if (password !== confirmPassword) {
            showError('Les codes d\'accès ne correspondent pas');
            return;
        }
        
        if (password.length !== 4 || isNaN(password)) {
            showError('Le code doit être composé de 4 chiffres');
            return;
        }
        
        try {
            // 1. Vérifier si le nom d'utilisateur existe déjà
            const { data: existingUser, error: checkError } = await supabase
                .from('users')
                .select('username')
                .eq('username', clientNumber);
            
            if (checkError) throw checkError;
            
            if (existingUser && existingUser.length > 0) {
                showError('Ce numéro client est déjà utilisé');
                return;
            }
            
            // 2. Créer dans users
            const { data: userData, error: userError } = await supabase
                .from('users')
                .insert([{
                    username: clientNumber,
                    password: password,
                    role: 'client'
                }])
                .select();
            
            if (userError) throw userError;
            
            // 3. Créer dans clients
            const { error: clientError } = await supabase
                .from('clients')
                .insert([{
                    user_id: userData[0].id,
                    client_number: clientNumber,
                    company_name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    npa: document.getElementById('npa').value,
                    city: document.getElementById('city').value,
                    default_pickup_address: 'Impasse des Griottes 3, 1462 Yvonand'
                }]);
            
            if (clientError) throw clientError;
            
            alert('✅ Compte créé avec succès ! Vous pouvez maintenant vous connecter.');
            window.location.href = 'index.html';
            
        } catch (error) {
            console.error('Erreur création:', error);
            showError('Erreur: ' + error.message);
        }
    }
</script>

</body>
</html>
