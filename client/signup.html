<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Créer un compte client</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .signup-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo i {
            font-size: 48px;
            color: #e53935;
            background: #fee2e2;
            padding: 15px;
            border-radius: 50%;
        }
        
        .logo h1 {
            margin-top: 15px;
            color: #0f172a;
        }
        
        .logo p {
            color: #64748b;
            margin-top: 5px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0f172a;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .checkbox-group input {
            width: auto;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn:hover {
            background: #c62828;
        }
        
        .btn-secondary {
            background: white;
            color: #e53935;
            border: 2px solid #e53935;
        }
        
        .btn-secondary:hover {
            background: #fee2e2;
        }
        
        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .login-link a {
            color: #e53935;
            text-decoration: none;
            font-weight: 600;
        }
        
        .info-note {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-note i {
            font-size: 20px;
        }
        
        .required::after {
            content: " *";
            color: #e53935;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #e53935;
        }
        
        .success-message {
            background: #10b981;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="logo">
        <i class="fas fa-truck"></i>
        <h1>Créer un compte client</h1>
        <p>Rejoignez Léman-Courses pour gérer vos transports</p>
    </div>
    
    <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
    </div>
    
    <div id="successMessage" class="success-message">
        <i class="fas fa-check-circle"></i>
        <span id="successText"></span>
    </div>
    
    <form onsubmit="event.preventDefault(); createAccount();">
        <div class="form-grid">
            <div class="form-group full-width">
                <label class="required">Nom de l'entreprise / Raison sociale</label>
                <input type="text" id="company_name" placeholder="SA Dupont, Jean Dupont" required>
            </div>
            
            <div class="form-group">
                <label class="required">Personne de contact</label>
                <input type="text" id="contact_name" placeholder="Jean Dupont" required>
            </div>
            
            <div class="form-group">
                <label class="required">Email</label>
                <input type="email" id="email" placeholder="contact@exemple.ch" required>
            </div>
            
            <div class="form-group">
                <label class="required">Téléphone</label>
                <input type="tel" id="phone" placeholder="079 123 45 67" required>
            </div>
            
            <div class="form-group full-width">
                <label class="required">Adresse</label>
                <input type="text" id="address" placeholder="Rue du Simplon 12" required>
            </div>
            
            <div class="form-group">
                <label class="required">NPA</label>
                <input type="text" id="npa" placeholder="1000" required>
            </div>
            
            <div class="form-group">
                <label class="required">Ville</label>
                <input type="text" id="city" placeholder="Lausanne" required>
            </div>
            
            <div class="form-group">
                <label class="required">Numéro client souhaité</label>
                <input type="text" id="client_number" placeholder="CL2025-001" value="CL2025-" required>
            </div>
            
            <div class="form-group">
                <label class="required">Mot de passe (min 6 caractères)</label>
                <input type="password" id="password" placeholder="••••••••" minlength="6" required>
            </div>
            
            <div class="form-group">
                <label class="required">Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" minlength="6" required>
            </div>
            
            <div class="form-group full-width">
                <label>Adresse d'enlèvement par défaut</label>
                <textarea id="default_pickup_address" rows="2" placeholder="Impasse des Griottes 3, 1462 Yvonand">Impasse des Griottes 3, 1462 Yvonand</textarea>
                <small style="color:#64748b;">L'adresse où nos chauffeurs viendront chercher les colis</small>
            </div>
        </div>
        
        <div class="info-note">
            <i class="fas fa-info-circle"></i>
            <div>
                <strong>Votre numéro client vous servira d'identifiant unique.</strong><br>
                Tous vos transports seront associés à ce numéro.
            </div>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="terms" required>
            <label for="terms">J'accepte les <a href="#" style="color:#e53935;">conditions générales</a> de service</label>
        </div>
        
        <button type="submit" class="btn" id="submitBtn">
            <i class="fas fa-user-plus"></i> Créer mon compte
        </button>
        
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button type="button" class="btn btn-secondary" style="flex:1;" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i> Retour
            </button>
            <button type="button" class="btn btn-secondary" style="flex:1;" onclick="fillDemoData()">
                <i class="fas fa-flask"></i> Remplir démo
            </button>
        </div>
        
        <div class="login-link">
            Déjà un compte ? <a href="index.html">Connectez-vous ici</a>
        </div>
    </form>
</div>



<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../dispatch/config.js"></script>

<script>
    // ===== INITIALISATION SUPABASE =====
    if (!window.SUPABASE_CONFIG) {
        document.body.innerHTML = '<div style="color:red; padding:20px;">❌ Erreur: config.js non trouvé</div>';
        throw new Error("Configuration manquante");
    }
    
    const supabaseClient = window.supabase.createClient(
        window.SUPABASE_CONFIG.url,
        window.SUPABASE_CONFIG.key
    );
    
    console.log("✅ Supabase client prêt pour inscription");
    
    // Variable pour tracker la dernière tentative
    let lastAttemptTime = 0;
    
    window.fillDemoData = function() {
        document.getElementById('company_name').value = 'Dupont SA';
        document.getElementById('contact_name').value = 'Jean Dupont';
        document.getElementById('email').value = 'jean.dupont' + Math.floor(Math.random() * 1000) + '@email.ch';
        document.getElementById('phone').value = '079 123 45 67';
        document.getElementById('address').value = 'Rue du Simplon 12';
        document.getElementById('npa').value = '1000';
        document.getElementById('city').value = 'Lausanne';
        document.getElementById('client_number').value = 'CL2025-' + Math.floor(Math.random() * 1000);
        document.getElementById('password').value = 'password123';
        document.getElementById('confirmPassword').value = 'password123';
        document.getElementById('default_pickup_address').value = 'Impasse des Griottes 3, 1462 Yvonand';
    };
    
    function showError(message) {
        document.getElementById('errorText').textContent = message;
        document.getElementById('errorMessage').style.display = 'flex';
        document.getElementById('successMessage').style.display = 'none';
    }
    
    function showSuccess(message) {
        document.getElementById('successText').textContent = message;
        document.getElementById('successMessage').style.display = 'flex';
        document.getElementById('errorMessage').style.display = 'none';
    }
    
    window.createAccount = async function() {
        const submitBtn = document.getElementById('submitBtn');
        const clientNumber = document.getElementById('client_number').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const terms = document.getElementById('terms').checked;
        const email = document.getElementById('email').value.trim();
        
        // Cacher les erreurs précédentes
        document.getElementById('errorMessage').style.display = 'none';
        
        // Validations
        if (!terms) {
            showError('Veuillez accepter les conditions générales');
            return;
        }
        
        if (password !== confirmPassword) {
            showError('Les mots de passe ne correspondent pas');
            return;
        }
        
        if (password.length < 6) {
            showError('Le mot de passe doit contenir au moins 6 caractères');
            return;
        }
        
        // Vérifier le rate limiting
        const now = Date.now();
        if (now - lastAttemptTime < 30000) { // 30 secondes minimum entre les tentatives
            const waitTime = Math.ceil((30000 - (now - lastAttemptTime)) / 1000);
            showError(`Veuillez attendre ${waitTime} secondes avant de réessayer`);
            return;
        }
        
        try {
            // Désactiver le bouton
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Création en cours...';
            
            // 1. Vérifier si le numéro client existe déjà
            const { data: existingClient } = await supabaseClient
                .from('clients')
                .select('client_number')
                .eq('client_number', clientNumber)
                .maybeSingle();
            
            if (existingClient) {
                showError('Ce numéro client est déjà utilisé');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Créer mon compte';
                return;
            }
            
            // 2. Vérifier si l'email existe déjà
            const { data: existingEmail } = await supabaseClient
                .from('clients')
                .select('email')
                .eq('email', email)
                .maybeSingle();
            
            if (existingEmail) {
                showError('Cet email est déjà utilisé');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Créer mon compte';
                return;
            }
            
            // 3. Créer l'utilisateur dans Auth avec un délai
            lastAttemptTime = Date.now();
            
            const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        client_number: clientNumber,
                        company_name: document.getElementById('company_name').value,
                        contact_name: document.getElementById('contact_name').value
                    }
                }
            });
            
            if (authError) {
                if (authError.message.includes('rate limit')) {
                    showError('Trop de tentatives. Veuillez attendre 5-10 minutes avant de réessayer.');
                    lastAttemptTime = now - 25000; // Réduire le temps d'attente pour la prochaine fois
                } else if (authError.message.includes('already registered')) {
                    showError('Cet email est déjà utilisé');
                } else {
                    throw authError;
                }
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Créer mon compte';
                return;
            }
            
            if (!authData || !authData.user) {
                throw new Error("Erreur lors de la création de l'utilisateur");
            }
            
            console.log("✅ Utilisateur Auth créé:", authData.user.id);
            
            // 4. Attendre un peu que l'utilisateur soit bien créé
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // 5. Insérer dans la table clients
            const clientData = {
                id: authData.user.id,
                client_number: clientNumber,
                company_name: document.getElementById('company_name').value,
                contact_name: document.getElementById('contact_name').value,
                email: email,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                npa: document.getElementById('npa').value,
                city: document.getElementById('city').value,
                default_pickup_address: document.getElementById('default_pickup_address').value || 'Impasse des Griottes 3, 1462 Yvonand'
            };
            
            const { error: clientError } = await supabaseClient
                .from('clients')
                .insert([clientData]);
            
            if (clientError) {
                console.error('❌ Erreur insertion client:', clientError);
                
                // Si erreur, on nettoie l'utilisateur Auth
                try {
                    await supabaseClient.auth.admin.deleteUser(authData.user.id);
                } catch (e) {
                    console.error("Impossible de nettoyer l'utilisateur:", e);
                }
                
                showError('Erreur: ' + (clientError.message || 'Erreur lors de la création du profil'));
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Créer mon compte';
                return;
            }
            
            console.log("✅ Client inséré avec succès");
            
            // Succès !
            showSuccess('✅ Compte créé avec succès ! Vérifiez votre email pour confirmer votre compte.');
            
            // Réactiver le bouton
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Créer mon compte';
            
            // Rediriger après 3 secondes
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 3000);
            
        } catch (error) {
            console.error('❌ Erreur création:', error);
            showError('Erreur: ' + (error.message || 'Erreur inconnue'));
            
            // Réactiver le bouton
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Créer mon compte';
        }
    };
</script>
</body>
</html>
