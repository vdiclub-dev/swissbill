<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Créer un compte client</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .signup-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo i {
            font-size: 48px;
            color: #e53935;
            background: #fee2e2;
            padding: 15px;
            border-radius: 50%;
        }
        
        .logo h1 {
            margin-top: 15px;
            color: #0f172a;
        }
        
        .logo p {
            color: #64748b;
            margin-top: 5px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #0f172a;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .checkbox-group input {
            width: auto;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn:hover {
            background: #c62828;
        }
        
        .btn-secondary {
            background: white;
            color: #e53935;
            border: 2px solid #e53935;
        }
        
        .btn-secondary:hover {
            background: #fee2e2;
        }
        
        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .login-link a {
            color: #e53935;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .info-note {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-note i {
            font-size: 20px;
        }
        
        .required::after {
            content: " *";
            color: #e53935;
        }
        
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="logo">
        <i class="fas fa-truck"></i>
        <h1>Créer un compte client</h1>
        <p>Rejoignez Léman-Courses pour gérer vos transports</p>
    </div>
    
    <form onsubmit="event.preventDefault(); createAccount();">
        <div class="form-grid">
            <!-- INFORMATIONS PERSONNELLES -->
            <div class="form-group">
                <label class="required">Civilité</label>
                <select id="civility">
                    <option value="M.">M.</option>
                    <option value="Mme">Mme</option>
                    <option value="Société">Société</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="required">Nom / Raison sociale</label>
                <input type="text" id="name" placeholder="Dupont Jean / SA Dupont" required>
            </div>
            
            <div class="form-group">
                <label class="required">Email</label>
                <input type="email" id="email" placeholder="contact@exemple.ch" required>
            </div>
            
            <div class="form-group">
                <label class="required">Téléphone</label>
                <input type="tel" id="phone" placeholder="079 123 45 67" required>
            </div>
            
            <!-- ADRESSE -->
            <div class="form-group full-width">
                <label class="required">Adresse</label>
                <input type="text" id="address" placeholder="Rue du Simplon 12" required>
            </div>
            
            <div class="form-group">
                <label class="required">NPA</label>
                <input type="text" id="npa" placeholder="1000" required>
            </div>
            
            <div class="form-group">
                <label class="required">Ville</label>
                <input type="text" id="city" placeholder="Lausanne" required>
            </div>
            
            <!-- IDENTIFIANTS DE CONNEXION -->
            <div class="form-group">
                <label class="required">Numéro client souhaité</label>
                <input type="text" id="clientNumber" placeholder="CL2025-XXX" value="CL2025-" required>
                <small style="color:#64748b;">6-12 caractères, lettres et chiffres</small>
            </div>
            
            <div class="form-group">
                <label class="required">Code d'accès (4 chiffres)</label>
                <input type="password" id="password" placeholder="1234" maxlength="4" pattern="[0-9]{4}" required>
            </div>
            
            <div class="form-group">
                <label class="required">Confirmer le code</label>
                <input type="password" id="confirmPassword" placeholder="1234" maxlength="4" pattern="[0-9]{4}" required>
            </div>
            
            <!-- INFORMATIONS COMPLÉMENTAIRES -->
            <div class="form-group full-width">
                <label>Instructions de livraison (optionnel)</label>
                <textarea id="deliveryInstructions" rows="2" placeholder="Code d'accès, horaires préférés..."></textarea>
            </div>
        </div>
        
        <!-- NOTICE D'INFORMATION -->
        <div class="info-note">
            <i class="fas fa-info-circle"></i>
            <div>
                <strong>Votre numéro client vous servira d'identifiant unique.</strong><br>
                Tous vos transports seront associés à ce numéro.
            </div>
        </div>
        
        <!-- CONDITIONS -->
        <div class="checkbox-group">
            <input type="checkbox" id="terms" required>
            <label for="terms">J'accepte les <a href="#" style="color:#e53935;">conditions générales</a> de service</label>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="newsletter">
            <label for="newsletter">Je souhaite recevoir des offres et actualités</label>
        </div>
        
        <!-- BOUTONS -->
        <button type="submit" class="btn">
            <i class="fas fa-user-plus"></i> Créer mon compte
        </button>
        
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button type="button" class="btn btn-secondary" style="flex:1;" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i> Retour
            </button>
            <button type="button" class="btn btn-secondary" style="flex:1;" onclick="fillDemoData()">
                <i class="fas fa-flask"></i> Remplir démo
            </button>
        </div>
        
        <div class="login-link">
            Déjà un compte ? <a href="index.html">Connectez-vous ici</a>
        </div>
    </form>
</div>

<script>
    // Fonction pour remplir les données de démonstration
    function fillDemoData() {
        document.getElementById('civility').value = 'M.';
        document.getElementById('name').value = 'Dupont Jean';
        document.getElementById('email').value = 'jean.dupont@email.ch';
        document.getElementById('phone').value = '079 123 45 67';
        document.getElementById('address').value = 'Rue du Simplon 12';
        document.getElementById('npa').value = '1000';
        document.getElementById('city').value = 'Lausanne';
        document.getElementById('clientNumber').value = 'CL2025-001';
        document.getElementById('password').value = '1234';
        document.getElementById('confirmPassword').value = '1234';
        document.getElementById('deliveryInstructions').value = 'Sonnette: Dupont, 2ème étage';
    }
    // Rediriger vers la connexion après inscription
alert(`✅ Compte créé ! Vous pouvez maintenant vous connecter.`);
window.location.href = 'index.html';
    // Fonction de création de compte
    function createAccount() {
        // Récupérer les valeurs
        const clientNumber = document.getElementById('clientNumber').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const terms = document.getElementById('terms').checked;
        
        // Validations
        if (!terms) {
            alert('Veuillez accepter les conditions générales');
            return;
        }
        
        if (password !== confirmPassword) {
            alert('Les codes d\'accès ne correspondent pas');
            return;
        }
        
        if (password.length !== 4 || isNaN(password)) {
            alert('Le code doit être composé de 4 chiffres');
            return;
        }
        
        // Simuler la création de compte
        const newClient = {
            clientNumber: clientNumber,
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value,
            npa: document.getElementById('npa').value,
            city: document.getElementById('city').value,
            password: password,
            deliveryInstructions: document.getElementById('deliveryInstructions').value,
            createdAt: new Date().toISOString()
        };
        
        console.log('✅ NOUVEAU CLIENT CRÉÉ:', newClient);
        
        // ICI, vous enverrez vers Supabase
        // await supabase.from('clients').insert([newClient]);
        
        alert(`✅ Compte créé avec succès !\n\nVotre numéro client: ${clientNumber}\n\nVous pouvez maintenant vous connecter.`);
        
        // Rediriger vers la page de connexion
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
