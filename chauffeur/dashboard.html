<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <title>Léman Driver</title>

  <!-- Polices et styles -->
  <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap)" rel="stylesheet">
  <link rel="stylesheet" href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css)">
  <link rel="stylesheet" href="[unpkg.com](https://unpkg.com/leaflet@1.9.4/dist/leaflet.css)">
  <script src="[unpkg.com](https://unpkg.com/leaflet@1.9.4/dist/leaflet.js)"></script>
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js)"></script>
  <script src="/push-manager.js"></script>

  <style>
    /* (Garde tout ton style identique) */
    body { font-family: 'Outfit', sans-serif; background: #0a0a0f; color: #fff; margin: 0; overflow: hidden; }
    /* ... ton style complet existant ici ... */
  </style>
</head>

<body>
  <!-- === UI existante === -->
  <div class="login-screen" id="screenLogin"> ... </div>
  <div class="home-screen" id="screenHome"> ... </div>
  <!-- etc... toutes tes sections inchangées -->

  <script type="module">
    import { supabase } from "/js/core/supabase-client.js";

    // Création d’un alias clair
    const db = supabase;

    // --- Initialisation conducteur ---
    let driver = null;

    window.doLogin = async function() {
      const email = document.getElementById("lEmail").value.trim();
      const pwd = document.getElementById("lPwd").value;
      if (!email || !pwd) return alert("Email et mot de passe requis");

      try {
        const { data, error } = await db.auth.signInWithPassword({
          email, password: pwd
        });
        if (error) throw error;

        // Charger infos utilisateur (table "utilisateurs")
        const { data: user } = await db.from("utilisateurs")
          .select("*")
          .eq("id", data.user.id)
          .single();

        if (!user || !["chauffeur", "admin", "super_admin"].includes(user.role)) {
          await db.auth.signOut();
          alert("Accès refusé — réservé aux chauffeurs");
          return;
        }

        driver = user;
        afterLogin();

      } catch (err) {
        alert("Erreur : " + err.message);
      }
    };

    async function afterLogin() {
      document.getElementById("screenLogin").style.display = "none";
      document.getElementById("screenHome").style.display = "block";
      document.getElementById("homeName").textContent = `${driver.prenom || ""} ${driver.nom || ""}` || "Chauffeur";
      loadMissions();
      startGPS();
    }

    // --- Chargement missions ---
    async function loadMissions() {
      const list = document.getElementById("missionsList");
      list.innerHTML = "Chargement...";
      const { data } = await db.from("transport_orders_simple")
        .select("*")
        .eq("driver_id", driver.id)
        .neq("status", "delivered")
        .order("created_at", { ascending: true });

      if (!data?.length) {
        list.innerHTML = `<div style="text-align:center;padding:30px;color:#888;">Aucune mission assignée</div>`;
        return;
      }

      list.innerHTML = data.map(o => `
        <div class="mission-card ${o.status || "pending"}">
          <div style="font-weight:bold;">${o.order_number || o.id.slice(0,8)}</div>
          <div style="font-size:13px;color:#ccc;">${o.delivery_address || "—"}</div>
          <button onclick="markDelivered('${o.id}')" style="margin-top:8px;background:#22c55e;border:none;padding:6px 10px;border-radius:8px;">Livré ✅</button>
        </div>
      `).join("");
    }

    // --- Confirmation livraison ---
    window.markDelivered = async function(id) {
      if (!confirm("Confirmer la livraison ?")) return;
      const now = new Date().toISOString();
      const { error } = await db.from("transport_orders_simple")
        .update({ status: "delivered", delivered_at: now })
        .eq("id", id);
      if (error) alert("Erreur : " + error.message);
      else {
        alert("Livraison confirmée !");
        loadMissions();
      }
    };

    // --- Géolocalisation ---
    function startGPS() {
      if (!navigator.geolocation) return;
      navigator.geolocation.watchPosition(pos => {
        console.log("📍 Position :", pos.coords.latitude, pos.coords.longitude);
      });
    }

    // --- Session existante ---
    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        const { data: user } = await db.from("utilisateurs").select("*").eq("id", session.user.id).single();
        if (user) { driver = user; afterLogin(); }
      }
    })();
  </script>
</body>
</html>
