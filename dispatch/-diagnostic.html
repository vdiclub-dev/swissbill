<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Diagnostic Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { background:#111; color:white; padding:20px; font-family:monospace; }
        .success { color:#10b981; }
        .error { color:#ef4444; }
        pre { background:#1f2937; padding:10px; border-radius:4px; overflow:auto; }
    </style>
</head>
<body>
    <h1>🔍 Diagnostic Supabase</h1>
    <div id="output"></div>

    <script>
        async function log(message, type = 'info') {
            const div = document.createElement('div');
            div.style.margin = '5px 0';
            div.style.padding = '5px';
            div.style.background = '#1f2937';
            div.style.borderRadius = '4px';
            
            if (type === 'success') div.style.color = '#10b981';
            else if (type === 'error') div.style.color = '#ef4444';
            else div.style.color = '#facc15';
            
            div.textContent = message;
            document.getElementById('output').appendChild(div);
        }

        (async function() {
            try {
                await log('🔵 Démarrage du diagnostic...');
                
                // Vérification config.js
                if (!window.SUPABASE_CONFIG) {
                    throw new Error('❌ window.SUPABASE_CONFIG non défini');
                }
                await log('✅ window.SUPABASE_CONFIG trouvé', 'success');
                
                // Création client
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                await log('✅ Client Supabase créé', 'success');
                
                // Test 1: Lister les tables
                await log('📋 Test 1: Récupération des tables...');
                const { data: tables, error: tablesError } = await supabase
                    .from('information_schema.tables')
                    .select('table_name')
                    .eq('table_schema', 'public');
                
                if (tablesError) {
                    await log(`⚠️ Impossible de lister les tables: ${tablesError.message}`, 'error');
                } else {
                    await log(`✅ Tables trouvées: ${tables.map(t => t.table_name).join(', ')}`, 'success');
                }
                
                // Test 2: Structure de transport_orders
                await log('📋 Test 2: Structure de transport_orders...');
                const { data: columns, error: columnsError } = await supabase
                    .rpc('get_table_info', { table_name: 'transport_orders' });
                
                if (columnsError) {
                    await log(`⚠️ Erreur structure: ${columnsError.message}`, 'error');
                    
                    // Alternative: essayer une requête simple
                    await log('🔄 Test alternatif: requête simple...');
                    const { data: simple, error: simpleError } = await supabase
                        .from('transport_orders')
                        .select('*')
                        .limit(1);
                    
                    if (simpleError) {
                        await log(`❌ Erreur: ${simpleError.message}`, 'error');
                        await log(`📝 Détails: ${JSON.stringify(simpleError, null, 2)}`, 'error');
                    } else {
                        await log(`✅ Requête réussie, ${simple?.length || 0} lignes`, 'success');
                    }
                }
                
                // Test 3: Insertion minimale
                await log('📋 Test 3: Insertion test...');
                const testData = {
                    order_number: 'TEST-' + Date.now(),
                    client_number: 'TEST001',
                    pickup_address: 'Test adresse',
                    delivery_address: 'Test livraison',
                    weight: 1,
                    quantity: 1,
                    status: 'pending',
                    created_at: new Date()
                };
                
                const { data: insert, error: insertError } = await supabase
                    .from('transport_orders')
                    .insert(testData);
                
                if (insertError) {
                    await log(`❌ Erreur insertion: ${insertError.message}`, 'error');
                    await log(`📝 Détails: ${JSON.stringify(insertError, null, 2)}`, 'error');
                } else {
                    await log('✅ Insertion réussie !', 'success');
                }
                
            } catch(e) {
                await log(`❌ Erreur fatale: ${e.message}`, 'error');
                console.error(e);
            }
        })();
    </script>
</body>
</html>
