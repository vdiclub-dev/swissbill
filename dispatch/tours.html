<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman Dispatch | Tournées</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <!-- Drag & Drop -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css">
    
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        header {
            background: #111; padding: 15px 25px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #facc15; height: 70px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-success { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .btn-pdf { background: #8b5cf6; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
        }
        
        /* PANEL GAUCHE - TOURNÉES */
        .tours-panel {
            width: 500px;  /* Plus large */
            background: #111;
            border-right: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .panel-header h2 {
            color: #facc15;
        }
        
        .tour-card {
            background: #1f2937;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
        }
        
        .tour-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .tour-title {
            font-weight: bold;
            color: #facc15;
            font-size: 16px;
        }
        
        .tour-stats {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        
        .tour-stat-item {
            text-align: center;
        }
        
        .tour-stat-value {
            font-weight: bold;
            color: #facc15;
            font-size: 16px;
        }
        
        .tour-stat-label {
            font-size: 11px;
            color: #aaa;
        }
        
        .tour-list {
            min-height: 50px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
            margin: 10px 0;
            background: #2a2a2a;
            border-radius: 4px;
        }
        
        .tour-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        
        .chauffeur-select {
            background: #111;
            color: white;
            border: 1px solid #2a2a2a;
            padding: 5px;
            border-radius: 4px;
            width: 100%;
            margin-top: 10px;
        }
        
        /* CARTE CENTRALE - MOINS LARGE */
        .map-container {
            width: 40%;  /* Réduit à 40% */
            min-width: 400px;
            position: relative;
        }
        #map { height: 100%; width: 100%; }
        
        /* PANEL DROIT - EN ATTENTE */
        .pending-panel {
            width: 30%;  /* Le reste */
            min-width: 300px;
            background: #111;
            border-left: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .pending-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .pending-header h2 {
            color: #facc15;
        }
        
        .pending-list {
            min-height: 200px;
            padding: 5px;
        }
        
        /* CARTES DE TRANSPORT */
        .transport-card {
            background: #1f2937;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: move;
            border-left: 3px solid #facc15;
            transition: 0.2s;
            position: relative;
        }
        
        .transport-card:hover {
            background: #2d3a4f;
        }
        
        .transport-card.urgent {
            border-left-color: #ef4444;
        }
        
        .transport-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .transport-expediteur {
            font-size: 12px;
            color: #9ca3af;
        }
        
        .transport-expediteur i {
            color: #facc15;
            margin-right: 4px;
        }
        
        .transport-destinataire {
            font-weight: bold;
            font-size: 15px;
            color: white;
        }
        
        .transport-adresse-complete {
            font-size: 12px;
            color: #facc15;
            margin: 5px 0;
        }
        
        .transport-npa-ville {
            font-size: 11px;
            color: #aaa;
        }
        
        .transport-address {
            font-size: 12px;
            color: #aaa;
            margin: 4px 0;
        }
        
        .transport-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 8px;
            padding-top: 5px;
            border-top: 1px solid #2a2a2a;
        }
        
        .remove-from-tour {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
            padding: 5px;
        }
        
        .btn-delete-transport {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 8px;
            width: 100%;
        }
        
        .drop-target {
            border: 2px dashed #facc15;
            background: #2d3a4f;
        }
        
        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }
        
        .loader {
            text-align: center; padding: 30px; color: #aaa;
        }
        .loader i { font-size: 30px; color: #facc15; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app">
        <div class="loader">
            <i class="fas fa-spinner fa-spin"></i>
            Chargement...
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Tournées...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let tours = [
                    { id: 1, nom: "Tournée Lausanne", couleur: '#3b82f6', chauffeur: null, transports: [] },
                    { id: 2, nom: "Tournée Genève", couleur: '#10b981', chauffeur: null, transports: [] },
                    { id: 3, nom: "Tournée Berne", couleur: '#f59e0b', chauffeur: null, transports: [] }
                ];
                let chauffeurs = [];
                let map;
                
                const depot = {
                    nom: "Dépôt Yverdon",
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== CHARGEMENT CHAUFFEURS =====
                async function loadChauffeurs() {
                    const { data } = await supabase
                        .from('chauffeurs')
                        .select('*')
                        .eq('actif', true);
                    
                    chauffeurs = data || [];
                }
                
                // ===== CALCUL DE DISTANCE =====
                function calculerDistance(lat1, lng1, lat2, lng2) {
                    if (!lat1 || !lng1 || !lat2 || !lng2) return 0;
                    const R = 6371;
                    const dLat = (lat2 - lat1) * Math.PI / 180;
                    const dLon = (lng2 - lng1) * Math.PI / 180;
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                             Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                             Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                }
                
                // ===== EXTRAIRE NPA ET VILLE =====
                function extraireNpaVille(adresse) {
                    if (!adresse) return { npa: '', ville: '' };
                    
                    // Format: Rue 12, 1000 Lausanne
                    const parts = adresse.split(',');
                    if (parts.length >= 2) {
                        const lastPart = parts[parts.length-1].trim();
                        const match = lastPart.match(/(\d{4})\s+(.+)/);
                        if (match) {
                            return { npa: match[1], ville: match[2] };
                        }
                    }
                    return { npa: '', ville: '' };
                }
                
                // ===== CALCUL STATS TOURNÉE =====
                function calculerStatsTournee(transports) {
                    if (!transports || transports.length === 0) {
                        return { distance: 0, duree: 0, poids: 0 };
                    }
                    
                    let distance = 0;
                    let duree = 0;
                    let poids = 0;
                    let precedent = depot;
                    
                    transports.forEach(t => {
                        if (t.lat && t.lng) {
                            const trajet = calculerDistance(precedent.lat, precedent.lng, t.lat, t.lng);
                            distance += trajet;
                            duree += (trajet / 50) * 60 + 15;
                            poids += t.weight || 1;
                            precedent = t;
                        }
                    });
                    
                    if (transports.length > 0 && transports[transports.length-1].lat) {
                        const dernier = transports[transports.length - 1];
                        const retour = calculerDistance(dernier.lat, dernier.lng, depot.lat, depot.lng);
                        distance += retour;
                        duree += (retour / 50) * 60;
                    }
                    
                    return { 
                        distance: Math.round(distance), 
                        duree: Math.round(duree),
                        poids: Math.round(poids)
                    };
                }
                
                // ===== GÉNÉRER PDF TOURNÉE =====
                window.genererPDF = function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (!tour || tour.transports.length === 0) return;
                    
                    const stats = calculerStatsTournee(tour.transports);
                    
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    
                    doc.setFontSize(20);
                    doc.setTextColor(250, 204, 21);
                    doc.text(`Tournée: ${tour.nom}`, 20, 20);
                    
                    doc.setFontSize(12);
                    doc.setTextColor(255, 255, 255);
                    doc.text(`Date: ${new Date().toLocaleDateString('fr-CH')}`, 20, 30);
                    doc.text(`Distance: ${stats.distance} km`, 20, 40);
                    doc.text(`Durée: ${Math.floor(stats.duree/60)}h${stats.duree%60}`, 20, 50);
                    doc.text(`Poids total: ${stats.poids} kg`, 20, 60);
                    
                    doc.text("Arrêts:", 20, 75);
                    
                    let y = 85;
                    tour.transports.forEach((t, i) => {
                        doc.setFontSize(10);
                        doc.text(`${i+1}. ${t.destinataire_nom || 'Client'}`, 25, y);
                        doc.text(`   ${t.delivery_address || ''}`, 25, y+5);
                        y += 15;
                    });
                    
                    doc.save(`tournee-${tour.nom}.pdf`);
                };
                
                // ===== CHARGEMENT =====
                async function loadData() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    await loadChauffeurs();
                    afficherPage();
                }
                
                // ===== AFFICHAGE =====
                function afficherPage() {
                    const transportsDansTournees = new Set();
                    tours.forEach(tour => {
                        tour.transports.forEach(t => transportsDansTournees.add(t.id));
                    });
                    
                    const enAttente = allTransports.filter(t => 
                        t.status !== 'delivered' && !transportsDansTournees.has(t.id)
                    );
                    
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Léman Dispatch</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 En attente</span><span class="stat-value">${enAttente.length}</span></div>
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tours.length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn" onclick="window.location.href='new-transport.html'">
                                    <i class="fas fa-plus"></i> Nouveau transport
                                </button>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <!-- PANEL GAUCHE - TOURNÉES -->
                            <div class="tours-panel">
                                <div class="panel-header">
                                    <h2><i class="fas fa-route"></i> Tournées</h2>
                                    <button class="btn-success btn-small" onclick="ajouterTournee()">
                                        <i class="fas fa-plus"></i> Nouvelle
                                    </button>
                                </div>
                                
                                ${tours.map((tour, index) => {
                                    const stats = calculerStatsTournee(tour.transports);
                                    return `
                                        <div class="tour-card" style="border-left-color: ${tour.couleur};">
                                            <div class="tour-header">
                                                <span class="tour-title">🚚 ${tour.nom}</span>
                                                <div>
                                                    <button class="btn-pdf btn-small" onclick="genererPDF(${tour.id})">
                                                        <i class="fas fa-file-pdf"></i>
                                                    </button>
                                                    <button class="btn-delete btn-small" onclick="supprimerTournee(${tour.id})">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div class="tour-stats">
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${stats.distance} km</div>
                                                    <div class="tour-stat-label">Distance</div>
                                                </div>
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${Math.floor(stats.duree/60)}h${stats.duree%60}</div>
                                                    <div class="tour-stat-label">Durée</div>
                                                </div>
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${stats.poids} kg</div>
                                                    <div class="tour-stat-label">Charge</div>
                                                </div>
                                            </div>
                                            
                                            <div class="tour-list" data-tour-id="${tour.id}">
                                                ${tour.transports.map(t => {
                                                    const { npa, ville } = extraireNpaVille(t.delivery_address);
                                                    return `
                                                        <div class="transport-card" data-id="${t.id}">
                                                            <div class="transport-header">
                                                                <span class="transport-expediteur">
                                                                    <i class="fas fa-user"></i> ${t.client_number || 'Inconnu'}
                                                                </span>
                                                                <button class="remove-from-tour" onclick="enleverDeTournee('${t.id}')">
                                                                    <i class="fas fa-times"></i>
                                                                </button>
                                                            </div>
                                                            <div class="transport-destinataire">
                                                                👤 ${t.destinataire_nom || 'Destinataire inconnu'}
                                                            </div>
                                                            <div class="transport-address">
                                                                📍 ${t.delivery_address || ''}
                                                            </div>
                                                            <div class="transport-npa-ville">
                                                                ${npa} ${ville}
                                                            </div>
                                                            <div class="transport-meta">
                                                                <span>⚡ ${t.speed || '24h'}</span>
                                                                <span>⚖️ ${t.weight || 1} kg</span>
                                                            </div>
                                                        </div>
                                                    `;
                                                }).join('')}
                                            </div>
                                            
                                            <select class="chauffeur-select" onchange="assignerChauffeur(${tour.id}, this.value)">
                                                <option value="">Assigner un chauffeur</option>
                                                ${chauffeurs.map(c => `
                                                    <option value="${c.id}" ${tour.chauffeur === c.id ? 'selected' : ''}>
                                                        ${c.prenom} ${c.nom}
                                                    </option>
                                                `).join('')}
                                            </select>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                            
                            <!-- CARTE CENTRALE - MOINS LARGE -->
                            <div class="map-container">
                                <div id="map"></div>
                            </div>
                            
                            <!-- PANEL DROIT - EN ATTENTE -->
                            <div class="pending-panel">
                                <div class="pending-header">
                                    <h2><i class="fas fa-clock"></i> En attente</h2>
                                    <span class="stat-value">${enAttente.length}</span>
                                </div>
                                
                                <div class="pending-list" id="pendingList">
                                    ${enAttente.map(t => {
                                        const { npa, ville } = extraireNpaVille(t.delivery_address);
                                        return `
                                            <div class="transport-card ${t.speed === '6h' ? 'urgent' : ''}" 
                                                 data-id="${t.id}"
                                                 data-lat="${t.lat || 0}"
                                                 data-lng="${t.lng || 0}">
                                                <div class="transport-header">
                                                    <span class="transport-expediteur">
                                                        <i class="fas fa-user"></i> ${t.client_number || 'Inconnu'}
                                                    </span>
                                                </div>
                                                <div class="transport-destinataire">
                                                    👤 ${t.destinataire_nom || 'Destinataire inconnu'}
                                                </div>
                                                <div class="transport-address">
                                                    📍 ${t.delivery_address || ''}
                                                </div>
                                                <div class="transport-npa-ville">
                                                    ${npa} ${ville}
                                                </div>
                                                <div class="transport-meta">
                                                    <span>⚡ ${t.speed || '24h'}</span>
                                                    <span>⚖️ ${t.weight || 1} kg</span>
                                                </div>
                                                <button class="btn-delete-transport" onclick="supprimerTransport('${t.id}')">
                                                    <i class="fas fa-trash"></i> Supprimer
                                                </button>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    initMap(enAttente);
                    initDragAndDrop();
                }
                
                // ===== INIT CARTE =====
                function initMap(transports) {
                    if (map) map.remove();
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    L.marker([depot.lat, depot.lng]).addTo(map).bindPopup("Dépôt Yverdon");
                    
                    if (transports) {
                        transports.forEach(t => {
                            if (t.lat && t.lng && t.lat !== 0 && t.lng !== 0) {
                                const color = t.speed === '6h' ? '#ef4444' : '#facc15';
                                const icon = L.divIcon({
                                    html: `<div style="background:${color}; width:16px; height:16px; border-radius:50%; border:2px solid white;"></div>`,
                                    className: '',
                                    iconSize: [16, 16]
                                });
                                L.marker([t.lat, t.lng], { icon }).addTo(map).bindPopup(`
                                    <b>${t.destinataire_nom || 'Client'}</b><br>
                                    ${t.delivery_address}<br>
                                    Expéditeur: ${t.client_number}
                                `);
                            }
                        });
                    }
                }
                
                // ===== DRAG & DROP =====
                function initDragAndDrop() {
                    $(".transport-card").draggable({
                        revert: "invalid",
                        helper: "clone",
                        cursor: "move",
                        opacity: 0.7,
                        zIndex: 1000
                    });
                    
                    $(".tour-list").droppable({
                        accept: ".transport-card",
                        hoverClass: "drop-target",
                        drop: function(event, ui) {
                            const transportId = ui.draggable.data('id');
                            const tourId = $(this).data('tour-id');
                            
                            if (!tourId) return;
                            
                            ajouterATournee(transportId, tourId);
                        }
                    });
                }
                
                // ===== FONCTIONS =====
                window.ajouterTournee = function() {
                    const newId = tours.length + 1;
                    const couleurs = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
                    
                    tours.push({
                        id: newId,
                        nom: `Tournée ${newId}`,
                        couleur: couleurs[newId % couleurs.length],
                        chauffeur: null,
                        transports: []
                    });
                    
                    afficherPage();
                };
                
                window.supprimerTournee = function(tourId) {
                    if (confirm("Supprimer cette tournée ?")) {
                        tours = tours.filter(t => t.id !== tourId);
                        afficherPage();
                    }
                };
                
                window.ajouterATournee = function(transportId, tourId) {
                    const transport = allTransports.find(t => t.id === transportId);
                    const tour = tours.find(t => t.id === parseInt(tourId));
                    
                    if (transport && tour) {
                        tours.forEach(t => {
                            t.transports = t.transports.filter(t => t.id !== transportId);
                        });
                        
                        tour.transports.push(transport);
                        afficherPage();
                    }
                };
                
                window.enleverDeTournee = function(transportId) {
                    tours.forEach(tour => {
                        tour.transports = tour.transports.filter(t => t.id !== transportId);
                    });
                    afficherPage();
                };
                
                window.supprimerTransport = async function(transportId) {
                    if (confirm("Supprimer définitivement ce transport ?")) {
                        await supabase
                            .from('transport_orders_simple')
                            .delete()
                            .eq('id', transportId);
                        
                        loadData();
                    }
                };
                
                window.assignerChauffeur = async function(tourId, chauffeurId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (tour) {
                        tour.chauffeur = chauffeurId || null;
                        alert(chauffeurId ? "✅ Chauffeur assigné" : "Chauffeur retiré");
                    }
                };
                
                window.logout = function() {
                    localStorage.removeItem('user');
                    window.location.href = '../login/';
                };
                
                await loadData();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
