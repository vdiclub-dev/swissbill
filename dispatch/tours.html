<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman Dispatch | Tournées</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <!-- Drag & Drop -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        header {
            background: #111; padding: 15px 25px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #facc15; height: 70px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-success { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
        }
        
        /* CARTE CENTRALE */
        .map-container {
            flex: 1;
            position: relative;
        }
        #map { height: 100%; width: 100%; }
        
        /* PANEL DROIT - TOURNÉES */
        .tours-panel {
            width: 450px;
            background: #111;
            border-left: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .panel-header h2 {
            color: #facc15;
        }
        
        /* ZONE EN ATTENTE */
        .pending-area {
            background: #1f2937;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            border-left: 4px solid #6b7280;
        }
        
        .pending-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #facc15;
            font-weight: bold;
        }
        
        .pending-list {
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }
        
        /* TOURNÉES */
        .tour-card {
            background: #1f2937;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
        }
        
        .tour-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .tour-title {
            font-weight: bold;
            color: #facc15;
            font-size: 16px;
        }
        
        .tour-stats {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        
        .tour-stat-item {
            text-align: center;
        }
        
        .tour-stat-value {
            font-weight: bold;
            color: #facc15;
            font-size: 16px;
        }
        
        .tour-stat-label {
            font-size: 11px;
            color: #aaa;
        }
        
        .tour-list {
            min-height: 80px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
            margin: 10px 0;
            background: #2a2a2a;
            border-radius: 4px;
        }
        
        /* CARTES DE TRANSPORT */
        .transport-card {
            background: #374151;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: move;
            border-left: 3px solid #facc15;
            transition: 0.2s;
        }
        
        .transport-card:hover {
            background: #4b5563;
        }
        
        .transport-card.urgent {
            border-left-color: #ef4444;
        }
        
        .transport-client {
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        
        .transport-address {
            font-size: 11px;
            color: #aaa;
            margin: 4px 0;
        }
        
        .transport-meta {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #9ca3af;
        }
        
        .remove-from-tour {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
            padding: 0 5px;
        }
        
        .remove-from-tour:hover {
            color: #dc2626;
        }
        
        .tour-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        
        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }
        
        .btn-optimize { background: #3b82f6; color: white; }
        .btn-assign { background: #10b981; color: white; }
        
        .drop-target {
            border: 2px dashed #facc15;
            background: #2d3a4f;
        }
        
        /* MODAL GRAND FORMULAIRE */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal-box {
            background: #1f2937;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #facc15;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h3 {
            color: #facc15;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #111;
            border: 1px solid #2a2a2a;
            color: white;
            border-radius: 4px;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .loader {
            text-align: center; padding: 30px; color: #aaa;
        }
        .loader i { font-size: 30px; color: #facc15; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app">
        <div class="loader">
            <i class="fas fa-spinner fa-spin"></i>
            Chargement...
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Tournées...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let tours = [];
                let map, markers;
                
                const depot = {
                    nom: "Dépôt Yverdon",
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== CALCUL DE DISTANCE =====
                function calculerDistance(lat1, lng1, lat2, lng2) {
                    const R = 6371;
                    const dLat = (lat2 - lat1) * Math.PI / 180;
                    const dLon = (lng2 - lng1) * Math.PI / 180;
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                             Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                             Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                }
                
                // ===== CALCUL STATS TOURNÉE =====
                function calculerStatsTournee(transports) {
                    if (transports.length === 0) {
                        return { distance: 0, duree: 0, poids: 0 };
                    }
                    
                    let distance = 0;
                    let duree = 0;
                    let poids = 0;
                    let precedent = depot;
                    
                    transports.forEach(t => {
                        if (t.lat && t.lng) {
                            const trajet = calculerDistance(precedent.lat, precedent.lng, t.lat, t.lng);
                            distance += trajet;
                            duree += (trajet / 60) * 60 + 15; // 15 min de service
                            poids += t.weight || 1;
                            precedent = t;
                        }
                    });
                    
                    // Retour au dépôt
                    if (transports.length > 0) {
                        const dernier = transports[transports.length - 1];
                        const retour = calculerDistance(dernier.lat, dernier.lng, depot.lat, depot.lng);
                        distance += retour;
                        duree += (retour / 60) * 60;
                    }
                    
                    return { 
                        distance: Math.round(distance), 
                        duree: Math.round(duree),
                        poids: Math.round(poids)
                    };
                }
                
                // ===== CHARGEMENT =====
                async function loadData() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    
                    tours = [
                        { id: 1, nom: "Tournée Lausanne", couleur: '#3b82f6', transports: [] },
                        { id: 2, nom: "Tournée Genève", couleur: '#10b981', transports: [] },
                        { id: 3, nom: "Tournée Berne", couleur: '#f59e0b', transports: [] }
                    ];
                    
                    afficherPage();
                }
                
                // ===== AFFICHAGE =====
                function afficherPage() {
                    const nonLivres = allTransports.filter(t => t.status !== 'delivered');
                    
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Léman Dispatch</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 En attente</span><span class="stat-value">${nonLivres.length}</span></div>
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tours.length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn" onclick="ouvrirFormulaire()">
                                    <i class="fas fa-plus"></i> Nouveau transport
                                </button>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <!-- CARTE CENTRALE -->
                            <div class="map-container">
                                <div id="map"></div>
                            </div>
                            
                            <!-- PANEL DROIT -->
                            <div class="tours-panel">
                                <div class="panel-header">
                                    <h2><i class="fas fa-route"></i> Tournées</h2>
                                    <button class="btn-success btn-small" onclick="ajouterTournee()">
                                        <i class="fas fa-plus"></i> Nouvelle
                                    </button>
                                </div>
                                
                                <!-- Transports en attente -->
                                <div class="pending-area">
                                    <div class="pending-header">
                                        <span>📋 En attente</span>
                                        <span>${nonLivres.length} transport(s)</span>
                                    </div>
                                    <div class="pending-list" id="pendingList">
                                        ${nonLivres.map(t => `
                                            <div class="transport-card ${t.speed === '6h' ? 'urgent' : ''}" 
                                                 data-id="${t.id}"
                                                 data-client="${t.destinataire_nom || 'Client'}"
                                                 data-address="${t.delivery_address || ''}"
                                                 data-lat="${t.lat || 0}"
                                                 data-lng="${t.lng || 0}"
                                                 data-weight="${t.weight || 1}">
                                                <div class="transport-client">
                                                    ${t.destinataire_nom || 'Client'}
                                                </div>
                                                <div class="transport-address">${(t.delivery_address || '').substring(0,40)}</div>
                                                <div class="transport-meta">
                                                    <span>${t.speed || '24h'}</span>
                                                    <span>${t.weight || 1} kg</span>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                
                                <!-- Liste des tournées -->
                                ${tours.map((tour, index) => {
                                    const stats = calculerStatsTournee(tour.transports);
                                    return `
                                        <div class="tour-card" style="border-left-color: ${tour.couleur};" id="tour-${tour.id}">
                                            <div class="tour-header">
                                                <span class="tour-title">🚚 ${tour.nom}</span>
                                                <button class="btn-delete btn-small" onclick="supprimerTournee(${tour.id})">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </div>
                                            
                                            <div class="tour-stats">
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${stats.distance} km</div>
                                                    <div class="tour-stat-label">Distance</div>
                                                </div>
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${Math.floor(stats.duree/60)}h${stats.duree%60}</div>
                                                    <div class="tour-stat-label">Durée</div>
                                                </div>
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${stats.poids} kg</div>
                                                    <div class="tour-stat-label">Charge</div>
                                                </div>
                                            </div>
                                            
                                            <div class="tour-list" data-tour-id="${tour.id}">
                                                ${tour.transports.map(t => `
                                                    <div class="transport-card" data-id="${t.id}">
                                                        <div class="transport-client">
                                                            ${t.destinataire_nom || 'Client'}
                                                            <button class="remove-from-tour" onclick="enleverDeTournee('${t.id}', ${tour.id})">
                                                                <i class="fas fa-times"></i>
                                                            </button>
                                                        </div>
                                                        <div class="transport-address">${(t.delivery_address || '').substring(0,40)}</div>
                                                        <div class="transport-meta">
                                                            <span>${t.speed || '24h'}</span>
                                                            <span>${t.weight || 1} kg</span>
                                                        </div>
                                                    </div>
                                                `).join('')}
                                            </div>
                                            
                                            <div class="tour-footer">
                                                <span>${tour.transports.length} arrêt(s)</span>
                                                <button class="btn-optimize btn-small" onclick="optimiserTournee(${tour.id})">
                                                    Optimiser
                                                </button>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                        
                        <!-- MODAL GRAND FORMULAIRE -->
                        <div id="formModal" class="modal">
                            <div class="modal-box">
                                <div class="modal-header">
                                    <h3><i class="fas fa-plus-circle"></i> Nouveau transport</h3>
                                    <button class="modal-close" onclick="fermerFormulaire()">✖</button>
                                </div>
                                
                                <form id="transportForm" onsubmit="event.preventDefault(); sauvegarderTransport();">
                                    <div class="form-grid">
                                        <div class="form-group">
                                            <label>Numéro client</label>
                                            <input type="text" id="clientNumber" value="CL2025-001">
                                        </div>
                                        
                                        <div class="form-group">
                                            <label>Destinataire *</label>
                                            <input type="text" id="destinataireNom" required>
                                        </div>
                                        
                                        <div class="form-group full-width">
                                            <label>Adresse de livraison *</label>
                                            <input type="text" id="deliveryAddress" required>
                                        </div>
                                        
                                        <div class="form-group">
                                            <label>NPA</label>
                                            <input type="text" id="npa">
                                        </div>
                                        
                                        <div class="form-group">
                                            <label>Ville</label>
                                            <input type="text" id="city">
                                        </div>
                                        
                                        <div class="form-group">
                                            <label>Poids (kg)</label>
                                            <input type="number" id="weight" value="1">
                                        </div>
                                        
                                        <div class="form-group">
                                            <label>Quantité</label>
                                            <input type="number" id="quantity" value="1">
                                        </div>
                                        
                                        <div class="form-group">
                                            <label>Type de colis</label>
                                            <select id="packageType">
                                                <option value="Colis">Colis</option>
                                                <option value="Fragile">Fragile</option>
                                                <option value="Palette">Palette</option>
                                            </select>
                                        </div>
                                        
                                        <div class="form-group">
                                            <label>Vitesse</label>
                                            <select id="speed">
                                                <option value="24h">24h</option>
                                                <option value="12h">12h</option>
                                                <option value="6h">6h</option>
                                            </select>
                                        </div>
                                        
                                        <div class="form-group full-width">
                                            <label>Instructions</label>
                                            <textarea id="instructions" rows="2"></textarea>
                                        </div>
                                    </div>
                                    
                                    <div class="modal-actions">
                                        <button type="button" class="btn" onclick="fermerFormulaire()" style="flex:1;">Annuler</button>
                                        <button type="submit" class="btn-success" style="flex:2;">Créer le transport</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    `;
                    
                    initMap();
                    initDragAndDrop();
                }
                
                // ===== INIT CARTE =====
                function initMap() {
                    if (map) map.remove();
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    L.marker([depot.lat, depot.lng]).addTo(map).bindPopup("Dépôt Yverdon");
                    
                    const nonLivres = allTransports.filter(t => t.status !== 'delivered');
                    
                    nonLivres.forEach(t => {
                        if (t.lat && t.lng) {
                            const dansTournee = false; // À vérifier
                            const color = t.speed === '6h' ? '#ef4444' : '#facc15';
                            L.marker([t.lat, t.lng]).addTo(map).bindPopup(`
                                <b>${t.destinataire_nom || 'Client'}</b><br>
                                ${t.delivery_address}
                            `);
                        }
                    });
                }
                
                // ===== DRAG & DROP =====
                function initDragAndDrop() {
                    $(".transport-card").draggable({
                        revert: "invalid",
                        helper: "clone",
                        cursor: "move",
                        opacity: 0.7,
                        zIndex: 1000
                    });
                    
                    $(".tour-list").droppable({
                        accept: ".transport-card",
                        hoverClass: "drop-target",
                        drop: function(event, ui) {
                            const transportId = ui.draggable.data('id');
                            const tourId = $(this).data('tour-id');
                            
                            if (!tourId) return;
                            
                            const clone = ui.draggable.clone();
                            $(this).append(clone);
                            ui.draggable.remove();
                            
                            ajouterATournee(transportId, tourId);
                        }
                    });
                    
                    $(".pending-list").droppable({
                        accept: ".transport-card",
                        hoverClass: "drop-target",
                        drop: function(event, ui) {
                            const transportId = ui.draggable.data('id');
                            
                            enleverDeTournee(transportId);
                        }
                    });
                }
                
                // ===== FONCTIONS =====
                window.ouvrirFormulaire = function() {
                    document.getElementById('formModal').style.display = 'flex';
                };
                
                window.fermerFormulaire = function() {
                    document.getElementById('formModal').style.display = 'none';
                };
                
                window.sauvegarderTransport = async function() {
                    const transport = {
                        order_number: 'TR-' + Date.now(),
                        client_number: document.getElementById('clientNumber').value,
                        destinataire_nom: document.getElementById('destinataireNom').value,
                        delivery_address: document.getElementById('deliveryAddress').value,
                        weight: parseFloat(document.getElementById('weight').value) || 1,
                        quantity: parseInt(document.getElementById('quantity').value) || 1,
                        package_type: document.getElementById('packageType').value,
                        speed: document.getElementById('speed').value,
                        instructions: document.getElementById('instructions').value,
                        status: 'pending',
                        priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
                        created_at: new Date()
                    };
                    
                    await supabase.from('transport_orders_simple').insert([transport]);
                    alert("✅ Transport créé");
                    fermerFormulaire();
                    loadData();
                };
                
                window.ajouterTournee = function() {
                    const newId = tours.length + 1;
                    const couleurs = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
                    
                    tours.push({
                        id: newId,
                        nom: `Tournée ${newId}`,
                        couleur: couleurs[newId % couleurs.length],
                        transports: []
                    });
                    
                    afficherPage();
                };
                
                window.supprimerTournee = function(tourId) {
                    if (confirm("Supprimer cette tournée ?")) {
                        tours = tours.filter(t => t.id !== tourId);
                        afficherPage();
                    }
                };
                
                window.ajouterATournee = function(transportId, tourId) {
                    const transport = allTransports.find(t => t.id === transportId);
                    const tour = tours.find(t => t.id === tourId);
                    
                    if (transport && tour) {
                        tour.transports.push(transport);
                        afficherPage();
                    }
                };
                
                window.enleverDeTournee = function(transportId) {
                    tours.forEach(tour => {
                        tour.transports = tour.transports.filter(t => t.id !== transportId);
                    });
                    afficherPage();
                };
                
                window.optimiserTournee = function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (tour && tour.transports.length > 0) {
                        // Trier par proximité (simple)
                        tour.transports.sort((a, b) => {
                            if (!a.lat || !b.lat) return 0;
                            const distA = calculerDistance(depot.lat, depot.lng, a.lat, a.lng);
                            const distB = calculerDistance(depot.lat, depot.lng, b.lat, b.lng);
                            return distA - distB;
                        });
                        afficherPage();
                    }
                };
                
                window.logout = function() {
                    localStorage.removeItem('user');
                    window.location.href = '../login/';
                };
                
                await loadData();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
