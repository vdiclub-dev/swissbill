<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman Dispatch | Tournées</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <!-- Drag & Drop -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css">
    
    <!-- Supabase et Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        header {
            background: #111; padding: 15px 25px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #facc15; height: 70px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-optimize { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-delete-tour { background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
        }
        
        /* SIDEBAR GAUCHE - FORMULAIRE */
        .form-sidebar {
            width: 350px;
            background: #111;
            border-right: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .form-sidebar h2 {
            color: #facc15;
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            color: #aaa;
            margin-bottom: 5px;
            font-size: 13px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #1f2937;
            border: 1px solid #2a2a2a;
            color: white;
            border-radius: 6px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #facc15;
        }
        
        .form-row {
            display: flex;
            gap: 10px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #facc15;
            color: #111;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn-submit:hover {
            background: #eab308;
        }
        
        /* CARTE CENTRALE */
        .map-container {
            flex: 1;
            position: relative;
        }
        #map { height: 100%; width: 100%; }
        
        /* PANEL DROIT - TOURNÉES */
        .tours-panel {
            width: 400px;
            background: #111;
            border-left: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .tours-panel h2 {
            color: #facc15;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .tour-card {
            background: #1f2937;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #3b82f6;
        }
        
        .tour-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .tour-title {
            font-weight: bold;
            color: #facc15;
        }
        
        .tour-stats {
            font-size: 12px;
            color: #aaa;
        }
        
        .tour-list {
            min-height: 50px;
            padding: 5px;
        }
        
        .transport-mini {
            background: #2a2a2a;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 5px;
            font-size: 12px;
            border-left: 2px solid #facc15;
            cursor: move;
        }
        
        .transport-mini.urgent {
            border-left-color: #ef4444;
        }
        
        .tour-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #2a2a2a;
        }
        
        .pending-area {
            background: #1f2937;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #6b7280;
        }
        
        .pending-title {
            color: #facc15;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .pending-list {
            min-height: 100px;
            padding: 5px;
        }
        
        /* ANIMATION CLIGNOTANTE */
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        
        .marker-blink {
            animation: blink 1.5s infinite;
        }
        
        .loader {
            text-align: center; padding: 30px; color: #aaa;
        }
        .loader i { font-size: 30px; color: #facc15; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app">
        <div class="loader">
            <i class="fas fa-spinner fa-spin"></i>
            Chargement...
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Tournées...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let tours = [];
                let map, markers, markerMap = new Map();
                
                const depot = {
                    nom: "Dépôt Yverdon",
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== CHARGEMENT =====
                async function loadData() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    
                    // Initialiser les tournées
                    tours = [
                        { id: 1, nom: "Tournée Lausanne", couleur: '#3b82f6', transports: [] },
                        { id: 2, nom: "Tournée Genève", couleur: '#10b981', transports: [] },
                        { id: 3, nom: "Tournée Berne", couleur: '#f59e0b', transports: [] }
                    ];
                    
                    afficherPage();
                }
                
                // ===== AFFICHAGE =====
                function afficherPage() {
                    const nonLivres = allTransports.filter(t => t.status !== 'delivered');
                    
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Léman Dispatch</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 En attente</span><span class="stat-value">${nonLivres.length}</span></div>
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tours.length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <!-- FORMULAIRE À GAUCHE -->
                            <div class="form-sidebar">
                                <h2><i class="fas fa-plus-circle"></i> Nouveau transport</h2>
                                
                                <div class="form-group">
                                    <label>Numéro client</label>
                                    <input type="text" id="clientNumber" value="CL2025-001">
                                </div>
                                
                                <div class="form-group">
                                    <label>Destinataire</label>
                                    <input type="text" id="destinataireNom" placeholder="Nom / Entreprise">
                                </div>
                                
                                <div class="form-group">
                                    <label>Adresse de livraison</label>
                                    <input type="text" id="deliveryAddress" placeholder="Rue, NPA, Ville">
                                </div>
                                
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Poids (kg)</label>
                                        <input type="number" id="weight" value="1">
                                    </div>
                                    <div class="form-group">
                                        <label>Vitesse</label>
                                        <select id="speed">
                                            <option value="24h">24h</option>
                                            <option value="12h">12h</option>
                                            <option value="6h">6h</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label>Instructions</label>
                                    <textarea id="instructions" rows="2"></textarea>
                                </div>
                                
                                <button class="btn-submit" onclick="creerTransport()">
                                    <i class="fas fa-check"></i> Créer le transport
                                </button>
                            </div>
                            
                            <!-- CARTE CENTRALE -->
                            <div class="map-container">
                                <div id="map"></div>
                            </div>
                            
                            <!-- TOURNÉES À DROITE -->
                            <div class="tours-panel">
                                <h2>
                                    <span><i class="fas fa-route"></i> Tournées</span>
                                    <button class="btn-optimize" onclick="ajouterTournee()">➕ Nouvelle</button>
                                </h2>
                                
                                <!-- Transports en attente -->
                                <div class="pending-area">
                                    <div class="pending-title">
                                        📋 En attente (${nonLivres.length})
                                    </div>
                                    <div class="pending-list" id="pendingList">
                                        ${nonLivres.map(t => `
                                            <div class="transport-mini ${t.speed === '6h' ? 'urgent' : ''}" 
                                                 data-id="${t.id}"
                                                 data-client="${t.destinataire_nom || 'Client'}"
                                                 data-address="${t.delivery_address || ''}"
                                                 data-lat="${t.lat || 0}"
                                                 data-lng="${t.lng || 0}">
                                                <strong>${t.destinataire_nom || 'Client'}</strong><br>
                                                <small>${(t.delivery_address || '').substring(0,30)}</small>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                
                                <!-- Liste des tournées -->
                                ${tours.map((tour, index) => `
                                    <div class="tour-card" style="border-left-color: ${tour.couleur};">
                                        <div class="tour-header">
                                            <span class="tour-title">🚚 ${tour.nom}</span>
                                            <button class="btn-delete-tour" onclick="supprimerTournee(${tour.id})">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </div>
                                        <div class="tour-list" id="tour-${tour.id}" data-tour-id="${tour.id}">
                                            ${tour.transports.map(t => `
                                                <div class="transport-mini">
                                                    <strong>${t.destinataire_nom || 'Client'}</strong>
                                                </div>
                                            `).join('')}
                                        </div>
                                        <div class="tour-footer">
                                            <span>${tour.transports.length} arrêts</span>
                                            <button class="btn-optimize" style="padding:4px 8px;" onclick="optimiserTournee(${tour.id})">
                                                Optimiser
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    
                    initMap();
                    initDragAndDrop();
                }
                
                // ===== INIT CARTE =====
                function initMap() {
                    if (map) map.remove();
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    // Dépôt
                    L.marker([depot.lat, depot.lng]).addTo(map).bindPopup("Dépôt Yverdon");
                    
                    // Marqueurs des transports
                    const nonLivres = allTransports.filter(t => t.status !== 'delivered');
                    
                    nonLivres.forEach(t => {
                        if (t.lat && t.lng) {
                            const estDansTournee = false; // À vérifier
                            const color = t.speed === '6h' ? '#ef4444' : '#facc15';
                            
                            const icon = L.divIcon({
                                html: `<div style="background:${color}; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white; ${!estDansTournee ? 'animation:blink 1.5s infinite;' : ''}">•</div>`,
                                iconSize: [20, 20]
                            });
                            
                            const marker = L.marker([t.lat, t.lng], { icon }).addTo(map);
                            marker.bindPopup(`
                                <b>${t.destinataire_nom || 'Client'}</b><br>
                                ${t.delivery_address}
                            `);
                            
                            markerMap.set(t.id, marker);
                        }
                    });
                }
                
                // ===== DRAG & DROP =====
                function initDragAndDrop() {
                    $(".transport-mini").draggable({
                        revert: "invalid",
                        helper: "clone",
                        cursor: "move",
                        opacity: 0.7,
                        zIndex: 1000
                    });
                    
                    $(".tour-list").droppable({
                        accept: ".transport-mini",
                        hoverClass: "drop-target",
                        drop: function(event, ui) {
                            const transportId = ui.draggable.data('id');
                            const tourId = $(this).data('tour-id');
                            
                            const clone = ui.draggable.clone();
                            $(this).append(clone);
                            ui.draggable.remove();
                            
                            ajouterTransportATournee(transportId, tourId);
                        }
                    });
                }
                
                // ===== FONCTIONS =====
                window.creerTransport = async function() {
                    const transport = {
                        order_number: 'TR-' + Date.now(),
                        client_number: document.getElementById('clientNumber').value,
                        destinataire_nom: document.getElementById('destinataireNom').value,
                        delivery_address: document.getElementById('deliveryAddress').value,
                        weight: parseFloat(document.getElementById('weight').value) || 1,
                        speed: document.getElementById('speed').value,
                        instructions: document.getElementById('instructions').value,
                        status: 'pending',
                        priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
                        created_at: new Date()
                    };
                    
                    await supabase.from('transport_orders_simple').insert([transport]);
                    alert("✅ Transport créé");
                    loadData();
                };
                
                window.ajouterTransportATournee = function(transportId, tourId) {
                    console.log(`Transport ${transportId} → Tournée ${tourId}`);
                    // Ici, mettre à jour Supabase
                };
                
                window.ajouterTournee = function() {
                    const newId = tours.length + 1;
                    const couleurs = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
                    
                    tours.push({
                        id: newId,
                        nom: `Tournée ${newId}`,
                        couleur: couleurs[newId % couleurs.length],
                        transports: []
                    });
                    
                    afficherPage();
                };
                
                window.supprimerTournee = function(tourId) {
                    if (confirm("Supprimer cette tournée ?")) {
                        tours = tours.filter(t => t.id !== tourId);
                        afficherPage();
                    }
                };
                
                window.optimiserTournee = function(tourId) {
                    alert(`Optimisation de la tournée ${tourId}`);
                };
                
                window.logout = function() {
                    localStorage.removeItem('user');
                    window.location.href = '../login/';
                };
                
                await loadData();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
