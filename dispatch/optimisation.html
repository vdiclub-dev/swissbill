<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman Dispatch | Optimisation des tournées</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        header {
            background: #111; padding: 15px 25px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #facc15; height: 70px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-optimize { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-back { background: #6b7280; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar {
            width: 220px; background: #111; padding: 20px;
            border-right: 1px solid #2a2a2a; overflow-y: auto;
        }
        .sidebar button {
            width: 100%; padding: 12px; margin-bottom: 8px;
            background: #1f2937; color: white; border: none;
            border-radius: 6px; cursor: pointer; text-align: left;
        }
        .sidebar button:hover { background: #facc15; color: #111; }
        .sidebar button.active { background: #facc15; color: #111; }
        
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        
        .right-panel {
            width: 400px; background: #111; border-left: 1px solid #2a2a2a;
            padding: 20px; overflow-y: auto;
        }
        .right-panel h3 { color: #facc15; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .transport-item {
            background: #1f2937; padding: 12px; margin-bottom: 10px;
            border-radius: 6px; border-left: 3px solid #facc15;
            cursor: pointer;
        }
        .transport-item.urgent { border-left-color: #ef4444; }
        .transport-header { display: flex; justify-content: space-between; align-items: center; }
        .transport-client { font-weight: bold; color: white; }
        .transport-address { font-size: 12px; color: #aaa; margin: 4px 0; }
        
        .tour-item {
            background: #2a2a2a; padding: 15px; margin-bottom: 15px;
            border-radius: 8px; border-left: 4px solid #3b82f6;
        }
        .tour-header {
            display: flex; justify-content: space-between;
            color: #3b82f6; font-weight: bold; margin-bottom: 10px;
        }
        .tour-stats {
            display: flex; justify-content: space-between;
            background: #1f2937; padding: 8px; border-radius: 4px;
            margin-bottom: 10px; font-size: 12px;
        }
        .tour-stop {
            padding: 8px 0 8px 15px; border-bottom: 1px solid #3a3a3a;
            font-size: 13px; position: relative;
        }
        .tour-stop:last-child { border-bottom: none; }
        .stop-time { font-size: 11px; color: #facc15; margin-left: 20px; }
        
        .loader {
            text-align: center; padding: 30px; color: #aaa;
        }
        .loader i { font-size: 30px; color: #facc15; animation: spin 1s infinite linear; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app">
        <div style="padding:20px;">Chargement...</div>
    </div>

    <!-- SCRIPTS DANS LE BODY (ordre crucial) -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        // Attendre que tout soit chargé
        window.addEventListener('load', async function() {
            try {
                console.log("🚀 Optimisation des tournées...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                // ===== VÉRIFICATION CONNEXION =====
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== VÉRIFICATION LEAFLET =====
                if (typeof L === 'undefined') {
                    throw new Error("Leaflet n'est pas chargé. Vérifiez les scripts.");
                }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let map, markers, routeLayers = [];
                
                // Dépôt (Yverdon)
                const depot = {
                    nom: "Dépôt Yverdon",
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== GÉOCODAGE SIMPLE =====
                function getCityCoordinates(adresse) {
                    const adr = (adresse || '').toLowerCase();
                    if (adr.includes('lausanne')) return { lat: 46.52, lng: 6.63 };
                    if (adr.includes('geneve')) return { lat: 46.20, lng: 6.14 };
                    if (adr.includes('yverdon')) return { lat: 46.78, lng: 6.64 };
                    if (adr.includes('berne')) return { lat: 46.95, lng: 7.45 };
                    if (adr.includes('zurich')) return { lat: 47.37, lng: 8.54 };
                    if (adr.includes('bienne')) return { lat: 47.14, lng: 7.24 };
                    if (adr.includes('neuchatel')) return { lat: 46.99, lng: 6.93 };
                    if (adr.includes('fribourg')) return { lat: 46.80, lng: 7.15 };
                    return { lat: 46.8, lng: 8.2 };
                }
                
                // ===== CALCUL DE DISTANCE =====
                function calculerDistance(lat1, lon1, lat2, lon2) {
                    const R = 6371;
                    const dLat = (lat2 - lat1) * Math.PI / 180;
                    const dLon = (lon2 - lon1) * Math.PI / 180;
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                             Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                             Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                }
                
                // ===== FORMAT HEURE =====
                function formatTime(minutes) {
                    const h = Math.floor(minutes / 60);
                    const m = minutes % 60;
                    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                }
                
                // ===== CHARGEMENT DES TRANSPORTS =====
                async function loadTransports() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .neq('status', 'delivered')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    afficherTransports();
                }
                
                // ===== AFFICHAGE NORMAL =====
                function afficherTransports() {
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Optimisation</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 Total</span><span class="stat-value">${allTransports.length}</span></div>
                                <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value">${allTransports.filter(t => t.speed === '6h').length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn-back" onclick="window.location.href='index.html'">← Retour</button>
                                <button class="btn-optimize" onclick="optimiser()">🚀 Optimiser</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <div class="sidebar">
                                <button onclick="window.location.href='index.html'">🗺️ Dispatch</button>
                                <button class="active">🧠 Optimisation</button>
                                <button>📦 Transports</button>
                            </div>
                            
                            <div class="map-container"><div id="map"></div></div>
                            
                            <div class="right-panel">
                                <h3>📋 Transports à optimiser</h3>
                                <div id="transportList">
                                    ${allTransports.map(t => `
                                        <div class="transport-item ${t.speed === '6h' ? 'urgent' : ''}">
                                            <div class="transport-header">
                                                <span class="transport-client">${t.destinataire_nom || 'Client'}</span>
                                                <span>${t.speed || '24h'}</span>
                                            </div>
                                            <div class="transport-address">📍 ${t.delivery_address?.substring(0, 50)}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    initMap();
                }
                
                // ===== INIT CARTE =====
                function initMap() {
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    markers = L.markerClusterGroup();
                    map.addLayer(markers);
                    
                    // Ajouter le dépôt
                    L.marker([depot.lat, depot.lng]).addTo(map).bindPopup("Dépôt Yverdon");
                    
                    console.log("✅ Carte initialisée");
                }
                
                // ===== FONCTION D'OPTIMISATION =====
                window.optimiser = function() {
                    if (allTransports.length === 0) {
                        alert("Aucun transport à optimiser");
                        return;
                    }
                    
                    // Paramètres des véhicules
                    const vehicules = [
                        { id: 1, capacite: 800, vitesse: 60, debut: 6*60, fin: 22*60 },
                        { id: 2, capacite: 500, vitesse: 60, debut: 6*60, fin: 22*60 },
                        { id: 3, capacite: 300, vitesse: 60, debut: 6*60, fin: 22*60 }
                    ];
                    
                    // Préparer les jobs
                    const jobs = allTransports.map((t, index) => {
                        const coords = getCityCoordinates(t.delivery_address);
                        return {
                            id: index + 1,
                            lat: coords.lat,
                            lng: coords.lng,
                            nom: t.destinataire_nom || 'Client',
                            adresse: t.delivery_address,
                            urgent: t.speed === '6h',
                            poids: t.weight || 1,
                            service: 15
                        };
                    });
                    
                    // Trier : urgents d'abord
                    jobs.sort((a, b) => (a.urgent && !b.urgent) ? -1 : 0);
                    
                    // Créer les tournées
                    const tournees = [];
                    let jobsRestants = [...jobs];
                    
                    vehicules.forEach((vehicule, vIndex) => {
                        if (jobsRestants.length === 0) return;
                        
                        const tournee = {
                            vehicule: vIndex + 1,
                            capacite: vehicule.capacite,
                            stops: [],
                            poidsTotal: 0,
                            distanceTotal: 0,
                            tempsActuel: vehicule.debut
                        };
                        
                        let positionActuelle = { lat: depot.lat, lng: depot.lng };
                        
                        for (let i = jobsRestants.length - 1; i >= 0; i--) {
                            const job = jobsRestants[i];
                            
                            if (tournee.poidsTotal + job.poids > vehicule.capacite) continue;
                            
                            const distance = calculerDistance(
                                positionActuelle.lat, positionActuelle.lng,
                                job.lat, job.lng
                            );
                            
                            const tempsTrajet = (distance / vehicule.vitesse) * 60;
                            const heureArrivee = tournee.tempsActuel + tempsTrajet + job.service;
                            
                            if (heureArrivee > vehicule.fin) continue;
                            
                            tournee.stops.push({
                                ...job,
                                distance: distance,
                                heureArrivee: tournee.tempsActuel + tempsTrajet,
                                heureDepart: tournee.tempsActuel + tempsTrajet + job.service
                            });
                            
                            tournee.poidsTotal += job.poids;
                            tournee.distanceTotal += distance;
                            tournee.tempsActuel = heureArrivee;
                            positionActuelle = { lat: job.lat, lng: job.lng };
                            
                            jobsRestants.splice(i, 1);
                        }
                        
                        if (tournee.stops.length > 0) {
                            const dernier = tournee.stops[tournee.stops.length - 1];
                            const distanceRetour = calculerDistance(
                                dernier.lat, dernier.lng,
                                depot.lat, depot.lng
                            );
                            tournee.distanceTotal += distanceRetour;
                            tournee.tempsActuel += (distanceRetour / vehicule.vitesse) * 60;
                        }
                        
                        if (tournee.stops.length > 0) {
                            tournees.push(tournee);
                        }
                    });
                    
                    afficherResultats(tournees, jobsRestants);
                };
                
                // ===== AFFICHAGE DES RÉSULTATS =====
                function afficherResultats(tournees, nonAssignes) {
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Résultat</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tournees.length}</span></div>
                                <div class="stat-item"><span>📦 Non assignés</span><span class="stat-value">${nonAssignes.length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn-back" onclick="loadTransports()">← Nouvelle optimisation</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <div class="sidebar">
                                <button onclick="window.location.href='index.html'">🗺️ Dispatch</button>
                                <button class="active">🧠 Résultat</button>
                            </div>
                            
                            <div class="map-container"><div id="map"></div></div>
                            
                            <div class="right-panel">
                                <h3>📋 Tournées optimisées</h3>
                                <div id="tourneesList">
                                    ${tournees.map((t, idx) => `
                                        <div class="tour-item">
                                            <div class="tour-header">
                                                <span>🚚 Véhicule ${t.vehicule}</span>
                                                <span>${t.stops.length} arrêts</span>
                                            </div>
                                            <div class="tour-stats">
                                                <span>📏 ${Math.round(t.distanceTotal)} km</span>
                                                <span>⚖️ ${t.poidsTotal} kg / ${t.capacite} kg</span>
                                                <span>⏱️ ${formatTime(Math.round(t.tempsActuel))}</span>
                                            </div>
                                            ${t.stops.map((s, i) => `
                                                <div class="tour-stop">
                                                    <strong>${i+1}. ${s.nom}</strong>
                                                    <div class="stop-time">🕐 Arrivée: ${formatTime(Math.round(s.heureArrivee))}</div>
                                                    <div style="font-size:11px;">${s.adresse?.substring(0,30)}</div>
                                                </div>
                                            `).join('')}
                                            <div class="tour-stop">
                                                <strong>Retour dépôt</strong>
                                                <div class="stop-time">🕐 ${formatTime(Math.round(t.tempsActuel))}</div>
                                            </div>
                                        </div>
                                    `).join('')}
                                    
                                    ${nonAssignes.length > 0 ? `
                                        <div style="background:#991b1b; padding:15px; border-radius:8px;">
                                            <h4 style="color:white;">⚠️ Non assignés (${nonAssignes.length})</h4>
                                            ${nonAssignes.map(j => `
                                                <div style="padding:5px 0;">${j.nom} (${j.poids}kg)</div>
                                            `).join('')}
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    // Re-créer la carte pour les résultats
                    setTimeout(() => {
                        if (typeof L === 'undefined') return;
                        map = L.map('map').setView([46.8, 8.2], 8);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        
                        const couleurs = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6'];
                        
                        tournees.forEach((t, index) => {
                            const points = [[depot.lat, depot.lng]];
                            t.stops.forEach(s => points.push([s.lat, s.lng]));
                            points.push([depot.lat, depot.lng]);
                            
                            L.polyline(points, {
                                color: couleurs[index % couleurs.length],
                                weight: 4,
                                opacity: 0.7
                            }).addTo(map);
                        });
                    }, 100);
                }
                
                // ===== LANCEMENT =====
                await loadTransports();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
