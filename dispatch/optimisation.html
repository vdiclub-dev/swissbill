<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman Dispatch | Optimisation intelligente</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <!-- Supabase et Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        header {
            background: #111; padding: 15px 25px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #facc15; height: 70px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-optimize { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar {
            width: 220px; background: #111; padding: 20px;
            border-right: 1px solid #2a2a2a; overflow-y: auto;
        }
        .sidebar button {
            width: 100%; padding: 12px; margin-bottom: 8px;
            background: #1f2937; color: white; border: none;
            border-radius: 6px; cursor: pointer; text-align: left;
        }
        .sidebar button:hover { background: #facc15; color: #111; }
        .sidebar button.active { background: #facc15; color: #111; }
        
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        
        .right-panel {
            width: 450px; background: #111; border-left: 1px solid #2a2a2a;
            padding: 20px; overflow-y: auto;
        }
        .right-panel h3 { color: #facc15; margin-bottom: 20px; display: flex; justify-content: space-between; }
        
        .transport-item {
            background: #1f2937; padding: 12px; margin-bottom: 10px;
            border-radius: 6px; border-left: 3px solid #facc15;
        }
        .transport-item.urgent { border-left-color: #ef4444; }
        .transport-client { font-weight: bold; color: white; }
        .transport-address { font-size: 12px; color: #aaa; margin: 4px 0; }
        
        .tour-item {
            background: #2a2a2a; padding: 15px; margin-bottom: 15px;
            border-radius: 8px; border-left: 4px solid #3b82f6;
        }
        .tour-header {
            display: flex; justify-content: space-between;
            color: #3b82f6; font-weight: bold; margin-bottom: 10px;
        }
        .tour-stats {
            display: flex; justify-content: space-between;
            background: #1f2937; padding: 8px; border-radius: 4px;
            margin-bottom: 10px; font-size: 12px;
        }
        .tour-stop {
            padding: 8px 0 8px 15px;
            border-bottom: 1px solid #3a3a3a;
            font-size: 13px;
        }
        .stop-client {
            font-weight: bold;
            color: #facc15;
        }
        .stop-address {
            font-size: 11px;
            color: #aaa;
        }
        .stop-time {
            font-size: 11px;
            color: #3b82f6;
            margin-top: 2px;
        }
        
        .loader {
            text-align: center; padding: 30px; color: #aaa;
        }
        .loader i { font-size: 30px; color: #facc15; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app">Chargement...</div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Optimisation intelligente...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let map, markers, routeLayers = [];
                let modeOptimisation = false;
                
                const depot = {
                    nom: "Dépôt Yverdon",
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                const vehicules = [
                    { id: 1, nom: "Camion A", capacite: 800, vitesse: 60, debut: 6*60, fin: 22*60 },
                    { id: 2, nom: "Camion B", capacite: 500, vitesse: 60, debut: 6*60, fin: 22*60 },
                    { id: 3, nom: "Camion C", capacite: 300, vitesse: 60, debut: 6*60, fin: 22*60 }
                ];
                
                // ===== GÉOCODAGE =====
                async function geocoderAdresse(adresse) {
                    try {
                        const response = await fetch(
                            `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(adresse + ', Suisse')}&limit=1`,
                            { headers: { 'User-Agent': 'LemanDispatch/1.0' } }
                        );
                        const data = await response.json();
                        return data.length > 0 ? { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) } : null;
                    } catch(e) {
                        return null;
                    }
                }
                
                // ===== CALCUL DE ROUTE (OSRM) =====
                async function calculerRoute(origine, destination) {
                    const url = `https://router.project-osrm.org/route/v1/driving/${origine.lng},${origine.lat};${destination.lng},${destination.lat}?overview=full&geometries=geojson`;
                    try {
                        const response = await fetch(url);
                        const data = await response.json();
                        if (data.routes && data.routes.length > 0) {
                            return {
                                distance: data.routes[0].distance / 1000,
                                duree: data.routes[0].duration / 60,
                                geometry: data.routes[0].geometry
                            };
                        }
                    } catch(e) {}
                    return null;
                }
                
                // ===== CHARGEMENT =====
                async function loadTransports() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    afficherTransports();
                }
                
                // ===== AFFICHAGE NORMAL =====
                function afficherTransports() {
                    modeOptimisation = false;
                    
                    const nonLivres = allTransports.filter(t => t.status !== 'delivered');
                    
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 Total</span><span class="stat-value">${allTransports.length}</span></div>
                                <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value">${nonLivres.filter(t => t.speed === '6h').length}</span></div>
                                <div class="stat-item"><span>🚚 À livrer</span><span class="stat-value">${nonLivres.length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                                <button class="btn" onclick="window.location.href='new-transport.html'">➕ Nouveau</button>
                                <button class="btn-optimize" onclick="optimiser()">🧠 Optimiser</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <div class="sidebar">
                                <button class="active" onclick="loadTransports()">🗺️ Dispatch</button>
                                <button>📦 Transports</button>
                            </div>
                            
                            <div class="map-container"><div id="map"></div></div>
                            
                            <div class="right-panel">
                                <h3>📋 Transports à livrer (${nonLivres.length})</h3>
                                <div id="transportList">
                                    ${nonLivres.map(t => `
                                        <div class="transport-item ${t.speed === '6h' ? 'urgent' : ''}">
                                            <div class="transport-client">${t.destinataire_nom || 'Client'}</div>
                                            <div class="transport-address">${(t.delivery_address || '').substring(0,50)}</div>
                                            <div style="font-size:11px; color:#666;">${t.speed} | ${t.weight || 0} kg</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    initMap();
                }
                
                // ===== INIT CARTE AVEC MARQUEURS =====
                function initMap() {
                    if (map) map.remove();
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    if (modeOptimisation) {
                        // En mode optimisation, on ne met que les dépôts
                        L.marker([depot.lat, depot.lng]).addTo(map).bindPopup("Dépôt Yverdon");
                    } else {
                        // Mode normal : tous les marqueurs
                        const markers = L.markerClusterGroup();
                        
                        L.marker([depot.lat, depot.lng]).addTo(markers).bindPopup("Dépôt Yverdon");
                        
                        allTransports.forEach((t, i) => {
                            if (t.lat && t.lng) {
                                const color = t.speed === '6h' ? '#ef4444' : '#facc15';
                                const icon = L.divIcon({
                                    html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${i+1}</div>`,
                                    iconSize: [24, 24]
                                });
                                L.marker([t.lat, t.lng], { icon }).addTo(markers).bindPopup(`
                                    <b>${t.destinataire_nom || 'Client'}</b><br>
                                    ${t.delivery_address}<br>
                                    ${t.speed} | ${t.weight} kg
                                `);
                            }
                        });
                        
                        map.addLayer(markers);
                    }
                }
                
                // ===== OPTIMISATION INTELLIGENTE =====
                window.optimiser = async function() {
                    const nonLivres = allTransports.filter(t => t.status !== 'delivered');
                    if (nonLivres.length === 0) {
                        alert("Aucun transport à optimiser");
                        return;
                    }
                    
                    modeOptimisation = true;
                    
                    document.getElementById('app').innerHTML = `
                        <div class="loader">
                            <i class="fas fa-spinner fa-spin"></i> Calcul des itinéraires...<br>
                            <small>${nonLivres.length} transports à organiser</small>
                        </div>
                    `;
                    
                    // 1. Obtenir les coordonnées
                    const points = [{ ...depot, type: 'depot' }];
                    
                    for (const t of nonLivres) {
                        if (t.lat && t.lng) {
                            points.push({
                                ...t,
                                type: 'client',
                                lat: t.lat,
                                lng: t.lng
                            });
                        } else {
                            const coords = await geocoderAdresse(t.delivery_address);
                            if (coords) {
                                points.push({
                                    ...t,
                                    type: 'client',
                                    lat: coords.lat,
                                    lng: coords.lng
                                });
                            }
                        }
                    }
                    
                    // 2. Séparer urgents et normaux
                    const urgents = points.filter(p => p.type === 'client' && p.speed === '6h');
                    const normaux = points.filter(p => p.type === 'client' && p.speed !== '6h');
                    
                    // 3. Créer les tournées
                    const tournees = [];
                    const pointsRestants = [...normaux];
                    
                    // D'abord traiter les urgents
                    for (let i = 0; i < urgents.length; i++) {
                        const urgent = urgents[i];
                        const vehicule = vehicules[i % vehicules.length];
                        
                        const tournee = {
                            vehicule: vehicule.nom,
                            stops: [urgent],
                            poidsTotal: urgent.weight || 1,
                            distanceTotal: 0,
                            dureeTotal: 0,
                            points: [[depot.lat, depot.lng], [urgent.lat, urgent.lng]]
                        };
                        
                        // Ajouter des normaux sur le chemin
                        let positionActuelle = urgent;
                        let chargeActuelle = tournee.poidsTotal;
                        
                        for (let j = pointsRestants.length - 1; j >= 0; j--) {
                            const normal = pointsRestants[j];
                            const distance = calculerDistance(positionActuelle, normal);
                            
                            // Si le point est dans un rayon acceptable (30km)
                            if (distance < 30 && chargeActuelle + (normal.weight || 1) <= vehicule.capacite) {
                                tournee.stops.push(normal);
                                tournee.points.push([normal.lat, normal.lng]);
                                tournee.poidsTotal += normal.weight || 1;
                                chargeActuelle += normal.weight || 1;
                                pointsRestants.splice(j, 1);
                                positionActuelle = normal;
                            }
                        }
                        
                        // Retour au dépôt
                        tournee.points.push([depot.lat, depot.lng]);
                        tournees.push(tournee);
                    }
                    
                    // Ensuite traiter les normaux restants
                    let indexVehicule = 0;
                    while (pointsRestants.length > 0) {
                        const vehicule = vehicules[indexVehicule % vehicules.length];
                        const tournee = {
                            vehicule: vehicule.nom,
                            stops: [],
                            poidsTotal: 0,
                            distanceTotal: 0,
                            dureeTotal: 0,
                            points: [[depot.lat, depot.lng]]
                        };
                        
                        let positionActuelle = depot;
                        
                        for (let j = pointsRestants.length - 1; j >= 0; j--) {
                            const normal = pointsRestants[j];
                            if (tournee.poidsTotal + (normal.weight || 1) <= vehicule.capacite) {
                                tournee.stops.push(normal);
                                tournee.points.push([normal.lat, normal.lng]);
                                tournee.poidsTotal += normal.weight || 1;
                                pointsRestants.splice(j, 1);
                            }
                        }
                        
                        if (tournee.stops.length > 0) {
                            tournee.points.push([depot.lat, depot.lng]);
                            tournees.push(tournee);
                        }
                        
                        indexVehicule++;
                    }
                    
                    afficherOptimisation(tournees);
                };
                
                // ===== CALCUL DISTANCE =====
                function calculerDistance(a, b) {
                    const R = 6371;
                    const dLat = (b.lat - a.lat) * Math.PI / 180;
                    const dLon = (b.lng - a.lng) * Math.PI / 180;
                    const lat1 = a.lat * Math.PI / 180;
                    const lat2 = b.lat * Math.PI / 180;
                    
                    const A = Math.sin(dLat/2) * Math.sin(dLat/2) +
                              Math.sin(dLon/2) * Math.sin(dLon/2) * Math.cos(lat1) * Math.cos(lat2);
                    const C = 2 * Math.atan2(Math.sqrt(A), Math.sqrt(1-A));
                    return R * C;
                }
                
                // ===== AFFICHAGE OPTIMISATION AVEC ROUTES =====
                async function afficherOptimisation(tournees) {
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Tournées optimisées</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tournees.length}</span></div>
                                <div class="stat-item"><span>📦 Total</span><span class="stat-value">${tournees.reduce((acc, t) => acc + t.stops.length, 0)}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn" onclick="loadTransports()">← Retour</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <div class="sidebar">
                                <button onclick="loadTransports()">🗺️ Dispatch</button>
                                <button class="active">🧠 Résultat</button>
                            </div>
                            
                            <div class="map-container"><div id="map"></div></div>
                            
                            <div class="right-panel">
                                <h3>📋 Tournées proposées</h3>
                                <div id="tourneesList">
                                    ${tournees.map((t, idx) => `
                                        <div class="tour-item">
                                            <div class="tour-header">
                                                <span>🚚 ${t.vehicule}</span>
                                                <span>${t.stops.length} arrêts | ${t.poidsTotal.toFixed(0)} kg</span>
                                            </div>
                                            ${t.stops.map((s, i) => `
                                                <div class="tour-stop">
                                                    <div class="stop-client">${i+1}. ${s.destinataire_nom || 'Client'}</div>
                                                    <div class="stop-address">${s.delivery_address?.substring(0,40)}</div>
                                                    <div class="stop-time">${s.speed || '24h'} | ${s.weight || 0} kg</div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    // Initialiser la carte
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    // Ajouter le dépôt
                    L.marker([depot.lat, depot.lng]).addTo(map).bindPopup("Dépôt Yverdon");
                    
                    // Ajouter les marqueurs clients
                    const couleurs = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
                    
                    tournees.forEach((t, index) => {
                        t.stops.forEach((s, i) => {
                            const color = s.speed === '6h' ? '#ef4444' : couleurs[index % couleurs.length];
                            const icon = L.divIcon({
                                html: `<div style="background:${color}; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white; font-size:10px;">${i+1}</div>`,
                                iconSize: [20, 20]
                            });
                            L.marker([s.lat, s.lng], { icon }).addTo(map).bindPopup(`
                                <b>${s.destinataire_nom || 'Client'}</b><br>
                                ${s.delivery_address}
                            `);
                        });
                        
                        // Dessiner les routes (simulées pour l'instant)
                        const points = [[depot.lat, depot.lng], ...t.stops.map(s => [s.lat, s.lng]), [depot.lat, depot.lng]];
                        L.polyline(points, {
                            color: couleurs[index % couleurs.length],
                            weight: 3,
                            opacity: 0.7,
                            dashArray: '5, 5'
                        }).addTo(map);
                    });
                }
                
                window.logout = function() {
                    localStorage.removeItem('user');
                    window.location.href = '../login/';
                };
                
                await loadTransports();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
