<!-- MODAL AVEC TOUTES LES FONCTIONNALITÉS -->
<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>➕ Nouveau transport</h3>
            <button id="closeModalBtn">✖</button>
        </div>
        
        <div class="modal-content">
            <form id="transportForm">
                
                <!-- SECTION CLIENT (avec adresse de départ auto) -->
                <div class="section">
                    <h4 class="section-title"><i class="fas fa-user-circle"></i> Expéditeur</h4>
                    
                    <div class="form-group">
                        <label>Numéro client</label>
                        <input type="text" id="clientNumberDisplay" readonly style="background:#2a2a2a;" value="CL2025-001">
                    </div>
                    
                    <div class="form-group">
                        <label>Nom / Société</label>
                        <input type="text" id="clientNameDisplay" readonly style="background:#2a2a2a;" value="Dupont Jean">
                    </div>
                    
                    <div class="form-group">
                        <label>Adresse de départ</label>
                        <input type="text" id="departAddress" readonly style="background:#2a2a2a;" value="Impasse des Griottes 3, 1462 Yvonand">
                    </div>
                </div>
                
                <!-- SECTION LIVRAISON (structure pour QR) -->
                <div class="section">
                    <h4 class="section-title"><i class="fas fa-map-marked-alt"></i> Destinataire</h4>
                    
                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label>Nom / Entreprise *</label>
                            <input type="text" id="contactName" placeholder="Jean Dupont / SARL" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Téléphone</label>
                            <input type="tel" id="contactPhone" placeholder="079 123 45 67">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label>Rue *</label>
                            <input type="text" id="street" placeholder="Rue du Simplon" required>
                        </div>
                        <div class="form-group" style="flex: 0.5;">
                            <label>N°</label>
                            <input type="text" id="streetNumber" placeholder="12">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group" style="flex: 0.5;">
                            <label>NPA *</label>
                            <input type="text" id="npa" placeholder="1000" required>
                        </div>
                        <div class="form-group" style="flex: 1.5;">
                            <label>Ville *</label>
                            <input type="text" id="city" placeholder="Lausanne" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Complément d'adresse</label>
                        <input type="text" id="addressComplement" placeholder="Étage, code, service">
                    </div>
                </div>
                
                <!-- SECTION COLIS PRINCIPAL -->
                <div class="section">
                    <h4 class="section-title"><i class="fas fa-box"></i> Colis principal</h4>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Description</label>
                            <input type="text" id="mainDescription" value="Colis principal" placeholder="Description">
                        </div>
                        <div class="form-group">
                            <label>Poids (kg)</label>
                            <input type="number" id="mainWeight" value="1" step="0.1">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Quantité</label>
                            <input type="number" id="mainQuantity" value="1" min="1">
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select id="mainType">
                                <option value="Colis">📦 Colis</option>
                                <option value="Fragile">⚠️ Fragile</option>
                                <option value="Palette">📦 Palette</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- SECTION COLIS SUPPLÉMENTAIRES -->
                <div class="section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h4 class="section-title" style="margin-bottom: 0;"><i class="fas fa-cubes"></i> Colis supplémentaires</h4>
                        <button type="button" class="btn-success" id="addParcelBtn">➕ Ajouter un colis</button>
                    </div>
                    
                    <div id="parcelsList"></div>
                    
                    <div id="parcelsTotal" style="margin-top: 15px; padding: 10px; background: #0f172a; border-radius: 4px; display: flex; justify-content: space-between;">
                        <span>📊 Poids total:</span>
                        <span id="totalParcelsWeight">1.0 kg</span>
                    </div>
                </div>
                
                <!-- SECTION SERVICE -->
                <div class="section">
                    <h4 class="section-title"><i class="fas fa-clock"></i> Service</h4>
                    <div class="form-group">
                        <label>Vitesse de livraison</label>
                        <select id="speed">
                            <option value="24h">📦 24h (Standard)</option>
                            <option value="12h">⚡ 12h (Express)</option>
                            <option value="6h">🚨 6h (Urgent)</option>
                        </select>
                    </div>
                </div>
                
                <!-- BOUTONS -->
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" id="cancelModalBtn">Annuler</button>
                    <button type="submit" class="btn-save">✅ Créer le transport</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- TEMPLATE POUR COLIS SUPPLÉMENTAIRE -->
<template id="parcelTemplate">
    <div class="parcel-item" style="background: #1f2937; padding: 15px; border-radius: 8px; margin-bottom: 10px;">
        <div class="form-row">
            <div class="form-group" style="flex: 2;">
                <input type="text" class="parcel-desc" placeholder="Description" value="Colis supplémentaire">
            </div>
            <div class="form-group" style="flex: 1;">
                <input type="number" class="parcel-weight" value="1" step="0.1">
            </div>
            <div class="form-group" style="flex: 0.5;">
                <input type="number" class="parcel-qty" value="1" min="1">
            </div>
            <div class="form-group" style="flex: 1;">
                <select class="parcel-type">
                    <option value="Colis">Colis</option>
                    <option value="Fragile">Fragile</option>
                    <option value="Palette">Palette</option>
                </select>
            </div>
            <button type="button" class="btn-delete" style="width: 40px; height: 40px;" onclick="this.parentElement.parentElement.remove()">🗑️</button>
        </div>
    </div>
</template>
