<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        header { background: #111; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #facc15; height: 70px; }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-success { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar { width: 220px; background: #111; padding: 20px; border-right: 1px solid #2a2a2a; }
        .sidebar button { width: 100%; padding: 12px; margin-bottom: 8px; background: #1f2937; color: white; border: none; border-radius: 6px; cursor: pointer; text-align: left; }
        .map-container { flex: 1; }
        #map { height: 100%; width: 100%; }
        .right-panel { width: 350px; background: #111; border-left: 1px solid #2a2a2a; padding: 20px; overflow-y: auto; }
        .right-panel h3 { color: #facc15; margin-bottom: 20px; }
        .transport-item { background: #1f2937; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 3px solid #facc15; }
        .transport-item.urgent { border-left-color: #ef4444; }
        .transport-header { display: flex; justify-content: space-between; align-items: center; }
        .transport-client { font-weight: bold; color: white; }
        .transport-route { font-size: 13px; color: #aaa; margin: 4px 0; }
        .transport-footer { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: #666; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #1f2937; border-radius: 10px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; border: 1px solid #facc15; }
        .modal-header { background: #111; padding: 15px 20px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; }
        .modal-header h3 { color: #facc15; }
        .modal-header button { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .modal-content { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #aaa; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #111; border: 1px solid #2a2a2a; color: white; border-radius: 4px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-row .form-group { flex: 1; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #2a2a2a; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; }
        .btn-save { background: #facc15; color: #111; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; font-weight: bold; }
        .section { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .section-title { color: #facc15; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .parcel-item { background: #1f2937; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="app">
        <div style="padding:20px;">Chargement...</div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Démarrage...");
                
                if (typeof L === 'undefined') throw new Error("Leaflet non chargé");
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const userData = { username: 'admin', role: 'admin' };
                
                // ===== CONSTRUCTION PAGE =====
                document.getElementById('app').innerHTML = `
                    <header>
                        <div class="logo"><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                        <div class="stats-header">
                            <div class="stat-item"><span>📦 Total</span><span class="stat-value" id="totalCount">0</span></div>
                            <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value" id="urgentCount">0</span></div>
                        </div>
                        <div class="user-section">
                            <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                            <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                            <button class="btn" id="newTransportBtn">➕ Nouveau transport</button>
                        </div>
                    </header>

                    <div class="container">
                        <div class="sidebar">
                            <button class="active">🗺️ Dispatch</button>
                            <button>📦 Transports</button>
                        </div>
                        
                        <div class="map-container"><div id="map"></div></div>
                        
                        <div class="right-panel">
                            <h3>📋 Derniers transports</h3>
                            <div id="transportList"><div class="loader"><i class="fas fa-spinner fa-spin"></i> Chargement...</div></div>
                        </div>
                    </div>

                    <!-- MODAL (placée correctement) -->
                    <div id="modal" class="modal">
                        <div class="modal-box">
                            <div class="modal-header">
                                <h3>➕ Nouveau transport</h3>
                                <button id="closeModalBtn">✖</button>
                            </div>
                            
                            <div class="modal-content">
                                <form id="transportForm">
                                    
                              <!-- SECTION CLIENT -->
<div class="section">
    <h4 class="section-title"><i class="fas fa-user-circle"></i> Client</h4>
    <div class="form-group">
        <label>Numéro client *</label>
        <input type="text" id="clientNumber" value="CL2025-001" required>
    </div>
</div>

<!-- SECTION LIVRAISON -->
<div class="section">
    <h4 class="section-title"><i class="fas fa-map-marked-alt"></i> Livraison</h4>
    
    <div class="form-row">
        <div class="form-group" style="flex: 2;">
            <label>Nom du contact *</label>
            <input type="text" id="contactName" placeholder="Jean Dupont" required>
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Téléphone</label>
            <input type="tel" id="contactPhone" placeholder="079 123 45 67">
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group" style="flex: 2;">
            <label>Rue *</label>
            <input type="text" id="street" placeholder="Rue du Simplon" required>
        </div>
        <div class="form-group" style="flex: 0.5;">
            <label>N°</label>
            <input type="text" id="streetNumber" placeholder="12">
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group" style="flex: 0.5;">
            <label>NPA *</label>
            <input type="text" id="npa" placeholder="1000" required>
        </div>
        <div class="form-group" style="flex: 1.5;">
            <label>Ville *</label>
            <input type="text" id="city" placeholder="Lausanne" required>
        </div>
    </div>
    
    <div class="form-group">
        <label>Complément</label>
        <input type="text" id="addressComplement" placeholder="2ème étage, code 1234">
    </div>
</div>

<!-- SECTION COLIS PRINCIPAL -->
<div class="section">
    <h4 class="section-title"><i class="fas fa-box"></i> Colis principal</h4>
    
    <div class="form-row">
        <div class="form-group">
            <label>Description</label>
            <input type="text" id="mainDescription" value="Colis principal">
        </div>
        <div class="form-group">
            <label>Poids (kg)</label>
            <input type="number" id="mainWeight" value="1" step="0.1">
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label>Quantité</label>
            <input type="number" id="mainQuantity" value="1" min="1">
        </div>
        <div class="form-group">
            <label>Type</label>
            <select id="mainType">
                <option value="Colis">📦 Colis</option>
                <option value="Fragile">⚠️ Fragile</option>
            </select>
        </div>
    </div>
</div>

<!-- SECTION COLIS SUPPLÉMENTAIRES -->
<div class="section">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h4 class="section-title" style="margin-bottom: 0;"><i class="fas fa-cubes"></i> Colis supplémentaires</h4>
        <button type="button" class="btn-success" id="addParcelBtn">➕ Ajouter</button>
    </div>
    
    <div id="parcelsList"></div>
    
    <div id="parcelsTotal" style="margin-top: 15px; padding: 10px; background: #0f172a; border-radius: 4px; display: flex; justify-content: space-between;">
        <span>📊 Total colis:</span>
        <span id="totalParcelsWeight">1 kg</span>
    </div>
</div>

<!-- SECTION SERVICE -->
<div class="section">
    <h4 class="section-title"><i class="fas fa-clock"></i> Service</h4>
    <div class="form-group">
        <label>Vitesse</label>
        <select id="speed">
            <option value="24h">📦 24h</option>
            <option value="12h">⚡ 12h</option>
            <option value="6h">🚨 6h</option>
        </select>
    </div>
</div>
                    <!-- TEMPLATE POUR COLIS -->
                    <template id="parcelTemplate">
                        <div class="parcel-item">
                            <div class="form-row">
                                <div class="form-group" style="flex: 2;">
                                    <input type="text" class="parcel-desc" placeholder="Description">
                                </div>
                                <div class="form-group" style="flex: 1;">
                                    <input type="number" class="parcel-weight" value="1" step="0.1">
                                </div>
                                <div class="form-group" style="flex: 0.5;">
                                    <input type="number" class="parcel-qty" value="1" min="1">
                                </div>
                                <div class="form-group" style="flex: 1;">
                                    <select class="parcel-type">
                                        <option value="Colis">Colis</option>
                                        <option value="Fragile">Fragile</option>
                                    </select>
                                </div>
                                <button type="button" class="btn-delete" style="width: 40px; height: 40px;" onclick="this.parentElement.parentElement.remove()">🗑️</button>
                            </div>
                        </div>
                    </template>
                `;
                
                // ===== RÉFÉRENCES =====
                const modal = document.getElementById('modal');
                const newBtn = document.getElementById('newTransportBtn');
                const closeBtn = document.getElementById('closeModalBtn');
                const cancelBtn = document.getElementById('cancelModalBtn');
                const addParcelBtn = document.getElementById('addParcelBtn');
                const parcelsList = document.getElementById('parcelsList');
                const parcelTemplate = document.getElementById('parcelTemplate');
                const form = document.getElementById('transportForm');
                const logoutBtn = document.getElementById('logoutBtn');
                
                // ===== VÉRIFICATION =====
                console.log("modal:", modal ? "✅" : "❌");
                console.log("newBtn:", newBtn ? "✅" : "❌");
                console.log("closeBtn:", closeBtn ? "✅" : "❌");
                console.log("cancelBtn:", cancelBtn ? "✅" : "❌");
                console.log("addParcelBtn:", addParcelBtn ? "✅" : "❌");
                
                // ===== GESTION MODAL =====
                if (newBtn) newBtn.onclick = () => modal.style.display = 'flex';
                if (closeBtn) closeBtn.onclick = () => modal.style.display = 'none';
                if (cancelBtn) cancelBtn.onclick = () => modal.style.display = 'none';
                
                // ===== GESTION COLIS =====
                if (addParcelBtn && parcelsList && parcelTemplate) {
                    addParcelBtn.onclick = function() {
                        const clone = parcelTemplate.content.cloneNode(true);
                        parcelsList.appendChild(clone);
                        updateParcelsTotal();
                    };
                }
                
                function updateParcelsTotal() {
                    let total = parseFloat(document.getElementById('mainWeight')?.value || 1) * parseInt(document.getElementById('mainQuantity')?.value || 1);
                    
                    document.querySelectorAll('.parcel-item').forEach(item => {
                        const weight = parseFloat(item.querySelector('.parcel-weight')?.value) || 0;
                        const qty = parseInt(item.querySelector('.parcel-qty')?.value) || 1;
                        total += weight * qty;
                    });
                    
                    const totalEl = document.getElementById('totalParcelsWeight');
                    if (totalEl) totalEl.textContent = total.toFixed(1) + ' kg';
                }
                
                document.getElementById('mainWeight')?.addEventListener('input', updateParcelsTotal);
                document.getElementById('mainQuantity')?.addEventListener('input', updateParcelsTotal);
                
                // ===== DÉCONNEXION =====
                if (logoutBtn) {
                    logoutBtn.onclick = () => {
                        localStorage.removeItem('user');
                        window.location.href = '../login/';
                    };
                }
                
                // ===== CARTE =====
                const map = L.map('map').setView([46.8, 8.2], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                const markers = L.markerClusterGroup();
                map.addLayer(markers);
                
                // ===== CHARGEMENT TRANSPORTS =====
                async function loadTransports() {
                    try {
                        const { data, error } = await supabase
                            .from('transport_orders_simple')
                            .select('*')
                            .order('created_at', { ascending: false });
                        
                        if (error) throw error;
                        
                        document.getElementById('totalCount').textContent = data?.length || 0;
                        document.getElementById('urgentCount').textContent = data?.filter(t => t.speed === '6h').length || 0;
                        
                        let html = '';
                        markers.clearLayers();
                        
                        data?.forEach((t, index) => {
                            const isUrgent = t.speed === '6h';
                            
                            html += `
                                <div class="transport-item ${isUrgent ? 'urgent' : ''}">
                                    <div class="transport-header">
                                        <span class="transport-client">${t.client_number || '?'}</span>
                                        <button class="btn-delete" onclick="supprimerTransport('${t.id}')">🗑️</button>
                                    </div>
                                    <div class="transport-route">🎯 ${t.delivery_address?.substring(0,30) || '?'}</div>
                                    <div class="transport-footer">
                                        <span>${t.order_number || ''}</span>
                                        <span>${t.weight || 0} kg</span>
                                    </div>
                                </div>
                            `;
                            
                            let lat = 46.8, lng = 8.2;
                            const color = isUrgent ? '#ef4444' : '#facc15';
                            const icon = L.divIcon({
                                html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${index+1}</div>`,
                                iconSize: [24, 24]
                            });
                            
                            L.marker([lat, lng], { icon }).addTo(markers);
                        });
                        
                        document.getElementById('transportList').innerHTML = html || '<div style="text-align:center; padding:20px;">Aucun transport</div>';
                        
                    } catch(e) {
                        console.error("Erreur chargement:", e);
                    }
                }
                
                // ===== SUPPRESSION =====
                window.supprimerTransport = async function(id) {
                    if (!confirm('⚠️ Supprimer ce transport ?')) return;
                    try {
                        await supabase.from('transport_orders_simple').delete().eq('id', id);
                        loadTransports();
                    } catch(e) { alert('❌ Erreur: ' + e.message); }
                };
                
                // ===== CRÉATION =====
                if (form) {
                    form.onsubmit = async function(e) {
                        e.preventDefault();
                        
                        const orderNumber = 'TR-' + Date.now().toString().slice(-6);
                        
                        const fullAddress = `${document.getElementById('street').value} ${document.getElementById('streetNumber').value}, ${document.getElementById('npa').value} ${document.getElementById('city').value}`;
                        const addressComplement = document.getElementById('addressComplement').value;
                        
                        const transport = {
                            order_number: orderNumber,
                            client_number: document.getElementById('clientNumber').value,
                            delivery_address: fullAddress + (addressComplement ? ' (' + addressComplement + ')' : ''),
                            contact_name: document.getElementById('contactName').value,
                            contact_phone: document.getElementById('contactPhone').value,
                            weight: parseFloat(document.getElementById('mainWeight').value) || 1,
                            quantity: parseInt(document.getElementById('mainQuantity').value) || 1,
                            package_type: document.getElementById('mainType').value,
                            speed: document.getElementById('speed').value,
                            priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
                            status: 'pending',
                            created_at: new Date()
                        };
                        
                        if (!transport.client_number || !transport.delivery_address) {
                            alert('Numéro client et adresse requis');
                            return;
                        }
                        
                        try {
                            await supabase.from('transport_orders_simple').insert([transport]);
                            alert(`✅ Transport ${orderNumber} créé !`);
                            modal.style.display = 'none';
                            loadTransports();
                        } catch(e) { alert('❌ Erreur: ' + e.message); }
                    };
                }
                
                // ===== LANCEMENT =====
                loadTransports();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
        // ===== GESTION DES COLIS SUPPLÉMENTAIRES =====
const addParcelBtn = document.getElementById('addParcelBtn');
const parcelsList = document.getElementById('parcelsList');
const parcelTemplate = document.getElementById('parcelTemplate');

if (addParcelBtn && parcelsList && parcelTemplate) {
    addParcelBtn.onclick = function() {
        const clone = parcelTemplate.content.cloneNode(true);
        parcelsList.appendChild(clone);
        updateTotalWeight();
    };
}

function updateTotalWeight() {
    let total = parseFloat(document.getElementById('mainWeight').value) * parseInt(document.getElementById('mainQuantity').value);
    
    document.querySelectorAll('.parcel-item').forEach(item => {
        const weight = parseFloat(item.querySelector('.parcel-weight')?.value) || 0;
        const qty = parseInt(item.querySelector('.parcel-qty')?.value) || 1;
        total += weight * qty;
    });
    
    const totalEl = document.getElementById('totalParcelsWeight');
    if (totalEl) totalEl.textContent = total.toFixed(1) + ' kg';
}

// Mettre à jour le total à chaque changement
document.getElementById('mainWeight')?.addEventListener('input', updateTotalWeight);
document.getElementById('mainQuantity')?.addEventListener('input', updateTotalWeight);
        // ===== CHARGER LES INFOS DU CLIENT CONNECTÉ =====
async function loadClientInfo() {
    const user = JSON.parse(localStorage.getItem('user'));
    if (user && user.username) {
        try {
            const { data, error } = await supabase
                .from('clients')
                .select('client_number, company_name, contact_name, default_pickup_address')
                .eq('client_number', user.username)
                .single();
            
            if (data && !error) {
                document.getElementById('clientNumberDisplay').value = data.client_number;
                document.getElementById('clientNameDisplay').value = data.company_name || data.contact_name || '';
                document.getElementById('departAddress').value = data.default_pickup_address || 'Impasse des Griottes 3, 1462 Yvonand';
            }
        } catch(e) {
            console.error('Erreur chargement client:', e);
        }
    }
}

// Appeler au chargement
loadClientInfo();
        // ===== CONSTRUCTION DE L'ADRESSE POUR QR CODE =====
const fullAddress = `${document.getElementById('street').value} ${document.getElementById('streetNumber').value}, ${document.getElementById('npa').value} ${document.getElementById('city').value}`;
const complement = document.getElementById('addressComplement').value;

const qrData = `${document.getElementById('clientNumberDisplay').value}|${document.getElementById('departAddress').value}|${fullAddress}|${totalWeight}`;
    </script>
    
</body>
</html>
</div>
