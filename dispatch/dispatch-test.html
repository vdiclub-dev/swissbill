<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Créer transport</title>
    
    <!-- Pas de Supabase JS, on va utiliser fetch directement -->
    <script src="config.js"></script>
    
    <style>
        body { background:#111; color:white; padding:20px; font-family:system-ui; }
        .form-group { margin-bottom:15px; }
        label { display:block; color:#aaa; margin-bottom:5px; }
        input { width:100%; padding:10px; background:#1f2937; border:1px solid #2a2a2a; color:white; border-radius:4px; }
        button { background:#facc15; color:#111; border:none; padding:12px 24px; border-radius:4px; font-weight:bold; cursor:pointer; margin-top:20px; }
        .result { margin-top:20px; padding:15px; background:#1f2937; border-radius:4px; }
        .success { color:#10b981; }
        .error { color:#ef4444; }
    </style>
</head>
<body>
    
    <h1>➕ Créer un transport</h1>
    
    <form id="transportForm">
        <div class="form-group">
            <label>Numéro client</label>
            <input type="text" id="clientNumber" value="CL2025-001" required>
        </div>
        
        <div class="form-group">
            <label>Adresse de livraison</label>
            <input type="text" id="deliveryAddress" value="Rue du Lac 12, 1000 Lausanne" required>
        </div>
        
        <div class="form-group">
            <label>Poids (kg)</label>
            <input type="number" id="weight" value="2.5" step="0.1">
        </div>
        
        <button type="submit">Créer le transport</button>
    </form>
    
    <div id="result" class="result"></div>
    
    <script>
        document.getElementById('transportForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            try {
                if (!window.SUPABASE_CONFIG) {
                    throw new Error("config.js non chargé");
                }
                
                const year = new Date().getFullYear();
                const random = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
                const orderNumber = `TR-${year}-${random}`;
                
                // Données minimales
                const transport = {
                    order_number: orderNumber,
                    client_number: document.getElementById('clientNumber').value,
                    delivery_address: document.getElementById('deliveryAddress').value,
                    weight: parseFloat(document.getElementById('weight').value) || 1,
                    status: 'pending',
                    created_at: new Date().toISOString()
                };
                
                console.log("Envoi:", transport);
                
                // Appel direct à l'API REST Supabase
                const response = await fetch(`${window.SUPABASE_CONFIG.url}/rest/v1/transport_orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': window.SUPABASE_CONFIG.key,
                        'Authorization': `Bearer ${window.SUPABASE_CONFIG.key}`
                    },
                    body: JSON.stringify(transport)
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(JSON.stringify(errorData, null, 2));
                }
                
                const data = await response.json();
                
                document.getElementById('result').innerHTML = `
                    <h3 class="success">✅ Transport créé !</h3>
                    <p>N°: ${orderNumber}</p>
                `;
                
            } catch(e) {
                console.error('Erreur:', e);
                document.getElementById('result').innerHTML = `
                    <h3 class="error">❌ Erreur</h3>
                    <pre style="color:#ef4444; font-size:12px;">${e.message}</pre>
                `;
            }
        });
    </script>
    
</body>
</html>
