<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch | Optimisation</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        header { background: #111; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #facc15; height: 70px; }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-optimize { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar { width: 220px; background: #111; padding: 20px; border-right: 1px solid #2a2a2a; }
        .sidebar button { width: 100%; padding: 12px; margin-bottom: 8px; background: #1f2937; color: white; border: none; border-radius: 6px; cursor: pointer; text-align: left; }
        .map-container { flex: 1; }
        #map { height: 100%; width: 100%; }
        .right-panel { width: 400px; background: #111; border-left: 1px solid #2a2a2a; padding: 20px; overflow-y: auto; }
        .right-panel h3 { color: #facc15; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .transport-item { background: #1f2937; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 3px solid #facc15; }
        .transport-item.urgent { border-left-color: #ef4444; }
        .tour-item { background: #2a2a2a; padding: 15px; margin-bottom: 15px; border-radius: 6px; border-left: 3px solid #3b82f6; }
        .tour-header { display: flex; justify-content: space-between; color: #3b82f6; font-weight: bold; margin-bottom: 10px; }
        .tour-stop { padding: 8px 0 8px 15px; border-bottom: 1px solid #3a3a3a; font-size: 13px; }
        .stop-time { font-size: 11px; color: #facc15; margin-left: 20px; }
        .loader { text-align: center; padding: 20px; color: #aaa; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #1f2937; border-radius: 10px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; border: 1px solid #facc15; }
        .modal-header { background: #111; padding: 15px 20px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; }
        .modal-header h3 { color: #facc15; }
        .modal-header button { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .modal-content { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #aaa; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #111; border: 1px solid #2a2a2a; color: white; border-radius: 4px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-row .form-group { flex: 1; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #2a2a2a; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; }
        .btn-save { background: #facc15; color: #111; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; font-weight: bold; }
        .section { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .section-title { color: #facc15; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <div id="app">
        <div style="padding:20px;">Chargement...</div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Démarrage...");
                
                if (typeof L === 'undefined') throw new Error("Leaflet non chargé");
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const userData = { username: 'admin', role: 'admin' };
                
                // ===== CONSTRUCTION PAGE =====
                document.getElementById('app').innerHTML = `
                    <header>
                        <div class="logo"><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                        <div class="stats-header">
                            <div class="stat-item"><span>📦 Total</span><span class="stat-value" id="totalCount">0</span></div>
                            <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value" id="urgentCount">0</span></div>
                        </div>
                        <div class="user-section">
                            <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                            <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                            <button class="btn" id="newTransportBtn">➕ Nouveau</button>
                        </div>
                    </header>

                    <div class="container">
                        <div class="sidebar">
                            <button class="active" id="btnDispatch">🗺️ Dispatch</button>
                            <button id="btnOptimize">🧠 Optimisation</button>
                        </div>
                        
                        <div class="map-container"><div id="map"></div></div>
                        
                        <div class="right-panel">
                            <h3 id="panelTitle">📋 Transports en attente
                                <button class="btn-optimize" id="optimizeBtn">🧠 Optimiser</button>
                            </h3>
                            <div id="transportList"><div class="loader"><i class="fas fa-spinner fa-spin"></i> Chargement...</div></div>
                        </div>
                    </div>

                    <!-- MODAL -->
                    <div id="modal" class="modal">
                        <div class="modal-box">
                            <div class="modal-header">
                                <h3>➕ Nouveau transport</h3>
                                <button id="closeModalBtn">✖</button>
                            </div>
                            
                            <div class="modal-content">
                                <form id="transportForm">
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-user-circle"></i> Client</h4>
                                        <div class="form-group">
                                            <label>Numéro client *</label>
                                            <input type="text" id="clientNumber" value="CL2025-001" required>
                                        </div>
                                    </div>
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-user-tag"></i> Destinataire</h4>
                                        <div class="form-row">
                                            <div class="form-group" style="flex: 2;">
                                                <label>Nom *</label>
                                                <input type="text" id="destinataireNom" required>
                                            </div>
                                            <div class="form-group" style="flex: 1;">
                                                <label>Téléphone</label>
                                                <input type="tel" id="destinataireTel">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-map-marked-alt"></i> Adresse</h4>
                                        <div class="form-row">
                                            <div class="form-group" style="flex: 2;">
                                                <label>Rue *</label>
                                                <input type="text" id="street" required>
                                            </div>
                                            <div class="form-group" style="flex: 0.5;">
                                                <label>N°</label>
                                                <input type="text" id="streetNumber">
                                            </div>
                                        </div>
                                        <div class="form-row">
                                            <div class="form-group" style="flex: 0.5;">
                                                <label>NPA *</label>
                                                <input type="text" id="npa" required>
                                            </div>
                                            <div class="form-group" style="flex: 1.5;">
                                                <label>Ville *</label>
                                                <input type="text" id="city" required>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-box"></i> Colis</h4>
                                        <div class="form-row">
                                            <div class="form-group">
                                                <label>Poids (kg)</label>
                                                <input type="number" id="weight" value="1" step="0.1">
                                            </div>
                                            <div class="form-group">
                                                <label>Vitesse</label>
                                                <select id="speed">
                                                    <option value="24h">📦 24h</option>
                                                    <option value="12h">⚡ 12h</option>
                                                    <option value="6h">🚨 6h</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="modal-buttons">
                                        <button type="button" class="btn-cancel" id="cancelModalBtn">Annuler</button>
                                        <button type="submit" class="btn-save">✅ Créer</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                `;
                
                // ===== RÉFÉRENCES =====
                const modal = document.getElementById('modal');
                const newBtn = document.getElementById('newTransportBtn');
                const closeBtn = document.getElementById('closeModalBtn');
                const cancelBtn = document.getElementById('cancelModalBtn');
                const form = document.getElementById('transportForm');
                const logoutBtn = document.getElementById('logoutBtn');
                const optimizeBtn = document.getElementById('optimizeBtn');
                
                // ===== GESTION MODAL =====
                if (newBtn) newBtn.onclick = () => modal.style.display = 'flex';
                if (closeBtn) closeBtn.onclick = () => modal.style.display = 'none';
                if (cancelBtn) cancelBtn.onclick = () => modal.style.display = 'none';
                
                // ===== DÉCONNEXION =====
                if (logoutBtn) {
                    logoutBtn.onclick = () => {
                        localStorage.removeItem('user');
                        window.location.href = '../login/';
                    };
                }
                
                // ===== CARTE =====
                const map = L.map('map').setView([46.8, 8.2], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                const markers = L.markerClusterGroup();
                map.addLayer(markers);
                
                // ===== DONNÉES =====
                let allTransports = [];
                
                // Dépôt
                const depot = {
                    nom: "Dépôt Yverdon",
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== GÉOCODAGE SIMPLE =====
                function getCityCoordinates(adresse) {
                    const adr = (adresse || '').toLowerCase();
                    if (adr.includes('lausanne')) return { lat: 46.52, lng: 6.63 };
                    if (adr.includes('geneve')) return { lat: 46.20, lng: 6.14 };
                    if (adr.includes('yverdon')) return { lat: 46.78, lng: 6.64 };
                    if (adr.includes('berne')) return { lat: 46.95, lng: 7.45 };
                    if (adr.includes('fribourg')) return { lat: 46.80, lng: 7.15 };
                    return { lat: 46.8, lng: 8.2 };
                }
                
                // ===== CALCUL DE DISTANCE (formule Haversine) =====
                function calculerDistance(lat1, lon1, lat2, lon2) {
                    const R = 6371; // Rayon de la Terre en km
                    const dLat = (lat2 - lat1) * Math.PI / 180;
                    const dLon = (lon2 - lon1) * Math.PI / 180;
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                             Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                             Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                }
                
                // ===== CALCUL DU TEMPS (vitesse moyenne 50 km/h) =====
                function calculerTemps(distanceKm) {
                    return (distanceKm / 50) * 3600; // en secondes
                }
                
                // ===== CHARGEMENT TRANSPORTS =====
                async function loadTransports() {
                    try {
                        const { data, error } = await supabase
                            .from('transport_orders_simple')
                            .select('*')
                            .order('created_at', { ascending: false });
                        
                        if (error) throw error;
                        
                        allTransports = data || [];
                        
                        document.getElementById('totalCount').textContent = allTransports.length;
                        document.getElementById('urgentCount').textContent = allTransports.filter(t => t.speed === '6h').length;
                        
                        afficherTransports();
                        
                    } catch(e) {
                        console.error("Erreur chargement:", e);
                    }
                }
                
                // ===== AFFICHAGE NORMAL =====
                function afficherTransports() {
                    document.getElementById('panelTitle').innerHTML = '📋 Transports en attente <button class="btn-optimize" id="optimizeBtn">🧠 Optimiser</button>';
                    
                    let html = '';
                    markers.clearLayers();
                    
                    // Ajouter le dépôt
                    const depotIcon = L.divIcon({
                        html: '<div style="background:#0f172a; border:2px solid #facc15; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-weight:bold;">🏢</div>',
                        iconSize: [30, 30]
                    });
                    L.marker([depot.lat, depot.lng], { icon: depotIcon }).addTo(markers).bindPopup("Dépôt Yverdon");
                    
                    allTransports.forEach((t, index) => {
                        const isUrgent = t.speed === '6h';
                        const coords = getCityCoordinates(t.delivery_address);
                        
                        html += `
                            <div class="transport-item ${isUrgent ? 'urgent' : ''}">
                                <div style="display:flex; justify-content:space-between;">
                                    <div>
                                        <div><strong>${t.destinataire_nom || '?'}</strong></div>
                                        <div style="font-size:12px; color:#aaa;">${(t.delivery_address || '').substring(0, 30)}</div>
                                    </div>
                                    <button class="btn-delete" onclick="supprimerTransport('${t.id}')">🗑️</button>
                                </div>
                                <div style="display:flex; justify-content:space-between; margin-top:5px; font-size:11px;">
                                    <span>${t.speed || '24h'}</span>
                                    <span>${t.weight || 0} kg</span>
                                </div>
                            </div>
                        `;
                        
                        const color = isUrgent ? '#ef4444' : '#facc15';
                        const icon = L.divIcon({
                            html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${index+1}</div>`,
                            iconSize: [24, 24]
                        });
                        
                        L.marker([coords.lat, coords.lng], { icon }).addTo(markers);
                    });
                    
                    document.getElementById('transportList').innerHTML = html || '<div>Aucun transport</div>';
                    
                    document.getElementById('optimizeBtn').onclick = optimiserTournees;
                }
                
                // ===== OPTIMISATION SIMPLE =====
                function optimiserTournees() {
                    if (allTransports.length === 0) {
                        alert("Aucun transport à optimiser");
                        return;
                    }
                    
                    // Trier par urgence (6h en premier)
                    const transportsTries = [...allTransports].sort((a, b) => {
                        if (a.speed === '6h' && b.speed !== '6h') return -1;
                        if (a.speed !== '6h' && b.speed === '6h') return 1;
                        return 0;
                    });
                    
                    // 3 véhicules
                    const nbVehicules = 3;
                    const tournees = Array(nbVehicules).fill().map(() => []);
                    const tempsVehicules = Array(nbVehicules).fill(0);
                    
                    // Répartir les transports
                    transportsTries.forEach(t => {
                        // Trouver le véhicule avec le moins de temps
                        let meilleurVehicule = 0;
                        for (let i = 1; i < nbVehicules; i++) {
                            if (tempsVehicules[i] < tempsVehicules[meilleurVehicule]) {
                                meilleurVehicule = i;
                            }
                        }
                        
                        tournees[meilleurVehicule].push(t);
                        
                        // Calculer le temps de trajet estimé
                        const coords = getCityCoordinates(t.delivery_address);
                        const distance = calculerDistance(depot.lat, depot.lng, coords.lat, coords.lng);
                        const tempsTrajet = calculerTemps(distance);
                        tempsVehicules[meilleurVehicule] += tempsTrajet + 900; // 15 min de service
                    });
                    
                    // Afficher les tournées
                    document.getElementById('panelTitle').innerHTML = '🧠 Tournées optimisées <button class="btn-optimize" id="backBtn">← Retour</button>';
                    
                    let html = '';
                    
                    for (let v = 0; v < nbVehicules; v++) {
                        if (tournees[v].length === 0) continue;
                        
                        const heureDepart = 8 * 3600; // 8h00
                        let tempsActuel = heureDepart;
                        
                        html += `
                            <div class="tour-item">
                                <div class="tour-header">
                                    <span>🚚 Véhicule ${v+1}</span>
                                    <span>${tournees[v].length} arrêts</span>
                                </div>
                                <div class="tour-stop">
                                    <strong>Départ dépôt</strong>
                                    <div class="stop-time">🕐 ${formatTime(tempsActuel)}</div>
                                </div>
                        `;
                        
                        tournees[v].forEach((t, idx) => {
                            const coords = getCityCoordinates(t.delivery_address);
                            const distance = idx === 0 
                                ? calculerDistance(depot.lat, depot.lng, coords.lat, coords.lng)
                                : 0; // Simplifié
                            
                            tempsActuel += calculerTemps(distance);
                            
                            html += `
                                <div class="tour-stop">
                                    <strong>${idx+1}. ${t.destinataire_nom || 'Client'}</strong><br>
                                    <span style="font-size:11px;">${(t.delivery_address || '').substring(0,30)}</span>
                                    <div class="stop-time">🕐 Arrivée: ${formatTime(tempsActuel)}</div>
                                </div>
                            `;
                            
                            tempsActuel += 900; // 15 min de service
                        });
                        
                        // Retour au dépôt
                        const dernier = tournees[v][tournees[v].length - 1];
                        if (dernier) {
                            const coordsDepot = getCityCoordinates(dernier.delivery_address);
                            const distanceRetour = calculerDistance(coordsDepot.lat, coordsDepot.lng, depot.lat, depot.lng);
                            tempsActuel += calculerTemps(distanceRetour);
                            
                            html += `
                                <div class="tour-stop">
                                    <strong>Retour dépôt</strong>
                                    <div class="stop-time">🕐 ${formatTime(tempsActuel)}</div>
                                </div>
                            `;
                        }
                        
                        const heures = Math.floor(tempsActuel / 3600);
                        const minutes = Math.floor((tempsActuel % 3600) / 60);
                        html += `<div style="margin-top:8px; font-size:11px; color:#aaa;">Fin de service: ${heures}h${minutes.toString().padStart(2,'0')}</div>`;
                        html += `</div>`;
                    }
                    
                    document.getElementById('transportList').innerHTML = html;
                    document.getElementById('backBtn').onclick = afficherTransports;
                }
                
                // ===== FORMATER L'HEURE =====
                function formatTime(seconds) {
                    const heures = Math.floor(seconds / 3600);
                    const minutes = Math.floor((seconds % 3600) / 60);
                    return `${heures.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
                }
                
                // ===== SUPPRESSION =====
                window.supprimerTransport = async function(id) {
                    if (!confirm('⚠️ Supprimer ce transport ?')) return;
                    try {
                        await supabase.from('transport_orders_simple').delete().eq('id', id);
                        await loadTransports();
                    } catch(e) { alert('❌ Erreur: ' + e.message); }
                };
                
                // ===== CRÉATION =====
                if (form) {
                    form.onsubmit = async function(e) {
                        e.preventDefault();
                        
                        const orderNumber = 'TR-' + Date.now().toString().slice(-6);
                        const fullAddress = `${document.getElementById('street').value} ${document.getElementById('streetNumber').value}, ${document.getElementById('npa').value} ${document.getElementById('city').value}`;
                        
                        const transport = {
                            order_number: orderNumber,
                            client_number: document.getElementById('clientNumber').value,
                            destinataire_nom: document.getElementById('destinataireNom').value,
                            destinataire_tel: document.getElementById('destinataireTel').value,
                            delivery_address: fullAddress,
                            weight: parseFloat(document.getElementById('weight').value) || 1,
                            quantity: 1,
                            speed: document.getElementById('speed').value,
                            priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
                            status: 'pending',
                            created_at: new Date()
                        };
                        
                        try {
                            await supabase.from('transport_orders_simple').insert([transport]);
                            alert(`✅ Transport créé !`);
                            modal.style.display = 'none';
                            await loadTransports();
                        } catch(e) { alert('❌ Erreur: ' + e.message); }
                    };
                }
                
                // ===== LANCEMENT =====
                await loadTransports();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
        // ===== OPTIMISATION GÉOGRAPHIQUE INTELLIGENTE =====
function optimiserTournees() {
    if (allTransports.length === 0) {
        alert("Aucun transport à optimiser");
        return;
    }
    
    // 1. Préparer les transports avec leurs coordonnées
    const transportsAvecCoords = allTransports.map(t => {
        const coords = getCityCoordinates(t.delivery_address);
        return {
            ...t,
            lat: coords.lat,
            lng: coords.lng,
            urgent: t.speed === '6h'
        };
    });
    
    // 2. Séparer les urgents (6h) des normaux
    const urgents = transportsAvecCoords.filter(t => t.urgent);
    const normaux = transportsAvecCoords.filter(t => !t.urgent);
    
    // 3. Créer les tournées
    const tournees = [];
    const transportsAssignes = new Set();
    
    // === FONCTION POUR TROUVER LE CLUSTER LE PLUS PROCHE ===
    function trouverClusterAutour(point, transportsDisponibles, rayonKm = 30) {
        const cluster = [];
        const aRetirer = [];
        
        for (let i = 0; i < transportsDisponibles.length; i++) {
            const t = transportsDisponibles[i];
            const distance = calculerDistance(
                point.lat, point.lng,
                t.lat, t.lng
            );
            
            if (distance <= rayonKm) {
                cluster.push(t);
                aRetirer.push(i);
            }
        }
        
        // Retirer du plus loin au plus près pour ne pas casser les indices
        for (let i = aRetirer.length - 1; i >= 0; i--) {
            transportsDisponibles.splice(aRetirer[i], 1);
        }
        
        return cluster;
    }
    
    // === TRAITER LES URGENTS D'ABORD ===
    // Copie des tableaux
    let urgentsRestants = [...urgents];
    let normauxRestants = [...normaux];
    
    // Pour chaque urgent, créer une tournée avec les normaux proches
    while (urgentsRestants.length > 0) {
        const urgent = urgentsRestants.shift();
        
        // Chercher les normaux dans un rayon de 30km autour de l'urgent
        const cluster = trouverClusterAutour(urgent, normauxRestants, 30);
        
        // Créer la tournée : urgent + cluster trié par distance
        const tournee = [urgent, ...cluster.sort((a, b) => {
            const distA = calculerDistance(urgent.lat, urgent.lng, a.lat, a.lng);
            const distB = calculerDistance(urgent.lat, urgent.lng, b.lat, b.lng);
            return distA - distB;
        })];
        
        tournees.push({
            type: 'urgente',
            transports: tournee,
            couleur: '#ef4444'
        });
    }
    
    // === TRAITER LES NORMAUX RESTANTS ===
    while (normauxRestants.length > 0) {
        // Prendre le premier transport comme point de départ
        const depart = normauxRestants.shift();
        
        // Chercher les autres dans un rayon de 50km
        const cluster = trouverClusterAutour(depart, normauxRestants, 50);
        
        // Créer la tournée
        const tournee = [depart, ...cluster];
        tournees.push({
            type: 'normale',
            transports: tournee,
            couleur: '#3b82f6'
        });
    }
    
    // === AFFICHAGE DES RÉSULTATS ===
    document.getElementById('panelTitle').innerHTML = '🧠 Tournées optimisées <button class="btn-optimize" id="backBtn">← Retour</button>';
    
    let html = '';
    
    tournees.forEach((tournee, index) => {
        const urgentCount = tournee.transports.filter(t => t.urgent).length;
        
        html += `
            <div class="tour-item" style="border-left-color: ${tournee.couleur};">
                <div class="tour-header">
                    <span>🚚 Tournée ${index + 1} ${urgentCount > 0 ? '🔴 ' + urgentCount + ' urgent(s)' : ''}</span>
                    <span>${tournee.transports.length} arrêts</span>
                </div>
        `;
        
        // Trier par urgence puis par distance depuis le dépôt
        const ordre = [...tournee.transports].sort((a, b) => {
            if (a.urgent && !b.urgent) return -1;
            if (!a.urgent && b.urgent) return 1;
            
            const distA = calculerDistance(depot.lat, depot.lng, a.lat, a.lng);
            const distB = calculerDistance(depot.lat, depot.lng, b.lat, b.lng);
            return distA - distB;
        });
        
        ordre.forEach((t, idx) => {
            const heure = t.speed === '6h' ? '🔴 ' : '';
            html += `
                <div class="tour-stop">
                    <strong>${idx+1}. ${heure}${t.destinataire_nom || 'Client'}</strong>
                    <div style="font-size:11px; color:#aaa;">${t.delivery_address?.substring(0,30)}</div>
                    <div class="stop-time">${t.speed || '24h'} | ${t.weight || 0} kg</div>
                </div>
            `;
        });
        
        html += `</div>`;
    });
    
    // Ajouter un résumé
    html += `
        <div style="margin-top:15px; padding:15px; background:#0f172a; border-radius:6px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span>🚚 ${tournees.length} tournées</span>
                <span>🔴 ${urgents.length} urgents</span>
            </div>
            <div style="font-size:12px; color:#aaa;">
                Les tournées sont créées en regroupant les transports proches géographiquement.<br>
                Les urgents (6h) sont traités en priorité.
            </div>
        </div>
    `;
    
    document.getElementById('transportList').innerHTML = html;
    
    // Dessiner les routes sur la carte
    dessinerRoutesOptimisees(tournees);
    
    document.getElementById('backBtn').onclick = afficherTransports;
}

// ===== DESSINER LES ROUTES SUR LA CARTE =====
function dessinerRoutesOptimisees(tournees) {
    // Nettoyer les anciennes routes
    if (window.routeLayers) {
        window.routeLayers.forEach(l => map.removeLayer(l));
    }
    window.routeLayers = [];
    
    const couleurs = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
    
    tournees.forEach((tournee, index) => {
        const points = [[depot.lat, depot.lng]];
        
        // Ajouter les points dans l'ordre optimal
        const ordre = [...tournee.transports].sort((a, b) => {
            const distA = calculerDistance(depot.lat, depot.lng, a.lat, a.lng);
            const distB = calculerDistance(depot.lat, depot.lng, b.lat, b.lng);
            return distA - distB;
        });
        
        ordre.forEach(t => {
            points.push([t.lat, t.lng]);
        });
        
        // Retour au dépôt
        points.push([depot.lat, depot.lng]);
        
        // Dessiner la ligne
        const route = L.polyline(points, {
            color: couleurs[index % couleurs.length],
            weight: 4,
            opacity: 0.7
        }).addTo(map);
        
        window.routeLayers.push(route);
    });
    
    // Ajuster la vue
    if (window.routeLayers.length > 0) {
        const group = L.featureGroup(window.routeLayers);
        map.fitBounds(group.getBounds().pad(0.1));
    }
}
