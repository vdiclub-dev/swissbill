<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch | Optimisation</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        header { background: #111; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #facc15; height: 70px; }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-success { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-optimize { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar { width: 220px; background: #111; padding: 20px; border-right: 1px solid #2a2a2a; }
        .sidebar button { width: 100%; padding: 12px; margin-bottom: 8px; background: #1f2937; color: white; border: none; border-radius: 6px; cursor: pointer; text-align: left; }
        .sidebar button:hover { background: #facc15; color: #111; }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        .right-panel { width: 400px; background: #111; border-left: 1px solid #2a2a2a; padding: 20px; overflow-y: auto; }
        .right-panel h3 { color: #facc15; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .transport-item { background: #1f2937; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 3px solid #facc15; }
        .transport-item.urgent { border-left-color: #ef4444; }
        .transport-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .transport-client { font-weight: bold; color: white; font-size: 14px; }
        .transport-destinataire { color: #facc15; font-size: 13px; margin: 2px 0; }
        .transport-address { font-size: 12px; color: #aaa; line-height: 1.4; margin: 2px 0; }
        .transport-footer { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: #666; border-top: 1px solid #2a2a2a; padding-top: 4px; }
        .tour-item { background: #2a2a2a; padding: 10px; margin-bottom: 8px; border-radius: 4px; border-left: 3px solid #3b82f6; }
        .tour-header { display: flex; justify-content: space-between; color: #3b82f6; font-weight: bold; margin-bottom: 5px; }
        .tour-stop { padding: 5px 0 5px 15px; border-bottom: 1px solid #3a3a3a; font-size: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #1f2937; border-radius: 10px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; border: 1px solid #facc15; }
        .modal-header { background: #111; padding: 15px 20px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; }
        .modal-header h3 { color: #facc15; }
        .modal-header button { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .modal-content { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #aaa; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #111; border: 1px solid #2a2a2a; color: white; border-radius: 4px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-row .form-group { flex: 1; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #2a2a2a; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; }
        .btn-save { background: #facc15; color: #111; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; font-weight: bold; }
        .section { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .section-title { color: #facc15; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .parcel-item { background: #1f2937; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .loader { text-align: center; padding: 20px; color: #aaa; }
    </style>
</head>
<body>

    <div id="app">
        <div style="padding:20px;">Chargement...</div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Démarrage...");
                
                if (typeof L === 'undefined') throw new Error("Leaflet non chargé");
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const userData = { username: 'admin', role: 'admin' };
                
                // ===== CONSTRUCTION PAGE =====
                document.getElementById('app').innerHTML = `
                    <header>
                        <div class="logo"><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                        <div class="stats-header">
                            <div class="stat-item"><span>📦 Total</span><span class="stat-value" id="totalCount">0</span></div>
                            <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value" id="urgentCount">0</span></div>
                        </div>
                        <div class="user-section">
                            <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                            <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                            <button class="btn" id="newTransportBtn">➕ Nouveau</button>
                        </div>
                    </header>

                    <div class="container">
                        <div class="sidebar">
                            <button class="active" id="btnDispatch">🗺️ Dispatch</button>
                            <button id="btnOptimize">🧠 Optimisation</button>
                            <button>📦 Transports</button>
                        </div>
                        
                        <div class="map-container"><div id="map"></div></div>
                        
                        <div class="right-panel">
                            <h3 id="panelTitle">📋 Transports en attente
                                <button class="btn-optimize" id="optimizeBtn" style="font-size:12px;">🧠 Optimiser</button>
                            </h3>
                            <div id="transportList"><div class="loader"><i class="fas fa-spinner fa-spin"></i> Chargement...</div></div>
                        </div>
                    </div>

                    <!-- MODAL (inchangée) -->
                    <div id="modal" class="modal">
                        <div class="modal-box">
                            <div class="modal-header">
                                <h3>➕ Nouveau transport</h3>
                                <button id="closeModalBtn">✖</button>
                            </div>
                            
                            <div class="modal-content">
                                <form id="transportForm">
                                    
                                    <!-- SECTION CLIENT -->
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-user-circle"></i> Expéditeur</h4>
                                        <div class="form-group">
                                            <label>Numéro client *</label>
                                            <input type="text" id="clientNumber" value="CL2025-001" required>
                                        </div>
                                    </div>

                                    <!-- SECTION DESTINATAIRE -->
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-user-tag"></i> Destinataire</h4>
                                        
                                        <div class="form-row">
                                            <div class="form-group" style="flex: 2;">
                                                <label>Nom / Entreprise *</label>
                                                <input type="text" id="destinataireNom" placeholder="Jean Dupont" required>
                                            </div>
                                            <div class="form-group" style="flex: 1;">
                                                <label>Téléphone</label>
                                                <input type="tel" id="destinataireTel" placeholder="079 123 45 67">
                                            </div>
                                        </div>
                                    </div>

                                    <!-- SECTION ADRESSE -->
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-map-marked-alt"></i> Adresse</h4>
                                        
                                        <div class="form-row">
                                            <div class="form-group" style="flex: 2;">
                                                <label>Rue *</label>
                                                <input type="text" id="street" placeholder="Rue du Simplon" required>
                                            </div>
                                            <div class="form-group" style="flex: 0.5;">
                                                <label>N°</label>
                                                <input type="text" id="streetNumber" placeholder="12">
                                            </div>
                                        </div>
                                        
                                        <div class="form-row">
                                            <div class="form-group" style="flex: 0.5;">
                                                <label>NPA *</label>
                                                <input type="text" id="npa" placeholder="1000" required>
                                            </div>
                                            <div class="form-group" style="flex: 1.5;">
                                                <label>Ville *</label>
                                                <input type="text" id="city" placeholder="Lausanne" required>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- SECTION COLIS -->
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-box"></i> Colis</h4>
                                        
                                        <div class="form-row">
                                            <div class="form-group">
                                                <label>Poids (kg)</label>
                                                <input type="number" id="mainWeight" value="1" step="0.1">
                                            </div>
                                            <div class="form-group">
                                                <label>Quantité</label>
                                                <input type="number" id="mainQuantity" value="1" min="1">
                                            </div>
                                        </div>
                                    </div>

                                    <!-- SECTION SERVICE -->
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-clock"></i> Service</h4>
                                        <div class="form-group">
                                            <label>Vitesse</label>
                                            <select id="speed">
                                                <option value="24h">📦 24h</option>
                                                <option value="12h">⚡ 12h</option>
                                                <option value="6h">🚨 6h</option>
                                            </select>
                                        </div>
                                    </div>
                                    
                                    <!-- BOUTONS -->
                                    <div class="modal-buttons">
                                        <button type="button" class="btn-cancel" id="cancelModalBtn">Annuler</button>
                                        <button type="submit" class="btn-save">✅ Créer</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                `;
                
                // ===== RÉFÉRENCES =====
                const modal = document.getElementById('modal');
                const newBtn = document.getElementById('newTransportBtn');
                const closeBtn = document.getElementById('closeModalBtn');
                const cancelBtn = document.getElementById('cancelModalBtn');
                const form = document.getElementById('transportForm');
                const logoutBtn = document.getElementById('logoutBtn');
                const optimizeBtn = document.getElementById('optimizeBtn');
                const btnOptimize = document.getElementById('btnOptimize');
                const btnDispatch = document.getElementById('btnDispatch');
                
                // ===== GESTION MODAL =====
                if (newBtn) newBtn.onclick = () => modal.style.display = 'flex';
                if (closeBtn) closeBtn.onclick = () => modal.style.display = 'none';
                if (cancelBtn) cancelBtn.onclick = () => modal.style.display = 'none';
                
                // ===== DÉCONNEXION =====
                if (logoutBtn) {
                    logoutBtn.onclick = () => {
                        localStorage.removeItem('user');
                        window.location.href = '../login/';
                    };
                }
                
                // ===== CARTE =====
                const map = L.map('map').setView([46.8, 8.2], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                const markers = L.markerClusterGroup();
                map.addLayer(markers);
                let routeLayer = null;
                
                // ===== DONNÉES =====
                let allTransports = [];
                
                // ===== CHARGEMENT TRANSPORTS =====
                async function loadTransports() {
                    try {
                        const { data, error } = await supabase
                            .from('transport_orders_simple')
                            .select('*')
                            .order('created_at', { ascending: false });
                        
                        if (error) throw error;
                        
                        allTransports = data || [];
                        
                        document.getElementById('totalCount').textContent = allTransports.length;
                        document.getElementById('urgentCount').textContent = allTransports.filter(t => t.speed === '6h').length;
                        
                        afficherTransports();
                        
                    } catch(e) {
                        console.error("Erreur chargement:", e);
                    }
                }
                
                // ===== AFFICHAGE NORMAL =====
                function afficherTransports() {
                    document.getElementById('panelTitle').innerHTML = '📋 Transports en attente <button class="btn-optimize" id="optimizeBtn" style="font-size:12px;">🧠 Optimiser</button>';
                    
                    let html = '';
                    markers.clearLayers();
                    if (routeLayer) map.removeLayer(routeLayer);
                    
                    allTransports.forEach((t, index) => {
                        const isUrgent = t.speed === '6h';
                        
                        html += `
                            <div class="transport-item ${isUrgent ? 'urgent' : ''}">
                                <div class="transport-header">
                                    <div>
                                        <div class="transport-client">📦 #${t.order_number || ''}</div>
                                        <div class="transport-destinataire">👤 ${t.destinataire_nom || '?'}</div>
                                        <div class="transport-address">📍 ${t.delivery_address?.substring(0, 30) || ''}</div>
                                    </div>
                                    <button class="btn-delete" onclick="supprimerTransport('${t.id}')">🗑️</button>
                                </div>
                                <div class="transport-footer">
                                    <span>${t.speed || '24h'}</span>
                                    <span>${t.weight || 0} kg</span>
                                </div>
                            </div>
                        `;
                        
                        // Marqueur
                        let lat = 46.8, lng = 8.2;
                        if (t.delivery_address?.toLowerCase().includes('lausanne')) { lat = 46.52; lng = 6.63; }
                        if (t.delivery_address?.toLowerCase().includes('geneve')) { lat = 46.20; lng = 6.14; }
                        
                        const color = isUrgent ? '#ef4444' : '#facc15';
                        const icon = L.divIcon({
                            html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${index+1}</div>`,
                            iconSize: [24, 24]
                        });
                        
                        L.marker([lat, lng], { icon }).addTo(markers);
                    });
                    
                    document.getElementById('transportList').innerHTML = html || '<div>Aucun transport</div>';
                    
                    // Réattacher l'événement
                    document.getElementById('optimizeBtn').onclick = optimiserTournees;
                }
                
                // ===== OPTIMISATION DES TOURNÉES =====
                function optimiserTournees() {
                    if (!allTransports.length) {
                        alert('Aucun transport à optimiser');
                        return;
                    }
                    
                    // Regrouper par région
                    const regions = {
                        'lausanne': { lat: 46.52, lng: 6.63, transports: [] },
                        'geneve': { lat: 46.20, lng: 6.14, transports: [] },
                        'yverdon': { lat: 46.78, lng: 6.64, transports: [] },
                        'berne': { lat: 46.95, lng: 7.45, transports: [] },
                        'autre': { lat: 46.8, lng: 8.2, transports: [] }
                    };
                    
                    // Classer les transports par région
                    allTransports.forEach(t => {
                        const address = (t.delivery_address || '').toLowerCase();
                        let assigned = false;
                        
                        for (let region in regions) {
                            if (region !== 'autre' && address.includes(region)) {
                                regions[region].transports.push(t);
                                assigned = true;
                                break;
                            }
                        }
                        
                        if (!assigned) {
                            regions['autre'].transports.push(t);
                        }
                    });
                    
                    // Trier chaque région par urgence (6h en premier)
                    for (let region in regions) {
                        regions[region].transports.sort((a, b) => {
                            if (a.speed === '6h' && b.speed !== '6h') return -1;
                            if (a.speed !== '6h' && b.speed === '6h') return 1;
                            return 0;
                        });
                    }
                    
                    // Afficher les tournées
                    document.getElementById('panelTitle').innerHTML = '🧠 Tournées optimisées <button class="btn-optimize" id="backBtn" style="font-size:12px;">← Retour</button>';
                    
                    let html = '';
                    let totalTours = 0;
                    
                    for (let region in regions) {
                        if (regions[region].transports.length === 0) continue;
                        totalTours++;
                        
                        html += `<div class="tour-item">`;
                        html += `<div class="tour-header"><span>🚚 Tournée ${region}</span><span>${regions[region].transports.length} arrêts</span></div>`;
                        
                        regions[region].transports.forEach((t, idx) => {
                            const urgent = t.speed === '6h' ? '🔴 ' : '';
                            html += `<div class="tour-stop">${idx+1}. ${urgent}${t.destinataire_nom || '?'} - ${(t.delivery_address || '').substring(0,20)}</div>`;
                        });
                        
                        html += `</div>`;
                        
                        // Dessiner la route pour la première région (exemple)
                        if (region === 'lausanne' && regions[region].transports.length > 0) {
                            dessinerRouteExemple(regions[region].transports);
                        }
                    }
                    
                    html += `<div style="margin-top:15px; padding:10px; background:#0f172a; border-radius:4px; text-align:center;">
                        🎯 ${totalTours} tournées proposées
                    </div>`;
                    
                    document.getElementById('transportList').innerHTML = html;
                    
                    document.getElementById('backBtn').onclick = afficherTransports;
                }
                
                // ===== DESSINER UNE ROUTE EXEMPLE =====
                function dessinerRouteExemple(transports) {
                    if (routeLayer) map.removeLayer(routeLayer);
                    
                    // Points de la route (simplifiés)
                    const points = [
                        [46.52, 6.63], // Lausanne
                        [46.78, 6.64], // Yverdon
                        [46.95, 7.45], // Berne
                        [46.20, 6.14]  // Genève
                    ];
                    
                    routeLayer = L.polyline(points, { color: '#3b82f6', weight: 4 }).addTo(map);
                    map.fitBounds(routeLayer.getBounds());
                }
                
                // ===== SUPPRESSION =====
                window.supprimerTransport = async function(id) {
                    if (!confirm('⚠️ Supprimer ce transport ?')) return;
                    try {
                        await supabase.from('transport_orders_simple').delete().eq('id', id);
                        await loadTransports();
                    } catch(e) { alert('❌ Erreur: ' + e.message); }
                };
                
                // ===== CRÉATION =====
                if (form) {
                    form.onsubmit = async function(e) {
                        e.preventDefault();
                        
                        const orderNumber = 'TR-' + Date.now().toString().slice(-6);
                        
                        const fullAddress = `${document.getElementById('street').value} ${document.getElementById('streetNumber').value}, ${document.getElementById('npa').value} ${document.getElementById('city').value}`;
                        
                        const transport = {
                            order_number: orderNumber,
                            client_number: document.getElementById('clientNumber').value,
                            destinataire_nom: document.getElementById('destinataireNom').value,
                            destinataire_tel: document.getElementById('destinataireTel').value,
                            delivery_address: fullAddress,
                            weight: parseFloat(document.getElementById('mainWeight').value) || 1,
                            quantity: parseInt(document.getElementById('mainQuantity').value) || 1,
                            speed: document.getElementById('speed').value,
                            priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
                            status: 'pending',
                            created_at: new Date()
                        };
                        
                        if (!transport.client_number || !transport.delivery_address || !transport.destinataire_nom) {
                            alert('Champs requis manquants');
                            return;
                        }
                        
                        try {
                            await supabase.from('transport_orders_simple').insert([transport]);
                            alert(`✅ Transport ${orderNumber} créé !`);
                            modal.style.display = 'none';
                            await loadTransports();
                        } catch(e) { alert('❌ Erreur: ' + e.message); }
                    };
                }
                
                // ===== LANCEMENT =====
                await loadTransports();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
