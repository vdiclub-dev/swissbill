<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Créer transport</title>
    <script src="config.js"></script>
    <style>
        body { background:#111; color:white; padding:20px; font-family:system-ui; }
        .form-group { margin-bottom:15px; }
        label { display:block; color:#aaa; margin-bottom:5px; }
        input, select { width:100%; padding:10px; background:#1f2937; border:1px solid #2a2a2a; color:white; border-radius:4px; }
        button { background:#facc15; color:#111; border:none; padding:12px 24px; border-radius:4px; font-weight:bold; cursor:pointer; margin-top:20px; }
        .result { margin-top:20px; padding:15px; background:#1f2937; border-radius:4px; }
        .success { color:#10b981; }
        .error { color:#ef4444; }
    </style>
</head>
<body>
    <h1>➕ Nouveau transport</h1>
    
    <form id="transportForm">
        <div class="form-group">
            <label>Numéro client</label>
            <input type="text" id="clientNumber" value="CL2025-001" required>
        </div>
        
        <div class="form-group">
            <label>Adresse de livraison</label>
            <input type="text" id="deliveryAddress" value="Rue du Lac 12, 1000 Lausanne" required>
        </div>
        
        <div class="form-group">
            <label>Poids (kg)</label>
            <input type="number" id="weight" value="2.5" step="0.1">
        </div>
        
        <div class="form-group">
            <label>Type de service</label>
            <select id="serviceType">
                <option value="standard">Standard</option>
                <option value="express">Express</option>
                <option value="urgent">Urgent</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Vitesse</label>
            <select id="speed">
                <option value="24h">24h</option>
                <option value="12h">12h</option>
                <option value="6h">6h</option>
            </select>
        </div>
        
        <button type="submit">Créer le transport</button>
    </form>
    
    <div id="result" class="result"></div>

    <script>
        document.getElementById('transportForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            try {
                if (!window.SUPABASE_CONFIG) {
                    throw new Error("config.js non chargé");
                }
                
                const year = new Date().getFullYear();
                const random = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
                const orderNumber = `TR-${year}-${random}`;
                
                const transport = {
                    order_number: orderNumber,
                    client_number: document.getElementById('clientNumber').value,
                    delivery_address: document.getElementById('deliveryAddress').value,
                    pickup_address: 'Impasse des Griottes 3, 1462 Yvonand',
                    weight: parseFloat(document.getElementById('weight').value),
                    service_type: document.getElementById('serviceType').value,
                    speed: document.getElementById('speed').value,
                    quantity: 1,
                    status: 'pending',
                    priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
                    created_at: new Date()
                };
                
                console.log("Envoi:", transport);
                
                const response = await fetch(`${window.SUPABASE_CONFIG.url}/rest/v1/transport_orders_simple`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': window.SUPABASE_CONFIG.key,
                        'Authorization': `Bearer ${window.SUPABASE_CONFIG.key}`
                    },
                    body: JSON.stringify(transport)
                });
                
                // Vérifier le statut de la réponse
                if (!response.ok) {
                    // Essayer de lire l'erreur
                    const errorText = await response.text();
                    let errorMessage;
                    try {
                        const errorJson = JSON.parse(errorText);
                        errorMessage = JSON.stringify(errorJson, null, 2);
                    } catch {
                        errorMessage = errorText;
                    }
                    throw new Error(`HTTP ${response.status}: ${errorMessage}`);
                }
                
                // Si la réponse est vide (c'est normal), on considère que c'est un succès
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    try {
                        const data = await response.json();
                        console.log("Réponse:", data);
                    } catch (e) {
                        // Pas de JSON, mais c'est OK
                        console.log("Réponse vide (normal)");
                    }
                }
                
                document.getElementById('result').innerHTML = `
                    <h3 class="success">✅ Transport créé avec succès !</h3>
                    <p><strong>N°:</strong> ${orderNumber}</p>
                    <p><strong>Client:</strong> ${transport.client_number}</p>
                    <p><strong>Livraison:</strong> ${transport.delivery_address}</p>
                    <p><strong>Service:</strong> ${transport.service_type} - ${transport.speed}</p>
                `;
                
                // Reset du formulaire
                document.getElementById('clientNumber').value = '';
                document.getElementById('deliveryAddress').value = '';
                
            } catch(e) {
                console.error('Erreur complète:', e);
                document.getElementById('result').innerHTML = `
                    <h3 class="error">❌ Erreur</h3>
                    <pre style="color:#ef4444; white-space:pre-wrap;">${e.message}</pre>
                `;
            }
        });
    </script>
</body>
</html>
