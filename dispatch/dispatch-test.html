<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch | Optimisation professionnelle</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        header { background: #111; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #facc15; height: 70px; }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-success { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-optimize { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar { width: 220px; background: #111; padding: 20px; border-right: 1px solid #2a2a2a; }
        .sidebar button { width: 100%; padding: 12px; margin-bottom: 8px; background: #1f2937; color: white; border: none; border-radius: 6px; cursor: pointer; text-align: left; }
        .sidebar button:hover { background: #facc15; color: #111; }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        .right-panel { width: 450px; background: #111; border-left: 1px solid #2a2a2a; padding: 20px; overflow-y: auto; }
        .right-panel h3 { color: #facc15; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .transport-item { background: #1f2937; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 3px solid #facc15; }
        .transport-item.urgent { border-left-color: #ef4444; }
        .tour-item { background: #2a2a2a; padding: 15px; margin-bottom: 15px; border-radius: 6px; border-left: 3px solid #3b82f6; }
        .tour-header { display: flex; justify-content: space-between; color: #3b82f6; font-weight: bold; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #3a3a3a; }
        .tour-stat { font-size: 12px; color: #aaa; margin-bottom: 8px; }
        .tour-stop { padding: 8px 0 8px 15px; border-bottom: 1px solid #3a3a3a; font-size: 13px; position: relative; }
        .stop-number { display: inline-block; width: 20px; height: 20px; background: #3b82f6; border-radius: 50%; text-align: center; line-height: 20px; font-size: 11px; margin-right: 8px; }
        .stop-time { font-size: 11px; color: #facc15; margin-left: 28px; }
        .loader { text-align: center; padding: 20px; color: #aaa; }
        .depot-marker { background: #0f172a; border: 2px solid #facc15; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #1f2937; border-radius: 10px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; border: 1px solid #facc15; }
        .modal-header { background: #111; padding: 15px 20px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; }
        .modal-header h3 { color: #facc15; }
        .modal-header button { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .modal-content { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #aaa; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #111; border: 1px solid #2a2a2a; color: white; border-radius: 4px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-row .form-group { flex: 1; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #2a2a2a; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; }
        .btn-save { background: #facc15; color: #111; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; font-weight: bold; }
        .section { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .section-title { color: #facc15; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <div id="app">
        <div style="padding:20px;">Chargement...</div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Démarrage...");
                
                if (typeof L === 'undefined') throw new Error("Leaflet non chargé");
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                if (!window.ORS_API_KEY) console.warn("⚠️ Clé OpenRouteService manquante");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const userData = { username: 'admin', role: 'admin' };
                
                // ===== CONSTRUCTION PAGE =====
                document.getElementById('app').innerHTML = `
                    <header>
                        <div class="logo"><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                        <div class="stats-header">
                            <div class="stat-item"><span>📦 Total</span><span class="stat-value" id="totalCount">0</span></div>
                            <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value" id="urgentCount">0</span></div>
                        </div>
                        <div class="user-section">
                            <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                            <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                            <button class="btn" id="newTransportBtn">➕ Nouveau</button>
                        </div>
                    </header>

                    <div class="container">
                        <div class="sidebar">
                            <button class="active" id="btnDispatch">🗺️ Dispatch</button>
                            <button id="btnOptimize">🧠 Optimisation pro</button>
                        </div>
                        
                        <div class="map-container"><div id="map"></div></div>
                        
                        <div class="right-panel">
                            <h3 id="panelTitle">📋 Transports en attente
                                <button class="btn-optimize" id="optimizeBtn" style="font-size:12px;">🚀 Optimisation pro</button>
                            </h3>
                            <div id="transportList"><div class="loader"><i class="fas fa-spinner fa-spin"></i> Chargement...</div></div>
                        </div>
                    </div>

                    <!-- MODAL (simplifiée) -->
                    <div id="modal" class="modal">
                        <div class="modal-box">
                            <div class="modal-header">
                                <h3>➕ Nouveau transport</h3>
                                <button id="closeModalBtn">✖</button>
                            </div>
                            
                            <div class="modal-content">
                                <form id="transportForm">
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-user-circle"></i> Client</h4>
                                        <div class="form-group">
                                            <label>Numéro client *</label>
                                            <input type="text" id="clientNumber" value="CL2025-001" required>
                                        </div>
                                    </div>
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-user-tag"></i> Destinataire</h4>
                                        <div class="form-row">
                                            <div class="form-group" style="flex: 2;">
                                                <label>Nom *</label>
                                                <input type="text" id="destinataireNom" required>
                                            </div>
                                            <div class="form-group" style="flex: 1;">
                                                <label>Téléphone</label>
                                                <input type="tel" id="destinataireTel">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-map-marked-alt"></i> Adresse</h4>
                                        <div class="form-row">
                                            <div class="form-group" style="flex: 2;">
                                                <label>Rue *</label>
                                                <input type="text" id="street" required>
                                            </div>
                                            <div class="form-group" style="flex: 0.5;">
                                                <label>N°</label>
                                                <input type="text" id="streetNumber">
                                            </div>
                                        </div>
                                        <div class="form-row">
                                            <div class="form-group" style="flex: 0.5;">
                                                <label>NPA *</label>
                                                <input type="text" id="npa" required>
                                            </div>
                                            <div class="form-group" style="flex: 1.5;">
                                                <label>Ville *</label>
                                                <input type="text" id="city" required>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-box"></i> Colis</h4>
                                        <div class="form-row">
                                            <div class="form-group">
                                                <label>Poids (kg)</label>
                                                <input type="number" id="weight" value="1" step="0.1">
                                            </div>
                                            <div class="form-group">
                                                <label>Vitesse</label>
                                                <select id="speed">
                                                    <option value="24h">📦 24h</option>
                                                    <option value="12h">⚡ 12h</option>
                                                    <option value="6h">🚨 6h</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="modal-buttons">
                                        <button type="button" class="btn-cancel" id="cancelModalBtn">Annuler</button>
                                        <button type="submit" class="btn-save">✅ Créer</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                `;
                
                // ===== RÉFÉRENCES =====
                const modal = document.getElementById('modal');
                const newBtn = document.getElementById('newTransportBtn');
                const closeBtn = document.getElementById('closeModalBtn');
                const cancelBtn = document.getElementById('cancelModalBtn');
                const form = document.getElementById('transportForm');
                const logoutBtn = document.getElementById('logoutBtn');
                const optimizeBtn = document.getElementById('optimizeBtn');
                const btnOptimize = document.getElementById('btnOptimize');
                const btnDispatch = document.getElementById('btnDispatch');
                
                // ===== GESTION MODAL =====
                if (newBtn) newBtn.onclick = () => modal.style.display = 'flex';
                if (closeBtn) closeBtn.onclick = () => modal.style.display = 'none';
                if (cancelBtn) cancelBtn.onclick = () => modal.style.display = 'none';
                
                // ===== DÉCONNEXION =====
                if (logoutBtn) {
                    logoutBtn.onclick = () => {
                        localStorage.removeItem('user');
                        window.location.href = '../login/';
                    };
                }
                
                // ===== CARTE =====
                const map = L.map('map').setView([46.8, 8.2], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                const markers = L.markerClusterGroup();
                map.addLayer(markers);
                let routeLayers = [];
                
                // ===== DONNÉES =====
                let allTransports = [];
                
                // Dépôt (Yverdon)
                const depot = {
                    nom: "Dépôt Yverdon",
                    lat: 46.7785,
                    lng: 6.6411,
                    adresse: "Impasse des Griottes 3, 1462 Yvonand"
                };
                
                // ===== GÉOCODAGE SIMPLE =====
                function getCityCoordinates(adresse) {
                    const adr = (adresse || '').toLowerCase();
                    if (adr.includes('lausanne')) return { lat: 46.52, lng: 6.63 };
                    if (adr.includes('geneve')) return { lat: 46.20, lng: 6.14 };
                    if (adr.includes('yverdon')) return { lat: 46.78, lng: 6.64 };
                    if (adr.includes('berne')) return { lat: 46.95, lng: 7.45 };
                    return { lat: 46.8, lng: 8.2 };
                }
                
                // ===== CHARGEMENT TRANSPORTS =====
                async function loadTransports() {
                    try {
                        const { data, error } = await supabase
                            .from('transport_orders_simple')
                            .select('*')
                            .order('created_at', { ascending: false });
                        
                        if (error) throw error;
                        
                        allTransports = data || [];
                        
                        document.getElementById('totalCount').textContent = allTransports.length;
                        document.getElementById('urgentCount').textContent = allTransports.filter(t => t.speed === '6h').length;
                        
                        afficherTransports();
                        
                    } catch(e) {
                        console.error("Erreur chargement:", e);
                    }
                }
                
                // ===== AFFICHAGE NORMAL =====
                function afficherTransports() {
                    document.getElementById('panelTitle').innerHTML = '📋 Transports en attente <button class="btn-optimize" id="optimizeBtn" style="font-size:12px;">🚀 Optimisation pro</button>';
                    
                    let html = '';
                    markers.clearLayers();
                    routeLayers.forEach(l => map.removeLayer(l));
                    routeLayers = [];
                    
                    // Ajouter le dépôt
                    const depotIcon = L.divIcon({
                        html: '<div class="depot-marker">🏢</div>',
                        iconSize: [30, 30]
                    });
                    L.marker([depot.lat, depot.lng], { icon: depotIcon }).addTo(markers).bindPopup("Dépôt Yverdon");
                    
                    allTransports.forEach((t, index) => {
                        const isUrgent = t.speed === '6h';
                        const coords = getCityCoordinates(t.delivery_address);
                        
                        html += `
                            <div class="transport-item ${isUrgent ? 'urgent' : ''}">
                                <div style="display:flex; justify-content:space-between;">
                                    <div>
                                        <div><strong>${t.destinataire_nom || '?'}</strong></div>
                                        <div class="transport-address">📍 ${(t.delivery_address || '').substring(0, 30)}</div>
                                    </div>
                                    <button class="btn-delete" onclick="supprimerTransport('${t.id}')">🗑️</button>
                                </div>
                                <div style="display:flex; justify-content:space-between; margin-top:5px; font-size:11px;">
                                    <span>${t.speed || '24h'}</span>
                                    <span>${t.weight || 0} kg</span>
                                </div>
                            </div>
                        `;
                        
                        const color = isUrgent ? '#ef4444' : '#facc15';
                        const icon = L.divIcon({
                            html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${index+1}</div>`,
                            iconSize: [24, 24]
                        });
                        
                        L.marker([coords.lat, coords.lng], { icon }).addTo(markers);
                    });
                    
                    document.getElementById('transportList').innerHTML = html || '<div>Aucun transport</div>';
                    
                    document.getElementById('optimizeBtn').onclick = optimiserTournees;
                }
                
                // ===== OPTIMISATION AVEC OPENROUTESERVICE =====
                async function optimiserTournees() {
                    if (!window.ORS_API_KEY) {
                        alert("❌ Clé OpenRouteService manquante dans config.js");
                        return;
                    }
                    
                    if (allTransports.length === 0) {
                        alert("Aucun transport à optimiser");
                        return;
                    }
                    
                    document.getElementById('panelTitle').innerHTML = '🧠 Optimisation en cours...';
                    document.getElementById('transportList').innerHTML = '<div class="loader"><i class="fas fa-spinner fa-spin"></i> Calcul des itinéraires...</div>';
                    
                    try {
                        // 1. Préparer les jobs (clients à livrer)
                        const jobs = [];
                        allTransports.forEach((t, index) => {
                            const coords = getCityCoordinates(t.delivery_address);
                            jobs.push({
                                id: index + 1,
                                location: [coords.lng, coords.lat],
                                service: 900, // 15 minutes de service par défaut
                                amount: [parseInt(t.weight) || 1],
                                description: t.destinataire_nom || `Client ${index+1}`
                            });
                        });
                        
                        // 2. Préparer les véhicules (3 chauffeurs)
                        const vehicles = [
                            {
                                id: 1,
                                profile: "driving-car",
                                start: [depot.lng, depot.lat],
                                end: [depot.lng, depot.lat],
                                capacity: [500],
                                time_window: [8*3600, 20*3600] // 8h à 20h
                            },
                            {
                                id: 2,
                                profile: "driving-car",
                                start: [depot.lng, depot.lat],
                                end: [depot.lng, depot.lat],
                                capacity: [500],
                                time_window: [8*3600, 20*3600]
                            },
                            {
                                id: 3,
                                profile: "driving-car",
                                start: [depot.lng, depot.lat],
                                end: [depot.lng, depot.lat],
                                capacity: [500],
                                time_window: [8*3600, 20*3600]
                            }
                        ];
                        
                        // 3. Appel à l'API OpenRouteService
                        const response = await fetch('https://api.openrouteservice.org/optimization', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': window.ORS_API_KEY
                            },
                            body: JSON.stringify({
                                jobs: jobs,
                                vehicles: vehicles,
                                options: {
                                    g: true // Retourne les géométries
                                }
                            })
                        });
                        
                        if (!response.ok) {
                            throw new Error(`Erreur API: ${response.status}`);
                        }
                        
                        const result = await response.json();
                        
                        // 4. Afficher les résultats
                        afficherOptimisation(result, jobs);
                        
                    } catch(e) {
                        console.error("Erreur optimisation:", e);
                        document.getElementById('panelTitle').innerHTML = '📋 Transports en attente <button class="btn-optimize" id="optimizeBtn" style="font-size:12px;">🚀 Optimisation pro</button>';
                        document.getElementById('transportList').innerHTML = `<div style="color:#ef4444; padding:20px;">❌ Erreur: ${e.message}</div>`;
                        document.getElementById('optimizeBtn').onclick = optimiserTournees;
                    }
                }
                
                // ===== AFFICHAGE DES RÉSULTATS D'OPTIMISATION =====
                function afficherOptimisation(result, jobs) {
                    document.getElementById('panelTitle').innerHTML = '🧠 Tournées optimisées <button class="btn-optimize" id="backBtn" style="font-size:12px;">← Retour</button>';
                    
                    let html = '';
                    routeLayers.forEach(l => map.removeLayer(l));
                    routeLayers = [];
                    
                    // Couleurs pour chaque véhicule
                    const colors = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6'];
                    
                    if (!result.routes || result.routes.length === 0) {
                        html = '<div style="color:#aaa; padding:20px;">Aucune route trouvée</div>';
                    } else {
                        result.routes.forEach((route, vIndex) => {
                            const vehicleId = route.vehicle;
                            const steps = route.steps || [];
                            
                            // Calculer les totaux
                            let totalDistance = 0;
                            let totalDuration = 0;
                            
                            steps.forEach(step => {
                                totalDistance += step.distance || 0;
                                totalDuration += step.duration || 0;
                            });
                            
                            // Convertir en km et heures
                            const distanceKm = (totalDistance / 1000).toFixed(1);
                            const durationHeures = (totalDuration / 3600).toFixed(1);
                            
                            html += `
                                <div class="tour-item">
                                    <div class="tour-header">
                                        <span>🚚 Véhicule ${vehicleId}</span>
                                        <span>${steps.length} arrêts</span>
                                    </div>
                                    <div class="tour-stat">
                                        📏 ${distanceKm} km | ⏱️ ${durationHeures}h | 🕐 Retour ${formatTime(route.end || 0)}
                                    </div>
                            `;
                            
                            // Points de la route pour le tracé
                            const routePoints = [];
                            
                            // Départ du dépôt
                            html += `<div class="tour-stop"><span class="stop-number">D</span> Départ dépôt Yverdon</div>`;
                            routePoints.push([depot.lat, depot.lng]);
                            
                            // Chaque étape
                            steps.forEach((step, idx) => {
                                const job = jobs.find(j => j.id === step.job);
                                const arrivee = step.arrival ? formatTime(step.arrival) : '?';
                                const depart = step.arrival && step.service ? formatTime(step.arrival + step.service) : '?';
                                
                                html += `
                                    <div class="tour-stop">
                                        <span class="stop-number">${idx+1}</span>
                                        <strong>${job?.description || 'Client'}</strong><br>
                                        <span class="stop-time">🕐 Arrivée: ${arrivee} | Départ: ${depart}</span>
                                    </div>
                                `;
                                
                                // Coordonnées pour la route
                                if (step.location) {
                                    routePoints.push([step.location[1], step.location[0]]);
                                } else {
                                    const jobCoords = jobs.find(j => j.id === step.job)?.location;
                                    if (jobCoords) {
                                        routePoints.push([jobCoords[1], jobCoords[0]]);
                                    }
                                }
                            });
                            
                            // Retour au dépôt
                            html += `<div class="tour-stop"><span class="stop-number">R</span> Retour dépôt</div>`;
                            routePoints.push([depot.lat, depot.lng]);
                            
                            html += `</div>`;
                            
                            // Dessiner la route
                            if (routePoints.length > 1) {
                                const routeLine = L.polyline(routePoints, {
                                    color: colors[vIndex % colors.length],
                                    weight: 4,
                                    opacity: 0.7
                                }).addTo(map);
                                routeLayers.push(routeLine);
                            }
                        });
                    }
                    
                    // Ajouter les jobs non assignés
                    if (result.unassigned && result.unassigned.length > 0) {
                        html += `<div style="margin-top:15px; padding:10px; background:#991b1b; border-radius:4px;">
                            ⚠️ ${result.unassigned.length} transport(s) non assigné(s)
                        </div>`;
                    }
                    
                    document.getElementById('transportList').innerHTML = html;
                    
                    // Ajuster la vue pour voir toutes les routes
                    if (routeLayers.length > 0) {
                        const group = L.featureGroup(routeLayers);
                        map.fitBounds(group.getBounds().pad(0.1));
                    }
                    
                    document.getElementById('backBtn').onclick = afficherTransports;
                }
                
                // ===== FORMATER L'HEURE =====
                function formatTime(seconds) {
                    if (!seconds) return '?';
                    const hours = Math.floor(seconds / 3600);
                    const minutes = Math.floor((seconds % 3600) / 60);
                    return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
                }
                
                // ===== SUPPRESSION =====
                window.supprimerTransport = async function(id) {
                    if (!confirm('⚠️ Supprimer ce transport ?')) return;
                    try {
                        await supabase.from('transport_orders_simple').delete().eq('id', id);
                        await loadTransports();
                    } catch(e) { alert('❌ Erreur: ' + e.message); }
                };
                
                // ===== CRÉATION =====
                if (form) {
                    form.onsubmit = async function(e) {
                        e.preventDefault();
                        
                        const orderNumber = 'TR-' + Date.now().toString().slice(-6);
                        const fullAddress = `${document.getElementById('street').value} ${document.getElementById('streetNumber').value}, ${document.getElementById('npa').value} ${document.getElementById('city').value}`;
                        
                        const transport = {
                            order_number: orderNumber,
                            client_number: document.getElementById('clientNumber').value,
                            destinataire_nom: document.getElementById('destinataireNom').value,
                            destinataire_tel: document.getElementById('destinataireTel').value,
                            delivery_address: fullAddress,
                            weight: parseFloat(document.getElementById('weight').value) || 1,
                            quantity: 1,
                            speed: document.getElementById('speed').value,
                            priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
                            status: 'pending',
                            created_at: new Date()
                        };
                        
                        try {
                            await supabase.from('transport_orders_simple').insert([transport]);
                            alert(`✅ Transport créé !`);
                            modal.style.display = 'none';
                            await loadTransports();
                        } catch(e) { alert('❌ Erreur: ' + e.message); }
                    };
                }
                
                // ===== LANCEMENT =====
                await loadTransports();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
