<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Dispatch</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body style="background:#111; color:white; padding:20px; font-family:system-ui;">
    
    <h1>🔧 Test de connexion Supabase</h1>
    
    <div id="status">Chargement...</div>
    <div id="result"></div>
    
    <script>
        (async function() {
            try {
                // Vérification config
                if (!window.SUPABASE_CONFIG) {
                    document.getElementById('status').innerHTML = '❌ config.js non chargé';
                    return;
                }
                
                document.getElementById('status').innerHTML = '✅ config.js chargé';
                
                // Création client
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                // Test simple
                const { data, error } = await supabase
                    .from('transport_orders')
                    .select('order_number, client_number, created_at')
                    .limit(5);
                
                if (error) throw error;
                
                document.getElementById('result').innerHTML = `
                    <h3>✅ Connexion réussie !</h3>
                    <p>${data.length} transports trouvés</p>
                    <pre style="background:#333; padding:10px;">${JSON.stringify(data, null, 2)}</pre>
                `;
                
            } catch(e) {
                document.getElementById('result').innerHTML = `
                    <h3 style="color:red;">❌ Erreur</h3>
                    <p>${e.message}</p>
                `;
            }
        })();
    </script>
    
</body>
</html>
