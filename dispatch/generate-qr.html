<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Générer QR codes</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .qr-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .qr-item { background: white; padding: 15px; border-radius: 10px; text-align: center; }
        .btn { background: #e53935; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
        input { padding: 8px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>📱 Générateur de QR codes</h1>
    
    <div style="background:white; padding:20px; border-radius:10px; margin-bottom:20px;">
        <h3>Créer un nouveau QR code</h3>
        <input type="text" id="transportId" placeholder="TR-2401" value="TR-2401">
        <input type="text" id="pickup" placeholder="Lausanne" value="Lausanne">
        <input type="text" id="delivery" placeholder="Genève" value="Genève">
        <select id="speed">
            <option value="6h">6h (Urgent)</option>
            <option value="24h">24h (Standard)</option>
            <option value="48h">48h (Éco)</option>
        </select>
        <button class="btn" onclick="genererQR()" style="margin-top:10px;">Générer QR code</button>
        
        <div id="qrResult" style="margin-top:20px; text-align:center;"></div>
    </div>
    
    <h2>QR codes existants</h2>
    <div class="qr-list" id="qrList"></div>
    
    <script>
        function genererQR() {
            const id = document.getElementById('transportId').value;
            const pickup = document.getElementById('pickup').value;
            const delivery = document.getElementById('delivery').value;
            const speed = document.getElementById('speed').value;
            
            const data = `${id}|${pickup}|${delivery}|${speed}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data)}`;
            
            document.getElementById('qrResult').innerHTML = `
                <h3>QR code généré :</h3>
                <img src="${qrUrl}" style="border:2px solid #333; border-radius:10px;">
                <p><strong>Données:</strong> ${data}</p>
                <p>
                    <button class="btn" onclick="sauvegarderQR('${data}')">Sauvegarder</button>
                    <button class="btn" onclick="imprimerQR('${qrUrl}')">Imprimer</button>
                </p>
            `;
        }
        
        function sauvegarderQR(data) {
            // ICI : envoyer à votre serveur pour sauvegarder dans /qr-codes/
            alert('QR code sauvegardé !');
        }
        
        function imprimerQR(url) {
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head><title>QR Code</title></head>
                <body style="text-align:center; padding:50px;">
                    <img src="${url}" style="width:300px;">
                    <p style="margin-top:20px;">Scannez pour préparer le transport</p>
                </body>
                </html>
            `);
            printWindow.print();
        }
    </script>
</body>
</html>
