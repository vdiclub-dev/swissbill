<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman Dispatch | Nouveau transport</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .form-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .header h1 {
            color: #0f172a;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i {
            color: #facc15;
        }
        
        .btn-close {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #475569;
            font-weight: 500;
        }
        
        .btn-close:hover {
            background: #e2e8f0;
        }
        
        .section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }
        
        .section h2 {
            color: #0f172a;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section h2 i {
            color: #facc15;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 5px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.2s;
            background: white;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #facc15;
            box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.1);
        }
        
        .form-group input[readonly] {
            background: #f1f5f9;
            cursor: not-allowed;
        }
        
        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .col {
            flex: 1;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            flex: 1;
        }
        
        .btn-primary {
            background: #facc15;
            color: #0f172a;
        }
        
        .btn-primary:hover {
            background: #eab308;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(250, 204, 21, 0.3);
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .success-message {
            background: #10b981;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s;
        }
        
        .error-message {
            background: #ef4444;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .info-note {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-note i {
            font-size: 16px;
        }
        
        .separator {
            height: 1px;
            background: #e2e8f0;
            margin: 20px 0;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 40px;
        }
        
        .loading i {
            font-size: 30px;
            color: #facc15;
            animation: spin 1s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Chargement du formulaire...</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Formulaire de transport...");
                
                // ===== VÉRIFICATION CONFIG =====
                if (!window.SUPABASE_CONFIG) {
                    throw new Error("config.js manquant");
                }
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                // ===== VÉRIFICATION CONNEXION =====
                const user = localStorage.getItem('user');
                if (!user) {
                    window.location.href = '../login/';
                    return;
                }
                
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') {
                    window.location.href = '../';
                    return;
                }
                
                // ===== GÉNÉRATION NUMÉRO TRANSPORT =====
                const year = new Date().getFullYear();
                const random = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
                const orderNumber = `TR-${year}-${random}`;
                
                // ===== DATE DU JOUR =====
                const today = new Date().toISOString().split('T')[0];
                
                // ===== CONSTRUCTION FORMULAIRE =====
                document.getElementById('app').innerHTML = `
                    <div class="form-container">
                        <div class="header">
                            <h1>
                                <i class="fas fa-plus-circle"></i>
                                Nouveau transport
                            </h1>
                            <button class="btn-close" onclick="window.location.href='index.html'">
                                <i class="fas fa-times"></i> Fermer
                            </button>
                        </div>
                        
                        <div id="message"></div>
                        
                        <form id="transportForm" onsubmit="event.preventDefault(); saveTransport();">
                            
                            <!-- SECTION CLIENT (EXPÉDITEUR) -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-user-circle"></i>
                                    Expéditeur
                                </h2>
                                
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label>Numéro client *</label>
                                        <input type="text" id="clientNumber" value="CL2025-001" required>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Nom / Société</label>
                                        <input type="text" id="clientName" placeholder="Dupont Jean">
                                    </div>
                                </div>
                            </div>
                            
                            <!-- SECTION DESTINATAIRE -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-user-tag"></i>
                                    Destinataire
                                </h2>
                                
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label>Nom / Entreprise *</label>
                                        <input type="text" id="destinataireNom" placeholder="Jean Dupont" required>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Téléphone contact</label>
                                        <input type="tel" id="destinataireTel" placeholder="079 123 45 67">
                                    </div>
                                </div>
                            </div>
                            
                            <!-- SECTION ADRESSE DE LIVRAISON -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-map-marked-alt"></i>
                                    Adresse de livraison
                                </h2>
                                
                                <div class="grid-4">
                                    <div class="form-group" style="grid-column: span 2;">
                                        <label>Rue *</label>
                                        <input type="text" id="street" placeholder="Rue du Simplon" required>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>N°</label>
                                        <input type="text" id="streetNumber" placeholder="12">
                                    </div>
                                </div>
                                
                                <div class="grid-3">
                                    <div class="form-group">
                                        <label>NPA *</label>
                                        <input type="text" id="npa" placeholder="1000" required>
                                    </div>
                                    
                                    <div class="form-group" style="grid-column: span 2;">
                                        <label>Ville *</label>
                                        <input type="text" id="city" placeholder="Lausanne" required>
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label>Complément d'adresse</label>
                                    <input type="text" id="addressComplement" placeholder="Étage, code d'accès, service...">
                                </div>
                            </div>
                            
                            <!-- SECTION COLIS -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-box"></i>
                                    Colis
                                </h2>
                                
                                <div class="grid-3">
                                    <div class="form-group">
                                        <label>Poids (kg) *</label>
                                        <input type="number" id="weight" value="1" step="0.1" min="0" required>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Quantité</label>
                                        <input type="number" id="quantity" value="1" min="1">
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Type de colis</label>
                                        <select id="packageType">
                                            <option value="Colis">📦 Colis standard</option>
                                            <option value="Fragile">⚠️ Fragile</option>
                                            <option value="Palette">📦 Palette</option>
                                            <option value="Document">📄 Document</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- SECTION SERVICE -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-clock"></i>
                                    Service
                                </h2>
                                
                                <div class="grid-3">
                                    <div class="form-group">
                                        <label>Type de service</label>
                                        <select id="serviceType">
                                            <option value="standard">Standard</option>
                                            <option value="express">Express</option>
                                            <option value="urgent">Urgent</option>
                                        </select>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Vitesse de livraison</label>
                                        <select id="speed">
                                            <option value="24h">📦 24h (Standard)</option>
                                            <option value="12h">⚡ 12h (Express)</option>
                                            <option value="6h">🚨 6h (Urgent)</option>
                                        </select>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Livraison de nuit</label>
                                        <select id="nightDelivery">
                                            <option value="false">Non</option>
                                            <option value="true">Oui (+CHF 20)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- SECTION INFORMATIONS COMPLÉMENTAIRES -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-sticky-note"></i>
                                    Informations complémentaires
                                </h2>
                                
                                <div class="form-group">
                                    <label>Instructions spéciales</label>
                                    <textarea id="instructions" rows="3" placeholder="Fragile, code d'accès, horaires de livraison..."></textarea>
                                </div>
                                
                                <div class="form-group">
                                    <label>Référence interne</label>
                                    <input type="text" id="reference" placeholder="N° commande, dossier...">
                                </div>
                            </div>
                            
                            <!-- INFORMATIONS SYSTÈME (cachées) -->
                            <input type="hidden" id="orderNumber" value="${orderNumber}">
                            <input type="hidden" id="createdAt" value="${new Date().toISOString()}">
                            
                            <!-- BOUTONS D'ACTION -->
                            <div class="actions">
                                <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">
                                    <i class="fas fa-times"></i> Annuler
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-check"></i> Créer le transport
                                </button>
                            </div>
                            
                            <div class="info-note">
                                <i class="fas fa-info-circle"></i>
                                Les champs marqués d'un * sont obligatoires. Le numéro de transport est généré automatiquement.
                            </div>
                        </form>
                    </div>
                `;
                
                // ===== FONCTION DE SAUVEGARDE =====
                window.saveTransport = async function() {
                    const messageDiv = document.getElementById('message');
                    
                    try {
                        // Récupérer les valeurs
                        const clientNumber = document.getElementById('clientNumber').value.trim();
                        const destinataireNom = document.getElementById('destinataireNom').value.trim();
                        const street = document.getElementById('street').value.trim();
                        const streetNumber = document.getElementById('streetNumber').value.trim();
                        const npa = document.getElementById('npa').value.trim();
                        const city = document.getElementById('city').value.trim();
                        const weight = parseFloat(document.getElementById('weight').value) || 1;
                        
                        // Validations
                        if (!clientNumber) {
                            throw new Error("Le numéro client est obligatoire");
                        }
                        
                        if (!destinataireNom) {
                            throw new Error("Le nom du destinataire est obligatoire");
                        }
                        
                        if (!street) {
                            throw new Error("La rue est obligatoire");
                        }
                        
                        if (!npa) {
                            throw new Error("Le NPA est obligatoire");
                        }
                        
                        if (!city) {
                            throw new Error("La ville est obligatoire");
                        }
                        
                        // Construire l'adresse complète
                        const fullAddress = `${street} ${streetNumber}, ${npa} ${city}`.trim();
                        const complement = document.getElementById('addressComplement').value;
                        const deliveryAddress = complement 
                            ? `${fullAddress} (${complement})` 
                            : fullAddress;
                        
                        // Géocoder l'adresse pour obtenir les coordonnées
                        let lat = null;
                        let lng = null;
                        
                        try {
                            const response = await fetch(
                                `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(fullAddress + ', Suisse')}&limit=1`,
                                { headers: { 'User-Agent': 'LemanDispatch/1.0' } }
                            );
                            const data = await response.json();
                            if (data && data.length > 0) {
                                lat = parseFloat(data[0].lat);
                                lng = parseFloat(data[0].lon);
                            }
                        } catch(e) {
                            console.warn("Géocodage non bloquant:", e);
                        }
                        
                        // Construire l'objet transport
                        const transport = {
                            order_number: document.getElementById('orderNumber').value,
                            client_number: clientNumber,
                            client_name: document.getElementById('clientName').value || null,
                            destinataire_nom: destinataireNom,
                            destinataire_tel: document.getElementById('destinataireTel').value || null,
                            delivery_address: deliveryAddress,
                            lat: lat,
                            lng: lng,
                            weight: weight,
                            quantity: parseInt(document.getElementById('quantity').value) || 1,
                            package_type: document.getElementById('packageType').value,
                            service_type: document.getElementById('serviceType').value,
                            speed: document.getElementById('speed').value,
                            night_delivery: document.getElementById('nightDelivery').value === 'true',
                            instructions: document.getElementById('instructions').value || null,
                            reference: document.getElementById('reference').value || null,
                            status: 'pending',
                            priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
                            created_at: new Date()
                        };
                        
                        // Afficher le chargement
                        messageDiv.innerHTML = `
                            <div class="success-message">
                                <i class="fas fa-spinner fa-spin"></i> Création en cours...
                            </div>
                        `;
                        
                        // Envoyer à Supabase
                        const { error } = await supabase
                            .from('transport_orders_simple')
                            .insert([transport]);
                        
                        if (error) throw error;
                        
                        // Succès
                        messageDiv.innerHTML = `
                            <div class="success-message">
                                <i class="fas fa-check-circle"></i>
                                Transport ${transport.order_number} créé avec succès !
                            </div>
                        `;
                        
                        // Redirection après 1.5 secondes
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                        
                    } catch(e) {
                        console.error("Erreur création:", e);
                        messageDiv.innerHTML = `
                            <div class="error-message">
                                <i class="fas fa-exclamation-triangle"></i>
                                ${e.message}
                            </div>
                        `;
                    }
                };
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.getElementById('app').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        Erreur: ${e.message}
                    </div>
                `;
            }
        });
    </script>
    
</body>
</html>
