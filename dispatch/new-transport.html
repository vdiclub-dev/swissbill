<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman Dispatch | Nouveau transport</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .form-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        
        .header h1 {
            color: #0f172a;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i {
            color: #facc15;
        }
        
        .btn-close {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #475569;
            font-weight: 500;
        }
        
        .btn-close:hover {
            background: #e2e8f0;
        }
        
        .section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }
        
        .section h2 {
            color: #0f172a;
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section h2 i {
            color: #facc15;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 5px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.2s;
            background: white;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #facc15;
            box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.1);
        }
        
        /* RECHERCHE DESTINATAIRE */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none;
        }
        
        .search-result-item {
            padding: 10px 15px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
        }
        
        .search-result-item:hover {
            background: #f1f5f9;
        }
        
        .search-result-item strong {
            color: #0f172a;
        }
        
        .search-result-item small {
            color: #64748b;
            font-size: 12px;
        }
        
        /* COLIS SUPPLÉMENTAIRES */
        .parcels-section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }
        
        .parcels-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .btn-add-parcel {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .btn-add-parcel:hover {
            background: #059669;
        }
        
        .parcel-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        
        .parcel-item .grid-4 {
            gap: 10px;
        }
        
        .btn-remove-parcel {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-remove-parcel:hover {
            background: #dc2626;
        }
        
        .parcels-total {
            margin-top: 15px;
            padding: 15px;
            background: #0f172a;
            border-radius: 8px;
            color: white;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            position: sticky;
            bottom: 0;
            background: white;
            padding: 20px 0 0;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            flex: 1;
        }
        
        .btn-primary {
            background: #facc15;
            color: #0f172a;
        }
        
        .btn-primary:hover {
            background: #eab308;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(250, 204, 21, 0.3);
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .success-message {
            background: #10b981;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s;
        }
        
        .error-message {
            background: #ef4444;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .info-note {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 40px;
        }
        
        .loading i {
            font-size: 30px;
            color: #facc15;
            animation: spin 1s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Chargement du formulaire...</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Formulaire de transport...");
                
                if (!window.SUPABASE_CONFIG) {
                    throw new Error("config.js manquant");
                }
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const user = localStorage.getItem('user');
                if (!user) {
                    window.location.href = '../login/';
                    return;
                }
                
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') {
                    window.location.href = '../';
                    return;
                }
                
                // ===== GÉNÉRATION NUMÉRO =====
                const year = new Date().getFullYear();
                const random = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
                const orderNumber = `TR-${year}-${random}`;
                
                // ===== VARIABLES POUR COLIS =====
                let colisListe = [];
                let destinatairesExistants = [];
                
                // ===== CHARGER LES DESTINATAIRES EXISTANTS =====
                async function chargerDestinataires() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('destinataire_nom, destinataire_tel, delivery_address')
                        .not('destinataire_nom', 'is', null)
                        .limit(50);
                    
                    if (data) {
                        destinatairesExistants = data;
                    }
                }
                
                await chargerDestinataires();
                
                // ===== CONSTRUCTION FORMULAIRE =====
                document.getElementById('app').innerHTML = `
                    <div class="form-container">
                        <div class="header">
                            <h1>
                                <i class="fas fa-plus-circle"></i>
                                Nouveau transport
                            </h1>
                            <button class="btn-close" onclick="window.location.href='index.html'">
                                <i class="fas fa-times"></i> Fermer
                            </button>
                        </div>
                        
                        <div id="message"></div>
                        
                        <form id="transportForm" onsubmit="event.preventDefault(); saveTransport();">
                            
                            <!-- SECTION CLIENT (EXPÉDITEUR) -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-user-circle"></i>
                                    Expéditeur
                                </h2>
                                
                                <div class="form-group">
                                    <label>Numéro client *</label>
                                    <input type="text" id="clientNumber" value="CL2025-001" required>
                                    <small style="color:#64748b;">Le client sera facturé sur ce numéro</small>
                                </div>
                            </div>
                            
                            <!-- SECTION DESTINATAIRE AVEC RECHERCHE -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-user-tag"></i>
                                    Destinataire
                                </h2>
                                
                                <div class="form-group" style="position: relative;">
                                    <label>Rechercher un destinataire existant</label>
                                    <input type="text" id="searchDestinataire" placeholder="Tapez le nom..." autocomplete="off">
                                    <div id="searchResults" class="search-results"></div>
                                </div>
                                
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label>Nom / Entreprise *</label>
                                        <input type="text" id="destinataireNom" placeholder="Jean Dupont" required>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Téléphone contact</label>
                                        <input type="tel" id="destinataireTel" placeholder="079 123 45 67">
                                    </div>
                                </div>
                            </div>
                            
                            <!-- SECTION ADRESSE DE LIVRAISON -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-map-marked-alt"></i>
                                    Adresse de livraison
                                </h2>
                                
                                <div class="grid-4">
                                    <div class="form-group" style="grid-column: span 2;">
                                        <label>Rue *</label>
                                        <input type="text" id="street" placeholder="Rue du Simplon" required>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>N°</label>
                                        <input type="text" id="streetNumber" placeholder="12">
                                    </div>
                                </div>
                                
                                <div class="grid-3">
                                    <div class="form-group">
                                        <label>NPA *</label>
                                        <input type="text" id="npa" placeholder="1000" required>
                                    </div>
                                    
                                    <div class="form-group" style="grid-column: span 2;">
                                        <label>Ville *</label>
                                        <input type="text" id="city" placeholder="Lausanne" required>
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label>Complément d'adresse</label>
                                    <input type="text" id="addressComplement" placeholder="Étage, code d'accès, service...">
                                </div>
                            </div>
                            
                            <!-- SECTION COLIS PRINCIPAL -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-box"></i>
                                    Colis principal
                                </h2>
                                
                                <div class="grid-3">
                                    <div class="form-group">
                                        <label>Description</label>
                                        <input type="text" id="mainDescription" value="Colis principal" placeholder="Description">
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Poids (kg) *</label>
                                        <input type="number" id="mainWeight" value="1" step="0.1" min="0" required>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Type</label>
                                        <select id="mainType">
                                            <option value="Colis">📦 Colis standard</option>
                                            <option value="Fragile">⚠️ Fragile</option>
                                            <option value="Palette">📦 Palette</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- SECTION COLIS SUPPLÉMENTAIRES -->
                            <div class="parcels-section">
                                <div class="parcels-header">
                                    <h2 style="margin:0;">
                                        <i class="fas fa-cubes"></i>
                                        Colis supplémentaires
                                    </h2>
                                    <button type="button" class="btn-add-parcel" onclick="ajouterColis()">
                                        <i class="fas fa-plus"></i> Ajouter un colis
                                    </button>
                                </div>
                                
                                <div id="parcelsList"></div>
                                
                                <div id="parcelsTotal" class="parcels-total">
                                    <span>📊 Poids total:</span>
                                    <span id="totalWeight">1.0 kg</span>
                                </div>
                            </div>
                            
                            <!-- SECTION SERVICE -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-clock"></i>
                                    Service
                                </h2>
                                
                                <div class="grid-3">
                                    <div class="form-group">
                                        <label>Type de service</label>
                                        <select id="serviceType">
                                            <option value="standard">Standard</option>
                                            <option value="express">Express</option>
                                            <option value="urgent">Urgent</option>
                                        </select>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Vitesse</label>
                                        <select id="speed">
                                            <option value="24h">📦 24h</option>
                                            <option value="12h">⚡ 12h</option>
                                            <option value="6h">🚨 6h</option>
                                        </select>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label>Livraison nuit</label>
                                        <select id="nightDelivery">
                                            <option value="false">Non</option>
                                            <option value="true">Oui</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- SECTION INSTRUCTIONS -->
                            <div class="section">
                                <h2>
                                    <i class="fas fa-sticky-note"></i>
                                    Instructions
                                </h2>
                                
                                <div class="form-group">
                                    <label>Instructions spéciales</label>
                                    <textarea id="instructions" rows="3" placeholder="Fragile, code d'accès, horaires..."></textarea>
                                </div>
                            </div>
                            
                            <!-- CHAMPS CACHÉS -->
                            <input type="hidden" id="orderNumber" value="${orderNumber}">
                            
                            <!-- BOUTONS -->
                            <div class="actions">
                                <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">
                                    <i class="fas fa-times"></i> Annuler
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-check"></i> Créer le transport
                                </button>
                            </div>
                        </form>
                    </div>
                `;
                
                // ===== GESTION DE LA RECHERCHE DESTINATAIRE =====
                const searchInput = document.getElementById('searchDestinataire');
                const searchResults = document.getElementById('searchResults');
                
                searchInput.addEventListener('input', function() {
                    const search = this.value.toLowerCase().trim();
                    
                    if (search.length < 2) {
                        searchResults.style.display = 'none';
                        return;
                    }
                    
                    const results = destinatairesExistants.filter(d => 
                        d.destinataire_nom && d.destinataire_nom.toLowerCase().includes(search)
                    ).slice(0, 5);
                    
                    if (results.length === 0) {
                        searchResults.style.display = 'none';
                        return;
                    }
                    
                    let html = '';
                    results.forEach(r => {
                        html += `
                            <div class="search-result-item" onclick="selectionnerDestinataire('${r.destinataire_nom}', '${r.destinataire_tel || ''}', '${r.delivery_address || ''}')">
                                <strong>${r.destinataire_nom}</strong>
                                ${r.destinataire_tel ? `<br><small>📞 ${r.destinataire_tel}</small>` : ''}
                                ${r.delivery_address ? `<br><small>📍 ${r.delivery_address.substring(0,30)}</small>` : ''}
                            </div>
                        `;
                    });
                    
                    searchResults.innerHTML = html;
                    searchResults.style.display = 'block';
                });
                
                document.addEventListener('click', function(e) {
                    if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                        searchResults.style.display = 'none';
                    }
                });
                
                window.selectionnerDestinataire = function(nom, tel, adresse) {
                    document.getElementById('destinataireNom').value = nom;
                    document.getElementById('destinataireTel').value = tel;
                    
                    // Essayer d'extraire les infos d'adresse
                    if (adresse) {
                        const parts = adresse.split(',');
                        if (parts.length >= 2) {
                            document.getElementById('street').value = parts[0].trim();
                            document.getElementById('city').value = parts[1].trim();
                        }
                    }
                    
                    searchResults.style.display = 'none';
                    searchInput.value = nom;
                };
                
                // ===== GESTION DES COLIS SUPPLÉMENTAIRES =====
                window.ajouterColis = function() {
                    colisListe.push({
                        description: '',
                        poids: 1,
                        quantite: 1,
                        type: 'Colis'
                    });
                    afficherColis();
                };
                
                window.supprimerColis = function(index) {
                    colisListe.splice(index, 1);
                    afficherColis();
                };
                
                window.modifierColis = function(index, champ, valeur) {
                    colisListe[index][champ] = champ === 'poids' || champ === 'quantite' 
                        ? parseFloat(valeur) || 0 
                        : valeur;
                    afficherColis();
                };
                
                function afficherColis() {
                    const container = document.getElementById('parcelsList');
                    let total = parseFloat(document.getElementById('mainWeight').value) || 1;
                    
                    let html = '';
                    
                    colisListe.forEach((colis, index) => {
                        const poidsTotal = (colis.poids || 0) * (colis.quantite || 1);
                        total += poidsTotal;
                        
                        html += `
                            <div class="parcel-item">
                                <div class="grid-4">
                                    <div style="grid-column: span 2;">
                                        <input type="text" placeholder="Description" value="${colis.description}" 
                                               onchange="modifierColis(${index}, 'description', this.value)"
                                               style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:4px;">
                                    </div>
                                    <div>
                                        <input type="number" placeholder="Poids" value="${colis.poids}" 
                                               onchange="modifierColis(${index}, 'poids', this.value)"
                                               style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:4px;">
                                    </div>
                                    <div>
                                        <input type="number" placeholder="Qté" value="${colis.quantite}" 
                                               onchange="modifierColis(${index}, 'quantite', this.value)"
                                               style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:4px;">
                                    </div>
                                    <div>
                                        <select onchange="modifierColis(${index}, 'type', this.value)"
                                                style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:4px;">
                                            <option value="Colis" ${colis.type === 'Colis' ? 'selected' : ''}>Colis</option>
                                            <option value="Fragile" ${colis.type === 'Fragile' ? 'selected' : ''}>Fragile</option>
                                            <option value="Palette" ${colis.type === 'Palette' ? 'selected' : ''}>Palette</option>
                                        </select>
                                    </div>
                                    <div>
                                        <button type="button" class="btn-remove-parcel" onclick="supprimerColis(${index})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                                <div style="font-size:12px; color:#666; margin-top:5px;">
                                    Total: ${poidsTotal.toFixed(1)} kg
                                </div>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;
                    document.getElementById('totalWeight').textContent = total.toFixed(1) + ' kg';
                }
                
                document.getElementById('mainWeight')?.addEventListener('input', afficherColis);
                
                // ===== SAUVEGARDE =====
                window.saveTransport = async function() {
                    const messageDiv = document.getElementById('message');
                    
                    try {
                        const clientNumber = document.getElementById('clientNumber').value.trim();
                        const destinataireNom = document.getElementById('destinataireNom').value.trim();
                        const street = document.getElementById('street').value.trim();
                        const npa = document.getElementById('npa').value.trim();
                        const city = document.getElementById('city').value.trim();
                        const mainWeight = parseFloat(document.getElementById('mainWeight').value) || 1;
                        
                        if (!clientNumber) throw new Error("Le numéro client est obligatoire");
                        if (!destinataireNom) throw new Error("Le nom du destinataire est obligatoire");
                        if (!street) throw new Error("La rue est obligatoire");
                        if (!npa) throw new Error("Le NPA est obligatoire");
                        if (!city) throw new Error("La ville est obligatoire");
                        
                        const fullAddress = `${street} ${document.getElementById('streetNumber').value}, ${npa} ${city}`.trim();
                        const complement = document.getElementById('addressComplement').value;
                        const deliveryAddress = complement ? `${fullAddress} (${complement})` : fullAddress;
                        
                        // Calcul du poids total
                        let poidsTotal = mainWeight;
                        colisListe.forEach(c => {
                            poidsTotal += (c.poids || 0) * (c.quantite || 1);
                        });
                        
                        const transport = {
                            order_number: document.getElementById('orderNumber').value,
                            client_number: clientNumber,
                            destinataire_nom: destinataireNom,
                            destinataire_tel: document.getElementById('destinataireTel').value || null,
                            delivery_address: deliveryAddress,
                            weight: poidsTotal,
                            quantity: 1 + colisListe.reduce((acc, c) => acc + (c.quantite || 0), 0),
                            package_type: document.getElementById('mainType').value,
                            service_type: document.getElementById('serviceType').value,
                            speed: document.getElementById('speed').value,
                            night_delivery: document.getElementById('nightDelivery').value === 'true',
                            instructions: document.getElementById('instructions').value || null,
                            status: 'pending',
                            priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
                            created_at: new Date()
                        };
                        
                        messageDiv.innerHTML = `<div class="success-message"><i class="fas fa-spinner fa-spin"></i> Création en cours...</div>`;
                        
                        const { error } = await supabase
                            .from('transport_orders_simple')
                            .insert([transport]);
                        
                        if (error) throw error;
                        
                        messageDiv.innerHTML = `
                            <div class="success-message">
                                <i class="fas fa-check-circle"></i>
                                Transport ${transport.order_number} créé avec succès !
                            </div>
                        `;
                        
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                        
                    } catch(e) {
                        messageDiv.innerHTML = `
                            <div class="error-message">
                                <i class="fas fa-exclamation-triangle"></i>
                                ${e.message}
                            </div>
                        `;
                    }
                };
                
            } catch(e) {
                console.error(e);
                document.getElementById('app').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        Erreur: ${e.message}
                    </div>
                `;
            }
        });
    </script>
    
</body>
</html>
