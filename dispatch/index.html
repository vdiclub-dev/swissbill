<!-- Scripts dans le bon ordre -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
    // ===== VÉRIFICATION CONFIG =====
    if (!window.SUPABASE_CONFIG) {
        document.body.innerHTML = '<div style="color:red; padding:20px;">❌ Fichier config.js manquant</div>';
        throw new Error("Configuration manquante");
    }
    
    // ===== TEST SUPABASE =====
    console.log("📦 Supabase disponible:", typeof window.supabase !== 'undefined');
    
    if (typeof window.supabase === 'undefined') {
        document.body.innerHTML = '<div style="color:red; padding:20px;">❌ Supabase non chargé</div>';
        throw new Error("Supabase non chargé");
    }
    
    // ===== CRÉER LE CLIENT SUPABASE =====
    const supabase = window.supabase.createClient(
        window.SUPABASE_CONFIG.url,
        window.SUPABASE_CONFIG.key
    );
    
    console.log("✅ Supabase client créé");
    
    // ===== VÉRIFICATION AUTHENTIFICATION =====
    (function() {
        const user = localStorage.getItem('user');
        
        if (!user) {
            document.body.innerHTML = `
                <div style="text-align:center; padding:50px; background:#1f2937; margin:100px auto; max-width:500px; border-radius:15px;">
                    <i class="fas fa-lock" style="font-size:60px; color:#facc15;"></i>
                    <h2 style="color:white; margin:20px 0;">Accès non autorisé</h2>
                    <p style="color:#aaa;">Vous devez être connecté en tant qu'administrateur.</p>
                    <button onclick="window.location.href='../login/'" style="background:#facc15; color:#111; border:none; padding:12px 24px; border-radius:6px; font-weight:bold; cursor:pointer;">Se connecter</button>
                </div>
            `;
            return;
        }
        
        const userData = JSON.parse(user);
        
        if (!userData.loggedIn || userData.role !== 'admin') {
            document.body.innerHTML = `
                <div style="text-align:center; padding:50px; background:#1f2937; margin:100px auto; max-width:500px; border-radius:15px;">
                    <i class="fas fa-shield-alt" style="font-size:60px; color:#facc15;"></i>
                    <h2 style="color:white; margin:20px 0;">Accès restreint</h2>
                    <p style="color:#aaa;">Cette page est réservée aux administrateurs.</p>
                    <button onclick="window.location.href='../'" style="background:#facc15; color:#111; border:none; padding:12px 24px; border-radius:6px; font-weight:bold; cursor:pointer;">Accueil</button>
                </div>
            `;
            return;
        }
        
        // ===== CONSTRUIRE LA PAGE =====
        document.getElementById('app').innerHTML = `
            <header>
                <div class="logo">
                    <i class="fas fa-map-marked-alt"></i> Léman Dispatch
                </div>
                
                <div class="stats-header">
                    <div class="stat-item">
                        <span>📦 Total</span>
                        <span class="stat-value" id="totalCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span>⚠️ Urgents</span>
                        <span class="stat-value" id="urgentCount">0</span>
                    </div>
                </div>
                
                <div class="user-section">
                    <div class="user-badge">
                        <i class="fas fa-user-cog"></i>
                        <span>${userData.username}</span>
                    </div>
                    <button class="btn-logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Déconnexion
                    </button>
                    <button class="btn" onclick="openModal()">➕ Créer transport</button>
                </div>
            </header>

            <div class="container">
                <div class="sidebar">
                    <button class="active"><i class="fas fa-map-marked-alt"></i> Dispatch</button>
                    <button><i class="fas fa-box"></i> Transports</button>
                    <button><i class="fas fa-users"></i> Clients</button>
                    <button><i class="fas fa-truck"></i> Chauffeurs</button>
                    <button><i class="fas fa-file-invoice"></i> Factures</button>
                    <button onclick="window.location.href='generate-qr.html'"><i class="fas fa-qrcode"></i> QR codes</button>
                </div>
                
                <div class="map-container">
                    <div id="map"></div>
                </div>
                
                <div class="right-panel">
                    <h3><i class="fas fa-list"></i> Derniers transports</h3>
                    <div id="transportList">
                        <div class="loader"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
                    </div>
                </div>
            </div>

            <div id="modal" class="modal">
                <div class="modal-box">
                    <div class="modal-header">
                        <h3>➕ Nouveau transport</h3>
                        <button onclick="closeModal()">✖</button>
                    </div>
                    <div class="modal-content">
                        <form onsubmit="event.preventDefault(); saveTransport();">
                            <div class="form-group">
                                <label>Nom client *</label>
                                <input type="text" id="clientName" required placeholder="Jean Dupont">
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Téléphone</label>
                                    <input type="tel" id="clientPhone" placeholder="079 123 45 67">
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" id="clientEmail" placeholder="client@email.com">
                                </div>
                            </div>
                            
                            <h4 style="color:#facc15; margin:15px 0 10px;">📍 Ramassage</h4>
                            
                            <div class="form-group">
                                <label>Ville *</label>
                                <input type="text" id="pickupCity" required placeholder="Lausanne">
                            </div>
                            
                            <h4 style="color:#facc15; margin:15px 0 10px;">🎯 Livraison</h4>
                            
                            <div class="form-group">
                                <label>Ville *</label>
                                <input type="text" id="deliveryCity" required placeholder="Genève">
                            </div>
                            
                            <h4 style="color:#facc15; margin:15px 0 10px;">📦 Colis</h4>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Poids (kg)</label>
                                    <input type="number" id="weight" value="1" step="0.1">
                                </div>
                                <div class="form-group">
                                    <label>Priorité</label>
                                    <select id="priority">
                                        <option value="normal">Normal</option>
                                        <option value="urgent">Urgent</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Instructions</label>
                                <textarea id="instructions" rows="2" placeholder="Fragile, code d'accès..."></textarea>
                            </div>
                            
                            <div class="modal-buttons">
                                <button type="button" class="btn-cancel" onclick="closeModal()">Annuler</button>
                                <button type="submit" class="btn-save">Créer le transport</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        `;
        
        // ===== LANCER L'APPLICATION =====
        startApp();
    })();
    
    // ===== FONCTIONS PRINCIPALES =====
    let map;
    let markers;
    let mapInitialized = false;
    
    function logout() {
        localStorage.removeItem('user');
        window.location.href = '../login/';
    }
    
    function startApp() {
        console.log("🚀 Léman Dispatch démarré");
        
        try {
            initMap();
        } catch(error) {
            console.error("❌ Erreur démarrage:", error);
        }
    }
    
    // ===== INITIALISATION CARTE =====
    function initMap() {
        try {
            map = L.map('map').setView([46.8, 8.2], 8);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);
            
            markers = L.markerClusterGroup();
            map.addLayer(markers);
            
            mapInitialized = true;
            console.log("✅ Carte initialisée");
            
            loadTransports();
            
        } catch(error) {
            console.error("❌ Erreur carte:", error);
        }
    }
    
    // ===== CHARGER LES TRANSPORTS =====
    async function loadTransports() {
        try {
            const { data, error } = await supabase
                .from('transport_orders')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            console.log(`📦 ${data.length} transports chargés`);
            
            updateStats(data);
            updateTransportList(data);
            
            if (mapInitialized && markers) {
                updateMap(data);
            }
            
        } catch(error) {
            console.error("Erreur chargement:", error);
            document.getElementById('transportList').innerHTML = '<div style="color:#ef4444; padding:20px;">Erreur de chargement</div>';
        }
    }
    
    // ===== METTRE À JOUR LA CARTE =====
    function updateMap(transports) {
        markers.clearLayers();
        
        if (!transports || transports.length === 0) return;
        
        const bounds = [];
        
        transports.forEach((transport, index) => {
            if (!transport.delivery_city) return;
            
            let lat = 46.8, lng = 8.2;
            const city = transport.delivery_city.toLowerCase();
            
            if (city.includes('lausanne')) { lat = 46.52; lng = 6.63; }
            else if (city.includes('geneve')) { lat = 46.20; lng = 6.14; }
            else if (city.includes('yverdon')) { lat = 46.78; lng = 6.64; }
            else if (city.includes('berne')) { lat = 46.95; lng = 7.45; }
            else if (city.includes('zurich')) { lat = 47.37; lng = 8.54; }
            
            let color = '#facc15';
            if (transport.priority === 'urgent' || transport.speed === '6h') color = '#ef4444';
            if (transport.status === 'delivered') color = '#10b981';
            
            const icon = L.divIcon({
                html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${index+1}</div>`,
                className: '',
                iconSize: [24, 24]
            });
            
            const marker = L.marker([lat, lng], { icon });
            
            marker.bindPopup(`
                <b>${transport.client_name || 'Sans client'}</b><br>
                📍 ${transport.pickup_city || '?'} → ${transport.delivery_city || '?'}<br>
                ${transport.distance_km ? `📏 ${transport.distance_km} km` : ''}
                ${transport.priority === 'urgent' ? '<br>⚠️ URGENT' : ''}
            `);
            
            markers.addLayer(marker);
            bounds.push([lat, lng]);
        });
        
        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [30, 30] });
        }
    }
    
    // ===== METTRE À JOUR LA LISTE =====
    function updateTransportList(transports) {
        const listEl = document.getElementById('transportList');
        
        if (!transports || transports.length === 0) {
            listEl.innerHTML = '<div style="color:#666; text-align:center; padding:20px;">Aucun transport</div>';
            return;
        }
        
        let html = '';
        transports.slice(0, 10).forEach(transport => {
            const date = transport.created_at ? new Date(transport.created_at).toLocaleDateString('fr-CH') : '';
            
            html += `
                <div class="transport-item ${transport.priority === 'urgent' ? 'urgent' : ''}">
                    <div class="transport-client">${transport.client_name || 'Sans client'}</div>
                    <div class="transport-route">📍 ${transport.pickup_city || '?'} → ${transport.delivery_city || '?'}</div>
                    <div class="transport-route" style="font-size:11px;">📅 ${date}</div>
                    ${transport.distance_km ? `<div class="transport-distance">📏 ${transport.distance_km} km</div>` : ''}
                </div>
            `;
        });
        
        listEl.innerHTML = html;
    }
    
    // ===== METTRE À JOUR LES STATS =====
    function updateStats(transports) {
        const total = transports.length;
        const urgent = transports.filter(t => t.priority === 'urgent' || t.speed === '6h').length;
        
        document.getElementById('totalCount').textContent = total;
        document.getElementById('urgentCount').textContent = urgent;
    }
    
    // ===== FONCTIONS MODAL =====
    window.openModal = function() {
        document.getElementById('modal').style.display = 'flex';
    };
    
    window.closeModal = function() {
        document.getElementById('modal').style.display = 'none';
    };
    
    window.saveTransport = async function() {
        const transport = {
            order_number: 'TR-' + new Date().getFullYear() + '-' + String(Math.floor(Math.random() * 1000000)).padStart(6, '0'),
            client_name: document.getElementById('clientName').value,
            client_phone: document.getElementById('clientPhone').value,
            client_email: document.getElementById('clientEmail').value,
            pickup_city: document.getElementById('pickupCity').value,
            delivery_city: document.getElementById('deliveryCity').value,
            weight: parseFloat(document.getElementById('weight').value) || 1,
            priority: document.getElementById('priority').value,
            instructions: document.getElementById('instructions').value,
            status: 'pending',
            created_at: new Date()
        };
        
        if (!transport.client_name || !transport.pickup_city || !transport.delivery_city) {
            alert('Veuillez remplir tous les champs obligatoires');
            return;
        }
        
        try {
            const { error } = await supabase.from('transport_orders').insert([transport]);
            
            if (error) throw error;
            
            alert('✅ Transport créé avec succès !');
            closeModal();
            
            document.getElementById('clientName').value = '';
            document.getElementById('clientPhone').value = '';
            document.getElementById('clientEmail').value = '';
            document.getElementById('pickupCity').value = '';
            document.getElementById('deliveryCity').value = '';
            document.getElementById('weight').value = '1';
            document.getElementById('instructions').value = '';
            
            loadTransports();
            
        } catch (error) {
            console.error('Erreur:', error);
            alert('❌ Erreur: ' + error.message);
        }
    };
    
    // ===== RAFRAÎCHISSEMENT AUTO =====
    setInterval(loadTransports, 30000);
</script>
