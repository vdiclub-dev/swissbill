<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        #barre-jaune {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #facc15;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            font-weight: bold;
        }
        button {
            background: black;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        #formulaire {
            position: fixed;
            top: 80px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 1001;
            width: 300px;
        }
        input, select, button {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
        }
    </style>
</head>
<body>

    <div id="barre-jaune">
        <span>🚚 LÉMAN DISPATCH</span>
        <button onclick="montrerFormulaire()">➕ Créer transport</button>
    </div>
    
    <div id="formulaire">
        <h3>Nouveau transport</h3>
        <input type="text" id="client" placeholder="Nom client">
        <input type="text" id="pickup" placeholder="Ville ramassage">
        <input type="text" id="delivery" placeholder="Ville livraison">
        <select id="priority">
            <option value="normal">Normal</option>
            <option value="urgent">Urgent</option>
        </select>
        <button onclick="cacherFormulaire()">Annuler</button>
        <button onclick="sauvegarder()">Créer</button>
    </div>
    
    <div id="map"></div>

    <!-- LES SCRIPTS DANS LE BON ORDRE -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- D'ABORD la config, ENSUITE le reste -->
    <script src="config.js"></script>
    
    <script>
        // ===== VÉRIFICATION =====
        console.log("🚀 Démarrage...");
        
        if (!window.SUPABASE_CONFIG) {
            console.error("❌ config.js non chargé !");
            alert("Erreur: config.js manquant");
        } else {
            console.log("✅ Configuration trouvée");
        }
        
        // ===== SUPABASE AVEC LA CONFIG =====
        const supabase = window.supabase.createClient(
            window.SUPABASE_CONFIG.url,
            window.SUPABASE_CONFIG.key
        );
        
        // ===== CARTE =====
        const map = L.map('map').setView([46.8, 8.2], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // ===== CHARGER LES TRANSPORTS =====
        async function chargerTransports() {
            console.log("Chargement des transports...");
            
            const { data, error } = await supabase.from('orders').select('*');
            
            if (error) {
                console.error("Erreur Supabase:", error);
                alert("Erreur de connexion à Supabase");
                return;
            }
            
            console.log(`${data.length} transports chargés`);
            
            data.forEach(transport => {
                let lat = 46.8, lng = 8.2;
                
                const ville = transport.delivery_city?.toLowerCase() || '';
                
                if (ville.includes('lausanne')) { lat = 46.52; lng = 6.63; }
                else if (ville.includes('geneve')) { lat = 46.20; lng = 6.14; }
                else if (ville.includes('yverdon')) { lat = 46.78; lng = 6.64; }
                else if (ville.includes('berne')) { lat = 46.95; lng = 7.45; }
                
                const marker = L.marker([lat, lng]).addTo(map);
                marker.bindPopup(`
                    <b>${transport.client_name || 'Sans client'}</b><br>
                    📍 ${transport.pickup_city} → ${transport.delivery_city}
                `);
            });
        }
        
        // ===== FORMULAIRE =====
        function montrerFormulaire() {
            document.getElementById('formulaire').style.display = 'block';
        }
        
        function cacherFormulaire() {
            document.getElementById('formulaire').style.display = 'none';
        }
        
        async function sauvegarder() {
            const transport = {
                client_name: document.getElementById('client').value,
                pickup_city: document.getElementById('pickup').value,
                delivery_city: document.getElementById('delivery').value,
                priority: document.getElementById('priority').value,
                status: 'pending',
                created_at: new Date()
            };
            
            const { error } = await supabase.from('orders').insert([transport]);
            
            if (error) {
                alert('Erreur: ' + error.message);
            } else {
                alert('✅ Transport créé !');
                cacherFormulaire();
                location.reload();
            }
        }
        
        // ===== LANCEMENT =====
        chargerTransports();
        
        // Rendre les fonctions accessibles
        window.montrerFormulaire = montrerFormulaire;
        window.cacherFormulaire = cacherFormulaire;
        window.sauvegarder = sauvegarder;
    </script>
    
</body>
</html>
