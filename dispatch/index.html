<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        #barre-jaune {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #facc15;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            font-weight: bold;
        }
        button {
            background: black;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="barre-jaune">
        <span>🚚 LÉMAN DISPATCH</span>
        <button onclick="alerte()">CLIQUE ICI</button>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <script>
        // La carte
        const map = L.map('map').setView([46.8, 8.2], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Un marqueur pour tester
        L.marker([46.52, 6.63]).addTo(map)
            .bindPopup('Lausanne');
        L.marker([46.20, 6.14]).addTo(map)
            .bindPopup('Genève');
        
        // La fonction du bouton
        function alerte() {
            alert("✅ Le bouton fonctionne !");
        }
    </script>
    
</body>
</html>
