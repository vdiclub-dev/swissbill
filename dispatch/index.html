<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch | Admin</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS (doit être AVANT les scripts) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <style>
        /* Votre CSS ici */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        header { background: #111; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #facc15; height: 70px; }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar { width: 220px; background: #111; padding: 20px; border-right: 1px solid #2a2a2a; }
        .sidebar button { width: 100%; padding: 12px; margin-bottom: 8px; background: #1f2937; color: white; border: none; border-radius: 6px; cursor: pointer; text-align: left; }
        .sidebar button:hover { background: #facc15; color: #111; }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        .right-panel { width: 320px; background: #111; border-left: 1px solid #2a2a2a; padding: 20px; overflow-y: auto; }
        .right-panel h3 { color: #facc15; margin-bottom: 20px; }
        .transport-item { background: #1f2937; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 3px solid #facc15; }
        .transport-item.urgent { border-left-color: #ef4444; }
        .transport-client { font-weight: bold; color: white; }
        .transport-route { font-size: 13px; color: #aaa; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #1f2937; border-radius: 10px; width: 90%; max-width: 500px; border: 1px solid #facc15; }
        .modal-header { background: #111; padding: 15px 20px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; }
        .modal-header h3 { color: #facc15; }
        .modal-content { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #aaa; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #111; border: 1px solid #2a2a2a; color: white; border-radius: 4px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #2a2a2a; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; }
        .btn-save { background: #facc15; color: #111; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; }
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; }
        .loader { text-align: center; padding: 20px; color: #aaa; }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- TOUS LES SCRIPTS ICI, DANS LE BON ORDRE -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        // À AJOUTER DANS VOTRE SCRIPT
window.selectSpeed = function(el, speed) {
    document.querySelectorAll('.speed-option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('speed').value = speed;
};

window.saveTransport = async function() {
    const transport = {
        client_name: document.getElementById('clientName').value,
        client_phone: document.getElementById('clientPhone').value,
        client_email: document.getElementById('clientEmail').value,
        pickup_address: document.getElementById('pickupAddress').value,
        delivery_address: document.getElementById('deliveryAddress').value,
        weight: parseFloat(document.getElementById('weight').value) || 1,
        quantity: parseInt(document.getElementById('quantity').value) || 1,
        parcel_type: document.getElementById('parcelType').value,
        speed: document.getElementById('speed').value,
        instructions: document.getElementById('instructions').value,
        priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
        status: 'pending',
        created_at: new Date()
    };
    
    if (!transport.client_name || !transport.pickup_address || !transport.delivery_address) {
        alert('Veuillez remplir tous les champs obligatoires');
        return;
    }
    
    try {
        const { error } = await supabase.from('transport_orders').insert([transport]);
        if (error) throw error;
        alert('✅ Transport créé avec succès !');
        closeModal();
        loadTransports();
    } catch(e) {
        console.error('Erreur:', e);
        alert('❌ Erreur: ' + e.message);
    }
};
        document.addEventListener('DOMContentLoaded', function() {
            console.log("🚀 Démarrage...");
            
            // Vérifier que Leaflet est chargé
            if (typeof L === 'undefined') {
                console.error("❌ Leaflet non chargé !");
                document.body.innerHTML = '<div style="color:red; padding:20px;">❌ Erreur: Leaflet non chargé</div>';
                return;
            }
            console.log("✅ Leaflet OK");
            
            // ===== VÉRIFICATION CONFIG =====
            if (!window.SUPABASE_CONFIG) {
                document.body.innerHTML = '<div style="color:red; padding:20px;">❌ config.js non chargé</div>';
                return;
            }
            
            // ===== SUPABASE =====
            const supabase = window.supabase.createClient(
                window.SUPABASE_CONFIG.url,
                window.SUPABASE_CONFIG.key
            );
            console.log("✅ Supabase prêt");
            
            // ===== VÉRIFICATION AUTHENTIFICATION =====
            const user = localStorage.getItem('user');
            if (!user) { window.location.href = '../login/'; return; }
            const userData = JSON.parse(user);
            if (!userData.loggedIn || userData.role !== 'admin') { window.location.href = '../'; return; }
            
            // ===== CONSTRUCTION PAGE =====
            document.getElementById('app').innerHTML = `
                <header>
                    <div class="logo"><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                    <div class="stats-header">
                        <div class="stat-item"><span>📦 Total</span><span class="stat-value" id="totalCount">0</span></div>
                        <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value" id="urgentCount">0</span></div>
                    </div>
                    <div class="user-section">
                        <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                        <button class="btn" onclick="openModal()">➕ Créer transport</button>
                    </div>
                </header>

                <div class="container">
                    <div class="sidebar">
                        <button class="active">🗺️ Dispatch</button>
                        <button>📦 Transports</button>
                        <button>👤 Clients</button>
                        <button>🚚 Chauffeurs</button>
                        <button>💰 Factures</button>
                    </div>
                    
                    <div class="map-container"><div id="map"></div></div>
                    
                    <div class="right-panel">
                        <h3>📋 Derniers transports</h3>
                        <div id="transportList"><div class="loader"><i class="fas fa-spinner fa-spin"></i> Chargement...</div></div>
                    </div>
                </div>

              <!-- MODAL DE CRÉATION DE TRANSPORT (COMPLÈTE) -->
<div id="modal" class="modal">
    <div class="modal-box" style="max-width: 700px;">
        <div class="modal-header">
            <h3>➕ Nouveau transport</h3>
            <button onclick="closeModal()">✖</button>
        </div>
        <div class="modal-content" style="max-height: 70vh; overflow-y: auto;">
            <form onsubmit="event.preventDefault(); saveTransport();">
                
                <!-- SECTION CLIENT -->
                <div style="background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom:20px;">
                    <h4 style="color:#facc15; margin-bottom:15px;">👤 Client</h4>
                    
                    <div class="form-group">
                        <label>Rechercher client</label>
                        <input type="text" id="clientSearch" placeholder="Nom, téléphone..." style="width:100%; padding:10px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                    </div>
                    
                    <div class="form-group">
                        <label>Nom client *</label>
                        <input type="text" id="clientName" required placeholder="Jean Dupont" style="width:100%; padding:10px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                    </div>
                    
                    <div class="form-row" style="display:flex; gap:10px;">
                        <div style="flex:1;"><label>Téléphone</label><input type="tel" id="clientPhone" style="width:100%; padding:10px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;"></div>
                        <div style="flex:1;"><label>Email</label><input type="email" id="clientEmail" style="width:100%; padding:10px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;"></div>
                    </div>
                </div>
                
                <!-- RAMASSAGE -->
                <div style="background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom:20px;">
                    <h4 style="color:#facc15; margin-bottom:15px;">📍 Ramassage</h4>
                    <div class="form-group">
                        <label>Adresse complète *</label>
                        <input type="text" id="pickupAddress" required value="Impasse des Griottes 3, 1462 Yvonand" style="width:100%; padding:10px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                    </div>
                </div>
                
                <!-- LIVRAISON -->
                <div style="background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom:20px;">
                    <h4 style="color:#facc15; margin-bottom:15px;">🎯 Livraison</h4>
                    <div class="form-group">
                        <label>Adresse complète *</label>
                        <input type="text" id="deliveryAddress" required style="width:100%; padding:10px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                    </div>
                </div>
                
                <!-- COLIS PRINCIPAL -->
                <div style="background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom:20px;">
                    <h4 style="color:#facc15; margin-bottom:15px;">📦 Colis</h4>
                    <div class="form-row" style="display:flex; gap:10px;">
                        <div style="flex:1;"><label>Poids (kg)</label><input type="number" id="weight" value="1" step="0.1" style="width:100%; padding:10px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;"></div>
                        <div style="flex:1;"><label>Quantité</label><input type="number" id="quantity" value="1" min="1" style="width:100%; padding:10px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Type de colis</label>
                        <select id="parcelType" style="width:100%; padding:10px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                            <option value="Colis">📦 Colis standard</option>
                            <option value="Fragile">⚠️ Fragile</option>
                            <option value="Palette">📦 Palette</option>
                            <option value="Document">📄 Document</option>
                        </select>
                    </div>
                </div>
                
                <!-- VITESSE -->
                <div style="background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom:20px;">
                    <h4 style="color:#facc15; margin-bottom:15px;">⚡ Vitesse de livraison</h4>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
                        <div class="speed-option" onclick="selectSpeed(this, '6h')" style="text-align:center; padding:10px; background:#2a2a2a; border-radius:4px; cursor:pointer;">🚀 6h</div>
                        <div class="speed-option selected" onclick="selectSpeed(this, '12h')" style="text-align:center; padding:10px; background:#facc15; color:#111; border-radius:4px; cursor:pointer;">⚡ 12h</div>
                        <div class="speed-option" onclick="selectSpeed(this, '24h')" style="text-align:center; padding:10px; background:#2a2a2a; border-radius:4px; cursor:pointer;">📦 24h</div>
                    </div>
                    <input type="hidden" id="speed" value="12h">
                </div>
                
                <!-- INSTRUCTIONS -->
                <div style="background:#1a1a1a; padding:15px; border-radius:8px; margin-bottom:20px;">
                    <div class="form-group">
                        <label>Instructions spéciales</label>
                        <textarea id="instructions" rows="2" style="width:100%; padding:10px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;"></textarea>
                    </div>
                </div>
                
                <!-- BOUTONS -->
                <div class="modal-buttons" style="display:flex; gap:10px; margin-top:20px;">
                    <button type="button" class="btn-cancel" onclick="closeModal()" style="flex:1; padding:12px; background:#2a2a2a; color:white; border:none; border-radius:4px; cursor:pointer;">Annuler</button>
                    <button type="submit" class="btn-save" style="flex:1; padding:12px; background:#facc15; color:#111; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">Créer le transport</button>
                </div>
            </form>
        </div>
    </div>
</div>
            
            // ===== FONCTIONS =====
            window.logout = function() { localStorage.removeItem('user'); window.location.href = '../login/'; };
            window.openModal = function() { document.getElementById('modal').style.display = 'flex'; };
            window.closeModal = function() { document.getElementById('modal').style.display = 'none'; };
            
            // Carte
            function initMap() {
                try {
                    console.log("🗺️ Initialisation carte...");
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    markers = L.markerClusterGroup();
                    map.addLayer(markers);
                    console.log("✅ Carte OK");
                    loadTransports();
                } catch(e) { console.error("Erreur carte:", e); }
            }
            
            async function loadTransports() {
                try {
                    const { data } = await supabase.from('transport_orders').select('*').order('created_at', { ascending: false });
                    
                    document.getElementById('totalCount').textContent = data?.length || 0;
                    document.getElementById('urgentCount').textContent = data?.filter(t => t.priority === 'urgent').length || 0;
                    
                    let html = '';
                    data?.slice(0, 5).forEach(t => {
                        html += `<div class="transport-item ${t.priority === 'urgent' ? 'urgent' : ''}">
                            <div class="transport-client">${t.client_name || 'Sans client'}</div>
                            <div class="transport-route">${t.pickup_city || t.pickup_address || '?'} → ${t.delivery_city || t.delivery_address || '?'}</div>
                        </div>`;
                    });
                    document.getElementById('transportList').innerHTML = html || '<div>Aucun transport</div>';
                    
                    if (markers) {
                        markers.clearLayers();
                        data?.forEach((t, i) => {
                            let lat = 46.8, lng = 8.2;
                            L.marker([lat, lng]).addTo(markers);
                        });
                    }
                } catch(e) { console.error("Erreur chargement:", e); }
            }
            
            window.saveTransport = async function() {
                const transport = {
                    client_name: document.getElementById('clientName').value,
                    client_phone: document.getElementById('clientPhone').value,
                    pickup_address: document.getElementById('pickupAddress').value,
                    delivery_address: document.getElementById('deliveryAddress').value,
                    weight: parseFloat(document.getElementById('weight').value) || 1,
                    quantity: parseInt(document.getElementById('quantity').value) || 1,
                    priority: document.getElementById('priority').value,
                    status: 'pending',
                    created_at: new Date()
                };
                
                if (!transport.client_name || !transport.pickup_address || !transport.delivery_address) {
                    alert('Champs obligatoires');
                    return;
                }
                
                try {
                    await supabase.from('transport_orders').insert([transport]);
                    alert('✅ Transport créé');
                    closeModal();
                    loadTransports();
                } catch(e) { alert('❌ Erreur: ' + e.message); }
            };
            
            // Lancement
            initMap();
            setInterval(loadTransports, 30000);
        });
    </script>
</body>
