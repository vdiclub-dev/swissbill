    <!-- MODAL D'ÉDITION TRANSPORT -->

    <!-- MODAL TOURNÉE EN GRAND -->
    <div id="tourModal" class="modal">

                <h2 id="modalTourTitle">🚚 Tournée</h2>

    <!-- LE SCRIPT PRINCIPAL EN MODULE -->
    <script type="module">
        // ===== IMPORTS =====
        import { supabase } from '../js/supabase.js';
        import { geocoderAdresse, geocoderTournee } from '../js/geocoding.js';
        import { calculerDistanceRoute, calculerDistanceVolOiseau, calculerMatriceDistances } from '../js/routing.js';
        import { optimiserTournee } from '../js/optimization.js';
        import { showMessage, calculerStatsTournee } from '../js/ui.js';

        // ===== CODE PRINCIPAL =====
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Tournées...");
                
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let tours = [
                    { id: 1, nom: "Tournée Lausanne", couleur: '#3b82f6', chauffeur: null, transports: [] },
                    { id: 2, nom: "Tournée Genève", couleur: '#10b981', chauffeur: null, transports: [] },
                    { id: 3, nom: "Tournée Berne", couleur: '#f59e0b', chauffeur: null, transports: [] }
                ];
                let chauffeurs = [];
                let currentTourId = null;
                
                const depot = {
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== CHARGEMENT CHAUFFEURS =====
                async function loadChauffeurs() {
                    const { data } = await supabase
                        .from('chauffeurs')
                        .select('*')
                        .eq('actif', true);
                    
                    chauffeurs = data || [];
                }
                
              // ===== GÉNÉRER PDF PROFESSIONNEL =====
window.genererPDF = async function(tourId) {
    const tour = tours.find(t => t.id === tourId);
    if (!tour || tour.transports.length === 0) return;
    
    // Calculer les stats réelles avec OSRM
    const stats = await calculerStatsTournee(tour.transports, depot, calculerDistanceRoute);
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 20;
    
    // ===== EN-TÊTE =====
    doc.setFont("helvetica", "bold");
    doc.setFontSize(24);
    doc.setTextColor(250, 204, 21); // #facc15
    doc.text("LÉMAN-COURSES", 105, y, { align: "center" });
    y += 8;
    
    doc.setFontSize(12);
    doc.setTextColor(100, 100, 100);
    doc.text("Impasse des Griottes 3, 1462 Yvonand", 105, y, { align: "center" });
    doc.text("Tél: +41 79 870 04 88", 105, y+5, { align: "center" });
    
    // ===== TITRE TOURNÉE =====
    y += 15;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.setTextColor(0, 0, 0);
    doc.text(`🚚 ${tour.nom}`, 20, y);
    
    // Date
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(100, 100, 100);
    doc.text(`Date: ${new Date().toLocaleDateString('fr-CH')}`, 150, y);
    
    // ===== RÉCAPITULATIF =====
    y += 10;
    doc.setFillColor(240, 240, 240);
    doc.rect(20, y, 170, 25, 'F');
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.setTextColor(0, 0, 0);
    doc.text("RÉCAPITULATIF DE LA TOURNÉE", 25, y+7);
    
    doc.setFontSize(10);
    doc.text(`Distance totale: ${stats.distance} km`, 25, y+15);
    doc.text(`Durée totale: ${Math.floor(stats.duree/60)}h${stats.duree%60}`, 90, y+15);
    doc.text(`Poids total: ${stats.poids} kg`, 150, y+15);
    
    // ===== DÉTAIL DES ARRÊTS =====
    y += 35;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.setTextColor(250, 204, 21);
    doc.text("📋 DÉTAIL DES LIVRAISONS", 20, y);
    
    // En-tête du tableau
    y += 8;
    doc.setFillColor(50, 50, 50);
    doc.rect(20, y, 170, 8, 'F');
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.setTextColor(255, 255, 255);
    doc.text("N°", 22, y+5);
    doc.text("Client", 35, y+5);
    doc.text("Adresse", 70, y+5);
    doc.text("Km", 140, y+5);
    doc.text("Arrivée", 160, y+5);
    
    // Ligne de séparation
    y += 8;
    doc.setDrawColor(200, 200, 200);
    doc.line(20, y, 190, y);
    
    // Calcul des km cumulés
    let kmCumule = 0;
    let tempsCumule = 0;
    let position = depot;
    
    for (let i = 0; i < tour.transports.length; i++) {
        const t = tour.transports[i];
        
        // Calcul du trajet depuis le point précédent
        let trajetKm = 0;
        let trajetMin = 0;
        
        if (t.lat && t.lng && position.lat && position.lng) {
            const route = await calculerDistanceRoute(position, t);
            trajetKm = route.distance;
            trajetMin = route.duree;
        } else {
            trajetKm = 30;
            trajetMin = 40;
        }
        
        kmCumule += trajetKm;
        tempsCumule += trajetMin + 5; // +5 min service
        
        // Heure d'arrivée (départ à 8h00)
        const heureDepart = 8 * 60; // 8h00 en minutes
        const heureArrivee = heureDepart + tempsCumule - 5; // avant service
        const h = Math.floor(heureArrivee / 60);
        const m = heureArrivee % 60;
        
        doc.setFont("helvetica", "normal");
        doc.setFontSize(8);
        doc.setTextColor(0, 0, 0);
        
        // Numéro
        doc.text(`${i+1}`, 22, y+5);
        
        // Client
        let client = t.destinataire_nom || 'Client';
        if (client.length > 15) client = client.substring(0, 12) + '...';
        doc.text(client, 35, y+5);
        
        // Adresse
        let adr = t.delivery_address || '';
        if (adr.length > 25) adr = adr.substring(0, 22) + '...';
        doc.text(adr, 70, y+5);
        
        // Km
        doc.text(`${Math.round(kmCumule)}`, 142, y+5);
        
        // Heure
        doc.text(`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`, 160, y+5);
        
        // Ligne de séparation
        y += 6;
        doc.setDrawColor(230, 230, 230);
        doc.line(20, y, 190, y);
        y += 2;
        
        position = t;
        
        // Nouvelle page si nécessaire
        if (y > 270) {
            doc.addPage();
            y = 20;
        }
    }
    
    // Retour au dépôt
    if (tour.transports.length > 0) {
        const dernier = tour.transports[tour.transports.length - 1];
        let trajetRetourKm = 0;
        let trajetRetourMin = 0;
        
        if (dernier.lat && dernier.lng) {
            const route = await calculerDistanceRoute(dernier, depot);
            trajetRetourKm = route.distance;
            trajetRetourMin = route.duree;
        } else {
            trajetRetourKm = 30;
            trajetRetourMin = 40;
        }
        
        kmCumule += trajetRetourKm;
        tempsCumule += trajetRetourMin;
        
        const heureRetour = 8 * 60 + tempsCumule;
        const h = Math.floor(heureRetour / 60);
        const m = heureRetour % 60;
        
        doc.setFont("helvetica", "bold");
        doc.setTextColor(100, 100, 100);
        doc.text("Retour dépôt", 35, y+5);
        doc.text(`${Math.round(kmCumule)}`, 142, y+5);
        doc.text(`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`, 160, y+5);
        y += 6;
    }
    
    // ===== PIED DE PAGE =====
    doc.setFont("helvetica", "italic");
    doc.setFontSize(8);
    doc.setTextColor(150, 150, 150);
    doc.text("Document généré par Léman Dispatch", 105, 280, { align: "center" });
    
    doc.save(`tournee-${tour.nom.replace(/\s+/g, '_')}.pdf`);
};
                
                // ===== OUVRIR TOURNÉE EN GRAND =====
                window.ouvrirTournee = async function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (!tour) return;
                    
                    currentTourId = tourId;
                    
                    const stats = await calculerStatsTournee(tour.transports, depot, calculerDistanceRoute);
                    
                    let transportsHTML = '';
                    tour.transports.forEach((t, index) => {
                        transportsHTML += `
                            <div class="modal-transport-item ${t.speed === '6h' ? 'urgent' : ''}">
                                <div class="modal-transport-info">
                                    <div style="display:flex; gap:20px; margin-bottom:5px;">
                                        <span style="color:#facc15; font-weight:bold;">#${index + 1}</span>
                                        <span style="color:#9ca3af;"><i class="fas fa-user"></i> ${t.client_number || 'Inconnu'}</span>
                                    </div>
                                    <div style="font-weight:bold; font-size:16px; margin-bottom:5px;">
                                        👤 ${t.destinataire_nom || 'Client'}
                                    </div>
                                    <div style="font-size:12px; color:#aaa; margin-bottom:5px;">
                                        📍 ${t.delivery_address || ''}
                                    </div>
                                    <div style="display:flex; gap:15px; font-size:12px; color:#9ca3af;">
                                        <span>⚡ ${t.speed || '24h'}</span>
                                        <span>⚖️ ${t.weight || 1} kg</span>
                                    </div>
                                </div>
                                <div class="modal-transport-actions">
                                    <button class="btn-move btn-small" onclick="deplacerTransport('${t.id}', -1)" title="Monter">
                                        <i class="fas fa-arrow-up"></i>
                                    </button>
                                    <button class="btn-move btn-small" onclick="deplacerTransport('${t.id}', 1)" title="Descendre">
                                        <i class="fas fa-arrow-down"></i>
                                    </button>
                                    <button class="btn-delete btn-small" onclick="retirerTransport('${t.id}')" title="Retirer">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <button class="btn-pdf" onclick="genererPDF(${tour.id})">
                           <i class="fas fa-file-pdf"></i> PDF complet
                            </button>
                        `;
                    });
                    
                    document.getElementById('modalTourTitle').innerHTML = `🚚 ${tour.nom}`;
                    document.getElementById('modalTourContent').innerHTML = `
                        <div class="modal-stats">
                            <div class="modal-stat-item">
                                <div class="modal-stat-value">${stats.distance} km</div>
                                <div class="modal-stat-label">Distance</div>
                            </div>
                            <div class="modal-stat-item">
                                <div class="modal-stat-value">${Math.floor(stats.duree/60)}h${stats.duree%60}</div>
                                <div class="modal-stat-label">Durée</div>
                            </div>
                            <div class="modal-stat-item">
                                <div class="modal-stat-value">${stats.poids} kg</div>
                                <div class="modal-stat-label">Charge</div>
                            </div>
                        </div>
                        
                        <div class="modal-actions">
                            <button class="btn-optimize" onclick="optimiserTournee(${tour.id})">
                                <i class="fas fa-robot"></i> Optimisation IA
                            </button>
                            <button class="btn-optimize" onclick="geocoderTourneeBtn(${tour.id})">
                                <i class="fas fa-map-pin"></i> Géocoder les adresses
                            </button>
                            <button class="btn-success" onclick="trierParProximite(${tour.id})">
                                <i class="fas fa-map-marked-alt"></i> Trier par proximité
                            </button>
                            <button class="btn-pdf" onclick="genererPDF(${tour.id})">
                                <i class="fas fa-file-pdf"></i> PDF
                            </button>
                        </div>
                        
                        <div style="margin-bottom:20px;">
                            <label style="color:#facc15; font-weight:bold;">Chauffeur assigné</label>
                            <select class="modal-chauffeur-select" onchange="assignerChauffeur(${tour.id}, this.value)">
                                <option value="">Aucun chauffeur</option>
                                ${chauffeurs.map(c => `
                                    <option value="${c.id}" ${tour.chauffeur === c.id ? 'selected' : ''}>
                                        ${c.prenom} ${c.nom}
                                    </option>
                                `).join('')}
                            </select>
                        </div>
                        
                        <h3 style="color:#facc15; margin:20px 0 10px;">
                            <i class="fas fa-list"></i> Ordre de livraison (${tour.transports.length})
                        </h3>
                        <div class="modal-transport-list" id="modalTransportList">
                            ${transportsHTML}
                        </div>
                    `;
                    
                    document.getElementById('tourModal').style.display = 'flex';
                };
                
                // ===== DÉPLACER UN TRANSPORT =====
                window.deplacerTransport = function(transportId, direction) {
                    const tour = tours.find(t => t.id === currentTourId);
                    if (!tour) return;
                    
                    const index = tour.transports.findIndex(t => t.id === transportId);
                    if (index === -1) return;
                    
                    const newIndex = index + direction;
                    if (newIndex < 0 || newIndex >= tour.transports.length) return;
                    
                    [tour.transports[index], tour.transports[newIndex]] = 
                    [tour.transports[newIndex], tour.transports[index]];
                    
                    ouvrirTournee(currentTourId);
                    afficherPage();
                };
                
                // ===== RETIRER UN TRANSPORT =====
                window.retirerTransport = function(transportId) {
                    const tour = tours.find(t => t.id === currentTourId);
                    if (!tour) return;
                    
                    tour.transports = tour.transports.filter(t => t.id !== transportId);
                    
                    if (tour.transports.length === 0) {
                        document.getElementById('tourModal').style.display = 'none';
                    } else {
                        ouvrirTournee(currentTourId);
                    }
                    afficherPage();
                };
                
                // ===== TRIER PAR PROXIMITÉ =====
                window.trierParProximite = function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (!tour || tour.transports.length === 0) return;
                    
                    tour.transports.sort((a, b) => {
                        const distA = (a.lat && a.lng) 
                            ? calculerDistanceVolOiseau(depot.lat, depot.lng, a.lat, a.lng)
                            : 999;
                        const distB = (b.lat && b.lng)
                            ? calculerDistanceVolOiseau(depot.lat, depot.lng, b.lat, b.lng)
                            : 999;
                        return distA - distB;
                    });
                    
                    showMessage("✅ Tri par proximité effectué", "#10b981");
                    ouvrirTournee(tourId);
                    afficherPage();
                };
                
                // ===== GÉOCODER UNE TOURNÉE =====
                window.geocoderTourneeBtn = async function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (!tour) return;
                    
                    await geocoderTournee(tour.transports, showMessage);
                    ouvrirTournee(tourId);
                    afficherPage();
                };
                
                // ===== OPTIMISER UNE TOURNÉE =====
                window.optimiserTournee = async function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (!tour || tour.transports.length === 0) return;
                    
                    const itineraire = await optimiserTournee(tour.transports, depot, showMessage);
                    
                    if (itineraire) {
                        tour.transports = itineraire;
                        ouvrirTournee(tourId);
                        afficherPage();
                    }
                };
                
                // ===== ASSIGNER CHAUFFEUR =====
                window.assignerChauffeur = async function(tourId, chauffeurId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (tour) {
                        tour.chauffeur = chauffeurId || null;
                        showMessage(chauffeurId ? "✅ Chauffeur assigné" : "Chauffeur retiré", "#10b981");
                        afficherPage();
                    }
                };
                
                // ===== CHARGEMENT =====
                async function loadData() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    await loadChauffeurs();
                    afficherPage();
                }
                
                // ===== RENOMMER =====
                window.renommerTournee = function(tourId, event) {
                    event.stopPropagation();
                    const tour = tours.find(t => t.id === tourId);
                    const nouveauNom = prompt("Nouveau nom:", tour.nom);
                    if (nouveauNom) {
                        tour.nom = nouveauNom;
                        afficherPage();
                    }
                };
                
                // ===== OUVRIR MODAL ÉDITION TRANSPORT =====
                window.ouvrirEdition = function(transportId) {
                    const t = allTransports.find(t => t.id === transportId);
                    if (!t) return;
                    
                    document.getElementById('modalContent').innerHTML = `
                        <div style="margin-bottom:15px;">
                            <label style="color:#aaa;">Numéro client</label>
                            <input type="text" id="editClient" value="${t.client_number || ''}" style="width:100%; padding:8px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                        </div>
                        <div style="margin-bottom:15px;">
                            <label style="color:#aaa;">Destinataire</label>
                            <input type="text" id="editDest" value="${t.destinataire_nom || ''}" style="width:100%; padding:8px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                        </div>
                        <div style="margin-bottom:15px;">
                            <label style="color:#aaa;">Adresse</label>
                            <input type="text" id="editAddr" value="${t.delivery_address || ''}" style="width:100%; padding:8px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                        </div>
                        <div style="margin-bottom:15px;">
                            <label style="color:#aaa;">Poids (kg)</label>
                            <input type="number" id="editPoids" value="${t.weight || 1}" style="width:100%; padding:8px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                        </div>
                        <div style="margin-bottom:15px;">
                            <label style="color:#aaa;">Vitesse</label>
                            <select id="editSpeed" style="width:100%; padding:8px; background:#111; border:1px solid #2a2a2a; color:white;">
                                <option value="24h" ${t.speed === '24h' ? 'selected' : ''}>24h</option>
                                <option value="12h" ${t.speed === '12h' ? 'selected' : ''}>12h</option>
                                <option value="6h" ${t.speed === '6h' ? 'selected' : ''}>6h</option>
                            </select>
                        </div>
                        <div class="modal-actions" style="display:flex; gap:10px; margin-top:20px;">
                            <button class="btn" onclick="document.getElementById('editModal').style.display='none'" style="flex:1;">Annuler</button>
                            <button class="btn-success" onclick="sauvegarderEdition('${t.id}')" style="flex:2;">Sauvegarder</button>
                        </div>
                    `;
                    
                    document.getElementById('editModal').style.display = 'flex';
                };
                
                window.sauvegarderEdition = async function(id) {
                    await supabase
                        .from('transport_orders_simple')
                        .update({
                            client_number: document.getElementById('editClient').value,
                            destinataire_nom: document.getElementById('editDest').value,
                            delivery_address: document.getElementById('editAddr').value,
                            weight: parseFloat(document.getElementById('editPoids').value),
                            speed: document.getElementById('editSpeed').value
                        })
                        .eq('id', id);
                    
                    document.getElementById('editModal').style.display = 'none';
                    loadData();
                };
                
                // ===== AFFICHAGE PRINCIPAL =====
                function afficherPage() {
                    const transportsDansTournees = new Set();
                    tours.forEach(tour => {
                        tour.transports.forEach(t => transportsDansTournees.add(t.id));
                    });
                    
                    const enAttente = allTransports.filter(t => 
                        t.status !== 'delivered' && !transportsDansTournees.has(t.id)
                    );
                    
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Léman Dispatch</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 En attente</span><span class="stat-value">${enAttente.length}</span></div>
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tours.length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn" onclick="window.location.href='new-transport.html'">➕ Nouveau</button>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <!-- PANEL GAUCHE - TOURNÉES -->
                            <div class="tours-panel">
                                <div class="panel-header">
                                    <h2><i class="fas fa-route"></i> Tournées</h2>
                                    <button class="btn-success btn-small" onclick="ajouterTournee()">➕ Nouvelle</button>
                                </div>
                                
                                ${tours.map(tour => {
                                    const stats = calculerStatsTournee(tour.transports, depot, calculerDistanceVolOiseau);
                                    const chauffeur = chauffeurs.find(c => c.id === tour.chauffeur);
                                    return `
                                        <div class="tour-card" ondblclick="ouvrirTournee(${tour.id})">
                                            <div class="tour-header">
                                                <span class="tour-title" onclick="renommerTournee(${tour.id}, event)">
                                                    🚚 ${tour.nom}
                                                </span>
                                                <div>
                                                    <button class="btn-pdf btn-small" onclick="event.stopPropagation(); genererPDF(${tour.id})">
                                                        <i class="fas fa-file-pdf"></i>
                                                    </button>
                                                    <button class="btn-delete btn-small" onclick="event.stopPropagation(); supprimerTournee(${tour.id})">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            ${tour.chauffeur ? `
                                                <div class="tour-chauffeur">
                                                    <i class="fas fa-user"></i> Chauffeur: ${chauffeur?.prenom} ${chauffeur?.nom}
                                                </div>
                                            ` : ''}
                                            
                                            <div class="tour-stats">
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${stats.distance} km</div>
                                                    <div class="tour-stat-label">Distance</div>
                                                </div>
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${Math.floor(stats.duree/60)}h${stats.duree%60}</div>
                                                    <div class="tour-stat-label">Durée</div>
                                                </div>
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${stats.poids} kg</div>
                                                    <div class="tour-stat-label">Charge</div>
                                                </div>
                                            </div>
                                            
                                            <div class="tour-list" data-tour-id="${tour.id}">
                                                ${tour.transports.map(t => `
                                                    <div class="transport-card" ondblclick="ouvrirEdition('${t.id}'); event.stopPropagation();" data-id="${t.id}">
                                                        <div class="transport-expediteur">
                                                            <i class="fas fa-user"></i> ${t.client_number || 'Inconnu'}
                                                        </div>
                                                        <div class="transport-destinataire">
                                                            👤 ${t.destinataire_nom || 'Client'}
                                                        </div>
                                                        <div class="transport-address">
                                                            📍 ${(t.delivery_address || '').substring(0,40)}
                                                        </div>
                                                        <div class="transport-meta">
                                                            <span>⚡ ${t.speed || '24h'}</span>
                                                            <span>⚖️ ${t.weight || 1} kg</span>
                                                        </div>
                                                        <button class="remove-from-tour" onclick="enleverDeTournee('${t.id}'); event.stopPropagation();">
                                                            <i class="fas fa-times"></i> Retirer
                                                        </button>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                            
                            <!-- PANEL DROIT - EN ATTENTE -->
                            <div class="pending-panel">
                                <div class="pending-header">
                                    <h2><i class="fas fa-clock"></i> En attente</h2>
                                    <span class="stat-value">${enAttente.length}</span>
                                </div>
                                
                                <div class="pending-list" id="pendingList">
                                    ${enAttente.map(t => `
                                        <div class="transport-card ${t.speed === '6h' ? 'urgent' : ''}" 
                                             ondblclick="ouvrirEdition('${t.id}')"
                                             data-id="${t.id}">
                                            <div class="transport-expediteur">
                                                <i class="fas fa-user"></i> ${t.client_number || 'Inconnu'}
                                            </div>
                                            <div class="transport-destinataire">
                                                👤 ${t.destinataire_nom || 'Client'}
                                            </div>
                                            <div class="transport-address">
                                                📍 ${(t.delivery_address || '').substring(0,40)}
                                            </div>
                                            <div class="transport-meta">
                                                <span>⚡ ${t.speed || '24h'}</span>
                                                <span>⚖️ ${t.weight || 1} kg</span>
                                            </div>
                                            <button class="btn-delete-transport" onclick="supprimerTransport('${t.id}'); event.stopPropagation();">
                                                <i class="fas fa-trash"></i> Supprimer
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    initDragAndDrop();
                }
                
                // ===== DRAG & DROP =====
                function initDragAndDrop() {
                    $(".transport-card").draggable({
                        revert: "invalid",
                        helper: "clone",
                        cursor: "move",
                        opacity: 0.7,
                        zIndex: 1000
                    });
                    
                    $(".tour-list").droppable({
                        accept: ".transport-card",
                        hoverClass: "drop-target",
                        drop: function(event, ui) {
                            const transportId = ui.draggable.data('id');
                            const tourId = $(this).data('tour-id');
                            
                            if (!tourId) return;
                            
                            ajouterATournee(transportId, tourId);
                        }
                    });
                }
                
                // ===== FONCTIONS DE BASE =====
                window.ajouterTournee = function() {
                    const newId = tours.length + 1;
                    const couleurs = ['#3b82f6', '#10b981', '#f59e0b'];
                    tours.push({
                        id: newId,
                        nom: `Tournée ${newId}`,
                        couleur: couleurs[newId % couleurs.length],
                        chauffeur: null,
                        transports: []
                    });
                    afficherPage();
                };
                
                window.supprimerTournee = function(tourId) {
                    if (confirm("Supprimer cette tournée ?")) {
                        tours = tours.filter(t => t.id !== tourId);
                        afficherPage();
                    }
                };
                
                window.ajouterATournee = function(transportId, tourId) {
                    const transport = allTransports.find(t => t.id === transportId);
                    const tour = tours.find(t => t.id === parseInt(tourId));
                    
                    if (transport && tour) {
                        tours.forEach(t => {
                            t.transports = t.transports.filter(t => t.id !== transportId);
                        });
                        tour.transports.push(transport);
                        afficherPage();
                    }
                };
                
                window.enleverDeTournee = function(transportId) {
                    tours.forEach(tour => {
                        tour.transports = tour.transports.filter(t => t.id !== transportId);
                    });
                    afficherPage();
                };
                
                window.supprimerTransport = async function(transportId) {
                    if (confirm("Supprimer définitivement ce transport ?")) {
                        await supabase
                            .from('transport_orders_simple')
                            .delete()
                            .eq('id', transportId);
                        loadData();
                    }
                };
                
                window.logout = function() {
                    localStorage.removeItem('user');
                    window.location.href = '../login/';
                };
                
                // ===== LANCEMENT =====
                await loadData();
                
            } catch(e) {
                console.error("Erreur:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
