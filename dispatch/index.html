<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch | Admin</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        /* HEADER */
        header { background: #111; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #facc15; height: 70px; }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-success { background: #10b981; color: white; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        /* STATS */
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        /* LAYOUT */
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar { width: 220px; background: #111; padding: 20px; border-right: 1px solid #2a2a2a; }
        .sidebar button { width: 100%; padding: 12px; margin-bottom: 8px; background: #1f2937; color: white; border: none; border-radius: 6px; cursor: pointer; text-align: left; }
        .sidebar button:hover { background: #facc15; color: #111; }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        
        /* PANEL DROIT */
        .right-panel { width: 350px; background: #111; border-left: 1px solid #2a2a2a; padding: 20px; overflow-y: auto; }
        .right-panel h3 { color: #facc15; margin-bottom: 20px; }
        .transport-item { background: #1f2937; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 3px solid #facc15; }
        .transport-item.urgent { border-left-color: #ef4444; }
        .transport-header { display: flex; justify-content: space-between; align-items: center; }
        .transport-client { font-weight: bold; color: white; }
        .transport-route { font-size: 13px; color: #aaa; margin: 4px 0; }
        .transport-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 11px; color: #666; }
        
        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #1f2937; border-radius: 10px; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; border: 1px solid #facc15; }
        .modal-header { background: #111; padding: 15px 20px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; position: sticky; top: 0; }
        .modal-header h3 { color: #facc15; }
        .modal-header button { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .modal-content { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #aaa; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: #111; border: 1px solid #2a2a2a; color: white; border-radius: 4px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-row .form-group { flex: 1; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #2a2a2a; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; }
        .btn-save { background: #facc15; color: #111; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; font-weight: bold; }
        .loader { text-align: center; padding: 20px; color: #aaa; }
        
        /* SECTIONS */
        .section { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .section-title { color: #facc15; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* RECHERCHE CLIENT */
        .client-search { position: relative; }
        .client-results { position: absolute; top: 100%; left: 0; right: 0; background: #2a2a2a; border: 1px solid #facc15; border-radius: 4px; max-height: 200px; overflow-y: auto; z-index: 10; display: none; }
        .client-result-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #3a3a3a; }
        .client-result-item:hover { background: #facc15; color: #111; }
        
        /* MODAL CLIENT */
        .client-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .client-modal-box { background: #1f2937; width: 90%; max-width: 500px; padding: 20px; border-radius: 10px; border: 1px solid #facc15; }
    </style>
</head>
<body>

    <div id="app">
        <div style="padding:20px;">Chargement...</div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Démarrage...");
                
                // ===== VÉRIFICATIONS =====
                if (typeof L === 'undefined') throw new Error("Leaflet non chargé");
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                // ===== SUPABASE =====
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                // ===== UTILISATEUR SIMULÉ =====
                const userData = { username: 'admin', role: 'admin' };
                
                // ===== CONSTRUCTION PAGE =====
                document.getElementById('app').innerHTML = `
                    <header>
                        <div class="logo"><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                        <div class="stats-header">
                            <div class="stat-item"><span>📦 Total</span><span class="stat-value" id="totalCount">0</span></div>
                            <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value" id="urgentCount">0</span></div>
                        </div>
                        <div class="user-section">
                            <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                            <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                            <button class="btn" id="newTransportBtn">➕ Nouveau transport</button>
                        </div>
                    </header>

                    <div class="container">
                        <div class="sidebar">
                            <button class="active">🗺️ Dispatch</button>
                            <button>📦 Transports</button>
                            <button>👤 Clients</button>
                            <button>🚚 Chauffeurs</button>
                            <button>💰 Factures</button>
                        </div>
                        
                        <div class="map-container"><div id="map"></div></div>
                        
                        <div class="right-panel">
                            <h3>📋 Derniers transports</h3>
                            <div id="transportList"><div class="loader"><i class="fas fa-spinner fa-spin"></i> Chargement...</div></div>
                        </div>
                    </div>

                    <!-- MODAL TRANSPORT -->
                    <div id="modal" class="modal">
                        <div class="modal-box">
                            <div class="modal-header">
                                <h3>➕ Nouveau transport</h3>
                                <button id="closeModalBtn">✖</button>
                            </div>
                            <div class="modal-content">
                                <form id="transportForm">
                                    
                                    <!-- SECTION CLIENT AVEC RECHERCHE -->
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-user-circle"></i> Client</h4>
                                        
                                        <div class="form-group client-search">
                                            <label>Rechercher client <small style="color:#666;">(n° ou nom)</small></label>
                                            <div style="display: flex; gap: 10px;">
                                                <input type="text" id="clientSearch" placeholder="Tapez n° client ou nom..." style="flex: 1;">
                                                <button type="button" class="btn-success" id="newClientBtn" style="padding: 10px 20px;">➕ Nouveau</button>
                                            </div>
                                            <div id="clientResults" class="client-results"></div>
                                        </div>
                                        
                                        <div class="form-row">
                                            <div class="form-group">
                                                <label>Numéro client *</label>
                                                <input type="text" id="clientNumber" placeholder="CL2025-001" required readonly style="background: #2a2a2a;">
                                            </div>
                                            <div class="form-group">
                                                <label>Nom / Société</label>
                                                <input type="text" id="clientName" readonly style="background: #2a2a2a;">
                                            </div>
                                        </div>
                                        
                                        <div class="form-group">
                                            <label>Adresse de ramassage par défaut</label>
                                            <input type="text" id="clientAddress" readonly style="background: #2a2a2a;">
                                        </div>
                                    </div>
                                    
                                    <!-- SECTION ADRESSES -->
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-map-marked-alt"></i> Adresses</h4>
                                        <div class="form-group">
                                            <label>Adresse de livraison *</label>
                                            <input type="text" id="deliveryAddress" placeholder="Rue, NPA, Ville" required>
                                        </div>
                                        <div class="form-group">
                                            <label>Complément / Instructions livraison</label>
                                            <input type="text" id="deliveryComplement" placeholder="Étage, code, service...">
                                        </div>
                                    </div>
                                    
                                    <!-- SECTION COLIS PRINCIPAL -->
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-box"></i> Colis</h4>
                                        <div class="form-row">
                                            <div class="form-group">
                                                <label>Poids (kg)</label>
                                                <input type="number" id="weight" value="1" step="0.1">
                                            </div>
                                            <div class="form-group">
                                                <label>Quantité</label>
                                                <input type="number" id="quantity" value="1" min="1">
                                            </div>
                                            <div class="form-group">
                                                <label>Type</label>
                                                <select id="packageType">
                                                    <option value="Colis">📦 Colis</option>
                                                    <option value="Fragile">⚠️ Fragile</option>
                                                    <option value="Palette">📦 Palette</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- SECTION SERVICE -->
                                    <div class="section">
                                        <h4 class="section-title"><i class="fas fa-clock"></i> Service</h4>
                                        <div class="form-row">
                                            <div class="form-group">
                                                <label>Vitesse</label>
                                                <select id="speed">
                                                    <option value="24h">24h (Standard)</option>
                                                    <option value="12h">12h (Express)</option>
                                                    <option value="6h">6h (Urgent)</option>
                                                </select>
                                            </div>
                                            <div class="form-group">
                                                <label>Livraison nuit</label>
                                                <select id="nightDelivery">
                                                    <option value="false">Non</option>
                                                    <option value="true">Oui</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- SECTION INSTRUCTIONS -->
                                    <div class="section">
                                        <div class="form-group">
                                            <label>📝 Instructions spéciales</label>
                                            <textarea id="instructions" rows="2" placeholder="Fragile, code d'accès..."></textarea>
                                        </div>
                                    </div>
                                    
                                    <!-- BOUTONS -->
                                    <div class="modal-buttons">
                                        <button type="button" class="btn-cancel" id="cancelModalBtn">Annuler</button>
                                        <button type="submit" class="btn-save">✅ Créer le transport</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- MODAL NOUVEAU CLIENT -->
                    <div id="clientModal" class="client-modal">
                        <div class="client-modal-box">
                            <h3 style="color: #facc15; margin-bottom: 20px;">➕ Nouveau client</h3>
                            <form id="clientForm">
                                <div class="form-group">
                                    <label>Numéro client *</label>
                                    <input type="text" id="newClientNumber" placeholder="CL2025-001" required>
                                </div>
                                <div class="form-group">
                                    <label>Nom / Société *</label>
                                    <input type="text" id="newClientName" placeholder="Dupont Jean" required>
                                </div>
                                <div class="form-group">
                                    <label>Adresse de ramassage par défaut</label>
                                    <input type="text" id="newClientAddress" value="Impasse des Griottes 3, 1462 Yvonand">
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" id="newClientEmail" placeholder="client@email.com">
                                </div>
                                <div class="form-group">
                                    <label>Téléphone</label>
                                    <input type="tel" id="newClientPhone" placeholder="079 123 45 67">
                                </div>
                                <div style="display: flex; gap: 10px; margin-top: 20px;">
                                    <button type="button" class="btn-cancel" id="cancelClientBtn" style="flex: 1;">Annuler</button>
                                    <button type="submit" class="btn-save" style="flex: 1;">Créer le client</button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
                
                // ===== RÉFÉRENCES =====
                const modal = document.getElementById('modal');
                const clientModal = document.getElementById('clientModal');
                const newBtn = document.getElementById('newTransportBtn');
                const closeBtn = document.getElementById('closeModalBtn');
                const cancelBtn = document.getElementById('cancelModalBtn');
                const newClientBtn = document.getElementById('newClientBtn');
                const cancelClientBtn = document.getElementById('cancelClientBtn');
                const form = document.getElementById('transportForm');
                const clientForm = document.getElementById('clientForm');
                const logoutBtn = document.getElementById('logoutBtn');
                
                const clientSearch = document.getElementById('clientSearch');
                const clientResults = document.getElementById('clientResults');
                const clientNumber = document.getElementById('clientNumber');
                const clientName = document.getElementById('clientName');
                const clientAddress = document.getElementById('clientAddress');
                
                // ===== GESTION MODAL TRANSPORT =====
                newBtn.onclick = () => modal.style.display = 'flex';
                closeBtn.onclick = () => modal.style.display = 'none';
                cancelBtn.onclick = () => modal.style.display = 'none';
                
                // ===== GESTION MODAL CLIENT =====
                newClientBtn.onclick = () => clientModal.style.display = 'flex';
                cancelClientBtn.onclick = () => clientModal.style.display = 'none';
                
                // ===== DÉCONNEXION =====
                logoutBtn.onclick = () => {
                    localStorage.removeItem('user');
                    window.location.href = '../login/';
                };
                
                // ===== RECHERCHE CLIENT =====
                let searchTimeout;
                clientSearch.addEventListener('input', function() {
                    clearTimeout(searchTimeout);
                    const search = this.value.trim();
                    
                    if (search.length < 2) {
                        clientResults.style.display = 'none';
                        return;
                    }
                    
                    searchTimeout = setTimeout(async () => {
                        try {
                            const { data, error } = await supabase
                                .from('clients')
                                .select('client_number, company_name, contact_name, default_pickup_address')
                                .or(`client_number.ilike.%${search}%,company_name.ilike.%${search}%,contact_name.ilike.%${search}%`)
                                .limit(5);
                            
                            if (error) throw error;
                            
                            if (data && data.length > 0) {
                                let html = '';
                                data.forEach(client => {
                                    const displayName = client.company_name || client.contact_name || 'Sans nom';
                                    html += `
                                        <div class="client-result-item" onclick="selectClient('${client.client_number}')">
                                            <strong>${client.client_number}</strong> - ${displayName}
                                        </div>
                                    `;
                                });
                                clientResults.innerHTML = html;
                                clientResults.style.display = 'block';
                            } else {
                                clientResults.innerHTML = '<div style="padding:10px; color:#aaa;">Aucun client trouvé</div>';
                                clientResults.style.display = 'block';
                            }
                        } catch(e) {
                            console.error('Erreur recherche:', e);
                        }
                    }, 300);
                });
                
                window.selectClient = async function(clientNum) {
                    try {
                        const { data, error } = await supabase
                            .from('clients')
                            .select('*')
                            .eq('client_number', clientNum)
                            .single();
                        
                        if (error) throw error;
                        
                        clientNumber.value = data.client_number;
                        clientName.value = data.company_name || data.contact_name || '';
                        clientAddress.value = data.default_pickup_address || 'Impasse des Griottes 3, 1462 Yvonand';
                        
                        clientSearch.value = data.client_number + ' - ' + (data.company_name || data.contact_name || '');
                        clientResults.style.display = 'none';
                        
                    } catch(e) {
                        console.error('Erreur sélection:', e);
                    }
                };
                
                // Fermer les résultats en cliquant ailleurs
                document.addEventListener('click', function(e) {
                    if (!clientSearch.contains(e.target) && !clientResults.contains(e.target)) {
                        clientResults.style.display = 'none';
                    }
                });
                
                // ===== CRÉATION CLIENT =====
                clientForm.onsubmit = async function(e) {
                    e.preventDefault();
                    
                    const newClient = {
                        client_number: document.getElementById('newClientNumber').value,
                        company_name: document.getElementById('newClientName').value,
                        default_pickup_address: document.getElementById('newClientAddress').value,
                        email: document.getElementById('newClientEmail').value,
                        phone: document.getElementById('newClientPhone').value
                    };
                    
                    try {
                        const { error } = await supabase
                            .from('clients')
                            .insert([newClient]);
                        
                        if (error) throw error;
                        
                        alert('✅ Client créé avec succès !');
                        clientModal.style.display = 'none';
                        
                        // Sélectionner automatiquement le nouveau client
                        clientNumber.value = newClient.client_number;
                        clientName.value = newClient.company_name;
                        clientAddress.value = newClient.default_pickup_address;
                        clientSearch.value = newClient.client_number + ' - ' + newClient.company_name;
                        
                    } catch(e) {
                        alert('❌ Erreur: ' + e.message);
                    }
                };
                
                // ===== CARTE =====
                const map = L.map('map').setView([46.8, 8.2], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                const markers = L.markerClusterGroup();
                map.addLayer(markers);
                
                // ===== CHARGER TRANSPORTS =====
                async function loadTransports() {
                    try {
                        const { data, error } = await supabase
                            .from('transport_orders_simple')
                            .select('*')
                            .order('created_at', { ascending: false });
                        
                        if (error) throw error;
                        
                        document.getElementById('totalCount').textContent = data?.length || 0;
                        document.getElementById('urgentCount').textContent = data?.filter(t => t.speed === '6h').length || 0;
                        
                        let html = '';
                        markers.clearLayers();
                        
                        data?.forEach((t, index) => {
                            const isUrgent = t.speed === '6h';
                            
                            html += `
                                <div class="transport-item ${isUrgent ? 'urgent' : ''}">
                                    <div class="transport-header">
                                        <span class="transport-client">${t.client_number || '?'}</span>
                                        <button class="btn-delete" onclick="supprimerTransport('${t.id}')">🗑️</button>
                                    </div>
                                    <div class="transport-route">📍 ${t.pickup_address?.substring(0,25) || '?'}</div>
                                    <div class="transport-route">🎯 ${t.delivery_address?.substring(0,25) || '?'}</div>
                                    <div class="transport-footer">
                                        <span>${t.order_number || ''}</span>
                                        <span>${t.weight || 0} kg</span>
                                    </div>
                                </div>
                            `;
                            
                            // Marqueurs
                            let lat = 46.8, lng = 8.2;
                            if (t.delivery_address?.toLowerCase().includes('lausanne')) { lat = 46.52; lng = 6.63; }
                            if (t.delivery_address?.toLowerCase().includes('geneve')) { lat = 46.20; lng = 6.14; }
                            
                            const color = isUrgent ? '#ef4444' : '#facc15';
                            const icon = L.divIcon({
                                html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${index+1}</div>`,
                                iconSize: [24, 24]
                            });
                            
                            L.marker([lat, lng], { icon }).addTo(markers);
                        });
                        
                        document.getElementById('transportList').innerHTML = html || '<div style="text-align:center; padding:20px;">Aucun transport</div>';
                        
                    } catch(e) {
                        console.error("Erreur chargement:", e);
                    }
                }
                
                // ===== SUPPRESSION =====
                window.supprimerTransport = async function(id) {
                    if (!confirm('⚠️ Supprimer ce transport ?')) return;
                    try {
                        await supabase.from('transport_orders_simple').delete().eq('id', id);
                        loadTransports();
                    } catch(e) { alert('❌ Erreur: ' + e.message); }
                };
                
                // ===== CRÉATION TRANSPORT =====
                form.onsubmit = async function(e) {
                    e.preventDefault();
                    
                    if (!clientNumber.value) {
                        alert('Veuillez sélectionner un client');
                        return;
                    }
                    
                    if (!document.getElementById('deliveryAddress').value) {
                        alert('L\'adresse de livraison est obligatoire');
                        return;
                    }
                    
                    const orderNumber = 'TR-' + Date.now().toString().slice(-6);
                    
                    const transport = {
                        order_number: orderNumber,
                        client_number: clientNumber.value,
                        pickup_address: clientAddress.value || 'Impasse des Griottes 3, 1462 Yvonand',
                        delivery_address: document.getElementById('deliveryAddress').value + ' ' + document.getElementById('deliveryComplement').value,
                        weight: parseFloat(document.getElementById('weight').value) || 1,
                        quantity: parseInt(document.getElementById('quantity').value) || 1,
                        package_type: document.getElementById('packageType').value,
                        speed: document.getElementById('speed').value,
                        night_delivery: document.getElementById('nightDelivery').value === 'true',
                        instructions: document.getElementById('instructions').value,
                        priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
                        status: 'pending',
                        created_at: new Date()
                    };
                    
                    try {
                        await supabase.from('transport_orders_simple').insert([transport]);
                        alert(`✅ Transport ${orderNumber} créé !`);
                        modal.style.display = 'none';
                        loadTransports();
                    } catch(e) { alert('❌ Erreur: ' + e.message); }
                };
                
                // ===== LANCEMENT =====
                loadTransports();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
