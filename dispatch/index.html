<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        #barre-jaune {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #facc15;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            font-weight: bold;
        }
        button {
            background: black;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        #formulaire {
            position: fixed;
            top: 80px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 1001;
            width: 300px;
        }
        input, select, button {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
        }
    </style>
</head>
<body>

    <div id="barre-jaune">
        <span>🚚 LÉMAN DISPATCH</span>
        <button onclick="ouvrirFormulaire()">➕ Créer transport</button>
    </div>
    
    <div id="formulaire">
        <h3>Nouveau transport</h3>
        <input type="text" id="client" placeholder="Nom client">
        <input type="text" id="pickup" placeholder="Ville ramassage">
        <input type="text" id="delivery" placeholder="Ville livraison">
        <select id="priority">
            <option value="normal">Normal</option>
            <option value="urgent">Urgent</option>
        </select>
        <button onclick="fermerFormulaire()">Annuler</button>
        <button onclick="sauvegarderTransport()">Créer</button>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <script>
        // VERSION SIMPLE QUI MARCHAIT
        document.addEventListener('DOMContentLoaded', function() {
            console.log("✅ Démarrage...");
            
            // 1. Vérifier Supabase
            if (!window.supabase) {
                alert("❌ Supabase non chargé");
                return;
            }
            
            // 2. Carte
            const map = L.map('map').setView([46.8, 8.2], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            // 3. Charger les transports
            async function chargerTransports() {
                const { data } = await window.supabase.from('orders').select('*');
                if (data) {
                    data.forEach(t => {
                        let lat = 46.8, lng = 8.2;
                        if (t.delivery_city === 'Lausanne') { lat = 46.52; lng = 6.63; }
                        if (t.delivery_city === 'Genève') { lat = 46.20; lng = 6.14; }
                        
                        L.marker([lat, lng]).addTo(map)
                            .bindPopup(`${t.client_name}<br>${t.pickup_city} → ${t.delivery_city}`);
                    });
                }
            }
            chargerTransports();
            
            // 4. Fonctions globales
            window.ouvrirFormulaire = function() {
                document.getElementById('formulaire').style.display = 'block';
            };
            
            window.fermerFormulaire = function() {
                document.getElementById('formulaire').style.display = 'none';
            };
            
            window.sauvegarderTransport = async function() {
                const transport = {
                    client_name: document.getElementById('client').value,
                    pickup_city: document.getElementById('pickup').value,
                    delivery_city: document.getElementById('delivery').value,
                    priority: document.getElementById('priority').value,
                    status: 'pending',
                    created_at: new Date()
                };
                
                await window.supabase.from('orders').insert([transport]);
                alert('✅ Créé !');
                fermerFormulaire();
                location.reload();
            };
        });
    </script>
    
</body>
</html>
