<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>
    
    <!-- JUSTE LE STRICT MINIMUM -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100vw; }
        #btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #facc15;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        #form {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 2000;
            width: 300px;
        }
        input, select, button {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
        }
    </style>
</head>
<body>

    <button id="btn" onclick="showForm()">➕ Créer transport</button>
    
    <div id="form">
        <h3>Nouveau transport</h3>
        <input type="text" id="client" placeholder="Client">
        <input type="text" id="pickup" placeholder="Ville ramassage">
        <input type="text" id="delivery" placeholder="Ville livraison">
        <select id="priority">
            <option value="normal">Normal</option>
            <option value="urgent">Urgent</option>
        </select>
        <button onclick="hideForm()">Annuler</button>
        <button onclick="save()">Créer</button>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ===== CONFIGURATION =====
        const supabase = window.supabase.createClient(
            'https://iubbsnntcreneakbdkmv.supabase.co',  // CHANGE ICI
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y'                      // CHANGE ICI
        );
        
        // ===== CARTE =====
        const map = L.map('map').setView([46.8, 8.2], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // ===== CHARGEMENT =====
        async function load() {
            const { data } = await supabase.from('orders').select('*');
            console.log('Transports:', data);
            
            data?.forEach((order, i) => {
                let lat = 46.8, lng = 8.2;
                if (order.delivery_city === 'Lausanne') { lat = 46.52; lng = 6.63; }
                if (order.delivery_city === 'Genève') { lat = 46.20; lng = 6.14; }
                
                L.marker([lat, lng]).addTo(map)
                    .bindPopup(`${order.client_name}<br>${order.pickup_city} → ${order.delivery_city}`);
            });
        }
        load();
        
        // ===== FORMULAIRE =====
        function showForm() {
            document.getElementById('form').style.display = 'block';
        }
        
        function hideForm() {
            document.getElementById('form').style.display = 'none';
        }
        
        async function save() {
            const transport = {
                client_name: document.getElementById('client').value,
                pickup_city: document.getElementById('pickup').value,
                delivery_city: document.getElementById('delivery').value,
                priority: document.getElementById('priority').value,
                status: 'pending',
                created_at: new Date()
            };
            
            await supabase.from('orders').insert([transport]);
            alert('✅ Créé !');
            hideForm();
            location.reload(); // Recharge la page
        }
        
        // Rendre les fonctions accessibles
        window.showForm = showForm;
        window.hideForm = hideForm;
        window.save = save;
    </script>
    
</body>
</html>
