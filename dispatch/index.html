<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman Dispatch | Tournées</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        header {
            background: #111; padding: 15px 25px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #facc15; height: 70px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-success { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
        }
        
        /* PANEL GAUCHE - TOURNÉES */
        .tours-panel {
            width: 500px;
            background: #111;
            border-right: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .panel-header h2 {
            color: #facc15;
        }
        
        .tour-card {
            background: #1f2937;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
        }
        
        .tour-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .tour-title {
            font-weight: bold;
            color: #facc15;
            font-size: 16px;
        }
        
        .tour-stats {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        
        .tour-stat-item {
            text-align: center;
        }
        
        .tour-stat-value {
            font-weight: bold;
            color: #facc15;
            font-size: 16px;
        }
        
        .tour-stat-label {
            font-size: 11px;
            color: #aaa;
        }
        
        .tour-list {
            min-height: 50px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
            margin: 10px 0;
            background: #2a2a2a;
            border-radius: 4px;
        }
        
        /* CARTE CENTRALE */
        .map-container {
            flex: 1;
            position: relative;
        }
        #map { height: 100%; width: 100%; }
        
        /* PANEL DROIT - EN ATTENTE */
        .pending-panel {
            width: 400px;
            background: #111;
            border-left: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .pending-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .pending-header h2 {
            color: #facc15;
        }
        
        .pending-list {
            min-height: 200px;
            padding: 5px;
        }
        
        /* CARTES DE TRANSPORT */
        .transport-card {
            background: #1f2937;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #facc15;
        }
        
        .transport-card.urgent {
            border-left-color: #ef4444;
        }
        
        .transport-expediteur {
            font-size: 11px;
            color: #9ca3af;
            margin-bottom: 4px;
        }
        
        .transport-destinataire {
            font-weight: bold;
            font-size: 14px;
            color: white;
        }
        
        .transport-address {
            font-size: 11px;
            color: #aaa;
            margin: 4px 0;
        }
        
        .transport-meta {
            display: flex;
            gap: 10px;
            font-size: 10px;
            color: #9ca3af;
        }
        
        .btn-delete-transport {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 8px;
            width: 100%;
        }
        
        .loader {
            text-align: center; padding: 30px; color: #aaa;
        }
        .loader i { font-size: 30px; color: #facc15; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app">
        <div class="loader">
            <i class="fas fa-spinner fa-spin"></i>
            Chargement...
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Démarrage...");
                
                if (!window.SUPABASE_CONFIG) {
                    throw new Error("config.js manquant");
                }
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES SIMPLIFIÉES =====
                let allTransports = [];
                let tours = [
                    { id: 1, nom: "Tournée Lausanne", couleur: '#3b82f6', transports: [] },
                    { id: 2, nom: "Tournée Genève", couleur: '#10b981', transports: [] },
                    { id: 3, nom: "Tournée Berne", couleur: '#f59e0b', transports: [] }
                ];
                let map;
                
                const depot = {
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== CALCUL DE DISTANCE =====
                function calculerDistance(lat1, lng1, lat2, lng2) {
                    if (!lat1 || !lng1 || !lat2 || !lng2) return 0;
                    const R = 6371;
                    const dLat = (lat2 - lat1) * Math.PI / 180;
                    const dLon = (lng2 - lng1) * Math.PI / 180;
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                             Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                             Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                }
                
                // ===== CALCUL STATS =====
                function calculerStatsTournee(transports) {
                    if (!transports || transports.length === 0) {
                        return { distance: 0, duree: 0, poids: 0 };
                    }
                    
                    let distance = 0;
                    let duree = 0;
                    let poids = 0;
                    let precedent = depot;
                    
                    transports.forEach(t => {
                        if (t.lat && t.lng) {
                            const trajet = calculerDistance(precedent.lat, precedent.lng, t.lat, t.lng);
                            distance += trajet;
                            duree += (trajet / 50) * 60 + 15;
                            poids += t.weight || 1;
                            precedent = t;
                        }
                    });
                    
                    if (transports.length > 0) {
                        const dernier = transports[transports.length - 1];
                        if (dernier.lat && dernier.lng) {
                            const retour = calculerDistance(dernier.lat, dernier.lng, depot.lat, depot.lng);
                            distance += retour;
                            duree += (retour / 50) * 60;
                        }
                    }
                    
                    return { 
                        distance: Math.round(distance), 
                        duree: Math.round(duree),
                        poids: Math.round(poids)
                    };
                }
                
                // ===== CHARGEMENT =====
                async function loadData() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    afficherPage();
                }
                
                // ===== AFFICHAGE =====
                function afficherPage() {
                    const transportsDansTournees = new Set();
                    tours.forEach(tour => {
                        tour.transports.forEach(t => transportsDansTournees.add(t.id));
                    });
                    
                    const enAttente = allTransports.filter(t => 
                        t.status !== 'delivered' && !transportsDansTournees.has(t.id)
                    );
                    
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Léman Dispatch</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 En attente</span><span class="stat-value">${enAttente.length}</span></div>
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tours.length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn" onclick="window.location.href='new-transport.html'">➕ Nouveau</button>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <!-- PANEL GAUCHE -->
                            <div class="tours-panel">
                                <div class="panel-header">
                                    <h2>🚚 Tournées</h2>
                                    <button class="btn-success btn-small" onclick="ajouterTournee()">➕ Nouvelle</button>
                                </div>
                                
                                ${tours.map(tour => {
                                    const stats = calculerStatsTournee(tour.transports);
                                    return `
                                        <div class="tour-card" style="border-left-color: ${tour.couleur};">
                                            <div class="tour-header">
                                                <span class="tour-title">🚚 ${tour.nom}</span>
                                                <button class="btn-delete btn-small" onclick="supprimerTournee(${tour.id})">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </div>
                                            
                                            <div class="tour-stats">
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${stats.distance} km</div>
                                                    <div class="tour-stat-label">Distance</div>
                                                </div>
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${Math.floor(stats.duree/60)}h${stats.duree%60}</div>
                                                    <div class="tour-stat-label">Durée</div>
                                                </div>
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${stats.poids} kg</div>
                                                    <div class="tour-stat-label">Charge</div>
                                                </div>
                                            </div>
                                            
                                            <div class="tour-list">
                                                ${tour.transports.map(t => `
                                                    <div class="transport-card">
                                                        <div class="transport-expediteur">
                                                            <i class="fas fa-user"></i> ${t.client_number || 'Inconnu'}
                                                        </div>
                                                        <div class="transport-destinataire">
                                                            👤 ${t.destinataire_nom || 'Client'}
                                                        </div>
                                                        <div class="transport-address">
                                                            📍 ${(t.delivery_address || '').substring(0,40)}
                                                        </div>
                                                        <div class="transport-meta">
                                                            <span>⚡ ${t.speed || '24h'}</span>
                                                            <span>⚖️ ${t.weight || 1} kg</span>
                                                        </div>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                            
                            <!-- CARTE -->
                            <div class="map-container">
                                <div id="map"></div>
                            </div>
                            
                            <!-- PANEL DROIT -->
                            <div class="pending-panel">
                                <div class="pending-header">
                                    <h2>⏳ En attente</h2>
                                    <span class="stat-value">${enAttente.length}</span>
                                </div>
                                
                                <div class="pending-list">
                                    ${enAttente.map(t => `
                                        <div class="transport-card ${t.speed === '6h' ? 'urgent' : ''}">
                                            <div class="transport-expediteur">
                                                <i class="fas fa-user"></i> ${t.client_number || 'Inconnu'}
                                            </div>
                                            <div class="transport-destinataire">
                                                👤 ${t.destinataire_nom || 'Client'}
                                            </div>
                                            <div class="transport-address">
                                                📍 ${(t.delivery_address || '').substring(0,40)}
                                            </div>
                                            <div class="transport-meta">
                                                <span>⚡ ${t.speed || '24h'}</span>
                                                <span>⚖️ ${t.weight || 1} kg</span>
                                            </div>
                                            <button class="btn-delete-transport" onclick="supprimerTransport('${t.id}')">
                                                <i class="fas fa-trash"></i> Supprimer
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    initMap(enAttente);
                }
                
                // ===== INIT CARTE =====
                function initMap(transports) {
                    if (map) map.remove();
                    
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    L.marker([depot.lat, depot.lng]).addTo(map).bindPopup("Dépôt Yverdon");
                    
                    if (transports && transports.length > 0) {
                        transports.forEach(t => {
                            if (t.lat && t.lng) {
                                const color = t.speed === '6h' ? '#ef4444' : '#facc15';
                                L.circleMarker([t.lat, t.lng], {
                                    radius: 8,
                                    fillColor: color,
                                    color: '#fff',
                                    weight: 2,
                                    fillOpacity: 0.9
                                }).addTo(map).bindPopup(`
                                    <b>${t.destinataire_nom || 'Client'}</b><br>
                                    ${t.delivery_address}
                                `);
                            }
                        });
                    }
                }
                
                // ===== FONCTIONS =====
                window.ajouterTournee = function() {
                    const newId = tours.length + 1;
                    const couleurs = ['#3b82f6', '#10b981', '#f59e0b'];
                    tours.push({
                        id: newId,
                        nom: `Tournée ${newId}`,
                        couleur: couleurs[newId % couleurs.length],
                        transports: []
                    });
                    afficherPage();
                };
                
                window.supprimerTournee = function(tourId) {
                    tours = tours.filter(t => t.id !== tourId);
                    afficherPage();
                };
                
                window.supprimerTransport = async function(transportId) {
                    if (confirm("Supprimer ce transport ?")) {
                        await supabase
                            .from('transport_orders_simple')
                            .delete()
                            .eq('id', transportId);
                        loadData();
                    }
                };
                
                window.logout = function() {
                    localStorage.removeItem('user');
                    window.location.href = '../login/';
                };
                
                await loadData();
                
            } catch(e) {
                console.error("Erreur:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
