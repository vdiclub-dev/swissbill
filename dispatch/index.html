<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch | Optimisation réelle</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <!-- Supabase et Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        header {
            background: #111; padding: 15px 25px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #facc15; height: 70px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-optimize { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar {
            width: 220px; background: #111; padding: 20px;
            border-right: 1px solid #2a2a2a; overflow-y: auto;
        }
        .sidebar button {
            width: 100%; padding: 12px; margin-bottom: 8px;
            background: #1f2937; color: white; border: none;
            border-radius: 6px; cursor: pointer; text-align: left;
        }
        .sidebar button:hover { background: #facc15; color: #111; }
        
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        
        .right-panel {
            width: 450px; background: #111; border-left: 1px solid #2a2a2a;
            padding: 20px; overflow-y: auto;
        }
        .right-panel h3 { color: #facc15; margin-bottom: 20px; }
        
        .transport-item {
            background: #1f2937; padding: 12px; margin-bottom: 10px;
            border-radius: 6px; border-left: 3px solid #facc15;
            cursor: pointer;
        }
        .transport-item.urgent { border-left-color: #ef4444; }
        .transport-client { font-weight: bold; color: white; }
        .transport-address { font-size: 12px; color: #aaa; margin: 4px 0; }
        
        .tour-item {
            background: #2a2a2a; padding: 15px; margin-bottom: 15px;
            border-radius: 8px; border-left: 4px solid #3b82f6;
        }
        .tour-header {
            display: flex; justify-content: space-between;
            color: #3b82f6; font-weight: bold; margin-bottom: 10px;
        }
        .tour-stats {
            display: flex; justify-content: space-between;
            background: #1f2937; padding: 8px; border-radius: 4px;
            margin-bottom: 10px; font-size: 12px;
        }
        .tour-stop {
            padding: 8px 0 8px 15px; border-bottom: 1px solid #3a3a3a;
            font-size: 13px;
        }
        .stop-time { font-size: 11px; color: #facc15; }
        
        .loader {
            text-align: center; padding: 30px; color: #aaa;
        }
        .loader i { font-size: 30px; color: #facc15; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index:1000;
        }
        .modal-box {
            background: #1f2937; padding: 20px; border-radius: 8px;
            max-width: 400px; width: 90%; border: 1px solid #facc15;
        }
    </style>
</head>
<body>

    <div id="app">Chargement...</div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Optimisation réelle...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                // ===== VÉRIFICATION CONNEXION =====
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let map, markers;
                
                // Dépôt
                const depot = {
                    nom: "Dépôt Yverdon",
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== GÉOCODAGE =====
                async function geocoderAdresse(adresse) {
                    try {
                        const response = await fetch(
                            `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(adresse + ', Suisse')}&limit=1`,
                            { headers: { 'User-Agent': 'LemanDispatch/1.0' } }
                        );
                        const data = await response.json();
                        if (data && data.length > 0) {
                            return {
                                lat: parseFloat(data[0].lat),
                                lng: parseFloat(data[0].lon)
                            };
                        }
                    } catch(e) {
                        console.warn("Erreur géocodage:", e);
                    }
                    return null;
                }
                
                // ===== CALCUL DE DISTANCE ROUTIÈRE =====
                async function calculerRoute(origine, destination) {
                    if (!origine || !destination) return null;
                    
                    const url = `https://router.project-osrm.org/route/v1/driving/${origine.lng},${origine.lat};${destination.lng},${destination.lat}?overview=false`;
                    
                    try {
                        const response = await fetch(url);
                        const data = await response.json();
                        
                        if (data.routes && data.routes.length > 0) {
                            return {
                                distance: data.routes[0].distance / 1000, // km
                                duree: data.routes[0].duration / 60 // minutes
                            };
                        }
                    } catch(e) {
                        console.warn("Erreur calcul route:", e);
                    }
                    return null;
                }
                
                // ===== CHARGEMENT =====
                async function loadTransports() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    afficherTransports();
                }
                
                // ===== AFFICHAGE =====
                function afficherTransports() {
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 Total</span><span class="stat-value">${allTransports.length}</span></div>
                                <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value">${allTransports.filter(t => t.speed === '6h').length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                                <button class="btn" onclick="openModal()">➕ Nouveau</button>
                                <button class="btn-optimize" onclick="optimiser()">🚀 Optimisation réelle</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <div class="sidebar">
                                <button class="active">🗺️ Dispatch</button>
                                <button>📦 Transports</button>
                            </div>
                            
                            <div class="map-container"><div id="map"></div></div>
                            
                            <div class="right-panel">
                                <h3>📋 Transports à optimiser</h3>
                                <div id="transportList">
                                    ${allTransports.filter(t => t.status !== 'delivered').map(t => `
                                        <div class="transport-item ${t.speed === '6h' ? 'urgent' : ''}">
                                            <div class="transport-client">${t.destinataire_nom || 'Client'}</div>
                                            <div class="transport-address">${(t.delivery_address || '').substring(0,50)}</div>
                                            <div style="font-size:11px; color:#666;">${t.speed} | ${t.weight || 0} kg</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    initMap();
                }
                
                // ===== INIT CARTE =====
                function initMap() {
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    markers = L.markerClusterGroup();
                    map.addLayer(markers);
                    
                    L.marker([depot.lat, depot.lng]).addTo(map).bindPopup("Dépôt Yverdon");
                    
                    allTransports.forEach((t, i) => {
                        if (t.lat && t.lng) {
                            const color = t.speed === '6h' ? '#ef4444' : '#facc15';
                            const icon = L.divIcon({
                                html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${i+1}</div>`,
                                iconSize: [24, 24]
                            });
                            L.marker([t.lat, t.lng], { icon }).addTo(markers);
                        }
                    });
                }
                
                // ===== OPTIMISATION AVEC DISTANCES RÉELLES =====
                window.optimiser = async function() {
                    const nonLivres = allTransports.filter(t => t.status !== 'delivered');
                    if (nonLivres.length === 0) {
                        alert("Aucun transport à optimiser");
                        return;
                    }
                    
                    document.getElementById('app').innerHTML = `
                        <div class="loader">
                            <i class="fas fa-spinner fa-spin"></i> Calcul des itinéraires...
                        </div>
                    `;
                    
                    // 1. Obtenir les coordonnées pour chaque transport
                    const transportsAvecCoords = [];
                    
                    for (const t of nonLivres) {
                        let coords = null;
                        if (t.lat && t.lng) {
                            coords = { lat: t.lat, lng: t.lng };
                        } else {
                            coords = await geocoderAdresse(t.delivery_address);
                        }
                        
                        if (coords) {
                            transportsAvecCoords.push({
                                ...t,
                                lat: coords.lat,
                                lng: coords.lng
                            });
                        }
                    }
                    
                    // 2. Calculer la matrice des distances
                    const points = [depot, ...transportsAvecCoords];
                    const matrice = [];
                    
                    for (let i = 0; i < points.length; i++) {
                        matrice[i] = [];
                        for (let j = 0; j < points.length; j++) {
                            if (i === j) {
                                matrice[i][j] = { distance: 0, duree: 0 };
                            } else {
                                const route = await calculerRoute(points[i], points[j]);
                                matrice[i][j] = route || { distance: 0, duree: 0 };
                            }
                        }
                    }
                    
                    // 3. Créer les tournées (algorithme du plus proche voisin)
                    const vehicules = [
                        { id: 1, capacite: 800, debut: 6*60, fin: 22*60 },
                        { id: 2, capacite: 500, debut: 6*60, fin: 22*60 },
                        { id: 3, capacite: 300, debut: 6*60, fin: 22*60 }
                    ];
                    
                    const tournees = [];
                    const indicesUtilises = new Set();
                    
                    for (let v = 0; v < vehicules.length; v++) {
                        if (indicesUtilises.size >= transportsAvecCoords.length) break;
                        
                        const tournee = {
                            vehicule: v+1,
                            capacite: vehicules[v].capacite,
                            stops: [],
                            poidsTotal: 0,
                            distanceTotal: 0,
                            dureeTotal: 0,
                            tempsActuel: vehicules[v].debut
                        };
                        
                        let positionActuelle = 0; // index 0 = dépôt
                        
                        while (indicesUtilises.size < transportsAvecCoords.length) {
                            // Trouver le point non visité le plus proche
                            let meilleurIndex = -1;
                            let meilleureDistance = Infinity;
                            
                            for (let i = 0; i < transportsAvecCoords.length; i++) {
                                if (indicesUtilises.has(i)) continue;
                                
                                const distance = matrice[positionActuelle][i+1].distance;
                                const duree = matrice[positionActuelle][i+1].duree;
                                const poids = transportsAvecCoords[i].weight || 1;
                                
                                // Vérifier capacité
                                if (tournee.poidsTotal + poids > vehicules[v].capacite) continue;
                                
                                // Vérifier horaire
                                const heureArrivee = tournee.tempsActuel + duree;
                                if (heureArrivee + 15 > vehicules[v].fin) continue;
                                
                                if (distance < meilleureDistance) {
                                    meilleureDistance = distance;
                                    meilleurIndex = i;
                                }
                            }
                            
                            if (meilleurIndex === -1) break;
                            
                            // Ajouter le point à la tournée
                            const indexMatrice = meilleurIndex + 1;
                            const distance = matrice[positionActuelle][indexMatrice].distance;
                            const duree = matrice[positionActuelle][indexMatrice].duree;
                            
                            tournee.tempsActuel += duree;
                            tournee.stops.push({
                                ...transportsAvecCoords[meilleurIndex],
                                heureArrivee: tournee.tempsActuel,
                                distanceDepuisPrecedent: distance
                            });
                            
                            tournee.poidsTotal += transportsAvecCoords[meilleurIndex].weight || 1;
                            tournee.distanceTotal += distance;
                            tournee.dureeTotal += duree;
                            
                            // Temps de service
                            tournee.tempsActuel += 15;
                            tournee.dureeTotal += 15;
                            
                            indicesUtilises.add(meilleurIndex);
                            positionActuelle = indexMatrice;
                        }
                        
                        // Retour au dépôt
                        if (tournee.stops.length > 0) {
                            const distanceRetour = matrice[positionActuelle][0].distance;
                            const dureeRetour = matrice[positionActuelle][0].duree;
                            
                            tournee.distanceTotal += distanceRetour;
                            tournee.dureeTotal += dureeRetour;
                            tournee.tempsActuel += dureeRetour;
                            
                            tournees.push(tournee);
                        }
                    }
                    
                    afficherOptimisation(tournees, transportsAvecCoords.length - indicesUtilises.size);
                };
                
                // ===== AFFICHAGE RÉSULTATS =====
                function afficherOptimisation(tournees, restants) {
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Résultat</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tournees.length}</span></div>
                                <div class="stat-item"><span>📦 Restants</span><span class="stat-value">${restants}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn" onclick="loadTransports()">← Retour</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <div class="sidebar">
                                <button onclick="loadTransports()">🗺️ Dispatch</button>
                                <button class="active">🧠 Résultat</button>
                            </div>
                            
                            <div class="map-container"><div id="map"></div></div>
                            
                            <div class="right-panel">
                                <h3>📋 Tournées optimisées</h3>
                                <div id="tourneesList">
                                    ${tournees.map((t, idx) => `
                                        <div class="tour-item">
                                            <div class="tour-header">
                                                <span>🚚 Véhicule ${t.vehicule}</span>
                                                <span>${t.stops.length} arrêts</span>
                                            </div>
                                            <div class="tour-stats">
                                                <span>📏 ${Math.round(t.distanceTotal)} km</span>
                                                <span>⚖️ ${t.poidsTotal}/${t.capacite} kg</span>
                                                <span>⏱️ ${Math.round(t.dureeTotal)} min</span>
                                            </div>
                                            ${t.stops.map((s, i) => `
                                                <div class="tour-stop">
                                                    <strong>${i+1}. ${s.destinataire_nom || 'Client'}</strong>
                                                    <div class="stop-time">
                                                        🕐 Arrivée: ${formatTime(Math.round(s.heureArrivee))}
                                                    </div>
                                                </div>
                                            `).join('')}
                                            <div class="tour-stop">
                                                <strong>Retour dépôt</strong>
                                                <div class="stop-time">🕐 ${formatTime(Math.round(t.tempsActuel))}</div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    initMap();
                    
                    // Dessiner les routes
                    const couleurs = ['#3b82f6', '#10b981', '#f59e0b'];
                    
                    tournees.forEach((t, index) => {
                        const points = [[depot.lat, depot.lng]];
                        t.stops.forEach(s => points.push([s.lat, s.lng]));
                        points.push([depot.lat, depot.lng]);
                        
                        L.polyline(points, {
                            color: couleurs[index % couleurs.length],
                            weight: 4,
                            opacity: 0.7
                        }).addTo(map);
                    });
                }
                
                // ===== FORMAT HEURE =====
                function formatTime(minutes) {
                    const h = Math.floor(minutes / 60);
                    const m = minutes % 60;
                    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                }
                
                // ===== MODAL SIMPLE =====
                window.openModal = function() {
                    document.getElementById('app').innerHTML += `
                        <div id="modal" class="modal" style="display:flex;">
                            <div class="modal-box">
                                <h3>➕ Nouveau transport</h3>
                                <input type="text" id="clientNum" placeholder="Client" value="CL2025-001" style="width:100%; padding:10px; margin:10px 0; background:#111; border:1px solid #2a2a2a; color:white;">
                                <input type="text" id="destNom" placeholder="Destinataire" style="width:100%; padding:10px; margin:10px 0; background:#111; border:1px solid #2a2a2a; color:white;">
                                <input type="text" id="addr" placeholder="Adresse livraison" style="width:100%; padding:10px; margin:10px 0; background:#111; border:1px solid #2a2a2a; color:white;">
                                <input type="number" id="pds" placeholder="Poids" value="1" style="width:100%; padding:10px; margin:10px 0; background:#111; border:1px solid #2a2a2a; color:white;">
                                <select id="vit" style="width:100%; padding:10px; margin:10px 0; background:#111; border:1px solid #2a2a2a; color:white;">
                                    <option value="24h">24h</option>
                                    <option value="12h">12h</option>
                                    <option value="6h">6h</option>
                                </select>
                                <div style="display:flex; gap:10px;">
                                    <button onclick="document.getElementById('modal').remove()" style="flex:1; padding:10px; background:#2a2a2a; color:white;">Annuler</button>
                                    <button onclick="saveTransport()" style="flex:1; padding:10px; background:#facc15;">Créer</button>
                                </div>
                            </div>
                        </div>
                    `;
                };
                
                window.saveTransport = async function() {
                    const coords = await geocoderAdresse(document.getElementById('addr').value);
                    
                    const transport = {
                        order_number: 'TR-' + Date.now(),
                        client_number: document.getElementById('clientNum').value,
                        destinataire_nom: document.getElementById('destNom').value,
                        delivery_address: document.getElementById('addr').value,
                        lat: coords?.lat || null,
                        lng: coords?.lng || null,
                        weight: parseFloat(document.getElementById('pds').value) || 1,
                        speed: document.getElementById('vit').value,
                        priority: document.getElementById('vit').value === '6h' ? 'urgent' : 'normal',
                        status: 'pending',
                        created_at: new Date()
                    };
                    
                    await supabase.from('transport_orders_simple').insert([transport]);
                    document.getElementById('modal').remove();
                    loadTransports();
                };
                
                window.logout = function() {
                    localStorage.removeItem('user');
                    window.location.href = '../login/';
                };
                
                // ===== LANCEMENT =====
                await loadTransports();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
