<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch | Admin</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <!-- Supabase et Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        header {
            background: #111; padding: 15px 25px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #facc15; height: 70px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-optimize { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar {
            width: 220px; background: #111; padding: 20px;
            border-right: 1px solid #2a2a2a; overflow-y: auto;
        }
        .sidebar button {
            width: 100%; padding: 12px; margin-bottom: 8px;
            background: #1f2937; color: white; border: none;
            border-radius: 6px; cursor: pointer; text-align: left;
        }
        .sidebar button:hover { background: #facc15; color: #111; }
        .sidebar button.active { background: #facc15; color: #111; }
        
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        
        .right-panel {
            width: 400px; background: #111; border-left: 1px solid #2a2a2a;
            padding: 20px; overflow-y: auto;
        }
        .right-panel h3 {
            color: #facc15; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .transport-item {
            background: #1f2937; padding: 12px; margin-bottom: 10px;
            border-radius: 6px; border-left: 3px solid #facc15;
        }
        .transport-item.urgent { border-left-color: #ef4444; }
        .transport-header { display: flex; justify-content: space-between; align-items: center; }
        .transport-client { font-weight: bold; color: white; }
        .transport-route { font-size: 12px; color: #aaa; margin: 4px 0; }
        .transport-footer { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; }
        
        .tour-item {
            background: #2a2a2a; padding: 15px; margin-bottom: 15px;
            border-radius: 8px; border-left: 4px solid #3b82f6;
        }
        .tour-header {
            display: flex; justify-content: space-between;
            color: #3b82f6; font-weight: bold; margin-bottom: 10px;
        }
        .tour-stats {
            display: flex; justify-content: space-between;
            background: #1f2937; padding: 8px; border-radius: 4px;
            margin-bottom: 10px; font-size: 12px;
        }
        .tour-stop {
            padding: 8px 0 8px 15px; border-bottom: 1px solid #3a3a3a;
            font-size: 13px; position: relative;
        }
        .stop-time { font-size: 11px; color: #facc15; margin-left: 20px; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%;
                background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index:1000; }
        .modal-box { background: #1f2937; width:90%; max-width:500px; padding:20px; border-radius:8px; border:1px solid #facc15; }
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; color:#aaa; margin-bottom:5px; }
        .form-group input, .form-group select { width:100%; padding:10px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px; }
        .modal-buttons { display:flex; gap:10px; margin-top:20px; }
        .btn-cancel { background:#2a2a2a; color:white; border:none; padding:12px; border-radius:4px; cursor:pointer; flex:1; }
        .btn-save { background:#facc15; color:#111; border:none; padding:12px; border-radius:4px; cursor:pointer; flex:1; }
        
        .loader { text-align:center; padding:20px; color:#aaa; }
        .loader i { font-size:30px; color:#facc15; animation:spin 1s infinite linear; }
        @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app">Chargement...</div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                // ===== UTILISATEUR =====
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let map, markers, routeLayers = [];
                let modeOptimisation = false;
                
                // Dépôt
                const depot = {
                    nom: "Dépôt Yverdon",
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== GÉOCODAGE SIMPLE =====
                function getCityCoordinates(adresse) {
                    const adr = (adresse || '').toLowerCase();
                    if (adr.includes('lausanne')) return { lat: 46.52, lng: 6.63 };
                    if (adr.includes('geneve')) return { lat: 46.20, lng: 6.14 };
                    if (adr.includes('yverdon')) return { lat: 46.78, lng: 6.64 };
                    if (adr.includes('berne')) return { lat: 46.95, lng: 7.45 };
                    if (adr.includes('zurich')) return { lat: 47.37, lng: 8.54 };
                    return { lat: 46.8, lng: 8.2 };
                }
                
                // ===== CALCUL DE DISTANCE =====
                function calculerDistance(lat1, lon1, lat2, lon2) {
                    const R = 6371;
                    const dLat = (lat2 - lat1) * Math.PI / 180;
                    const dLon = (lon2 - lon1) * Math.PI / 180;
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                             Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                             Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                }
                
                // ===== FORMAT HEURE =====
                function formatTime(minutes) {
                    const h = Math.floor(minutes / 60);
                    const m = minutes % 60;
                    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                }
                
                // ===== CHARGEMENT =====
                async function loadTransports() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    afficherTransports();
                }
                
                // ===== AFFICHAGE NORMAL =====
                function afficherTransports() {
                    modeOptimisation = false;
                    
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 Total</span><span class="stat-value">${allTransports.length}</span></div>
                                <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value">${allTransports.filter(t => t.speed === '6h').length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                                <button class="btn" onclick="openModal()">➕ Nouveau</button>
                                <button class="btn-optimize" onclick="optimiser()">🧠 Optimiser</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <div class="sidebar">
                                <button class="active">🗺️ Dispatch</button>
                                <button>📦 Transports</button>
                                <button>👤 Clients</button>
                            </div>
                            
                            <div class="map-container"><div id="map"></div></div>
                            
                            <div class="right-panel">
                                <h3>📋 Derniers transports</h3>
                                <div id="transportList">
                                    ${allTransports.slice(0, 10).map(t => `
                                        <div class="transport-item ${t.speed === '6h' ? 'urgent' : ''}">
                                            <div class="transport-header">
                                                <span class="transport-client">${t.destinataire_nom || '?'}</span>
                                                <button class="btn-delete" onclick="supprimer('${t.id}')">🗑️</button>
                                            </div>
                                            <div class="transport-route">${(t.delivery_address || '').substring(0,50)}</div>
                                            <div class="transport-footer">
                                                <span>${t.speed || '24h'}</span>
                                                <span>${t.weight || 0} kg</span>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    initMap(false);
                }
                
                // ===== INIT CARTE =====
                function initMap(avecRoutes = false) {
                    if (map) map.remove();
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    markers = L.markerClusterGroup();
                    map.addLayer(markers);
                    
                    // Dépôt
                    L.marker([depot.lat, depot.lng]).addTo(map).bindPopup("Dépôt Yverdon");
                    
                    if (!avecRoutes) {
                        allTransports.forEach((t, i) => {
                            const coords = getCityCoordinates(t.delivery_address);
                            const color = t.speed === '6h' ? '#ef4444' : '#facc15';
                            const icon = L.divIcon({
                                html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${i+1}</div>`,
                                iconSize: [24, 24]
                            });
                            L.marker([coords.lat, coords.lng], { icon }).addTo(markers);
                        });
                    }
                }
                
                // ===== OPTIMISATION =====
                window.optimiser = function() {
                    const nonLivres = allTransports.filter(t => t.status !== 'delivered');
                    if (nonLivres.length === 0) {
                        alert("Aucun transport à optimiser");
                        return;
                    }
                    
                    modeOptimisation = true;
                    
                    const vehicules = [
                        { id: 1, capacite: 800, vitesse: 60, debut: 6*60, fin: 22*60 },
                        { id: 2, capacite: 500, vitesse: 60, debut: 6*60, fin: 22*60 },
                        { id: 3, capacite: 300, vitesse: 60, debut: 6*60, fin: 22*60 }
                    ];
                    
                    const jobs = nonLivres.map((t, i) => {
                        const coords = getCityCoordinates(t.delivery_address);
                        return {
                            id: i+1,
                            ...coords,
                            nom: t.destinataire_nom || 'Client',
                            adresse: t.delivery_address,
                            urgent: t.speed === '6h',
                            poids: t.weight || 1,
                            service: 15
                        };
                    });
                    
                    jobs.sort((a, b) => (a.urgent && !b.urgent) ? -1 : 0);
                    
                    const tournees = [];
                    let restants = [...jobs];
                    
                    vehicules.forEach((v, idx) => {
                        if (restants.length === 0) return;
                        
                        const tour = {
                            vehicule: idx+1,
                            capacite: v.capacite,
                            stops: [],
                            poidsTotal: 0,
                            distanceTotal: 0,
                            tempsActuel: v.debut
                        };
                        
                        let pos = { lat: depot.lat, lng: depot.lng };
                        
                        for (let i = restants.length-1; i >= 0; i--) {
                            const job = restants[i];
                            if (tour.poidsTotal + job.poids > v.capacite) continue;
                            
                            const dist = calculerDistance(pos.lat, pos.lng, job.lat, job.lng);
                            const trajet = (dist / v.vitesse) * 60;
                            const arrivee = tour.tempsActuel + trajet + job.service;
                            
                            if (arrivee > v.fin) continue;
                            
                            tour.stops.push({
                                ...job,
                                distance: dist,
                                heureArrivee: tour.tempsActuel + trajet
                            });
                            
                            tour.poidsTotal += job.poids;
                            tour.distanceTotal += dist;
                            tour.tempsActuel = arrivee;
                            pos = { lat: job.lat, lng: job.lng };
                            
                            restants.splice(i, 1);
                        }
                        
                        if (tour.stops.length > 0) {
                            const dernier = tour.stops[tour.stops.length-1];
                            const retour = calculerDistance(dernier.lat, dernier.lng, depot.lat, depot.lng);
                            tour.distanceTotal += retour;
                            tour.tempsActuel += (retour / v.vitesse) * 60;
                            tournees.push(tour);
                        }
                    });
                    
                    afficherOptimisation(tournees, restants);
                };
                
                // ===== AFFICHAGE OPTIMISATION =====
                function afficherOptimisation(tournees, restants) {
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Tournées optimisées</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tournees.length}</span></div>
                                <div class="stat-item"><span>📦 Restants</span><span class="stat-value">${restants.length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                                <button class="btn" onclick="loadTransports()">← Retour</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <div class="sidebar">
                                <button onclick="loadTransports()">🗺️ Dispatch</button>
                                <button class="active">🧠 Résultat</button>
                            </div>
                            
                            <div class="map-container"><div id="map"></div></div>
                            
                            <div class="right-panel">
                                <h3>📋 Tournées proposées</h3>
                                <div id="tourneesList">
                                    ${tournees.map((t, idx) => `
                                        <div class="tour-item">
                                            <div class="tour-header">
                                                <span>🚚 Véhicule ${t.vehicule}</span>
                                                <span>${t.stops.length} arrêts</span>
                                            </div>
                                            <div class="tour-stats">
                                                <span>📏 ${Math.round(t.distanceTotal)} km</span>
                                                <span>⚖️ ${t.poidsTotal}/${t.capacite} kg</span>
                                                <span>⏱️ ${formatTime(Math.round(t.tempsActuel))}</span>
                                            </div>
                                            ${t.stops.map((s, i) => `
                                                <div class="tour-stop">
                                                    <strong>${i+1}. ${s.nom}</strong>
                                                    <div class="stop-time">🕐 ${formatTime(Math.round(s.heureArrivee))}</div>
                                                </div>
                                            `).join('')}
                                            <div class="tour-stop">
                                                <strong>Retour dépôt</strong>
                                                <div class="stop-time">🕐 ${formatTime(Math.round(t.tempsActuel))}</div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    initMap(true);
                    
                    // Dessiner les routes
                    const couleurs = ['#3b82f6', '#10b981', '#f59e0b'];
                    tournees.forEach((t, index) => {
                        const points = [[depot.lat, depot.lng]];
                        t.stops.forEach(s => points.push([s.lat, s.lng]));
                        points.push([depot.lat, depot.lng]);
                        
                        L.polyline(points, {
                            color: couleurs[index % couleurs.length],
                            weight: 4,
                            opacity: 0.7
                        }).addTo(map);
                    });
                }
                
                // ===== SUPPRESSION =====
                window.supprimer = async function(id) {
                    if (!confirm("Supprimer ce transport ?")) return;
                    await supabase.from('transport_orders_simple').delete().eq('id', id);
                    loadTransports();
                };
                
                // ===== MODAL =====
                window.openModal = function() {
                    document.getElementById('app').innerHTML += `
                        <div id="modal" class="modal" style="display:flex;">
                            <div class="modal-box">
                                <h3 style="margin-bottom:20px;">➕ Nouveau transport</h3>
                                <form id="transportForm" onsubmit="event.preventDefault(); saveTransport();">
                                    <div class="form-group"><label>Client</label><input type="text" id="clientNumber" value="CL2025-001" required></div>
                                    <div class="form-group"><label>Destinataire</label><input type="text" id="destinataireNom" required></div>
                                    <div class="form-group"><label>Adresse</label><input type="text" id="deliveryAddress" required></div>
                                    <div class="form-group"><label>Poids (kg)</label><input type="number" id="weight" value="1"></div>
                                    <div class="form-group">
                                        <label>Vitesse</label>
                                        <select id="speed">
                                            <option value="24h">24h</option>
                                            <option value="12h">12h</option>
                                            <option value="6h">6h</option>
                                        </select>
                                    </div>
                                    <div class="modal-buttons">
                                        <button type="button" class="btn-cancel" onclick="document.getElementById('modal').remove()">Annuler</button>
                                        <button type="submit" class="btn-save">Créer</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    `;
                };
                
                window.saveTransport = async function() {
                    const transport = {
                        order_number: 'TR-' + Date.now(),
                        client_number: document.getElementById('clientNumber').value,
                        destinataire_nom: document.getElementById('destinataireNom').value,
                        delivery_address: document.getElementById('deliveryAddress').value,
                        weight: parseFloat(document.getElementById('weight').value) || 1,
                        speed: document.getElementById('speed').value,
                        priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
                        status: 'pending',
                        created_at: new Date()
                    };
                    
                    await supabase.from('transport_orders_simple').insert([transport]);
                    document.getElementById('modal').remove();
                    loadTransports();
                };
                
                window.logout = function() {
                    localStorage.removeItem('user');
                    window.location.href = '../login/';
                };
                
                // ===== LANCEMENT =====
                await loadTransports();
                
            } catch(e) {
                console.error("Erreur:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
