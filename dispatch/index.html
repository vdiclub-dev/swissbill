<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman Dispatch | Tournées</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Drag & Drop -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        header {
            background: #111; padding: 15px 25px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #facc15; height: 70px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-success { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .btn-pdf { background: #8b5cf6; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
        }
        
        /* PANEL GAUCHE - TOURNÉES (60% de la page) */
        .tours-panel {
            width: 60%;
            background: #111;
            border-right: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .panel-header h2 {
            color: #facc15;
        }
        
        .tour-card {
            background: #1f2937;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
        }
        
        .tour-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .tour-title {
            font-weight: bold;
            color: #facc15;
            font-size: 16px;
            cursor: pointer;
        }
        
        .tour-stats {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        
        .tour-stat-item {
            text-align: center;
        }
        
        .tour-stat-value {
            font-weight: bold;
            color: #facc15;
            font-size: 16px;
        }
        
        .tour-stat-label {
            font-size: 11px;
            color: #aaa;
        }
        
        .tour-list {
            min-height: 50px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
            margin: 10px 0;
            background: #2a2a2a;
            border-radius: 4px;
        }
        
        /* PANEL DROIT - EN ATTENTE (40% de la page) */
        .pending-panel {
            width: 40%;
            background: #111;
            border-left: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .pending-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .pending-header h2 {
            color: #facc15;
        }
        
        .pending-list {
            min-height: 200px;
            padding: 5px;
        }
        
        /* CARTES DE TRANSPORT */
        .transport-card {
            background: #1f2937;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: move;
            border-left: 3px solid #facc15;
            transition: 0.2s;
            text-align: center;
        }
        
        .transport-card:hover {
            background: #2d3a4f;
        }
        
        .transport-card.urgent {
            border-left-color: #ef4444;
        }
        
        .transport-expediteur {
            font-size: 11px;
            color: #9ca3af;
            margin-bottom: 4px;
        }
        
        .transport-expediteur i {
            color: #facc15;
            margin-right: 4px;
        }
        
        .transport-destinataire {
            font-weight: bold;
            font-size: 15px;
            color: white;
            margin: 5px 0;
        }
        
        .transport-address {
            font-size: 11px;
            color: #aaa;
            margin: 4px 0;
        }
        
        .transport-meta {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 8px;
        }
        
        .remove-from-tour {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .btn-delete-transport {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
            width: 100%;
        }
        
        .drop-target {
            border: 2px dashed #facc15;
            background: #2d3a4f;
        }
        
        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal-box {
            background: #1f2937;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #facc15;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .modal-header h3 {
            color: #facc15;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .loader {
            text-align: center; padding: 30px; color: #aaa;
        }
        .loader i { font-size: 30px; color: #facc15; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app">
        <div class="loader">
            <i class="fas fa-spinner fa-spin"></i>
            Chargement...
        </div>
    </div>

    <!-- MODAL D'ÉDITION -->
    <div id="editModal" class="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>✏️ Modifier le transport</h3>
                <button class="modal-close" onclick="document.getElementById('editModal').style.display='none'">✖</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Tournées...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let tours = [
                    { id: 1, nom: "Tournée Lausanne", couleur: '#3b82f6', transports: [] },
                    { id: 2, nom: "Tournée Genève", couleur: '#10b981', transports: [] },
                    { id: 3, nom: "Tournée Berne", couleur: '#f59e0b', transports: [] }
                ];
                
                const depot = {
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== CALCUL DE DISTANCE =====
                function calculerDistance(lat1, lng1, lat2, lng2) {
                    if (!lat1 || !lng1 || !lat2 || !lng2) return 30;
                    const R = 6371;
                    const dLat = (lat2 - lat1) * Math.PI / 180;
                    const dLon = (lng2 - lng1) * Math.PI / 180;
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                             Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                             Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                }
                
                // ===== CALCUL STATS =====
                function calculerStatsTournee(transports) {
                    if (!transports || transports.length === 0) {
                        return { distance: 0, duree: 0, poids: 0 };
                    }
                    
                    let distance = 0;
                    let duree = 0;
                    let poids = 0;
                    let precedent = depot;
                    
                    transports.forEach(t => {
                        const trajet = (t.lat && t.lng) 
                            ? calculerDistance(precedent.lat, precedent.lng, t.lat, t.lng)
                            : 30;
                        
                        distance += trajet;
                        duree += (trajet / 50) * 60 + 15;
                        poids += t.weight || 1;
                        
                        if (t.lat && t.lng) precedent = t;
                    });
                    
                    distance += 30;
                    duree += 36;
                    
                    return { 
                        distance: Math.round(distance), 
                        duree: Math.round(duree),
                        poids: Math.round(poids)
                    };
                }
                
                // ===== GÉNÉRER PDF =====
                window.genererPDF = function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (!tour || tour.transports.length === 0) return;
                    
                    const stats = calculerStatsTournee(tour.transports);
                    
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    
                    // Titre principal en gras
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(24);
                    doc.setTextColor(0, 0, 0);
                    doc.text(`🚚 ${tour.nom}`, 20, 20);
                    
                    // Sous-titre
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(14);
                    doc.text(`Date: ${new Date().toLocaleDateString('fr-CH')}`, 20, 35);
                    
                    // Statistiques en gras
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(12);
                    doc.text(`Récapitulatif:`, 20, 50);
                    
                    doc.setFont("helvetica", "normal");
                    doc.text(`Distance totale: ${stats.distance} km`, 25, 60);
                    doc.text(`Durée totale: ${Math.floor(stats.duree/60)}h${stats.duree%60}`, 25, 70);
                    doc.text(`Poids total: ${stats.poids} kg`, 25, 80);
                    
                    // Liste des arrêts en gras
                    doc.setFont("helvetica", "bold");
                    doc.text(`Détail des livraisons:`, 20, 100);
                    
                    let y = 110;
                    tour.transports.forEach((t, i) => {
                        doc.setFont("helvetica", "bold");
                        doc.text(`${i+1}. ${t.destinataire_nom || 'Client'}`, 20, y);
                        
                        doc.setFont("helvetica", "normal");
                        doc.text(`   📦 ${t.client_number || 'Inconnu'}`, 20, y+5);
                        doc.text(`   📍 ${t.delivery_address || ''}`, 20, y+10);
                        y += 20;
                    });
                    
                    doc.save(`tournee-${tour.nom.replace(/\s+/g, '_')}.pdf`);
                };
                
                // ===== CHARGEMENT =====
                async function loadData() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    afficherPage();
                }
                
                // ===== RENOMMER =====
                window.renommerTournee = function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    const nouveauNom = prompt("Nouveau nom:", tour.nom);
                    if (nouveauNom) {
                        tour.nom = nouveauNom;
                        afficherPage();
                    }
                };
                
                // ===== OUVRIR MODAL =====
                window.ouvrirEdition = function(transportId) {
                    const t = allTransports.find(t => t.id === transportId);
                    if (!t) return;
                    
                    document.getElementById('modalContent').innerHTML = `
                        <div style="margin-bottom:15px;">
                            <label style="color:#aaa;">Numéro client</label>
                            <input type="text" id="editClient" value="${t.client_number || ''}" style="width:100%; padding:8px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                        </div>
                        <div style="margin-bottom:15px;">
                            <label style="color:#aaa;">Destinataire</label>
                            <input type="text" id="editDest" value="${t.destinataire_nom || ''}" style="width:100%; padding:8px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                        </div>
                        <div style="margin-bottom:15px;">
                            <label style="color:#aaa;">Adresse</label>
                            <input type="text" id="editAddr" value="${t.delivery_address || ''}" style="width:100%; padding:8px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                        </div>
                        <div style="margin-bottom:15px;">
                            <label style="color:#aaa;">Poids (kg)</label>
                            <input type="number" id="editPoids" value="${t.weight || 1}" style="width:100%; padding:8px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px;">
                        </div>
                        <div style="margin-bottom:15px;">
                            <label style="color:#aaa;">Vitesse</label>
                            <select id="editSpeed" style="width:100%; padding:8px; background:#111; border:1px solid #2a2a2a; color:white;">
                                <option value="24h" ${t.speed === '24h' ? 'selected' : ''}>24h</option>
                                <option value="12h" ${t.speed === '12h' ? 'selected' : ''}>12h</option>
                                <option value="6h" ${t.speed === '6h' ? 'selected' : ''}>6h</option>
                            </select>
                        </div>
                        <div class="modal-actions">
                            <button class="btn" onclick="document.getElementById('editModal').style.display='none'" style="flex:1;">Annuler</button>
                            <button class="btn-success" onclick="sauvegarderEdition('${t.id}')" style="flex:2;">Sauvegarder</button>
                        </div>
                    `;
                    
                    document.getElementById('editModal').style.display = 'flex';
                };
                
                window.sauvegarderEdition = async function(id) {
                    await supabase
                        .from('transport_orders_simple')
                        .update({
                            client_number: document.getElementById('editClient').value,
                            destinataire_nom: document.getElementById('editDest').value,
                            delivery_address: document.getElementById('editAddr').value,
                            weight: parseFloat(document.getElementById('editPoids').value),
                            speed: document.getElementById('editSpeed').value
                        })
                        .eq('id', id);
                    
                    document.getElementById('editModal').style.display = 'none';
                    loadData();
                };
                
                // ===== AFFICHAGE =====
                function afficherPage() {
                    const transportsDansTournees = new Set();
                    tours.forEach(tour => {
                        tour.transports.forEach(t => transportsDansTournees.add(t.id));
                    });
                    
                    const enAttente = allTransports.filter(t => 
                        t.status !== 'delivered' && !transportsDansTournees.has(t.id)
                    );
                    
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Léman Dispatch</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 En attente</span><span class="stat-value">${enAttente.length}</span></div>
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tours.length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn" onclick="window.location.href='new-transport.html'">➕ Nouveau</button>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <!-- PANEL GAUCHE - TOURNÉES (60%) -->
                            <div class="tours-panel">
                                <div class="panel-header">
                                    <h2><i class="fas fa-route"></i> Tournées</h2>
                                    <button class="btn-success btn-small" onclick="ajouterTournee()">➕ Nouvelle</button>
                                </div>
                                
                                ${tours.map(tour => {
                                    const stats = calculerStatsTournee(tour.transports);
                                    return `
                                        <div class="tour-card" style="border-left-color: ${tour.couleur};">
                                            <div class="tour-header">
                                                <span class="tour-title" onclick="renommerTournee(${tour.id})">
                                                    🚚 ${tour.nom}
                                                </span>
                                                <div>
                                                    <button class="btn-pdf btn-small" onclick="genererPDF(${tour.id})">
                                                        <i class="fas fa-file-pdf"></i>
                                                    </button>
                                                    <button class="btn-delete btn-small" onclick="supprimerTournee(${tour.id})">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div class="tour-stats">
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${stats.distance} km</div>
                                                    <div class="tour-stat-label">Distance</div>
                                                </div>
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${Math.floor(stats.duree/60)}h${stats.duree%60}</div>
                                                    <div class="tour-stat-label">Durée</div>
                                                </div>
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${stats.poids} kg</div>
                                                    <div class="tour-stat-label">Charge</div>
                                                </div>
                                            </div>
                                            
                                            <div class="tour-list" data-tour-id="${tour.id}">
                                                ${tour.transports.map(t => `
                                                    <div class="transport-card" ondblclick="ouvrirEdition('${t.id}')" data-id="${t.id}">
                                                        <div class="transport-expediteur">
                                                            <i class="fas fa-user"></i> ${t.client_number || 'Inconnu'}
                                                        </div>
                                                        <div class="transport-destinataire">
                                                            👤 ${t.destinataire_nom || 'Client'}
                                                        </div>
                                                        <div class="transport-address">
                                                            📍 ${(t.delivery_address || '').substring(0,40)}
                                                        </div>
                                                        <div class="transport-meta">
                                                            <span>⚡ ${t.speed || '24h'}</span>
                                                            <span>⚖️ ${t.weight || 1} kg</span>
                                                        </div>
                                                        <button class="remove-from-tour" onclick="enleverDeTournee('${t.id}'); event.stopPropagation();">
                                                            <i class="fas fa-times"></i> Retirer
                                                        </button>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                            
                            <!-- PANEL DROIT - EN ATTENTE (40%) -->
                            <div class="pending-panel">
                                <div class="pending-header">
                                    <h2><i class="fas fa-clock"></i> En attente</h2>
                                    <span class="stat-value">${enAttente.length}</span>
                                </div>
                                
                                <div class="pending-list" id="pendingList">
                                    ${enAttente.map(t => `
                                        <div class="transport-card ${t.speed === '6h' ? 'urgent' : ''}" 
                                             ondblclick="ouvrirEdition('${t.id}')"
                                             data-id="${t.id}">
                                            <div class="transport-expediteur">
                                                <i class="fas fa-user"></i> ${t.client_number || 'Inconnu'}
                                            </div>
                                            <div class="transport-destinataire">
                                                👤 ${t.destinataire_nom || 'Client'}
                                            </div>
                                            <div class="transport-address">
                                                📍 ${(t.delivery_address || '').substring(0,40)}
                                            </div>
                                            <div class="transport-meta">
                                                <span>⚡ ${t.speed || '24h'}</span>
                                                <span>⚖️ ${t.weight || 1} kg</span>
                                            </div>
                                            <button class="btn-delete-transport" onclick="supprimerTransport('${t.id}'); event.stopPropagation();">
                                                <i class="fas fa-trash"></i> Supprimer
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    initDragAndDrop();
                }
                
                // ===== DRAG & DROP =====
                function initDragAndDrop() {
                    $(".transport-card").draggable({
                        revert: "invalid",
                        helper: "clone",
                        cursor: "move",
                        opacity: 0.7,
                        zIndex: 1000
                    });
                    
                    $(".tour-list").droppable({
                        accept: ".transport-card",
                        hoverClass: "drop-target",
                        drop: function(event, ui) {
                            const transportId = ui.draggable.data('id');
                            const tourId = $(this).data('tour-id');
                            
                            if (!tourId) return;
                            
                            ajouterATournee(transportId, tourId);
                        }
                    });
                }
                
                // ===== FONCTIONS =====
                window.ajouterTournee = function() {
                    const newId = tours.length + 1;
                    const couleurs = ['#3b82f6', '#10b981', '#f59e0b'];
                    tours.push({
                        id: newId,
                        nom: `Tournée ${newId}`,
                        couleur: couleurs[newId % couleurs.length],
                        transports: []
                    });
                    afficherPage();
                };
                
                window.supprimerTournee = function(tourId) {
                    tours = tours.filter(t => t.id !== tourId);
                    afficherPage();
                };
                
                window.ajouterATournee = function(transportId, tourId) {
                    const transport = allTransports.find(t => t.id === transportId);
                    const tour = tours.find(t => t.id === parseInt(tourId));
                    
                    if (transport && tour) {
                        tours.forEach(t => {
                            t.transports = t.transports.filter(t => t.id !== transportId);
                        });
                        tour.transports.push(transport);
                        afficherPage();
                    }
                };
                
                window.enleverDeTournee = function(transportId) {
                    tours.forEach(tour => {
                        tour.transports = tour.transports.filter(t => t.id !== transportId);
                    });
                    afficherPage();
                };
                
                window.supprimerTransport = async function(transportId) {
                    if (confirm("Supprimer définitivement ce transport ?")) {
                        await supabase
                            .from('transport_orders_simple')
                            .delete()
                            .eq('id', transportId);
                        loadData();
                    }
                };
                
                window.logout = function() {
                    localStorage.removeItem('user');
                    window.location.href = '../login/';
                };
                
                await loadData();
                
            } catch(e) {
                console.error("Erreur:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
