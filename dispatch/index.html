        // ===== FONCTIONS =====
        let map;
        let markers;
        
        window.logout = function() {
            localStorage.removeItem('user');
            window.location.href = '../login/';
        };
        
        window.openModal = function() {
            document.getElementById('modal').style.display = 'flex';
        };
        
        window.closeModal = function() {
            document.getElementById('modal').style.display = 'none';
        };
        
        // Initialisation carte
        function initMap() {
            try {
                map = L.map('map').setView([46.8, 8.2], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap'
                }).addTo(map);
                
                markers = L.markerClusterGroup();
                map.addLayer(markers);
                
                console.log("✅ Carte initialisée");
                loadTransports();
            } catch(e) {
                console.error("Erreur carte:", e);
                document.getElementById('transportList').innerHTML = '<div style="color:#ef4444; padding:20px;">Erreur carte</div>';
            }
        }
        
        async function loadTransports() {
            try {
                if (!markers) {
                    console.warn("Marqueurs pas prêts");
                    return;
                }
                
                const { data, error } = await supabase
                    .from('transport_orders')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                console.log(`📦 ${data?.length || 0} transports`);
                
                // Stats
                document.getElementById('totalCount').textContent = data?.length || 0;
                document.getElementById('urgentCount').textContent = data?.filter(t => t.priority === 'urgent').length || 0;
                
                // Liste
                let html = '';
                data?.slice(0, 5).forEach(t => {
                    html += `
                        <div class="transport-item ${t.priority === 'urgent' ? 'urgent' : ''}">
                            <div class="transport-client">${t.client_name || 'Sans client'}</div>
                            <div class="transport-route">${t.pickup_city || '?'} → ${t.delivery_city || '?'}</div>
                        </div>
                    `;
                });
                document.getElementById('transportList').innerHTML = html || '<div style="padding:20px;">Aucun transport</div>';
                
                // Carte
                if (markers) {
                    markers.clearLayers();
                    data?.forEach((t, i) => {
                        if (t.delivery_city) {
                            let lat = 46.8, lng = 8.2;
                            const city = t.delivery_city.toLowerCase();
                            if (city.includes('lausanne')) { lat = 46.52; lng = 6.63; }
                            if (city.includes('geneve')) { lat = 46.20; lng = 6.14; }
                            if (city.includes('yverdon')) { lat = 46.78; lng = 6.64; }
                            
                            let color = '#facc15';
                            if (t.priority === 'urgent') color = '#ef4444';
                            
                            const icon = L.divIcon({
                                html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${i+1}</div>`,
                                iconSize: [24, 24]
                            });
                            
                            L.marker([lat, lng], { icon }).addTo(markers);
                        }
                    });
                }
                
            } catch(e) {
                console.error("Erreur chargement:", e);
                document.getElementById('transportList').innerHTML = '<div style="color:#ef4444; padding:20px;">Erreur chargement</div>';
            }
        }
        
        window.saveTransport = async function() {
            const transport = {
                client_name: document.getElementById('clientName').value,
                pickup_city: document.getElementById('pickupCity').value,
                delivery_city: document.getElementById('deliveryCity').value,
                weight: parseFloat(document.getElementById('weight').value) || 1,
                priority: document.getElementById('priority').value,
                status: 'pending',
                created_at: new Date()
            };
            
            if (!transport.client_name || !transport.pickup_city || !transport.delivery_city) {
                alert('Champs obligatoires');
                return;
            }
            
            try {
                const { error } = await supabase.from('transport_orders').insert([transport]);
                if (error) throw error;
                
                alert('✅ Transport créé');
                closeModal();
                
                document.getElementById('clientName').value = '';
                document.getElementById('pickupCity').value = '';
                document.getElementById('deliveryCity').value = '';
                document.getElementById('weight').value = '1';
                
                loadTransports();
                
            } catch(e) {
                console.error('Erreur:', e);
                alert('❌ Erreur création');
            }
        };
        
        // Lancement
        initMap();
        setInterval(loadTransports, 30000);
    });
