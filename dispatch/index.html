<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        #barre-jaune {
            position: fixed;

            left: 0;

            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            font-weight: bold;
        }
        button {
            background: black;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        #formulaire {
            position: fixed;
            top: 80px;
            right: 20px;

            padding: 20px;

        }
        <!-- Dans le formulaire, ajoutez : -->
<div class="form-group">

    <input type="text" id="rue" placeholder="Rue du Simplon">
</div>
<div class="form-group">
    <label>NPA</label>
    <input type="text" id="npa" placeholder="1000">
</div>
        input, select, button {
            width: 100%;

            padding: 8px;

</head>
<body>

    <div id="barre-jaune">
        <span>🚚 LÉMAN DISPATCH</span>
        <button onclick="ouvrirFormulaire()">➕ Créer transport</button>
    </div>
    
    <div id="formulaire">
        <h3>Nouveau transport</h3>
        <input type="text" id="client" placeholder="Nom client">
        <input type="text" id="pickup" placeholder="Ville ramassage">
        <input type="text" id="delivery" placeholder="Ville livraison">
        <select id="priority">
            <option value="normal">Normal</option>
            <option value="urgent">Urgent</option>
        </select>
        <button onclick="fermerFormulaire()">Annuler</button>
        <button onclick="sauvegarderTransport()">Créer</button>
    </div>
    
    <div id="map"></div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <script>
        // ATTENDRE QUE TOUT SOIT CHARGÉ
        document.addEventListener('DOMContentLoaded', function() {
            console.log("✅ DOM chargé");
            
            // Vérifier que window.supabase existe (créé par config.js)
            if (!window.supabase) {
                document.body.innerHTML = '<div style="color:red; padding:20px;">❌ Supabase non initialisé dans config.js</div>';
                return;
            }
            
            console.log("✅ Supabase prêt");
            
            // ===== CARTE =====
            const map = L.map('map').setView([46.8, 8.2], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            // ===== CHARGER LES TRANSPORTS =====
            async function chargerTransports() {
                const { data } = await window.supabase.from('orders').select('*');
                
                if (data) {
                    console.log(`${data.length} transports chargés`);
                    
                    data.forEach(t => {
                        let lat = 46.8, lng = 8.2;
                        const ville = t.delivery_city?.toLowerCase() || '';
                        
                        if (ville.includes('lausanne')) { lat = 46.52; lng = 6.63; }
                        if (ville.includes('geneve')) { lat = 46.20; lng = 6.14; }
                        if (ville.includes('yverdon')) { lat = 46.78; lng = 6.64; }
                        
                        L.marker([lat, lng]).addTo(map)
                            .bindPopup(`<b>${t.client_name || 'Sans client'}</b><br>📍 ${t.pickup_city} → ${t.delivery_city}`);
                    });
                }
            }
            
            // ===== FONCTIONS GLOBALES =====
            window.ouvrirFormulaire = function() {
                document.getElementById('formulaire').style.display = 'block';
            };
            
            window.fermerFormulaire = function() {
                document.getElementById('formulaire').style.display = 'none';
            };
            
            window.sauvegarderTransport = async function() {
                const transport = {
                    client_name: document.getElementById('client').value,
                    pickup_city: document.getElementById('pickup').value,
                    delivery_city: document.getElementById('delivery').value,
                    priority: document.getElementById('priority').value,
                    status: 'pending',
                    created_at: new Date()
                };
                
                const { error } = await window.supabase.from('orders').insert([transport]);
                
                if (error) {
                    alert('❌ Erreur: ' + error.message);
                } else {
                    alert('✅ Transport créé !');
                    fermerFormulaire();
                    location.reload();
                }
            };
            
            // ===== LANCEMENT =====
            chargerTransports();
        });
        async function calculerDistance(pickup, delivery) {
    // Appel à OSRM
    const response = await fetch(
        `https://router.project-osrm.org/route/v1/driving/${pickup.lng},${pickup.lat};${delivery.lng},${delivery.lat}?overview=false`
    );
    const data = await response.json();
    return (data.routes[0].distance / 1000).toFixed(1);
}

</div>
    </script>
    
</body>
</html>
