<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman Dispatch | Tournées</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <!-- Resizable -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    
    <!-- Drag & Drop -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css">
    
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        header {
            background: #111; padding: 15px 25px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #facc15; height: 70px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-success { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .btn-pdf { background: #8b5cf6; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .btn-edit { background: #3b82f6; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
        }
        
        /* PANEL GAUCHE - TOURNÉES */
        .tours-panel {
            width: 500px;
            background: #111;
            border-right: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .panel-header h2 {
            color: #facc15;
        }
        
        .tour-card {
            background: #1f2937;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
        }
        
        .tour-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .tour-title {
            font-weight: bold;
            color: #facc15;
            font-size: 16px;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
        }
        
        .tour-title:hover {
            background: #2a2a2a;
        }
        
        .tour-title-input {
            background: #111;
            color: white;
            border: 1px solid #facc15;
            padding: 5px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            width: 200px;
        }
        
        .tour-stats {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        
        .tour-stat-item {
            text-align: center;
        }
        
        .tour-stat-value {
            font-weight: bold;
            color: #facc15;
            font-size: 16px;
        }
        
        .tour-stat-label {
            font-size: 11px;
            color: #aaa;
        }
        
        .tour-list {
            min-height: 50px;
            max-height: 250px;
            overflow-y: auto;
            padding: 5px;
            margin: 10px 0;
            background: #2a2a2a;
            border-radius: 4px;
        }
        
        .tour-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        
        .chauffeur-select {
            background: #111;
            color: white;
            border: 1px solid #2a2a2a;
            padding: 5px;
            border-radius: 4px;
            width: 100%;
            margin-top: 10px;
        }
        
        /* CARTE CENTRALE - RESIZABLE */
        .map-container {
            width: 40%;
            min-width: 300px;
            max-width: 60%;
            position: relative;
            border-right: 1px solid #2a2a2a;
            overflow: hidden;
        }
        .ui-resizable-e {
            width: 8px;
            background: #2a2a2a;
            cursor: col-resize;
        }
        #map { height: 100%; width: 100%; }
        
        /* PANEL DROIT - EN ATTENTE */
        .pending-panel {
            flex: 1;
            background: #111;
            padding: 20px;
            overflow-y: auto;
        }
        
        .pending-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .pending-header h2 {
            color: #facc15;
        }
        
        .pending-list {
            min-height: 200px;
            padding: 5px;
        }
        
        /* CARTES DE TRANSPORT */
        .transport-card {
            background: #1f2937;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            border-left: 3px solid #facc15;
            transition: 0.2s;
            position: relative;
        }
        
        .transport-card:hover {
            background: #2d3a4f;
        }
        
        .transport-card.urgent {
            border-left-color: #ef4444;
        }
        
        .transport-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .transport-expediteur {
            font-size: 12px;
            color: #9ca3af;
        }
        
        .transport-expediteur i {
            color: #facc15;
            margin-right: 4px;
        }
        
        .transport-destinataire {
            font-weight: bold;
            font-size: 15px;
            color: white;
        }
        
        .transport-address {
            font-size: 12px;
            color: #aaa;
            margin: 4px 0;
        }
        
        .transport-npa-ville {
            font-size: 11px;
            color: #facc15;
            margin-top: 2px;
        }
        
        .transport-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 8px;
            padding-top: 5px;
            border-top: 1px solid #2a2a2a;
        }
        
        .remove-from-tour {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
            padding: 5px;
        }
        
        .btn-delete-transport {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 8px;
            width: 100%;
        }
        
        .drop-target {
            border: 2px dashed #facc15;
            background: #2d3a4f;
        }
        
        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal-box {
            background: #1f2937;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #facc15;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h3 {
            color: #facc15;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-form-group {
            margin-bottom: 15px;
        }
        
        .modal-form-group label {
            display: block;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .modal-form-group input,
        .modal-form-group select,
        .modal-form-group textarea {
            width: 100%;
            padding: 10px;
            background: #111;
            border: 1px solid #2a2a2a;
            color: white;
            border-radius: 4px;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .loader {
            text-align: center; padding: 30px; color: #aaa;
        }
        .loader i { font-size: 30px; color: #facc15; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app">
        <div class="loader">
            <i class="fas fa-spinner fa-spin"></i>
            Chargement...
        </div>
    </div>

    <!-- MODAL D'ÉDITION -->
    <div id="editModal" class="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">✏️ Modifier le transport</h3>
                <button class="modal-close" onclick="fermerModal()">✖</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Tournées...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let tours = [
                    { id: 1, nom: "Tournée Lausanne", couleur: '#3b82f6', chauffeur: null, transports: [] },
                    { id: 2, nom: "Tournée Genève", couleur: '#10b981', chauffeur: null, transports: [] },
                    { id: 3, nom: "Tournée Berne", couleur: '#f59e0b', chauffeur: null, transports: [] }
                ];
                let chauffeurs = [];
                let map;
                let mapMarkers = [];
                let currentEditId = null;
                
                const depot = {
                    nom: "Dépôt Yverdon",
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== CHARGEMENT CHAUFFEURS =====
                async function loadChauffeurs() {
                    const { data } = await supabase
                        .from('chauffeurs')
                        .select('*')
                        .eq('actif', true);
                    
                    chauffeurs = data || [];
                }
                
                // ===== CALCUL DE DISTANCE =====
                function calculerDistance(lat1, lng1, lat2, lng2) {
                    if (!lat1 || !lng1 || !lat2 || !lng2) return 0;
                    const R = 6371;
                    const dLat = (lat2 - lat1) * Math.PI / 180;
                    const dLon = (lng2 - lng1) * Math.PI / 180;
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                             Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                             Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                }
                
                // ===== EXTRAIRE NPA ET VILLE =====
                function extraireNpaVille(adresse) {
                    if (!adresse) return { npa: '', ville: '' };
                    const parts = adresse.split(',');
                    if (parts.length >= 2) {
                        const lastPart = parts[parts.length-1].trim();
                        const match = lastPart.match(/(\d{4})\s+(.+)/);
                        if (match) {
                            return { npa: match[1], ville: match[2] };
                        }
                    }
                    return { npa: '', ville: '' };
                }
                
                // ===== CALCUL STATS TOURNÉE =====
                function calculerStatsTournee(transports) {
                    if (!transports || transports.length === 0) {
                        return { distance: 0, duree: 0, poids: 0 };
                    }
                    
                    let distance = 0;
                    let duree = 0;
                    let poids = 0;
                    let precedent = depot;
                    
                    transports.forEach(t => {
                        if (t.lat && t.lng) {
                            const trajet = calculerDistance(precedent.lat, precedent.lng, t.lat, t.lng);
                            distance += trajet;
                            duree += (trajet / 50) * 60 + 15;
                            poids += t.weight || 1;
                            precedent = t;
                        }
                    });
                    
                    if (transports.length > 0 && transports[transports.length-1].lat) {
                        const dernier = transports[transports.length - 1];
                        const retour = calculerDistance(dernier.lat, dernier.lng, depot.lat, depot.lng);
                        distance += retour;
                        duree += (retour / 50) * 60;
                    }
                    
                    return { 
                        distance: Math.round(distance * 10) / 10, 
                        duree: Math.round(duree),
                        poids: Math.round(poids)
                    };
                }
                
                // ===== GÉNÉRER PDF TOURNÉE =====
                window.genererPDF = function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (!tour || tour.transports.length === 0) return;
                    
                    const stats = calculerStatsTournee(tour.transports);
                    
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    
                    doc.setFontSize(20);
                    doc.setTextColor(250, 204, 21);
                    doc.text(`🚚 ${tour.nom}`, 20, 20);
                    
                    doc.setFontSize(12);
                    doc.setTextColor(255, 255, 255);
                    doc.text(`Date: ${new Date().toLocaleDateString('fr-CH')}`, 20, 35);
                    
                    doc.setFontSize(14);
                    doc.text(`📊 Récapitulatif`, 20, 50);
                    
                    doc.setFontSize(12);
                    doc.text(`Distance totale: ${stats.distance} km`, 25, 65);
                    doc.text(`Durée totale: ${Math.floor(stats.duree/60)}h${stats.duree%60}`, 25, 75);
                    doc.text(`Poids total: ${stats.poids} kg`, 25, 85);
                    doc.text(`Nombre d'arrêts: ${tour.transports.length}`, 25, 95);
                    
                    doc.setFontSize(14);
                    doc.text(`📋 Détail des livraisons`, 20, 115);
                    
                    let y = 130;
                    tour.transports.forEach((t, i) => {
                        if (y > 270) {
                            doc.addPage();
                            y = 20;
                        }
                        
                        doc.setFontSize(11);
                        doc.setTextColor(250, 204, 21);
                        doc.text(`${i+1}. ${t.destinataire_nom || 'Client'}`, 20, y);
                        
                        doc.setFontSize(10);
                        doc.setTextColor(200, 200, 200);
                        doc.text(`   📦 Expéditeur: ${t.client_number || 'Inconnu'}`, 20, y+5);
                        doc.text(`   📍 ${t.delivery_address || ''}`, 20, y+10);
                        doc.text(`   ⚡ ${t.speed || '24h'} | ⚖️ ${t.weight || 1} kg`, 20, y+15);
                        
                        y += 25;
                    });
                    
                    doc.save(`tournee-${tour.nom.replace(/\s+/g, '_')}.pdf`);
                };
                
                // ===== CHARGEMENT =====
                async function loadData() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    await loadChauffeurs();
                    afficherPage();
                }
                
                // ===== RENOMMER TOURNÉE =====
                window.renommerTournee = function(tourId, element) {
                    const tour = tours.find(t => t.id === tourId);
                    const nouveauNom = prompt("Nouveau nom pour la tournée:", tour.nom);
                    if (nouveauNom && nouveauNom.trim()) {
                        tour.nom = nouveauNom.trim();
                        afficherPage();
                    }
                };
                
                // ===== OUVRIR MODAL ÉDITION =====
                window.ouvrirEdition = function(transportId) {
                    const transport = allTransports.find(t => t.id === transportId);
                    if (!transport) return;
                    
                    currentEditId = transportId;
                    
                    document.getElementById('modalTitle').innerHTML = `✏️ Édition - ${transport.order_number || ''}`;
                    document.getElementById('modalContent').innerHTML = `
                        <div class="modal-form-group">
                            <label>Numéro client</label>
                            <input type="text" id="editClientNumber" value="${transport.client_number || ''}">
                        </div>
                        <div class="modal-form-group">
                            <label>Destinataire</label>
                            <input type="text" id="editDestinataire" value="${transport.destinataire_nom || ''}">
                        </div>
                        <div class="modal-form-group">
                            <label>Téléphone</label>
                            <input type="text" id="editTel" value="${transport.destinataire_tel || ''}">
                        </div>
                        <div class="modal-form-group">
                            <label>Adresse livraison</label>
                            <input type="text" id="editAdresse" value="${transport.delivery_address || ''}">
                        </div>
                        <div class="modal-form-group">
                            <label>Poids (kg)</label>
                            <input type="number" id="editPoids" value="${transport.weight || 1}" step="0.1">
                        </div>
                        <div class="modal-form-group">
                            <label>Vitesse</label>
                            <select id="editVitesse">
                                <option value="24h" ${transport.speed === '24h' ? 'selected' : ''}>24h</option>
                                <option value="12h" ${transport.speed === '12h' ? 'selected' : ''}>12h</option>
                                <option value="6h" ${transport.speed === '6h' ? 'selected' : ''}>6h</option>
                            </select>
                        </div>
                        <div class="modal-form-group">
                            <label>Instructions</label>
                            <textarea id="editInstructions" rows="3">${transport.instructions || ''}</textarea>
                        </div>
                        <div class="modal-actions">
                            <button class="btn" onclick="fermerModal()" style="flex:1;">Annuler</button>
                            <button class="btn-success" onclick="sauvegarderEdition()" style="flex:2;">Sauvegarder</button>
                        </div>
                    `;
                    
                    document.getElementById('editModal').style.display = 'flex';
                };
                
                window.fermerModal = function() {
                    document.getElementById('editModal').style.display = 'none';
                    currentEditId = null;
                };
                
                window.sauvegarderEdition = async function() {
                    const updates = {
                        client_number: document.getElementById('editClientNumber').value,
                        destinataire_nom: document.getElementById('editDestinataire').value,
                        destinataire_tel: document.getElementById('editTel').value,
                        delivery_address: document.getElementById('editAdresse').value,
                        weight: parseFloat(document.getElementById('editPoids').value),
                        speed: document.getElementById('editVitesse').value,
                        instructions: document.getElementById('editInstructions').value,
                        priority: document.getElementById('editVitesse').value === '6h' ? 'urgent' : 'normal'
                    };
                    
                    await supabase
                        .from('transport_orders_simple')
                        .update(updates)
                        .eq('id', currentEditId);
                    
                    alert("✅ Transport mis à jour");
                    fermerModal();
                    loadData();
                };
                
                // ===== AFFICHAGE =====
                function afficherPage() {
                    const transportsDansTournees = new Set();
                    tours.forEach(tour => {
                        tour.transports.forEach(t => transportsDansTournees.add(t.id));
                    });
                    
                    const enAttente = allTransports.filter(t => 
                        t.status !== 'delivered' && !transportsDansTournees.has(t.id)
                    );
                    
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Léman Dispatch</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 En attente</span><span class="stat-value">${enAttente.length}</span></div>
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tours.length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn" onclick="window.location.href='new-transport.html'">
                                    <i class="fas fa-plus"></i> Nouveau transport
                                </button>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <!-- PANEL GAUCHE - TOURNÉES -->
                            <div class="tours-panel">
                                <div class="panel-header">
                                    <h2><i class="fas fa-route"></i> Tournées</h2>
                                    <button class="btn-success btn-small" onclick="ajouterTournee()">
                                        <i class="fas fa-plus"></i> Nouvelle
                                    </button>
                                </div>
                                
                                ${tours.map((tour, index) => {
                                    const stats = calculerStatsTournee(tour.transports);
                                    return `
                                        <div class="tour-card" style="border-left-color: ${tour.couleur};">
                                            <div class="tour-header">
                                                <span class="tour-title" ondblclick="renommerTournee(${tour.id}, this)">
                                                    🚚 ${tour.nom}
                                                </span>
                                                <div>
                                                    <button class="btn-edit btn-small" onclick="renommerTournee(${tour.id})">
                                                        <i class="fas fa-pen"></i>
                                                    </button>
                                                    <button class="btn-pdf btn-small" onclick="genererPDF(${tour.id})">
                                                        <i class="fas fa-file-pdf"></i>
                                                    </button>
                                                    <button class="btn-delete btn-small" onclick="supprimerTournee(${tour.id})">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div class="tour-stats">
                                                <div class="tour-stat-item">
                                                    <div class="tour-stat-value">${stats.distance} km</div>
                                                    <div class="tour-stat-label">Distance</div>

                // ===== INIT CARTE =====
                function initMap(transports) {
                    if (map) map.remove();
                    mapMarkers.forEach(m => map.removeLayer(m));
                    mapMarkers = [];
                    
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    L.marker([depot.lat, depot.lng]).addTo(map).bindPopup("Dépôt Yverdon");
                    
                    if (transports && transports.length > 0) {
                        transports.forEach(t => {

                                const marker = L.circleMarker([t.lat, t.lng], {

                                    fillColor: color,
                                    color: '#fff',
                                    weight: 2,
                                    fillOpacity: 0.9
                                }).addTo(map);

                                    ${t.delivery_address}<br>
                                    Expéditeur: ${t.client_number}
                                `);
                                
                                mapMarkers.push(marker);
                            }
                        });
                    }
