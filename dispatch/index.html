<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <!-- VOTRE DESIGN SOMBRE -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        
        body { 
            background: #111; 
            height: 100vh; 
            overflow: hidden; 
            color: white;
        }
        
        header {
            background: #111;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #facc15;
            height: 70px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #facc15;
        }
        
        .btn {
            background: #facc15;
            color: #111;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn:hover {
            background: #eab308;
        }
        
        .container {
            display: flex;
            height: calc(100vh - 70px);
        }
        
        .sidebar {
            width: 220px;
            background: #111;
            padding: 20px;
            border-right: 1px solid #2a2a2a;
        }
        
        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: #1f2937;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
        }
        
        .sidebar button:hover {
            background: #facc15;
            color: #111;
        }
        
        .map-container {
            flex: 1;
            position: relative;
        }
        
        #map {
            height: 100%;
            width: 100%;
            background: #1a1a1a;
        }
        
        .right-panel {
            width: 320px;
            background: #111;
            border-left: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .right-panel h3 {
            color: #facc15;
            margin-bottom: 20px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-box {
            background: #1f2937;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #facc15;
        }
        
        .modal-header {
            background: #111;
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 { color: #facc15; }
        .modal-header button { 
            background: none; 
            border: none; 
            color: #888; 
            font-size: 24px; 
            cursor: pointer;
        }
        
        .modal-content {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            background: #111;
            border: 1px solid #2a2a2a;
            color: white;
            border-radius: 4px;
        }
        
        .transport-item {
            background: #1f2937;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 3px solid #facc15;
        }
        
        .transport-item.urgent {
            border-left-color: #ef4444;
        }
        
        .transport-client {
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }
        
        .transport-route {
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🚚 Léman Dispatch</div>
    <button class="btn" onclick="openModal()">➕ Créer transport</button>
</header>

<div class="container">
    <div class="sidebar">
        <button>🗺️ Dispatch</button>
        <button>📦 Transports</button>
        <button>👤 Clients</button>
        <button>🚚 Chauffeurs</button>
        <button>💰 Factures</button>
    </div>
    
    <div class="map-container">
        <div id="map"></div>
    </div>
    
    <div class="right-panel">
        <h3>📋 Transports</h3>
        <div id="transportList">Chargement...</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>➕ Nouveau transport</h3>
            <button onclick="closeModal()">✖</button>
        </div>
        <div class="modal-content">
            <form onsubmit="event.preventDefault(); saveTransport();">
                <div class="form-group">
                    <label>Nom client</label>
                    <input type="text" id="clientName" required>
                </div>
                
                <div class="form-group">
                    <label>Ville de ramassage</label>
                    <input type="text" id="pickupCity" required>
                </div>
                
                <div class="form-group">
                    <label>Ville de livraison</label>
                    <input type="text" id="deliveryCity" required>
                </div>
                
                <div class="form-group">
                    <label>Priorité</label>
                    <select id="priority">
                        <option value="normal">Normal</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>
                
                <button type="submit" class="btn" style="width:100%; margin-top:10px;">Créer transport</button>
            </form>
        </div>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // ========== CONFIGURATION ==========
    const SUPABASE_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // ========== VARIABLES ==========
    let map;
    let markers;
    let mapInitialized = false;
    
    // ========== INITIALISATION ==========
    function initMap() {
        console.log("Initialisation de la carte...");
        
        try {
            map = L.map('map').setView([46.8, 8.2], 8);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);
            
            markers = L.markerClusterGroup();
            map.addLayer(markers);
            
            mapInitialized = true;
            console.log("✅ Carte initialisée");
            
            loadOrders();
            
        } catch(error) {
            console.error("❌ Erreur carte:", error);
        }
    }
    
    // ========== CHARGEMENT ==========
    async function loadOrders() {
        try {
            const { data, error } = await supabase
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            updateList(data);
            
            if (mapInitialized && markers) {
                updateMap(data);
            }
            
        } catch(error) {
            console.error("Erreur chargement:", error);
        }
    }
    
    // ========== MISE À JOUR CARTE ==========
    function updateMap(orders) {
        markers.clearLayers();
        
        if (!orders || orders.length === 0) return;
        
        const villes = {
            'lausanne': [46.519, 6.632],
            'geneve': [46.204, 6.143],
            'yverdon': [46.778, 6.641],
            'berne': [46.948, 7.447],
            'zurich': [47.376, 8.541]
        };
        
        orders.forEach((order, index) => {
            let lat = 46.8, lng = 8.2;
            const villeCle = order.delivery_city?.toLowerCase() || '';
            
            for (let [key, coords] of Object.entries(villes)) {
                if (villeCle.includes(key)) {
                    lat = coords[0];
                    lng = coords[1];
                    break;
                }
            }
            
            const color = order.priority === 'urgent' ? '#ef4444' : '#facc15';
            
            const icon = L.divIcon({
                html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${index+1}</div>`,
                className: '',
                iconSize: [24, 24]
            });
            
            const marker = L.marker([lat, lng], { icon });
            marker.bindPopup(`<b>${order.client_name}</b><br>${order.pickup_city} → ${order.delivery_city}`);
            
            markers.addLayer(marker);
        });
    }
    
    // ========== MISE À JOUR LISTE ==========
    function updateList(orders) {
        const listEl = document.getElementById('transportList');
        
        if (!orders || orders.length === 0) {
            listEl.innerHTML = '<div style="color:#666; text-align:center; padding:20px;">Aucun transport</div>';
            return;
        }
        
        let html = '';
        orders.forEach(order => {
            html += `
                <div class="transport-item ${order.priority === 'urgent' ? 'urgent' : ''}">
                    <div class="transport-client">${order.client_name || 'Sans client'}</div>
                    <div class="transport-route">📍 ${order.pickup_city} → ${order.delivery_city}</div>
                </div>
            `;
        });
        
        listEl.innerHTML = html;
    }
    
    // ========== MODAL ==========
    window.openModal = function() {
        document.getElementById('modal').style.display = 'flex';
    };
    
    window.closeModal = function() {
        document.getElementById('modal').style.display = 'none';
    };
    
    window.saveTransport = async function() {
        const client = document.getElementById('clientName').value;
        const pickup = document.getElementById('pickupCity').value;
        const delivery = document.getElementById('deliveryCity').value;
        const priority = document.getElementById('priority').value;
        
        if (!client || !pickup || !delivery) {
            alert('Veuillez remplir tous les champs');
            return;
        }
        
        const transport = {
            client_name: client,
            pickup_city: pickup,
            delivery_city: delivery,
            priority: priority,
            status: 'pending',
            created_at: new Date()
        };
        
        const { error } = await supabase.from('orders').insert([transport]);
        
        if (error) {
            alert('Erreur: ' + error.message);
        } else {
            alert('✅ Transport créé !');
            closeModal();
            loadOrders();
            
            // Reset form
            document.getElementById('clientName').value = '';
            document.getElementById('pickupCity').value = '';
            document.getElementById('deliveryCity').value = '';
        }
    };
    
    // ========== DÉMARRAGE ==========
    window.onload = function() {
        initMap();
        setInterval(loadOrders, 30000);
    };
</script>

</body>
</html>
