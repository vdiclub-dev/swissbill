<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch - Carte</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <style>
        /* VOTRE DESIGN SOMBRE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        
        body { 
            background: #111; 
            height: 100vh; 
            overflow: hidden; 
            color: white;
        }
        
        /* HEADER */
        header {
            background: #111;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #facc15;
            height: 70px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #facc15;
        }
        
        .btn {
            background: #facc15;
            color: #111;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn:hover {
            background: #eab308;
        }
        
        /* LAYOUT */
        .container {
            display: flex;
            height: calc(100vh - 70px);
        }
        
        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #111;
            padding: 20px;
            border-right: 1px solid #2a2a2a;
        }
        
        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: #1f2937;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
        }
        
        .sidebar button:hover {
            background: #facc15;
            color: #111;
        }
        
        /* CARTE */
        .map-container {
            flex: 1;
            position: relative;
        }
        
        #map {
            height: 100%;
            width: 100%;
            background: #1a1a1a;
        }
        
        /* PANEL DROIT */
        .right-panel {
            width: 320px;
            background: #111;
            border-left: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .right-panel h3 {
            color: #facc15;
            margin-bottom: 20px;
        }
        
        /* LISTE TRANSPORTS */
        .transport-item {
            background: #1f2937;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 3px solid #facc15;
        }
        
        .transport-item.urgent {
            border-left-color: #ef4444;
        }
        
        .transport-client {
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }
        
        .transport-route {
            font-size: 13px;
            color: #aaa;
        }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: #1f2937;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            border: 1px solid #facc15;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h3 { color: #facc15; }
        .modal-header button { 
            background: none; 
            border: none; 
            color: white; 
            font-size: 24px; 
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            background: #111;
            border: 1px solid #2a2a2a;
            color: white;
            border-radius: 4px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #facc15;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-cancel {
            background: #2a2a2a;
            color: white;
        }
        
        .btn-save {
            background: #facc15;
            color: #111;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🚚 Léman Dispatch</div>
    <button class="btn" onclick="ouvrirModal()">➕ Créer transport</button>
</header>

<div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <button>🗺️ Dispatch</button>
        <button>📦 Transports</button>
        <button>👤 Clients</button>
        <button>🚚 Chauffeurs</button>
        <button>💰 Factures</button>
    </div>
    
    <!-- CARTE -->
    <div class="map-container">
        <div id="map"></div>
    </div>
    
    <!-- LISTE TRANSPORTS -->
    <div class="right-panel">
        <h3>📋 Transports récents</h3>
        <div id="liste-transports">
            Chargement...
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>➕ Nouveau transport</h3>
            <button onclick="fermerModal()">✖</button>
        </div>
        
        <div class="form-group">
            <label>Nom client *</label>
            <input type="text" id="client" placeholder="Jean Dupont">
        </div>
        
        <div class="form-group">
            <label>Ville de ramassage *</label>
            <input type="text" id="pickup" placeholder="Lausanne">
        </div>
        
        <div class="form-group">
            <label>Ville de livraison *</label>
            <input type="text" id="delivery" placeholder="Genève">
        </div>
        
        <div class="form-group">
            <label>Priorité</label>
            <select id="priority">
                <option value="normal">Normal</option>
                <option value="urgent">Urgent</option>
            </select>
        </div>
        
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="fermerModal()">Annuler</button>
            <button class="btn-save" onclick="sauvegarder()">Créer transport</button>
        </div>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // ========== CONFIGURATION ==========
    const SUPABASE_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';  // À CHANGER
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';                    // À CHANGER
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // ========== VARIABLES ==========
    let map;
    let markers = [];
    
    // ========== INITIALISATION ==========
    function init() {
        console.log("🚀 Initialisation...");
        
        // Créer la carte
        map = L.map('map').setView([46.8, 8.2], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        
        // Charger les données
        chargerTransports();
        
        // Rafraîchir toutes les 30 secondes
        setInterval(chargerTransports, 30000);
    }
    
    // ========== CHARGER LES TRANSPORTS ==========
    async function chargerTransports() {
        try {
            const { data, error } = await supabase
                .from('orders')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            console.log(`${data.length} transports chargés`);
            afficherListe(data);
            afficherMarqueurs(data);
            
        } catch (error) {
            console.error("Erreur:", error);
        }
    }
    
    // ========== AFFICHER LA LISTE ==========
    function afficherListe(transports) {
        const liste = document.getElementById('liste-transports');
        
        if (!transports || transports.length === 0) {
            liste.innerHTML = '<div style="color: #666; text-align: center;">Aucun transport</div>';
            return;
        }
        
        let html = '';
        transports.forEach(t => {
            html += `
                <div class="transport-item ${t.priority === 'urgent' ? 'urgent' : ''}">
                    <div class="transport-client">${t.client_name || 'Sans client'}</div>
                    <div class="transport-route">📍 ${t.pickup_city || '?'} → ${t.delivery_city || '?'}</div>
                </div>
            `;
        });
        
        liste.innerHTML = html;
    }
    
    // ========== AFFICHER LES MARQUEURS ==========
    function afficherMarqueurs(transports) {
        // Supprimer les anciens marqueurs
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        
        // Coordonnées des villes suisses
        const villes = {
            'lausanne': [46.519, 6.632],
            'genève': [46.204, 6.143],
            'yverdon': [46.778, 6.641],
            'berne': [46.948, 7.447],
            'zurich': [47.376, 8.541],
            'bâle': [47.559, 7.588],
            'neuchâtel': [46.990, 6.929],
            'fribourg': [46.802, 7.151],
            'sion': [46.233, 7.360]
        };
        
        transports.forEach((t, index) => {
            if (!t.delivery_city) return;
            
            // Chercher les coordonnées
            let coords = [46.8, 8.2]; // Centre suisse par défaut
            const villeCle = t.delivery_city.toLowerCase();
            
            for (let [key, value] of Object.entries(villes)) {
                if (villeCle.includes(key)) {
                    coords = value;
                    break;
                }
            }
            
            // Couleur selon priorité
            const color = t.priority === 'urgent' ? '#ef4444' : '#facc15';
            
            // Créer le marqueur
            const marker = L.marker(coords).addTo(map);
            marker.bindPopup(`
                <b>${t.client_name || 'Sans client'}</b><br>
                📍 ${t.pickup_city} → ${t.delivery_city}<br>
                ${t.priority === 'urgent' ? '⚠️ URGENT' : ''}
            `);
            
            markers.push(marker);
        });
    }
    
    // ========== MODAL ==========
    window.ouvrirModal = function() {
        document.getElementById('modal').style.display = 'flex';
    };
    
    window.fermerModal = function() {
        document.getElementById('modal').style.display = 'none';
    };
    
    window.sauvegarder = async function() {
        const client = document.getElementById('client').value;
        const pickup = document.getElementById('pickup').value;
        const delivery = document.getElementById('delivery').value;
        const priority = document.getElementById('priority').value;
        
        if (!client || !pickup || !delivery) {
            alert('Veuillez remplir tous les champs');
            return;
        }
        
        const transport = {
            client_name: client,
            pickup_city: pickup,
            delivery_city: delivery,
            priority: priority,
            status: 'pending',
            created_at: new Date()
        };
        
        try {
            const { error } = await supabase.from('orders').insert([transport]);
            if (error) throw error;
            
            alert('✅ Transport créé !');
            fermerModal();
            
            // Vider le formulaire
            document.getElementById('client').value = '';
            document.getElementById('pickup').value = '';
            document.getElementById('delivery').value = '';
            
            // Recharger
            chargerTransports();
            
        } catch (error) {
            console.error('Erreur:', error);
            alert('❌ Erreur lors de la création');
        }
    };
    
    // ========== DÉMARRER ==========
    window.onload = init;
</script>

</body>
</html>
