<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body { background:#111; color:white; height:100vh; overflow:hidden; }
        header { background:#111; padding:15px 25px; display:flex; justify-content:space-between; border-bottom:2px solid #facc15; }
        .container { display:flex; height:calc(100vh - 70px); }
        .sidebar { width:200px; background:#111; padding:20px; border-right:1px solid #2a2a2a; }
        .sidebar button { width:100%; padding:10px; margin-bottom:5px; background:#1f2937; color:white; border:none; border-radius:4px; }
        .map-container { flex:1; }
        #map { height:100%; }
        .right-panel { width:300px; background:#111; border-left:1px solid #2a2a2a; padding:20px; overflow-y:auto; }
        .transport-item { background:#1f2937; padding:10px; margin-bottom:8px; border-radius:4px; border-left:3px solid #facc15; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; }
        .modal-box { background:#1f2937; width:90%; max-width:500px; border-radius:8px; border:1px solid #facc15; }
        .modal-header { background:#111; padding:15px; display:flex; justify-content:space-between; }
        .modal-content { padding:20px; }
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; color:#aaa; margin-bottom:5px; }
        .form-group input { width:100%; padding:8px; background:#111; border:1px solid #2a2a2a; color:white; border-radius:4px; }
        .btn { background:#facc15; color:#111; border:none; padding:10px; border-radius:4px; cursor:pointer; }
        .btn-cancel { background:#2a2a2a; color:white; }
        .stats { display:flex; gap:20px; }
    </style>
</head>
<body>

    <div id="app"></div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            console.log("🚀 Démarrage...");
            
            try {
                // ===== CONFIG =====
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                const supabase = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.key);
                
                // ===== UTILISATEUR =====
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== PAGE =====
                document.getElementById('app').innerHTML = `
                    <header>
                        <div><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                        <div class="stats">
                            <span>📦 <span id="totalCount">0</span></span>
                            <span>⚠️ <span id="urgentCount">0</span></span>
                        </div>
                        <div>
                            <span>${userData.username}</span>
                            <button onclick="logout()">🚪</button>
                            <button class="btn" onclick="openModal()">➕</button>
                        </div>
                    </header>
                    <div class="container">
                        <div class="sidebar">
                            <button class="active">🗺️ Dispatch</button>
                            <button>📦 Transports</button>
                        </div>
                        <div class="map-container"><div id="map"></div></div>
                        <div class="right-panel">
                            <h3>📋 Transports</h3>
                            <div id="transportList">Chargement...</div>
                        </div>
                    </div>
                    
                    <!-- MODAL SIMPLE -->
                    <div id="modal" class="modal">
                        <div class="modal-box">
                            <div class="modal-header">
                                <h3>➕ Nouveau transport</h3>
                                <button onclick="closeModal()">✖</button>
                            </div>
                            <div class="modal-content">
                                <form onsubmit="event.preventDefault(); saveTransport();">
                                    <div class="form-group">
                                        <label>Numéro client</label>
                                        <input type="text" id="clientNumber" value="CL2025-001" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Adresse livraison</label>
                                        <input type="text" id="deliveryAddress" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Poids (kg)</label>
                                        <input type="number" id="weight" value="1">
                                    </div>
                                    <button type="submit" class="btn">Créer</button>
                                    <button type="button" class="btn btn-cancel" onclick="closeModal()">Annuler</button>
                                </form>
                            </div>
                        </div>
                    </div>
                `;
                
                // ===== FONCTIONS =====
                window.logout = function() { localStorage.removeItem('user'); window.location.href = '../login/'; };
                window.openModal = function() { document.getElementById('modal').style.display = 'flex'; };
                window.closeModal = function() { document.getElementById('modal').style.display = 'none'; };
                
                let map = L.map('map').setView([46.8, 8.2], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                
                async function loadTransports() {
                    const { data } = await supabase.from('transport_orders_simple').select('*');
                    document.getElementById('totalCount').textContent = data?.length || 0;
                    
                    let html = '';
                    data?.forEach(t => {
                        html += `<div class="transport-item">
                            <div>${t.client_number} → ${t.delivery_address?.substring(0,20)}</div>
                            <div style="font-size:11px; color:#aaa;">${t.order_number}</div>
                        </div>`;
                    });
                    document.getElementById('transportList').innerHTML = html || 'Aucun transport';
                }
                
                window.saveTransport = async function() {
                    const transport = {
                        order_number: 'TR-' + Date.now(),
                        client_number: document.getElementById('clientNumber').value,
                        delivery_address: document.getElementById('deliveryAddress').value,
                        weight: parseFloat(document.getElementById('weight').value),
                        status: 'pending',
                        created_at: new Date()
                    };
                    
                    await supabase.from('transport_orders_simple').insert([transport]);
                    alert('✅ Créé');
                    closeModal();
                    loadTransports();
                };
                
                loadTransports();
                
            } catch(e) {
                console.error(e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
