<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman Dispatch | Optimisation intelligente</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <!-- Supabase et Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        
        header {
            background: #111; padding: 15px 25px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #facc15; height: 70px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-optimize { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-plan { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar {
            width: 220px; background: #111; padding: 20px;
            border-right: 1px solid #2a2a2a; overflow-y: auto;
        }
        .sidebar button {
            width: 100%; padding: 12px; margin-bottom: 8px;
            background: #1f2937; color: white; border: none;
            border-radius: 6px; cursor: pointer; text-align: left;
        }
        .sidebar button:hover { background: #facc15; color: #111; }
        .sidebar button.active { background: #facc15; color: #111; }
        
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        
        .right-panel {
            width: 450px; background: #111; border-left: 1px solid #2a2a2a;
            padding: 20px; overflow-y: auto;
        }
        .right-panel h3 { 
            color: #facc15; margin-bottom: 20px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .transport-item {
            background: #1f2937; padding: 12px; margin-bottom: 10px;
            border-radius: 6px; border-left: 3px solid #facc15;
            cursor: pointer;
        }
        .transport-item:hover {
            background: #2d3a4f;
        }
        .transport-item.urgent { border-left-color: #ef4444; }
        .transport-client { font-weight: bold; color: white; }
        .transport-address { font-size: 12px; color: #aaa; margin: 4px 0; }
        
        .tour-item {
            background: #2a2a2a; padding: 15px; margin-bottom: 15px;
            border-radius: 8px; border-left: 4px solid #3b82f6;
            cursor: pointer;
        }
        .tour-item:hover {
            background: #333f4f;
        }
        .tour-header {
            display: flex; justify-content: space-between;
            color: #3b82f6; font-weight: bold; margin-bottom: 10px;
        }
        .tour-stats {
            display: flex; justify-content: space-between;
            background: #1f2937; padding: 8px; border-radius: 4px;
            margin-bottom: 10px; font-size: 12px;
        }
        .tour-stop {
            padding: 8px 0 8px 15px;
            border-bottom: 1px solid #3a3a3a;
            font-size: 13px;
        }
        .stop-client {
            font-weight: bold;
            color: #facc15;
        }
        .stop-address {
            font-size: 11px;
            color: #aaa;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: #1f2937;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            cursor: pointer;
        }
        .tab.active {
            background: #facc15;
            color: #111;
            border-color: #facc15;
        }
        
        .tour-detail {
            background: #1f2937;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .tour-detail h4 {
            color: #facc15;
            margin-bottom: 10px;
        }
        
        .loader {
            text-align: center; padding: 30px; color: #aaa;
        }
        .loader i { font-size: 30px; color: #facc15; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="app">Chargement...</div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Optimisation...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let map, markers;
                let modeOptimisation = false;
                let tournees = [];
                let tourneeSelectionnee = null;
                
                const depot = {
                    nom: "Dépôt Yverdon",
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                const vehicules = [
                    { id: 1, nom: "Camion A", capacite: 800 },
                    { id: 2, nom: "Camion B", capacite: 500 },
                    { id: 3, nom: "Camion C", capacite: 300 }
                ];
                
                // ===== GÉOCODAGE =====
                async function geocoderAdresse(adresse) {
                    try {
                        const response = await fetch(
                            `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(adresse + ', Suisse')}&limit=1`,
                            { headers: { 'User-Agent': 'LemanDispatch/1.0' } }
                        );
                        const data = await response.json();
                        return data.length > 0 ? { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) } : null;
                    } catch(e) {
                        return null;
                    }
                }
                
                // ===== CHARGEMENT =====
                async function loadTransports() {
                    const { data } = await supabase
                        .from('transport_orders_simple')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    allTransports = data || [];
                    modeOptimisation = false;
                    tournees = [];
                    afficherTransports();
                }
                
                // ===== AFFICHAGE NORMAL =====
                function afficherTransports() {
                    const nonLivres = allTransports.filter(t => t.status !== 'delivered');
                    const urgents = nonLivres.filter(t => t.speed === '6h').length;
                    
                    document.getElementById('app').innerHTML = `
                        <header>
                         <button class="btn" onclick="window.location.href='tours.html'">
                           <i class="fas fa-route"></i> Tournées
                           </button>
                            <div class="logo"><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>📦 Total</span><span class="stat-value">${allTransports.length}</span></div>
                                <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value">${urgents}</span></div>
                                <div class="stat-item"><span>🚚 À livrer</span><span class="stat-value">${nonLivres.length}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                                <button class="btn" onclick="window.location.href='new-transport.html'">➕ Nouveau</button>
                                <button class="btn-optimize" onclick="optimiser()">🧠 Optimiser</button>
                            </div>
     
                        </header>
                        
                        <div class="container">
                            <div class="sidebar">
                                <button class="active" onclick="loadTransports()">🗺️ Dispatch</button>
                                <button>📦 Transports</button>
                            </div>
                            
                            <div class="map-container"><div id="map"></div></div>
                            
                            <div class="right-panel">
                                <h3>📋 Transports à livrer (${nonLivres.length})</h3>
                                <div id="transportList">
                                    ${nonLivres.map(t => `
                                        <div class="transport-item ${t.speed === '6h' ? 'urgent' : ''}">
                                            <div class="transport-client">${t.destinataire_nom || 'Client'}</div>
                                            <div class="transport-address">${(t.delivery_address || '').substring(0,50)}</div>
                                            <div style="font-size:11px; color:#666;">${t.speed} | ${t.weight || 0} kg</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    initMap(nonLivres);
                }
                
                // ===== INIT CARTE =====
                function initMap(transports) {
                    if (map) map.remove();
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    const markers = L.markerClusterGroup();
                    
                    L.marker([depot.lat, depot.lng]).addTo(markers).bindPopup("Dépôt Yverdon");
                    
                    if (transports) {
                        transports.forEach((t, i) => {
                            if (t.lat && t.lng) {
                                const color = t.speed === '6h' ? '#ef4444' : '#facc15';
                                const icon = L.divIcon({
                                    html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${i+1}</div>`,
                                    iconSize: [24, 24]
                                });
                                L.marker([t.lat, t.lng], { icon }).addTo(markers).bindPopup(`
                                    <b>${t.destinataire_nom || 'Client'}</b><br>
                                    ${t.delivery_address}<br>
                                    ${t.speed} | ${t.weight} kg
                                `);
                            }
                        });
                    }
                    
                    map.addLayer(markers);
                }
                
                // ===== OPTIMISATION =====
                window.optimiser = async function() {
                    const nonLivres = allTransports.filter(t => t.status !== 'delivered');
                    if (nonLivres.length === 0) {
                        alert("Aucun transport à optimiser");
                        return;
                    }
                    
                    modeOptimisation = true;
                    
                    document.getElementById('app').innerHTML = `
                        <div class="loader">
                            <i class="fas fa-spinner fa-spin"></i> Calcul des tournées...<br>
                            <small>${nonLivres.length} transports à organiser</small>
                        </div>
                    `;
                    
                    // Créer les points
                    const points = [];
                    for (const t of nonLivres) {
                        if (t.lat && t.lng) {
                            points.push({ ...t, lat: t.lat, lng: t.lng });
                        }
                    }
                    
                    // Créer les tournées (version simplifiée)
                    tournees = [];
                    let pointsRestants = [...points];
                    
                    for (let v = 0; v < vehicules.length && pointsRestants.length > 0; v++) {
                        const tournee = {
                            id: v + 1,
                            vehicule: vehicules[v].nom,
                            capacite: vehicules[v].capacite,
                            stops: [],
                            poidsTotal: 0,
                            points: [[depot.lat, depot.lng]]
                        };
                        
                        // Prendre les points proches
                        for (let i = pointsRestants.length - 1; i >= 0; i--) {
                            const point = pointsRestants[i];
                            if (tournee.poidsTotal + (point.weight || 1) <= vehicules[v].capacite) {
                                tournee.stops.push(point);
                                tournee.points.push([point.lat, point.lng]);
                                tournee.poidsTotal += point.weight || 1;
                                pointsRestants.splice(i, 1);
                            }
                        }
                        
                        if (tournee.stops.length > 0) {
                            tournee.points.push([depot.lat, depot.lng]);
                            tournees.push(tournee);
                        }
                    }
                    
                    afficherTournees();
                };
                
                // ===== AFFICHAGE TOURNÉES =====
                function afficherTournees() {
                    const nonLivres = allTransports.filter(t => t.status !== 'delivered');
                    
                    document.getElementById('app').innerHTML = `
                        <header>
                            <div class="logo"><i class="fas fa-route"></i> Tournées</div>
                            <div class="stats-header">
                                <div class="stat-item"><span>🚚 Tournées</span><span class="stat-value">${tournees.length}</span></div>
                                <div class="stat-item"><span>📦 Planifiés</span><span class="stat-value">${tournees.reduce((acc, t) => acc + t.stops.length, 0)}</span></div>
                                <div class="stat-item"><span>📋 Restants</span><span class="stat-value">${nonLivres.length - tournees.reduce((acc, t) => acc + t.stops.length, 0)}</span></div>
                            </div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                                <button class="btn" onclick="loadTransports()">← Retour</button>
                                <button class="btn-plan" onclick="planifierTout()">✅ Tout planifier</button>
                            </div>
                        </header>
                        
                        <div class="container">
                            <div class="sidebar">
                                <button onclick="loadTransports()">🗺️ Dispatch</button>
                                <button class="active">🧠 Tournées</button>
                            </div>
                            
                            <div class="map-container"><div id="map"></div></div>
                            
                            <div class="right-panel">
                                <h3>
                                    📋 Tournées proposées
                                    <button class="btn-plan" style="padding:5px 10px;" onclick="toutDevelopper()">Tout voir</button>
                                </h3>
                                <div id="tourneesList">
                                    ${tournees.map((t, idx) => `
                                        <div class="tour-item" onclick="selectionnerTournee(${idx})">
                                            <div class="tour-header">
                                                <span>🚚 ${t.vehicule}</span>
                                                <span>${t.stops.length} arrêts | ${t.poidsTotal.toFixed(0)}/${t.capacite} kg</span>
                                            </div>
                                            <div class="tour-stats">
                                                <span>📏 ${(t.stops.length * 30).toFixed(0)} km</span>
                                                <span>⏱️ ${(t.stops.length * 45).toFixed(0)} min</span>
                                            </div>
                                            ${t.stops.slice(0, 2).map((s, i) => `
                                                <div class="tour-stop">
                                                    <div class="stop-client">${i+1}. ${s.destinataire_nom || 'Client'}</div>
                                                    <div class="stop-address">${s.delivery_address?.substring(0,30)}</div>
                                                </div>
                                            `).join('')}
                                            ${t.stops.length > 2 ? `<div style="color:#666; font-size:11px; padding-left:15px;">+ ${t.stops.length-2} autres...</div>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                                
                                <div id="tourneeDetail" style="display:none;" class="tour-detail"></div>
                            </div>
                        </div>
                    `;
                    
                    dessinerTournees();
                }
                
                // ===== DESSINER LES TOURNÉES =====
                function dessinerTournees() {
                    if (map) map.remove();
                    map = L.map('map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    const couleurs = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
                    
                    // Dépôt
                    L.marker([depot.lat, depot.lng]).addTo(map).bindPopup("Dépôt Yverdon");
                    
                    tournees.forEach((t, index) => {
                        t.stops.forEach((s, i) => {
                            if (s.lat && s.lng) {
                                const color = s.speed === '6h' ? '#ef4444' : couleurs[index % couleurs.length];
                                const icon = L.divIcon({
                                    html: `<div style="background:${color}; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white; font-size:10px;">${i+1}</div>`,
                                    iconSize: [20, 20]
                                });
                                L.marker([s.lat, s.lng], { icon }).addTo(map).bindPopup(`
                                    <b>${s.destinataire_nom || 'Client'}</b><br>
                                    ${s.delivery_address}
                                `);
                            }
                        });
                        
                        // Dessiner la route
                        const points = [[depot.lat, depot.lng], ...t.stops.map(s => [s.lat, s.lng]), [depot.lat, depot.lng]];
                        L.polyline(points, {
                            color: couleurs[index % couleurs.length],
                            weight: 3,
                            opacity: 0.7
                        }).addTo(map);
                    });
                }
                
                // ===== SÉLECTIONNER UNE TOURNÉE =====
                window.selectionnerTournee = function(index) {
                    const t = tournees[index];
                    const detailDiv = document.getElementById('tourneeDetail');
                    
                    detailDiv.innerHTML = `
                        <h4>🚚 ${t.vehicule}</h4>
                        <div style="margin:10px 0;">
                            <div style="display:flex; justify-content:space-between;">
                                <span>📏 Distance: ${(t.stops.length * 30).toFixed(0)} km</span>
                                <span>⚖️ Poids: ${t.poidsTotal.toFixed(0)}/${t.capacite} kg</span>
                            </div>
                        </div>
                        <div style="max-height:200px; overflow-y:auto;">
                            ${t.stops.map((s, i) => `
                                <div style="padding:8px; border-bottom:1px solid #3a3a3a;">
                                    <div><strong>${i+1}. ${s.destinataire_nom || 'Client'}</strong></div>
                                    <div style="font-size:11px; color:#aaa;">${s.delivery_address}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <button class="btn-plan" style="flex:1;" onclick="assignerTournee(${index})">✅ Assigner</button>
                            <button class="btn-optimize" style="flex:1;" onclick="modifierTournee(${index})">✏️ Modifier</button>
                        </div>
                    `;
                    
                    detailDiv.style.display = 'block';
                    
                    // Centrer sur la tournée
                    if (t.stops.length > 0) {
                        const bounds = [[depot.lat, depot.lng], ...t.stops.map(s => [s.lat, s.lng])];
                        map.fitBounds(bounds, { padding: [50, 50] });
                    }
                };
                
                // ===== PLANIFIER TOUT =====
                window.planifierTout = function() {
                    alert("✅ Toutes les tournées ont été planifiées !");
                };
                
                window.toutDevelopper = function() {
                    alert("Développer toutes les tournées");
                };
                
                window.assignerTournee = function(index) {
                    alert(`Tournée ${index+1} assignée au chauffeur`);
                };
                
                window.modifierTournee = function(index) {
                    alert(`Modification de la tournée ${index+1}`);
                };
                
                window.logout = function() {
                    localStorage.removeItem('user');
                    window.location.href = '../login/';
                };
                
                await loadTransports();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
