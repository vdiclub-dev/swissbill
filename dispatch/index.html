<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body { background:#111; color:white; height:100vh; overflow:hidden; }
        header { background:#111; padding:15px 25px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #facc15; }
        .container { display:flex; height:calc(100vh - 70px); }
        .sidebar { width:200px; background:#111; padding:20px; border-right:1px solid #2a2a2a; }
        .sidebar button { width:100%; padding:10px; margin-bottom:5px; background:#1f2937; color:white; border:none; border-radius:4px; cursor:pointer; }
        .map-container { flex:1; }
        #map { height:100%; width:100%; }
        .right-panel { width:300px; background:#111; border-left:1px solid #2a2a2a; padding:20px; overflow-y:auto; }
        .transport-item { background:#1f2937; padding:10px; margin-bottom:8px; border-radius:4px; border-left:3px solid #facc15; }
        .btn { background:#facc15; color:#111; border:none; padding:8px 16px; border-radius:4px; cursor:pointer; }
        .btn-logout { background:#2a2a2a; color:white; }
        .stats { display:flex; gap:20px; }
    </style>
</head>
<body>

    <div id="app">
        <div style="padding:20px;">Chargement...</div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        // ===== ATTENDRE QUE LE DOM SOIT PRÊT =====
        document.addEventListener('DOMContentLoaded', function() {
            try {
                console.log("🚀 Démarrage...");
                
                // Vérification Leaflet
                if (typeof L === 'undefined') {
                    throw new Error("Leaflet non chargé");
                }
                
                // Vérification config
                if (!window.SUPABASE_CONFIG) {
                    throw new Error("config.js manquant");
                }
                
                // Supabase
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                // Utilisateur (simulé pour test)
                const userData = { username: 'admin', role: 'admin' };
                
                // Construction de la page
                document.getElementById('app').innerHTML = `
                    <header>
                        <div><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                        <div class="stats">
                            <span>📦 <span id="totalCount">0</span></span>
                            <span>⚠️ <span id="urgentCount">0</span></span>
                        </div>
                        <div>
                            <span>${userData.username}</span>
                            <button class="btn btn-logout" onclick="logout()">Déconnexion</button>
                            <button class="btn" onclick="openModal()">➕ Nouveau</button>
                        </div>
                    </header>
                    
                    <div class="container">
                        <div class="sidebar">
                            <button>🗺️ Dispatch</button>
                            <button>📦 Transports</button>
                        </div>
                        <div class="map-container">
                            <div id="map"></div>
                        </div>
                        <div class="right-panel">
                            <h3>📋 Transports</h3>
                            <div id="transportList">Chargement...</div>
                        </div>
                    </div>
                    
                    <!-- MODAL SIMPLE -->
                    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
                        <div style="background:#1f2937; width:90%; max-width:400px; padding:20px; border-radius:8px;">
                            <h3 style="margin-bottom:20px;">Nouveau transport</h3>
                            <form onsubmit="event.preventDefault(); saveTransport();">
                                <div style="margin-bottom:15px;">
                                    <label style="display:block; margin-bottom:5px;">Client</label>
                                    <input type="text" id="clientNumber" value="CL2025-001" style="width:100%; padding:8px;">
                                </div>
                                <div style="margin-bottom:15px;">
                                    <label style="display:block; margin-bottom:5px;">Adresse livraison</label>
                                    <input type="text" id="deliveryAddress" value="Test" style="width:100%; padding:8px;">
                                </div>
                                <div style="margin-bottom:15px;">
                                    <label style="display:block; margin-bottom:5px;">Poids (kg)</label>
                                    <input type="number" id="weight" value="1" style="width:100%; padding:8px;">
                                </div>
                                <div style="display:flex; gap:10px;">
                                    <button type="button" onclick="closeModal()" style="flex:1; padding:10px;">Annuler</button>
                                    <button type="submit" style="flex:1; background:#facc15; padding:10px; border:none;">Créer</button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
                
                // ===== FONCTIONS =====
                window.logout = function() { 
                    alert("Déconnexion");
                };
                
                window.openModal = function() { 
                    document.getElementById('modal').style.display = 'flex'; 
                };
                
                window.closeModal = function() { 
                    document.getElementById('modal').style.display = 'none'; 
                };
                
                // Carte
                const map = L.map('map').setView([46.8, 8.2], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                
                // Charger transports
                async function loadTransports() {
                    try {
                        const { data } = await supabase.from('transport_orders_simple').select('*');
                        document.getElementById('totalCount').textContent = data?.length || 0;
                        
                        let html = '';
                        data?.forEach(t => {
                            html += `<div class="transport-item">${t.client_number} → ${t.delivery_address?.substring(0,20)}</div>`;
                        });
                        document.getElementById('transportList').innerHTML = html || 'Aucun transport';
                    } catch(e) {
                        console.error(e);
                    }
                }
                
                window.saveTransport = async function() {
                    const transport = {
                        order_number: 'TR-' + Date.now(),
                        client_number: document.getElementById('clientNumber').value,
                        delivery_address: document.getElementById('deliveryAddress').value,
                        weight: parseFloat(document.getElementById('weight').value),
                        status: 'pending',
                        created_at: new Date()
                    };
                    
                    await supabase.from('transport_orders_simple').insert([transport]);
                    alert('✅ Créé');
                    closeModal();
                    loadTransports();
                };
                
                loadTransports();
                
            } catch(e) {
                console.error("Erreur:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
