<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <style>
        /* ===== DESIGN SOMBRE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        
        body { 
            background: #111; 
            height: 100vh; 
            overflow: hidden; 
            color: white;
        }
        
        /* HEADER */
        header {
            background: #111;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #facc15;
            height: 70px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #facc15;
        }
        
        .btn {
            background: #facc15;
            color: #111;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn:hover {
            background: #eab308;
        }
        
        /* LAYOUT */
        .container {
            display: flex;
            height: calc(100vh - 70px);
        }
        
        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #111;
            padding: 20px;
            border-right: 1px solid #2a2a2a;
        }
        
        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: #1f2937;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
        }
        
        .sidebar button:hover {
            background: #facc15;
            color: #111;
        }
        
        /* CARTE */
        .map-container {
            flex: 1;
            position: relative;
        }
        
        #map {
            height: 100%;
            width: 100%;
        }
        
        /* PANEL DROIT */
        .right-panel {
            width: 320px;
            background: #111;
            border-left: 1px solid #2a2a2a;
            padding: 20px;
            overflow-y: auto;
        }
        
        .right-panel h3 {
            color: #facc15;
            margin-bottom: 20px;
        }
        
        /* LISTE TRANSPORTS */
        .transport-item {
            background: #1f2937;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 3px solid #facc15;
        }
        
        .transport-item.urgent {
            border-left-color: #ef4444;
        }
        
        .transport-client {
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
        }
        
        .transport-route {
            font-size: 13px;
            color: #aaa;
        }
        
        .transport-distance {
            font-size: 12px;
            color: #facc15;
            margin-top: 5px;
        }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-box {
            background: #1f2937;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #facc15;
        }
        
        .modal-header {
            background: #111;
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 { color: #facc15; }
        .modal-header button { 
            background: none; 
            border: none; 
            color: #888; 
            font-size: 24px; 
            cursor: pointer;
        }
        
        .modal-content {
            padding: 20px;
        }
        
        /* FORMULAIRE */
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 13px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #111;
            border: 1px solid #2a2a2a;
            color: white;
            border-radius: 4px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #facc15;
        }
        
        .form-row {
            display: flex;
            gap: 10px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-cancel {
            background: #2a2a2a;
            color: white;
        }
        
        .btn-save {
            background: #facc15;
            color: #111;
        }
        
        /* UTILS */
        .stats-header {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-value {
            background: #2a2a2a;
            padding: 4px 10px;
            border-radius: 20px;
            color: #facc15;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🚚 Léman Dispatch</div>
    
    <div class="stats-header" id="statsHeader">
        <div class="stat-item">
            <span>📦 Total</span>
            <span class="stat-value" id="totalCount">0</span>
        </div>
        <div class="stat-item">
            <span>⚠️ Urgents</span>
            <span class="stat-value" id="urgentCount">0</span>
        </div>
    </div>
    
    <button class="btn" onclick="openModal()">➕ Créer transport</button>
</header>

<div class="container">
    <!-- SIDEBAR GAUCHE -->
    <div class="sidebar">
        <button class="active">🗺️ Dispatch</button>
        <button>📦 Transports</button>
        <button>👤 Clients</button>
        <button>🚚 Chauffeurs</button>
        <button>💰 Factures</button>
    </div>
    
    <!-- CARTE CENTRALE -->
    <div class="map-container">
        <div id="map"></div>
    </div>
    
    <!-- PANEL DROIT - LISTE DES TRANSPORTS -->
    <div class="right-panel">
        <h3>📋 Derniers transports</h3>
        <div id="transportList">
            Chargement...
        </div>
    </div>
</div>

<!-- MODAL DE CRÉATION -->
<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>➕ Nouveau transport</h3>
            <button onclick="closeModal()">✖</button>
        </div>
        <div class="modal-content">
            <form onsubmit="event.preventDefault(); saveTransport();">
                <!-- Client -->
                <div class="form-group">
                    <label>Nom client *</label>
                    <input type="text" id="clientName" required placeholder="Jean Dupont">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Téléphone</label>
                        <input type="tel" id="clientPhone" placeholder="079 123 45 67">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="clientEmail" placeholder="client@email.com">
                    </div>
                </div>
                
                <!-- Ramassage -->
                <h4 style="color:#facc15; margin:15px 0 10px;">📍 Ramassage</h4>
                
                <div class="form-group">
                    <label>Adresse complète *</label>
                    <input type="text" id="pickupAddress" required placeholder="Rue du Simplon 12, 1000 Lausanne">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Ville *</label>
                        <input type="text" id="pickupCity" required placeholder="Lausanne">
                    </div>
                </div>
                
                <!-- Livraison -->
                <h4 style="color:#facc15; margin:15px 0 10px;">🎯 Livraison</h4>
                
                <div class="form-group">
                    <label>Adresse complète *</label>
                    <input type="text" id="deliveryAddress" required placeholder="Rue du Mont-Blanc 8, 1200 Genève">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Ville *</label>
                        <input type="text" id="deliveryCity" required placeholder="Genève">
                    </div>
                </div>
                
                <!-- Colis -->
                <h4 style="color:#facc15; margin:15px 0 10px;">📦 Colis</h4>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Poids (kg)</label>
                        <input type="number" id="weight" value="1" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Priorité</label>
                        <select id="priority">
                            <option value="normal">Normal</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Instructions</label>
                    <textarea id="instructions" rows="2" placeholder="Fragile, code d'accès..."></textarea>
                </div>
                
                <!-- Boutons -->
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn-save">Créer le transport</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>

// Vérifier si l'utilisateur est connecté et est admin
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || !user.loggedIn || user.role !== 'admin') {
        window.location.href = '../login/';
    }    
    // ===== ATTENDRE QUE TOUT SOIT CHARGÉ =====
    document.addEventListener('DOMContentLoaded', function() {
        console.log("🚀 Léman Dispatch - Démarrage...");
        
        // ===== VÉRIFICATION SUPABASE =====
        if (!window.supabase) {
            alert("❌ Erreur: Supabase non configuré");
            return;
        }
        console.log("✅ Supabase connecté");
        
        // ===== VARIABLES GLOBALES =====
        let map;
        let markers;
        let mapInitialized = false;
        
        // ===== INITIALISATION CARTE =====
        function initMap() {
            try {
                map = L.map('map').setView([46.8, 8.2], 8);
                
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap'
                }).addTo(map);
                
                markers = L.markerClusterGroup();
                map.addLayer(markers);
                
                mapInitialized = true;
                console.log("✅ Carte initialisée");
                
                // Charger les transports
                loadTransports();
                
            } catch(error) {
                console.error("❌ Erreur carte:", error);
            }
        }
        
        // ===== GÉOCODAGE SIMPLE =====
        function getCityCoordinates(city) {
            const coords = {
                'lausanne': [46.52, 6.63],
                'geneve': [46.20, 6.14],
                'yverdon': [46.78, 6.64],
                'berne': [46.95, 7.45],
                'zurich': [47.37, 8.54],
                'bale': [47.55, 7.59],
                'neuchatel': [46.99, 6.93],
                'fribourg': [46.80, 7.15]
            };
            
            const cityLower = city?.toLowerCase() || '';
            
            for (let [key, value] of Object.entries(coords)) {
                if (cityLower.includes(key)) {
                    return { lat: value[0], lng: value[1] };
                }
            }
            
            return { lat: 46.8, lng: 8.2 }; // Centre suisse par défaut
        }
        
        // ===== CHARGER LES TRANSPORTS =====
        async function loadTransports() {
            try {
                const { data, error } = await window.supabase
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                console.log(`📦 ${data.length} transports chargés`);
                
                // Mettre à jour les stats
                updateStats(data);
                
                // Mettre à jour la liste
                updateTransportList(data);
                
                // Mettre à jour la carte
                if (mapInitialized && markers) {
                    updateMap(data);
                }
                
            } catch(error) {
                console.error("Erreur chargement:", error);
            }
        }
        
        // ===== METTRE À JOUR LA CARTE =====
        function updateMap(transports) {
            markers.clearLayers();
            
            if (!transports || transports.length === 0) return;
            
            transports.forEach((transport, index) => {
                const coords = getCityCoordinates(transport.delivery_city);
                
                // Couleur selon priorité
                let color = '#facc15'; // normal
                if (transport.priority === 'urgent') color = '#ef4444';
                if (transport.status === 'delivered') color = '#10b981';
                
                const icon = L.divIcon({
                    html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${index+1}</div>`,
                    className: '',
                    iconSize: [24, 24]
                });
                
                const marker = L.marker([coords.lat, coords.lng], { icon });
                
                marker.bindPopup(`
                    <b>${transport.client_name || 'Sans client'}</b><br>
                    📍 ${transport.pickup_city || '?'} → ${transport.delivery_city || '?'}<br>
                    ${transport.distance_km ? `📏 ${transport.distance_km} km` : ''}
                    ${transport.priority === 'urgent' ? '<br>⚠️ URGENT' : ''}
                `);
                
                markers.addLayer(marker);
            });
        }
        
        // ===== METTRE À JOUR LA LISTE =====
        function updateTransportList(transports) {
            const listEl = document.getElementById('transportList');
            
            if (!transports || transports.length === 0) {
                listEl.innerHTML = '<div style="color:#666; text-align:center; padding:20px;">Aucun transport</div>';
                return;
            }
            
            let html = '';
            transports.slice(0, 10).forEach(transport => {
                html += `
                    <div class="transport-item ${transport.priority === 'urgent' ? 'urgent' : ''}">
                        <div class="transport-client">${transport.client_name || 'Sans client'}</div>
                        <div class="transport-route">📍 ${transport.pickup_city || '?'} → ${transport.delivery_city || '?'}</div>
                        ${transport.distance_km ? `<div class="transport-distance">📏 ${transport.distance_km} km</div>` : ''}
                    </div>
                `;
            });
            
            listEl.innerHTML = html;
        }
        
        // ===== METTRE À JOUR LES STATS =====
        function updateStats(transports) {
            const total = transports.length;
            const urgent = transports.filter(t => t.priority === 'urgent').length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('urgentCount').textContent = urgent;
        }
        
        // ===== FONCTIONS MODAL =====
        window.openModal = function() {
            document.getElementById('modal').style.display = 'flex';
        };
        
        window.closeModal = function() {
            document.getElementById('modal').style.display = 'none';
        };
        
        window.saveTransport = async function() {
            // Récupérer les valeurs
            const transport = {
                client_name: document.getElementById('clientName').value,
                client_phone: document.getElementById('clientPhone').value,
                client_email: document.getElementById('clientEmail').value,
                pickup_city: document.getElementById('pickupCity').value,
                delivery_city: document.getElementById('deliveryCity').value,
                weight: parseFloat(document.getElementById('weight').value) || 1,
                priority: document.getElementById('priority').value,
                instructions: document.getElementById('instructions').value,
                status: 'pending',
                created_at: new Date()
            };
            
            // Validation
            if (!transport.client_name || !transport.pickup_city || !transport.delivery_city) {
                alert('Veuillez remplir tous les champs obligatoires');
                return;
            }
            
            // Sauvegarder
            const { error } = await window.supabase.from('orders').insert([transport]);
            
            if (error) {
                alert('❌ Erreur: ' + error.message);
            } else {
                alert('✅ Transport créé avec succès !');
                closeModal();
                
                // Reset form
                document.getElementById('clientName').value = '';
                document.getElementById('clientPhone').value = '';
                document.getElementById('clientEmail').value = '';
                document.getElementById('pickupAddress').value = '';
                document.getElementById('pickupCity').value = '';
                document.getElementById('deliveryAddress').value = '';
                document.getElementById('deliveryCity').value = '';
                document.getElementById('weight').value = '1';
                document.getElementById('instructions').value = '';
                
                // Recharger
                loadTransports();
            }
        };
        
        // ===== RAFRAÎCHISSEMENT AUTO =====
        setInterval(loadTransports, 30000);
        
        // ===== LANCEMENT =====
        initMap();
    });
</script>

</body>
</html>
