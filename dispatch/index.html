    <style>

        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }

        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; font-weight: bold; }
        
        .container {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
        }
        
        /* PANEL GAUCHE - TOURNÉES */

            width: 60%;

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Léman Dispatch - Tournées...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                const userData = JSON.parse(user);
                if (userData.role !== 'admin') { window.location.href = '../'; return; }
                
                // ===== DONNÉES =====
                let allTransports = [];
                let tours = [
                    { id: 1, nom: "Tournée Lausanne", couleur: '#3b82f6', chauffeur: null, transports: [] },
                    { id: 2, nom: "Tournée Genève", couleur: '#10b981', chauffeur: null, transports: [] },
                    { id: 3, nom: "Tournée Berne", couleur: '#f59e0b', chauffeur: null, transports: [] }
                ];
                let chauffeurs = [];
                let currentTourId = null;
                
                const depot = {
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== CHARGEMENT CHAUFFEURS =====
                async function loadChauffeurs() {
                    const { data } = await supabase
                        .from('chauffeurs')
                        .select('*')
                        .eq('actif', true);
                    
                    chauffeurs = data || [];
                }
                
                // ===== CALCUL DE DISTANCE =====
                function calculerDistance(lat1, lng1, lat2, lng2) {
                    if (!lat1 || !lng1 || !lat2 || !lng2) return 30;
                    const R = 6371;
                    const dLat = (lat2 - lat1) * Math.PI / 180;
                    const dLon = (lng2 - lng1) * Math.PI / 180;
                    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                             Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                             Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                }
                
                // ===== CALCUL STATS =====
                function calculerStatsTournee(transports) {
                    if (!transports || transports.length === 0) {
                        return { distance: 0, duree: 0, poids: 0 };
                    }
                    
                    let distance = 0;
                    let duree = 0;
                    let poids = 0;
                    let precedent = depot;
                    
                    transports.forEach(t => {
                        const trajet = (t.lat && t.lng) 
                            ? calculerDistance(precedent.lat, precedent.lng, t.lat, t.lng)
                            : 30;
                        
                        distance += trajet;
                        duree += (trajet / 50) * 60 + 15;
                        poids += t.weight || 1;
                        
                        if (t.lat && t.lng) precedent = t;
                    });
                    
                    distance += 30;
                    duree += 36;
                    
                    return { 
                        distance: Math.round(distance), 
                        duree: Math.round(duree),
                        poids: Math.round(poids)
                    };
                }
                
                // ===== GÉNÉRER PDF =====
                window.genererPDF = function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (!tour || tour.transports.length === 0) return;
                    
                    const stats = calculerStatsTournee(tour.transports);
                    
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(24);
                    doc.setTextColor(0, 0, 0);
                    doc.text(`🚚 ${tour.nom}`, 20, 20);
                    
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(14);
                    doc.text(`Date: ${new Date().toLocaleDateString('fr-CH')}`, 20, 35);
                    
                    doc.setFont("helvetica", "bold");
                    doc.setFontSize(12);
                    doc.text(`Récapitulatif:`, 20, 50);
                    
                    doc.setFont("helvetica", "normal");
                    doc.text(`Distance totale: ${stats.distance} km`, 25, 60);
                    doc.text(`Durée totale: ${Math.floor(stats.duree/60)}h${stats.duree%60}`, 25, 70);
                    doc.text(`Poids total: ${stats.poids} kg`, 25, 80);
                    
                    doc.setFont("helvetica", "bold");
                    doc.text(`Détail des livraisons:`, 20, 100);
                    
                    let y = 110;
                    tour.transports.forEach((t, i) => {
                        doc.setFont("helvetica", "bold");
                        doc.text(`${i+1}. ${t.destinataire_nom || 'Client'}`, 20, y);
                        
                        doc.setFont("helvetica", "normal");
                        doc.text(`   📦 ${t.client_number || 'Inconnu'}`, 20, y+5);
                        doc.text(`   📍 ${t.delivery_address || ''}`, 20, y+10);
                        y += 20;
                    });
                    
                    doc.save(`tournee-${tour.nom.replace(/\s+/g, '_')}.pdf`);
                };
                
                // ===== OUVRIR TOURNÉE EN GRAND =====
                window.ouvrirTournee = function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (!tour) return;
                    
                    currentTourId = tourId;
                    // ===== CALCUL STATS TOURNÉE AVEC VRAIES ROUTES =====
async function calculerStatsTourneeReelle(transports) {
    if (!transports || transports.length === 0) {
        return { distance: 0, duree: 0, poids: 0 };
    }
    
    let distance = 0;
    let duree = 0;
    let poids = 0;
    let precedent = depot;
    
    for (const t of transports) {
        if (t.lat && t.lng) {
            // Distance routière réelle
            const trajet = await calculerDistanceRoute(precedent, t);
            distance += trajet;
            
            // Temps estimé (vitesse moyenne 50 km/h + péages/ville)
            duree += (trajet / 45) * 60 + 20; // plus réaliste
            poids += t.weight || 1;
            precedent = t;
        } else {
            // Fallback si pas de coordonnées
            distance += 30;
            duree += 45;
            poids += t.weight || 1;
        }
    }
    
    // Retour au dépôt
    if (transports.length > 0 && transports[transports.length-1].lat) {
        const dernier = transports[transports.length - 1];
        const retour = await calculerDistanceRoute(dernier, depot);
        distance += retour;
        duree += (retour / 45) * 60;
    }
    
    return { 
        distance: Math.round(distance), 
        duree: Math.round(duree),
        poids: Math.round(poids)
    };
}
                    document.getElementById('modalTourContent').innerHTML = `
                        <div class="modal-stats">
                            <div class="modal-stat-item">
                                <div class="modal-stat-value">${stats.distance} km</div>
                                <div class="modal-stat-label">Distance</div>
                            </div>
                            <div class="modal-stat-item">
                                <div class="modal-stat-value">${Math.floor(stats.duree/60)}h${stats.duree%60}</div>
                                <div class="modal-stat-label">Durée</div>
                            </div>
                            <div class="modal-stat-item">
                                <div class="modal-stat-value">${stats.poids} kg</div>
                                <div class="modal-stat-label">Charge</div>
                            </div>
                        </div>
                        
                        <div class="modal-actions">
                            <button class="btn-optimize" onclick="optimiserTournee(${tour.id})">
                                <i class="fas fa-robot"></i> Optimisation IA
                            </button>
                            <button class="btn-success" onclick="trierParProximite(${tour.id})">
                                <i class="fas fa-map-marked-alt"></i> Trier par proximité
                            </button>
                            <button class="btn-pdf" onclick="genererPDF(${tour.id})">
                                <i class="fas fa-file-pdf"></i> PDF
                            </button>
                        </div>
                        
                        <div style="margin-bottom:20px;">
                            <label style="color:#facc15; font-weight:bold;">Chauffeur assigné</label>
                            <select class="modal-chauffeur-select" onchange="assignerChauffeur(${tour.id}, this.value)">
                                <option value="">Aucun chauffeur</option>
                                ${chauffeurs.map(c => `
                                    <option value="${c.id}" ${tour.chauffeur === c.id ? 'selected' : ''}>
                                        ${c.prenom} ${c.nom}
                                    </option>
                                `).join('')}
                            </select>
                        </div>
                        
                        <h3 style="color:#facc15; margin:20px 0 10px;">
                            <i class="fas fa-list"></i> Ordre de livraison (${tour.transports.length})
                        </h3>
                        <div class="modal-transport-list" id="modalTransportList">
                            ${transportsHTML}
                        </div>
                    `;
                    
                    document.getElementById('tourModal').style.display = 'flex';
                };
                
                // ===== DÉPLACER UN TRANSPORT =====
                window.deplacerTransport = function(transportId, direction) {
                    const tour = tours.find(t => t.id === currentTourId);
                    if (!tour) return;
                    
                    const index = tour.transports.findIndex(t => t.id === transportId);
                    if (index === -1) return;
                    
                    const newIndex = index + direction;
                    if (newIndex < 0 || newIndex >= tour.transports.length) return;
                    
                    // Échanger les positions
                    [tour.transports[index], tour.transports[newIndex]] = 
                    [tour.transports[newIndex], tour.transports[index]];
                    
                    // Rafraîchir la modale
                    ouvrirTournee(currentTourId);
                };
                
                // ===== RETIRER UN TRANSPORT DE LA TOURNÉE =====
                window.retirerTransport = function(transportId) {
                    const tour = tours.find(t => t.id === currentTourId);
                    if (!tour) return;
                    
                    tour.transports = tour.transports.filter(t => t.id !== transportId);
                    
                    // Rafraîchir la modale et la page principale
                    ouvrirTournee(currentTourId);
                    afficherPage();
                };
                
                // ===== TRIER PAR PROXIMITÉ =====
                window.trierParProximite = function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (!tour || tour.transports.length === 0) return;
                    
                    // Trier par distance depuis le dépôt
                    tour.transports.sort((a, b) => {
                        const distA = (a.lat && a.lng) 
                            ? calculerDistance(depot.lat, depot.lng, a.lat, a.lng)
                            : 999;
                        const distB = (b.lat && b.lng)
                            ? calculerDistance(depot.lat, depot.lng, b.lat, b.lng)
                            : 999;
                        return distA - distB;
                    });
                    
                    ouvrirTournee(tourId);
                    afficherPage();
                };
                
                // ===== OPTIMISATION IA =====
                window.optimiserTournee = function(tourId) {
                    const tour = tours.find(t => t.id === tourId);
                    if (!tour || tour.transports.length === 0) return;
                    
                    // 1. Séparer les urgents
                    const urgents = tour.transports.filter(t => t.speed === '6h');
                    const normaux = tour.transports.filter(t => t.speed !== '6h');
                    
                    // 2. Trier les urgents par proximité
                    urgents.sort((a, b) => {
                        const distA = (a.lat && a.lng) 
                            ? calculerDistance(depot.lat, depot.lng, a.lat, a.lng)
                            : 999;
                        const distB = (b.lat && b.lng)
                            ? calculerDistance(depot.lat, depot.lng, b.lat, b.lng)
                            : 999;
                        return distA - distB;
                    });
                    
                    // 3. Ajouter les normaux sur le chemin
                    const optimise = [...urgents];
                    const restants = [...normaux];
                    
                    let dernierPoint = urgents.length > 0 ? urgents[urgents.length-1] : null;
                    
                    while (restants.length > 0) {
                        if (!dernierPoint) {
                            // Si pas d'urgent, prendre le plus proche du dépôt
                            restants.sort((a, b) => {
                                const distA = (a.lat && a.lng) 
                                    ? calculerDistance(depot.lat, depot.lng, a.lat, a.lng)
                                    : 999;
                                const distB = (b.lat && b.lng)
                                    ? calculerDistance(depot.lat, depot.lng, b.lat, b.lng)
                                    : 999;
                                return distA - distB;
                            });
                            optimise.push(...restants);
                            break;
                        }
                        
                        // Trouver le plus proche du dernier point
                        let bestIndex = 0;
                        let bestDistance = Infinity;
                        
                        restants.forEach((t, i) => {
                            if (t.lat && t.lng && dernierPoint.lat && dernierPoint.lng) {
                                const dist = calculerDistance(
                                    dernierPoint.lat, dernierPoint.lng,
                                    t.lat, t.lng
                                );
                                if (dist < bestDistance) {
                                    bestDistance = dist;
                                    bestIndex = i;
                                }
                            }
                        });
                        
                        optimise.push(restants[bestIndex]);
                        dernierPoint = restants[bestIndex];
                        restants.splice(bestIndex, 1);

// ===== OPTIMISATION IA AVEC DISTANCES RÉELLES =====
window.optimiserTournee = async function(tourId) {
    const tour = tours.find(t => t.id === tourId);
    if (!tour || tour.transports.length === 0) return;
    
    showMessage("🔄 Optimisation en cours...", "#3b82f6");
    
    // 1. Calculer les distances entre tous les points
    const points = [depot, ...tour.transports.filter(t => t.lat && t.lng)];
    
    // Créer une matrice des distances
    const matrice = [];
    for (let i = 0; i < points.length; i++) {
        matrice[i] = [];
        for (let j = 0; j < points.length; j++) {
            if (i === j) {
                matrice[i][j] = 0;
            } else {
                const dist = await calculerDistanceRoute(points[i], points[j]);
                matrice[i][j] = dist;
            }
        }
    }
    
    // 2. Séparer urgents et normaux
    const urgents = tour.transports.filter(t => t.speed === '6h');
    const normaux = tour.transports.filter(t => t.speed !== '6h');
    
    // 3. Construire l'itinéraire optimal (algorithme du plus proche voisin)
    let itineraire = [];
    let visites = new Set();
    let positionActuelle = 0; // index 0 = dépôt
    
    // D'abord traiter les urgents
    if (urgents.length > 0) {
        // Trouver l'urgent le plus proche du dépôt
        let plusProcheUrgent = -1;
        let distMinUrgent = Infinity;
        
        for (let i = 0; i < urgents.length; i++) {
            const idx = points.findIndex(p => p.id === urgents[i].id);
            if (matrice[0][idx] < distMinUrgent) {
                distMinUrgent = matrice[0][idx];
                plusProcheUrgent = idx;
            }
        }
        
        if (plusProcheUrgent !== -1) {
            itineraire.push(points[plusProcheUrgent]);
            visites.add(plusProcheUrgent);
            positionActuelle = plusProcheUrgent;
        }
        
        // Ajouter les autres urgents
        while (visites.size < urgents.length + 1) { // +1 pour le dépôt déjà visité
            let prochain = -1;
            let distMin = Infinity;
            
            for (let i = 1; i < points.length; i++) {
                if (!visites.has(i)) {
                    if (matrice[positionActuelle][i] < distMin) {
                        distMin = matrice[positionActuelle][i];
                        prochain = i;
                    }
                }
            }
            
            if (prochain !== -1) {
                itineraire.push(points[prochain]);
                visites.add(prochain);
                positionActuelle = prochain;
            } else {
                break;
            }
        }
    }
    
    // Ajouter les normaux
    for (const normal of normaux) {
        const idx = points.findIndex(p => p.id === normal.id);
        if (!visites.has(idx)) {
            // Trouver la meilleure position pour insérer ce point
            let meilleurePosition = itineraire.length;
            let gainMinimal = Infinity;
            
            for (let pos = 0; pos <= itineraire.length; pos++) {
                let avant = pos === 0 ? depot : itineraire[pos-1];
                let apres = pos === itineraire.length ? depot : itineraire[pos];
                
                const avantIdx = points.findIndex(p => p.id === avant.id);
                const apresIdx = points.findIndex(p => p.id === apres.id);
                
                const distActuelle = matrice[avantIdx][apresIdx];
                const distNouvelle = matrice[avantIdx][idx] + matrice[idx][apresIdx];
                const gain = distNouvelle - distActuelle;
                
                if (gain < gainMinimal) {
                    gainMinimal = gain;
                    meilleurePosition = pos;
                }
            }
            
            itineraire.splice(meilleurePosition, 0, normal);
        }
    }
    
    tour.transports = itineraire;
    
    // Recalculer les stats avec les vraies distances
    const nouvellesStats = await calculerStatsTourneeReelle(itineraire);
    
    showMessage(`✅ Tournée optimisée : ${nouvellesStats.distance} km`, "#10b981");
    ouvrirTournee(tourId);
    afficherPage();
};
