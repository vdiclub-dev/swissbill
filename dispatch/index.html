<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch | Admin</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #111; height: 100vh; overflow: hidden; color: white; }
        header { background: #111; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #facc15; height: 70px; }
        .logo { font-size: 24px; font-weight: bold; color: #facc15; display: flex; align-items: center; gap: 10px; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1f2937; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #2a2a2a; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn { background: #facc15; color: #111; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .container { display: flex; height: calc(100vh - 70px); }
        .sidebar { width: 220px; background: #111; padding: 20px; border-right: 1px solid #2a2a2a; }
        .sidebar button { width: 100%; padding: 12px; margin-bottom: 8px; background: #1f2937; color: white; border: none; border-radius: 6px; cursor: pointer; text-align: left; }
        .sidebar button:hover { background: #facc15; color: #111; }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }
        .right-panel { width: 320px; background: #111; border-left: 1px solid #2a2a2a; padding: 20px; overflow-y: auto; }
        .right-panel h3 { color: #facc15; margin-bottom: 20px; }
        .transport-item { background: #1f2937; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 3px solid #facc15; }
        .transport-item.urgent { border-left-color: #ef4444; }
        .transport-client { font-weight: bold; color: white; }
        .transport-route { font-size: 13px; color: #aaa; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #1f2937; border-radius: 10px; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; border: 1px solid #facc15; }
        .modal-header { background: #111; padding: 15px 20px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; }
        .modal-header h3 { color: #facc15; }
        .modal-header button { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .modal-content { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #aaa; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: #111; border: 1px solid #2a2a2a; color: white; border-radius: 4px; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #2a2a2a; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; }
        .btn-save { background: #facc15; color: #111; border: none; padding: 12px; border-radius: 4px; cursor: pointer; flex: 1; }
        .stats-header { display: flex; gap: 20px; }
        .stat-item { display: flex; align-items: center; gap: 8px; }
        .stat-value { background: #2a2a2a; padding: 4px 10px; border-radius: 20px; color: #facc15; }
        .loader { text-align: center; padding: 20px; color: #aaa; }
    </style>
</head>
<body>

    <div id="app"></div>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            console.log("🚀 Démarrage...");
            
            try {
                // ===== VÉRIFICATIONS =====
                if (typeof L === 'undefined') { 
                    throw new Error("Leaflet non chargé"); 
                }
                
                if (!window.SUPABASE_CONFIG) { 
                    throw new Error("config.js non chargé"); 
                }
                
                // ===== SUPABASE =====
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                // Test rapide
                const { error: testError } = await supabase.from('transport_orders_simple').select('count').limit(1);
                if (testError) {
                    throw new Error(`Supabase: ${testError.message}`);
                }
                
                // ===== UTILISATEUR =====
                const user = localStorage.getItem('user');
                if (!user) { window.location.href = '../login/'; return; }
                
                const userData = JSON.parse(user);
                if (!userData.loggedIn || userData.role !== 'admin') { 
                    window.location.href = '../'; 
                    return; 
                }
                
                // ===== CONSTRUCTION PAGE =====
                document.getElementById('app').innerHTML = `
                    <header>
                        <div class="logo"><i class="fas fa-map-marked-alt"></i> Léman Dispatch</div>
                        <div class="stats-header">
                            <div class="stat-item"><span>📦 Total</span><span class="stat-value" id="totalCount">0</span></div>
                            <div class="stat-item"><span>⚠️ Urgents</span><span class="stat-value" id="urgentCount">0</span></div>
                        </div>
                        <div class="user-section">
                            <div class="user-badge"><i class="fas fa-user-cog"></i><span>${userData.username}</span></div>
                            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                            <button class="btn" onclick="openModal()">➕ Créer transport</button>
                        </div>
                    </header>

                    <div class="container">
                        <div class="sidebar">
                            <button class="active">🗺️ Dispatch</button>
                            <button>📦 Transports</button>
                            <button>👤 Clients</button>
                            <button>🚚 Chauffeurs</button>
                            <button>💰 Factures</button>
                        </div>
                        
                        <div class="map-container"><div id="map"></div></div>
                        
                        <div class="right-panel">
                            <h3>📋 Derniers transports</h3>
                            <div id="transportList"><div class="loader"><i class="fas fa-spinner fa-spin"></i> Chargement...</div></div>
                        </div>
                    </div>

                  <!-- MODAL COMPLÈTE AVEC GESTION DES COLIS -->
<div id="modal" class="modal">
    <div class="modal-box" style="max-width: 800px;">
        <div class="modal-header">
            <h3>➕ Nouveau transport</h3>
            <button onclick="closeModal()">✖</button>
        </div>
        <div class="modal-content" style="max-height: 70vh; overflow-y: auto;">
            
            <!-- PROGRESS BAR (optionnel) -->
            <div style="display: flex; gap: 5px; margin-bottom: 20px; padding: 0 10px;">
                <div style="flex:1; height: 4px; background: #facc15; border-radius: 2px;"></div>
                <div style="flex:1; height: 4px; background: #2a2a2a; border-radius: 2px;"></div>
                <div style="flex:1; height: 4px; background: #2a2a2a; border-radius: 2px;"></div>
            </div>
            
            <form onsubmit="event.preventDefault(); saveTransport();">
                
                <!-- SECTION CLIENT (CARRÉ) -->
                <div style="background: linear-gradient(145deg, #1a1a1a, #111); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2a2a2a;">
                    <h4 style="color: #facc15; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-user-circle"></i> Client
                    </h4>
                    
                    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 15px;">
                        <div>
                            <label style="color: #aaa; font-size: 12px;">Numéro client</label>
                            <input type="text" id="clientNumber" placeholder="CL2025-001" value="CL2025-001" style="background: #111; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%;">
                        </div>
                        <div>
                            <label style="color: #aaa; font-size: 12px;">Nom / Société (optionnel)</label>
                            <input type="text" id="clientName" placeholder="Dupont Jean" style="background: #111; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%;">
                        </div>
                    </div>
                </div>
                
                <!-- SECTION ADRESSES (CARRÉ) -->
                <div style="background: linear-gradient(145deg, #1a1a1a, #111); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2a2a2a;">
                    <h4 style="color: #facc15; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-map-marked-alt"></i> Adresses
                    </h4>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div>
                            <label style="color: #aaa; font-size: 12px;">📍 Ramassage</label>
                            <input type="text" id="pickupAddress" value="Impasse des Griottes 3, 1462 Yvonand" style="background: #111; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%;">
                        </div>
                        <div>
                            <label style="color: #aaa; font-size: 12px;">🎯 Livraison *</label>
                            <input type="text" id="deliveryAddress" placeholder="Rue du Lac 12, 1000 Lausanne" required style="background: #111; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%;">
                        </div>
                    </div>
                </div>
                
                <!-- SECTION COLIS PRINCIPAL (CARRÉ) -->
                <div style="background: linear-gradient(145deg, #1a1a1a, #111); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2a2a2a;">
                    <h4 style="color: #facc15; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-box"></i> Colis principal
                    </h4>
                    
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                        <div>
                            <label style="color: #aaa; font-size: 12px;">Poids (kg)</label>
                            <input type="number" id="weight" value="1" step="0.1" style="background: #111; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%;">
                        </div>
                        <div>
                            <label style="color: #aaa; font-size: 12px;">Quantité</label>
                            <input type="number" id="quantity" value="1" min="1" style="background: #111; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%;">
                        </div>
                        <div style="grid-column: span 2;">
                            <label style="color: #aaa; font-size: 12px;">Type</label>
                            <select id="packageType" style="background: #111; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%;">
                                <option value="Colis">📦 Colis standard</option>
                                <option value="Fragile">⚠️ Fragile</option>
                                <option value="Palette">📦 Palette</option>
                                <option value="Document">📄 Document</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- SECTION COLIS SUPPLÉMENTAIRES -->
                <div style="background: linear-gradient(145deg, #1a1a1a, #111); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2a2a2a;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h4 style="color: #facc15; display: flex; align-items: center; gap: 8px;">
                            <i class="fas fa-cubes"></i> Colis supplémentaires
                        </h4>
                        <button type="button" onclick="ajouterColis()" style="background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <i class="fas fa-plus"></i> Ajouter
                        </button>
                    </div>
                    
                    <div id="colisList" style="margin-bottom: 10px;"></div>
                    
                    <div id="recapColis" style="background: #0f172a; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between;">
                        <span style="color: #aaa;">Total colis:</span>
                        <span style="color: #facc15; font-weight: bold;" id="totalColis">0</span>
                    </div>
                </div>
                
                <!-- SECTION SERVICE (CARRÉ) -->
                <div style="background: linear-gradient(145deg, #1a1a1a, #111); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2a2a2a;">
                    <h4 style="color: #facc15; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-clock"></i> Service
                    </h4>
                    
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
                        <div>
                            <label style="color: #aaa; font-size: 12px;">Type</label>
                            <select id="serviceType" style="background: #111; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%;">
                                <option value="standard">Standard</option>
                                <option value="express">Express</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>
                        <div>
                            <label style="color: #aaa; font-size: 12px;">Vitesse</label>
                            <select id="speed" style="background: #111; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%;">
                                <option value="24h">24h (Standard)</option>
                                <option value="12h">12h (Express)</option>
                                <option value="6h">6h (Urgent)</option>
                            </select>
                        </div>
                        <div>
                            <label style="color: #aaa; font-size: 12px;">Nuit</label>
                            <select id="nightDelivery" style="background: #111; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%;">
                                <option value="false">Non</option>
                                <option value="true">Oui (+CHF 20)</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- SECTION INSTRUCTIONS -->
                <div style="background: linear-gradient(145deg, #1a1a1a, #111); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2a2a2a;">
                    <div class="form-group">
                        <label style="color: #aaa; font-size: 12px;">📝 Instructions spéciales</label>
                        <textarea id="instructions" rows="2" placeholder="Fragile, code d'accès, étage..." style="background: #111; border: 1px solid #2a2a2a; color: white; padding: 12px; border-radius: 8px; width: 100%;"></textarea>
                    </div>
                </div>
                
                <!-- BOUTONS -->
                <div class="modal-buttons" style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn-cancel" onclick="closeModal()" style="flex: 1; background: #2a2a2a; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">Annuler</button>
                    <button type="submit" class="btn-save" style="flex: 2; background: #facc15; color: #111; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">✅ Créer le transport</button>
                </div>
            </form>
        </div>
    </div>
</div>
                `;
                
                // ===== VARIABLES =====
                let map, markers;
                
                // ===== FONCTIONS =====
                window.logout = function() { 
                    localStorage.removeItem('user'); 
                    window.location.href = '../login/'; 
                };
                
                window.openModal = function() { 
                    document.getElementById('modal').style.display = 'flex'; 
                };
                
                window.closeModal = function() { 
                    document.getElementById('modal').style.display = 'none'; 
                };
                
                // Carte
                function initMap() {
                    try {
                        map = L.map('map').setView([46.8, 8.2], 8);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        markers = L.markerClusterGroup();
                        map.addLayer(markers);
                        loadTransports();
                    } catch(e) {
                        console.error("Erreur carte:", e);
                    }
                }
                
                // Charger les transports
                async function loadTransports() {
                    try {
                        const { data, error } = await supabase
                            .from('transport_orders_simple')
                            .select('*')
                            .order('created_at', { ascending: false });
                        
                        if (error) throw error;
                        
                        // Stats
                        document.getElementById('totalCount').textContent = data?.length || 0;
                        const urgentCount = data?.filter(t => t.priority === 'urgent' || t.speed === '6h').length || 0;
                        document.getElementById('urgentCount').textContent = urgentCount;
                        
                        // Liste
                        let html = '';
                        data?.slice(0, 5).forEach(t => {
                            const isUrgent = t.priority === 'urgent' || t.speed === '6h';
                            html += `<div class="transport-item ${isUrgent ? 'urgent' : ''}">
                                <div class="transport-client">Client #${t.client_number || '?'}</div>
                                <div class="transport-route">${(t.pickup_address || '?').substring(0,20)} → ${(t.delivery_address || '?').substring(0,20)}</div>
                            </div>`;
                        });
                        document.getElementById('transportList').innerHTML = html || '<div>Aucun transport</div>';
                        
                        // Marqueurs (simplifiés)
                        if (markers) {
                            markers.clearLayers();
                            data?.forEach((t, i) => {
                                let lat = 46.8, lng = 8.2;
                                let color = '#facc15';
                                if (t.priority === 'urgent' || t.speed === '6h') color = '#ef4444';
                                
                                const icon = L.divIcon({
                                    html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; border:2px solid white;">${i+1}</div>`,
                                    iconSize: [24, 24]
                                });
                                
                                L.marker([lat, lng], { icon }).addTo(markers);
                            });
                        }
                    } catch(e) {
                        console.error("Erreur chargement:", e);
                    }
                }
                // ===== GESTION DES COLIS SUPPLÉMENTAIRES =====
let colisList = [];

window.ajouterColis = function() {
    colisList.push({
        description: '',
        poids: 1,
        quantite: 1,
        type: 'Colis'
    });
    afficherColis();
};

window.modifierColis = function(index, champ, valeur) {
    colisList[index][champ] = champ === 'poids' || champ === 'quantite' ? parseFloat(valeur) || 0 : valeur;
    afficherColis();
};

window.supprimerColis = function(index) {
    colisList.splice(index, 1);
    afficherColis();
};

function afficherColis() {
    const container = document.getElementById('colisList');
    if (!container) return;
    
    let html = '';
    let total = 0;
    
    colisList.forEach((colis, index) => {
        const poidsTotal = (colis.poids || 0) * (colis.quantite || 1);
        total += poidsTotal;
        
        html += `
            <div style="background: #1f2937; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #2a2a2a;">
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input type="text" placeholder="Description" value="${colis.description}" 
                           onchange="modifierColis(${index}, 'description', this.value)"
                           style="flex: 2; background: #111; border: 1px solid #2a2a2a; color: white; padding: 8px; border-radius: 4px;">
                    
                    <input type="number" placeholder="Poids" value="${colis.poids}" 
                           onchange="modifierColis(${index}, 'poids', this.value)"
                           style="width: 80px; background: #111; border: 1px solid #2a2a2a; color: white; padding: 8px; border-radius: 4px;">
                    
                    <input type="number" placeholder="Qté" value="${colis.quantite}" 
                           onchange="modifierColis(${index}, 'quantite', this.value)"
                           style="width: 60px; background: #111; border: 1px solid #2a2a2a; color: white; padding: 8px; border-radius: 4px;">
                    
                    <select onchange="modifierColis(${index}, 'type', this.value)"
                            style="width: 100px; background: #111; border: 1px solid #2a2a2a; color: white; padding: 8px; border-radius: 4px;">
                        <option value="Colis" ${colis.type === 'Colis' ? 'selected' : ''}>Colis</option>
                        <option value="Fragile" ${colis.type === 'Fragile' ? 'selected' : ''}>Fragile</option>
                        <option value="Palette" ${colis.type === 'Palette' ? 'selected' : ''}>Palette</option>
                    </select>
                    
                    <button onclick="supprimerColis(${index})" style="background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer;">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div style="font-size: 11px; color: #aaa; margin-top: 4px;">Total: ${poidsTotal.toFixed(1)} kg</div>
            </div>
        `;
    });
    
    container.innerHTML = html || '<div style="color:#666; padding:10px; text-align:center;">Aucun colis supplémentaire</div>';
    document.getElementById('totalColis').textContent = total.toFixed(1) + ' kg';
}
                window.saveTransport = async function() {
    const year = new Date().getFullYear();
    const random = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
    const orderNumber = `TR-${year}-${random}`;
    
    // Calcul du poids total (colis principal + supplémentaires)
    let poidsTotal = parseFloat(document.getElementById('weight').value) || 1;
    colisList.forEach(c => {
        poidsTotal += (c.poids || 0) * (c.quantite || 1);
    });
    
    const transport = {
        order_number: orderNumber,
        client_number: document.getElementById('clientNumber').value,
        pickup_address: document.getElementById('pickupAddress').value,
        delivery_address: document.getElementById('deliveryAddress').value,
        weight: poidsTotal,  // Poids total
        quantity: (parseInt(document.getElementById('quantity').value) || 1) + colisList.reduce((acc, c) => acc + (c.quantite || 0), 0),
        package_type: document.getElementById('packageType').value,
        service_type: document.getElementById('serviceType').value,
        speed: document.getElementById('speed').value,
        night_delivery: document.getElementById('nightDelivery').value === 'true',
        instructions: document.getElementById('instructions').value,
        status: 'pending',
        priority: document.getElementById('speed').value === '6h' ? 'urgent' : 'normal',
        created_at: new Date()
    };
    
    if (!transport.client_number || !transport.delivery_address) {
        alert('Numéro client et adresse de livraison requis');
        return;
    }
    
    try {
        const { error } = await supabase
            .from('transport_orders_simple')
            .insert([transport]);
        
        if (error) throw error;
        
        alert(`✅ Transport ${orderNumber} créé avec succès !`);
        closeModal();
        
        // Reset
        document.getElementById('clientNumber').value = '';
        document.getElementById('deliveryAddress').value = '';
        document.getElementById('instructions').value = '';
        colisList = [];
        afficherColis();
        
        loadTransports();
        
    } catch(e) {
        console.error('Erreur:', e);
        alert('❌ Erreur: ' + e.message);
    }
};
        window.supprimerTransport = async function(orderId) {
    if (!confirm('⚠️ Êtes-vous sûr de vouloir supprimer ce transport ?')) {
        return;
    }
    
    try {
        const { error } = await supabase
            .from('transport_orders_simple')
            .delete()
            .eq('id', orderId);
        
        if (error) throw error;
        
        alert('✅ Transport supprimé');
        loadTransports();
        
    } catch(e) {
        console.error('Erreur suppression:', e);
        alert('❌ Erreur: ' + e.message);
    }
};
