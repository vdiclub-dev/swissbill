<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription | Léman-Courses</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <header class="topbar">
    <h1>🚚 Léman-Courses</h1>
  </header>

  <main class="auth-page">
    <section class="auth-card">

      <h1>Créer un compte client</h1>

      <form id="signupForm">
        <label for="nom">Nom complet</label>
        <input id="nom" name="nom" type="text" placeholder="Nom complet" autocomplete="name" required>

        <label for="entreprise">Entreprise</label>
        <input id="entreprise" name="entreprise" type="text" placeholder="Entreprise" autocomplete="organization">

        <label for="telephone">Téléphone</label>
        <input id="telephone" name="telephone" type="tel" placeholder="Téléphone" autocomplete="tel" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Email" autocomplete="email" required>

        <label for="password">Mot de passe</label>
        <input id="password" name="password" type="password" placeholder="Mot de passe" autocomplete="new-password" required>

        <button class="btn btn-primary" type="submit">
          Créer mon compte
        </button>
      </form>

      <div id="messageBox" class="message-box"></div>

      <p class="muted">
        Déjà inscrit ?
        <a href="login.html">Se connecter</a>
      </p>

    </section>
  </main>

  <footer class="footer">
    Léman-Courses<br>
    Impasse des Griottes 3<br>
    1462 Yvonand
  </footer>

  <script src="JS/config.js"></script>
  <script src="JS/ui.js"></script>
  <script src="JS/auth.js"></script>
  <script src="JS/signup.js"></script>

</body>
</html>
