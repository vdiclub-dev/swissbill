<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Créer un compte client</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="JS/config.js"></script>
<script src="JS/login.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1601584115197-04ecc0da31d7") center/cover no-repeat;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.form-box{
position:relative;
background:white;
padding:40px;
border-radius:10px;
width:600px;
max-width:90%;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
width:100%;
}

button{
margin-top:20px;
width:100%;
padding:14px;
background:#2563eb;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e4fd1;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
color:#2563eb;
text-decoration:none;
}

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="form-box">

<h1>🚚 Créer un compte client</h1>

<div class="grid">

<input id="company" placeholder="Entreprise">
<input id="lastname" placeholder="Nom">
<input id="firstname" placeholder="Prénom">
<input id="phone" placeholder="Téléphone">
<input id="address" placeholder="Adresse">
<input id="zip" placeholder="NPA">
<input id="city" placeholder="Ville">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">

</div>

<button onclick="signup()">Créer le compte</button>

<div class="link">

<p>Déjà client ?</p>

<a href="login.html">Connexion</a>

</div>

</div>

</body>

</html>
