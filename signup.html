<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Inscription client</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL="https://iubbsnntcreneakbdkmv.supabase.co"
const SUPABASE_KEY="TA_CLE_SUPABASE"

window.db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function signup(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await db.auth.signUp({
email:email,
password:password
})

if(error){
alert(error.message)
return
}

alert("Compte créé ! Vous pouvez vous connecter")

window.location.href="login.html"

}

</script>

</head>

<body>

<h1>Créer un compte client</h1>

<input id="email" placeholder="Email">
<br><br>

<input id="password" type="password" placeholder="Mot de passe">
<br><br>

<button onclick="signup()">Créer le compte</button>

<br><br>

<a href="login.html">Retour connexion</a>

</body>

</html>
