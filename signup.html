<!DOCTYPE html>
<html lang="fr">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription | Léman-Courses</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1>Créer un compte client</h1>

      <form id="signupForm">
        <input id="nom" placeholder="Nom complet" required />
        <input id="entreprise" placeholder="Entreprise" />
        <input id="telephone" placeholder="Téléphone" />
        <input id="email" type="email" placeholder="Email" required />
        <input id="password" type="password" placeholder="Mot de passe" required />
        <button class="btn btn-primary" type="submit">Créer mon compte</button>
      </form>

      <p class="muted">
        Déjà inscrit ? <a href="login.html">Se connecter</a>
      </p>
    </section>
  </main>
<script src="JS/auth.js"></script>
<script src="JS/portal.js"></script>
  <script src="JS/config.js"></script>
  <script src="JS/ui.js"></script>
  <script src="JS/login.js"></script>
</body>
</html>
