<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Espace chauffeur</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase et Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../dispatch/config.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo i {
            font-size: 60px;
            color: #10b981;
            background: #e2f3e5;
            padding: 15px;
            border-radius: 50%;
        }
        h2 { text-align: center; margin-bottom: 30px; color: #0f172a; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        .form-group input { 
            width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; 
            transition: 0.2s;
        }
        .form-group input:focus { 
            outline: none; border-color: #10b981; 
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .btn {
            width: 100%; padding: 14px; background: #10b981; color: white; border: none;
            border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }
        .btn:hover { background: #059669; }
        .btn:disabled { background: #a3d8c1; cursor: not-allowed; }
        
        .error-message {
            background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px;
            margin-bottom: 20px; display: none; border-left: 4px solid #ef4444;
        }
        
        .success-message {
            background: #10b981; color: white; padding: 12px; border-radius: 8px;
            margin-bottom: 20px; display: none; border-left: 4px solid #065f46;
        }
        
        .forgot-password {
            text-align: right;
            margin-bottom: 15px;
        }
        
        .forgot-password a {
            color: #10b981;
            text-decoration: none;
            font-size: 14px;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
        
        .demo-info {
            margin-top: 20px; background: #f1f5f9; border-radius: 8px; padding: 15px;
            font-size: 14px; color: #475569; border-left: 4px solid #10b981;
        }
        
        .demo-info strong {
            color: #0f172a;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo"><i class="fas fa-truck"></i></div>
        <h2>Espace chauffeur</h2>
        
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
        </div>
        
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i> <span id="successText"></span>
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="prenom.nom@leman.ch" value="jean.dupont@leman.ch">
        </div>
        
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••" value="password123">
        </div>
        
        <div class="forgot-password">
            <a href="#" onclick="showForgotPassword()">Mot de passe oublié ?</a>
        </div>
        
        <button class="btn" id="loginBtn" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> Connexion
        </button>
        
        <div class="demo-info">
            <p><strong><i class="fas fa-info-circle"></i> Pour la démo :</strong></p>
            <p>👤 <strong>Jean Dupont</strong> : jean.dupont@leman.ch / password123</p>
            <p>👤 <strong>Pierre Martin</strong> : pierre.martin@leman.ch / password123</p>
            <p><small><i class="fas fa-lock"></i> Tous les mots de passe sont sécurisés (hashés)</small></p>
        </div>
    </div>

    <!-- Modal Mot de passe oublié -->
    <div id="forgotModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:white; border-radius:20px; padding:30px; max-width:400px; width:90%;">
            <h3 style="margin-bottom:20px;">Réinitialiser le mot de passe</h3>
            <div class="form-group">
                <label>Votre email</label>
                <input type="email" id="resetEmail" placeholder="prenom.nom@leman.ch">
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#10b981;" onclick="sendResetPassword()">
                    <i class="fas fa-paper-plane"></i> Envoyer
                </button>
                <button class="btn" style="background:#64748b;" onclick="closeForgotModal()">
                    <i class="fas fa-times"></i> Annuler
                </button>
            </div>
        </div>
    </div>

    <script>
        console.log("🚀 Page de login chauffeur chargée");
        
        // ===== VÉRIFICATION CONFIG =====
        if (!window.SUPABASE_CONFIG) {
            document.getElementById('errorMessage').style.display = 'flex';
            document.getElementById('errorText').textContent = '❌ config.js non chargé';
            throw new Error("Configuration manquante");
        }
        
        console.log("✅ Configuration trouvée");
        
        // ===== CRÉATION DU CLIENT SUPABASE =====
        const supabaseClient = window.supabase.createClient(
            window.SUPABASE_CONFIG.url,
            window.SUPABASE_CONFIG.key
        );
        
        console.log("✅ Client Supabase créé");

        // ===== FONCTION DE CONNEXION =====
        window.login = async function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
            
            if (!email || !password) {
                document.getElementById('errorText').textContent = 'Veuillez remplir tous les champs';
                document.getElementById('errorMessage').style.display = 'flex';
                return;
            }
            
            try {
                // Désactiver le bouton
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
                
                console.log("🔍 Tentative de connexion pour:", email);
                
                // Utiliser Supabase Auth (sécurisé)
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                console.log("✅ Auth réussie:", data);
                
                // Récupérer les infos du chauffeur dans la table chauffeurs
                const { data: chauffeur, error: chauffeurError } = await supabaseClient
                    .from('chauffeurs')
                    .select('*')
                    .eq('email', email)
                    .single();
                
                if (chauffeurError) {
                    console.warn("Info: Chauffeur non trouvé dans la table");
                }
                
                // Stocker les infos de session
                localStorage.setItem('chauffeur', JSON.stringify({
                    id: data.user.id,
                    email: data.user.email,
                    nom: chauffeur?.nom || 'Chauffeur',
                    prenom: chauffeur?.prenom || '',
                    loggedIn: true
                }));
                
                // Message de succès
                document.getElementById('successText').textContent = '✅ Connexion réussie ! Redirection...';
                document.getElementById('successMessage').style.display = 'flex';
                
                // Redirection
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } catch(e) {
                console.error('❌ Erreur:', e);
                
                let message = 'Erreur de connexion';
                if (e.message.includes('Invalid login')) {
                    message = 'Email ou mot de passe incorrect';
                } else if (e.message.includes('Email not confirmed')) {
                    message = 'Veuillez confirmer votre email avant de vous connecter';
                } else {
                    message = e.message;
                }
                
                document.getElementById('errorText').textContent = message;
                document.getElementById('errorMessage').style.display = 'flex';
                
                // Réactiver le bouton
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Connexion';
            }
        };
        
        // ===== MOT DE PASSE OUBLIÉ =====
        window.showForgotPassword = function() {
            document.getElementById('forgotModal').style.display = 'flex';
        };
        
        window.closeForgotModal = function() {
            document.getElementById('forgotModal').style.display = 'none';
        };
        
        window.sendResetPassword = async function() {
            const email = document.getElementById('resetEmail').value.trim();
            
            if (!email) {
                alert('Veuillez saisir votre email');
                return;
            }
            
            try {
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/chauffeur/reset-password.html'
                });
                
                if (error) throw error;
                
                alert('✅ Email de réinitialisation envoyé ! Vérifiez votre boîte (pensez aux spams).');
                closeForgotModal();
                
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        };
        
        // Fermer le modal si on clique dehors
        window.onclick = function(event) {
            const modal = document.getElementById('forgotModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
