<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Mon espace chauffeur</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../dispatch/config.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body { background: #f1f5f9; min-height: 100vh; }
        
        .header {
            background: #0f172a; color: white; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #10b981;
            height: 70px;
        }
        .logo { font-size: 22px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .logo i { color: #10b981; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1e293b; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .user-badge i { color: #10b981; }
        .btn-logout { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        
        /* NOTIFICATIONS */
        .notif-bar {
            background: #3b82f6;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 15px;
            animation: slideDown 0.3s;
        }
        
        .notif-content { flex: 1; }
        .notif-actions { display: flex; gap: 10px; }
        .notif-btn {
            padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .notif-btn.accept { background: #10b981; color: white; }
        .notif-btn.decline { background: #ef4444; color: white; }
        
        /* TOURNÉE */
        .tour-card {
            background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px;
            border: 1px solid #e2e8f0; border-left: 4px solid #10b981;
        }
        .tour-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .tour-title { font-size: 18px; font-weight: bold; color: #0f172a; }
        .tour-stats { display: flex; gap: 20px; color: #64748b; font-size: 14px; }
        
        .stop-list { margin-top: 15px; }
        .stop-item {
            display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #e2e8f0;
            cursor: pointer; transition: 0.2s;
        }
        .stop-item:hover { background: #f8fafc; }
        .stop-item.completed { opacity: 0.6; background: #f1f5f9; }
        .stop-number {
            width: 30px; height: 30px; background: #10b981; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px;
        }
        .stop-info { flex: 1; }
        .stop-name { font-weight: bold; color: #0f172a; }
        .stop-address { font-size: 13px; color: #64748b; }
        .stop-time { font-size: 12px; color: #10b981; margin-left: 15px; }
        .stop-status {
            width: 80px; text-align: center; padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-completed { background: #dcfce7; color: #166534; }
        
        /* CARTE */
        .map-section {
            background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px;
        }
        #driver-map { height: 200px; border-radius: 8px; margin-top: 10px; }
        
        /* MODAL PREUVE */
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-box {
            background: white; width: 90%; max-width: 500px; padding: 25px; border-radius: 10px;
        }
        .modal-box h3 { margin-bottom: 15px; color: #0f172a; }
        .photo-preview {
            width: 100%; height: 200px; background: #f1f5f9; border: 2px dashed #e2e8f0;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            margin: 15px 0; cursor: pointer;
        }
        .photo-preview i { font-size: 40px; color: #94a3b8; }
        .photo-preview.has-photo { border: 2px solid #10b981; }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .signature-canvas {
            width: 100%; height: 150px; border: 2px solid #e2e8f0; border-radius: 8px; margin: 15px 0;
            background: white; cursor: crosshair;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #10b981; color: white; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        
        /* MODAL REFUS */
        .refus-option {
            display: flex; align-items: center; gap: 8px; padding: 8px;
            background: #f8fafc; border-radius: 4px; margin-bottom: 10px;
        }
        input[type="radio"] { width: 16px; height: 16px; accent-color: #ef4444; }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="loader" style="text-align:center; padding:50px;">
            <i class="fas fa-spinner fa-spin fa-3x" style="color:#10b981;"></i>
            <p style="margin-top:20px;">Chargement de votre espace...</p>
        </div>
    </div>

    <!-- MODAL PREUVE LIVRAISON -->
    <div id="proofModal" class="modal">
        <div class="modal-box">
            <h3><i class="fas fa-camera"></i> Preuve de livraison</h3>
            
            <div id="photoPreview" class="photo-preview" onclick="prendrePhoto()">
                <i class="fas fa-camera"></i>
            </div>
            
            <canvas id="signatureCanvas" class="signature-canvas"></canvas>
            <p style="font-size:12px; color:#64748b; margin-top:5px;">✍️ Dessinez votre signature</p>
            
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="fermerModal()">Annuler</button>
                <button class="btn btn-primary" onclick="validerLivraison()">Valider la livraison</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Espace chauffeur...");
                
                // Vérification Supabase
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                // Vérification connexion chauffeur
                const chauffeurData = JSON.parse(localStorage.getItem('chauffeur'));
                if (!chauffeurData || !chauffeurData.loggedIn) {
                    window.location.href = 'index.html';
                    return;
                }
                
                // ===== VARIABLES GLOBALES =====
                let tourneeActive = null;
                let intervalGPS = null;
                let signatureCanvas = null;
                let signatureContext = null;
                let isDrawing = false;
                let photoData = null;
                let currentStopId = null;
                
                // ===== SIGNATURE =====
                function initSignature() {
                    signatureCanvas = document.getElementById('signatureCanvas');
                    if (!signatureCanvas) return;
                    
                    signatureContext = signatureCanvas.getContext('2d');
                    signatureContext.strokeStyle = '#0f172a';
                    signatureContext.lineWidth = 2;
                    signatureContext.lineCap = 'round';
                    
                    signatureCanvas.addEventListener('mousedown', startDrawing);
                    signatureCanvas.addEventListener('mousemove', draw);
                    signatureCanvas.addEventListener('mouseup', stopDrawing);
                    signatureCanvas.addEventListener('mouseleave', stopDrawing);
                    
                    // Pour mobile
                    signatureCanvas.addEventListener('touchstart', startDrawingTouch);
                    signatureCanvas.addEventListener('touchmove', drawTouch);
                    signatureCanvas.addEventListener('touchend', stopDrawing);
                }
                
                function startDrawing(e) {
                    isDrawing = true;
                    const rect = signatureCanvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    signatureContext.beginPath();
                    signatureContext.moveTo(x, y);
                }
                
                function startDrawingTouch(e) {
                    e.preventDefault();
                    isDrawing = true;
                    const rect = signatureCanvas.getBoundingClientRect();
                    const touch = e.touches[0];
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    signatureContext.beginPath();
                    signatureContext.moveTo(x, y);
                }
                
                function draw(e) {
                    if (!isDrawing) return;
                    e.preventDefault();
                    const rect = signatureCanvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    signatureContext.lineTo(x, y);
                    signatureContext.stroke();
                }
                
                function drawTouch(e) {
                    if (!isDrawing) return;
                    e.preventDefault();
                    const rect = signatureCanvas.getBoundingClientRect();
                    const touch = e.touches[0];
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    signatureContext.lineTo(x, y);
                    signatureContext.stroke();
                }
                
                function stopDrawing() {
                    isDrawing = false;
                }
                
                // ===== PHOTO =====
                window.prendrePhoto = function() {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = function(e) {
                        const file = e.target.files[0];
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            photoData = event.target.result;
                            const preview = document.getElementById('photoPreview');
                            preview.innerHTML = `<img src="${photoData}" style="width:100%; height:100%; object-fit:cover;">`;
                            preview.classList.add('has-photo');
                        };
                        reader.readAsDataURL(file);
                    };
                    input.click();
                };
                
                // ===== MODAL LIVRAISON =====
                window.ouvrirModalLivraison = function(stopId) {
                    currentStopId = stopId;
                    photoData = null;
                    document.getElementById('photoPreview').innerHTML = '<i class="fas fa-camera"></i>';
                    document.getElementById('photoPreview').classList.remove('has-photo');
                    document.getElementById('proofModal').style.display = 'flex';
                    setTimeout(initSignature, 100);
                };
                
                window.fermerModal = function() {
                    document.getElementById('proofModal').style.display = 'none';
                    // Effacer la signature
                    if (signatureCanvas) {
                        signatureContext.clearRect(0, 0, signatureCanvas.width, signatureCanvas.height);
                    }
                };
                
                // ===== VALIDER LIVRAISON =====
                window.validerLivraison = async function() {
                    if (!currentStopId) return;
                    
                    try {
                        // Upload photo
                        let photoUrl = null;
                        if (photoData) {
                            const photoBlob = dataURLtoBlob(photoData);
                            const photoFile = new File([photoBlob], `livraison-${currentStopId}.jpg`, { type: 'image/jpeg' });
                            
                            const { data: photoUpload, error: photoError } = await supabase.storage
                                .from('preuves')
                                .upload(`photos/${currentStopId}-${Date.now()}.jpg`, photoFile);
                            
                            if (!photoError) {
                                photoUrl = photoUpload.path;
                            }
                        }
                        
                        // Upload signature
                        let signatureUrl = null;
                        if (signatureCanvas) {
                            const signatureData = signatureCanvas.toDataURL('image/png');
                            const signatureBlob = dataURLtoBlob(signatureData);
                            const signatureFile = new File([signatureBlob], `signature-${currentStopId}.png`, { type: 'image/png' });
                            
                            const { data: signatureUpload, error: signatureError } = await supabase.storage
                                .from('preuves')
                                .upload(`signatures/${currentStopId}-${Date.now()}.png`, signatureFile);
                            
                            if (!signatureError) {
                                signatureUrl = signatureUpload.path;
                            }
                        }
                        
                        // Mettre à jour le stop
                        const { error: stopError } = await supabase
                            .from('stops')
                            .update({ 
                                statut: 'completed',
                                completed_at: new Date()
                            })
                            .eq('id', currentStopId);
                        
                        if (stopError) throw stopError;
                        
                        // Sauvegarder les preuves
                        if (photoUrl || signatureUrl) {
                            await supabase
                                .from('preuves_livraison')
                                .insert([{
                                    stop_id: currentStopId,
                                    photo_url: photoUrl,
                                    signature_url: signatureUrl
                                }]);
                        }
                        
                        // Mettre à jour localement
                        const stop = tourneeActive?.stops?.find(s => s.id === currentStopId);
                        if (stop) stop.statut = 'completed';
                        
                        showMessage('✅ Livraison validée', '#10b981');
                        
                    } catch(e) {
                        console.error("Erreur validation:", e);
                        showMessage('❌ Erreur: ' + e.message, '#ef4444');
                    }
                    
                    fermerModal();
                    afficherPage();
                };
                
                // Convertir dataURL en Blob
                function dataURLtoBlob(dataurl) {
                    const arr = dataurl.split(',');
                    const mime = arr[0].match(/:(.*?);/)[1];
                    const bstr = atob(arr[1]);
                    let n = bstr.length;
                    const u8arr = new Uint8Array(n);
                    while (n--) {
                        u8arr[n] = bstr.charCodeAt(n);
                    }
                    return new Blob([u8arr], { type: mime });
                }
                
                // ===== GPS =====
                function demarrerGPS() {
                    if (!navigator.geolocation) {
                        console.warn("GPS non supporté");
                        return;
                    }
                    
                    // Envoi immédiat
                    navigator.geolocation.getCurrentPosition(async (position) => {
                        await envoyerPosition(position);
                    });
                    
                    // Puis toutes les 10 secondes
                    intervalGPS = setInterval(() => {
                        navigator.geolocation.getCurrentPosition(envoyerPosition, (e) => {
                            console.warn("Erreur GPS:", e);
                        });
                    }, 10000);
                }
                
                async function envoyerPosition(position) {
                    const { latitude, longitude } = position.coords;
                    
                    const { error } = await supabase
                        .from('driver_positions')
                        .upsert({
                            chauffeur_id: chauffeurData.id,
                            lat: latitude,
                            lng: longitude,
                            updated_at: new Date()
                        }, { onConflict: 'chauffeur_id' });
                    
                    if (error) console.warn("Erreur envoi position:", error);
                    else console.log(`📍 Position: ${latitude}, ${longitude}`);
                }
                
                // ===== CHARGER TOURNÉE =====
                async function loadTournee() {
                    try {
                        // Chercher une tournée pour aujourd'hui
                        const today = new Date().toISOString().split('T')[0];
                        
                        const { data: tournees, error } = await supabase
                            .from('tournees')
                            .select(`
                                *,
                                stops (*)
                            `)
                            .eq('chauffeur_id', chauffeurData.id)
                            .eq('date', today)
                            .eq('statut', 'pending')
                            .maybeSingle();
                        
                        if (error && error.code !== 'PGRST116') {
                            console.error("Erreur chargement:", error);
                        }
                        
                        if (tournees) {
                            tourneeActive = {
                                id: tournees.id,
                                nom: tournees.nom,
                                chauffeur: tournees.chauffeur_id,
                                stats: {
                                    distance: tournees.distance_km || 0,
                                    duree: tournees.duree_min || 0,
                                    poids: tournees.poids_kg || 0
                                },
                                stops: tournees.stops || []
                            };
                        } else {
                            tourneeActive = null;
                        }
                        
                        afficherPage();
                        
                        // Simuler une notification après 3 secondes si pas de tournée
                        if (!tourneeActive) {
                            setTimeout(() => {
                                const notif = document.getElementById('notifBar');
                                if (notif) notif.style.display = 'flex';
                            }, 3000);
                        }
                        
                    } catch(e) {
                        console.error("Erreur chargement:", e);
                        afficherPage();
                    }
                }
                
                // ===== NOTIFICATIONS =====
                window.accepterTournee = async function() {
                    document.getElementById('notifBar').style.display = 'none';
                    
                    if (!tourneeActive) {
                        // Créer une tournée de test
                        const { data, error } = await supabase
                            .from('tournees')
                            .insert([{
                                nom: 'Tournée du jour',
                                chauffeur_id: chauffeurData.id,
                                date: new Date().toISOString().split('T')[0],
                                statut: 'accepted',
                                distance_km: 156,
                                duree_min: 270,
                                poids_kg: 124
                            }])
                            .select()
                            .single();
                        
                        if (error) {
                            showMessage('❌ Erreur création', '#ef4444');
                            return;
                        }
                        
                        // Créer des stops
                        const stops = [
                            { ordre: 1, client_nom: 'Dupont Jean', client_adresse: 'Rue du Lac 12, Lausanne', heure_prevue: '08:45' },
                            { ordre: 2, client_nom: 'Martin SA', client_adresse: 'Place de la Gare 5, Genève', heure_prevue: '09:30' },
                            { ordre: 3, client_nom: 'Bernard & Cie', client_adresse: 'Grand-Rue 8, Berne', heure_prevue: '10:15' }
                        ].map(s => ({ ...s, tournee_id: data.id }));
                        
                        await supabase.from('stops').insert(stops);
                        
                        await loadTournee();
                    } else {
                        // Mettre à jour le statut
                        await supabase
                            .from('tournees')
                            .update({ statut: 'accepted' })
                            .eq('id', tourneeActive.id);
                    }
                    
                    showMessage('✅ Tournée acceptée', '#10b981');
                    demarrerGPS();
                };
                
                // ===== REFUS =====
                window.refuserTournee = function() {
                    document.getElementById('notifBar').style.display = 'none';
                    
                    const modalHtml = `
                        <div id="refusModal" class="modal" style="display:flex;">
                            <div class="modal-box">
                                <h3 style="margin-bottom:15px;">❌ Refuser la tournée</h3>
                                
                                <div style="margin-bottom:15px;">
                                    <div class="refus-option">
                                        <input type="radio" name="refusReason" value="maladie" checked>
                                        <span>🦠 Maladie / Pas disponible</span>
                                    </div>
                                    <div class="refus-option">
                                        <input type="radio" name="refusReason" value="vehicule">
                                        <span>🔧 Problème véhicule</span>
                                    </div>
                                    <div class="refus-option">
                                        <input type="radio" name="refusReason" value="horaire">
                                        <span>⏰ Horaire incompatible</span>
                                    </div>
                                    <div class="refus-option">
                                        <input type="radio" name="refusReason" value="charge">
                                        <span>⚖️ Charge trop lourde</span>
                                    </div>
                                    <div class="refus-option">
                                        <input type="radio" name="refusReason" value="autre">
                                        <span>📝 Autre raison</span>
                                    </div>
                                </div>
                                
                                <div id="autreRaisonDiv" style="display:none; margin-bottom:15px;">
                                    <input type="text" id="autreRaison" placeholder="Précisez votre raison..." 
                                           style="width:100%; padding:8px; border:1px solid #e2e8f0; border-radius:4px;">
                                </div>
                                
                                <div style="display:flex; gap:10px;">
                                    <button class="btn btn-secondary" onclick="annulerRefus()" style="flex:1;">Annuler</button>
                                    <button class="btn btn-primary" onclick="confirmerRefus()" style="flex:1; background:#ef4444;">Confirmer</button>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    document.body.insertAdjacentHTML('beforeend', modalHtml);
                    
                    document.querySelectorAll('input[name="refusReason"]').forEach(radio => {
                        radio.addEventListener('change', function() {
                            document.getElementById('autreRaisonDiv').style.display = 
                                this.value === 'autre' ? 'block' : 'none';
                        });
                    });
                };
                
                window.annulerRefus = function() {
                    document.getElementById('refusModal')?.remove();
                    document.getElementById('notifBar').style.display = 'flex';
                };
                
                window.confirmerRefus = async function() {
                    const raison = document.querySelector('input[name="refusReason"]:checked')?.value;
                    let raisonTexte = '';
                    
                    switch(raison) {
                        case 'maladie': raisonTexte = 'Maladie / Pas disponible'; break;
                        case 'vehicule': raisonTexte = 'Problème véhicule'; break;
                        case 'horaire': raisonTexte = 'Horaire incompatible'; break;
                        case 'charge': raisonTexte = 'Charge trop lourde'; break;
                        case 'autre': raisonTexte = document.getElementById('autreRaison')?.value || 'Autre raison'; break;
                        default: raisonTexte = 'Raison non spécifiée';
                    }
                    
                    try {
                        if (tourneeActive) {
                            await supabase
                                .from('tournees')
                                .update({ statut: 'refused' })
                                .eq('id', tourneeActive.id);
                            
                            await supabase
                                .from('refus_tournees')
                                .insert([{
                                    chauffeur_id: chauffeurData.id,
                                    tournee_id: tourneeActive.id,
                                    raison: raisonTexte,
                                    date: new Date()
                                }]);
                        }
                        
                        showMessage('✅ Refus enregistré', '#ef4444');
                        document.getElementById('refusModal')?.remove();
                        tourneeActive = null;
                        afficherPage();
                        
                    } catch(e) {
                        console.error("Erreur refus:", e);
                        showMessage('❌ Erreur: ' + e.message, '#ef4444');
                    }
                };
                
                // ===== INIT MAP =====
                function initMap() {
                    if (typeof L === 'undefined') {
                        console.error("❌ Leaflet non chargé");
                        return;
                    }
                    
                    const map = L.map('driver-map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap'
                    }).addTo(map);
                    
                    // Position du chauffeur (simulée)
                    L.marker([46.52, 6.63]).addTo(map).bindPopup('Ma position');
                    
                    // Points de livraison
                    if (tourneeActive && tourneeActive.stops) {
                        tourneeActive.stops.forEach((stop, i) => {
                            // Coordonnées simulées
                            let lat = 46.52, lng = 6.63;
                            if (stop.client_adresse?.includes('Genève')) { lat = 46.20; lng = 6.14; }
                            if (stop.client_adresse?.includes('Berne')) { lat = 46.95; lng = 7.45; }
                            
                            const color = stop.statut === 'completed' ? '#10b981' : '#3b82f6';
                            L.circleMarker([lat, lng], {
                                radius: 8,
                                fillColor: color,
                                color: '#fff',
                                weight: 2,
                                fillOpacity: 0.8
                            }).addTo(map).bindPopup(stop.client_nom);
                        });
                    }
                }
                
                // ===== AFFICHAGE =====
                function afficherPage() {
                    document.getElementById('app').innerHTML = `
                        <div class="header">
                            <div class="logo"><i class="fas fa-truck"></i> Léman-Courses</div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user"></i> ${chauffeurData.prenom} ${chauffeurData.nom}</div>
                                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                            </div>
                        </div>
                        
                        <div class="container">
                            <!-- NOTIFICATION -->
                            <div class="notif-bar" id="notifBar">
                                <div class="notif-content">
                                    <strong>🔔 Nouvelle tournée disponible !</strong><br>
                                    <span>Tournée Lausanne - 3 livraisons</span>
                                </div>
                                <div class="notif-actions">
                                    <button class="notif-btn accept" onclick="accepterTournee()">Accepter</button>
                                    <button class="notif-btn decline" onclick="refuserTournee()">❌ Refuser</button>
                                </div>
                            </div>
                            
                            <!-- CARTE -->
                            <div class="map-section">
                                <h3><i class="fas fa-map-marked-alt"></i> Ma position</h3>
                                <div id="driver-map"></div>
                            </div>
                            
                            <!-- TOURNÉE ACTIVE -->
                            ${tourneeActive ? `
                                <div class="tour-card">
                                    <div class="tour-header">
                                        <span class="tour-title">🚚 ${tourneeActive.nom}</span>
                                        <div class="tour-stats">
                                            <span><i class="fas fa-road"></i> ${tourneeActive.stats.distance} km</span>
                                            <span><i class="fas fa-clock"></i> ${Math.floor(tourneeActive.stats.duree/60)}h${tourneeActive.stats.duree%60}</span>
                                            <span><i class="fas fa-weight"></i> ${tourneeActive.stats.poids} kg</span>
                                        </div>
                                    </div>
                                    
                                    <div class="stop-list">
                                        ${tourneeActive.stops.map((stop, index) => `
                                            <div class="stop-item ${stop.statut === 'completed' ? 'completed' : ''}" 
                                                 onclick="${stop.statut !== 'completed' ? `ouvrirModalLivraison('${stop.id}')` : ''}">
                                                <div class="stop-number">${index + 1}</div>
                                                <div class="stop-info">
                                                    <div class="stop-name">${stop.client_nom || 'Client'}</div>
                                                    <div class="stop-address">📍 ${stop.client_adresse || ''}</div>
                                                </div>
                                                <div class="stop-time">🕐 ${stop.heure_prevue || '--:--'}</div>
                                                <div class="stop-status status-${stop.statut || 'pending'}">
                                                    ${stop.statut === 'completed' ? 'Livré' : 'En attente'}
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : `
                                <div style="text-align:center; padding:40px; background:white; border-radius:12px;">
                                    <i class="fas fa-clock" style="font-size:50px; color:#94a3b8;"></i>
                                    <h3 style="margin:15px 0; color:#0f172a;">Aucune tournée en cours</h3>
                                    <p style="color:#64748b;">Vous serez notifié dès qu'une tournée vous sera assignée.</p>
                                </div>
                            `}
                        </div>
                    `;
                    
                    if (tourneeActive) {
                        setTimeout(initMap, 100);
                    }
                }
                
                // ===== MESSAGE =====
                function showMessage(texte, couleur) {
                    const msg = document.createElement('div');
                    msg.style.position = 'fixed';
                    msg.style.top = '20px';
                    msg.style.right = '20px';
                    msg.style.background = couleur;
                    msg.style.color = 'white';
                    msg.style.padding = '15px 25px';
                    msg.style.borderRadius = '8px';
                    msg.style.zIndex = '3000';
                    msg.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
                    msg.innerHTML = texte;
                    document.body.appendChild(msg);
                    setTimeout(() => msg.remove(), 3000);
                }
                
                // ===== DÉCONNEXION =====
                window.logout = function() {
                    if (intervalGPS) clearInterval(intervalGPS);
                    localStorage.removeItem('chauffeur');
                    window.location.href = 'index.html';
                };
                
                // ===== LANCEMENT =====
                await loadTournee();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
