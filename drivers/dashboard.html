<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Mon espace chauffeur</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase et Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../dispatch/config.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body { background: #f1f5f9; min-height: 100vh; }
        
        .header {
            background: #0f172a; color: white; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #10b981;
        }
        .logo { font-size: 22px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .logo i { color: #10b981; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1e293b; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .btn-logout { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 20px;
        }
        .stat-card {
            background: white; padding: 20px; border-radius: 12px;
            display: flex; align-items: center; gap: 15px; border: 1px solid #e2e8f0;
        }
        .stat-icon {
            width: 50px; height: 50px; background: #e2f3e5; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: #10b981; font-size: 24px;
        }
        .stat-info h3 { font-size: 24px; margin-bottom: 4px; }
        .stat-info p { color: #64748b; font-size: 14px; }
        
        .pointage-section {
            background: white; border-radius: 12px; padding: 20px;
            margin-bottom: 20px; border: 1px solid #e2e8f0;
        }
        .pointage-buttons {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px;
        }
        .btn-pointage {
            padding: 15px; border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }
        .btn-pointage:hover { transform: translateY(-2px); }
        .btn-pointage:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-debut { background: #10b981; color: white; }
        .btn-pause-debut { background: #f59e0b; color: white; }
        .btn-pause-fin { background: #f59e0b; color: white; }
        .btn-fin { background: #ef4444; color: white; }
        
        .compteurs-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px;
        }
        .compteur-card {
            background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0;
            text-align: center;
        }
        .compteur-valeur { font-size: 32px; font-weight: bold; color: #10b981; }
        .compteur-label { color: #64748b; font-size: 14px; margin-top: 5px; }
        
        .colis-list {
            background: white; border-radius: 12px; padding: 20px;
            margin-bottom: 20px; border: 1px solid #e2e8f0;
        }
        .colis-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: 0.2s;
        }
        .colis-item:hover {
            background: #f8fafc;
            transform: translateX(5px);
        }
        .colis-item:last-child { border-bottom: none; }
        .colis-info { flex: 1; }
        .colis-numero { font-weight: bold; color: #0f172a; }
        .colis-adresse { font-size: 13px; color: #64748b; margin-top: 4px; }
        .colis-statut {
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .statut-charge { background: #fef3c7; color: #92400e; }
        .statut-transit { background: #dbeafe; color: #1e40af; }
        .statut-livre { background: #dcfce7; color: #166534; }
        
        .success-message {
            position: fixed; top: 20px; right: 20px; background: #10b981; color: white;
            padding: 15px 25px; border-radius: 8px; animation: slideIn 0.3s; z-index: 1000;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .pointage-buttons { grid-template-columns: repeat(2, 1fr); }
            .compteurs-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="app">Chargement...</div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Dashboard chauffeur...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const chauffeurData = JSON.parse(localStorage.getItem('chauffeur'));
                if (!chauffeurData || !chauffeurData.loggedIn) {
                    window.location.href = 'index.html';
                    return;
                }
                
                console.log("✅ Chauffeur connecté:", chauffeurData);
                
                const { data: chauffeur, error: chauffeurError } = await supabase
                    .from('chauffeurs')
                    .select('*')
                    .eq('id', chauffeurData.id)
                    .single();
                
                if (chauffeurError) throw chauffeurError;
                
                // ===== GESTION DU POINTAGE EN LOCAL =====
                let pointageActuel = JSON.parse(localStorage.getItem('pointage_' + chauffeur.id)) || {
                    debut: null,
                    pauseDebut: null,
                    pauseFin: null,
                    fin: null
                };
                
                // ===== FONCTION POUR METTRE À JOUR L'AFFICHAGE =====
                function mettreAJourAffichage() {
                    // Mettre à jour les heures
                    if (pointageActuel.debut) {
                        document.getElementById('affDebut').textContent = new Date(pointageActuel.debut).toLocaleTimeString();
                    }
                    if (pointageActuel.fin) {
                        document.getElementById('affFin').textContent = new Date(pointageActuel.fin).toLocaleTimeString();
                    }
                    
                    // Calculer et afficher la pause
                    if (pointageActuel.pauseDebut && pointageActuel.pauseFin) {
                        const dureePause = Math.round((new Date(pointageActuel.pauseFin) - new Date(pointageActuel.pauseDebut)) / 60000);
                        document.getElementById('affPause').textContent = dureePause + ' min';
                    } else if (pointageActuel.pauseDebut) {
                        document.getElementById('affPause').textContent = 'En cours';
                    } else {
                        document.getElementById('affPause').textContent = '--:--';
                    }
                    
                    // Calculer le total
                    if (pointageActuel.debut && pointageActuel.fin) {
                        let total = (new Date(pointageActuel.fin) - new Date(pointageActuel.debut)) / 3600000; // en heures
                        if (pointageActuel.pauseDebut && pointageActuel.pauseFin) {
                            const pause = (new Date(pointageActuel.pauseFin) - new Date(pointageActuel.pauseDebut)) / 3600000;
                            total -= pause;
                        }
                        const heures = Math.floor(total);
                        const minutes = Math.round((total - heures) * 60);
                        document.getElementById('affTotal').textContent = heures + 'h' + (minutes < 10 ? '0' : '') + minutes;
                        
                        // Mettre à jour les stats
                        document.getElementById('heuresAujourdhui').textContent = heures + 'h' + (minutes < 10 ? '0' : '') + minutes;
                    } else if (pointageActuel.debut && !pointageActuel.fin) {
                        // Calcul en temps réel
                        const maintenant = new Date();
                        let total = (maintenant - new Date(pointageActuel.debut)) / 3600000;
                        if (pointageActuel.pauseDebut && pointageActuel.pauseFin) {
                            const pause = (new Date(pointageActuel.pauseFin) - new Date(pointageActuel.pauseDebut)) / 3600000;
                            total -= pause;
                        } else if (pointageActuel.pauseDebut && !pointageActuel.pauseFin) {
                            const pause = (maintenant - new Date(pointageActuel.pauseDebut)) / 3600000;
                            total -= pause;
                        }
                        const heures = Math.floor(total);
                        const minutes = Math.round((total - heures) * 60);
                        document.getElementById('affTotal').textContent = heures + 'h' + (minutes < 10 ? '0' : '') + minutes;
                    }
                }
                
                // ===== FONCTIONS DE POINTAGE =====
                window.pointer = function(action) {
                    const maintenant = new Date();
                    
                    switch(action) {
                        case 'debut':
                            pointageActuel.debut = maintenant;
                            break;
                        case 'pause_debut':
                            pointageActuel.pauseDebut = maintenant;
                            break;
                        case 'pause_fin':
                            pointageActuel.pauseFin = maintenant;
                            break;
                        case 'fin':
                            pointageActuel.fin = maintenant;
                            break;
                    }
                    
                    // Sauvegarder
                    localStorage.setItem('pointage_' + window.chauffeurId, JSON.stringify(pointageActuel));
                    
                    // Mettre à jour l'affichage
                    mettreAJourAffichage();
                    
                    // Désactiver les boutons
                    document.getElementById('btn_debut').disabled = pointageActuel.debut ? true : false;
                    document.getElementById('btn_pause_debut').disabled = pointageActuel.pauseDebut ? true : false;
                    document.getElementById('btn_pause_fin').disabled = !pointageActuel.pauseDebut || pointageActuel.pauseFin ? true : false;
                    document.getElementById('btn_fin').disabled = pointageActuel.fin ? true : false;
                    
                    showMessage('✅ Pointage enregistré');
                };
                
                // ===== COMPTEURS =====
                let compteurActuel = null;
                try {
                    const { data: compteurs } = await supabase
                        .from('compteurs')
                        .select('*')
                        .eq('chauffeur_id', chauffeur.id);
                    
                    if (compteurs && compteurs.length > 0) {
                        const annee = new Date().getFullYear();
                        compteurActuel = compteurs.find(c => c.annee === annee);
                    }
                } catch(e) {
                    console.warn("Erreur compteurs:", e);
                }
                
                // ===== CONSTRUCTION PAGE =====
                document.getElementById('app').innerHTML = `
                    <div class="header">
                        <div class="logo"><i class="fas fa-truck"></i> Léman-Courses</div>
                        <div class="user-section">
                            <div class="user-badge"><i class="fas fa-user"></i> ${chauffeur.prenom} ${chauffeur.nom}</div>
                            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                        </div>
                    </div>
                    
                    <div class="container">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-clock"></i></div>
                                <div class="stat-info">
                                    <h3 id="heuresAujourdhui">0h00</h3>
                                    <p>Aujourd'hui</p>
                                </div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-box"></i></div>
                                <div class="stat-info">
                                    <h3 id="colisAujourdhui">0</h3>
                                    <p>Colis livrés</p>
                                </div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-route"></i></div>
                                <div class="stat-info">
                                    <h3 id="kmAujourdhui">0</h3>
                                    <p>Kilomètres</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="pointage-section">
                            <h3><i class="fas fa-fingerprint"></i> Pointage du jour</h3>
                            <div style="display: grid; grid-template-columns: repeat(2,1fr); gap:10px; margin:15px 0;">
                                <div><small>Début: <span id="affDebut">${pointageActuel.debut ? new Date(pointageActuel.debut).toLocaleTimeString() : '--:--'}</span></small></div>
                                <div><small>Fin: <span id="affFin">${pointageActuel.fin ? new Date(pointageActuel.fin).toLocaleTimeString() : '--:--'}</span></small></div>
                                <div><small>Pause: <span id="affPause">--:--</span></small></div>
                                <div><small>Total: <span id="affTotal">--h--</span></small></div>
                            </div>
                            <div class="pointage-buttons">
                                <button class="btn-pointage btn-debut" id="btn_debut" onclick="pointer('debut')" ${pointageActuel.debut ? 'disabled' : ''}>
                                    <i class="fas fa-play"></i> Début
                                </button>
                                <button class="btn-pointage btn-pause-debut" id="btn_pause_debut" onclick="pointer('pause_debut')" ${pointageActuel.pauseDebut ? 'disabled' : ''}>
                                    <i class="fas fa-coffee"></i> Pause
                                </button>
                                <button class="btn-pointage btn-pause-fin" id="btn_pause_fin" onclick="pointer('pause_fin')" ${!pointageActuel.pauseDebut || pointageActuel.pauseFin ? 'disabled' : ''}>
                                    <i class="fas fa-undo"></i> Retour
                                </button>
                                <button class="btn-pointage btn-fin" id="btn_fin" onclick="pointer('fin')" ${pointageActuel.fin ? 'disabled' : ''}>
                                    <i class="fas fa-stop"></i> Fin
                                </button>
                            </div>
                        </div>
                        
                        <div class="compteurs-grid">
                            <div class="compteur-card">
                                <div class="compteur-valeur" id="congesRestants">${compteurActuel?.conges_restants || 20}</div>
                                <div class="compteur-label">Jours de congés</div>
                            </div>
                            <div class="compteur-card">
                                <div class="compteur-valeur" id="compensationRestantes">${compteurActuel?.compensation_restantes || 0}</div>
                                <div class="compteur-label">Heures de compensation</div>
                            </div>
                            <div class="compteur-card">
                                <div class="compteur-valeur" id="heuresMois">0h</div>
                                <div class="compteur-label">Heures ce mois</div>
                            </div>
                        </div>
                        
                        <div class="colis-list">
                            <h3><i class="fas fa-box"></i> Mes colis à livrer</h3>
                            <div id="colisList">Chargement...</div>
                        </div>
                    </div>
                `;
                
                // ===== VARIABLES =====
                window.chauffeurId = chauffeur.id;
                
                // ===== PREMIER AFFICHAGE =====
                mettreAJourAffichage();
                
                // ===== CHARGEMENT DES COLIS =====
                async function chargerColis() {
                    try {
                        const { data } = await supabase
                            .from('transport_orders_simple')
                            .select('*')
                            .neq('status', 'delivered')
                            .order('created_at', { ascending: false })
                            .limit(10);
                        
                        let html = '';
                        let livresAujourdhui = 0;
                        
                        if (data && data.length > 0) {
                            data.forEach(t => {
                                if (t.status === 'delivered') livresAujourdhui++;
                                
                                let statutTexte = 'En attente';
                                let statutClass = 'statut-charge';
                                
                                if (t.status === 'transit') {
                                    statutTexte = 'En route';
                                    statutClass = 'statut-transit';
                                } else if (t.status === 'delivered') {
                                    statutTexte = 'Livré';
                                    statutClass = 'statut-livre';
                                }
                                
                                html += `
                                    <div class="colis-item" onclick="changerStatut('${t.id}', '${t.status}')">
                                        <div class="colis-info">
                                            <div class="colis-numero">📦 ${t.order_number}</div>
                                            <div class="colis-adresse">${t.delivery_address?.substring(0, 50) || 'Adresse inconnue'}</div>
                                            <div style="font-size:11px; color:#aaa; margin-top:4px;">${t.destinataire_nom || 'Destinataire inconnu'}</div>
                                        </div>
                                        <span class="colis-statut ${statutClass}">${statutTexte}</span>
                                    </div>
                                `;
                            });
                        } else {
                            html = '<div style="text-align:center; padding:20px;">Aucun colis</div>';
                        }
                        
                        document.getElementById('colisList').innerHTML = html;
                        document.getElementById('colisAujourdhui').textContent = livresAujourdhui;
                        
                    } catch(e) {
                        console.error(e);
                    }
                }
                
                // ===== CHANGEMENT DE STATUT =====
                window.changerStatut = async function(id, statutActuel) {
                    try {
                        let nouveauStatut = '';
                        let message = '';
                        
                        if (statutActuel === 'pending') {
                            nouveauStatut = 'transit';
                            message = 'Colis pris en charge';
                        } else if (statutActuel === 'transit') {
                            nouveauStatut = 'delivered';
                            message = 'Colis livré avec succès';
                        } else {
                            alert('Ce colis est déjà livré');
                            return;
                        }
                        
                        if (confirm(`Passer ce colis en "${nouveauStatut}" ?`)) {
                            const { error } = await supabase
                                .from('transport_orders_simple')
                                .update({ status: nouveauStatut })
                                .eq('id', id);
                            
                            if (error) throw error;
                            
                            showMessage(`✅ ${message}`);
                            await chargerColis();
                        }
                        
                    } catch(e) {
                        alert('❌ Erreur: ' + e.message);
                    }
                };
                
                // ===== MESSAGE =====
                function showMessage(texte) {
                    const msg = document.createElement('div');
                    msg.className = 'success-message';
                    msg.innerHTML = texte;
                    document.body.appendChild(msg);
                    setTimeout(() => msg.remove(), 3000);
                }
                
                window.logout = function() {
                    localStorage.removeItem('chauffeur');
                    window.location.href = 'index.html';
                };
                
                // ===== LANCEMENT =====
                await chargerColis();
                
            } catch(e) {
                console.error("Erreur fatale:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
