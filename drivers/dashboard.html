<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Mon espace chauffeur</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <!-- À AJOUTER DANS LE <head> AVANT LE STYLE -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../dispatch/config.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body { background: #f1f5f9; min-height: 100vh; }
        
        .header {
            background: #0f172a; color: white; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #10b981;
        }
        .logo { font-size: 22px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .logo i { color: #10b981; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .user-badge { background: #1e293b; padding: 8px 16px; border-radius: 50px; display: flex; align-items: center; gap: 8px; }
        .user-badge i { color: #10b981; }
        .btn-logout { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        
        /* NOTIFICATIONS */
        .notif-bar {
            background: #3b82f6;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 15px;
            animation: slideDown 0.3s;
        }
        
        .notif-content {
            flex: 1;
        }
        
        .notif-actions {
            display: flex;
            gap: 10px;
        }
        
        .notif-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .notif-btn.accept { background: #10b981; color: white; }
        .notif-btn.decline { background: #ef4444; color: white; }
        
        /* TOURNÉE DU JOUR */
        .tour-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            border-left: 4px solid #10b981;
        }
        
        .tour-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .tour-title {
            font-size: 18px;
            font-weight: bold;
            color: #0f172a;
        }
        
        .tour-stats {
            display: flex;
            gap: 20px;
            color: #64748b;
            font-size: 14px;
        }
        
        .stop-list {
            margin-top: 15px;
        }
        
        .stop-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .stop-item:hover {
            background: #f8fafc;
        }
        
        .stop-item.completed {
            opacity: 0.6;
            background: #f1f5f9;
        }
        
        .stop-number {
            width: 30px;
            height: 30px;
            background: #10b981;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .stop-info {
            flex: 1;
        }
        
        .stop-name {
            font-weight: bold;
            color: #0f172a;
        }
        
        .stop-address {
            font-size: 13px;
            color: #64748b;
        }
        
        .stop-time {
            font-size: 12px;
            color: #10b981;
            margin-left: 15px;
        }
        
        .stop-status {
            width: 80px;
            text-align: center;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-completed { background: #dcfce7; color: #166534; }
        
        /* MODAL PREUVE LIVRAISON */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal-box {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 25px;
            border-radius: 10px;
        }
        
        .modal-box h3 {
            margin-bottom: 15px;
            color: #0f172a;
        }
        
        .photo-preview {
            width: 100%;
            height: 200px;
            background: #f1f5f9;
            border: 2px dashed #e2e8f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            cursor: pointer;
        }
        
        .photo-preview i {
            font-size: 40px;
            color: #94a3b8;
        }
        
        .photo-preview.has-photo {
            border: 2px solid #10b981;
        }
        
        .photo-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
/* Ajoutez ce CSS */
input[type="radio"] {
    width: 16px;
    height: 16px;
    accent-color: #ef4444;
}
        .signature-canvas {
            width: 100%;
            height: 150px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin: 15px 0;
            background: white;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #10b981; color: white; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        
        /* CARTE DE SUIVI */
        .map-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        #driver-map {
            height: 200px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="app">Chargement...</div>

    <!-- MODAL PREUVE LIVRAISON -->
    <div id="proofModal" class="modal">
        <div class="modal-box">
            <h3><i class="fas fa-camera"></i> Preuve de livraison</h3>
            
            <div id="photoPreview" class="photo-preview" onclick="prendrePhoto()">
                <i class="fas fa-camera"></i>
            </div>
            
            <canvas id="signatureCanvas" class="signature-canvas"></canvas>
            
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="fermerModal()">Annuler</button>
                <button class="btn btn-primary" onclick="validerLivraison()">Valider</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log("🚀 Espace chauffeur...");
                
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                const chauffeurData = JSON.parse(localStorage.getItem('chauffeur'));
                if (!chauffeurData || !chauffeurData.loggedIn) {
                    window.location.href = 'index.html';
                    return;
                }
                
                // ===== DONNÉES =====
                let tourneeActive = null;
                let intervalGPS = null;
                let signatureCanvas = null;
                let signatureContext = null;
                let isDrawing = false;
                let photoData = null;
                let currentStopId = null;
                
                const depot = {
                    lat: 46.7785,
                    lng: 6.6411
                };
                
                // ===== INIT CANVAS SIGNATURE =====
                function initSignature() {
                    signatureCanvas = document.getElementById('signatureCanvas');
                    if (!signatureCanvas) return;
                    
                    signatureContext = signatureCanvas.getContext('2d');
                    signatureContext.strokeStyle = '#0f172a';
                    signatureContext.lineWidth = 2;
                    
                    signatureCanvas.addEventListener('mousedown', startDrawing);
                    signatureCanvas.addEventListener('mousemove', draw);
                    signatureCanvas.addEventListener('mouseup', stopDrawing);
                    signatureCanvas.addEventListener('mouseleave', stopDrawing);
                }
                
                function startDrawing(e) {
                    isDrawing = true;
                    const rect = signatureCanvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    signatureContext.beginPath();
                    signatureContext.moveTo(x, y);
                }
                
                function draw(e) {
                    if (!isDrawing) return;
                    e.preventDefault();
                    const rect = signatureCanvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    signatureContext.lineTo(x, y);
                    signatureContext.stroke();
                }
                
                function stopDrawing() {
                    isDrawing = false;
                }
                
                // ===== PRENDRE PHOTO =====
                window.prendrePhoto = function() {
                    // Simuler appareil photo
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = function(e) {
                        const file = e.target.files[0];
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            photoData = event.target.result;
                            const preview = document.getElementById('photoPreview');
                            preview.innerHTML = `<img src="${photoData}" style="width:100%; height:100%; object-fit:cover;">`;
                            preview.classList.add('has-photo');
                        };
                        reader.readAsDataURL(file);
                    };
                    input.click();
                };
                
                // ===== OUVRIR MODAL LIVRAISON =====
                window.ouvrirModalLivraison = function(stopId) {
                    currentStopId = stopId;
                    document.getElementById('proofModal').style.display = 'flex';
                    setTimeout(initSignature, 100);
                };
                
                window.fermerModal = function() {
                    document.getElementById('proofModal').style.display = 'none';
                };
                
                window.validerLivraison = async function() {
                    // Marquer l'arrêt comme livré
                    if (currentStopId) {
                        // Mettre à jour le statut
                        const stop = tourneeActive?.stops?.find(s => s.id === currentStopId);
                        if (stop) {
                            stop.status = 'completed';
                            showMessage('✅ Livraison validée');
                        }
                    }
                    
                    fermerModal();
                    afficherPage();
                };
                
                // ===== DÉMARRER GPS =====
                function demarrerGPS() {
                    if (navigator.geolocation) {
                        intervalGPS = setInterval(() => {
                            navigator.geolocation.getCurrentPosition(async (position) => {
                                const { latitude, longitude } = position.coords;
                                
                                // Envoyer position à Supabase
                                await supabase
                                    .from('driver_positions')
                                    .upsert({
                                        chauffeur_id: chauffeurData.id,
                                        lat: latitude,
                                        lng: longitude,
                                        updated_at: new Date()
                                    });
                                    
                                console.log(`📍 Position mise à jour: ${latitude}, ${longitude}`);
                            });
                        }, 10000); // Toutes les 10 secondes
                    }
                }
                
                // ===== CHARGER TOURNÉE =====
                async function loadTournee() {
                    // Simuler une tournée (à remplacer par Supabase)
                    tourneeActive = {
                        id: 1,
                        nom: "Tournée Lausanne",
                        chauffeur: chauffeurData.id,
                        stats: { distance: 156, duree: 270, poids: 124 },
                        stops: [
                            { id: 's1', nom: 'Dupont Jean', adresse: 'Rue du Lac 12, Lausanne', heure: '08:45', status: 'pending' },
                            { id: 's2', nom: 'Martin SA', adresse: 'Place de la Gare 5, Genève', heure: '09:30', status: 'pending' },
                            { id: 's3', nom: 'Bernard & Cie', adresse: 'Grand-Rue 8, Berne', heure: '10:15', status: 'pending' }
                        ]
                    };
                    
                    afficherPage();
                }
                
                // ===== AFFICHAGE =====
                function afficherPage() {
                    document.getElementById('app').innerHTML = `
                        <div class="header">
                            <div class="logo"><i class="fas fa-truck"></i> Léman-Courses</div>
                            <div class="user-section">
                                <div class="user-badge"><i class="fas fa-user"></i> ${chauffeurData.prenom} ${chauffeurData.nom}</div>
                                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
                            </div>
                        </div>
                        
                        <div class="container">
                            <!-- NOTIFICATION NOUVELLE TOURNÉE -->
                            <div class="notif-bar" id="notifBar">
                                <div class="notif-content">
                                    <strong>🔔 Nouvelle tournée assignée !</strong><br>
                                    <span>Tournée Lausanne - 3 livraisons</span>
                                </div>
                                <div class="notif-actions">
                                    <button class="notif-btn accept" onclick="accepterTournee()">Accepter</button>
                                   // Dans la notification, remplacez le bouton decline par :
                                   <button class="notif-btn decline" onclick="refuserTournee()">❌ Refuser</button>
                                </div>
                            </div>
                            
                            <!-- CARTE DE SUIVI -->
                            <div class="map-section">
                                <h3><i class="fas fa-map-marked-alt"></i> Ma position</h3>
                                <div id="driver-map"></div>
                            </div>
                            
                            <!-- TOURNÉE ACTIVE -->
                            ${tourneeActive ? `
                                <div class="tour-card">
                                    <div class="tour-header">
                                        <span class="tour-title">🚚 ${tourneeActive.nom}</span>
                                        <div class="tour-stats">
                                            <span><i class="fas fa-road"></i> ${tourneeActive.stats.distance} km</span>
                                            <span><i class="fas fa-clock"></i> ${Math.floor(tourneeActive.stats.duree/60)}h${tourneeActive.stats.duree%60}</span>
                                            <span><i class="fas fa-weight"></i> ${tourneeActive.stats.poids} kg</span>
                                        </div>
                                    </div>
                                    
                                    <div class="stop-list">
                                        ${tourneeActive.stops.map((stop, index) => `
                                            <div class="stop-item ${stop.status === 'completed' ? 'completed' : ''}" 
                                                 onclick="${stop.status !== 'completed' ? `ouvrirModalLivraison('${stop.id}')` : ''}">
                                                <div class="stop-number">${index + 1}</div>
                                                <div class="stop-info">
                                                    <div class="stop-name">${stop.nom}</div>
                                                    <div class="stop-address">📍 ${stop.adresse}</div>
                                                </div>
                                                <div class="stop-time">🕐 ${stop.heure}</div>
                                                <div class="stop-status status-${stop.status}">
                                                    ${stop.status === 'completed' ? 'Livré' : 'En attente'}
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : `
                                <div style="text-align:center; padding:40px; background:white; border-radius:12px;">
                                    <i class="fas fa-clock" style="font-size:50px; color:#94a3b8;"></i>
                                    <h3 style="margin:15px 0; color:#0f172a;">Aucune tournée en cours</h3>
                                    <p style="color:#64748b;">Vous serez notifié dès qu'une tournée vous sera assignée.</p>
                                </div>
                            `}
                        </div>
                        // ===== MODAL DE REFUS =====
window.refuserTournee = function() {
    document.getElementById('notifBar').style.display = 'none';
    
    // Créer le modal de refus
    const modalHtml = `
        <div id="refusModal" class="modal" style="display:flex;">
            <div class="modal-box" style="max-width:400px;">
                <h3 style="margin-bottom:15px; color:#0f172a;">❌ Refuser la tournée</h3>
                
                <div style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:8px; font-weight:bold;">Raison du refus :</label>
                    
                    <div style="margin-bottom:10px;">
                        <label style="display:flex; align-items:center; gap:8px; padding:8px; background:#f8fafc; border-radius:4px;">
                            <input type="radio" name="refusReason" value="maladie" checked>
                            <span>🦠 Maladie / Pas disponible</span>
                        </label>
                    </div>
                    
                    <div style="margin-bottom:10px;">
                        <label style="display:flex; align-items:center; gap:8px; padding:8px; background:#f8fafc; border-radius:4px;">
                            <input type="radio" name="refusReason" value="vehicule">
                            <span>🔧 Problème véhicule</span>
                        </label>
                    </div>
                    
                    <div style="margin-bottom:10px;">
                        <label style="display:flex; align-items:center; gap:8px; padding:8px; background:#f8fafc; border-radius:4px;">
                            <input type="radio" name="refusReason" value="horaire">
                            <span>⏰ Horaire incompatible</span>
                        </label>
                    </div>
                    
                    <div style="margin-bottom:10px;">
                        <label style="display:flex; align-items:center; gap:8px; padding:8px; background:#f8fafc; border-radius:4px;">
                            <input type="radio" name="refusReason" value="charge">
                            <span>⚖️ Charge trop lourde</span>
                        </label>
                    </div>
                    
                    <div style="margin-bottom:10px;">
                        <label style="display:flex; align-items:center; gap:8px; padding:8px; background:#f8fafc; border-radius:4px;">
                            <input type="radio" name="refusReason" value="autre">
                            <span>📝 Autre raison</span>
                        </label>
                    </div>
                </div>
                
                <div id="autreRaisonDiv" style="display:none; margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px;">Précisez :</label>
                    <input type="text" id="autreRaison" placeholder="Votre raison..." style="width:100%; padding:8px; border:1px solid #e2e8f0; border-radius:4px;">
                </div>
                
                <div class="modal-actions" style="display:flex; gap:10px;">
                    <button class="btn btn-secondary" onclick="annulerRefus()" style="flex:1;">Annuler</button>
                    <button class="btn btn-primary" onclick="confirmerRefus()" style="flex:1; background:#ef4444;">Confirmer refus</button>
                </div>
            </div>
        </div>
    `;
    
    // Ajouter le modal à la page
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    
    // Gestion de l'affichage du champ "Autre"
    document.querySelectorAll('input[name="refusReason"]').forEach(radio => {
        radio.addEventListener('change', function() {
            document.getElementById('autreRaisonDiv').style.display = 
                this.value === 'autre' ? 'block' : 'none';
        });
    });
};

// ===== ANNULER REFUS =====
window.annulerRefus = function() {
    document.getElementById('refusModal').remove();
    // Remontrer la notification
    document.getElementById('notifBar').style.display = 'flex';
};

// ===== CONFIRMER REFUS =====
window.confirmerRefus = async function() {
    const raison = document.querySelector('input[name="refusReason"]:checked')?.value;
    let raisonTexte = '';
    
    switch(raison) {
        case 'maladie': raisonTexte = 'Maladie / Pas disponible'; break;
        case 'vehicule': raisonTexte = 'Problème véhicule'; break;
        case 'horaire': raisonTexte = 'Horaire incompatible'; break;
        case 'charge': raisonTexte = 'Charge trop lourde'; break;
        case 'autre': raisonTexte = document.getElementById('autreRaison')?.value || 'Autre raison'; break;
        default: raisonTexte = 'Raison non spécifiée';
    }
    
    try {
        // Envoyer le refus à Supabase
        const { error } = await supabase
            .from('refus_tournees')
            .insert([{
                chauffeur_id: chauffeurData.id,
                tournee_id: tourneeActive?.id || null,
                raison: raisonTexte,
                date: new Date()
            }]);
        
        if (error) throw error;
        
        showMessage('✅ Refus enregistré', '#ef4444');
        document.getElementById('refusModal')?.remove();
        
        // La tournée est retirée
        tourneeActive = null;
        afficherPage();
        
    } catch(e) {
        console.error("Erreur refus:", e);
        showMessage('❌ Erreur: ' + e.message, '#ef4444');
    }
};
                
           // ===== INIT CARTE =====
function initMap() {
    if (typeof L === 'undefined') {
        console.error("❌ Leaflet non chargé !");
        return;
    }
    
    const map = L.map('driver-map').setView([46.8, 8.2], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    // Position du chauffeur
    L.marker([46.52, 6.63]).addTo(map).bindPopup('Ma position');
    
    // Points de livraison
    if (tourneeActive) {
        tourneeActive.stops.forEach((stop, i) => {
            let lat = 46.52, lng = 6.63;
            if (stop.adresse.includes('Genève')) { lat = 46.20; lng = 6.14; }
            if (stop.adresse.includes('Berne')) { lat = 46.95; lng = 7.45; }
            
            const color = stop.status === 'completed' ? '#10b981' : '#3b82f6';
            L.circleMarker([lat, lng], {
                radius: 8,
                fillColor: color,
                color: '#fff',
                weight: 2,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(stop.nom);
        });
    }
}
                
                // ===== NOTIFICATIONS =====
                window.accepterTournee = function() {
                    document.getElementById('notifBar').style.display = 'none';
                    showMessage('✅ Tournée acceptée');
                    demarrerGPS();
                };
                
                window.refuserTournee = function() {
                    document.getElementById('notifBar').style.display = 'none';
                    showMessage('❌ Tournée refusée');
                };
                
                function showMessage(texte) {
                    const msg = document.createElement('div');
                    msg.style.position = 'fixed';
                    msg.style.top = '20px';
                    msg.style.right = '20px';
                    msg.style.background = '#10b981';
                    msg.style.color = 'white';
                    msg.style.padding = '15px 25px';
                    msg.style.borderRadius = '8px';
                    msg.style.zIndex = '3000';
                    msg.innerHTML = texte;
                    document.body.appendChild(msg);
                    setTimeout(() => msg.remove(), 3000);
                }
                
                window.logout = function() {
                    localStorage.removeItem('chauffeur');
                    window.location.href = 'index.html';
                };
                
                // ===== LANCEMENT =====
                await loadTournee();
                
                // Simuler une notification après 3 secondes
                setTimeout(() => {
                    document.getElementById('notifBar').style.display = 'flex';
                }, 3000);
                
            } catch(e) {
                console.error("Erreur:", e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
