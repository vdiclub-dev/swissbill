<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Espace chauffeur</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../dispatch/config.js"></script>
    
    <style>
        /* ===== STYLES SIMPLIFIÉS ===== */
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body { background:#f1f5f9; min-height:100vh; }
        
        /* HEADER */
        .header {
            background:#0f172a; color:white; padding:15px 30px;
            display:flex; justify-content:space-between; align-items:center;
            border-bottom:3px solid #10b981; height:70px;
        }
        .logo { font-size:22px; font-weight:bold; display:flex; align-items:center; gap:10px; }
        .logo i { color:#10b981; }
        .user-badge { background:#1e293b; padding:8px 16px; border-radius:50px; display:flex; align-items:center; gap:8px; }
        .btn-logout { background:#10b981; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; }
        
        .container { max-width:1200px; margin:20px auto; padding:0 15px; }
        
        /* NOTIFICATION */
        .notif-bar {
            background:#3b82f6; color:white; padding:15px; border-radius:8px; margin-bottom:20px;
            display:none; align-items:center; gap:15px; animation:slideDown 0.3s;
        }
        .notif-btn {
            padding:8px 16px; border:none; border-radius:4px; cursor:pointer; font-weight:bold;
        }
        .notif-btn.accept { background:#10b981; color:white; }
        .notif-btn.decline { background:#ef4444; color:white; }
        
        /* TOURNÉE */
        .tour-card {
            background:white; border-radius:12px; padding:20px; margin-bottom:20px;
            border-left:4px solid #10b981;
        }
        .tour-stats {
            display:flex; gap:20px; background:#f8fafc; padding:10px; border-radius:8px;
            margin:15px 0; font-size:14px;
        }
        .stop-item {
            display:flex; align-items:center; padding:12px; border-bottom:1px solid #e2e8f0;
            cursor:pointer;
        }
        .stop-item:hover { background:#f8fafc; }
        .stop-number {
            width:30px; height:30px; background:#10b981; color:white; border-radius:50%;
            display:flex; align-items:center; justify-content:center; margin-right:15px;
        }
        .stop-status {
            padding:4px 8px; border-radius:20px; font-size:11px; font-weight:600;
        }
        .status-pending { background:#fef3c7; color:#92400e; }
        .status-completed { background:#dcfce7; color:#166534; }
        
        /* CARTE */
        .map-section { background:white; border-radius:12px; padding:20px; margin-bottom:20px; }
        #driver-map { height:200px; border-radius:8px; margin-top:10px; }
        
        /* MODAL */
        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.8); align-items:center; justify-content:center; z-index:2000;
        }
        .modal-box {
            background:white; width:90%; max-width:500px; padding:25px; border-radius:10px;
        }
        .photo-preview {
            width:100%; height:200px; background:#f1f5f9; border:2px dashed #e2e8f0;
            border-radius:8px; display:flex; align-items:center; justify-content:center;
            margin:15px 0; cursor:pointer;
        }
        .signature-canvas {
            width:100%; height:150px; border:2px solid #e2e8f0; border-radius:8px; margin:15px 0;
            background:white; cursor:crosshair;
        }
        
        @keyframes slideDown {
            from { transform:translateY(-100%); opacity:0; }
            to { transform:translateY(0); opacity:1; }
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <!-- MODAL PREUVE -->
    <div id="proofModal" class="modal">
        <div class="modal-box">
            <h3 style="margin-bottom:15px;">📸 Preuve de livraison</h3>
            <div id="photoPreview" class="photo-preview" onclick="prendrePhoto()">
                <i class="fas fa-camera"></i>
            </div>
            <canvas id="signatureCanvas" class="signature-canvas"></canvas>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" onclick="fermerModal()" style="flex:1; padding:10px; background:#e2e8f0;">Annuler</button>
                <button class="btn" onclick="validerLivraison()" style="flex:1; padding:10px; background:#10b981; color:white;">Valider</button>
            </div>
        </div>
    </div>

    <!-- MODAL REFUS -->
    <div id="refusModal" class="modal">
        <div class="modal-box">
            <h3 style="margin-bottom:15px;">❌ Refuser la tournée</h3>
            <div style="margin-bottom:15px;">
                <div style="padding:8px; background:#f8fafc; border-radius:4px; margin-bottom:8px;">
                    <input type="radio" name="refusReason" value="maladie" checked> 🦠 Maladie
                </div>
                <div style="padding:8px; background:#f8fafc; border-radius:4px; margin-bottom:8px;">
                    <input type="radio" name="refusReason" value="vehicule"> 🔧 Problème véhicule
                </div>
                <div style="padding:8px; background:#f8fafc; border-radius:4px; margin-bottom:8px;">
                    <input type="radio" name="refusReason" value="horaire"> ⏰ Horaire incompatible
                </div>
                <div style="padding:8px; background:#f8fafc; border-radius:4px; margin-bottom:8px;">
                    <input type="radio" name="refusReason" value="autre"> 📝 Autre
                </div>
            </div>
            <div id="autreRaisonDiv" style="display:none; margin-bottom:15px;">
                <input type="text" id="autreRaison" placeholder="Précisez..." style="width:100%; padding:8px; border:1px solid #e2e8f0; border-radius:4px;">
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="annulerRefus()" style="flex:1; padding:10px; background:#e2e8f0;">Annuler</button>
                <button onclick="confirmerRefus()" style="flex:1; padding:10px; background:#ef4444; color:white;">Confirmer</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // ===== CONFIG =====
                if (!window.SUPABASE_CONFIG) throw new Error("config.js manquant");
                
                const supabase = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.key
                );
                
                // ===== CHAUFFEUR =====
                const chauffeurData = JSON.parse(localStorage.getItem('chauffeur'));
                if (!chauffeurData || !chauffeurData.loggedIn) {
                    window.location.href = 'index.html';
                    return;
                }
                
                // ===== VARIABLES =====
                let tourneeActive = null;
                let intervalGPS = null;
                let signatureCanvas, signatureCtx;
                let isDrawing = false;
                let photoData = null;
                let currentStopId = null;
                
                // ===== 1. CHARGER TOURNÉE =====
                async function loadTournee() {
                    const today = new Date().toISOString().split('T')[0];
                    
                    const { data } = await supabase
                        .from('tournees')
                        .select('*, stops(*)')
                        .eq('chauffeur_id', chauffeurData.id)
                        .eq('date', today)
                        .eq('statut', 'pending')
                        .maybeSingle();
                    
                    if (data) {
                        tourneeActive = {
                            id: data.id,
                            nom: data.nom,
                            stats: {
                                distance: data.distance_km || 0,
                                duree: data.duree_min || 0,
                                poids: data.poids_kg || 0
                            },
                            stops: data.stops || []
                        };
                    }
                    afficherPage();
                }
                
                // ===== 2. AFFICHAGE =====
                function afficherPage() {
                    document.getElementById('app').innerHTML = `
                        <div class="header">
                            <div class="logo"><i class="fas fa-truck"></i> Léman-Courses</div>
                            <div class="user-badge"><i class="fas fa-user"></i> ${chauffeurData.prenom} ${chauffeurData.nom}
                                <button class="btn-logout" onclick="logout()">Déconnexion</button>
                            </div>
                        </div>
                        
                        <div class="container">
                            ${!tourneeActive ? `
                                <div class="notif-bar" id="notifBar">
                                    <div class="notif-content">
                                        <strong>🔔 Nouvelle tournée !</strong><br>
                                        <span>Tournée disponible</span>
                                    </div>
                                    <div>
                                        <button class="notif-btn accept" onclick="accepterTournee()">Accepter</button>
                                        <button class="notif-btn decline" onclick="refuserTournee()">Refuser</button>
                                    </div>
                                </div>
                            ` : ''}
                            
                            <div class="map-section">
                                <h3>🗺️ Ma position</h3>
                                <div id="driver-map"></div>
                            </div>
                            
                            ${tourneeActive ? `
                                <div class="tour-card">
                                    <h3>🚚 ${tourneeActive.nom}</h3>
                                    <div class="tour-stats">
                                        <span>📏 ${tourneeActive.stats.distance} km</span>
                                        <span>⏱️ ${Math.floor(tourneeActive.stats.duree/60)}h${tourneeActive.stats.duree%60}</span>
                                        <span>⚖️ ${tourneeActive.stats.poids} kg</span>
                                    </div>
                                    ${tourneeActive.stops.map((stop, i) => `
                                        <div class="stop-item" onclick="ouvrirLivraison('${stop.id}')">
                                            <div class="stop-number">${i+1}</div>
                                            <div style="flex:1">
                                                <div>${stop.client_nom || 'Client'}</div>
                                                <div style="font-size:12px; color:#666;">${stop.client_adresse || ''}</div>
                                            </div>
                                            <div class="stop-status status-${stop.statut || 'pending'}">
                                                ${stop.statut === 'completed' ? '✓ Livré' : '⏳ En attente'}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : `
                                <div style="text-align:center; padding:40px; background:white; border-radius:12px;">
                                    <i class="fas fa-clock" style="font-size:50px; color:#94a3b8;"></i>
                                    <h3 style="margin:15px 0;">Aucune tournée en cours</h3>
                                </div>
                            `}
                        </div>
                    `;
                    
                    if (tourneeActive) initMap();
                }
                
                // ===== 3. CARTE =====
                function initMap() {
                    const map = L.map('driver-map').setView([46.8, 8.2], 8);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    L.marker([46.52, 6.63]).addTo(map).bindPopup('Ma position');
                }
                
                // ===== 4. ACTIONS =====
                window.accepterTournee = async function() {
                    document.getElementById('notifBar').style.display = 'none';
                    showMessage('✅ Tournée acceptée');
                };
                
                window.refuserTournee = function() {
                    document.getElementById('refusModal').style.display = 'flex';
                };
                
                window.annulerRefus = function() {
                    document.getElementById('refusModal').style.display = 'none';
                };
                
                window.confirmerRefus = function() {
                    document.getElementById('refusModal').style.display = 'none';
                    showMessage('❌ Refus enregistré');
                };
                
                window.ouvrirLivraison = function(stopId) {
                    currentStopId = stopId;
                    document.getElementById('proofModal').style.display = 'flex';
                    setTimeout(initSignature, 100);
                };
                
                window.fermerModal = function() {
                    document.getElementById('proofModal').style.display = 'none';
                };
                
                window.prendrePhoto = function() {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = (e) => {
                        const file = e.target.files[0];
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            photoData = event.target.result;
                            document.getElementById('photoPreview').innerHTML = `<img src="${photoData}" style="width:100%;">`;
                        };
                        reader.readAsDataURL(file);
                    };
                    input.click();
                };
                
                window.validerLivraison = function() {
                    showMessage('✅ Livraison validée');
                    fermerModal();
                };
                
                // ===== 5. SIGNATURE =====
                function initSignature() {
                    signatureCanvas = document.getElementById('signatureCanvas');
                    if (!signatureCanvas) return;
                    
                    signatureCtx = signatureCanvas.getContext('2d');
                    signatureCtx.strokeStyle = '#000';
                    signatureCtx.lineWidth = 2;
                    
                    signatureCanvas.addEventListener('mousedown', (e) => {
                        isDrawing = true;
                        const rect = signatureCanvas.getBoundingClientRect();
                        signatureCtx.beginPath();
                        signatureCtx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
                    });
                    
                    signatureCanvas.addEventListener('mousemove', (e) => {
                        if (!isDrawing) return;
                        const rect = signatureCanvas.getBoundingClientRect();
                        signatureCtx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                        signatureCtx.stroke();
                    });
                    
                    signatureCanvas.addEventListener('mouseup', () => isDrawing = false);
                    signatureCanvas.addEventListener('mouseleave', () => isDrawing = false);
                }
                
                // ===== 6. MESSAGE =====
                function showMessage(msg, color = '#10b981') {
                    const toast = document.createElement('div');
                    toast.style.cssText = `
                        position:fixed; top:20px; right:20px; background:${color};
                        color:white; padding:15px 25px; border-radius:8px; z-index:3000;
                    `;
                    toast.textContent = msg;
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 3000);
                }
                
                // ===== 7. DÉCONNEXION =====
                window.logout = function() {
                    if (intervalGPS) clearInterval(intervalGPS);
                    localStorage.removeItem('chauffeur');
                    window.location.href = 'index.html';
                };
                
                // ===== DÉMARRAGE =====
                await loadTournee();
                
            } catch(e) {
                console.error(e);
                document.body.innerHTML = `<div style="color:red; padding:20px;">❌ ${e.message}</div>`;
            }
        });
    </script>
    
</body>
</html>
