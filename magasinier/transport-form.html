<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colixo - Nouveau Transport Magasinier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script data-cfasync="false" src="../config.js?v=20260462"></script>
    <script>
        // Utiliser le client Supabase déjà initialisé
        if (window.SUPABASE_CLIENT) {
            window.db = window.SUPABASE_CLIENT;
        } else {
            console.error('Client Supabase non disponible');
        }
    </script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --radius: 12px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .header {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: var(--radius) var(--radius) 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .close-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .form-container {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            color: var(--primary);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 5px;
        }
        
        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        
        .colis-list {
            margin-top: 15px;
        }
        
        .colis-item {
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .colis-info {
            flex: 1;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .colis-field {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .colis-field input {
            width: 80px;
            padding: 5px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        
        .remove-colis {
            background: var(--danger);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .add-colis-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: background 0.2s;
        }
        
        .add-colis-btn:hover {
            background: #16a34a;
        }
        
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .service-option {
            background: var(--light);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .service-option:hover {
            border-color: var(--primary);
        }
        
        .service-option.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .service-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .service-name {
            font-size: 12px;
            font-weight: 500;
        }
        
        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        
        .submit-btn:hover {
            background: var(--primary-dark);
        }
        
        .submit-btn:disabled {
            background: var(--secondary);
            cursor: not-allowed;
        }
        
        .prices {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .price-row.total {
            font-weight: 600;
            font-size: 16px;
            border-top: 1px solid var(--border);
            padding-top: 8px;
            margin-top: 8px;
        }
        
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .service-grid {
                grid-template-columns: 1fr;
            }
            .colis-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-truck"></i> Nouveau Transport</h1>
            <button class="close-btn" onclick="window.close()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="form-container">
            <form id="transportForm">
                <!-- Destinataire -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-user"></i>
                        Destinataire
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Nom complet *</label>
                            <input type="text" class="form-input" id="destinataireNom" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Téléphone *</label>
                            <input type="tel" class="form-input" id="destTel" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Instructions spécifiques</label>
                        <input type="text" class="form-input" id="destInstructions" placeholder="Étage, interphone, etc.">
                    </div>
                </div>
                
                <!-- Adresses -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-map-marker-alt"></i>
                        Adresses
                    </div>
                    <div class="form-group">
                        <label class="form-label">Adresse d'enlèvement *</label>
                        <input type="text" class="form-input" id="pickupAddress" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">NPA enlèvement *</label>
                            <input type="text" class="form-input" id="pickupNpa" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Ville enlèvement *</label>
                            <input type="text" class="form-input" id="pickupVille" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Adresse de livraison *</label>
                        <input type="text" class="form-input" id="livAdresse" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">NPA livraison *</label>
                            <input type="text" class="form-input" id="livNpa" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Ville livraison *</label>
                            <input type="text" class="form-input" id="livVille" required>
                        </div>
                    </div>
                </div>
                
                <!-- Colis -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-box"></i>
                        Colis
                    </div>
                    <div class="colis-list" id="colisList">
                        <div class="colis-item">
                            <div class="colis-info">
                                <div class="colis-field">
                                    <label>Poids:</label>
                                    <input type="number" step="0.1" min="0.1" class="colis-poids" value="1">
                                    <span>kg</span>
                                </div>
                                <div class="colis-field">
                                    <label>Qté:</label>
                                    <input type="number" min="1" class="colis-qty" value="1">
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="add-colis-btn" onclick="addColis()">
                        <i class="fas fa-plus"></i>
                        Ajouter un colis
                    </button>
                </div>
                
                <!-- Service -->
                <div class="section">
                    <div class="section-title">
                        <i class="fas fa-shipping-fast"></i>
                        Type de service
                    </div>
                    <div class="service-grid">
                        <div class="service-option selected" data-service="standard" onclick="selectService('standard')">
                            <div class="service-icon">📦</div>
                            <div class="service-name">Standard</div>
                        </div>
                        <div class="service-option" data-service="express" onclick="selectService('express')">
                            <div class="service-icon">🚀</div>
                            <div class="service-name">Express</div>
                        </div>
                        <div class="service-option" data-service="night" onclick="selectService('night')">
                            <div class="service-icon">🌙</div>
                            <div class="service-name">Nuit</div>
                        </div>
                    </div>
                </div>
                
                <!-- Prix (masqué pour le magasinier) -->
                <div class="section" style="display: none;">
                    <div class="prices">
                        <div class="price-row">
                            <span>Prix HT:</span>
                            <span id="priceHT">0.00 CHF</span>
                        </div>
                        <div class="price-row">
                            <span>TVA (8%):</span>
                            <span id="priceTVA">0.00 CHF</span>
                        </div>
                        <div class="price-row total">
                            <span>Total TTC:</span>
                            <span id="priceTTC">0.00 CHF</span>
                        </div>
                    </div>
                </div>
                
                <!-- Submit -->
                <div class="section">
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-check"></i>
                        Créer le transport
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Variables globales
        let currentUser = null;
        let selectedService = 'standard';
        let colisList = [{id: 1, poids: 1, qty: 1}];
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const { data: { session } } = await db.auth.getSession();
                var uid = session && session.user ? session.user.id : null;
                if (!uid) {
                    try {
                        var rawCu = localStorage.getItem('colixo_user');
                        if (rawCu) {
                            var parsed = JSON.parse(rawCu);
                            if (parsed && parsed.id && parsed.role === 'magasinier') uid = parsed.id;
                        }
                    } catch (e) {}
                }
                if (!uid) {
                    window.location.href = '../login/index.html';
                    return;
                }
                const { data: user } = await db
                    .from('utilisateurs')
                    .select('*')
                    .eq('id', uid)
                    .maybeSingle();
                if (!user || user.role !== 'magasinier') {
                    try { await db.auth.signOut(); } catch (e) {}
                    try { localStorage.removeItem('colixo_user'); } catch (e) {}
                    window.location.href = '../login/index.html';
                    return;
                }
                currentUser = user;
                
                // Charger l'adresse d'enlèvement automatiquement
                await loadPickupAddress();
                
                // Initialiser les événements
                initEventListeners();
                
            } catch (error) {
                console.error('Erreur initialisation:', error);
                alert('Erreur lors du chargement');
            }
        });
        
        async function loadPickupAddress() {
            if (!currentUser) return;
            
            try {
                // Récupérer l'adresse de l'entreprise/du magasinier
                if (currentUser.entreprise_id && currentUser.entreprise_id !== currentUser.id) {
                    // Utilisateur d'entreprise → charger l'adresse de l'entreprise
                    const { data: entreprise } = await db
                        .from('entreprises')
                        .select('adresse, npa, ville')
                        .eq('id', currentUser.entreprise_id)
                        .single();
                    
                    if (entreprise) {
                        document.getElementById('pickupAddress').value = entreprise.adresse || '';
                        document.getElementById('pickupNpa').value = entreprise.npa || '';
                        document.getElementById('pickupVille').value = entreprise.ville || '';
                    }
                } else {
                    // Utilisateur individuel → charger son adresse
                    const { data: addresses } = await db
                        .from('client_addresses')
                        .select('adresse, npa, ville')
                        .eq('created_by', currentUser.id)
                        .order('created_at', { ascending: false })
                        .limit(1);
                    
                    if (addresses && addresses.length > 0) {
                        const addr = addresses[0];
                        document.getElementById('pickupAddress').value = addr.adresse || '';
                        document.getElementById('pickupNpa').value = addr.npa || '';
                        document.getElementById('pickupVille').value = addr.ville || '';
                    }
                }
            } catch (error) {
                console.error('Erreur chargement adresse enlèvement:', error);
            }
        }
        
        function initEventListeners() {
            // Formulaire
            document.getElementById('transportForm').addEventListener('submit', handleSubmit);
            
            // Auto-calculation prix (masqué mais fonctionnel)
            document.addEventListener('input', updatePrices);
        }
        
        function selectService(service) {
            selectedService = service;
            document.querySelectorAll('.service-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.service === service);
            });
            updatePrices();
        }
        
        function addColis() {
            const newId = Date.now();
            colisList.push({id: newId, poids: 1, qty: 1});
            renderColis();
        }
        
        function removeColis(id) {
            if (colisList.length > 1) {
                colisList = colisList.filter(c => c.id !== id);
                renderColis();
            }
        }
        
        function renderColis() {
            const container = document.getElementById('colisList');
            container.innerHTML = colisList.map((colis, index) => `
                <div class="colis-item">
                    <div class="colis-info">
                        <div class="colis-field">
                            <label>Poids:</label>
                            <input type="number" step="0.1" min="0.1" class="colis-poids" value="${colis.poids}" onchange="updateColis(${colis.id}, 'poids', this.value)">
                            <span>kg</span>
                        </div>
                        <div class="colis-field">
                            <label>Qté:</label>
                            <input type="number" min="1" class="colis-qty" value="${colis.qty}" onchange="updateColis(${colis.id}, 'qty', this.value)">
                        </div>
                    </div>
                    ${colisList.length > 1 ? `
                        <button type="button" class="remove-colis" onclick="removeColis(${colis.id})">
                            <i class="fas fa-times"></i>
                        </button>
                    ` : ''}
                </div>
            `).join('');
        }
        
        function updateColis(id, field, value) {
            const colis = colisList.find(c => c.id === id);
            if (colis) {
                colis[field] = parseFloat(value) || 1;
                updatePrices();
            }
        }
        
        function updatePrices() {
            // Simulation de calcul (à adapter avec les vrais tarifs)
            const poidsTotal = colisList.reduce((sum, c) => sum + (c.poids * c.qty), 0);
            let prixUnitaire = 10; // Prix standard par kg
            
            if (selectedService === 'express') prixUnitaire = 15;
            if (selectedService === 'night') prixUnitaire = 20;
            
            const prixHT = poidsTotal * prixUnitaire;
            const prixTVA = prixHT * 0.08;
            const prixTTC = prixHT + prixTVA;
            
            document.getElementById('priceHT').textContent = prixHT.toFixed(2) + ' CHF';
            document.getElementById('priceTVA').textContent = prixTVA.toFixed(2) + ' CHF';
            document.getElementById('priceTTC').textContent = prixTTC.toFixed(2) + ' CHF';
        }
        
        async function handleSubmit(e) {
            e.preventDefault();
            
            // Validation
            const destinataireNom = document.getElementById('destinataireNom').value.trim();
            const destTel = document.getElementById('destTel').value.trim();
            const pickupAddress = document.getElementById('pickupAddress').value.trim();
            const pickupNpa = document.getElementById('pickupNpa').value.trim();
            const pickupVille = document.getElementById('pickupVille').value.trim();
            const livAdresse = document.getElementById('livAdresse').value.trim();
            const livNpa = document.getElementById('livNpa').value.trim();
            const livVille = document.getElementById('livVille').value.trim();
            
            if (!destinataireNom || !destTel || !pickupAddress || !pickupNpa || !pickupVille || !livAdresse || !livNpa || !livVille) {
                alert('Veuillez remplir tous les champs obligatoires');
                return;
            }
            
            // Préparation des données
            const poidsTotal = colisList.reduce((sum, c) => sum + (c.poids * c.qty), 0);
            const qtyTotal = colisList.reduce((sum, c) => sum + c.qty, 0);
            const prixTotal = parseFloat(document.getElementById('priceTTC').textContent) || 0;
            
            const orderData = {
                order_number: 'MAG-' + Date.now(),
                entreprise_id: currentUser.id,
                pickup_address: `${pickupAddress}, ${pickupNpa} ${pickupVille}`,
                delivery_address: `${destinataireNom} - ${livAdresse}, ${livNpa} ${livVille}, Suisse`,
                destinataire_nom: destinataireNom,
                destinataire_tel: destTel,
                weight: poidsTotal,
                quantity: qtyTotal,
                service_type: selectedService,
                night_delivery: selectedService === 'night',
                instructions: document.getElementById('destInstructions').value,
                price_chf: prixTotal, // Prix calculé mais masqué au magasinier
                status: 'pending',
                admin_status: 'pending_validation',
                created_at: new Date().toISOString()
            };
            
            try {
                const { data, error } = await db
                    .from('transport_orders_simple')
                    .insert([orderData])
                    .select();
                
                if (error) throw error;
                
                alert('Transport créé avec succès!');
                
                // Fermer la modale parente si dans iframe
                if (window.parent !== window) {
                    window.parent.postMessage('closeTransportForm', '*');
                } else {
                    window.close();
                }
                
            } catch (error) {
                console.error('Erreur création transport:', error);
                alert('Erreur lors de la création: ' + error.message);
            }
        }
        
        // Initialisation
        updatePrices();
    </script>
</body>
</html>
