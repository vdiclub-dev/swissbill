<!DOCTYPE html>
<html lang="fr">

<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dossier employé | Léman-Courses</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="topbar">
<h1>Léman-Courses</h1>
<p>Dossier employé</p>
</header>

<main class="container">

<form id="employeeForm" class="card">

<h2>Informations personnelles</h2>

<input id="first_name" placeholder="Prénom">
<input id="last_name" placeholder="Nom">

<label>Date de naissance</label>
<input type="date" id="birth_date">

<label>Numéro AVS</label>
<input id="avs_number" placeholder="756.XXXX.XXXX.XX">

<label>État civil</label>
<select id="marital_status">
<option value="celibataire">Célibataire</option>
<option value="marie">Marié</option>
<option value="divorce">Divorcé</option>
<option value="veuf">Veuf</option>
</select>

<label>Nationalité</label>
<input id="nationality">

<label>Permis</label>
<select id="permit_type">
<option value="suisse">Suisse</option>
<option value="permis_b">Permis B</option>
<option value="permis_c">Permis C</option>
<option value="permis_l">Permis L</option>
</select>

<hr>

<h2>Coordonnées</h2>

<input id="address" placeholder="Adresse">

<input id="postal_code" placeholder="NPA">

<input id="city" placeholder="Ville">

<input id="phone" placeholder="Téléphone">

<input id="email" placeholder="Email">

<hr>

<h2>Informations emploi</h2>

<label>Date engagement</label>
<input type="date" id="hire_date">

<label>Fonction</label>
<input id="job_title" placeholder="Chauffeur">

<label>Taux activité (%)</label>
<input id="activity_rate">

<label>Salaire brut</label>
<input id="salary">

<hr>

<h2>Enfants</h2>

<div id="childrenContainer"></div>

<button type="button" onclick="addChild()">
Ajouter enfant
</button>
<button onclick="generatePayslip(employee)">
Fiche salaire
</button>
<hr>

<button type="submit" class="btn-primary">
Enregistrer employé
</button>

</form>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="JS/config.js"></script>

<script>
  function generatePayslip(employee){

const { jsPDF } = window.jspdf

const doc = new jsPDF()

doc.text("Léman-Courses",20,20)
doc.text("Fiche de salaire",20,30)

doc.text("Employé : "+employee.name,20,50)
doc.text("Mois : "+employee.month,20,60)

doc.text("Salaire brut : "+employee.gross+" CHF",20,80)

doc.text("AVS : -"+employee.avs+" CHF",20,95)
doc.text("AC : -"+employee.ac+" CHF",20,105)
doc.text("LPP : -"+employee.lpp+" CHF",20,115)

doc.text("Salaire net : "+employee.net+" CHF",20,135)

doc.text("Allocations : "+employee.allowance+" CHF",20,155)
doc.text("Frais : "+employee.expenses+" CHF",20,165)

doc.text("Salaire final : "+employee.total+" CHF",20,190)

doc.save("fiche_salaire.pdf")

}
function calculateBonus(start,end,salary){

const startHour = new Date(start).getHours()
const endHour = new Date(end).getHours()

let bonus = 0

// travail nuit
if(startHour >= 23 || endHour <= 5){

bonus = 10

}

// dimanche
const day = new Date(start).getDay()

if(day === 0){

bonus = 50

}

return bonus

}
function addChild(){

const container = document.getElementById("childrenContainer")

const div = document.createElement("div")

div.className="child-block"

div.innerHTML = `
<input placeholder="Nom enfant" class="child_name">
<input type="date" class="child_birth">
<input placeholder="Numéro AVS enfant" class="child_avs">
`

container.appendChild(div)

}

document
.getElementById("employeeForm")
.addEventListener("submit",async e=>{

e.preventDefault()

const employee = {

first_name:first_name.value,
last_name:last_name.value,
birth_date:birth_date.value,
avs_number:avs_number.value,
marital_status:marital_status.value,
nationality:nationality.value,
permit_type:permit_type.value,
address:address.value,
postal_code:postal_code.value,
city:city.value,
phone:phone.value,
email:email.value,
hire_date:hire_date.value,
job_title:job_title.value,
activity_rate:activity_rate.value,
salary:salary.value

}

const {data,error} = await supabaseClient
.from("employees")
.insert([employee])
.select()
.single()

if(error){

alert("Erreur")

return

}

const employeeId = data.id

const children = document.querySelectorAll(".child-block")

for(let child of children){

await supabaseClient
.from("employee_children")
.insert({

employee_id:employeeId,
name:child.querySelector(".child_name").value,
birth_date:child.querySelector(".child_birth").value,
avs_number:child.querySelector(".child_avs").value

})

}

alert("Employé enregistré")

})

</script>

</body>
</html>
