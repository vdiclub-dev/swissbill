<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colixo - Mes commandes</title>
  <script data-cfasync="false" src="/js/supabase.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#0b0b0f; color:#fff; margin:0; }
    .wrap { max-width:1100px; margin:30px auto; padding:20px; }
    .card { background:#15151b; border:1px solid #2b2b35; border-radius:16px; padding:20px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:12px; border-bottom:1px solid #2c2c36; text-align:left; }
    a { color:#ff9b2f; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Mes commandes</h1>
      <table>
        <thead>
          <tr>
            <th>Référence</th>
            <th>Statut</th>
            <th>Prix TTC</th>
            <th>Date</th>
            <th>PDF</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script data-cfasync="false" src="js/auth.js"></script>
  <script src="js/orders.js"></script>

  <script>
    async function main() {
      await requireAuth();
      const orders = await listMyOrders();

      const body = document.getElementById("ordersBody");
      body.innerHTML = orders.map(order => `
        <tr>
          <td>${order.reference || ""}</td>
          <td>${order.status || ""}</td>
          <td>CHF ${Number(order.price_ttc || 0).toFixed(2)}</td>
          <td>${new Date(order.created_at).toLocaleString("fr-CH")}</td>
          <td>${order.pdf_url ? `<a href="${order.pdf_url}" target="_blank">Voir PDF</a>` : "-"}</td>
        </tr>
      `).join("");
    }

    main().catch(console.error);
  </script>
</body>
</html>
