<form id="employeeForm">

<h2>Informations employé</h2>

<input id="first_name" placeholder="Prénom">

<input id="last_name" placeholder="Nom">

<input type="date" id="birth_date">

<input id="avs_number" placeholder="Numéro AVS">

<select id="marital_status">
<option value="celibataire">Célibataire</option>
<option value="marie">Marié</option>
<option value="divorce">Divorcé</option>
</select>

<input id="phone" placeholder="Téléphone">

<input id="email" placeholder="Email">

<input id="address" placeholder="Adresse">

<input id="city" placeholder="Ville">

<input id="postal_code" placeholder="NPA">

<button type="submit">
Enregistrer employé
</button>

</form>
