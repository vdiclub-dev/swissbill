<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mes transports | Léman-Courses</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="app">

<!-- MENU -->

<aside class="sidebar">

<h2>🚚 Léman-Courses</h2>

<a href="dashboard.html">Dashboard</a>
<a href="new-transport.html">Nouveau transport</a>
<a href="orders.html" class="active">Mes transports</a>
<a href="../track/track.html">Suivi colis</a>

</aside>

<!-- CONTENU -->

<main class="content">

<h1>Mes transports</h1>

<table class="table">

<thead>

<tr>

<th>Numéro</th>
<th>Départ</th>
<th>Destination</th>
<th>Service</th>
<th>Statut</th>

</tr>

</thead>

<tbody id="ordersTable"></tbody>

</table>

</main>

</div>

<script src="../JS/config.js"></script>

<script>

async function loadOrders(){

const { data: { user } } =
await supabaseClient.auth.getUser()

const { data, error } =
await supabaseClient
.from("transport_orders")
.select("*")
.eq("client_id", user.id)
.order("created_at", { ascending:false })

if(error){

alert(error.message)
return

}

const table =
document.getElementById("ordersTable")

table.innerHTML = ""

data.forEach(o => {

const row = document.createElement("tr")

row.innerHTML = `
<td>${o.order_number}</td>
<td>${o.pickup_address || "-"}</td>
<td>${o.delivery_address}</td>
<td>${o.service_type}</td>
<td>${o.status}</td>
`

table.appendChild(row)

})

}

loadOrders()

</script>

</body>
</html>
