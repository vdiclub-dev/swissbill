<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nouveau transport | Léman-Courses</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="app">

<!-- MENU -->

<aside class="sidebar">

<h2>🚚 Léman-Courses</h2>

<a href="dashboard.html">Dashboard</a>
<a href="new-transport.html" class="active">Nouveau transport</a>
<a href="orders.html">Mes transports</a>
<a href="../track/track.html">Suivi colis</a>

</aside>

<!-- CONTENU -->

<main class="content">

<h1>Nouveau transport</h1>

<div class="card">

<label>Adresse livraison</label>
<input id="delivery_address" placeholder="Adresse complète">

<label>Poids (kg)</label>
<input id="weight" type="number">

<label>Service</label>

<select id="service_type">

<option value="eco">Eco (48h)</option>
<option value="express">Express (12h)</option>
<option value="urgent">Urgent (6h)</option>

</select>

<label>Nombre colis</label>
<input id="packages" type="number" value="1">

<label>Remarque</label>
<textarea id="notes"></textarea>

<button onclick="createTransport()" class="btn-yellow">

Créer transport

</button>

</div>

<div id="result"></div>

</main>

</div>

<script src="../JS/config.js"></script>

<script>

async function createTransport(){

const { data: { user } } =
await supabaseClient.auth.getUser()

if(!user){

alert("Connexion requise")
return

}

const delivery =
document.getElementById("delivery_address").value

const weight =
document.getElementById("weight").value

const service =
document.getElementById("service_type").value

const packages =
document.getElementById("packages").value

const notes =
document.getElementById("notes").value

const { error } =
await supabaseClient
.from("transport_orders")
.insert([{

client_id : user.id,

delivery_address : delivery,

weight : weight,

service_type : service,

package_type : "colis",

status : "created"

}])

if(error){

alert(error.message)
return

}

document.getElementById("result").innerHTML =

"<h3>Transport créé avec succès</h3>"

}

</script>

</body>
</html>
