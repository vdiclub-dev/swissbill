<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Léman Dispatch</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="logo">
🚚 Léman Dispatch
</div>

<button class="btn" onclick="openCreateTransport()">
Créer transport
</button>

</header>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<button onclick="showPage('dashboard')">📊 Dashboard</button>

<button onclick="showPage('transports')">📦 Transports</button>

<button onclick="showPage('tournees')">🗺 Tournées</button>

<button onclick="showPage('clients')">👤 Clients</button>

<button onclick="showPage('chauffeurs')">🚚 Chauffeurs</button>

<button onclick="showPage('vehicules')">🚛 Véhicules</button>

<button onclick="showPage('factures')">💰 Factures</button>

<button onclick="showPage('parametres')">⚙ Paramètres</button>

</div>

<!-- CONTENU -->

<div class="content" id="content">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Transports</h3>
<p id="totalTransports">0</p>
</div>

<div class="card">
<h3>Urgents</h3>
<p id="urgentTransports">0</p>
</div>

<div class="card">
<h3>Livrés</h3>
<p id="deliveredTransports">0</p>
</div>

<div class="card">
<h3>CA Jour</h3>
<p id="todayRevenue">CHF 0</p>
</div>

<div class="card">
<h3>🚚 En tournée</h3>
<p id="driversOnRoad">0 chauffeurs</p>
</div>

</div>

<h2 style="margin-top:40px;">Transports à planifier</h2>

<table id="ordersTable">

<thead>

<tr>
<th>N°</th>
<th>Destination</th>
<th>Service</th>
<th>Action</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/dispatch.js"></script>

</body>
</html>
