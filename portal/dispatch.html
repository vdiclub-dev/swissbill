<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch - Professionnel</title>
    
    <!-- VOTRE DESIGN SOMBRE -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #111;
            height: 100vh;
            overflow: hidden;
        }
        
        /* HEADER */
        header {
            background: #111;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;

        }
        
        .logo {

            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo span {

        }
        
        .header-stats {
            display: flex;
            gap: 30px;
            font-size: 14px;
        }
        
        .stat {
            display: flex;
            align-items: center;

        }

            background: #2a2a2a;

            color: #facc15;
        }
        
        .btn {
            background: #facc15;
            color: #111;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        
        .btn:hover {
            background: #eab308;
            transform: translateY(-2px);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #facc15;
            color: #facc15;
        }
        
        .btn-outline:hover {
            background: #facc15;
            color: #111;
        }
        
        /* LAYOUT */
        .container {
            display: flex;
            height: calc(100vh - 70px);
        }
        
        /* SIDEBAR GAUCHE */
        .sidebar {
            width: 250px;
            background: #111;
            color: white;
            padding: 20px;
            border-right: 1px solid #2a2a2a;
        }
        
        .sidebar button {

            background: #1f2937;

            border-radius: 8px;

            align-items: center;

        #map {

        .map-controls {

            padding: 15px 20px;

            justify-content: space-between;

            background: none;
            border: none;

            font-size: 22px;
            cursor: pointer;
        }

            color: #facc15;

        }

            border-radius: 8px;

        }
        
        .form-section h4 {
            color: #facc15;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .form-field {
            margin-bottom: 10px;
        }
        
        .form-field.full-width {
            grid-column: span 2;
        }
        
        .form-field label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 12px;
        }
        
        .form-field input,
        .form-field select,

            border: 1px solid #2a2a2a;

        /* SCROLLBAR */

    </style>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ==================== CONFIGURATION ====================
const SUPABASE_URL = 'https://votre-projet.supabase.co';
const SUPABASE_KEY = 'votre-cle-anon';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==================== VARIABLES GLOBALES ====================
let map;
let markers;
let currentTab = 'transports';
const geoCache = {};

// ==================== INITIALISATION CARTE ====================
function initMap() {
    map = L.map('map').setView([46.8, 8.2], 8);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);
    
    markers = L.markerClusterGroup({
        iconCreateFunction: function(cluster) {
            return L.divIcon({
                html: `<div style="background:#facc15; color:#111; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; border:2px solid white;">${cluster.getChildCount()}</div>`,
                className: '',
                iconSize: [30, 30]
            });
        }
    });
    
    map.addLayer(markers);
    console.log('✅ Carte initialisée');
}

// ==================== GÉOCODAGE ====================
async function geocodeCity(city) {
    if (!city) return null;
    
    const key = city.toLowerCase().trim();
    if (geoCache[key]) return geoCache[key];
    
    try {
        const response = await fetch(
            `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city + ', Suisse')}&limit=1`,
            { headers: { 'User-Agent': 'LemanDispatch/1.0' } }
        );
        const data = await response.json();
        
        if (data && data.length > 0) {
            const coords = {
                lat: parseFloat(data[0].lat),
                lng: parseFloat(data[0].lon)
            };
            geoCache[key] = coords;
            return coords;
        }
    } catch (e) {
        console.warn('Erreur géocodage:', e);
    }
    return null;
}

// ==================== CALCUL DISTANCE ====================
async function calculateRoute(pickupCity, deliveryCity) {
    const p1 = await geocodeCity(pickupCity);
    const p2 = await geocodeCity(deliveryCity);
    
    if (!p1 || !p2) return null;
    
    try {
        const response = await fetch(
            `https://router.project-osrm.org/route/v1/driving/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=false`
        );
        const data = await response.json();
        
        if (data.routes && data.routes.length > 0) {
            return {
                km: (data.routes[0].distance / 1000).toFixed(1),
                min: Math.round(data.routes[0].duration / 60)
            };
        }
    } catch (e) {
        console.warn('Erreur calcul route:', e);
    }
    return null;
}

// ==================== CHARGEMENT DES TRANSPORTS ====================
async function loadOrders() {
    const { data, error } = await supabase
        .from('orders')
        .select('*')
        .order('created_at', { ascending: false });
    
    if (error) {
        console.error('Erreur Supabase:', error);
        return [];
    }
    
    return data || [];
}

// ==================== MISE À JOUR CARTE ====================
async function updateMap() {
    if (!markers) return;
    
    markers.clearLayers();
    const orders = await loadOrders();
    const bounds = [];
    let count = 1;
    
    for (const order of orders) {
        // Utiliser la ville de livraison pour le marqueur
        const geo = await geocodeCity(order.delivery_city);
        if (!geo) continue;
        
        // Couleur selon le statut
        let bgColor = '#facc15'; // pending (jaune)
        if (order.status === 'planned') bgColor = '#3b82f6'; // bleu
        if (order.status === 'urgent') bgColor = '#ef4444'; // rouge
        if (order.status === 'delivered') bgColor = '#10b981'; // vert
        
        const icon = L.divIcon({
            html: `<div style="background:${bgColor}; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:${bgColor === '#facc15' ? '#111' : 'white'}; font-weight:bold; border:2px solid white; ${order.status === 'urgent' ? 'animation:pulse 1.5s infinite;' : ''}">${count}</div>`,
            className: '',
            iconSize: [30, 30]
        });
        
        const marker = L.marker([geo.lat, geo.lng], { icon });
        
        // Popup avec infos
        marker.bindPopup(`
            <div style="min-width:200px;">
                <div style="font-weight:bold; margin-bottom:5px;">📦 ${order.client_name || 'Sans client'}</div>
                <div style="margin:5px 0;">📍 ${order.pickup_city} → ${order.delivery_city}</div>
                ${order.distance_km ? `<div>📏 ${order.distance_km} km (${order.duration_min} min)</div>` : ''}
                <div style="margin-top:10px;">
                    <button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(order.delivery_city)}')" style="background:#facc15; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">🗺️ Itinéraire</button>
                </div>
            </div>
        `);
        
        markers.addLayer(marker);
        bounds.push([geo.lat, geo.lng]);
        count++;
    }
    
    if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [30, 30] });
    }
    
    return orders;
}

// ==================== MISE À JOUR LISTE ====================
async function updateList() {
    const orders = await loadOrders();
    const listEl = document.getElementById('ordersList');
    
    if (!orders || orders.length === 0) {
        listEl.innerHTML = '<div style="text-align:center; color:#666; padding:30px;">Aucun transport</div>';
        return;
    }
    
    let pendingCount = 0;
    let urgentCount = 0;
    let html = '';
    
    for (const order of orders) {
        if (order.status === 'pending') pendingCount++;
        if (order.status === 'urgent') urgentCount++;
        
        // Calculer le temps si pas déjà fait
        if (!order.distance_km && order.pickup_city && order.delivery_city) {
            const route = await calculateRoute(order.pickup_city, order.delivery_city);
            if (route) {
                order.distance_km = route.km;
                order.duration_min = route.min;
                
                // Mettre à jour dans Supabase (optionnel)
                supabase.from('orders').update({
                    distance_km: route.km,
                    duration_min: route.min
                }).eq('id', order.id);
            }
        }
        
        html += `
            <div class="order-card ${order.priority === 'urgent' ? 'urgent' : ''}">
                <div class="order-header">
                    <span class="client-name">${order.client_name || 'Sans client'}</span>
                    <span class="status-badge ${order.status}">${order.status}</span>
                </div>
                <div class="address">
                    📍 ${order.pickup_city || '?'} → ${order.delivery_city || '?'}
                </div>
                <div class="route-info">
                    <span>📏 Distance: <strong>${order.distance_km ? order.distance_km + ' km' : '...'}</strong></span>
                    <span>⏱️ Durée: <strong>${order.duration_min ? order.duration_min + ' min' : '...'}</strong></span>
                </div>
                <div class="order-footer">
                    <span class="priority ${order.priority}">${order.priority}</span>
                    <span style="color:#666;">⚖️ ${order.weight || 1} kg</span>
                </div>
            </div>
        `;
    }
    
    listEl.innerHTML = html;
    
    // Mettre à jour les stats
    document.getElementById('pendingCount').textContent = pendingCount;
    document.getElementById('urgentCount').textContent = urgentCount;
    document.getElementById('activeCount').textContent = orders.filter(o => o.status === 'planned').length;
}

// ==================== INTERFACE UTILISATEUR ====================
const UI = {
    newTransport: function() {
        document.getElementById('modalTitle').innerText = '➕ Nouveau transport';
        document.getElementById('modalContent').innerHTML = `
            <form onsubmit="event.preventDefault(); UI.saveTransport();">
                <div class="form-section">
                    <h4>👤 Client</h4>
                    <div class="form-grid">
                        <div class="form-field full-width">
                            <label>Nom complet *</label>
                            <input type="text" id="clientName" required placeholder="Jean Dupont">
                        </div>
                        <div class="form-field">
                            <label>Téléphone</label>
                            <input type="tel" id="clientPhone" placeholder="079 123 45 67">
                        </div>
                        <div class="form-field">
                            <label>Email</label>
                            <input type="email" id="clientEmail" placeholder="client@email.com">
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h4>📍 Ramassage</h4>
                    <div class="form-grid">
                        <div class="form-field full-width">
                            <label>Adresse *</label>
                            <input type="text" id="pickupAddress" required placeholder="Rue du Simplon 12, 1000 Lausanne">
                        </div>
                        <div class="form-field">
                            <label>Ville *</label>
                            <input type="text" id="pickupCity" required placeholder="Lausanne">
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h4>🎯 Livraison</h4>
                    <div class="form-grid">
                        <div class="form-field full-width">
                            <label>Adresse *</label>
                            <input type="text" id="deliveryAddress" required placeholder="Rue du Mont-Blanc 8, 1200 Genève">
                        </div>
                        <div class="form-field">
                            <label>Ville *</label>
                            <input type="text" id="deliveryCity" required placeholder="Genève">
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h4>📦 Colis</h4>
                    <div class="form-grid">
                        <div class="form-field">
                            <label>Poids (kg)</label>
                            <input type="number" id="weight" value="1" step="0.1">
                        </div>
                        <div class="form-field">
                            <label>Priorité</label>
                            <select id="priority">
                                <option value="normal">Normal</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-field">
                        <label>Instructions</label>
                        <textarea id="instructions" rows="2" placeholder="Fragile, code d'accès..."></textarea>
                    </div>
                </div>
                
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button type="button" onclick="UI.closeModal()" style="flex:1; padding:12px; background:#2a2a2a; color:white; border:none; border-radius:6px; cursor:pointer;">Annuler</button>
                    <button type="submit" style="flex:2; padding:12px; background:#facc15; color:#111; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Créer transport</button>
                </div>
            </form>
        `;
        document.getElementById('modal').style.display = 'flex';
    },
    
    closeModal: function() {
        document.getElementById('modal').style.display = 'none';
    },
    
    saveTransport: async function() {
        const transport = {
            client_name: document.getElementById('clientName')?.value,
            client_phone: document.getElementById('clientPhone')?.value,
            client_email: document.getElementById('clientEmail')?.value,
            pickup_city: document.getElementById('pickupCity')?.value,
            delivery_city: document.getElementById('deliveryCity')?.value,
            weight: parseFloat(document.getElementById('weight')?.value) || 1,
            priority: document.getElementById('priority')?.value || 'normal',
            status: 'pending',
            created_at: new Date()
        };
        
        if (!transport.pickup_city || !transport.delivery_city) {
            alert('Veuillez remplir les villes');
            return;
        }
        
        // Calculer la distance automatiquement
        const route = await calculateRoute(transport.pickup_city, transport.delivery_city);
        if (route) {
            transport.distance_km = route.km;
            transport.duration_min = route.min;
        }
        
        const { error } = await supabase.from('orders').insert([transport]);
        
        if (error) {
            console.error('Erreur:', error);
            alert('❌ Erreur lors de la création');
        } else {
            alert('✅ Transport créé avec succès !');
            UI.closeModal();
            updateMap();
            updateList();
        }
    }
};

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    
    if (tab === 'transports') {
        updateList();
    } else if (tab === 'optimizer') {
        document.getElementById('panelContent').innerHTML = `
            <div style="text-align:center; padding:30px;">
                <h3 style="color:#facc15; margin-bottom:20px;">🤖 Optimisation IA</h3>
                <p style="color:#666; margin-bottom:20px;">Regroupement intelligent des transports</p>
                <button class="btn" onclick="alert('Optimisation à venir')">Lancer l'optimisation</button>
            </div>
        `;
    } else if (tab === 'stats') {
        document.getElementById('panelContent').innerHTML = `
            <div style="text-align:center; padding:30px;">
                <h3 style="color:#facc15; margin-bottom:20px;">📊 Statistiques</h3>
                <p style="color:#666;">À venir...</p>
            </div>
        `;
    }
}
