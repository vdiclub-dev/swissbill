<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>
    
    <!-- Styles existants -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
    
    <style>
        /* Correction rapide des problèmes */
        .dispatch-container {
            display: flex;
            height: calc(100vh - 60px);
            position: relative;
        }
        
        #map {
            flex: 1;
            height: 100%;
            z-index: 1;
        }
        
        .sidebar {
            width: 200px;
            background: #f5f5f5;
            padding: 10px;
            overflow-y: auto;
            z-index: 2;
        }
        
        .dispatch-sidebar {
            width: 300px;
            background: white;
            border-left: 1px solid #ddd;
            padding: 10px;
            overflow-y: auto;
            z-index: 2;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        /* Style pour les marqueurs */
        .route-number div {
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border: 2px solid white;
        }
        
        /* Style pour la liste */
        #orders-list {
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }
        
        .order-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        
        .order-item:hover {
            background: #f9f9f9;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: white;
            border-bottom: 1px solid #ddd;
            height: 60px;
        }
        
        .btn {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        🚚 Léman Dispatch
    </div>
    <div id="dispatchStats"></div>
    <button class="btn" onclick="newTransport()">
        Créer transport
    </button>
</header>

<div class="dispatch-container">
    <!-- MENU -->
    <div class="sidebar">
        <button style="width:100%; margin-bottom:5px;" onclick="switchView('dashboard')">📊 Dashboard</button>
        <button style="width:100%; margin-bottom:5px;" onclick="switchView('transports')">📦 Transports</button>
        <button style="width:100%; margin-bottom:5px;" onclick="switchView('dispatch')">🗺 Dispatch</button>
        <button style="width:100%; margin-bottom:5px;" onclick="switchView('clients')">👤 Clients</button>
        <button style="width:100%; margin-bottom:5px;" onclick="switchView('chauffeurs')">🚚 Chauffeurs</button>
        <button style="width:100%; margin-bottom:5px;" onclick="switchView('vehicules')">🚛 Véhicules</button>
        <button style="width:100%; margin-bottom:5px;" onclick="switchView('factures')">💰 Factures</button>
        <button style="width:100%; margin-bottom:5px;" onclick="switchView('parametres')">⚙ Paramètres</button>
        <button style="width:100%; margin-bottom:5px; background:#28a745;" onclick="proposeAITours()">🤖 Proposition IA</button>
        <button style="width:100%; margin-bottom:5px; background:#ffc107;" onclick="generateTour()">🧠 Créer tournée optimisée</button>
    </div>

    <!-- CARTE -->
    <div id="map"></div>

    <!-- LISTE -->
    <div class="dispatch-sidebar">
        <h3>Transports</h3>
        <div id="orders-list">
            Chargement...
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h3 id="modal-title">Titre</h3>
            <button onclick="closeModal()" style="background:none; border:none; font-size:20px; cursor:pointer;">✖</button>
        </div>
        <div id="modal-content">
            contenu
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../JS/config.js"></script>
<script src="../JS/dispatch.js"></script>

<script>
// Fonctions de débogage et correction
console.log("🚀 Démarrage du dispatch...");

// Vérifier que les fonctions existent
function checkFunctions() {
    const functions = ['newTransport', 'closeModal', 'proposeAITours', 'generateTour', 'loadOrdersMap', 'loadOrdersList'];
    
    functions.forEach(fn => {
        if (typeof window[fn] === 'function') {
            console.log(`✅ Fonction ${fn} disponible`);
        } else {
            console.log(`❌ Fonction ${fn} manquante`);
        }
    });
}

// Attendre que tout soit chargé
window.addEventListener('load', function() {
    console.log("✅ Page chargée");
    checkFunctions();
    
    // Initialiser la carte manuellement si nécessaire
    if (typeof map !== 'undefined' && map) {
        console.log("✅ Carte déjà initialisée");
    } else if (typeof L !== 'undefined') {
        console.log("🔄 Initialisation manuelle de la carte...");
        try {
            window.map = L.map("map").setView([46.52, 6.63], 9);
            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {maxZoom: 18}).addTo(window.map);
            window.markers = L.markerClusterGroup();
            window.map.addLayer(window.markers);
            console.log("✅ Carte initialisée manuellement");
            
            // Charger les données
            if (typeof loadOrdersMap === 'function') {
                loadOrdersMap();
            }
            if (typeof loadOrdersList === 'function') {
                loadOrdersList();
            }
        } catch (e) {
            console.error("❌ Erreur initialisation carte:", e);
        }
    }
});

// Fonctions de navigation simples
function switchView(view) {
    console.log("Switch view:", view);
    alert("Navigation vers " + view + " (à implémenter)");
}
</script>

</body>
</html>
