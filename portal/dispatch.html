<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Léman Dispatch</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

</head>

<body>

<header>

<div class="logo">
🚚 Léman Dispatch
</div>

<div id="dispatchStats"></div>

<button class="btn" onclick="newTransport()">
Créer transport
</button>
</header>

<div class="dispatch-container">

<!-- MENU -->

<div class="sidebar">

<button>📊 Dashboard</button>
<button>📦 Transports</button>
<button>🗺 Dispatch</button>
<button>👤 Clients</button>
<button>🚚 Chauffeurs</button>
<button>🚛 Véhicules</button>
<button>💰 Factures</button>
<button>⚙ Paramètres</button>

<button onclick="generateTour()">🧠 Créer tournée optimisée</button>

</div>

<!-- CARTE -->

<div id="map"></div>

<!-- LISTE -->

<div class="dispatch-sidebar">

<h3>Transports</h3>

<div id="orders-list">
Chargement...
</div>

</div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-box">

<div class="modal-header">

<h3 id="modal-title">Titre</h3>

<button onclick="closeModal()">✖</button>

</div>

<div id="modal-content">
contenu
</div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../JS/config.js"></script>
<script src="../JS/dispatch.js"></script>

</body>
</html>
