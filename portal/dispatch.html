<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch</title>
    
    <!-- Seulement Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    
    <style>
        body { margin:0; padding:0; }
        #map { height: 100vh; width: 100vw; }
        #btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #facc15;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
        }
        #modal-content {
            background: white;
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 10px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <button id="btn" onclick="ouvrirModal()">➕ Créer transport</button>
    <div id="map"></div>
    
    <div id="modal">
        <div id="modal-content">
            <h2>Nouveau transport</h2>
            <input type="text" id="client" placeholder="Nom client">
            <input type="text" id="pickup" placeholder="Ville ramassage">
            <input type="text" id="delivery" placeholder="Ville livraison">
            <select id="priority">
                <option value="normal">Normal</option>
                <option value="urgent">Urgent</option>
            </select>
            <button onclick="fermerModal()">Annuler</button>
            <button onclick="sauvegarder()">Créer</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // CONFIGURATION SIMPLE
        const supabase = window.supabase.createClient(
            'https://votre-projet.supabase.co',  // CHANGEZ ICI
            'votre-cle-anon'                      // CHANGEZ ICI
        );
        
        let map;
        
        // Carte
        map = L.map('map').setView([46.8, 8.2], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Charger les transports
        async function charger() {
            const { data } = await supabase.from('orders').select('*');
            console.log('Transports:', data);
            
            // Ajouter des marqueurs
            data?.forEach((order, i) => {
                let lat = 46.8, lng = 8.2;
                if (order.delivery_city === 'Lausanne') { lat = 46.519; lng = 6.632; }
                if (order.delivery_city === 'Genève') { lat = 46.204; lng = 6.143; }
                
                L.marker([lat, lng]).addTo(map)
                    .bindPopup(`${order.client_name}<br>${order.pickup_city} → ${order.delivery_city}`);
            });
        }
        charger();
        
        // Modal
        function ouvrirModal() {
            document.getElementById('modal').style.display = 'block';
        }
        
        function fermerModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        async function sauvegarder() {
            const transport = {
                client_name: document.getElementById('client').value,
                pickup_city: document.getElementById('pickup').value,
                delivery_city: document.getElementById('delivery').value,
                priority: document.getElementById('priority').value,
                status: 'pending',
                created_at: new Date()
            };
            
            await supabase.from('orders').insert([transport]);
            alert('Créé !');
            fermerModal();
            charger();
        }
        
        // Rendre les fonctions accessibles
        window.ouvrirModal = ouvrirModal;
        window.fermerModal = fermerModal;
        window.sauvegarder = sauvegarder;
    </script>
    
</body>
</html>
