<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Léman Dispatch - Carte</title>
    
    <!-- Styles Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
    
    <style>
        /* DESIGN SYSTEM - COHERENT AVEC VOTRE STYLE */
        body {
            margin: 0;
            font-family: Arial;
            background: #f3f4f6;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        header {
            background: #111;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* BOUTONS */
        .btn {
            background: #facc15;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: #eab308;
        }

        .btn-small {
            background: #facc15;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* STRUCTURE PRINCIPALE */
        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* SIDEBAR GAUCHE */
        .sidebar {
            width: 220px;
            background: #111;
            color: white;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: #1f2937;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar button:hover {
            background: #facc15;
            color: black;
        }

        .sidebar button.active {
            background: #facc15;
            color: black;
        }

        /* CONTENU CENTRAL - CARTE */
        .map-container {
            flex: 1;
            position: relative;
            background: #e5e7eb;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* PANNEAU DROIT - LISTE */
        .right-panel {
            width: 320px;
            background: white;
            border-left: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-header {
            padding: 15px;
            background: #111;
            color: white;
            border-bottom: 1px solid #374151;
        }

        .panel-header h3 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .orders-list {
            padding: 15px;
            overflow-y: auto;
            flex: 1;
        }

        /* CARTE TRANSPORT */
        .order-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            transition: 0.2s;
            cursor: pointer;
        }

        .order-card:hover {
            border-color: #facc15;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .order-card.urgent {
            border-left: 4px solid #ef4444;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .client-name {
            font-weight: bold;
            color: #111;
        }

        .status-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            background: #f3f4f6;
            color: #4b5563;
        }

        .status-badge.urgent {
            background: #ef4444;
            color: white;
        }

        .status-badge.planned {
            background: #facc15;
            color: black;
        }

        .address-line {
            font-size: 13px;
            color: #4b5563;
            margin: 4px 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .order-meta {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            font-size: 11px;
            color: #6b7280;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            background: #111;
            color: white;
            padding: 15px 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-content {
            padding: 20px;
        }

        /* FORMULAIRE */
        .form-section {
            background: #f9fafb;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .form-section h4 {
            margin: 0 0 15px 0;
            color: #111;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .form-field {
            margin-bottom: 10px;
        }

        .form-field label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
        }

        .form-field input,
        .form-field select,
        .form-field textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
        }

        .form-field input:focus,
        .form-field select:focus,
        .form-field textarea:focus {
            outline: none;
            border-color: #facc15;
        }

        .badge-option {
            display: flex;
            gap: 8px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #d1d5db;
            background: white;
        }

        .badge.selected {
            background: #facc15;
            border-color: #facc15;
        }

        /* STATS HEADER */
        .header-stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* MARQUEURS CARTE */
        .custom-marker {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .marker-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        🚚 Léman Dispatch
    </div>
    
    <div class="header-stats" id="dispatchStats">
        <span class="stat-item">⏳ En attente: 0</span>
        <span class="stat-item">⚠️ Urgents: 0</span>
        <span class="stat-item">🚚 En tournée: 0</span>
    </div>
    
    <button class="btn" onclick="UI.newTransport()">
        ➕ Créer transport
    </button>
</header>

<div class="container">
    <!-- SIDEBAR GAUCHE -->
    <div class="sidebar">
        <button class="active">🗺 Dispatch</button>
        <button onclick="window.location.href='dashboard.html'">📊 Dashboard</button>
        <button onclick="window.location.href='transports.html'">📦 Transports</button>
        <button onclick="window.location.href='tours.html'">🗺 Tournées</button>
        <button onclick="window.location.href='clients.html'">👤 Clients</button>
        <button onclick="window.location.href='chauffeurs.html'">🚚 Chauffeurs</button>
        <button onclick="window.location.href='vehicules.html'">🚛 Véhicules</button>
        <button onclick="window.location.href='factures.html'">💰 Factures</button>
        <button onclick="window.location.href='parametres.html'">⚙ Paramètres</button>
        <button onclick="UI.proposeTours()" style="background:#facc15; color:black; margin-top:20px;">🤖 Proposition IA</button>
    </div>

    <!-- CARTE CENTRALE -->
    <div class="map-container">
        <div id="map"></div>
    </div>

    <!-- PANNEAU DROIT - LISTE DES TRANSPORTS -->
    <div class="right-panel">
        <div class="panel-header">
            <h3>📋 Transports à planifier</h3>
        </div>
        <div class="orders-list" id="orders-list">
            <div style="text-align:center; color:#6b7280; padding:20px;">Chargement...</div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modal-title">Titre</h3>
            <button onclick="UI.closeModal()">✖</button>
        </div>
        <div class="modal-content" id="modal-content">
            Contenu
        </div>
    </div>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ==================== CONFIGURATION ====================
const SUPABASE_URL = 'https://votre-projet.supabase.co';
const SUPABASE_KEY = 'votre-cle-anon';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Variables globales
let map, markers;
const geoCache = {};

// ==================== INITIALISATION CARTE ====================
function initMap() {
    map = L.map('map').setView([46.8, 8.2], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);
    
    markers = L.markerClusterGroup({
        iconCreateFunction: function(cluster) {
            return L.divIcon({
                html: `<div style="background:#111; color:white; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; border:2px solid #facc15;">${cluster.getChildCount()}</div>`,
                className: '',
                iconSize: [30, 30]
            });
        }
    });
    map.addLayer(markers);
}

// ==================== GÉOCODAGE ====================
async function geocodeCity(city) {
    if (!city) return null;
    const key = city.toLowerCase();
    if (geoCache[key]) return geoCache[key];
    
    try {
        const res = await fetch(
            `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city + ', Suisse')}&limit=1`,
            { headers: { 'User-Agent': 'LemanDispatch/1.0' } }
        );
        const data = await res.json();
        if (data.length) {
            const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
            geoCache[key] = coords;
            return coords;
        }
    } catch (e) {}
    return null;
}

// ==================== CHARGEMENT DES DONNÉES ====================
async function loadOrders() {
    const { data, error } = await supabase
        .from('orders')
        .select('*')
        .order('created_at', { ascending: false });
    
    if (error) {
        console.error(error);
        return [];
    }
    return data || [];
}

// ==================== MISE À JOUR CARTE ====================
async function updateMap() {
    if (!markers) return;
    markers.clearLayers();
    
    const orders = await loadOrders();
    const bounds = [];
    let count = 1;
    
    for (const order of orders) {
        const geo = await geocodeCity(order.delivery_city);
        if (!geo) continue;
        
        // Couleur selon statut
        let bgColor = '#facc15'; // pending
        if (order.status === 'planned') bgColor = '#3b82f6';
        if (order.status === 'urgent') bgColor = '#ef4444';
        if (order.status === 'delivered') bgColor = '#10b981';
        
        const icon = L.divIcon({
            html: `<div style="background:${bgColor}; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; border:2px solid white; ${order.status === 'urgent' ? 'animation:pulse 2s infinite;' : ''}">${count}</div>`,
            className: '',
            iconSize: [30, 30]
        });
        
        const marker = L.marker([geo.lat, geo.lng], { icon });
        marker.bindPopup(`
            <b>${order.client_name || 'Sans client'}</b><br>
            📍 ${order.pickup_city} → ${order.delivery_city}<br>
            ${order.distance_km ? `📏 ${order.distance_km} km` : ''}
        `);
        markers.addLayer(marker);
        bounds.push([geo.lat, geo.lng]);
        count++;
    }
    
    if (bounds.length) map.fitBounds(bounds, { padding: [30, 30] });
    return orders;
}

// ==================== MISE À JOUR LISTE ====================
async function updateList() {
    const orders = await loadOrders();
    const listEl = document.getElementById('orders-list');
    
    if (!orders.length) {
        listEl.innerHTML = '<div style="text-align:center; padding:20px;">Aucun transport</div>';
        return;
    }
    
    let pending = 0, urgent = 0;
    let html = '';
    
    orders.forEach(order => {
        if (order.status === 'pending') pending++;
        if (order.status === 'urgent') urgent++;
        
        html += `
            <div class="order-card ${order.priority === 'urgent' ? 'urgent' : ''}" onclick="console.log('Détail ${order.id}')">
                <div class="order-header">
                    <span class="client-name">${order.client_name || 'Sans client'}</span>
                    <span class="status-badge ${order.status}">${order.status}</span>
                </div>
                <div class="address-line">📍 ${order.pickup_city || '?'} → ${order.delivery_city || '?'}</div>
                <div class="order-meta">
                    <span>⚖️ ${order.weight || 1} kg</span>
                    ${order.distance_km ? `<span>📏 ${order.distance_km} km</span>` : ''}
                </div>
            </div>
        `;
    });
    
    listEl.innerHTML = html;
    document.getElementById('dispatchStats').innerHTML = `
        <span class="stat-item">⏳ En attente: ${pending}</span>
        <span class="stat-item">⚠️ Urgents: ${urgent}</span>
        <span class="stat-item">🚚 En tournée: 0</span>
    `;
}

// ==================== INTERFACE UTILISATEUR ====================
const UI = {
    newTransport: function() {
        document.getElementById('modal-title').innerText = '➕ Nouveau transport';
        document.getElementById('modal-content').innerHTML = `
            <form onsubmit="event.preventDefault(); UI.saveTransport();">
                <div class="form-section">
                    <h4>👤 Client</h4>
                    <div class="form-grid">
                        <div class="form-field full-width">
                            <label>Nom complet *</label>
                            <input type="text" id="clientName" required>
                        </div>
                        <div class="form-field">
                            <label>Téléphone</label>
                            <input type="tel" id="clientPhone">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h4>📍 Ramassage</h4>
                    <div class="form-grid">
                        <div class="form-field">
                            <label>Ville *</label>
                            <input type="text" id="pickupCity" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h4>🎯 Livraison</h4>
                    <div class="form-grid">
                        <div class="form-field">
                            <label>Ville *</label>
                            <input type="text" id="deliveryCity" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h4>📦 Colis</h4>
                    <div class="form-grid">
                        <div class="form-field">
                            <label>Poids (kg)</label>
                            <input type="number" id="weight" value="1" step="0.1">
                        </div>
                        <div class="form-field">
                            <label>Priorité</label>
                            <select id="priority">
                                <option value="normal">Normal</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button type="button" onclick="UI.closeModal()" style="flex:1; padding:10px; background:#f3f4f6; border:none; border-radius:6px; cursor:pointer;">Annuler</button>
                    <button type="submit" style="flex:2; padding:10px; background:#facc15; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Créer transport</button>
                </div>
            </form>
        `;
        document.getElementById('modal').style.display = 'flex';
    },
    
    closeModal: function() {
        document.getElementById('modal').style.display = 'none';
    },
    
    saveTransport: async function() {
        const transport = {
            client_name: document.getElementById('clientName')?.value,
            pickup_city: document.getElementById('pickupCity')?.value,
            delivery_city: document.getElementById('deliveryCity')?.value,
            weight: parseFloat(document.getElementById('weight')?.value) || 1,
            priority: document.getElementById('priority')?.value || 'normal',
            status: 'pending',
            created_at: new Date()
        };
        
        if (!transport.pickup_city || !transport.delivery_city) {
            alert('Veuillez remplir les villes');
            return;
        }
        
        const { error } = await supabase.from('orders').insert([transport]);
        
        if (error) {
            alert('Erreur création');
        } else {
            alert('✅ Transport créé');
            UI.closeModal();
            updateMap();
            updateList();
        }
    },
    
    proposeTours: function() {
        alert('🤖 Proposition IA - Fonctionnalité à venir');
    }
};

// ==================== INITIALISATION ====================
window.addEventListener('load', async () => {
    initMap();
    await updateMap();
    await updateList();
    
    setInterval(async () => {
        await updateMap();
        await updateList();
    }, 30000);
});
</script>

</body>
</html>
