<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Léman Dispatch</title>

<link rel="stylesheet" href="css/style.css">

<!-- Leaflet carte -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<header>

<div class="logo">
🚚 Léman Dispatch
</div>

<button class="btn">
Créer transport
</button>

</header>

<div class="container">

<div class="sidebar">

<button>📊 Dashboard</button>
<button>📦 Transports</button>
<button>🗺 Tournées</button>
<button>👤 Clients</button>
<button>🚚 Chauffeurs</button>
<button>🚛 Véhicules</button>
<button>💰 Factures</button>
<button>⚙ Paramètres</button>

</div>

<div class="content">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Transports</h3>
<p id="stat-transports">0</p>
</div>

<div class="card">
<h3>Urgents</h3>
<p id="stat-urgent">0</p>
</div>

<div class="card">
<h3>Livrés</h3>
<p id="stat-delivered">0</p>
</div>

<div class="card">
<h3>CA Jour</h3>
<p id="stat-ca">CHF 0</p>
</div>

</div>

<h2 style="margin-top:40px;">Transports à planifier</h2>

<table id="orders-table">

<thead>

<tr>
<th>N°</th>
<th>Destination</th>
<th>Service</th>
<th>Action</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

<h2 style="margin-top:40px;">Carte Dispatch</h2>

<div id="map" style="height:500px;"></div>

</div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="JS/config.js"></script>
<script src="JS/dispatch.js"></script>

</body>
</html>
