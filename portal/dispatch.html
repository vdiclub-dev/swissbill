<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dispatch | Léman-Courses</title>

<link rel="stylesheet" href="../css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="app">

<aside class="sidebar">

<h2>🚚 Léman-Courses</h2>

<a href="dashboard.html">Dashboard</a>
<a href="dispatch.html" class="active">Dispatch</a>
<a href="drivers.html">Chauffeurs</a>
<a href="vehicles.html">Véhicules</a>

</aside>

<main class="content">

<h1>Dispatch</h1>

<table class="table">

<thead>

<tr>

<th>Numéro</th>
<th>Destination</th>
<th>Service</th>
<th>Statut</th>
<th>Action</th>

</tr>

</thead>

<tbody id="dispatchTable"></tbody>

</table>

</main>

</div>

<script src="../JS/config.js"></script>

<script>

async function loadDispatch(){

const { data, error } =
await supabaseClient
.from("transport_orders")
.select("*")
.neq("status","delivered")
.order("created_at",{ascending:false})

if(error){

alert(error.message)
return

}

const table =
document.getElementById("dispatchTable")

table.innerHTML=""

data.forEach(t=>{

const row=document.createElement("tr")

row.innerHTML=`
<td>${t.order_number}</td>
<td>${t.delivery_address}</td>
<td>${t.service_type}</td>
<td>${t.status}</td>

<td>
<button onclick="assignDriver('${t.id}')">
Assign
</button>
</td>
`

table.appendChild(row)

})

}

async function assignDriver(id){

const driver=prompt("Nom du chauffeur")

if(!driver) return

const { error }=
await supabaseClient
.from("transport_orders")
.update({

status:"planned",
driver_name:driver

})
.eq("id",id)

if(error){

alert(error.message)
return

}

loadDispatch()

}

loadDispatch()

</script>

</body>
</html>
