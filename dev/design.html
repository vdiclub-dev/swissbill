<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Léman Dispatch</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f6;
}

/* HEADER */

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:bold;
}

/* BOUTONS */

.btn{
background:#facc15;
border:none;
padding:10px 15px;
cursor:pointer;
font-weight:bold;
}

/* STRUCTURE */

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#111;
color:white;
padding:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
background:#1f2937;
border:none;
color:white;
padding:10px;
cursor:pointer;
text-align:left;
}

/* CONTENU */

.content{
flex:1;
padding:30px;
}

/* CARTES DASHBOARD */

.cards{
display:flex;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
width:200px;
}

/* TABLEAU */

table{
width:100%;
background:white;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #ddd;
}
.topbar{

display:flex;
align-items:center;
justify-content:space-between;

background:#111;
color:white;

padding:12px 20px;

}

.search{

width:350px;

padding:8px 12px;

border-radius:8px;

border:none;

}
</style>

</head>

<body>

<header>

<div class="logo">
🚚 Léman Dispatch
</div>

<button class="btn">
Créer transport
</button>

</header>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<button>📊 Dashboard</button>

<button>📦 Transports</button>

<button>🗺 Tournées</button>

<button>👤 Clients</button>

<button>🚚 Chauffeurs</button>

<button>🚛 Véhicules</button>

<button>💰 Factures</button>

<button>⚙ Paramètres</button>

</div>

<!-- CONTENU -->

<div class="content">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>Transports</h3>
<p>32</p>
</div>

<div class="card">
<h3>Urgents</h3>
<p>4</p>
</div>

<div class="card">
<h3>Livrés</h3>
<p>18</p>
</div>

<div class="card">
<h3>CA Jour</h3>
<p>CHF 860</p>
</div>
  
<div class="card">

<h3>🚚 En tournée</h3>

<p>3 chauffeurs</p>

</div>
</div>

<h2 style="margin-top:40px;">Transports à planifier</h2>

<table>

<tr>
<th>N°</th>
<th>Destination</th>
<th>Service</th>
<th>Action</th>
</tr>

<tr>
<td>LC-2026-000154</td>
<td>Lausanne</td>
<td>Express</td>
<td><button class="btn">Planifier</button></td>
</tr>

<tr>
<td>LC-2026-000155</td>
<td>Morges</td>
<td>Eco</td>
<td><button class="btn">Planifier</button></td>
</tr>

<tr>
<td>LC-2026-000156</td>
<td>Nyon</td>
<td>Urgent</td>
<td><button class="btn">Planifier</button></td>
</tr>

</table>

</div>

</div>

</body>
</html>
