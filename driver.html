<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chauffeur | Léman-Courses</title>

<link rel="stylesheet" href="css/style.css">
<div class="driver-buttons">

<button onclick="startShift()">Démarrer service</button>

<button onclick="pauseShift()">Pause</button>

<button onclick="resumeShift()">Reprendre</button>

<button onclick="endShift()">Fin service</button>

</div>

<p>Statut : <span id="driverStatus">Disponible</span></p>
</head>

<body>

<header class="topbar">

<h1>Léman-Courses</h1>
<p>Suivi véhicule chauffeur</p>

</header>

<main class="container">

<section class="card">

<h2>Position du véhicule</h2>

<p id="status">Initialisation GPS...</p>

<p>
Latitude : <span id="lat">0</span><br>
Longitude : <span id="lon">0</span>
</p>

</section>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="JS/config.js"></script>

<script>

console.log("driver page chargée")

function startGPS(){

if(!navigator.geolocation){

alert("GPS non disponible")

return

}

navigator.geolocation.watchPosition(async position=>{

const lat = position.coords.latitude
const lon = position.coords.longitude

document.getElementById("lat").innerText = lat
document.getElementById("lon").innerText = lon

document.getElementById("status").innerText = "GPS actif"

try{

await supabaseClient
.from("vehicles")
.upsert({

id:1,
lat:lat,
lon:lon,
updated_at:new Date()

})

}catch(e){

console.error(e)

}

},
error=>{

document.getElementById("status").innerText="Erreur GPS"

},
{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
})

}

startGPS()

</script>

</body>
</html>
