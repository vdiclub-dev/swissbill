<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>SwissBill</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script data-cfasync="false" src="/js/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>SwissBill</h1>

<div class="menu">

<button onclick="loadDashboard()">Dashboard</button>

<button onclick="openModal()">+ Nouvelle facture</button>

<button onclick="openClientModal()">+ Nouveau client</button>
<button onclick="openScannerModal()">📷 Scanner QR</button>

</div>

<div class="container"></div>

<!-- MODALE FACTURE -->

<div id="invoiceModal" class="modal">

<div class="modal-content">

<h3>Nouvelle facture</h3>

<select id="client" onchange="loadClientDetails()"></select>
<div id="clientDetails" style="margin-top:10px;font-size:14px;color:#94a3b8"></div>

<input id="amount" type="number" placeholder="Montant">

<select id="status">
<option value="paid">Payé</option>
<option value="pending">En attente</option>
</select>

<h4>Produits</h4>

<div id="items">

<div class="item-row">
<input class="desc" placeholder="Description">

<input class="qty" type="number" value="1" oninput="calculateTotal()">
<input class="price" type="number" oninput="calculateTotal()">

</div>

</div>

<button onclick="addItem()">+ Ajouter ligne</button>

<br><br>

<button onclick="addInvoice()">Créer facture</button>

<button onclick="closeModal()">Annuler</button>

</div>
</div>

<!-- MODALE CLIENT -->

<div id="clientModal" class="modal">

<div class="modal-content">

<h3>Nouveau client</h3>

<input id="company" placeholder="Entreprise">

<input id="email" placeholder="Email">

<input id="phone" placeholder="Téléphone">

<input id="street" placeholder="Rue">

<input id="postal_code" placeholder="NPA">

<input id="city" placeholder="Ville">

<input id="country" placeholder="Pays">

<textarea id="notes" placeholder="Remarques"></textarea>

<button onclick="addClient()">Enregistrer</button>

<button onclick="closeClientModal()">Fermer</button>

</div>

</div>

<!-- MODALE SCANNER QR -->

<div id="scannerModal" class="modal">

<div class="modal-content">

<h3>Scanner QR Code</h3>

<video id="scanner-video" style="width: 100%; max-width: 400px; height: 300px; background: #000; border-radius: 10px; object-fit: cover;"></video>

<div id="scanner-result" style="margin-top: 10px; padding: 10px; background: #f0f0f0; border-radius: 5px; display: none; min-height: 50px;"></div>

<div style="margin-top: 15px;">
<button onclick="startScanner()" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; margin-right: 10px;">Démarrer le scanner</button>

<button onclick="stopScanner()" style="padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; margin-right: 10px;">Arrêter</button>

<button onclick="closeScannerModal()" style="padding: 10px 20px; background: #6c757d; color: white; border: none; border-radius: 5px;">Fermer</button>
</div>

</div>

</div>

<script src="js/supabase.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/invoices.js"></script>
<script src="js/clients.js"></script>
<script src="js/products.js"></script>
<script src="js/charts.js"></script>
<script src="js/scanner.js"></script>

<script>

loadDashboard()
loadProducts()

function openModal(){
document.getElementById("invoiceModal").style.display="flex"
loadClients()
}

function closeModal(){
document.getElementById("invoiceModal").style.display="none"
}

function openClientModal(){
document.getElementById("clientModal").style.display="flex"
}

function closeClientModal(){
document.getElementById("clientModal").style.display="none"
}

function openScannerModal(){
document.getElementById("scannerModal").style.display="flex"
}

function closeScannerModal(){
document.getElementById("scannerModal").style.display="none"
stopScanner()
}

</script>

</body>
</html>
