<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Préparation express</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- jsPDF pour générer PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Scanner QR -->
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui, -apple-system, sans-serif; }
        
        body {
            background: #f1f5f9;
            min-height: 100vh;
        }
        
        /* HEADER */
        .header {
            background: #0f172a;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e53935;
        }
        
        .logo {
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo i { color: #e53935; }
        
        .staff-badge {
            background: #1e293b;
            padding: 8px 16px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .staff-badge i { color: #e53935; }
        
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        /* SCAN SECTION */
        .scan-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        
        .scan-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .scan-header i { color: #e53935; font-size: 24px; }
        
        #qr-reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
        }
        
        /* FORM SECTION */
        .form-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #e2e8f0;
        }
        
        .form-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .form-title i { color: #e53935; font-size: 24px; }
        
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #475569;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
        }
        
        /* ADRESSE CLIENT */
        .address-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        
        .address-card:hover {
            border-color: #e53935;
            background: #fee2e2;
        }
        
        .address-card.selected {
            border-color: #e53935;
            background: #fee2e2;
        }
        
        .address-card i { color: #e53935; margin-right: 8px; }
        
        /* ADRESSE DÉPART FIXE */
        .fixed-address {
            background: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #0f172a;
        }
        
        .fixed-address i { color: #0f172a; margin-right: 8px; }
        
        /* BOUTONS */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #e53935;
            color: white;
        }
        
        .btn-primary:hover {
            background: #c62828;
        }
        
        .btn-secondary {
            background: white;
            color: #e53935;
            border: 2px solid #e53935;
        }
        
        .btn-secondary:hover {
            background: #fee2e2;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        /* NOTIFICATION */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* PDF PREVIEW */
        .pdf-preview {
            background: #f8fafc;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border: 2px dashed #e53935;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .badge-urgent { background: #fee2e2; color: #991b1b; }
        .badge-normal { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <i class="fas fa-boxes"></i> Léman-Courses | Préparation
        </div>
        <div class="staff-badge">
            <i class="fas fa-user"></i> Magasinier
        </div>
    </div>
    
    <div class="container">
        <!-- SCAN QR SECTION -->
        <div class="scan-section">
            <div class="scan-header">
                <i class="fas fa-qrcode"></i>
                <h2>Scanner le QR code du transport</h2>
            </div>
            <div id="qr-reader"></div>
        </div>
        
        <!-- FORMULAIRE DE PRÉPARATION -->
        <div class="form-section" id="formSection" style="display:none;">
            <div class="form-title">
                <i class="fas fa-box"></i>
                <h2>Préparer le colis</h2>
            </div>
            
            <!-- INFOS TRANSPORT -->
            <div style="background:#f1f5f9; padding:15px; border-radius:8px; margin-bottom:20px;">
                <h3 style="color:#e53935;">Transport #<span id="transportId">2401</span></h3>
                <p><i class="fas fa-map-pin"></i> <span id="routeInfo">Lausanne → Genève</span></p>
            </div>
            
            <!-- ADRESSE DE DÉPART FIXE (par client) -->
            <div class="fixed-address">
                <i class="fas fa-warehouse"></i>
                <strong>Adresse de départ (fixe) :</strong>
                <span id="departAddress">Impasse des Griottes 3, 1462 Yvonand</span>
            </div>
            
            <!-- CHOIX RAPIDE ADRESSE LIVRAISON -->
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Adresse de livraison</label>
                <select id="deliveryAddress">
                    <option value="">Choisir une adresse</option>
                    <optgroup label="Adresses fréquentes">
                        <option value="Rue du Lac 12, 1000 Lausanne">Rue du Lac 12, Lausanne</option>
                        <option value="Place de la Gare 5, 1200 Genève">Place de la Gare 5, Genève</option>
                        <option value="Grand-Rue 8, 2000 Neuchâtel">Grand-Rue 8, Neuchâtel</option>
                    </optgroup>
                    <option value="autre">Autre adresse...</option>
                </select>
            </div>
            
            <div id="autreAdresse" style="display:none;">
                <div class="form-group">
                    <label>Nouvelle adresse</label>
                    <input type="text" id="nouvelleAdresse" placeholder="Rue, NPA, Ville">
                </div>
            </div>
            
            <!-- DÉTAILS COLIS -->
            <div class="grid-3">
                <div class="form-group">
                    <label><i class="fas fa-weight"></i> Poids (kg)</label>
                    <input type="number" id="weight" step="0.1" value="1.0" min="0.1">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-cubes"></i> Quantité</label>
                    <input type="number" id="quantity" value="1" min="1">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-box"></i> Type</label>
                    <select id="parcelType">
                        <option value="colis">Colis standard</option>
                        <option value="fragile">Fragile</option>
                        <option value="palette">Palette</option>
                        <option value="document">Document</option>
                        <option value="encombrant">Encombrant</option>
                    </select>
                </div>
            </div>
            
            <!-- VITESSE DE LIVRAISON -->
            <div class="form-group">
                <label><i class="fas fa-clock"></i> Vitesse de livraison</label>
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <label style="flex:1; text-align:center; padding:12px; border:2px solid #e2e8f0; border-radius:8px; cursor:pointer;" onclick="selectSpeed('6h')">
                        <input type="radio" name="speed" value="6h" style="display:none;"> 🚀 6h (Urgent)
                    </label>
                    <label style="flex:1; text-align:center; padding:12px; border:2px solid #e2e8f0; border-radius:8px; cursor:pointer;" onclick="selectSpeed('24h')">
                        <input type="radio" name="speed" value="24h" checked style="display:none;"> 📦 24h (Standard)
                    </label>
                    <label style="flex:1; text-align:center; padding:12px; border:2px solid #e2e8f0; border-radius:8px; cursor:pointer;" onclick="selectSpeed('48h')">
                        <input type="radio" name="speed" value="48h" style="display:none;"> 📬 48h (Éco)
                    </label>
                </div>
            </div>
            
            <!-- INSTRUCTIONS -->
            <div class="form-group">
                <label><i class="fas fa-sticky-note"></i> Instructions spéciales</label>
                <textarea id="instructions" rows="2" placeholder="Fragile, code d'accès, horaire..."></textarea>
            </div>
            
            <!-- BOUTONS D'ACTION -->
            <div class="actions">
                <button class="btn btn-primary" onclick="genererPDF()">
                    <i class="fas fa-file-pdf"></i> Générer PDF + QR
                </button>
                <button class="btn btn-success" onclick="envoyerAuDispatch()">
                    <i class="fas fa-paper-plane"></i> Envoyer au dispatch
                </button>
                <button class="btn btn-secondary" onclick="recommencer()">
                    <i class="fas fa-redo"></i> Nouveau scan
                </button>
            </div>
            
            <!-- APERÇU PDF -->
            <div id="pdfPreview" class="pdf-preview" style="display:none;">
                <h3 style="margin-bottom:10px;">📄 Étiquette à coller sur le colis</h3>
                <div id="pdfContent" style="background:white; padding:15px; border-radius:8px;"></div>
            </div>
        </div>
    </div>
    
    <!-- NOTIFICATION -->
    <div id="notification" class="notification"></div>
    
    <script>
        // ===== BASE DE DONNÉES SIMULÉE =====
        const clients = {
            'CL2025-001': {
                nom: 'Dupont Jean',
                depart: 'Impasse des Griottes 3, 1462 Yvonand',
                adresses: [
                    'Rue du Lac 12, 1000 Lausanne',
                    'Place de la Gare 5, 1200 Genève'
                ]
            },
            'CL2025-002': {
                nom: 'Martin SA',
                depart: 'Route de Neuchâtel 8, 1400 Yverdon',
                adresses: [
                    'Grand-Rue 15, 2000 Neuchâtel',
                    'Avenue des Sports 3, 1700 Fribourg'
                ]
            }
        };
        
        let currentTransport = null;
        let scannerActif = true;
        
        // ===== INIT SCANNEUR =====
        const html5QrCode = new Html5Qrcode("qr-reader");
        
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (decodedText) => {
                console.log("QR scanné:", decodedText);
                
                // Format: TR-2401|CL2025-001
                const parts = decodedText.split('|');
                
                if (parts.length >= 2) {
                    currentTransport = {
                        id: parts[0],
                        clientNumber: parts[1]
                    };
                    
                    document.getElementById('transportId').textContent = currentTransport.id;
                    
                    // Récupérer infos client
                    const client = clients[currentTransport.clientNumber];
                    if (client) {
                        document.getElementById('departAddress').textContent = client.depart;
                    }
                    
                    document.getElementById('formSection').style.display = 'block';
                    html5QrCode.stop();
                    scannerActif = false;
                    
                    showNotification('✅ QR scanné - Remplissez les détails');
                }
            },
            () => {}
        );
        
        // ===== SÉLECTION VITESSE =====
        function selectSpeed(speed) {
            document.querySelectorAll('input[name="speed"]').forEach(r => r.checked = false);
            document.querySelector(`input[value="${speed}"]`).checked = true;
        }
        
        // ===== GÉNÉRER PDF ÉTIQUETTE =====
        function genererPDF() {
            const id = document.getElementById('transportId').textContent;
            const depart = document.getElementById('departAddress').textContent;
            const livraison = document.getElementById('deliveryAddress').value;
            const poids = document.getElementById('weight').value;
            const quantite = document.getElementById('quantity').value;
            const type = document.getElementById('parcelType').options[document.getElementById('parcelType').selectedIndex].text;
            const vitesse = document.querySelector('input[name="speed"]:checked')?.value || '24h';
            const instructions = document.getElementById('instructions').value;
            
            // Données pour QR
            const qrData = `${id}|${depart}|${livraison}|${vitesse}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrData)}`;
            
            // Afficher l'aperçu
            document.getElementById('pdfContent').innerHTML = `
                <div style="text-align:center; border:2px dashed #e53935; padding:20px;">
                    <h2 style="color:#e53935;">🚚 LÉMAN-COURSES</h2>
                    <h3>Transport #${id}</h3>
                    <img src="${qrUrl}" style="width:150px; margin:15px 0;">
                    <p><strong>Départ:</strong> ${depart}</p>
                    <p><strong>Livraison:</strong> ${livraison}</p>
                    <p><strong>Poids:</strong> ${poids} kg | <strong>Quantité:</strong> ${quantite}</p>
                    <p><strong>Type:</strong> ${type}</p>
                    <p><strong>Vitesse:</strong> ${vitesse}</p>
                    ${instructions ? `<p><strong>Instructions:</strong> ${instructions}</p>` : ''}
                </div>
            `;
            
            document.getElementById('pdfPreview').style.display = 'block';
            
            // Générer vrai PDF avec jsPDF
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(20);
            doc.setTextColor(229, 57, 53);
            doc.text('LÉMAN-COURSES', 105, 20, { align: 'center' });
            
            doc.setFontSize(16);
            doc.setTextColor(0, 0, 0);
            doc.text(`Transport #${id}`, 105, 35, { align: 'center' });
            
            doc.setFontSize(12);
            doc.text(`Départ: ${depart}`, 20, 55);
            doc.text(`Livraison: ${livraison}`, 20, 65);
            doc.text(`Poids: ${poids} kg | Quantité: ${quantite}`, 20, 75);
            doc.text(`Type: ${type} | Vitesse: ${vitesse}`, 20, 85);
            
            if (instructions) {
                doc.text(`Instructions: ${instructions}`, 20, 95);
            }
            
            // Sauvegarder le PDF
            doc.save(`transport-${id}.pdf`);
            
            showNotification('✅ PDF généré et téléchargé');
        }
        
        // ===== ENVOYER AU DISPATCH =====
        function envoyerAuDispatch() {
            const transport = {
                id: document.getElementById('transportId').textContent,
                depart: document.getElementById('departAddress').textContent,
                livraison: document.getElementById('deliveryAddress').value,
                poids: document.getElementById('weight').value,
                quantite: document.getElementById('quantity').value,
                type: document.getElementById('parcelType').value,
                vitesse: document.querySelector('input[name="speed"]:checked')?.value || '24h',
                instructions: document.getElementById('instructions').value,
                timestamp: new Date().toISOString(),
                status: 'prepared'
            };
            
            console.log("🚚 Transport préparé:", transport);
            
            // ICI: Envoyer à Supabase
            // await supabase.from('orders').insert([transport]);
            
            showNotification('✅ Transport envoyé au dispatch');
            
            // Si urgent, notification
            if (transport.vitesse === '6h') {
                const message = `🚨 URGENT 6h !\nTransport #${transport.id}\n${transport.depart} → ${transport.livraison}`;
                // window.open(`https://wa.me/41798700488?text=${encodeURIComponent(message)}`, '_blank');
                showNotification('🔔 Notification urgente envoyée');
            }
        }
        
        // ===== RECOMMENCER =====
        function recommencer() {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('pdfPreview').style.display = 'none';
            document.getElementById('deliveryAddress').value = '';
            document.getElementById('weight').value = '1.0';
            document.getElementById('quantity').value = '1';
            document.getElementById('instructions').value = '';
            
            if (!scannerActif) {
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: 250 },
                    (decodedText) => {
                        const parts = decodedText.split('|');
                        if (parts.length >= 2) {
                            currentTransport = {
                                id: parts[0],
                                clientNumber: parts[1]
                            };
                            document.getElementById('transportId').textContent = currentTransport.id;
                            
                            const client = clients[currentTransport.clientNumber];
                            if (client) {
                                document.getElementById('departAddress').textContent = client.depart;
                            }
                            
                            document.getElementById('formSection').style.display = 'block';
                            html5QrCode.stop();
                            scannerActif = false;
                            showNotification('✅ QR scanné');
                        }
                    },
                    () => {}
                );
                scannerActif = true;
            }
        }
        
        // ===== NOTIFICATION =====
        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.style.display = 'block';
            setTimeout(() => { notif.style.display = 'none'; }, 3000);
        }
        
        // ===== GESTION ADRESSE =====
        document.getElementById('deliveryAddress').addEventListener('change', function() {
            if (this.value === 'autre') {
                document.getElementById('autreAdresse').style.display = 'block';
            } else {
                document.getElementById('autreAdresse').style.display = 'none';
            }
        });
    </script>
    
</body>
</html>
