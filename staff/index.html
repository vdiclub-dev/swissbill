<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Scan magasinier</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Scanner JS -->
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        
        body { 
            background: #0f172a; 
            min-height: 100vh;
            color: white;
        }
        
        .header {
            background: #0f172a;
            padding: 15px 20px;
            border-bottom: 3px solid #e53935;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .header i { color: #e53935; }
        
        .container {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 15px;
        }
        
        /* SCANNEUR PLEIN ÉCRAN */
        .scanner-section {
            background: #1e293b;
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #e53935;
            margin-bottom: 20px;
        }
        
        .scanner-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #facc15;
        }
        
        #qr-reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
        }
        
        /* FORMULAIRE (apparaît après scan) */
        .form-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            color: #0f172a;
            display: none;
            margin-top: 20px;
        }
        
        .form-section h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e53935;
            margin-bottom: 20px;
        }
        
        .info-card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #e53935;
        }
        
        .info-card p {
            margin: 5px 0;
            color: #0f172a;
        }
        
        .info-card strong { color: #e53935; }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #475569;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #e53935;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .btn-primary {
            background: #e53935;
            color: white;
        }
        
        .btn-primary:hover {
            background: #c62828;
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #0f172a;
            border: 1px solid #e2e8f0;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .speed-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .speed-6h { background: #fee2e2; color: #991b1b; }
        .speed-24h { background: #fef3c7; color: #92400e; }
        .speed-48h { background: #dbeafe; color: #1e40af; }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .btn-scan-again {
            background: #f1f5f9;
            color: #0f172a;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-scan-again:hover {
            background: #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>
            <i class="fas fa-camera"></i>
            Scan Transport
        </h1>
    </div>
    
    <div class="container">
        <!-- SECTION SCAN (TOUJOURS VISIBLE) -->
        <div class="scanner-section">
            <div class="scanner-title">
                <i class="fas fa-qrcode"></i>
                <span>Positionnez le QR code devant la caméra</span>
            </div>
            <div id="qr-reader"></div>
        </div>
        
        <!-- FORMULAIRE (APPARAÎT APRÈS SCAN) -->
        <div id="formSection" class="form-section">
            <h2>
                <i class="fas fa-box"></i>
                Préparer le transport
            </h2>
            
            <div class="info-card" id="transportInfo">
                <p><strong>Transport #<span id="transportId">2401</span></strong></p>
                <p><i class="fas fa-map-pin"></i> <span id="pickupCity">Lausanne</span> → <span id="deliveryCity">Genève</span></p>
                <p><i class="fas fa-clock"></i> Vitesse: <span id="speedDisplay">6h</span> <span id="speedBadge" class="speed-badge speed-6h">Urgent</span></p>
            </div>
            
            <div class="form-group">
                <label>👤 Votre numéro client</label>
                <input type="text" id="clientNumber" placeholder="CL2025-001" value="CL2025-001">
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>⚖️ Poids (kg)</label>
                    <input type="number" id="weight" step="0.1" value="1.5">
                </div>
                <div class="form-group">
                    <label>📦 Nombre colis</label>
                    <input type="number" id="parcels" value="1" min="1">
                </div>
            </div>
            
            <div class="form-group">
                <label>⚡ Vitesse de livraison</label>
                <select id="speed">
                    <option value="6h">🚀 Express 6h (urgence)</option>
                    <option value="24h" selected>📦 24h (standard)</option>
                    <option value="48h">📬 48h (économique)</option>
                </select>
            </div>
            
            <button class="btn btn-primary" onclick="envoyerTransport()">
                <i class="fas fa-paper-plane"></i> Envoyer au dispatch
            </button>
            
            <div class="btn-scan-again" onclick="recommencerScan()">
                <i class="fas fa-camera"></i> Scanner un autre colis
            </div>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>
    
    <script>
        // ===== CONFIGURATION SCANNEUR =====
        const html5QrCode = new Html5Qrcode("qr-reader");
        let scannerActif = true;
        
        // Configuration pour que la caméra s'ouvre IMMÉDIATEMENT
        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        };
        
        // Démarrer le scan au chargement
        html5QrCode.start(
            { facingMode: "environment" }, // Caméra arrière
            config,
            (decodedText) => {
                console.log("QR scanné:", decodedText);
                
                // Format: TR-2401|Lausanne|Genève|6h
                const parts = decodedText.split('|');
                
                if (parts.length >= 4) {
                    // Remplir les infos
                    document.getElementById('transportId').textContent = parts[0];
                    document.getElementById('pickupCity').textContent = parts[1];
                    document.getElementById('deliveryCity').textContent = parts[2];
                    
                    const speed = parts[3];
                    document.getElementById('speed').value = speed;
                    document.getElementById('speedDisplay').textContent = speed;
                    
                    // Mettre à jour le badge
                    const badge = document.getElementById('speedBadge');
                    badge.className = 'speed-badge';
                    if (speed === '6h') {
                        badge.classList.add('speed-6h');
                        badge.textContent = 'Urgent';
                    } else if (speed === '24h') {
                        badge.classList.add('speed-24h');
                        badge.textContent = 'Standard';
                    } else {
                        badge.classList.add('speed-48h');
                        badge.textContent = 'Économique';
                    }
                    
                    // Afficher le formulaire
                    document.getElementById('formSection').style.display = 'block';
                    
                    // Arrêter le scan temporairement
                    if (scannerActif) {
                        html5QrCode.stop();
                        scannerActif = false;
                    }
                    
                    showNotification('✅ QR scanné avec succès');
                }
            },
            (error) => {
                // Ignorer les erreurs (nécessaire pour que le scan continue)
            }
        ).catch(err => {
            console.log("Erreur caméra:", err);
            showNotification('❌ Erreur caméra - Autorisez l\'accès');
        });
        
        // ===== ENVOYER AU DISPATCH =====
        function envoyerTransport() {
            const transport = {
                id: document.getElementById('transportId').textContent,
                clientNumber: document.getElementById('clientNumber').value,
                pickup: document.getElementById('pickupCity').textContent,
                delivery: document.getElementById('deliveryCity').textContent,
                weight: document.getElementById('weight').value,
                parcels: document.getElementById('parcels').value,
                speed: document.getElementById('speed').value,
                status: 'prepared',
                timestamp: new Date().toISOString()
            };
            
            console.log("🚚 Transport préparé:", transport);
            
            // ICI: Envoyer à Supabase
            // await supabase.from('orders').insert([transport]);
            
            // Si urgent, notifier WhatsApp
            if (transport.speed === '6h') {
                const message = `🚨 URGENT 6h !\nTransport #${transport.id}\nClient: ${transport.clientNumber}\n${transport.pickup} → ${transport.delivery}\nPoids: ${transport.weight}kg`;
                
                // Ouvre WhatsApp (à remplacer par votre numéro)
                // window.open(`https://wa.me/41798700488?text=${encodeURIComponent(message)}`, '_blank');
                
                showNotification('🔔 URGENT - Notification envoyée');
            } else {
                showNotification('✅ Transport envoyé au dispatch');
            }
            
            // Préparer pour un nouveau scan
            setTimeout(() => {
                recommencerScan();
            }, 1500);
        }
        
        // ===== RECOMMENCER LE SCAN =====
        function recommencerScan() {
            document.getElementById('formSection').style.display = 'none';
            
            if (!scannerActif) {
                html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    // Mêmes callbacks qu'au démarrage
                    (decodedText) => {
                        const parts = decodedText.split('|');
                        if (parts.length >= 4) {
                            document.getElementById('transportId').textContent = parts[0];
                            document.getElementById('pickupCity').textContent = parts[1];
                            document.getElementById('deliveryCity').textContent = parts[2];
                            document.getElementById('speed').value = parts[3];
                            document.getElementById('formSection').style.display = 'block';
                            html5QrCode.stop();
                            scannerActif = false;
                            showNotification('✅ QR scanné');
                        }
                    },
                    () => {}
                );
                scannerActif = true;
            }
        }
        
        // ===== NOTIFICATION =====
        function showNotification(message) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.style.display = 'block';
            setTimeout(() => {
                notif.style.display = 'none';
            }, 3000);
        }
    </script>
    
</body>
</html>
