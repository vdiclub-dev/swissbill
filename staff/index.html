<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Préparation colis</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        
        body {
            background: #f1f5f9;
            min-height: 100vh;
        }
        
        .header {
            background: #0f172a;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e53935;
        }
        
        .logo {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo i { color: #e53935; }
        
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        
        .card h2 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            color: #0f172a;
        }
        
        .card h2 i { color: #e53935; }
        
        .transport-number {
            background: #0f172a;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .transport-number span {
            font-size: 24px;
            font-weight: bold;
            color: #facc15;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #475569;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .fixed-address {
            background: #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            border-left: 4px solid #0f172a;
        }
        
        /* SECTION COLIS */
        .colis-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .btn-add {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        
        .btn-add:hover {
            background: #059669;
        }
        
        .colis-list {
            margin-bottom: 15px;
        }
        
        .colis-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .colis-info {
            flex: 1;
        }
        
        .colis-info span {
            margin-right: 20px;
        }
        
        .colis-actions button {
            background: none;
            border: none;
            cursor: pointer;
            margin-left: 8px;
            font-size: 16px;
        }
        
        .btn-edit { color: #3b82f6; }
        .btn-delete { color: #ef4444; }
        
        .speed-option {
            text-align: center;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .speed-option.selected {
            background: #e53935;
            color: white;
            border-color: #e53935;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: #e53935;
            color: white;
        }
        
        .btn-primary:hover {
            background: #c62828;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .pdf-preview {
            background: #f8fafc;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            border: 2px dashed #e53935;
            display: none;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
        }
        
        .total-info {
            background: #0f172a;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
        }
        
        .total-info span {
            color: #facc15;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <i class="fas fa-box"></i> Léman-Courses | Préparation
        </div>
    </div>
    
    <div class="container">
        <!-- NUMÉRO TRANSPORT AUTO -->
        <div class="card">
            <div class="transport-number">
                <span><i class="fas fa-barcode"></i> Transport N°</span>
                <span id="transportNumber">TR-2026-000001</span>
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>Client</label>
                    <select id="clientSelect">
                        <option value="CL2025-001|Dupont Jean|Impasse des Griottes 3, 1462 Yvonand">Dupont Jean</option>
                        <option value="CL2025-002|Martin SA|Route de Neuchâtel 8, 1400 Yverdon">Martin SA</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Date</label>
                    <input type="text" id="currentDate" readonly>
                </div>
            </div>
        </div>
        
        <!-- ADRESSES -->
        <div class="card">
            <h2><i class="fas fa-map-marker-alt"></i> Adresses</h2>
            
            <div class="fixed-address" id="departAddress">
                <i class="fas fa-warehouse"></i> <strong>Départ:</strong> Impasse des Griottes 3, 1462 Yvonand
            </div>
            
            <div class="form-group">
                <label>Livraison</label>
                <select id="deliveryAddress">
                    <option value="Rue du Lac 12, 1000 Lausanne">Rue du Lac 12, Lausanne</option>
                    <option value="Place de la Gare 5, 1200 Genève">Place de la Gare 5, Genève</option>
                    <option value="Grand-Rue 8, 2000 Neuchâtel">Grand-Rue 8, Neuchâtel</option>
                    <option value="autre">Autre...</option>
                </select>
            </div>
            
            <div id="autreAdresse" style="display:none;">
                <input type="text" id="nouvelleAdresse" placeholder="Rue, NPA, Ville" class="form-group">
            </div>
        </div>
        
        <!-- GESTION DES COLIS -->
        <div class="card">
            <div class="colis-header">
                <h2><i class="fas fa-box"></i> Colis</h2>
                <button class="btn-add" onclick="ajouterColis()">
                    <i class="fas fa-plus"></i> Ajouter un colis
                </button>
            </div>
            
            <!-- Liste des colis -->
            <div id="colisList" class="colis-list">
                <!-- Les colis apparaîtront ici -->
            </div>
            
            <!-- Formulaire pour ajouter/modifier un colis -->
            <div id="colisForm" style="display:none; background:#f8fafc; padding:15px; border-radius:8px; margin-bottom:15px;">
                <h4 id="formTitle" style="margin-bottom:10px;">Ajouter un colis</h4>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="editDescription" placeholder="Carton, palette...">
                    </div>
                    
                    <div class="form-group">
                        <label>Poids unitaire (kg)</label>
                        <input type="number" id="editWeight" step="0.1" value="1.0">
                    </div>
                </div>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label>Quantité</label>
                        <input type="number" id="editQuantity" value="1" min="1">
                    </div>
                    
                    <div class="form-group">
                        <label>Type</label>
                        <select id="editType">
                            <option value="Colis">Colis</option>
                            <option value="Fragile">Fragile</option>
                            <option value="Palette">Palette</option>
                            <option value="Document">Document</option>
                        </select>
                    </div>
                </div>
                
                <div style="display:flex; gap:10px;">
                    <button class="btn-add" onclick="saveColis()" style="flex:1;">Sauvegarder</button>
                    <button class="btn-add" onclick="annulerEdition()" style="flex:1; background:#64748b;">Annuler</button>
                </div>
            </div>
            
            <!-- RÉCAPITULATIF POIDS ET NOMBRE COLIS -->
            <div id="recapColis" class="total-info">
                <span>📊 Récapitulatif</span>
                <span id="recapText">0 colis • 0 kg</span>
            </div>
        </div>
        
        <!-- VITESSE ET INSTRUCTIONS -->
        <div class="card">
            <div class="form-group">
                <label>Vitesse</label>
                <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
                    <div class="speed-option" onclick="selectSpeed(this, '6h')">🚀 6h</div>
                    <div class="speed-option selected" onclick="selectSpeed(this, '24h')">📦 24h</div>
                    <div class="speed-option" onclick="selectSpeed(this, '48h')">📬 48h</div>
                </div>
                <input type="hidden" id="speed" value="24h">
            </div>
            
            <div class="form-group">
                <label>Instructions</label>
                <textarea id="instructions" rows="2" placeholder="Fragile, code d'accès..."></textarea>
            </div>
            
            <button class="btn btn-primary" onclick="genererPDF()">
                <i class="fas fa-file-pdf"></i> Générer PDF (preuve)
            </button>
            
            <button class="btn btn-success" onclick="envoyer()">
                <i class="fas fa-paper-plane"></i> Envoyer au dispatch
            </button>
            
            <div id="pdfPreview" class="pdf-preview"></div>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>
    
    <script>
        // ===== NUMÉRO DE TRANSPORT AUTO =====
        let compteur = 1; // À remplacer par le dernier numéro en base
        
        function genererNumeroTransport() {
            const annee = new Date().getFullYear();
            const numeroFormate = String(compteur).padStart(6, '0');
            return `TR-${annee}-${numeroFormate}`;
        }
        
        document.getElementById('transportNumber').textContent = genererNumeroTransport();
        
        // Date du jour
        const today = new Date();
        document.getElementById('currentDate').value = today.toLocaleDateString('fr-CH');
        
        // ===== DONNÉES =====
        let colisList = [];
        let editingIndex = -1;
        
        // ===== CHANGEMENT CLIENT =====
        document.getElementById('clientSelect').addEventListener('change', function() {
            const [clientId, clientName, depart] = this.value.split('|');
            document.getElementById('departAddress').innerHTML = 
                `<i class="fas fa-warehouse"></i> <strong>Départ:</strong> ${depart}`;
        });
        
        // ===== GESTION DES COLIS =====
        function ajouterColis() {
            editingIndex = -1;
            document.getElementById('editDescription').value = '';
            document.getElementById('editWeight').value = '1.0';
            document.getElementById('editQuantity').value = '1';
            document.getElementById('editType').value = 'Colis';
            document.getElementById('formTitle').textContent = 'Ajouter un colis';
            document.getElementById('colisForm').style.display = 'block';
        }
        
        function editColis(index) {
            const colis = colisList[index];
            editingIndex = index;
            document.getElementById('editDescription').value = colis.description;
            document.getElementById('editWeight').value = colis.poids;
            document.getElementById('editQuantity').value = colis.quantite;
            document.getElementById('editType').value = colis.type;
            document.getElementById('formTitle').textContent = 'Modifier le colis';
            document.getElementById('colisForm').style.display = 'block';
        }
        
        function deleteColis(index) {
            if (confirm('Supprimer ce colis ?')) {
                colisList.splice(index, 1);
                afficherColis();
                showNotification('✅ Colis supprimé');
            }
        }
        
        function saveColis() {
            const description = document.getElementById('editDescription').value;
            const poids = parseFloat(document.getElementById('editWeight').value);
            const quantite = parseInt(document.getElementById('editQuantity').value);
            const type = document.getElementById('editType').value;
            
            if (!description) {
                alert('Veuillez entrer une description');
                return;
            }
            
            const colis = {
                description: description,
                poids: poids,
                quantite: quantite,
                type: type,
                poidsTotal: poids * quantite
            };
            
            if (editingIndex === -1) {
                colisList.push(colis);
                showNotification('✅ Colis ajouté');
            } else {
                colisList[editingIndex] = colis;
                showNotification('✅ Colis modifié');
            }
            
            annulerEdition();
            afficherColis();
        }
        
        function annulerEdition() {
            document.getElementById('colisForm').style.display = 'none';
            editingIndex = -1;
        }
        
        function afficherColis() {
            const listEl = document.getElementById('colisList');
            let totalColis = 0;
            let totalPoids = 0;
            let html = '';
            
            colisList.forEach((colis, index) => {
                totalColis += colis.quantite;
                totalPoids += colis.poidsTotal;
                
                html += `
                    <div class="colis-item">
                        <div class="colis-info">
                            <span><strong>${colis.description}</strong></span>
                            <span>${colis.poids}kg x ${colis.quantite}</span>
                            <span>(${colis.type})</span>
                            <span style="color:#e53935; font-weight:bold;">= ${colis.poidsTotal}kg</span>
                        </div>
                        <div class="colis-actions">
                            <button class="btn-edit" onclick="editColis(${index})"><i class="fas fa-edit"></i></button>
                            <button class="btn-delete" onclick="deleteColis(${index})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            
            if (colisList.length === 0) {
                html = '<div style="text-align:center; padding:20px; color:#64748b;">Aucun colis ajouté</div>';
            }
            
            listEl.innerHTML = html;
            
            // Mise à jour du récapitulatif
            document.getElementById('recapText').innerHTML = `${totalColis} colis • ${totalPoids.toFixed(1)} kg`;
        }
        
        // ===== SÉLECTION VITESSE =====
        function selectSpeed(element, speed) {
            document.querySelectorAll('.speed-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');
            document.getElementById('speed').value = speed;
        }
        
        // ===== GÉNÉRER PDF AVEC TOUS LES DÉTAILS =====
        function genererPDF() {
            const transportId = document.getElementById('transportNumber').textContent;
            const client = document.getElementById('clientSelect').value.split('|')[1];
            const depart = document.getElementById('departAddress').textContent.replace('Départ:', '').trim();
            const livraison = document.getElementById('deliveryAddress').value;
            const vitesse = document.getElementById('speed').value;
            const instructions = document.getElementById('instructions').value;
            const date = document.getElementById('currentDate').value;
            
            // Calculs
            let totalColis = 0;
            let totalPoids = 0;
            let detailsColis = '';
            
            colisList.forEach(c => {
                totalColis += c.quantite;
                totalPoids += c.poidsTotal;
                detailsColis += `
                    <tr>
                        <td>${c.description}</td>
                        <td>${c.poids} kg</td>
                        <td>${c.quantite}</td>
                        <td>${c.poidsTotal} kg</td>
                        <td>${c.type}</td>
                    </tr>
                `;
            });
            
            // Données pour QR
            const qrData = `${transportId}|${client}|${depart}|${livraison}|${totalColis}colis|${totalPoids}kg|${vitesse}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrData)}`;
            
            // APERÇU PDF
            document.getElementById('pdfPreview').innerHTML = `
                <h3 style="margin-bottom:15px;">📄 BORDEREAU DE TRANSPORT</h3>
                <div style="background:white; padding:20px; border-radius:8px; border:1px solid #e2e8f0;">
                    
                    <!-- EN-TÊTE -->
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <div>
                            <h2 style="color:#e53935;">LÉMAN-COURSES</h2>
                            <p>Impasse des Griottes 3, 1462 Yvonand</p>
                        </div>
                        <div style="text-align:right;">
                            <h3 style="color:#0f172a;">${transportId}</h3>
                            <p>Date: ${date}</p>
                        </div>
                    </div>
                    
                    <!-- QR CODE -->
                    <div style="text-align:center; margin:20px 0;">
                        <img src="${qrUrl}" style="width:150px; border:1px solid #000;">
                        <p style="font-size:12px;">Scan pour prise en charge</p>
                    </div>
                    
                    <!-- CLIENT ET ADRESSES -->
                    <div style="margin:20px 0; padding:15px; background:#f8fafc; border-radius:8px;">
                        <p><strong>Client:</strong> ${client}</p>
                        <p><strong>Départ:</strong> ${depart}</p>
                        <p><strong>Livraison:</strong> ${livraison}</p>
                        <p><strong>Vitesse:</strong> ${vitesse}</p>
                    </div>
                    
                    <!-- TABLEAU DES COLIS (PREUVE) -->
                    <h4 style="margin:15px 0;">📦 Détail des colis</h4>
                    <table style="width:100%; border-collapse:collapse;">
                        <thead>
                            <tr style="background:#e53935; color:white;">
                                <th style="padding:8px;">Description</th>
                                <th>Poids U.</th>
                                <th>Qté</th>
                                <th>Poids Total</th>
                                <th>Type</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${detailsColis}
                        </tbody>
                        <tfoot>
                            <tr style="background:#0f172a; color:white; font-weight:bold;">
                                <td colspan="2" style="padding:8px;">TOTAUX</td>
                                <td>${totalColis} colis</td>
                                <td>${totalPoids.toFixed(1)} kg</td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                    
                    <!-- INSTRUCTIONS -->
                    ${instructions ? `
                        <div style="margin-top:15px; padding:10px; background:#fee2e2; border-radius:8px;">
                            <strong>📝 Instructions:</strong> ${instructions}
                        </div>
                    ` : ''}
                    
                    <!-- SIGNATURES -->
                    <div style="margin-top:30px; display:flex; justify-content:space-between;">
                        <div>
                            <p>Expéditeur: ____________________</p>
                        </div>
                        <div>
                            <p>Chauffeur: ____________________</p>
                        </div>
                    </div>
                    
                    <div style="margin-top:20px; font-size:11px; color:#64748b; text-align:center;">
                        Ce document fait office de preuve de prise en charge
                    </div>
                </div>
            `;
            document.getElementById('pdfPreview').style.display = 'block';
            
            showNotification('✅ PDF généré');
            
            // Incrémenter le compteur pour le prochain transport
            compteur++;
            document.getElementById('transportNumber').textContent = genererNumeroTransport();
        }
        
        // ===== ENVOYER AU DISPATCH =====
        function envoyer() {
            const transport = {
                id: document.getElementById('transportNumber').textContent,
                client: document.getElementById('clientSelect').value.split('|')[1],
                livraison: document.getElementById('deliveryAddress').value,
                colis: colisList,
                vitesse: document.getElementById('speed').value,
                instructions: document.getElementById('instructions').value,
                date: document.getElementById('currentDate').value
            };
            
            console.log("✅ Transport préparé:", transport);
            showNotification('✅ Envoyé au dispatch');
            
            if (transport.vitesse === '6h') {
                alert('🚨 URGENT 6H !');
            }
        }
        
        // ===== GESTION ADRESSE =====
        document.getElementById('deliveryAddress').addEventListener('change', function() {
            document.getElementById('autreAdresse').style.display = 
                this.value === 'autre' ? 'block' : 'none';
        });
        
        // ===== NOTIFICATION =====
        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = '✅ ' + msg;
            notif.style.display = 'block';
            setTimeout(() => { notif.style.display = 'none'; }, 2000);
        }
        
        // Ajouter un exemple
        window.onload = function() {
            colisList.push({
                description: 'Carton principal',
                poids: 1.5,
                quantite: 2,
                type: 'Fragile',
                poidsTotal: 3.0
            });
            afficherColis();
        };
        const user = JSON.parse(localStorage.getItem('user'));
    if (!user || !user.loggedIn || user.role !== 'staff') {
        window.location.href = '../login/';
    }
    </script>
    
</body>
</html>
