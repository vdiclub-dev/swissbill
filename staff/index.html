<!-- Alternative sans caméra -->
<div style="margin-top:15px;">
    <p style="color:#64748b;">Ou entrez manuellement :</p>
    <div style="display:flex; gap:10px;">
        <input type="text" id="manualId" placeholder="TR-2401" style="flex:1; padding:12px; border:2px solid #e2e8f0; border-radius:8px;">
        <button onclick="manuelScan()" class="btn-primary" style="padding:12px;">OK</button>
    </div>
</div>

<script>
function manuelScan() {
    const id = document.getElementById('manualId').value;
    if (id) {
        document.getElementById('transportId').textContent = id;
        document.getElementById('departAddress').textContent = 'Impasse des Griottes 3, 1462 Yvonand';
        document.getElementById('formSection').style.display = 'block';
        showNotification('✅ Transport chargé manuellement');
    }
}
</script>
