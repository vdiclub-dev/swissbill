<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Scan transport</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Scanner QR code -->
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body { background:#f1f5f9; }
        
        .header {
            background:#0f172a; color:white; padding:15px 30px;
            display:flex; justify-content:space-between; align-items:center;
            border-bottom:3px solid #e53935;
        }
        
        .container {
            max-width:600px; margin:30px auto; padding:0 20px;
        }
        
        .scan-card {
            background:white; border-radius:15px; padding:20px;
            border:1px solid #e2e8f0; margin-bottom:20px;
        }
        
        .scanner-container {
            width:100%; background:#0f172a; border-radius:15px;
            overflow:hidden; border:3px solid #e53935;
        }
        
        #qr-reader { width:100%; }
        
        .form-group { margin-bottom:15px; }
        
        .form-group label {
            display:block; margin-bottom:5px; font-weight:600;
            color:#0f172a;
        }
        
        .form-group input, .form-group select {
            width:100%; padding:12px; border:2px solid #e2e8f0;
            border-radius:8px; font-size:16px;
        }
        
        .form-group input:focus {
            outline:none; border-color:#e53935;
        }
        
        .row {
            display:grid; grid-template-columns:1fr 1fr; gap:10px;
        }
        
        .btn {
            width:100%; padding:15px; border:none; border-radius:8px;
            font-weight:bold; cursor:pointer; margin-top:10px;
        }
        
        .btn-primary {
            background:#e53935; color:white; font-size:16px;
        }
        
        .btn-primary:hover { background:#c62828; }
        
        .info-box {
            background:#f8fafc; padding:15px; border-radius:8px;
            margin:20px 0; border-left:4px solid #e53935;
        }
        
        .info-box h3 { margin-bottom:10px; color:#0f172a; }
        
        .speed-badge {
            display:inline-block; padding:5px 10px; border-radius:20px;
            font-weight:bold; margin:5px;
        }
        .speed-6h { background:#fee2e2; color:#991b1b; }
        .speed-24h { background:#fef3c7; color:#92400e; }
        .speed-48h { background:#dbeafe; color:#1e40af; }
        
        .notification {
            position:fixed; top:20px; right:20px; background:#10b981;
            color:white; padding:15px; border-radius:8px; display:none;
            z-index:1000; animation:slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { transform:translateX(100%); opacity:0; }
            to { transform:translateX(0); opacity:1; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">📦 Léman-Courses | Scan</div>
        <div><i class="fas fa-user"></i> Magasinier</div>
    </header>
    
    <div class="container">
        <!-- SCAN QR -->
        <div class="scan-card">
            <h2 style="margin-bottom:15px;">📷 Scanner le QR code</h2>
            <div class="scanner-container">
                <div id="qr-reader"></div>
            </div>
        </div>
        
        <!-- FORMULAIRE MAGASINIER -->
        <div class="scan-card" id="formCard" style="display:none;">
            <h2 style="margin-bottom:20px;">📦 Préparer le transport</h2>
            
            <div class="info-box">
                <h3>🚚 Transport #<span id="transportId">2401</span></h3>
                <p><i class="fas fa-map-pin"></i> <span id="pickupCity">Lausanne</span> → <span id="deliveryCity">Genève</span></p>
            </div>
            
            <div class="form-group">
                <label>👤 Votre numéro client</label>
                <input type="text" id="clientNumber" placeholder="CL2025-001" value="CL2025-001">
                <small style="color:#64748b;">Votre numéro unique enregistré dans la base</small>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>⚖️ Poids (kg)</label>
                    <input type="number" id="weight" step="0.1" value="1.5">
                </div>
                <div class="form-group">
                    <label>📦 Nombre de colis</label>
                    <input type="number" id="parcels" value="1" min="1">
                </div>
            </div>
            
            <div class="form-group">
                <label>⚡ Vitesse de livraison</label>
                <select id="speed">
                    <option value="6h">🚀 Express 6h (urgence)</option>
                    <option value="24h" selected>📦 24h (standard)</option>
                    <option value="48h">📬 48h (économique)</option>
                </select>
            </div>
            
            <button class="btn btn-primary" onclick="envoyerTransport()">
                <i class="fas fa-paper-plane"></i> Envoyer au dispatch
            </button>
        </div>
    </div>
    
    <!-- NOTIFICATION -->
    <div id="notification" class="notification"></div>
    
    <script>
        // Initialisation scanner
        const html5QrCode = new Html5Qrcode("qr-reader");
        
        const qrSuccess = (decodedText) => {
            console.log("QR scanné:", decodedText);
            
            // Format attendu: TR-2401|CL2025-001|Lausanne|Genève|Urgent|6h
            const parts = decodedText.split('|');
            
            if (parts.length >= 4) {
                document.getElementById('transportId').textContent = parts[0];
                document.getElementById('pickupCity').textContent = parts[2];
                document.getElementById('deliveryCity').textContent = parts[3];
                
                // Pré-remplir la vitesse si disponible
                if (parts.length >= 6) {
                    document.getElementById('speed').value = parts[5];
                }
                
                document.getElementById('formCard').style.display = 'block';
                html5QrCode.stop();
                
                showNotification('✅ QR scanné - Remplissez le formulaire');
            }
        };
        
        const config = { fps: 10, qrbox: 250 };
        html5QrCode.start({ facingMode: "environment" }, config, qrSuccess);
        
        // Envoyer au dispatch
        async function envoyerTransport() {
            const transport = {
                id: document.getElementById('transportId').textContent,
                clientNumber: document.getElementById('clientNumber').value,
                pickup: document.getElementById('pickupCity').textContent,
                delivery: document.getElementById('deliveryCity').textContent,
                weight: document.getElementById('weight').value,
                parcels: document.getElementById('parcels').value,
                speed: document.getElementById('speed').value,
                status: 'prepared',
                timestamp: new Date().toISOString(),
                urgent: document.getElementById('speed').value === '6h'
            };
            
            console.log("🚚 Transport préparé:", transport);
            
            // ICI - Envoyer à Supabase
            // await supabase.from('orders').insert([transport]);
            
            // Si urgent (6h) -> Notification WhatsApp
            if (transport.speed === '6h') {
                sendWhatsAppNotification(transport);
            }
            
            showNotification('✅ Transport envoyé au dispatch');
            
            // Reset et retour au scan
            setTimeout(() => {
                document.getElementById('formCard').style.display = 'none';
                html5QrCode.start({ facingMode: "environment" }, config, qrSuccess);
            }, 2000);
        }
        
        // Notification WhatsApp pour les urgents
        function sendWhatsAppNotification(transport) {
            const message = `🚨 URGENT 6h !\nTransport #${transport.id}\nClient: ${transport.clientNumber}\n${transport.pickup} → ${transport.delivery}\nPoids: ${transport.weight}kg\nColis: ${transport.parcels}`;
            
            // URL WhatsApp (à remplacer par votre numéro)
            const whatsappUrl = `https://wa.me/41798700488?text=${encodeURIComponent(message)}`;
            
            console.log("📱 Notification WhatsApp:", message);
            
            // Option 1: Ouvrir WhatsApp directement
            // window.open(whatsappUrl, '_blank');
            
            // Option 2: Afficher une notification
            showNotification('🔔 URGENT - Notification WhatsApp envoyée');
        }
        
        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.style.display = 'block';
            setTimeout(() => { notif.style.display = 'none'; }, 3000);
        }
    </script>
    
</body>
</html>
