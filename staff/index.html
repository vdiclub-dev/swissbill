<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Préparation express</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- jsPDF pour générer PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Scanner QR -->
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        
        body {
            background: #f1f5f9;
            min-height: 100vh;
        }
        
        .header {
            background: #0f172a;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e53935;
        }
        
        .logo {
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo i { color: #e53935; }
        
        .staff-badge {
            background: #1e293b;
            padding: 8px 16px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        /* SCAN SECTION */
        .scan-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        
        .scan-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .scan-header i { color: #e53935; font-size: 24px; }
        
        /* BOUTON CAMÉRA */
        .btn-camera {
            background: #0f172a;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-camera i { color: #e53935; }
        
        .btn-camera:hover {
            background: #1e293b;
        }
        
        #qr-reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
            display: none; /* Caché par défaut */
        }
        
        /* FORM SECTION */
        .form-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #e2e8f0;
        }
        
        .form-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .form-title i { color: #e53935; font-size: 24px; }
        
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #475569;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
        }
        
        .fixed-address {
            background: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #0f172a;
        }
        
        .fixed-address i { color: #0f172a; margin-right: 8px; }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #e53935;
            color: white;
        }
        
        .btn-primary:hover {
            background: #c62828;
        }
        
        .btn-secondary {
            background: white;
            color: #e53935;
            border: 2px solid #e53935;
        }
        
        .btn-secondary:hover {
            background: #fee2e2;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .pdf-preview {
            background: #f8fafc;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border: 2px dashed #e53935;
        }
        
        .speed-option {
            flex:1; 
            text-align:center; 
            padding:12px; 
            border:2px solid #e2e8f0; 
            border-radius:8px; 
            cursor:pointer;
            transition:0.2s;
        }
        
        .speed-option.selected {
            background: #e53935;
            color: white;
            border-color: #e53935;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <i class="fas fa-boxes"></i> Léman-Courses
        </div>
        <div class="staff-badge">
            <i class="fas fa-user"></i> Magasinier
        </div>
    </div>
    
    <div class="container">
        <!-- SCAN QR SECTION -->
        <div class="scan-section">
            <div class="scan-header">
                <i class="fas fa-qrcode"></i>
                <h2>Scanner un transport</h2>
            </div>
            
            <!-- BOUTON POUR OUVRIR LA CAMÉRA -->
            <button class="btn-camera" onclick="ouvrirCamera()">
                <i class="fas fa-camera"></i> Ouvrir la caméra
            </button>
            
            <!-- ZONE DE SCAN (cachée par défaut) -->
            <div id="qr-reader"></div>
        </div>
        
        <!-- FORMULAIRE DE PRÉPARATION -->
        <div class="form-section" id="formSection" style="display:none;">
            <div class="form-title">
                <i class="fas fa-box"></i>
                <h2>Préparer le colis</h2>
            </div>
            
            <!-- INFOS TRANSPORT -->
            <div style="background:#f1f5f9; padding:15px; border-radius:8px; margin-bottom:20px;">
                <h3 style="color:#e53935;">Transport #<span id="transportId">2401</span></h3>
            </div>
            
            <!-- ADRESSE DE DÉPART FIXE -->
            <div class="fixed-address">
                <i class="fas fa-warehouse"></i>
                <strong>Départ :</strong>
                <span id="departAddress">Impasse des Griottes 3, 1462 Yvonand</span>
            </div>
            
            <!-- ADRESSE LIVRAISON -->
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Livraison</label>
                <select id="deliveryAddress" class="form-control">
                    <option value="">Sélectionner une adresse</option>
                    <option value="Rue du Lac 12, 1000 Lausanne">Rue du Lac 12, Lausanne</option>
                    <option value="Place de la Gare 5, 1200 Genève">Place de la Gare 5, Genève</option>
                    <option value="Grand-Rue 8, 2000 Neuchâtel">Grand-Rue 8, Neuchâtel</option>
                    <option value="autre">Autre adresse...</option>
                </select>
            </div>
            
            <div id="autreAdresse" style="display:none;">
                <input type="text" id="nouvelleAdresse" placeholder="Rue, NPA, Ville" class="form-control">
            </div>
            
            <!-- DÉTAILS COLIS -->
            <div class="grid-3">
                <div class="form-group">
                    <label>⚖️ Poids (kg)</label>
                    <input type="number" id="weight" step="0.1" value="1.0">
                </div>
                
                <div class="form-group">
                    <label>📦 Quantité</label>
                    <input type="number" id="quantity" value="1" min="1">
                </div>
                
                <div class="form-group">
                    <label>📦 Type</label>
                    <select id="parcelType">
                        <option value="Colis standard">Colis standard</option>
                        <option value="Fragile">Fragile</option>
                        <option value="Palette">Palette</option>
                    </select>
                </div>
            </div>
            
            <!-- VITESSE -->
            <div class="form-group">
                <label>⚡ Vitesse</label>
                <div style="display:flex; gap:10px;">
                    <div class="speed-option" onclick="selectSpeed(this, '6h')">🚀 6h</div>
                    <div class="speed-option selected" onclick="selectSpeed(this, '24h')">📦 24h</div>
                    <div class="speed-option" onclick="selectSpeed(this, '48h')">📬 48h</div>
                </div>
                <input type="hidden" id="speed" value="24h">
            </div>
            
            <!-- INSTRUCTIONS -->
            <div class="form-group">
                <label>📝 Instructions</label>
                <textarea id="instructions" rows="2" placeholder="Fragile, code..."></textarea>
            </div>
            
            <!-- ACTIONS -->
            <div class="actions">
                <button class="btn btn-primary" onclick="genererPDF()">
                    <i class="fas fa-file-pdf"></i> Générer PDF
                </button>
                <button class="btn btn-primary" onclick="envoyerAuDispatch()">
                    <i class="fas fa-paper-plane"></i> Envoyer
                </button>
                <button class="btn btn-secondary" onclick="recommencer()">
                    <i class="fas fa-redo"></i> Nouveau
                </button>
            </div>
            
            <!-- APERÇU PDF -->
            <div id="pdfPreview" class="pdf-preview" style="display:none;"></div>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>
    
    <script>
        let scanner;
        let currentTransport = null;
        
        // ===== OUVRIR LA CAMÉRA =====
        function ouvrirCamera() {
            const qrReader = document.getElementById('qr-reader');
            qrReader.style.display = 'block';
            
            scanner = new Html5Qrcode("qr-reader");
            
            scanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    console.log("QR scanné:", decodedText);
                    
                    // Format: ID|CLIENT
                    const parts = decodedText.split('|');
                    
                    if (parts.length >= 2) {
                        document.getElementById('transportId').textContent = parts[0];
                        
                        // Adresse départ fixe (simulée)
                        document.getElementById('departAddress').textContent = 'Impasse des Griottes 3, 1462 Yvonand';
                        
                        document.getElementById('formSection').style.display = 'block';
                        scanner.stop();
                        qrReader.style.display = 'none';
                        
                        showNotification('✅ QR scanné avec succès');
                    }
                },
                (error) => {}
            );
        }
        
        // ===== SÉLECTION VITESSE =====
        function selectSpeed(element, speed) {
            document.querySelectorAll('.speed-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');
            document.getElementById('speed').value = speed;
        }
        
        // ===== GÉNÉRER PDF =====
        function genererPDF() {
            const id = document.getElementById('transportId').textContent;
            const depart = document.getElementById('departAddress').textContent;
            const livraison = document.getElementById('deliveryAddress').value;
            const poids = document.getElementById('weight').value;
            const quantite = document.getElementById('quantity').value;
            const type = document.getElementById('parcelType').value;
            const vitesse = document.getElementById('speed').value;
            
            const qrData = `${id}|${depart}|${livraison}|${vitesse}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrData)}`;
            
            document.getElementById('pdfPreview').innerHTML = `
                <h3>📄 Étiquette à coller</h3>
                <div style="text-align:center; background:white; padding:15px;">
                    <h3>#${id}</h3>
                    <img src="${qrUrl}" style="width:150px;">
                    <p><strong>Départ:</strong> ${depart}</p>
                    <p><strong>Livraison:</strong> ${livraison}</p>
                    <p><strong>Poids:</strong> ${poids}kg | <strong>Qté:</strong> ${quantite}</p>
                    <p><strong>Type:</strong> ${type} | <strong>${vitesse}</strong></p>
                </div>
            `;
            document.getElementById('pdfPreview').style.display = 'block';
            
            showNotification('✅ PDF prêt à imprimer');
        }
        
        // ===== ENVOYER AU DISPATCH =====
        function envoyerAuDispatch() {
            const transport = {
                id: document.getElementById('transportId').textContent,
                depart: document.getElementById('departAddress').textContent,
                livraison: document.getElementById('deliveryAddress').value,
                poids: document.getElementById('weight').value,
                quantite: document.getElementById('quantity').value,
                type: document.getElementById('parcelType').value,
                vitesse: document.getElementById('speed').value,
                instructions: document.getElementById('instructions').value,
                timestamp: new Date()
            };
            
            console.log("🚚 Transport préparé:", transport);
            showNotification('✅ Envoyé au dispatch');
            
            if (transport.vitesse === '6h') {
                showNotification('🔔 URGENT - Notification envoyée');
            }
        }
        
        // ===== RECOMMENCER =====
        function recommencer() {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('pdfPreview').style.display = 'none';
            document.getElementById('deliveryAddress').value = '';
        }
        
        // ===== NOTIFICATION =====
        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.style.display = 'block';
            setTimeout(() => { notif.style.display = 'none'; }, 3000);
        }
        
        // ===== GESTION ADRESSE =====
        document.getElementById('deliveryAddress').addEventListener('change', function() {
            document.getElementById('autreAdresse').style.display = 
                this.value === 'autre' ? 'block' : 'none';
        });
    </script>
    
</body>
</html>
