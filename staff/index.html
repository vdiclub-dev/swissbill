<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Préparation colis</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../dispatch/config.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui, -apple-system, sans-serif; }
        
        body {
            background: #f1f5f9;
            min-height: 100vh;
        }
        
        /* HEADER */
        .header {
            background: #0f172a;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e53935;
        }
        
        .logo {
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo i { color: #e53935; }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-badge {
            background: #1e293b;
            padding: 8px 16px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .user-badge i {
            color: #e53935;
        }
        
        .btn-logout {
            background: #e53935;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: 0.2s;
        }
        
        .btn-logout:hover {
            background: #c62828;
        }
        
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        
        .card h2 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            color: #0f172a;
        }
        
        .card h2 i { color: #e53935; }
        
        .transport-number {
            background: #0f172a;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .transport-number span {
            font-size: 24px;
            font-weight: bold;
            color: #facc15;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #475569;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
            box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .fixed-address {
            background: #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            border-left: 4px solid #0f172a;
        }
        
        /* SECTION COLIS */
        .colis-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .btn-add {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            transition: 0.2s;
        }
        
        .btn-add:hover {
            background: #059669;
        }
        
        .colis-list {
            margin-bottom: 15px;
        }
        
        .colis-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .colis-info {
            flex: 1;
        }
        
        .colis-info span {
            margin-right: 20px;
        }
        
        .colis-actions button {
            background: none;
            border: none;
            cursor: pointer;
            margin-left: 8px;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .btn-edit { color: #3b82f6; }
        .btn-edit:hover { color: #1e40af; }
        .btn-delete { color: #ef4444; }
        .btn-delete:hover { color: #991b1b; }
        
        .speed-option {
            text-align: center;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        
        .speed-option:hover {
            border-color: #e53935;
            background: #fee2e2;
        }
        
        .speed-option.selected {
            background: #e53935;
            color: white;
            border-color: #e53935;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            transition: 0.2s;
        }
        
        .btn-primary {
            background: #e53935;
            color: white;
        }
        
        .btn-primary:hover {
            background: #c62828;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229,57,53,0.3);
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .pdf-preview {
            background: #f8fafc;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            border: 2px dashed #e53935;
            display: none;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .total-info {
            background: #0f172a;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
        }
        
        .total-info span {
            color: #facc15;
            font-weight: bold;
            font-size: 18px;
        }
        
        /* Message non autorisé */
        .unauthorized {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            max-width: 500px;
            margin: 100px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        
        .unauthorized i {
            font-size: 60px;
            color: #e53935;
            margin-bottom: 20px;
        }
        
        .unauthorized h2 {
            margin-bottom: 10px;
            color: #0f172a;
        }
        
        .unauthorized p {
            color: #64748b;
            margin-bottom: 30px;
        }
        
        .loader {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }
        
        .loader i {
            font-size: 30px;
            color: #e53935;
            animation: spin 1s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // ===== VÉRIFICATION CONFIG =====
        if (!window.SUPABASE_CONFIG) {
            document.body.innerHTML = '<div class="unauthorized"><i class="fas fa-exclamation-triangle"></i><h2>Erreur</h2><p>Fichier de configuration manquant</p></div>';
            throw new Error("Configuration manquante");
        }
        
        const supabase = window.supabase.createClient(
            window.SUPABASE_CONFIG.url,
            window.SUPABASE_CONFIG.key
        );
        
        // ===== VÉRIFICATION AUTHENTIFICATION =====
        (function() {
            const user = localStorage.getItem('user');
            
            if (!user) {
                document.body.innerHTML = `
                    <div class="unauthorized">
                        <i class="fas fa-lock"></i>
                        <h2>Accès non autorisé</h2>
                        <p>Vous devez être connecté en tant que magasinier.</p>
                        <button class="btn" onclick="window.location.href='../login/'">Se connecter</button>
                    </div>
                `;
                return;
            }
            
            const userData = JSON.parse(user);
            
            if (!userData.loggedIn || userData.role !== 'staff') {
                document.body.innerHTML = `
                    <div class="unauthorized">
                        <i class="fas fa-shield-alt"></i>
                        <h2>Accès restreint</h2>
                        <p>Cette page est réservée aux magasiniers.</p>
                        <button class="btn" onclick="window.location.href='../'">Accueil</button>
                    </div>
                `;
                return;
            }
            
            // Afficher l'interface
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div class="logo">
                        <i class="fas fa-box"></i> Léman-Courses | Préparation
                    </div>
                    
                    <div class="user-section">
                        <div class="user-badge">
                            <i class="fas fa-user"></i>
                            <span>${userData.username}</span>
                        </div>
                        <button class="btn-logout" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Déconnexion
                        </button>
                    </div>
                </div>
                
                <div class="container">
                    <!-- SÉLECTION TRANSPORT -->
                    <div class="card">
                        <h2><i class="fas fa-search"></i> Sélectionner un transport</h2>
                        <div class="form-group">
                            <label>Transport à préparer</label>
                            <select id="transportSelect" onchange="chargerTransport()">
                                <option value="">Choisir un transport...</option>
                            </select>
                        </div>
                        <div id="transportLoader" class="loader" style="display:none;">
                            <i class="fas fa-spinner fa-spin"></i> Chargement...
                        </div>
                    </div>
                    
                    <!-- NUMÉRO TRANSPORT -->
                    <div class="card" id="transportCard" style="display:none;">
                        <div class="transport-number">
                            <span><i class="fas fa-barcode"></i> Transport</span>
                            <span id="transportNumber"></span>
                        </div>
                        
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Client</label>
                                <input type="text" id="clientName" readonly>
                            </div>
                            
                            <div class="form-group">
                                <label>Date</label>
                                <input type="text" id="currentDate" readonly>
                            </div>
                        </div>
                    </div>
                    
                    <!-- ADRESSES -->
                    <div class="card" id="addressCard" style="display:none;">
                        <h2><i class="fas fa-map-marker-alt"></i> Adresses</h2>
                        
                        <div class="fixed-address" id="departAddress">
                            <i class="fas fa-warehouse"></i> <strong>Départ:</strong> 
                        </div>
                        
                        <div class="form-group">
                            <label>Livraison</label>
                            <input type="text" id="deliveryAddress" readonly>
                        </div>
                    </div>
                    
                    <!-- GESTION DES COLIS -->
                    <div class="card" id="colisCard" style="display:none;">
                        <div class="colis-header">
                            <h2><i class="fas fa-box"></i> Colis</h2>
                            <button class="btn-add" onclick="ajouterColis()">
                                <i class="fas fa-plus"></i> Ajouter un colis
                            </button>
                        </div>
                        
                        <div id="colisList" class="colis-list"></div>
                        
                        <div id="colisForm" style="display:none; background:#f8fafc; padding:15px; border-radius:8px; margin-bottom:15px;">
                            <h4 id="formTitle" style="margin-bottom:10px;">Ajouter un colis</h4>
                            
                            <div class="grid-2">
                                <div class="form-group">
                                    <label>Description</label>
                                    <input type="text" id="editDescription" placeholder="Carton, palette...">
                                </div>
                                
                                <div class="form-group">
                                    <label>Poids unitaire (kg)</label>
                                    <input type="number" id="editWeight" step="0.1" value="1.0">
                                </div>
                            </div>
                            
                            <div class="grid-2">
                                <div class="form-group">
                                    <label>Quantité</label>
                                    <input type="number" id="editQuantity" value="1" min="1">
                                </div>
                                
                                <div class="form-group">
                                    <label>Type</label>
                                    <select id="editType">
                                        <option value="Colis">Colis</option>
                                        <option value="Fragile">Fragile</option>
                                        <option value="Palette">Palette</option>
                                        <option value="Document">Document</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div style="display:flex; gap:10px;">
                                <button class="btn-add" onclick="saveColis()" style="flex:1;">Sauvegarder</button>
                                <button class="btn-add" onclick="annulerEdition()" style="flex:1; background:#64748b;">Annuler</button>
                            </div>
                        </div>
                        
                        <div id="recapColis" class="total-info">
                            <span>📊 Récapitulatif</span>
                            <span id="recapText">0 colis • 0 kg</span>
                        </div>
                    </div>
                    
                    <!-- VITESSE ET INSTRUCTIONS -->
                    <div class="card" id="speedCard" style="display:none;">
                        <div class="form-group">
                            <label>Vitesse</label>
                            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
                                <div class="speed-option" onclick="selectSpeed(this, '6h')">🚀 6h</div>
                                <div class="speed-option selected" onclick="selectSpeed(this, '24h')">📦 24h</div>
                                <div class="speed-option" onclick="selectSpeed(this, '48h')">📬 48h</div>
                            </div>
                            <input type="hidden" id="speed" value="24h">
                        </div>
                        
                        <div class="form-group">
                            <label>Instructions</label>
                            <textarea id="instructions" rows="2" placeholder="Fragile, code d'accès..."></textarea>
                        </div>
                        
                        <button class="btn btn-primary" onclick="genererPDF()">
                            <i class="fas fa-file-pdf"></i> Générer PDF
                        </button>
                        
                        <button class="btn btn-success" onclick="validerPreparation()">
                            <i class="fas fa-check"></i> Valider la préparation
                        </button>
                        
                        <div id="pdfPreview" class="pdf-preview"></div>
                    </div>
                </div>
                
                <div id="notification" class="notification"></div>
            `;
            
            // Démarrer l'application
            startApp();
        })();
        
        // ===== FONCTIONS GLOBALES =====
        let currentOrderId = null;
        let colisList = [];
        let editingIndex = -1;
        let compteur = 1;
        
        function logout() {
            localStorage.removeItem('user');
            window.location.href = '../login/';
        }
        
        async function startApp() {
            document.getElementById('currentDate').value = new Date().toLocaleDateString('fr-CH');
            await chargerTransportsDisponibles();
        }
        
        // ===== CHARGER LES TRANSPORTS EN ATTENTE =====
        async function chargerTransportsDisponibles() {
            try {
                document.getElementById('transportLoader').style.display = 'block';
                
                const { data, error } = await supabase
                    .from('transport_orders')
                    .select('*')
                    .eq('status', 'pending')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                const select = document.getElementById('transportSelect');
                let options = '<option value="">Choisir un transport...</option>';
                
                data.forEach(t => {
                    const date = new Date(t.created_at).toLocaleDateString('fr-CH');
                    options += `<option value="${t.id}">${t.order_number} - ${t.client_name} (${date})</option>`;
                });
                
                select.innerHTML = options;
                
            } catch (error) {
                console.error('Erreur:', error);
                showNotification('❌ Erreur chargement transports');
            } finally {
                document.getElementById('transportLoader').style.display = 'none';
            }
        }
        
        // ===== CHARGER UN TRANSPORT =====
        window.chargerTransport = async function() {
            const orderId = document.getElementById('transportSelect').value;
            if (!orderId) return;
            
            try {
                const { data, error } = await supabase
                    .from('transport_orders')
                    .select('*')
                    .eq('id', orderId)
                    .single();
                
                if (error) throw error;
                
                currentOrderId = data.id;
                
                // Afficher les infos
                document.getElementById('transportNumber').textContent = data.order_number;
                document.getElementById('clientName').value = data.client_name || '';
                document.getElementById('departAddress').innerHTML = 
                    `<i class="fas fa-warehouse"></i> <strong>Départ:</strong> Impasse des Griottes 3, 1462 Yvonand`;
                document.getElementById('deliveryAddress').value = data.delivery_city || '';
                document.getElementById('instructions').value = data.instructions || '';
                
                if (data.speed) {
                    const speedOption = document.querySelector(`.speed-option[onclick*="${data.speed}"]`);
                    if (speedOption) {
                        document.querySelectorAll('.speed-option').forEach(opt => opt.classList.remove('selected'));
                        speedOption.classList.add('selected');
                        document.getElementById('speed').value = data.speed;
                    }
                }
                
                // Charger les colis existants
                await chargerColis(orderId);
                
                // Afficher toutes les sections
                document.getElementById('transportCard').style.display = 'block';
                document.getElementById('addressCard').style.display = 'block';
                document.getElementById('colisCard').style.display = 'block';
                document.getElementById('speedCard').style.display = 'block';
                
            } catch (error) {
                console.error('Erreur:', error);
                showNotification('❌ Erreur chargement transport');
            }
        };
        
        // ===== CHARGER LES COLIS =====
        async function chargerColis(orderId) {
            try {
                const { data, error } = await supabase
                    .from('parcels')
                    .select('*')
                    .eq('order_id', orderId);
                
                if (error) throw error;
                
                colisList = data || [];
                afficherColis();
                
            } catch (error) {
                console.error('Erreur chargement colis:', error);
            }
        }
        
        // ===== GESTION DES COLIS =====
        window.ajouterColis = function() {
            editingIndex = -1;
            document.getElementById('editDescription').value = '';
            document.getElementById('editWeight').value = '1.0';
            document.getElementById('editQuantity').value = '1';
            document.getElementById('editType').value = 'Colis';
            document.getElementById('formTitle').textContent = 'Ajouter un colis';
            document.getElementById('colisForm').style.display = 'block';
        };
        
        window.editColis = function(index) {
            const colis = colisList[index];
            editingIndex = index;
            document.getElementById('editDescription').value = colis.description;
            document.getElementById('editWeight').value = colis.weight;
            document.getElementById('editQuantity').value = colis.quantity;
            document.getElementById('editType').value = colis.type;
            document.getElementById('formTitle').textContent = 'Modifier le colis';
            document.getElementById('colisForm').style.display = 'block';
        };
        
        window.deleteColis = function(index) {
            if (confirm('Supprimer ce colis ?')) {
                colisList.splice(index, 1);
                afficherColis();
                showNotification('✅ Colis supprimé');
            }
        };
        
        window.saveColis = function() {
            const description = document.getElementById('editDescription').value;
            const weight = parseFloat(document.getElementById('editWeight').value);
            const quantity = parseInt(document.getElementById('editQuantity').value);
            const type = document.getElementById('editType').value;
            
            if (!description) {
                alert('Veuillez entrer une description');
                return;
            }
            
            const colis = {
                description: description,
                weight: weight,
                quantity: quantity,
                type: type,
                poidsTotal: weight * quantity
            };
            
            if (editingIndex === -1) {
                colisList.push(colis);
                showNotification('✅ Colis ajouté');
            } else {
                colisList[editingIndex] = colis;
                showNotification('✅ Colis modifié');
            }
            
            annulerEdition();
            afficherColis();
        };
        
        window.annulerEdition = function() {
            document.getElementById('colisForm').style.display = 'none';
            editingIndex = -1;
        };
        
        function afficherColis() {
            const listEl = document.getElementById('colisList');
            let totalColis = 0;
            let totalPoids = 0;
            let html = '';
            
            colisList.forEach((colis, index) => {
                totalColis += colis.quantity;
                totalPoids += colis.weight * colis.quantity;
                
                html += `
                    <div class="colis-item">
                        <div class="colis-info">
                            <span><strong>${colis.description}</strong></span>
                            <span>${colis.weight}kg x ${colis.quantity}</span>
                            <span>(${colis.type})</span>
                            <span style="color:#e53935; font-weight:bold;">= ${(colis.weight * colis.quantity).toFixed(1)}kg</span>
                        </div>
                        <div class="colis-actions">
                            <button class="btn-edit" onclick="editColis(${index})"><i class="fas fa-edit"></i></button>
                            <button class="btn-delete" onclick="deleteColis(${index})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            
            if (colisList.length === 0) {
                html = '<div style="text-align:center; padding:20px; color:#64748b;">Aucun colis ajouté</div>';
            }
            
            listEl.innerHTML = html;
            document.getElementById('recapText').innerHTML = `${totalColis} colis • ${totalPoids.toFixed(1)} kg`;
        }
        
        // ===== SÉLECTION VITESSE =====
        window.selectSpeed = function(element, speed) {
            document.querySelectorAll('.speed-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');
            document.getElementById('speed').value = speed;
        };
        
        // ===== GÉNÉRER PDF =====
        window.genererPDF = function() {
            const transportId = document.getElementById('transportNumber').textContent;
            const client = document.getElementById('clientName').value;
            const depart = document.getElementById('departAddress').textContent.replace('Départ:', '').trim();
            const livraison = document.getElementById('deliveryAddress').value;
            const vitesse = document.getElementById('speed').value;
            const instructions = document.getElementById('instructions').value;
            const date = document.getElementById('currentDate').value;
            
            let totalColis = 0;
            let totalPoids = 0;
            let detailsColis = '';
            
            colisList.forEach(c => {
                totalColis += c.quantity;
                totalPoids += c.weight * c.quantity;
                detailsColis += `
                    <tr>
                        <td>${c.description}</td>
                        <td>${c.weight} kg</td>
                        <td>${c.quantity}</td>
                        <td>${(c.weight * c.quantity).toFixed(1)} kg</td>
                        <td>${c.type}</td>
                    </tr>
                `;
            });
            
            const qrData = `${transportId}|${client}|${depart}|${livraison}|${totalColis}colis|${totalPoids.toFixed(1)}kg|${vitesse}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrData)}`;
            
            document.getElementById('pdfPreview').innerHTML = `
                <h3 style="margin-bottom:15px;">📄 BORDEREAU DE TRANSPORT</h3>
                <div style="background:white; padding:20px; border-radius:8px; border:1px solid #e2e8f0;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                        <div>
                            <h2 style="color:#e53935;">LÉMAN-COURSES</h2>
                            <p>Impasse des Griottes 3, 1462 Yvonand</p>
                        </div>
                        <div style="text-align:right;">
                            <h3 style="color:#0f172a;">${transportId}</h3>
                            <p>Date: ${date}</p>
                        </div>
                    </div>
                    
                    <div style="text-align:center; margin:20px 0;">
                        <img src="${qrUrl}" style="width:150px; border:1px solid #000;">
                        <p style="font-size:12px;">Scan pour prise en charge</p>
                    </div>
                    
                    <div style="margin:20px 0; padding:15px; background:#f8fafc; border-radius:8px;">
                        <p><strong>Client:</strong> ${client}</p>
                        <p><strong>Départ:</strong> ${depart}</p>
                        <p><strong>Livraison:</strong> ${livraison}</p>
                        <p><strong>Vitesse:</strong> ${vitesse}</p>
                    </div>
                    
                    <h4 style="margin:15px 0;">📦 Détail des colis</h4>
                    <table style="width:100%; border-collapse:collapse;">
                        <thead>
                            <tr style="background:#e53935; color:white;">
                                <th style="padding:8px;">Description</th>
                                <th>Poids U.</th>
                                <th>Qté</th>
                                <th>Poids Total</th>
                                <th>Type</th>
                            </tr>
                        </thead>
                        <tbody>${detailsColis}</tbody>
                        <tfoot>
                            <tr style="background:#0f172a; color:white; font-weight:bold;">
                                <td colspan="2" style="padding:8px;">TOTAUX</td>
                                <td>${totalColis} colis</td>
                                <td>${totalPoids.toFixed(1)} kg</td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                    
                    ${instructions ? `
                        <div style="margin-top:15px; padding:10px; background:#fee2e2; border-radius:8px;">
                            <strong>📝 Instructions:</strong> ${instructions}
                        </div>
                    ` : ''}
                    
                    <div style="margin-top:30px; display:flex; justify-content:space-between;">
                        <div><p>Expéditeur: ____________________</p></div>
                        <div><p>Chauffeur: ____________________</p></div>
                    </div>
                    
                    <div style="margin-top:20px; font-size:11px; color:#64748b; text-align:center;">
                        Ce document fait office de preuve de prise en charge
                    </div>
                </div>
            `;
            document.getElementById('pdfPreview').style.display = 'block';
            
            showNotification('✅ PDF généré');
        };
        
        // ===== VALIDER LA PRÉPARATION =====
        window.validerPreparation = async function() {
            if (!currentOrderId) {
                alert('Aucun transport sélectionné');
                return;
            }
            
            if (colisList.length === 0) {
                alert('Ajoutez au moins un colis');
                return;
            }
            
            try {
                // 1. Mettre à jour le transport
                const { error: orderError } = await supabase
                    .from('transport_orders')
                    .update({
                        status: 'prepared',
                        prepared_at: new Date(),
                        speed: document.getElementById('speed').value,
                        instructions: document.getElementById('instructions').value
                    })
                    .eq('id', currentOrderId);
                
                if (orderError) throw orderError;
                
                // 2. Sauvegarder les colis
                for (let colis of colisList) {
                    const { error: parcelError } = await supabase
                        .from('parcels')
                        .insert([{
                            order_id: currentOrderId,
                            description: colis.description,
                            weight: colis.weight,
                            quantity: colis.quantity,
                            type: colis.type
                        }]);
                    
                    if (parcelError) throw parcelError;
                }
                
                showNotification('✅ Transport préparé avec succès');
                
                if (document.getElementById('speed').value === '6h') {
                    alert('🚨 URGENT 6H !');
                }
                
                // Réinitialiser
                currentOrderId = null;
                colisList = [];
                afficherColis();
                
                document.getElementById('transportCard').style.display = 'none';
                document.getElementById('addressCard').style.display = 'none';
                document.getElementById('colisCard').style.display = 'none';
                document.getElementById('speedCard').style.display = 'none';
                document.getElementById('pdfPreview').style.display = 'none';
                
                await chargerTransportsDisponibles();
                
            } catch (error) {
                console.error('Erreur:', error);
                alert('❌ Erreur: ' + error.message);
            }
        };
        
        // ===== NOTIFICATION =====
        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = '✅ ' + msg;
            notif.style.display = 'block';
            setTimeout(() => { notif.style.display = 'none'; }, 2000);
        }
    </script>
    
</body>
</html>
