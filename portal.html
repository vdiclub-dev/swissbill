<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portail client | Léman-Courses</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header class="topbar">

<div class="brand">
🚚 Léman-Courses
</div>

</header>

<nav class="menu">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('new')">Nouveau transport</button>
<button onclick="showPage('orders')">Mes transports</button>
<button onclick="showPage('tracking')">Suivi colis</button>
<button onclick="logout()">Déconnexion</button>

</nav>

<main class="container">

<!-- DASHBOARD -->

<section id="dashboard" class="page">

<h2>Dashboard</h2>

<p>Bienvenue dans votre portail transport.</p>

</section>


<!-- NOUVEAU TRANSPORT -->

<section id="new" class="page">

<div class="card">

<h2>Créer un transport</h2>

<label>Client</label>
<input id="clientSearch" placeholder="Rechercher client...">

<label>Adresse enlèvement</label>
<input id="pickup_address" onchange="calculateDistance()">

<label>Adresse livraison</label>
<input id="delivery_address" onchange="calculateDistance()">

<div id="map" style="height:400px;border-radius:10px;margin-top:20px;"></div>

<label>Type colis</label>

<select id="package_type" onchange="calculatePrice()">

<option value="envelope">Enveloppe</option>
<option value="carton">Carton</option>
<option value="box">Caisse</option>
<option value="palette">Palette</option>

</select>

<button onclick="calculateTransport()">
Calculer transport
</button>

<div class="result">

<p>Distance : <strong id="distance">0</strong> km</p>
<p>Temps estimé : <strong id="duration">0</strong></p>
<p>Prix estimé : <strong id="price">CHF 0</strong></p>

</div>

</div>

</section>


<!-- MES TRANSPORTS -->

<section id="orders" class="page">

<h2>Mes transports</h2>

<table id="ordersTable">

<thead>

<tr>
<th>Client</th>
<th>Départ</th>
<th>Livraison</th>
<th>Statut</th>
</tr>

</thead>

<tbody></tbody>

</table>

</section>


<!-- TRACKING -->

<section id="tracking" class="page">

<h2>Suivi colis</h2>

<p>Scanner ou entrer le numéro de colis.</p>

</section>

</main>


<footer class="footer">

Léman-Courses  
Impasse des Griottes 3  
1462 Yvonand  

</footer>

<script src="JS/config.js"></script>
<script src="JS/clients.js"></script>
<script src="JS/map.js"></script>
<script src="JS/orders.js"></script>

</body>

</html>
