<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portail client | Léman-Courses</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

.page{display:none}
.page.active{display:block}

.menu{
display:flex;
gap:10px;
padding:15px;
background:#f1f5f9;
}

</style>

</head>

<body>

<header class="topbar">
<div class="brand">🚚 Léman-Courses</div>
</header>

<nav class="menu">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('new')">Nouveau transport</button>
<button onclick="showPage('orders')">Mes transports</button>
<button onclick="showPage('tracking')">Suivi colis</button>
<button onclick="logout()">Déconnexion</button>

</nav>

<main class="container">

<!-- DASHBOARD -->

<section id="dashboard" class="page active">

<h2>Dashboard</h2>

<div class="grid">

<div class="card">
<h3>Transports</h3>
<p id="ordersCount">0</p>
</div>

<div class="card">
<h3>Livrés</h3>
<p id="deliveredCount">0</p>
</div>

</div>

</section>

<!-- NOUVEAU TRANSPORT -->

<h2>Nouveau transport</h2>

<form id="orderForm">

<label>Adresse de départ</label>
<input id="pickup" readonly>

<label>Destinataire</label>
<select id="destination" onchange="checkNightDelivery()"></select>

<label>Type colis</label>
<select id="packageType">
<option>Colis</option>
<option>Document</option>
<option>Caisse</option>
<option>Palette</option>
</select>

<label>Service</label>
<select id="service">
<option>Eco</option>
<option>Express</option>
<option>Urgent</option>
</select>

<label>Livraison de nuit</label>
<select id="night">
<option value="non">Non</option>
<option value="oui">Oui</option>
</select>

<label>Instructions</label>
<textarea id="notes"></textarea>

<button type="submit">
Créer transport
</button>

</form>

</section>

<!-- MES TRANSPORTS -->

<section id="orders" class="page">

<h2>Mes transports</h2>

<table id="ordersTable">

<thead>

<tr>
<th>Client</th>
<th>Départ</th>
<th>Livraison</th>
<th>Statut</th>
</tr>

</thead>

<tbody></tbody>

</table>

</section>

<!-- TRACKING -->

<section id="tracking" class="page">

<h2>Suivi colis</h2>

<input id="trackingNumber" placeholder="Numéro de colis">

<button onclick="searchTracking()">Rechercher</button>

<div id="trackingResult"></div>

</section>

</main>

<footer class="footer">

Léman-Courses  
Impasse des Griottes 3  
1462 Yvonand  

</footer>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(page).classList.add("active")

localStorage.setItem("activePage",page)

}

document.addEventListener("DOMContentLoaded",()=>{

const savedPage = localStorage.getItem("activePage")

if(savedPage){

showPage(savedPage)

}else{

showPage("dashboard")

}

})

</script>

<script src="JS/config.js"></script>
<script src="JS/clients.js"></script>
<script src="JS/map.js"></script>
<script src="JS/orders.js"></script>
<script src="JS/auth.js"></script>

</body>
</html>
