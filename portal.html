<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Portail client Léman-Courses</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>
<script src="js/portal.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.header{
background:#1e293b;
color:white;
padding:15px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="header">
🚚 Léman-Courses – Portail Client
</div>

<div class="container">

<div class="card">

<h2>Créer un transport</h2>

<input id="pickup" placeholder="Lieu de départ">
<br><br>

<input id="delivery" placeholder="Lieu de livraison">
<br><br>

<button onclick="createOrder()">Créer transport</button>

</div>

<div class="card">

<h2>Mes transports</h2>

<table border="1">

<thead>
<tr>
<th>ID</th>
<th>Départ</th>
<th>Livraison</th>
<th>Statut</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>

</table>

</div>

</div>

</body>
</html>
