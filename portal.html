<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Portail client Léman-Courses</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="JS/config.js"></script>
<script src="JS/portal.js"></script>
<script src="JS/orders.js"></script>
<script src="JS/clients.js"></script>
<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:240px;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#334155;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#475569;
}

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.page{
display:none;
}

input,select{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:6px;
}

button.action{
background:#2563eb;
color:white;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>🚚 Léman-Courses</h2>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('create')">Créer transport</button>
<button onclick="showPage('orders')">Mes transports</button>
<button onclick="logout()">Déconnexion</button>

</div>

<div class="main">

<div id="dashboard" class="page">

<div class="card">

<h3>Bienvenue dans votre portail client</h3>

<p>
Créer et suivre vos transports rapidement.
</p>

</div>

</div>

<div id="create" class="page">

<div class="card">

<h2>Nouveau transport</h2>

<h3>Client départ</h3>

<h2>Nouveau transport</h2>

<input id="Client" placeholder="Client">

<input id="pickup_address" placeholder="Adresse départ">

<input id="delivery_address" placeholder="Adresse livraison">

<input id="Distance" placeholder="Distance km">

<input id="Prix" placeholder="Prix CHF">

<button onclick="createOrder()">Créer transport</button>

<h3>Colis</h3>

<input id="colis" placeholder="Nombre colis">
<input id="weight" placeholder="Poids total">

<h3>Destination</h3>

<input id="delivery_company" placeholder="Entreprise">
<input id="delivery_address" placeholder="Adresse">
<input id="delivery_zip" placeholder="NPA">
<input id="delivery_city" placeholder="Ville">

<h3>Livraison</h3>

<select id="speed">
<option value="standard">Standard</option>
<option value="express">Express</option>
<option value="urgent">Urgent</option>
</select>

<button onclick="createOrder()">Créer transport</button>
<table>

<thead>
<tr>
<th>Client</th>
<th>Départ</th>
<th>Destination</th>
<th>Distance</th>
<th>Prix</th>
<th>Statut</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>

</table>
</div>
  
<thead>

<tr>
<th>Numéro</th>
<th>Enlèvement</th>
<th>Livraison</th>
<th>Statut</th>
</tr>

</thead>

<tbody id="ordersTable"></tbody>

</table>

</div>

</div>

</div>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

document.getElementById(page).style.display="block"

}

showPage("dashboard")

</script>

</body>
</html>
