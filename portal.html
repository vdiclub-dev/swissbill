<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Léman-Courses – Portail client</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/portal.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
background:#334155;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#475569;
}

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.stats{
display:flex;
gap:20px;
}

.stat{
flex:1;
background:white;
padding:20px;
border-radius:8px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>🚚 Léman-Courses</h2>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('create')">Créer transport</button>
<button onclick="showPage('orders')">Mes transports</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page">

<h1>Dashboard</h1>

<div class="stats">

<div class="stat">
<h2 id="ordersToday">0</h2>
<p>Transports aujourd'hui</p>
</div>

<div class="stat">
<h2 id="ordersRunning">0</h2>
<p>En cours</p>
</div>

<div class="stat">
<h2 id="ordersDone">0</h2>
<p>Livrés</p>
</div>

</div>

</div>

<!-- CREER TRANSPORT -->

<div id="create" class="page" style="display:none">

<h1>Créer transport</h1>

<input id="pickup" placeholder="Lieu de départ">
<br><br>

<input id="delivery" placeholder="Lieu de livraison">
<br><br>

<input id="weight" placeholder="Poids colis">

<br><br>

<button onclick="createOrder()">Créer transport</button>

</div>

<!-- MES TRANSPORTS -->

<div id="orders" class="page" style="display:none">

<h1>Mes transports</h1>

<table>

<thead>

<tr>
<th>ID</th>
<th>Départ</th>
<th>Livraison</th>
<th>Statut</th>
</tr>

</thead>

<tbody id="ordersTable"></tbody>

</table>

</div>

</div>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

document.getElementById(page).style.display="block"

}

</script>

</body>
</html>
