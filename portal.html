<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portail client | Léman-Courses</title>

</div>
<link rel="stylesheet" href="css/style.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Leaflet -->
<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

.page{display:none}
.page.active{display:block}

.menu{
display:flex;
gap:10px;
padding:15px;
background:#f1f5f9;
}

</style>

</head>

<body>

<header class="topbar">

<div class="brand">
🚚 Léman-Courses
</div>

</header>


<nav class="menu">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('new')">Nouveau transport</button>
<button onclick="showPage('orders')">Mes transports</button>
<button onclick="showPage('tracking')">Suivi colis</button>
<button onclick="logout()">Déconnexion</button>

</nav>


<main class="container">

<!-- DASHBOARD -->

<section id="dashboard" class="page active">

<h2>Dashboard</h2>

<div class="grid">

<div class="card">
<h3>Transports</h3>
<p id="ordersCount">0</p>
</div>

<div class="card">
<h3>Livrés</h3>
<p id="deliveredCount">0</p>
</div>

</div>

</section>


<!-- NOUVEAU TRANSPORT -->

<section id="new" class="page">

<div class="card">

<h2>Créer un transport</h2>

<label>Client</label>
<input id="clientSearch" placeholder="Rechercher client..." oninput="searchClient()">

<div id="clientResults"></div>

<label>Adresse enlèvement</label>
<input id="pickup_address" onchange="calculateDistance()">

<label>Adresse livraison</label>
<input id="delivery_address" onchange="calculateDistance()">

<div id="map" style="height:400px;border-radius:10px;margin-top:20px;"></div>

<label>Type colis</label>

<select id="package_type" onchange="calculatePrice()">

<option value="envelope">Enveloppe</option>
<option value="carton">Carton</option>
<option value="box">Caisse</option>
<option value="palette">Palette</option>

</select>

<button onclick="calculateTransport()" class="btn btn-primary">
Calculer transport
</button>

<div class="result">

<p>Distance : <strong id="distance">0</strong> km</p>
<p>Temps estimé : <strong id="duration">0</strong></p>
<p>Prix estimé : <strong id="price">CHF 0</strong></p>

</div>

</div>

</section>


<!-- MES TRANSPORTS -->

<section id="orders" class="page">

<h2>Mes transports</h2>

<table id="ordersTable" class="admin-table">

<thead>

<tr>
<th>Client</th>
<th>Départ</th>
<th>Livraison</th>
<th>Statut</th>
</tr>

</thead>

<tbody></tbody>

</table>

</section>

<h2>Nouvelle commande</h2>

<form id="orderForm" class="order-form">

<label>Adresse de départ</label>
<input id="pickup" readonly>

<label>Adresse de livraison</label>
<input id="deliverySearch" placeholder="Nom / entreprise / adresse">

<input id="delivery" placeholder="Adresse complète livraison" required>

<label>Poids (kg)</label>
<input id="weight" type="number" required>

<label>Type d'emballage</label>
<select id="packageType">
<option value="colis">Colis</option>
<option value="document">Document</option>
<option value="caisse">Caisse</option>
<option value="palette">Palette</option>
</select>

<label>Service</label>
<select id="service">
<option value="eco">Eco</option>
<option value="express">Express</option>
<option value="urgent">Urgent</option>
</select>

<label>Livraison de nuit</label>
<select id="night">
<option value="non">Non</option>
<option value="oui">Oui</option>
</select>

<label>Instructions</label>
<textarea id="notes"></textarea>

<button class="btn-order" type="submit">
Commander transport
</button>

</form>

  


Commander transport
</button>

</form>
<!-- TRACKING -->

<section id="tracking" class="page">

<h2>Suivi colis</h2>

<input id="trackingNumber" placeholder="Numéro de colis">

<button onclick="searchTracking()">Rechercher</button>

<div id="trackingResult"></div>

</section>

</main>


<footer class="footer">

Léman-Courses  
Impasse des Griottes 3  
1462 Yvonand  

</footer>


<script>
  const pickup = document.getElementById("pickup").value
const delivery = document.getElementById("delivery").value
const weight = document.getElementById("weight").value
const service = document.getElementById("service").value
const notes = document.getElementById("notes").value



const night =
document.getElementById("night").value === "oui"
const packageType =
document.getElementById("packageType").value

const night =
document.getElementById("night").value === "oui"
function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(page).classList.add("active")

// corriger affichage carte
if(page==="new" && window.map){
setTimeout(()=>{
map.invalidateSize()
},200)
}

}

</script>


<script src="JS/config.js"></script>
<script src="JS/clients.js"></script>
<script src="JS/map.js"></script>
<script src="JS/orders.js"></script>
<script src="JS/auth.js"></script>

</body>
</html>
