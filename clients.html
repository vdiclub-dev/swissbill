<section class="card">

<h2>Clients</h2>

<form id="clientForm">

<input id="nom" placeholder="Nom" required>

<input id="entreprise" placeholder="Entreprise">

<input id="email" placeholder="Email">

<input id="telephone" placeholder="Téléphone">

<input id="adresse" placeholder="Adresse">

<input id="ville" placeholder="Ville">

<button type="submit" class="btn btn-primary">
Ajouter client
</button>

</form>

</section>


<section class="card">

<table class="admin-table">

<thead>

<tr>
<th>Nom</th>
<th>Entreprise</th>

<th>Téléphone</th>
</tr>

</thead>

<tbody id="clientsTable"></tbody>

</table>

</section>
