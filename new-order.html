<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nouveau transport | Léman-Courses</title>

<link rel="stylesheet" href="css/style.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Leaflet (carte) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>
<main class="container">

<h2>Clients</h2>

</main>
<header class="topbar">


  <header class="topbar">

<div class="brand">
<h1>Léman-Courses</h1>
<p>Demande de transport</p>
</div>

<a href="portal.html" class="btn btn-light">
Retour portail
</a>

</header>


<main class="container">

<section class="card">

<h2>Nouvelle demande de transport</h2>


<!-- Recherche client -->

<label>Client</label>

<input
id="clientSearch"
placeholder="Rechercher client"
oninput="searchClient()">

<div id="clientResults"></div>


<!-- Formulaire transport -->

<div class="simple-form">

<form id="orderForm">

<label>Adresse enlèvement</label>
<input id="pickup_address" placeholder="Adresse départ">

<label>Adresse livraison</label>
<input id="delivery_address" placeholder="Adresse destination">


<label>Distance</label>
<input id="distance" readonly>


<label>Prix estimé</label>
<input id="price" readonly>

<button type="submit" class="btn btn-primary">
Créer transport
</button>

</form>

</div>


<!-- Résultat -->

<div class="result">

<p>
Distance : <strong id="distance">0</strong> km
</p>

<p>
Prix estimé : <strong id="price">CHF 0</strong>
</p>

</div>

</section>

</main>


<footer class="footer">

<strong>Léman-Courses</strong><br>

Impasse des Griottes 3<br>

1462 Yvonand<br>

+41 79 870 04 88

</footer>


<script src="JS/config.js"></script>
<script src="JS/ui.js"></script>
<script src="JS/auth.js"></script>
<script src="JS/clients.js"></script>
<script src="JS/pricing.js"></script>
<script src="JS/orders.js"></script>
<script src="JS/map.js"></script>

</body>

</html>
