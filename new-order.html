<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portail client | Léman-Courses</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    .page { display: none; }
    .page.active { display: block; }

    .menu {
      display: flex;
      gap: 10px;
      padding: 15px;
      background: #f1f5f9;
      flex-wrap: wrap;
    }

    .menu button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .order-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    .order-form .full {
      grid-column: 1 / -1;
    }

    .order-form input,
    .order-form select,
    .order-form textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .order-form textarea {
      min-height: 100px;
      resize: vertical;
    }

    #map {
      height: 380px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
    }

    .page-title {
      margin-top: 0;
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand">🚚 Léman-Courses</div>
  </header>

  <nav class="menu">
    <button type="button" onclick="showPage('dashboard')">Dashboard</button>
    <button type="button" onclick="showPage('new')">Nouveau transport</button>
    <button type="button" onclick="showPage('orders')">Mes transports</button>
    <button type="button" onclick="showPage('tracking')">Suivi colis</button>
    <button type="button" onclick="logout()">Déconnexion</button>
  </nav>

  <main class="container">

    <!-- DASHBOARD -->
    <section id="dashboard" class="page">
      <h2 class="page-title">Dashboard</h2>

      <div class="grid">
        <div class="card">
          <h3>Transports</h3>
          <p id="ordersCount">0</p>
        </div>

        <div class="card">
          <h3>Livrés</h3>
          <p id="deliveredCount">0</p>
        </div>
      </div>
    </section>

    <!-- NOUVEAU TRANSPORT -->
    <section id="new" class="page">
      <div class="card">
        <h2 class="page-title">Nouvelle commande</h2>

        <form id="orderForm" class="order-form">

          <div>
            <label for="pickup">Adresse de départ</label>
            <input id="pickup" type="text" readonly placeholder="Adresse client connectée">
          </div>

          <div>
            <label for="delivery">Adresse de livraison</label>
            <input id="delivery" type="text" placeholder="Adresse complète de livraison" required>
          </div>

          <div>
            <label for="weight">Poids (kg)</label>
            <input id="weight" type="number" min="0" step="0.1" placeholder="Ex. 5" required>
          </div>

          <div>
            <label for="packageType">Type d'emballage</label>
            <select id="packageType" required>
              <option value="colis">Colis</option>
              <option value="document">Document</option>
              <option value="caisse">Caisse</option>
              <option value="palette">Palette</option>
            </select>
          </div>

          <div>
            <label for="service">Service</label>
            <select id="service" required>
              <option value="eco">Eco</option>
              <option value="express">Express</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>

          <div>
            <label for="night">Livraison de nuit</label>
            <select id="night" required>
              <option value="non">Non</option>
              <option value="oui">Oui</option>
            </select>
          </div>

          <div class="full">
            <label for="notes">Instructions</label>
            <textarea id="notes" placeholder="Informations utiles pour la livraison"></textarea>
          </div>

          <div class="full">
            <div id="map"></div>
          </div>

          <div class="full">
            <button class="btn-order" type="submit">Commander transport</button>
          </div>

        </form>
      </div>
    </section>

    <!-- MES TRANSPORTS -->
    <section id="orders" class="page">
      <h2 class="page-title">Mes transports</h2>

      <table id="ordersTable" class="admin-table">
        <thead>
          <tr>
            <th>Client</th>
            <th>Départ</th>
            <th>Livraison</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- TRACKING -->
    <section id="tracking" class="page">
      <h2 class="page-title">Suivi colis</h2>

      <input id="trackingNumber" type="text" placeholder="Numéro de colis">
      <button type="button" onclick="searchTracking()">Rechercher</button>

      <div id="trackingResult"></div>
    </section>

  </main>

  <footer class="footer">
    Léman-Courses<br>
    Impasse des Griottes 3<br>
    1462 Yvonand
  </footer>

  <script>
    function showPage(pageId) {
      document.querySelectorAll(".page").forEach(page => {
        page.classList.remove("active");
      });

      const target = document.getElementById(pageId);
      if (target) {
        target.classList.add("active");
        localStorage.setItem("leman_active_page", pageId);
      }

      if (pageId === "new" && window.map) {
        setTimeout(() => {
          window.map.invalidateSize();
        }, 250);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const savedPage = localStorage.getItem("leman_active_page") || "dashboard";
      showPage(savedPage);
    });
  </script>

  <script src="JS/config.js"></script>
  <script src="JS/auth.js"></script>
  <script src="JS/clients.js"></script>
  <script src="JS/map.js"></script>
  <script src="JS/orders.js"></script>

</body>
</html>
