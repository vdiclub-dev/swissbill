<!DOCTYPE html>
<html lang="fr">

<head>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nouveau transport | Léman-Courses</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



</head>


<main class="container">

<section class="card">

<h2>Créer un transport</h2>


<label>Client</label>

<div class="client-search">

<input
id="clientSearch"
placeholder="Rechercher client..."
oninput="searchClient()"
autocomplete="off">

<div id="clientResults" class="client-results"></div>

</div>
<div id="map"
style="height:400px;margin-top:20px;border-radius:10px;">
</div>

<label>Adresse enlèvement</label>
<input id="pickup_address" onchange="calculateDistance()">

<label>Adresse livraison</label>
<input id="delivery_address" onchange="calculateDistance()">

<label>Type colis</label>

<select id="package_type" onchange="calculatePrice()">

<option value="envelope">Enveloppe</option>
<option value="carton">Carton</option>
<option value="box">Caisse</option>
<option value="palette">Palette</option>

</select>


<button onclick="calculateTransport()">
Calculer transport
</button>


<div class="result">

<p>
Distance :
<strong id="distance">0</strong> km
</p>

<p>
Prix estimé :
<strong id="price">CHF 0</strong>
</p>

</div>

</section>

</main>


<footer class="footer">

Léman-Courses  
Impasse des Griottes 3  
1462 Yvonand  
+41 79 870 04 88

</footer>


<script src="JS/config.js"></script>
<script src="JS/clients.js"></script>
  <script src="JS/maps.js"></script>
<script src="JS/orders.js"></script>

</body>

</html>
