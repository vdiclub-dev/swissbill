<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau transport | Léman-Courses</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">

</head>
<body>

<main class="container">

<section class="card">

<h2>Créer un transport</h2>

<label for="clientSearch">Client</label>

<label for="clientSelect">Client</label>

<select id="clientSelect" onchange="selectClient()">
<option value="">Choisir un client</option>
</select>

<label for="pickup_address">Adresse enlèvement</label>

<input
id="pickup_address"
type="text"
placeholder="Adresse enlèvement"
onchange="calculateDistance()">

<label for="delivery_address">Adresse livraison</label>

<input
id="delivery_address"
type="text"
placeholder="Adresse livraison"
onchange="calculateDistance()">

<label for="package_type">Type colis</label>

<select id="package_type" onchange="calculatePrice()">

<option value="envelope">Enveloppe</option>
<option value="carton">Carton</option>
<option value="box">Caisse</option>
<option value="palette">Palette</option>

</select>

<button type="button" onclick="calculateTransport()">
Calculer transport
</button>

<div class="result">

<p>Distance : <strong id="distance">0</strong> km</p>

<p>Prix estimé : <strong id="price">CHF 0</strong></p>

</div>

</section>

</main>
<script src="JS/config.js"></script>
<script src="JS/clients.js"></script>
<script src="JS/map.js"></script>
<script src="JS/orders.js"></script>
</body>
</html>
