<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260512d">
    <link rel="alternate icon" href="/favicon.ico?v=20260512d">
<meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colixo - Nouveau transport</title>
  <script data-cfasync="false" src="/js/supabase.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#0b0b0f; color:#fff; margin:0; }
    .wrap { max-width:900px; margin:30px auto; padding:20px; }
    .card { background:#15151b; border:1px solid #2b2b35; border-radius:16px; padding:20px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .full { grid-column:1 / -1; }
    input, select {
      width:100%; padding:12px; border-radius:10px; border:1px solid #333; background:#fff; color:#000;
    }
    label { display:block; margin-bottom:6px; }
    button { margin-top:18px; padding:12px 18px; border:none; border-radius:10px; background:#ff7a00; color:#fff; font-weight:bold; cursor:pointer; }
    .status { margin-top:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Nouveau transport</h1>
      <form id="orderForm" class="grid">
        <div>
          <label>Adresse enlèvement</label>
          <input type="text" name="pickup_address" required>
        </div>
        <div>
          <label>Adresse livraison</label>
          <input type="text" name="delivery_address" required>
        </div>
        <div>
          <label>Type de colis</label>
          <select name="package_type" required>
            <option value="Enveloppe">Enveloppe</option>
            <option value="Carton">Carton</option>
            <option value="Palette">Palette</option>
          </select>
        </div>
        <div>
          <label>Poids (kg)</label>
          <input type="number" step="0.01" name="package_weight" required>
        </div>
        <div>
          <label>Valeur déclarée</label>
          <input type="number" step="0.01" name="declared_value" value="0">
        </div>
        <div>
          <label>Service</label>
          <select name="service_level" required>
            <option value="Eco 48h">Eco 48h</option>
            <option value="Priority 24h">Priority 24h</option>
            <option value="Express">Express</option>
          </select>
        </div>
        <div class="full">
          <label>Prix HT</label>
          <input type="number" step="0.01" name="price_ht" required>
        </div>
        <div class="full">
          <button type="submit">Continuer vers signature</button>
        </div>
      </form>
      <div class="status" id="statusMsg"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script data-cfasync="false" src="js/auth.js"></script>
  <script src="js/audit.js"></script>
  <script src="js/orders.js"></script>

  <script>
    document.getElementById("orderForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const statusMsg = document.getElementById("statusMsg");

      try {
        const formData = new FormData(e.target);
        const payload = Object.fromEntries(formData.entries());

        const order = await createDraftOrder(payload);
        statusMsg.textContent = "Commande créée. Redirection...";
        window.location.href = `review-sign.html?id=${order.id}`;
      } catch (err) {
        console.error(err);
        statusMsg.textContent = "Erreur : " + (err.message || "création impossible");
      }
    });
  </script>
</body>
</html>
