<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nouveau transport | Léman-Courses</title>

<link rel="stylesheet" href="css/style.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Leaflet (carte) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>
<main class="container">

<h2>Clients</h2>

</main>
<header class="topbar">

<div class="brand">
<h1>Léman-Courses</h1>
<p>Demande de transport</p>
</div>

<a href="portal.html" class="btn btn-light">Retour portail</a>

</header>


<main class="container">

<section class="card">
<label>Client</label>

<input
id="clientSearch"
placeholder="Rechercher client"
oninput="searchClient()">

<div id="clientResults"></div>
  

<h2>Demande de transport</h2>

<div class="simple-form">

<input id="pickup_address" placeholder="Adresse enlèvement">

<input id="delivery_address" placeholder="Adresse livraison">

<select id="package_type">

<option value="envelope">Enveloppe</option>
<option value="carton">Carton</option>
<option value="box">Caisse</option>
<option value="palette">Palette</option>

</select>

<button onclick="calculateTransport()" class="btn btn-primary">
Calculer le transport
</button>

</div>

<div class="result">

<p>Distance : <strong id="distance">0</strong> km</p>

<p>Prix estimé : <strong id="price">CHF 0</strong></p>

</div>

</section>
</main>


<footer class="footer">

<strong>Léman-Courses</strong><br>

Impasse des Griottes 3<br>

1462 Yvonand<br>

+41 79 870 04 88

</footer>


<script src="JS/config.js"></script>
<script src="JS/ui.js"></script>
<script src="JS/auth.js"></script>
<script src="JS/clients.js"></script>
<script src="JS/pricing.js"></script>
<script src="JS/orders.js"></script>
<script src="JS/map.js"></script>

</body>

</html>
