<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nouveau transport | Léman-Courses</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header class="topbar">

<div class="brand">
<h1>Léman-Courses</h1>
<p>Nouvelle demande de transport</p>
</div>

<a href="portal.html" class="btn btn-light">
Retour portail
</a>

</header>


<main class="container">

<section class="card">

<h2>Créer un transport</h2>


<label>Client</label>

<input
id="clientSearch"
placeholder="Rechercher client"
oninput="searchClient()">

<div id="clientResults"></div>


<label>Adresse enlèvement</label>

<input id="pickup_address"
placeholder="Adresse enlèvement">


<label>Adresse livraison</label>

<input id="delivery_address"
placeholder="Adresse livraison">


<label>Type colis</label>

<select id="package_type">

<option value="envelope">Enveloppe</option>
<option value="carton">Carton</option>
<option value="box">Caisse</option>
<option value="palette">Palette</option>

</select>


<button onclick="calculateTransport()" class="btn btn-primary">
Calculer transport
</button>


<div class="result">

<p>
Distance : <strong id="distance">0</strong> km
</p>

<p>
Prix estimé : <strong id="price">CHF 0</strong>
</p>

</div>

</section>

</main>


<footer class="footer">

Léman-Courses  
Impasse des Griottes 3  
1462 Yvonand  
+41 79 870 04 88

</footer>


<script src="JS/config.js"></script>
<script src="JS/auth.js"></script>
<script src="JS/clients.js"></script>
<script src="JS/orders.js"></script>

</body>

</html>
