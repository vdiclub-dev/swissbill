<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nouveau transport | Léman-Courses</title>

<link rel="stylesheet" href="css/style.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Leaflet (carte) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<header class="topbar">

<div class="brand">
<h1>Léman-Courses</h1>
<p>Demande de transport</p>
</div>

<a href="portal.html" class="btn btn-light">Retour portail</a>

</header>


<main class="container">

<section class="card">

<h2>Nouveau transport</h2>

<form id="orderForm" class="form-grid">

<h3 class="full">Enlèvement</h3>

<input id="pickup_name" placeholder="Nom expéditeur" />
<input id="pickup_company" placeholder="Entreprise expéditeur" />

<input id="pickup_address" placeholder="Adresse enlèvement" required />
<input id="pickup_city" placeholder="Ville enlèvement" required />

<input id="pickup_phone" placeholder="Téléphone enlèvement" />


<h3 class="full">Livraison</h3>

<input id="delivery_name" placeholder="Nom destinataire" required />
<input id="delivery_company" placeholder="Entreprise destinataire" />

<input id="delivery_address" placeholder="Adresse livraison" required />
<input id="delivery_city" placeholder="Ville livraison" required />

<input id="delivery_phone" placeholder="Téléphone livraison" />

<input id="delivery_contact" class="full" placeholder="Personne de contact" />


<h3 class="full">Colis / marchandise</h3>

<select id="package_type" required>
<option value="">Type d'envoi</option>
<option value="envelope">Enveloppe</option>
<option value="carton">Carton</option>
<option value="box">Caisse</option>
<option value="palette">Palette</option>
</select>


<select id="weight_category">

<option value="">Poids</option>
<option value="0-2">0 à 2 kg</option>
<option value="2-10">2 à 10 kg</option>
<option value="10-30">10 à 30 kg</option>
<option value="30+">30 kg et plus</option>

</select>


<input id="quantity" type="number" min="1" value="1" placeholder="Quantité" />

<input id="estimated_km" type="number" step="0.1" placeholder="Distance estimée (km)" />


<h3 class="full">Service</h3>

<select id="speed">

<option value="eco">Economy 48h</option>
<option value="express">Express 24h</option>
<option value="urgent">Urgent</option>

</select>


<label>
<input type="checkbox" id="fragile">
Fragile
</label>

<label>
<input type="checkbox" id="signature_required">
Signature obligatoire
</label>

<label>
<input type="checkbox" id="night_delivery">
Livraison de nuit
</label>


<textarea id="instructions" class="full" rows="4" placeholder="Instructions livraison"></textarea>


<div class="full price-box">

<span>Prix estimatif :</span>

<strong id="previewPrice">CHF 0.00</strong>

</div>


<button type="submit" class="btn btn-primary full">

Valider la demande

</button>

</form>

</section>


<section class="card">

<h3>Carte transport</h3>

<div id="map" style="height:400px;border-radius:10px;"></div>

<div style="margin-top:10px">

Distance : <strong id="distance">0</strong> km

</div>

</section>

</main>


<footer class="footer">

<strong>Léman-Courses</strong><br>

Impasse des Griottes 3<br>

1462 Yvonand<br>

+41 79 870 04 88

</footer>


<script src="JS/config.js"></script>
<script src="JS/ui.js"></script>
<script src="JS/auth.js"></script>
<script src="JS/clients.js"></script>
<script src="JS/pricing.js"></script>
<script src="JS/orders.js"></script>
<script src="JS/map.js"></script>

</body>

</html>
