name: Auto Push to GitHub

on:
  # Déclenchement manuel depuis l'interface GitHub
  workflow_dispatch:

  # Déclenchement automatique sur push (déjà géré, mais utile pour les webhooks)
  push:
    branches:
      - main

jobs:
  auto-commit-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Vérifier les changements
        id: check
        run: |
          git status
          echo "Aucune action supplémentaire nécessaire — push déjà effectué."
