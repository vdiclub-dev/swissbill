<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>SwissBill</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

.app{
display:grid;
grid-template-columns:250px 1fr;
height:100vh;
}

.sidebar{
background:#111827;
color:white;
padding:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
background:#1f2937;
color:white;
cursor:pointer;
}

.main{
padding:20px;
overflow:auto;
}

.page{display:none}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

#map{
height:500px;
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar">

<h2>SwissBill</h2>

<button onclick="showPage('dashboard')">
<i class="fa fa-chart-line"></i> Dashboard
</button>

<button onclick="showPage('clients')">
<i class="fa fa-users"></i> Clients
</button>

<button onclick="showPage('products')">
<i class="fa fa-box"></i> Produits
</button>

<button onclick="showPage('tournees')">
<i class="fa fa-truck"></i> Tournées
</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page">

<h1>Dashboard</h1>

<div class="card">
Clients : <span id="clientCount">0</span>
</div>

<div class="card">
Produits : <span id="productCount">0</span>
</div>

<div class="card">
Stops : <span id="stopCount">0</span>
</div>

</div>

<!-- CLIENTS -->

<div id="clients" class="page">

<h1>Clients</h1>

<input id="company" placeholder="Entreprise">
<input id="city" placeholder="Ville">
<button onclick="addClient()">Ajouter</button>

<table border="1" width="100%">
<thead>
<tr>
<th>Entreprise</th>
<th>Ville</th>
</tr>
</thead>
<tbody id="clientsTable"></tbody>
</table>

</div>

<!-- PRODUITS -->

<div id="products" class="page">

<h1>Produits</h1>

<input id="productName" placeholder="Produit">
<input id="productPrice" placeholder="Prix">

<button onclick="addProduct()">Ajouter</button>

<table border="1" width="100%">
<thead>
<tr>
<th>Produit</th>
<th>Prix</th>
</tr>
</thead>

<tbody id="productsTable"></tbody>

</table>

</div>




<!-- TOURNEES -->

<div id="tournees" class="page">

  <h1>Tournées</h1>

  <div style="margin-bottom:15px">

    <input id="stopClient" placeholder="Client">
    <input id="stopCity" placeholder="Ville">
    <input id="stopColis" placeholder="Colis">

    <button onclick="addStop()">Ajouter stop</button>

  </div>

  <!-- CARTE -->
  <div id="map" style="height:500px; width:100%;"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

initMap()

showPage("dashboard")

loadClients()

})
  
let map

function initMap(){

try{

map = L.map('map').setView([46.8,7.2],8)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19,
attribution:'© OpenStreetMap'
}).addTo(map)

}catch(e){

console.log("Carte non chargée", e)

 }

}
const SUPABASE_URL="https://iubbsnntcreneakbdkmv.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y"

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let clients=[]
let products=[]
let stops=[]

document.addEventListener("DOMContentLoaded", () => {

initMap()

showPage("dashboard")

})

if(btn) btn.classList.add("active")

// correction carte Leaflet
if(pageId === "tournees"){
setTimeout(()=>{
map.invalidateSize()
},200)
}

}

function renderDashboard(){

document.getElementById("clientCount").innerText=clients.length
document.getElementById("productCount").innerText=products.length
document.getElementById("stopCount").innerText=stops.length

}

async function loadClients(){

const {data}=await db.from("clients").select("*")

clients=data||[]

renderClients()

renderDashboard()

}

function renderClients(){

const table=document.getElementById("clientsTable")

table.innerHTML=""

clients.forEach(c=>{

table.innerHTML+=`
<tr>
<td>${c.company}</td>
<td>${c.city}</td>
</tr>
`

})

}

async function addClient(){

const company=document.getElementById("company").value
const city=document.getElementById("city").value

await db.from("clients").insert({company,city})

loadClients()

}

function addProduct(){

const name=document.getElementById("productName").value
const price=document.getElementById("productPrice").value

products.push({name,price})

renderProducts()

}

function renderProducts(){

const table=document.getElementById("productsTable")

table.innerHTML=""

products.forEach(p=>{

table.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.price}</td>
</tr>
`

})

renderDashboard()

}

function addStop(){

const clientName = document.getElementById("stopClient").value
const city = document.getElementById("stopCity").value
const colis = document.getElementById("stopColis").value

stops.push({
client:clientName,
city:city,
colis:colis
})

drawStops()
renderDashboard()

}
function drawStops(){

map.eachLayer(function(layer){
if(layer instanceof L.Marker) map.removeLayer(layer)
})

stops.forEach(s=>{

const marker=L.marker([46.8,7.2]).addTo(map)

marker.bindPopup(s.client)

})

}
document.addEventListener("DOMContentLoaded", () => {

initMap()
showPage("dashboard")
loadClients()

})

</script>

</body>
</html>
