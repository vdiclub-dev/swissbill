<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SwissBill</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:," />

  <!-- Librairies -->
 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="js/supabase.js"></script>

<script src="js/app.js" defer></script>
<script src="js/clients.js" defer></script>
<script src="js/products.js" defer></script>
<script src="js/invoices.js" defer></script>
<script src="js/pdf.js" defer></script>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">SwissBill</div>
      <button class="nav" data-page="dashboard">Dashboard</button>
      <button class="nav" data-page="clients">Clients</button>
      <button class="nav" data-page="products">Produits</button>
      <button class="nav" data-page="invoices">Factures</button>
    </aside>

    <main class="main">

      <section id="page-dashboard" class="page">
        <h1>Dashboard</h1>
        <div class="cards">
          <div class="card"><div class="label">Chiffre d'affaires</div><div id="kpi-ca" class="kpi">—</div></div>
          <div class="card"><div class="label">Factures</div><div id="kpi-invoices" class="kpi">—</div></div>
          <div class="card"><div class="label">Clients</div><div id="kpi-clients" class="kpi">—</div></div>
        </div>
      </section>

      <section id="page-clients" class="page">
        <h1>Clients</h1>

        <div class="box">
          <h2>Ajouter</h2>
          <div class="grid">
            <input id="c_company" placeholder="Entreprise" />
            <input id="c_lastname" placeholder="Nom" />
            <input id="c_email" placeholder="Email" />
          </div>
          <button id="btnAddClient">Ajouter client</button>
        </div>

        <div class="box">
          <h2>Liste</h2>
          <table>
            <thead><tr><th>Entreprise</th><th>Nom</th><th>Email</th></tr></thead>
            <tbody id="tblClients"></tbody>
          </table>
        </div>
      </section>

      <section id="page-products" class="page">
        <h1>Produits</h1>

        <div class="box">
          <h2>Ajouter</h2>
          <div class="grid">
            <input id="p_name" placeholder="Produit / service" />
            <input id="p_price" placeholder="Prix (ex: 120)" />
            <div></div>
          </div>
          <button id="btnAddProduct">Ajouter produit</button>
        </div>

        <div class="box">
          <h2>Liste</h2>
          <table>
            <thead><tr><th>Produit</th><th>Prix</th></tr></thead>
            <tbody id="tblProducts"></tbody>
          </table>
        </div>
      </section>

      <section id="page-invoices" class="page">
        <h1>Factures</h1>

        <div class="box">
          <h2>Créer</h2>
          <div class="grid">
            <select id="i_client"></select>
            <input id="i_total" placeholder="Montant HT (CHF)" />
            <div></div>
          </div>
          <button id="btnAddInvoice">Créer facture</button>
        </div>

        <div class="box">
          <h2>Liste</h2>
          <table>
            <thead>
              <tr>
                <th>N° Facture</th>
                <th>Date</th>
                <th>Client</th>
                <th>Total TTC</th>
                <th>PDF</th>
              </tr>
            </thead>
            <tbody id="tblInvoices"></tbody>
          </table>
        </div>
      </section>

    </main>
  </div>
</body>
</html>
