<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>SwissBill</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.menu{
background:#222;
padding:10px;
}

.menu button{
margin-right:10px;
padding:10px;
color:white;
background:#444;
border:none;
cursor:pointer;
}

.page{
display:none;
padding:20px;
}

</style>

</head>

<body>

<div class="menu">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('portail')">Portail client</button>
<button onclick="showPage('colis')">Colis clients</button>
</div>

<div id="dashboard" class="page">

<h1>Dashboard</h1>

<p>Bienvenue dans SwissBill</p>

</div>


  <div id="portail" class="page">
<div class="form">

<label>Entreprise *</label>
<input id="client" placeholder="Nom de l'entreprise" required>

<label>Ville *</label>
<input id="ville" placeholder="Ville" required>

<label>Adresse *</label>
<input id="adresse" placeholder="Adresse de collecte" required>

<label>Nombre de colis *</label>
<input id="colis" type="number" required>

<label>Poids total (kg) *</label>
<input id="poids" type="number" required>

<label>Vitesse livraison *</label>
<select id="delai">
<option value="EX">Urgent 6h</option>
<option value="J0">Même jour</option>
<option value="J1">24h</option>
<option value="J2">48h</option>
</select>

<label>Livraison de nuit autorisée</label>
<select id="nuit">
<option value="non">Non</option>
<option value="oui">Oui</option>
</select>

<label>Instructions pour le chauffeur</label>
<textarea id="note" placeholder="Code porte, quai livraison, etc"></textarea>

<button onclick="sendParcel()">Envoyer la demande</button>

</div>

</div>

</div>

<input id="client" placeholder="Entreprise"><br><br>
<input id="ville" placeholder="Ville"><br><br>
<input id="adresse" placeholder="Adresse"><br><br>
<input id="colis" placeholder="Nombre colis"><br><br>
<input id="poids" placeholder="Poids"><br><br>

<button onclick="sendParcel()">Envoyer</button>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

document.getElementById(page).style.display="block"

}

const SUPABASE_URL="https://iubbsnntcreneakbdkmv.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y"

const db = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function sendParcel(){

const payload={

client:document.getElementById("client").value,
ville:document.getElementById("ville").value,
adresse:document.getElementById("adresse").value,
colis:Number(document.getElementById("colis").value),
poids:Number(document.getElementById("poids").value)

}

const {error}=await db.from("colis").insert(payload)

if(error){

alert("Erreur : "+error.message)

}else{

alert("Colis enregistré")

}

}

showPage("dashboard")

</script>

</body>
</html>
