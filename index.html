<!-- ============================================================
     COLIXO — HEAD OPTIMISÉ (remplace ton <head> actuel)
     Corrections appliquées :
     1. Google Fonts → display=swap + poids réduits (400,600,800)
     2. Font Awesome → chargement non-bloquant (media=print trick)
     3. dns-prefetch + preconnect pour les fonts externes
     4. favicon fallback ICO ajouté
     ============================================================ -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colixo - Plateforme de Transport & Logistique</title>

    <!-- Favicon SVG + fallback ICO -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" href="favicon.ico">

    <!-- Préconnexion DNS pour les polices (évite 2 aller-retours réseau) -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts : seulement 3 poids (au lieu de 6) + display=swap -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome : chargement NON-BLOQUANT (media=print trick) -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        media="print"
        onload="this.media='all'">
    <!-- Fallback si JS désactivé -->
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </noscript>

    <style>
        :root {
            --red: #e8311a;
            --red-dark: #c71612;
            --blue: #2563eb;
            --blue-light: #3b82f6;
            --green: #10b981;
            --purple: #a855f7;
            --dark: #1f2937;
            --gray-600: #4b5563;
            --light: #f9fafb;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            /* scroll-behavior: smooth géré ici — le JS en double est supprimé */
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--white);
            color: var(--dark);
            overflow-x: hidden;
        }

        /* ============================================================
           CORRECTION 3 : animation-on-scroll via CLASSES CSS
           (au lieu d'inline styles appliqués par JS → évite le FOUC)
           ============================================================ */
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ============================================================
           CORRECTION 4 : respect prefers-reduced-motion
           (désactive toutes les animations pour les utilisateurs
           sensibles au mouvement)
           ============================================================ */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .animate-on-scroll {
                opacity: 1;
                transform: none;
            }
        }

        /* NAVBAR */
        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            z-index: 100;
            padding: 1rem 2rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--red);
            text-decoration: none;
        }

        .nav-logo i {
            margin-right: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--red);
        }

        .btn-login {
            background: var(--red);
            color: var(--white);
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-login:hover {
            background: var(--red-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(232, 49, 26, 0.3);
        }

        /* HERO SECTION */
        .hero {
            background: linear-gradient(135deg, #f9fafb 0%, #eff6ff 50%, #fef2f2 100%);
            padding: 6rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(232, 49, 26, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(25%, -25%);
        }

        .hero-content {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--gray-600);
            margin-bottom: 2rem;
            line-height: 1.6;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-cta {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .btn-primary {
            background: var(--red);
            color: var(--white);
            padding: 1rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            display: inline-block;
            box-shadow: 0 5px 20px rgba(232, 49, 26, 0.3);
        }

        .btn-primary:hover {
            background: var(--red-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(232, 49, 26, 0.4);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--red);
            padding: 1rem 2rem;
            border: 2px solid var(--red);
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            cursor: pointer;
            display: inline-block;
        }

        .btn-secondary:hover {
            background: var(--red);
            color: var(--white);
            transform: translateY(-3px);
        }

        /* STATS SECTION */
        .stats-bar {
            background: var(--dark);
            padding: 3rem 2rem;
            margin-bottom: 3rem;
        }

        .stats-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
        }

        .stat {
            color: var(--white);
            text-align: center;
            border-left: 4px solid transparent;
            padding-left: 1rem;
        }

        .stat:nth-child(1) { border-color: var(--red); }
        .stat:nth-child(2) { border-color: var(--blue-light); }
        .stat:nth-child(3) { border-color: var(--green); }
        .stat:nth-child(4) { border-color: var(--purple); }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        /* BENEFITS SECTION */
        .section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-align: center;
        }

        .section-subtitle {
            font-size: 1.1rem;
            color: var(--gray-600);
            text-align: center;
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .benefits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .benefit-card {
            background: var(--light);
            padding: 2rem;
            border-radius: 16px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-align: center;
        }

        .benefit-card:hover {
            transform: translateY(-5px);
            border-color: var(--red);
            background: var(--white);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        .benefit-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            transition: transform 0.3s;
        }

        .benefit-card:hover .benefit-icon {
            transform: scale(1.1);
        }

        .benefit-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
            color: var(--dark);
        }

        .benefit-card p {
            color: var(--gray-600);
            line-height: 1.6;
        }

        /* PLATFORMS SECTION */
        .platforms-section {
            background: linear-gradient(135deg, #f9fafb 0%, #eff6ff 100%);
        }

        .platforms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
        }

        .platform-card {
            background: var(--white);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .platform-card:hover {
            transform: translateY(-8px);
            border-color: var(--red);
            box-shadow: 0 15px 40px rgba(232, 49, 26, 0.15);
        }

        .platform-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--red);
            transition: transform 0.3s;
        }

        .platform-card:hover .platform-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .platform-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }

        .platform-card p {
            color: var(--gray-600);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .platform-link {
            display: inline-block;
            color: var(--red);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .platform-link:hover {
            opacity: 0.7;
        }

        /* FEATURES SECTION */
        .features-section {
            background: var(--dark);
            color: var(--white);
        }

        .features-section .section-title { color: var(--white); }
        .features-section .section-subtitle { color: rgba(255, 255, 255, 0.8); }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
        }

        .feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .feature-icon {
            font-size: 3rem;
            color: var(--red);
            transition: transform 0.3s;
        }

        .feature:hover .feature-icon {
            transform: scale(1.2);
        }

        .feature h4 { font-size: 1.1rem; }

        /* FOOTER */
        .footer {
            background: #0f172a;
            color: rgba(255, 255, 255, 0.7);
            padding: 3rem 2rem 1rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .footer a { color: var(--red); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            nav { padding: 1rem; }
            .nav-links { gap: 1rem; font-size: 0.9rem; }
            .hero h1 { font-size: 2.2rem; }
            .hero p { font-size: 1rem; }
            .btn-primary, .btn-secondary { padding: 0.8rem 1.5rem; font-size: 0.9rem; }
            .section { padding: 3rem 1rem; }
            .section-title { font-size: 2rem; }
        }
    </style>
</head>


<!-- ============================================================
     SCRIPT OPTIMISÉ — remplace ton <script> en bas de page
     Corrections :
     - Suppression du smooth scroll JS (doublon avec CSS)
     - IntersectionObserver via classes CSS (plus de FOUC)
     ============================================================ -->
<script>
    // Smooth scroll supprimé — géré par scroll-behavior: smooth en CSS

    // Animation au scroll via classes CSS (évite le flash de contenu invisible)
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target); // Stoppe l'observation après animation
            }
        });
    }, {
        threshold: 0.1,
        rootMargin: '0px 0px -40px 0px'
    });

    document.querySelectorAll('.benefit-card, .platform-card, .feature').forEach(el => {
        el.classList.add('animate-on-scroll');
        observer.observe(el);
    });
</script>
