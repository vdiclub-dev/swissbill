<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>SwissBill</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.menu{
background:#222;
padding:10px;
}

.menu button{
margin-right:10px;
padding:10px;
color:white;
background:#444;
border:none;
cursor:pointer;
}

.page{
display:none;
padding:20px;
}

</style>

</head>

<body>

<div class="menu">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('portail')">Portail client</button>

</div>

<div id="dashboard" class="page">

<h1>Dashboard</h1>

<p>Bienvenue dans SwissBill</p>

</div>

<div id="portail" class="page">

<h1>Portail client</h1>

<input id="client" placeholder="Entreprise"><br><br>
<input id="ville" placeholder="Ville"><br><br>
<input id="adresse" placeholder="Adresse"><br><br>
<input id="colis" placeholder="Nombre colis"><br><br>
<input id="poids" placeholder="Poids"><br><br>

<button onclick="sendParcel()">Envoyer</button>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

document.getElementById(page).style.display="block"

}

const SUPABASE_URL="https://iubbsnntcreneakbdkmv.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y"

const db = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

async function sendParcel(){

const payload={

client:document.getElementById("client").value,
ville:document.getElementById("ville").value,
adresse:document.getElementById("adresse").value,
colis:Number(document.getElementById("colis").value),
poids:Number(document.getElementById("poids").value)

}

const {error}=await db.from("colis").insert(payload)

if(error){

alert("Erreur : "+error.message)

}else{

alert("Colis enregistré")

}

}

showPage("dashboard")

</script>

</body>
</html>
