<script>
async function loadClients(){

const { data, error } = await supabaseClient
.from("clients")
.select("*")

const table = document.querySelector("#clientsTable tbody")

table.innerHTML = ""

data.forEach(c => {

let row = `
<tr>
<td>${c.company || ""}</td>
<td>${c.last_name || ""}</td>
<td>${c.email || ""}</td>
</tr>
`

table.innerHTML += row

})

}

loadClients()
