<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#1e293b;
color:white;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
background:#334155;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#475569;
}

.main{
flex:1;
padding:30px;
}

.page{
display:none;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

padding:10px;

}

<body>

<div class="container">

<!-- MENU -->

<div class="sidebar">

<h2>SwissBill</h2>

<button onclick="showPage('clients')">Clients</button>
<button onclick="showPage('products')">Produits</button>

</div>

<!-- CONTENU -->

<div class="main">

<!-- CLIENTS -->

<div id="clients" class="page">

<div class="card">

<h3>Ajouter client</h3>

<input id="company" placeholder="Entreprise">
<input id="lastname" placeholder="Nom">
<input id="email" placeholder="Email">

<button onclick="addClient()">Ajouter</button>

</div>

<div class="card">

<h3>Liste clients</h3>

<table>

<thead>
<tr>
<th>Entreprise</th>
<th>Nom</th>
<th>Email</th>
</tr>
</thead>

<tbody id="clientsTable"></tbody>

</table>

</div>

</div>

<!-- PRODUITS -->

<div id="products" class="page">

<div class="card">

<h3>Ajouter produit</h3>

<input id="productName" placeholder="Produit">
<input id="productPrice" placeholder="Prix CHF">

<button onclick="addProduct()">Ajouter</button>

</div>

<div class="card">

<h3>Produits</h3>

<table>

<thead>
<tr>
<th>Produit</th>
<th>Prix</th>
</tr>
</thead>

<tbody id="productsTable"></tbody>

</table>

</div>

</div>

</div>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

const el = document.getElementById(page)

if(el) el.style.display="block"

}

showPage("clients")

</script>

</body>
