<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>SwissBill</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:,">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://iubbsnntcreneakbdkmv.supabase.co";
const SUPABASE_ANON_KEY = "TA_CLE_SUPABASE";

window.supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

console.log("Supabase connecté");
</script>

<script defer src="app.js"></script>

</head>

<body>

<div class="app">

<aside class="sidebar">

<h2>SwissBill</h2>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('clients')">Clients</button>
<button onclick="showPage('products')">Produits</button>
<button onclick="showPage('invoices')">Factures</button>

</aside>

<main class="main">

<div id="dashboard" class="page">
<h1>Dashboard</h1>

<p>Bienvenue dans SwissBill</p>

<div id="stats"></div>

</div>

<div id="clients" class="page">

<h1>Clients</h1>

<input id="c_company" placeholder="Entreprise">
<input id="c_lastname" placeholder="Nom">
<input id="c_email" placeholder="Email">

<button onclick="addClient()">Ajouter client</button>

<table>

<thead>
<tr>
<th>Entreprise</th>
<th>Nom</th>
<th>Email</th>
</tr>
</thead>

<tbody id="clientsTable"></tbody>

</table>

</div>

<div id="products" class="page">

<h1>Produits</h1>

<input id="p_name" placeholder="Produit">
<input id="p_price" placeholder="Prix">

<button onclick="addProduct()">Ajouter produit</button>

</div>

<div id="invoices" class="page">

<h1>Factures</h1>

<select id="clientSelect"></select>

<input id="amount" placeholder="Montant">

<button onclick="createInvoice()">Créer facture</button>

</div>

</main>

</div>

</body>
</html>
