<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léman-Courses | Transport express Suisse</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase et Config - UNE SEULE FOIS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        /* TES STYLES ICI (garde les mêmes) */
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; color: #0f172a; }
        .topbar {
            background: #0f172a; color: white; padding: 16px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 10px;
        }
        .logo-icon {
            width: 40px; height: 40px; background: #e53935; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }
        .btn {
            padding: 12px 24px; border-radius: 50px; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: #e53935; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .hero {
            display: flex; align-items: center; padding: 60px 40px;
            background: linear-gradient(135deg, #0f172a, #1e3a8a); color: white;
        }
        .hero-text { max-width: 550px; }
        .hero-text h1 { font-size: 52px; margin-bottom: 20px; }
        .hero-text h1 span { color: #e53935; display: block; font-size: 32px; }
        .footer {
            background: #0f172a; color: white; padding: 40px; text-align: center;
        }
        .loading {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: #0f172a; color: white; font-size: 20px; gap: 15px;
        }
        .loading i { font-size: 40px; color: #e53935; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading" id="loader">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Chargement...</span>
        </div>
    </div>

    <script>
        // ===== UN SEUL SCRIPT =====
        console.log("🚀 Démarrage...");
        
        // Vérifier que la config est chargée
        if (!window.SUPABASE_CONFIG) {
            document.getElementById('app').innerHTML = `
                <div style="color:red; padding:20px; text-align:center;">
                    ❌ Erreur: config.js non trouvé
                </div>
            `;
            throw new Error("Configuration manquante");
        }
        
        // Créer le client avec un NOM UNIQUE
        const lemanApp = window.supabase.createClient(
            window.SUPABASE_CONFIG.url,
            window.SUPABASE_CONFIG.key
        );
        
        console.log("✅ Client créé");
        
        // Fonction pour afficher la page d'accueil
        function showHomePage() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').innerHTML = `
                <div>
                    <header class="topbar">
                        <div class="logo">
                            <div class="logo-icon">🚚</div>
                            Léman-Courses
                        </div>
                        <div class="nav-buttons">
                            <a href="/login/" class="btn btn-secondary">
                                <i class="fas fa-user"></i> Connexion
                            </a>
                            <a href="/client/signup.html" class="btn btn-primary">
                                <i class="fas fa-user-plus"></i> Inscription
                            </a>
                        </div>
                    </header>

                    <section class="hero">
                        <div class="hero-text">
                            <h1>
                                Transport express
                                <span>en Suisse romande</span>
                            </h1>
                            <p>
                                Service professionnel de transport de colis.
                            </p>
                            <div style="display:flex; gap:15px;">
                                <a href="/client/signup.html" class="btn btn-primary">
                                    <i class="fas fa-rocket"></i> Commencer
                                </a>
                                <a href="/login/" class="btn btn-secondary">
                                    <i class="fas fa-map-marked-alt"></i> Connexion
                                </a>
                            </div>
                        </div>
                    </section>

                    <footer class="footer">
                        <div style="margin-bottom:20px;">
                            <i class="fas fa-truck" style="font-size:40px; color:#e53935;"></i>
                        </div>
                        <div style="margin-bottom:20px; color:#94a3b8;">
                            Impasse des Griottes 3 • 1462 Yvonand • Suisse
                        </div>
                        <div style="font-size:24px; color:#e53935; margin-bottom:30px;">
                            <i class="fas fa-phone-alt"></i> +41 79 870 04 88
                        </div>
                        <div style="color:#475569; font-size:12px;">
                            © 2026 Léman-Courses. Tous droits réservés.
                        </div>
                    </footer>
                </div>
            `;
        }
        
        // Fonction principale
        async function main() {
            try {
                console.log("🔍 Vérification de l'authentification...");
                
                const { data: { user }, error } = await lemanApp.auth.getUser();
                
                if (error || !user) {
                    console.log("👤 Non connecté -> page d'accueil");
                    showHomePage();
                    return;
                }
                
                console.log("✅ Connecté:", user.email);
                
                // Récupérer le rôle
                const { data: utilisateur, error: roleError } = await lemanApp
                    .from('utilisateurs')
                    .select('role')
                    .eq('id', user.id)
                    .maybeSingle();
                
                if (roleError || !utilisateur) {
                    console.log("⚠️ Rôle non trouvé -> login");
                    window.location.href = '/login/';
                    return;
                }
                
                console.log("🎯 Rôle:", utilisateur.role);
                
                // Redirection
                const redirections = {
                    'admin': '/admin/dashboard.html',
                    'client': '/client/dashboard.html',
                    'chauffeur': '/chauffeur/dashboard.html',
                    'magasinier': '/magasinier/dashboard.html'
                };
                
                const destination = redirections[utilisateur.role] || '/login/';
                window.location.href = destination;
                
            } catch (e) {
                console.error("❌ Erreur:", e);
                showHomePage();
            }
        }
        
        // LANCER
        main();
    </script>
</body>
</html>
