<script defer src="js/dashboard.js"></script>
<script defer src="js/clients.js"></script>
<script defer src="js/products.js"></script>

</head>

<body>

<div class="app">

<div class="sidebar">

<h2>SwissBill</h2>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('clients')">Clients</button>
<button onclick="showPage('products')">Produits</button>
<button onclick="showPage('tournees')">🚚 Tournées</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Clients</h3>
<p id="clientCount">0</p>
</div>

<div class="card">
<h3>Produits</h3>
<p id="productCount">0</p>
</div>

<div class="card">
<h3>Factures</h3>
<p id="invoiceCount">0</p>
</div>

<div class="card">
<h3>Revenus</h3>
<p id="revenueTotal">0 CHF</p>
</div>

</div>

<h2>Revenus mensuels</h2>
<canvas id="revenueChart"></canvas>

</div>

<!-- CLIENTS -->

<div id="clients" class="page">

<h1>Clients</h1>

<div class="form">

<input id="company" placeholder="Entreprise">
<input id="lastname" placeholder="Nom">
<input id="email" placeholder="Email">

<button onclick="addClient()">Ajouter</button>

</div>

<table>

<thead>
<tr>
<th>Entreprise</th>
<th>Nom</th>
<th>Email</th>
</tr>
</thead>

<tbody id="clientsTable"></tbody>

</table>

</div>

<!-- PRODUITS -->

<div id="products" class="page">

<h1>Produits</h1>

<div class="form">

<input id="productName" placeholder="Produit">
<input id="productPrice" placeholder="Prix CHF">

<button onclick="addProduct()">Ajouter</button>

</div>

<table>

<thead>
<tr>
<th>Produit</th>
<th>Prix</th>
</tr>
</thead>

<tbody id="productsTable"></tbody>

</table>

</div>

<!-- TOURNEES -->

<div id="tournees" class="page">

<h1>Gestion des tournées</h1>

<div class="form">

<input id="stop-client" placeholder="Client">
<input id="stop-ville" placeholder="Ville">
<input id="stop-adresse" placeholder="Adresse">
<input id="stop-colis" type="number" placeholder="Colis">

<select id="stop-delai">

<option value="EX">Urgent 6h</option>
<option value="J0">12h</option>
<option value="J1">24h</option>
<option value="J2">48h</option>
<option value="J5">Semaine</option>

</select>

<button onclick="addStop()">Ajouter stop</button>

</div>

<hr>

<table class="pro-table">

<thead>

<tr>
<th>Client</th>
<th>Ville</th>
<th>Adresse</th>
<th>Colis</th>
<th>Délai</th>
<th></th>

</tr>

</thead>

<tbody id="tournees-table"></tbody>

</table>

</div>

</div>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

document.getElementById(page).style.display="block"

}

let tournees = []

function addStop(){

const stop = {

client:document.getElementById("stop-client").value,
ville:document.getElementById("stop-ville").value,
adresse:document.getElementById("stop-adresse").value,
colis:document.getElementById("stop-colis").value,
delai:document.getElementById("stop-delai").value

}

tournees.push(stop)

renderTournees()

}

function renderTournees(){

const table = document.getElementById("tournees-table")

table.innerHTML=""

tournees.forEach((s,i)=>{

table.innerHTML += `
<tr>
<td>${s.client}</td>
<td>${s.ville}</td>
<td>${s.adresse}</td>
<td>${s.colis}</td>
<td>${s.delai}</td>
<td><button onclick="deleteStop(${i})">X</button></td>
</tr>
`

})

}

function deleteStop(i){

tournees.splice(i,1)

renderTournees()

}

showPage("dashboard")

</script>

</body>
</html>
