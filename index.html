<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>SwissBill</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:,">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://iubbsnntcreneakbdkmv.supabase.co"
const SUPABASE_ANON_KEY = "TA_CLE_SUPABASE"

window.supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
)

</script>

<script defer src="app.js"></script>

</head>

<body>

<div class="app">

<aside class="sidebar">

<h2>SwissBill</h2>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('clients')">Clients</button>
<button onclick="showPage('products')">Produits</button>
<button onclick="showPage('invoices')">Factures</button>

</aside>

<main class="main">

<section id="dashboard" class="page">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<div>Chiffre d'affaires</div>
<div id="kpi-ca">0</div>
</div>

<div class="card">
<div>Factures</div>
<div id="kpi-invoices">0</div>
</div>

<div class="card">
<div>Clients</div>
<div id="kpi-clients">0</div>
</div>

</div>

</section>

<section id="clients" class="page">

<h1>Clients</h1>

<input id="company" placeholder="Entreprise">
<input id="lastname" placeholder="Nom">
<input id="email" placeholder="Email">

<button onclick="addClient()">Ajouter client</button>

<table>

<thead>
<tr>
<th>Entreprise</th>
<th>Nom</th>
<th>Email</th>
</tr>
</thead>

<tbody id="clientsTable"></tbody>

</table>

</section>

<section id="products" class="page">

<h1>Produits</h1>

<input id="productName" placeholder="Produit">
<input id="productPrice" placeholder="Prix">

<button onclick="addProduct()">Ajouter produit</button>

</section>

<section id="invoices" class="page">

<h1>Factures</h1>

<select id="clientSelect"></select>

<input id="amount" placeholder="Montant">

<button onclick="createInvoice()">Créer facture</button>

</section>

</main>

</div>

</body>
</html>
