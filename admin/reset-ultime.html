<!DOCTYPE html>
<html>
<head>
    <title>Réinitialisation mot de passe</title>
    <!-- PAS DE SUPPABASE ICI -->
</head>
<body>
    <h2>🔑 Réinitialisation</h2>
    
    <div id="message" style="margin:20px 0; padding:10px; background:#f0f0f0;"></div>
    
    <input type="email" id="resetEmail" value="vdiclub@gmail.com" style="padding:8px; width:100%; margin:5px 0;">
    <button id="resetBtn" style="padding:10px; background:#e53935; color:white; border:none; width:100%;">Envoyer</button>

    <!-- CHARGER SUPPABASE ICI, UNE SEULE FOIS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ===== NOUVEAU CLIENT AVEC NOM UNIQUE =====
        console.log("🚀 Démarrage...");
        
        const PROJET_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const PROJET_CLE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        // NOM ABSOLUMENT UNIQUE
        const resetClient = window.supabase.createClient(PROJET_URL, PROJET_CLE);
        console.log("✅ Client créé");
        
        // Attacher l'événement
        document.getElementById('resetBtn').addEventListener('click', async function() {
            const email = document.getElementById('resetEmail').value;
            const message = document.getElementById('message');
            
            message.innerHTML = '⏳ Envoi en cours...';
            
            try {
                // ESSAYER LES DEUX MÉTHODES
                let error;
                
                // Méthode 1 : resetPasswordForEmail
                if (resetClient.auth.resetPasswordForEmail) {
                    const result = await resetClient.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/admin/reset-password.html'
                    });
                    error = result.error;
                }
                // Méthode 2 : api.resetPasswordForEmail
                else if (resetClient.auth.api?.resetPasswordForEmail) {
                    const result = await resetClient.auth.api.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/admin/reset-password.html'
                    });
                    error = result.error;
                }
                else {
                    throw new Error("Aucune méthode de réinitialisation trouvée");
                }
                
                if (error) throw error;
                
                message.innerHTML = '✅ Email envoyé ! Vérifiez votre boîte (spams aussi)';
                message.style.background = '#d1fae5';
                
            } catch(e) {
                message.innerHTML = '❌ ' + e.message;
                message.style.background = '#fee2e2';
            }
        });
        
        console.log("✅ Prêt");
    </script>
</body>
</html>
