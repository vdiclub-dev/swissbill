<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facture — Brimot Nettoyage</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- QR Code Swiss Payment Standard -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: 'Outfit', Arial, sans-serif;
            background: #f4f4f8;
            color: #111;
            min-height: 100%;
        }

        /* ── Loader ── */
        #loader {
            position: fixed; inset: 0; background: #f4f4f8;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; gap: 16px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #ddd; border-top-color: #0ea5e9;
            border-radius: 50%; animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error ── */
        #errorBox {
            display: none; max-width: 480px; margin: 60px auto; padding: 32px;
            background: #fff; border-radius: 12px; text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
        }
        #errorBox h2 { color: #e8311a; margin-bottom: 12px; }

        /* ── Page wrapper ── */
        #pageWrap { display: none; max-width: 800px; margin: 0 auto; padding: 24px 16px 48px; }

        /* ── Top bar ── */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: #fff; border-radius: 12px; padding: 14px 20px;
            margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
            flex-wrap: wrap; gap: 12px;
        }
        .top-bar .brand { font-size: 16px; font-weight: 700; color: #0ea5e9; display: flex; align-items: center; gap: 8px; }
        .top-bar .brand span { font-size: 20px; }
        .btn-print {
            background: #0ea5e9; color: #fff; border: none; border-radius: 8px;
            padding: 9px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 6px; transition: background .2s;
        }
        .btn-print:hover { background: #0284c7; }

        /* ══ FACTURE PAGE 1 ══ */
        .invoice-page {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 16px rgba(0,0,0,.07);
            margin-bottom: 20px;
        }

        /* En-tête */
        .inv-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding-bottom: 18px; margin-bottom: 18px;
            border-bottom: 3px solid #0ea5e9;
        }
        .inv-header.devis { border-bottom-color: #f59e0b; }
        .inv-logo h1 { font-size: 22px; font-weight: 700; color: #0ea5e9; }
        .inv-logo h1.devis { color: #f59e0b; }
        .inv-logo p { font-size: 11px; color: #888; margin-top: 2px; line-height: 1.5; }
        .inv-badge { text-align: right; }
        .inv-badge .type { font-size: 30px; font-weight: 700; color: #0ea5e9; letter-spacing: 2px; }
        .inv-badge .type.devis { color: #f59e0b; }
        .inv-badge .meta { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.7; }

        /* Adresses */
        .addr-row { display: flex; gap: 20px; margin-bottom: 18px; flex-wrap: wrap; }
        .addr-from { flex: 1; min-width: 160px; font-size: 11px; color: #888; line-height: 1.6; padding: 10px; }
        .addr-to {
            flex: 1; min-width: 180px;
            border: 1px solid #ddd; border-radius: 6px; padding: 10px 14px; line-height: 1.6;
        }
        .addr-lbl { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #bbb; margin-bottom: 4px; }
        .addr-to .cname { font-weight: 700; font-size: 14px; }
        .addr-to .cline { font-size: 12px; color: #444; }

        /* Objet */
        .inv-objet { font-size: 12px; color: #555; margin-bottom: 14px; padding: 8px 12px; background: #f9fafb; border-radius: 6px; }

        /* Tableau lignes */
        table.lines { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        table.lines th {
            background: #0ea5e9; color: #fff; padding: 8px 10px;
            font-size: 11px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase;
        }
        table.lines th.devis { background: #f59e0b; }
        table.lines th:not(:first-child), table.lines td:not(:first-child) { text-align: right; }
        table.lines td { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid #f3f3f3; }

        /* Totaux */
        .totals { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; margin-bottom: 16px; }
        .tot { display: flex; gap: 32px; font-size: 13px; }
        .tot .lbl { color: #888; min-width: 90px; text-align: right; }
        .tot .val { min-width: 90px; text-align: right; font-weight: 600; }
        .tot.ttc-row { border-top: 2px solid #eee; padding-top: 6px; margin-top: 4px; }
        .tot.ttc-row .lbl { font-size: 15px; font-weight: 700; color: #111; }
        .tot.ttc-row .val { font-size: 15px; font-weight: 700; color: #0ea5e9; }
        .tot.ttc-row.devis .val { color: #f59e0b; }

        /* Notes / conditions */
        .cond-box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #0369a1; margin-bottom: 12px; }
        .notes-box { background: #fafafa; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #555; margin-bottom: 12px; }

        /* Footer */
        .inv-footer { text-align: center; font-size: 10px; color: #ccc; padding-top: 14px; border-top: 1px solid #f0f0f0; margin-top: 10px; }

        /* ══ SÉPARATEUR ══ */
        .page-sep-bar {
            display: flex; align-items: center; gap: 10px;
            margin: 8px 0 20px; color: #aaa; font-size: 12px;
        }
        .page-sep-bar::before, .page-sep-bar::after {
            content: ''; flex: 1;
            border-top: 2px dashed #ccc;
        }

        /* ══ QR-BILL PAGE 2 ══ */
        .bv-wrap {
            background: #fff; border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,.07);
            padding: 16px; overflow: hidden;
        }
        .bv-title { font-size: 13px; font-weight: 700; color: #888; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .bv-page {
            width: 100%; max-width: 760px;
            display: flex; flex-direction: column;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }
        .bv-cut { display: flex; align-items: center; height: 22px; padding: 0 8px; gap: 6px; color: #bbb; font-size: 11px; }
        .bv-cut-line { flex: 1; border-top: 1px dashed #ccc; }
        .bv-scissors { display: inline-block; }
        .bv-body { display: flex; min-height: 220px; }
        .bv-receipt { width: 220px; flex-shrink: 0; padding: 8px 8px 8px 16px; display: flex; flex-direction: column; border-right: 1px dashed #ccc; }
        .bv-sep-v { width: 1px; background: #eee; margin: 0 8px; display: none; }
        .bv-payment { flex: 1; padding: 8px 16px 8px 8px; display: flex; flex-direction: column; }
        .bv-section-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
        .bv-lbl { font-size: 9px; font-weight: 700; color: #333; margin-top: 5px; margin-bottom: 1px; text-transform: uppercase; letter-spacing: .5px; }
        .bv-val { font-size: 11px; line-height: 1.4; }
        .bv-val-sm { font-size: 10px; line-height: 1.4; }
        .bv-val-bold { font-size: 13px; font-weight: 700; }
        .bv-amount { font-size: 14px; font-weight: 700; }
        .bv-receipt-bot { display: flex; justify-content: space-between; margin-top: auto; padding-top: 8px; border-top: 1px solid #eee; }
        .bv-accept-box { width: 120px; height: 32px; border: 1px solid #999; border-radius: 3px; margin-top: 4px; }
        .bv-pay-top { display: flex; gap: 16px; flex: 1; }
        .bv-qr-col { width: 200px; flex-shrink: 0; }
        .bv-info-col { flex: 1; }
        .bv-qr-wrap { position: relative; display: inline-block; line-height: 0; }
        .bv-qr-wrap img { width: 180px; height: 180px; display: block; }
        .bv-cross {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 26px; height: 26px;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
        }
        .bv-cross-inner { position: relative; width: 16px; height: 16px; }
        .bv-cross-v { position: absolute; left: 6px; top: 0; width: 5px; height: 16px; background: #e8311a; border-radius: 1px; }
        .bv-cross-h { position: absolute; top: 6px; left: 0; width: 16px; height: 5px; background: #e8311a; border-radius: 1px; }
        .bv-currency-amount { display: flex; gap: 24px; margin-top: 10px; }

        /* ── Print styles ── */
        @media print {
            body { background: #fff; }
            .top-bar { display: none !important; }
            .page-sep-bar { display: none !important; }
            #pageWrap { padding: 0; max-width: 210mm; }
            .invoice-page { box-shadow: none; border-radius: 0; padding: 12mm 12mm; margin: 0; }
            .bv-wrap { box-shadow: none; border-radius: 0; page-break-before: always; break-before: page; padding: 0; }
            .bv-title { display: none; }
            .bv-page { border: none; }
        }
    </style>
</head>
<body>

<!-- Loader -->
<div id="loader">
    <div class="spinner"></div>
    <p style="color:#888;font-size:14px;">Chargement de la facture…</p>
</div>

<!-- Error -->
<div id="errorBox">
    <h2>&#x26A0; Facture introuvable</h2>
    <p id="errorMsg" style="color:#666;font-size:14px;">Le lien est invalide ou la facture a été supprimée.</p>
</div>

<!-- Page principale -->
<div id="pageWrap">
    <!-- Top bar -->
    <div class="top-bar">
        <div class="brand"><span>&#129529;</span> Brimot Nettoyage</div>
        <button class="btn-print" onclick="window.print()">
            &#128438; Imprimer / Enregistrer PDF
        </button>
    </div>

    <!-- Page 1 : Facture -->
    <div class="invoice-page" id="invoiceDiv">
        <!-- contenu généré par JS -->
    </div>

    <!-- Séparateur -->
    <div class="page-sep-bar" id="sepBar" style="display:none;">
        <span>&#9986;</span> Bulletin de versement / QR-Bill
    </div>

    <!-- Page 2 : QR-Bill -->
    <div class="bv-wrap" id="bvWrap" style="display:none;">
        <div class="bv-title">&#128179; Bulletin de versement QR (norme SIX)</div>
        <div class="bv-page" id="bvPage">
            <!-- contenu généré par JS -->
        </div>
    </div>
</div>

<script>
/* ─────────────────────────────────────────────
   Constantes Brimot
───────────────────────────────────────────── */
const IBAN_BRIMOT = 'CH77 3000 5204 2780 5601 Y';
const NOM_BRIMOT  = 'Brimot Nettoyage';
const RUE_BR      = 'Impasse des Griottes 3';
const NPA_BR      = '1462';
const VILLE_BR    = 'Yvonand';
const PAYS_BR     = 'CH';
const TEL_BR      = '+41 79 000 00 00';
const MAIL_BR     = 'info@brimot.ch';

/* ─────────────────────────────────────────────
   Utilitaires
───────────────────────────────────────────── */
function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('fr-CH', {
        day: '2-digit', month: '2-digit', year: 'numeric', timeZone: 'Europe/Zurich'
    });
}
function fmtMoney(v) {
    return 'CHF ' + Number(v || 0).toLocaleString('fr-CH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─────────────────────────────────────────────
   Générer le QR code Swiss Payment (data URL)
───────────────────────────────────────────── */
async function genQRDataUrl(f, lignes) {
    try {
        const c = f.brimot_clients || {};
        const ibanClean  = IBAN_BRIMOT.replace(/\s/g, '');
        const montantCHF = Number(f.montant_ttc || 0).toFixed(2);
        const debNom   = c.nom     || '';
        const debRue   = c.adresse || '';
        const debNpa   = c.npa     || '';
        const debVille = c.ville   || '';
        const msgLibre = ('Facture ' + (f.numero || '')).trim().slice(0, 140);

        const lines = [
            'SPC',
            '0200',
            '1',
            ibanClean,
            'K',
            NOM_BRIMOT, RUE_BR, NPA_BR + ' ' + VILLE_BR, '', '', PAYS_BR,
            '',
            debNom ? 'K' : '',
            debNom, debRue, debNpa + ' ' + debVille, '', '', 'CH',
            montantCHF,
            'CHF',
            '',
            'NON REF',
            msgLibre,
            'EPD'
        ];
        const qrText = lines.join('\n');
        return await QRCode.toDataURL(qrText, { width: 298, errorCorrectionLevel: 'M' });
    } catch (e) {
        console.error('QR error', e);
        return null;
    }
}

/* ─────────────────────────────────────────────
   Rendu page 1 : facture
───────────────────────────────────────────── */
function renderInvoice(f, lignes) {
    const c = f.brimot_clients || {};
    const isDevis = f.type === 'devis';
    const color   = isDevis ? '#f59e0b' : '#0ea5e9';
    const title   = isDevis ? 'DEVIS' : 'FACTURE';

    document.title = title + ' ' + (f.numero || '') + ' — Brimot Nettoyage';

    let rows = '';
    if (lignes && lignes.length) {
        lignes.forEach(function(l, i) {
            const tot = Number(l.total_ht != null ? l.total_ht : (l.qte || 1) * (l.prix_ht || 0));
            rows += '<tr style="background:' + (i % 2 === 0 ? '#f9fafb' : '#fff') + '">' +
                '<td>' + esc(l.designation || '—') + '</td>' +
                '<td>' + Number(l.qte || 1).toFixed(2) + '</td>' +
                '<td>' + Number(l.prix_ht || 0).toFixed(2) + ' CHF</td>' +
                '<td style="font-weight:600;">' + tot.toFixed(2) + ' CHF</td>' +
                '</tr>';
        });
    } else {
        rows = '<tr><td colspan="4" style="text-align:center;color:#bbb;padding:16px;font-style:italic;">Aucune ligne</td></tr>';
    }

    const ht  = Number(f.montant_ht  || 0);
    const tva = Number(f.montant_tva || 0);
    const ttc = Number(f.montant_ttc || 0);
    const tvaPct = f.tva_pct || 8.1;

    let metaHtml =
        '<div>Numéro : <strong>' + esc(f.numero || '—') + '</strong></div>' +
        '<div>Date : ' + fmtDate(f.date_creation) + '</div>' +
        (f.echeance ? '<div>Échéance : ' + fmtDate(f.echeance) + '</div>' : '') +
        (f.statut ? '<div>Statut : ' + esc(f.statut) + '</div>' : '');

    let addrClient = '';
    if (c.civilite) addrClient += '<div style="font-size:11px;color:#888;">' + esc(c.civilite) + '</div>';
    if (c.nom)      addrClient += '<div class="cname">' + esc(c.nom) + '</div>';
    if (c.contact)  addrClient += '<div class="cline">' + esc(c.contact) + '</div>';
    if (c.adresse)  addrClient += '<div class="cline">' + esc(c.adresse) + '</div>';
    if (c.npa || c.ville) addrClient += '<div class="cline">' + esc([c.npa, c.ville].filter(Boolean).join(' ')) + '</div>';
    if (c.pays && c.pays !== 'CH') addrClient += '<div class="cline">' + esc(c.pays) + '</div>';

    let condHtml = '';
    if (f.conditions) {
        condHtml = '<div class="cond-box">Conditions de paiement : ' + esc(f.conditions) + '</div>';
    }
    let notesHtml = '';
    if (f.notes) {
        notesHtml = '<div class="notes-box">' + esc(f.notes) + '</div>';
    }

    const thClass = isDevis ? ' devis' : '';
    const headerClass = isDevis ? ' devis' : '';
    const ttcClass = isDevis ? ' devis' : '';

    const html =
        '<div class="inv-header' + headerClass + '">' +
          '<div class="inv-logo">' +
            '<h1 class="' + (isDevis ? 'devis' : '') + '">Brimot Nettoyage</h1>' +
            '<p>' + esc(NOM_BRIMOT) + '<br>' + esc(RUE_BR) + ', ' + esc(NPA_BR) + ' ' + esc(VILLE_BR) + '<br>' + esc(TEL_BR) + ' · ' + esc(MAIL_BR) + '</p>' +
          '</div>' +
          '<div class="inv-badge">' +
            '<div class="type' + (isDevis ? ' devis' : '') + '">' + title + '</div>' +
            '<div class="meta">' + metaHtml + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="addr-row">' +
          '<div class="addr-from">' +
            '<div class="addr-lbl">De</div>' +
            '<div>' + esc(NOM_BRIMOT) + '</div>' +
            '<div>' + esc(RUE_BR) + '</div>' +
            '<div>' + esc(NPA_BR) + ' ' + esc(VILLE_BR) + '</div>' +
            '<div>' + esc(TEL_BR) + '</div>' +
            '<div>' + esc(MAIL_BR) + '</div>' +
          '</div>' +
          '<div class="addr-to">' +
            '<div class="addr-lbl">Destinataire</div>' +
            (addrClient || '<span style="color:#bbb;font-size:11px;">Aucun client</span>') +
          '</div>' +
        '</div>' +
        (f.objet ? '<div class="inv-objet"><strong>Objet :</strong> ' + esc(f.objet) + '</div>' : '') +
        '<table class="lines">' +
          '<thead><tr>' +
            '<th class="' + thClass.trim() + '">Désignation</th>' +
            '<th class="' + thClass.trim() + '">Qté</th>' +
            '<th class="' + thClass.trim() + '">Prix HT</th>' +
            '<th class="' + thClass.trim() + '">Total HT</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
        '<div class="totals">' +
          '<div class="tot"><span class="lbl">Sous-total HT</span><span class="val">' + ht.toFixed(2) + ' CHF</span></div>' +
          '<div class="tot"><span class="lbl">TVA ' + tvaPct + '%</span><span class="val">' + tva.toFixed(2) + ' CHF</span></div>' +
          '<div class="tot ttc-row' + ttcClass + '"><span class="lbl">Total TTC</span><span class="val">' + ttc.toFixed(2) + ' CHF</span></div>' +
        '</div>' +
        condHtml +
        notesHtml +
        '<div class="inv-footer">' +
          esc(NOM_BRIMOT) + ' · ' + esc(RUE_BR) + ', ' + esc(NPA_BR) + ' ' + esc(VILLE_BR) +
          ' · ' + esc(TEL_BR) + ' · ' + esc(MAIL_BR) +
          ' · IBAN : ' + IBAN_BRIMOT +
        '</div>';

    document.getElementById('invoiceDiv').innerHTML = html;
}

/* ─────────────────────────────────────────────
   Rendu page 2 : QR-Bill
───────────────────────────────────────────── */
function renderQRBill(f, qrDataUrl) {
    const c = f.brimot_clients || {};
    const ibanClean  = IBAN_BRIMOT.replace(/\s/g, '');
    const montantCHF = Number(f.montant_ttc || 0).toFixed(2);
    const debNom   = c.nom     || '';
    const debRue   = c.adresse || '';
    const debNpa   = c.npa     || '';
    const debVille = c.ville   || '';
    const msgLibre = ('Facture ' + (f.numero || '')).trim().slice(0, 140);

    const qrImg = qrDataUrl
        ? '<div class="bv-qr-wrap">' +
          '<img src="' + qrDataUrl + '" alt="QR Swiss Payment">' +
          '<div class="bv-cross">' +
            '<div class="bv-cross-inner">' +
              '<div class="bv-cross-v"></div>' +
              '<div class="bv-cross-h"></div>' +
            '</div>' +
          '</div>' +
          '</div>'
        : '<div style="width:180px;height:180px;background:#f3f3f3;display:flex;align-items:center;justify-content:center;font-size:11px;color:#999;border-radius:4px;">QR indisponible</div>';

    const receiptHtml =
        '<div class="bv-section-title">Recu</div>' +
        '<div class="bv-lbl">Compte / Payable à</div>' +
        '<div class="bv-val-sm">' + ibanClean + '<br>' + esc(NOM_BRIMOT) + '<br>' + esc(RUE_BR) + '<br>' + esc(NPA_BR) + ' ' + esc(VILLE_BR) + '</div>' +
        '<div class="bv-lbl">Référence</div>' +
        '<div class="bv-val-sm">' + esc(msgLibre) + '</div>' +
        '<div class="bv-lbl">Payé par</div>' +
        '<div class="bv-val-sm">' + esc(debNom) + (debRue ? '<br>' + esc(debRue) : '') + '<br>' + esc(debNpa) + ' ' + esc(debVille) + '</div>' +
        '<div class="bv-receipt-bot">' +
          '<div><div class="bv-lbl">Montant</div><div class="bv-amount">' + montantCHF + '</div></div>' +
          '<div><div class="bv-lbl">Monnaie</div><div class="bv-val-sm">CHF</div></div>' +
        '</div>' +
        '<div><div class="bv-lbl" style="font-size:7px;">Point de dépôt</div><div class="bv-accept-box"></div></div>';

    const paymentHtml =
        '<div class="bv-section-title">Section de paiement</div>' +
        '<div class="bv-pay-top">' +
          '<div class="bv-qr-col">' +
            qrImg +
            '<div class="bv-currency-amount">' +
              '<div><div class="bv-lbl">Monnaie</div><div class="bv-val-bold">CHF</div></div>' +
              '<div><div class="bv-lbl">Montant</div><div class="bv-val-bold">' + montantCHF + '</div></div>' +
            '</div>' +
          '</div>' +
          '<div class="bv-info-col">' +
            '<div class="bv-lbl">Compte / Payable à</div>' +
            '<div class="bv-val">' + ibanClean + '<br>' + esc(NOM_BRIMOT) + '<br>' + esc(RUE_BR) + '<br>' + esc(NPA_BR) + ' ' + esc(VILLE_BR) + '</div>' +
            '<div class="bv-lbl" style="margin-top:8px;">Référence</div>' +
            '<div class="bv-val">' + esc(msgLibre) + '</div>' +
            (f.objet ? '<div class="bv-lbl" style="margin-top:8px;">Informations</div><div class="bv-val">' + esc(f.objet) + '</div>' : '') +
            '<div class="bv-lbl" style="margin-top:8px;">Payé par</div>' +
            '<div class="bv-val">' + esc(debNom) + (debRue ? '<br>' + esc(debRue) : '') + '<br>' + esc(debNpa) + ' ' + esc(debVille) + '</div>' +
          '</div>' +
        '</div>';

    const bvHtml =
        '<div class="bv-cut">' +
          '<div class="bv-cut-line"></div>' +
          '<span class="bv-scissors">&#9986;</span>' +
          '<div class="bv-cut-line"></div>' +
        '</div>' +
        '<div class="bv-body">' +
          '<div class="bv-receipt">' + receiptHtml + '</div>' +
          '<div class="bv-payment">' + paymentHtml + '</div>' +
        '</div>';

    document.getElementById('bvPage').innerHTML = bvHtml;
    document.getElementById('sepBar').style.display = 'flex';
    document.getElementById('bvWrap').style.display = 'block';
}

/* ─────────────────────────────────────────────
   Chargement de la facture via Supabase
───────────────────────────────────────────── */
async function init() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const loader = document.getElementById('loader');
    const errBox = document.getElementById('errorBox');
    const errMsg = document.getElementById('errorMsg');
    const pageWrap = document.getElementById('pageWrap');

    if (!id) {
        loader.style.display = 'none';
        errBox.style.display = 'block';
        errMsg.textContent = 'Aucun identifiant de facture fourni dans le lien.';
        return;
    }

    try {
        // Initialiser Supabase depuis config.js (window.SUPABASE_CONFIG ou variables globales)
        let supabaseUrl, supabaseKey;
        if (window.SUPABASE_CONFIG) {
            supabaseUrl = window.SUPABASE_CONFIG.url;
            supabaseKey = window.SUPABASE_CONFIG.key;
        } else if (typeof SUPABASE_URL !== 'undefined' && typeof SUPABASE_ANON_KEY !== 'undefined') {
            supabaseUrl = SUPABASE_URL;
            supabaseKey = SUPABASE_ANON_KEY;
        } else {
            throw new Error('Configuration Supabase introuvable (config.js manquant)');
        }
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const [{ data: f, error: fErr }, { data: lignes, error: lErr }] = await Promise.all([
            supabase
                .from('brimot_factures')
                .select('*, brimot_clients(*)')
                .eq('id', id)
                .single(),
            supabase
                .from('brimot_lignes')
                .select('*')
                .eq('facture_id', id)
                .order('ordre', { ascending: true })
        ]);

        if (fErr || !f) {
            throw new Error(fErr ? fErr.message : 'Facture introuvable');
        }

        // Rendu page 1
        renderInvoice(f, lignes || []);

        // QR-Bill seulement pour les factures (pas les devis)
        if (f.type !== 'devis') {
            const qrDataUrl = await genQRDataUrl(f, lignes || []);
            if (qrDataUrl) {
                renderQRBill(f, qrDataUrl);
            }
        }

        // Afficher la page
        loader.style.display = 'none';
        pageWrap.style.display = 'block';

    } catch (err) {
        console.error('Erreur chargement facture:', err);
        loader.style.display = 'none';
        errBox.style.display = 'block';
        errMsg.textContent = err.message || 'Impossible de charger la facture.';
    }
}

init();
</script>
