<!DOCTYPE html>
<!-- colixo-build:20260462 | Colixo-DISPATCH-MAP-V6 -->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte — Colixo Dispatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script data-cfasync="false" src="../config.js?v=20260511aa"></script>
    <script data-cfasync="false" src="../js/auth.js?v=20260511aa-code-stable"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#0a0a0f; }
        .shell { display:flex; flex-direction:column; height:100vh; min-height:0; }
        :root {
            --red:#e8311a; --night:#0a0a0f; --night2:#111118; --night3:#18181f;
            --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
            --white:#ffffff; --muted:rgba(255,255,255,0.38); --muted2:rgba(255,255,255,0.6);
            --green:#22c55e; --blue:#3b82f6; --yellow:#f59e0b; --orange:#f97316; --purple:#a855f7;
        }
        body { font-family:'Outfit',sans-serif; color:var(--white); }

        /* TRANSPORTS — 3 colonnes pleine largeur, au-dessus du pied de page (stats) */
        .transports-strip {
            flex:0 0 auto;
            display:grid;
            grid-template-columns:repeat(3, minmax(0, 1fr));
            grid-template-rows:minmax(160px, 1fr);
            gap:10px;
            min-height:200px;
            max-height:min(42vh, 380px);
            padding:10px 14px 12px;
            border-top:1px solid var(--border2);
            background:rgba(10,10,15,0.98);
            z-index:5;
        }
        .transport-col {
            min-width:0;
            display:flex;
            flex-direction:column;
            gap:8px;
            overflow-y:auto;
            overflow-x:hidden;
            padding-right:4px;
        }
        .transport-col::-webkit-scrollbar { width:6px; }
        .transport-col::-webkit-scrollbar-thumb { background:var(--border2); border-radius:100px; }
        .transports-strip .tb2 {
            width:100%;
            max-width:none;
            min-width:0;
            flex:0 0 auto;
        }

        /* MAP */
        .map-wrap { flex:1; min-height:0; position:relative; z-index:1; }
        #map { position:absolute; inset:0; width:100%; height:100%; z-index:1; }
        .leaflet-tile { filter:brightness(0.85) saturate(0.6) invert(1) hue-rotate(180deg); }
        .leaflet-container { background:#0a0a0f; }
        .leaflet-control-zoom { display:none; }

        /* TOPBAR */
        .topbar {
            flex:0 0 52px; position:relative; z-index:1000;
            background:rgba(10,10,15,0.9); backdrop-filter:blur(16px);
            border-bottom:1px solid var(--border2);
            display:flex; align-items:center; padding:0 20px; gap:12px;
        }
        .logo { font-family:'Bebas Neue',cursive; font-size:17px; letter-spacing:1px; display:flex; align-items:center; gap:8px; }
        .logo-mark { width:26px; height:26px; background:var(--red); border-radius:6px; display:grid; place-items:center; font-size:12px; }
        .logo em { color:var(--red); font-style:normal; }
        .live { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:var(--green); background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.25); padding:3px 10px; border-radius:100px; }
        .live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:lp 1.5s infinite; }
        @keyframes lp { 0%,100%{opacity:1}50%{opacity:0.3} }
        .tb-right { margin-left:20cm; }
        .clock { font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:2px; }

        /* STATS BAR */
        .stats-bar {
            flex:0 0 52px; position:relative; z-index:1000;
            background:rgba(10,10,15,0.9); backdrop-filter:blur(16px);
            border-top:1px solid var(--border2);
            display:flex; align-items:center;
        }
        .si { flex:1; text-align:center; border-right:1px solid var(--border); padding:6px; }
        .si:last-child { border:none; }
        .si-val { font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:1px; line-height:1; }
        .si-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

        /* CONTROLS (dans .map-wrap) */
        .ctrl {
            position:absolute; top:12px; right:12px; z-index:1000;
            display:flex; flex-direction:column; gap:5px;
        }
        .cb {
            width:36px; height:36px;
            background:rgba(17,17,24,0.92); backdrop-filter:blur(10px);
            border:1px solid var(--border2); border-radius:9px;
            display:grid; place-items:center;
            color:var(--muted2); font-size:13px;
            cursor:pointer; transition:all 0.2s;
        }
        .cb:hover { color:var(--white); border-color:rgba(255,255,255,0.3); }
        .cb.blue  { background:rgba(59,130,246,0.15); border-color:rgba(59,130,246,0.35); color:var(--blue); }
        .cb.green { background:rgba(34,197,94,0.15);  border-color:rgba(34,197,94,0.35);  color:var(--green); }
        .cb.orange{ background:rgba(245,158,11,0.15); border-color:rgba(245,158,11,0.35); color:var(--yellow); }

        /* LEGEND */
        .legend {
            position:absolute; bottom:12px; right:12px; z-index:1000;
            background:rgba(17,17,24,0.92); backdrop-filter:blur(10px);
            border:1px solid var(--border2); border-radius:10px;
            padding:10px 14px;
        }
        .lr { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted2); margin-bottom:4px; }
        .lr:last-child { margin:0; }
        .ldot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

        .tb2 {
            background:rgba(17,17,24,0.92); backdrop-filter:blur(10px);
            border:1px solid var(--border2); border-radius:10px;
            padding:8px 12px; min-width:180px;
            pointer-events:auto; cursor:pointer; transition:all 0.2s;
        }
        .tb2:hover { border-color:rgba(255,255,255,0.3); }
        .tb2-name { font-family:'Bebas Neue',cursive; font-size:13px; letter-spacing:1px; display:flex; align-items:center; gap:7px; margin-bottom:4px; }
        .tb2-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .tb2-info { font-size:11px; color:var(--muted2); }
        .tb2-meta { font-size:10px; color:var(--muted); margin-top:2px; }

        /* PROGRESS */
        .geo-progress {
            display:none; position:absolute; bottom:64px; left:50%; transform:translateX(-50%);
            background:rgba(17,17,24,0.96); backdrop-filter:blur(16px);
            border:1px solid var(--border2); border-radius:12px;
            padding:14px 24px; z-index:1001; min-width:300px; text-align:center;
        }
        .gp-title { font-family:'Bebas Neue',cursive; font-size:14px; letter-spacing:1px; margin-bottom:8px; color:var(--blue); }
        .gp-bar-wrap { height:5px; background:var(--border2); border-radius:100px; overflow:hidden; margin-bottom:8px; }
        .gp-bar { height:100%; background:var(--blue); border-radius:100px; width:0%; transition:width 0.4s; }
        .gp-label { font-size:12px; color:var(--muted2); }

        /* TOAST */
        .toast {
            position:absolute; top:12px; left:50%; transform:translateX(-50%) translateY(-60px);
            padding:10px 18px; border-radius:100px; font-size:13px; font-weight:600;
            background:var(--night3); border:1px solid var(--border2);
            box-shadow:0 12px 40px rgba(0,0,0,0.4); z-index:2000;
            transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); white-space:nowrap;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast.success { background:rgba(34,197,94,0.15); border-color:rgba(34,197,94,0.3); color:var(--green); }
        .toast.info    { background:rgba(59,130,246,0.15); border-color:rgba(59,130,246,0.3); color:var(--blue); }
        .toast.error   { background:rgba(232,49,26,0.15);  border-color:rgba(232,49,26,0.3);  color:var(--red); }

        @media (max-width: 768px) {
            .transports-strip {
                grid-template-columns:1fr;
                grid-template-rows:auto;
                max-height:min(55vh, 480px);
            }
        }
    </style>
</head>
<body>

<div class="shell">
<!-- TOPBAR -->
<header class="topbar">
    <div class="logo"><div class="logo-mark">🚚</div>Colixo<em>-Dispatch</em></div>
    <div class="live"><div class="live-dot"></div> Temps réel</div>
    <div class="tb-right"><div class="clock" id="clock">--:--:--</div></div>
</header>

<!-- MAP -->
<div class="map-wrap">
<div class="toast" id="toast"></div>
<div id="map"></div>

<!-- CONTROLS -->
<div class="ctrl">
    <div class="cb" onclick="map.zoomIn()"  title="Zoom +"><i class="fas fa-plus"></i></div>
    <div class="cb" onclick="map.zoomOut()" title="Zoom -"><i class="fas fa-minus"></i></div>
    <div class="cb" onclick="fitAll()"       title="Tout voir"><i class="fas fa-expand"></i></div>
    <div class="cb blue"   id="cbGeo"    onclick="runGeocode()"    title="Géocoder" style="margin-top:8px;"><i class="fas fa-satellite"></i></div>
    <div class="cb green"  id="cbRoutes" onclick="drawRoutes()"    title="Tracer routes"><i class="fas fa-route"></i></div>
    <div class="cb"        id="cbClear"  onclick="clearRoutes()"   title="Effacer routes"><i class="fas fa-eraser"></i></div>
</div>

<!-- LEGEND -->
<div class="legend">
    <div class="lr"><div class="ldot" style="background:var(--yellow)"></div>En attente</div>
    <div class="lr"><div class="ldot" style="background:var(--orange)"></div>Urgent</div>
    <div class="lr"><div class="ldot" style="background:var(--blue)"></div>Planifié</div>
    <div class="lr"><div class="ldot" style="background:var(--purple)"></div>En route</div>
    <div class="lr"><div class="ldot" style="background:var(--green)"></div>Livré</div>
</div>

<!-- GEO PROGRESS -->
<div class="geo-progress" id="geoProgress">
    <div class="gp-title"><i class="fas fa-satellite"></i> GÉOCODAGE</div>
    <div class="gp-bar-wrap"><div class="gp-bar" id="geoBar"></div></div>
    <div class="gp-label" id="geoLabel">Initialisation…</div>
</div>
</div>

<!-- TRANSPORTS — 3 colonnes, pleine largeur, au-dessus du pied de page -->
<div class="transports-strip" aria-label="Transports actifs">
    <div class="transport-col" id="transportCol0"></div>
    <div class="transport-col" id="transportCol1"></div>
    <div class="transport-col" id="transportCol2"></div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
    <div class="si"><div class="si-val" id="sTotal">0</div><div class="si-lbl">Total</div></div>
    <div class="si"><div class="si-val" id="sPending" style="color:var(--yellow)">0</div><div class="si-lbl">Attente</div></div>
    <div class="si"><div class="si-val" id="sUrgent"  style="color:var(--orange)">0</div><div class="si-lbl">Urgents</div></div>
    <div class="si"><div class="si-val" id="sPlanned" style="color:var(--blue)">0</div><div class="si-lbl">Planifiés</div></div>
    <div class="si"><div class="si-val" id="sTransit" style="color:var(--purple)">0</div><div class="si-lbl">En route</div></div>
    <div class="si"><div class="si-val" id="sDone"    style="color:var(--green)">0</div><div class="si-lbl">Livrés</div></div>
</div>
</div>

<script>
(function() {
    'use strict';

    if(!window.SUPABASE_CONFIG) {
        document.body.innerHTML = '<div style="padding:40px;color:red;font-family:sans-serif;">❌ config.js manquant</div>';
        return;
    }
    const db = window.SUPABASE_CLIENT;
    const ORSKEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImUxMmJjYzg5NTQ4MGNiYWU2NGFjMzg3ZDFlNjJhY2ZmYWUwNmUxYmM0YzY3NmZmMDI5NjVmOTlhIiwiaCI6Im11cm11cjY0In0=';

    /* ── State ── */
    let allOrders = [];
    let routeLayers = [];
    const geoCache = {};
    const SC = { pending:'#f59e0b', planned:'#3b82f6', urgent:'#f97316', in_transit:'#a855f7', delivered:'#22c55e' };
    const shortAddr = a => a ? a.split(',').slice(0,2).join(',').trim() : '—';
    /** Vue par défaut : Suisse entière */
    const CH_BOUNDS = [[45.82, 5.96], [47.81, 10.49]];
    const CH_CENTER = [46.82, 8.23];

    function esc(s) {
        if(s == null || s === '') return '';
        const d = document.createElement('div');
        d.textContent = String(s);
        return d.innerHTML;
    }

    /* ── Clock ── */
    setInterval(() => {
        document.getElementById('clock').textContent =
            new Date().toLocaleTimeString('fr-CH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }, 1000);

    /* ── Toast ── */
    const toastEl = document.getElementById('toast');
    let toastTimer;
    function toast(type, msg) {
        clearTimeout(toastTimer);
        toastEl.className = 'toast ' + type + ' show';
        toastEl.textContent = msg;
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 4000);
    }

    /* ── Map ── */
    const map = L.map('map', {zoomControl:false, attributionControl:false}).setView(CH_CENTER, 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19}).addTo(map);
    try { map.fitBounds(CH_BOUNDS, {padding:[16,16]}); } catch(e) {}

    // Force resize after window load
    window.addEventListener('load', () => {
        [100, 300, 600, 1000].forEach(t => setTimeout(() => map.invalidateSize(), t));
    });
    window.addEventListener('resize', () => map.invalidateSize());

    // Dépôt marker
    L.marker([46.7785, 6.6409], {
        icon: L.divIcon({
            html: `<div style="width:18px;height:18px;background:#e8311a;border:3px solid white;border-radius:3px;transform:rotate(45deg);box-shadow:0 3px 10px rgba(0,0,0,0.5)"></div>`,
            className:'', iconSize:[18,18], iconAnchor:[9,9]
        })
    }).addTo(map).bindTooltip('🏭 Dépôt — Yverdon-les-Bains', {permanent:true, direction:'right', offset:[12,0]});

    /* ── Icons ── */
    function mkIcon(color, pulse=false) {
        return L.divIcon({
            html: `<div style="position:relative;">
                <div style="width:13px;height:13px;background:${color};border:2.5px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5);${pulse?'animation:mp 1.2s ease-in-out infinite':''}"></div>
                ${pulse?`<div style="position:absolute;inset:-4px;border-radius:50%;border:2px solid ${color};opacity:0.4;animation:mr 1.2s ease-in-out infinite"></div>`:''}
                <style>@keyframes mp{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}@keyframes mr{0%{transform:scale(0.8);opacity:0.6}100%{transform:scale(2.2);opacity:0}}</style>
            </div>`,
            className:'', iconSize:[13,13], iconAnchor:[6,6]
        });
    }
    function mkSquare(color) {
        return L.divIcon({
            html: `<div style="width:11px;height:11px;background:${color};border:2.5px solid white;border-radius:2px;transform:rotate(45deg);box-shadow:0 2px 6px rgba(0,0,0,0.5)"></div>`,
            className:'', iconSize:[11,11], iconAnchor:[5,5]
        });
    }

    /* ── Markers ── */
    let mks = {};
    function renderMap() {
        Object.values(mks).forEach(m => { try{if(m.p)map.removeLayer(m.p);if(m.d)map.removeLayer(m.d);if(m.l)map.removeLayer(m.l);}catch(e){} });
        mks = {};
        const bounds = [[46.7785, 6.6409]];

        allOrders.forEach(o => {
            if(o.status === 'delivered') return;
            const color = SC[o.priority==='urgent'?'urgent':(o.status||'pending')] || SC.pending;
            const pulse = o.status === 'pending' || o.priority === 'urgent';
            const mg = {};
            if(o.pickup_lat) {
                mg.p = L.marker([o.pickup_lat, o.pickup_lng], {icon:mkIcon(color, pulse)})
                    .addTo(map)
                    .bindTooltip(`<b>${o.order_number||'—'}</b><br>📍 ${shortAddr(o.pickup_address)}`, {direction:'top'});
                bounds.push([o.pickup_lat, o.pickup_lng]);
            }
            if(o.delivery_lat) {
                mg.d = L.marker([o.delivery_lat, o.delivery_lng], {icon:mkSquare(color)})
                    .addTo(map)
                    .bindTooltip(`<b>${o.order_number||'—'}</b><br>🏁 ${shortAddr(o.delivery_address)}`, {direction:'top'});
                bounds.push([o.delivery_lat, o.delivery_lng]);
            }
            if(o.pickup_lat && o.delivery_lat) {
                mg.l = L.polyline([[o.pickup_lat,o.pickup_lng],[o.delivery_lat,o.delivery_lng]],
                    {color, weight:1.5, opacity:0.25, dashArray:'4 6'}).addTo(map);
            }
            mks[o.id] = mg;
        });

        if(bounds.length > 1) { try { map.fitBounds(bounds, {padding:[50,50]}); } catch(e){} }
        else { try { map.fitBounds(CH_BOUNDS, {padding:[16,16]}); } catch(e){} }
        renderStats();
        renderTransportColumns();
    }

    function focusOrder(o) {
        const pts = [];
        if(o.pickup_lat && o.pickup_lng) pts.push([o.pickup_lat, o.pickup_lng]);
        if(o.delivery_lat && o.delivery_lng) pts.push([o.delivery_lat, o.delivery_lng]);
        if(pts.length === 1) map.setView(pts[0], Math.max(map.getZoom(), 12));
        else if(pts.length === 2) map.fitBounds(pts, {padding:[72,72], maxZoom:14});
        else toast('info', 'Pas encore de GPS pour ce transport');
    }

    function renderTransportColumns() {
        const ids = ['transportCol0','transportCol1','transportCol2'];
        const cols = ids.map(id => document.getElementById(id));
        const active = allOrders.filter(o => o.status !== 'delivered');
        cols.forEach(c => { c.innerHTML = ''; });
        const chauf = window._chauffeurs || [];
        active.forEach((o, i) => {
            const color = SC[o.priority==='urgent'?'urgent':(o.status||'pending')] || SC.pending;
            const div = document.createElement('div');
            div.className = 'tb2';
            div.title = (o.order_number || '') + ' — cliquer pour centrer';
            div.onclick = () => focusOrder(o);
            let chauffeur = '';
            if(o.driver_id) {
                const u = chauf.find(x => x.id === o.driver_id);
                if(u) chauffeur = [u.prenom, u.nom].filter(Boolean).join(' ').trim();
            }
            div.innerHTML =
                '<div class="tb2-name"><span class="tb2-dot" style="background:' + color + '"></span>' + esc(o.order_number || '—') + '</div>' +
                '<div class="tb2-info">📍 ' + esc(shortAddr(o.pickup_address)) + '</div>' +
                '<div class="tb2-info">🏁 ' + esc(shortAddr(o.delivery_address)) + '</div>' +
                (chauffeur ? '<div class="tb2-meta">' + esc(chauffeur) + '</div>' : '');
            cols[i % 3].appendChild(div);
        });
    }

    /* ── Stats ── */
    function renderStats() {
        document.getElementById('sTotal').textContent   = allOrders.filter(o=>o.status!=='delivered').length;
        document.getElementById('sPending').textContent = allOrders.filter(o=>o.status==='pending'&&o.priority!=='urgent').length;
        document.getElementById('sUrgent').textContent  = allOrders.filter(o=>o.priority==='urgent').length;
        document.getElementById('sPlanned').textContent = allOrders.filter(o=>o.status==='planned').length;
        document.getElementById('sTransit').textContent = allOrders.filter(o=>o.status==='in_transit').length;
        document.getElementById('sDone').textContent    = allOrders.filter(o=>o.status==='delivered').length;
    }

    /* ── Controls ── */
    window.fitAll = function() {
        const b = [[46.7785,6.6409]];
        allOrders.forEach(o=>{if(o.pickup_lat)b.push([o.pickup_lat,o.pickup_lng]);if(o.delivery_lat)b.push([o.delivery_lat,o.delivery_lng]);});
        if(b.length>1) map.fitBounds(b, {padding:[50,50]});
        else { try { map.fitBounds(CH_BOUNDS, {padding:[16,16]}); } catch(e){} }
    };

    /* ── Routes ── */
    window.clearRoutes = function() {
        routeLayers.forEach(l => { try{map.removeLayer(l);}catch(e){} });
        routeLayers = [];
    };

    window.drawRoutes = async function() {
        clearRoutes();
        const btn = document.getElementById('cbRoutes');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        const orders = allOrders.filter(o => o.pickup_lat && o.delivery_lat && o.status !== 'delivered');
        if(!orders.length) { toast('info','Aucun transport avec GPS — cliquez 🛰️ d\'abord'); btn.innerHTML='<i class="fas fa-route"></i>'; return; }
        toast('info', `Calcul de ${orders.length} routes…`);
        for(const o of orders) {
            const color = SC[o.priority==='urgent'?'urgent':(o.status||'pending')];
            try {
                const res = await fetch('https://api.openrouteservice.org/v2/directions/driving-car/geojson', {
                    method:'POST',
                    headers:{'Authorization':ORSKEY,'Content-Type':'application/json'},
                    body:JSON.stringify({coordinates:[[o.pickup_lng,o.pickup_lat],[o.delivery_lng,o.delivery_lat]]})
                });
                if(res.ok) {
                    const d = await res.json();
                    if(d.features?.[0]) {
                        const line = L.geoJSON(d.features[0].geometry, {style:{color,weight:3,opacity:0.75}}).addTo(map);
                        routeLayers.push(line);
                        const props = d.features[0].properties;
                        const km  = (props.summary.distance/1000).toFixed(1);
                        const min = Math.round(props.summary.duration/60);
                        const coords = d.features[0].geometry.coordinates;
                        const mid = coords[Math.floor(coords.length/2)];
                        const lbl = L.marker([mid[1],mid[0]], {
                            icon:L.divIcon({
                                html:`<div style="background:rgba(17,17,24,0.9);border:1px solid ${color};border-radius:6px;padding:2px 7px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;color:white;white-space:nowrap;"><span style="color:${color}">▶</span> ${km}km·${min}min</div>`,
                                className:'', iconAnchor:[35,10]
                            }), interactive:false
                        }).addTo(map);
                        routeLayers.push(lbl);
                    }
                }
            } catch(e) {
                const line = L.polyline([[o.pickup_lat,o.pickup_lng],[o.delivery_lat,o.delivery_lng]], {color,weight:2,opacity:0.5,dashArray:'6 4'}).addTo(map);
                routeLayers.push(line);
            }
            await new Promise(r=>setTimeout(r,700));
        }
        btn.innerHTML = '<i class="fas fa-route"></i>';
        toast('success', `✅ ${orders.length} routes tracées`);
    };

    /* ── Geocode ── */
    async function geocodeOne(addr) {
        if(!addr) return null;
        const key = addr.slice(0,60);
        if(geoCache[key]) return geoCache[key];
        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr+', Suisse')}&format=json&limit=1`,{headers:{'Accept-Language':'fr'}});
            const d = await r.json();
            if(d[0]) { const c={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)}; geoCache[key]=c; return c; }
        } catch(e){}
        return null;
    }

    window.runGeocode = async function() {
        const btn = document.getElementById('cbGeo');
        const prog = document.getElementById('geoProgress');
        const bar  = document.getElementById('geoBar');
        const lbl  = document.getElementById('geoLabel');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        prog.style.display = 'block';

        const toProcess = allOrders.filter(o => (!o.pickup_lat || !o.delivery_lat) && o.status!=='delivered');
        if(!toProcess.length) {
            lbl.textContent = '✅ Toutes les adresses ont déjà des coordonnées !';
            bar.style.width = '100%'; bar.style.background = 'var(--green)';
            setTimeout(()=>{ prog.style.display='none'; btn.innerHTML='<i class="fas fa-check"></i>'; }, 2000);
            return;
        }

        let done=0, ok=0;
        for(const o of toProcess) {
            bar.style.width = Math.round(done/toProcess.length*100)+'%';
            lbl.textContent = `${done+1}/${toProcess.length} — ${o.order_number||''}`;
            const upd = {};
            if(!o.pickup_lat && o.pickup_address) {
                const c = await geocodeOne(o.pickup_address);
                if(c) { upd.pickup_lat=c.lat; upd.pickup_lng=c.lng; o.pickup_lat=c.lat; o.pickup_lng=c.lng; }
                await new Promise(r=>setTimeout(r,1100));
            }
            if(!o.delivery_lat && o.delivery_address) {
                const c = await geocodeOne(o.delivery_address);
                if(c) { upd.delivery_lat=c.lat; upd.delivery_lng=c.lng; o.delivery_lat=c.lat; o.delivery_lng=c.lng; }
                await new Promise(r=>setTimeout(r,1100));
            }
            if(Object.keys(upd).length) {
                await db.from('transport_orders_simple').update(upd).eq('id',o.id);
                ok++;
            }
            done++;
        }

        bar.style.width='100%'; bar.style.background='var(--green)';
        lbl.textContent = `✅ ${ok} adresses géocodées !`;
        renderMap();
        toast('success', `✅ ${ok} adresses géocodées`);
        setTimeout(()=>{ prog.style.display='none'; btn.innerHTML='<i class="fas fa-satellite"></i>'; btn.className='cb blue'; }, 2000);
    };

    /* ── Load from DB ── */
    async function loadFromDB() {
        const { data:orders } = await db.from('transport_orders_simple').select('*').order('created_at',{ascending:false});
        const { data:chauf  } = await db.from('utilisateurs').select('id,nom,prenom').eq('role','chauffeur');
        allOrders = orders||[];
        window._chauffeurs = chauf||[];

        // Auto-géocoder les adresses manquantes (silencieusement, sans bloquer)
        for(const o of allOrders) {
            if(!o.pickup_lat && o.pickup_address && !geoCache['_'+o.id+'p']) {
                geoCache['_'+o.id+'p'] = true;
                const c = await geocodeOne(o.pickup_address);
                if(c) { o.pickup_lat=c.lat; o.pickup_lng=c.lng; }
                await new Promise(r=>setTimeout(r,500));
            }
            if(!o.delivery_lat && o.delivery_address && !geoCache['_'+o.id+'d']) {
                geoCache['_'+o.id+'d'] = true;
                const c = await geocodeOne(o.delivery_address);
                if(c) { o.delivery_lat=c.lat; o.delivery_lng=c.lng; }
                await new Promise(r=>setTimeout(r,500));
            }
        }

        renderMap();
    }

    /* ── BroadcastChannel ── */
    const bc = new BroadcastChannel('colixo_dispatch');
    bc.onmessage = async (e) => {
        const { type, orders, tours } = e.data;
        if(orders) {
            // Enrichir avec géocodage
            for(const o of orders) {
                if(!o.pickup_lat && o.pickup_address && !geoCache['_'+o.id+'p']) {
                    geoCache['_'+o.id+'p']=true;
                    const c=await geocodeOne(o.pickup_address);
                    if(c){o.pickup_lat=c.lat;o.pickup_lng=c.lng;}
                    await new Promise(r=>setTimeout(r,500));
                }
                if(!o.delivery_lat && o.delivery_address && !geoCache['_'+o.id+'d']) {
                    geoCache['_'+o.id+'d']=true;
                    const c=await geocodeOne(o.delivery_address);
                    if(c){o.delivery_lat=c.lat;o.delivery_lng=c.lng;}
                    await new Promise(r=>setTimeout(r,500));
                }
            }
            allOrders = orders;
            renderMap();
        }
        if(type==='UPDATE') toast('info','🔄 Mise à jour');
    };

    /* ── Realtime ── */
    db.channel('map_realtime')
        .on('postgres_changes',{event:'*',schema:'public',table:'transport_orders_simple'},()=>loadFromDB())
        .subscribe();

    /* ── Init ── */
    async function init() {
        const ctx = await window.colixoRequireRoute({
            roles: ['admin', 'super_admin'],
            legacyRoles: [],
            redirectTo: (window.colixoHref || function (p) { return p; })('/login/index.html')
        });
        if (!ctx || !ctx.profile) return;
        await loadFromDB();
        toast('info','🖥️ Carte 2ème écran active');
    }

    init();

})();
</script>
</body>
