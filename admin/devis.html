<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colixo Devis Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    <div style="background:red;color:white;padding:20px;font-size:32px;font-weight:bold;">
TEST NOUVELLE PAGE DEVIS
</div>
    font-family: Arial;
    background:#0a0a0f;
    color:white;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
}
.card{
    background:#1a1a22;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}
input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border-radius:8px;
    border:none;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.btn{
    background:#f59e0b;
    color:black;
}
.table{
    width:100%;
    margin-top:20px;
}
.table td{
    padding:8px;
    border-bottom:1px solid #333;
}
.total{
    font-size:20px;
    margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<h1>📦 Colixo Devis</h1>

<div class="card">
<h3>Nouveau devis</h3>

<label>Client</label>
<input id="client">

<label>Poids (kg)</label>
<input id="poids" type="number">

<label>Type</label>
<select id="type">
<option value="eco">Eco</option>
<option value="prio">Prioritaire</option>
<option value="urgent">Urgent</option>
</select>

<label>Distance (km)</label>
<input id="km" type="number">

<label>Options</label>
<select id="option">
<option value="0">Aucune</option>
<option value="appel">Appel +2 CHF</option>
<option value="encaissement">Encaissement +10 CHF</option>
<option value="nuit">Nuit +5 CHF</option>
</select>

<button class="btn" onclick="calculer()">Calculer</button>

<div class="total" id="prix">0 CHF</div>

<button class="btn" onclick="save()">Enregistrer devis</button>

</div>

<div class="card">
<h3>Liste des devis</h3>
<div id="liste"></div>
</div>

</div>

<script>

// 🔑 TON SUPABASE
const supabase = window.supabase.createClient(
    "https://iubbsnntcreneakbdkmv.supabase.co",
    "sb_publishable_DLvnbN8vz3k9vrjE2KFyIA_qd3dxcYt"
);

// TARIFS
const tarifs = {
    eco: {2:7.5,10:9,30:18},
    prio: {2:8.5,10:10,30:19},
    urgent: {2:12,10:14,30:22}
};

function calculer(){
    let poids = parseFloat(document.getElementById("poids").value);
    let type = document.getElementById("type").value;
    let km = parseFloat(document.getElementById("km").value)||0;
    let option = document.getElementById("option").value;

    let prix = 0;

    if(poids <=2) prix = tarifs[type][2];
    else if(poids <=10) prix = tarifs[type][10];
    else prix = tarifs[type][30];

    // km
    prix += km * 1.5;

    // options
    if(option=="appel") prix+=2;
    if(option=="encaissement") prix+=10;
    if(option=="nuit") prix+=5;

    document.getElementById("prix").innerText = prix.toFixed(2)+" CHF";
    return prix;
}

async function save(){
    let client = document.getElementById("client").value;
    let prix = calculer();

    if(!client){
        alert("Client obligatoire");
        return;
    }

    const { error } = await supabase
        .from("devis_colixo")
        .insert([{
            client,
            prix,
            created_at: new Date()
        }]);

    if(error){
        alert("Erreur");
        console.log(error);
    } else {
        alert("✅ Devis enregistré");
        load();
    }
}

async function load(){
    const { data } = await supabase
        .from("devis_colixo")
        .select("*")
        .order("created_at", { ascending:false });

    let html="";

    data.forEach(d=>{
        html += `
        <div class="card">
            <b>${d.client}</b><br>
            ${d.prix} CHF<br>
        </div>
        `;
    });

    document.getElementById("liste").innerHTML = html;
}

load();

</script>

</body>
</html>
