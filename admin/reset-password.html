<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation | Léman-Courses</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase et Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .reset-container {
            width: 100%;
            max-width: 440px;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(30px); }
            to { opacity:1; transform:translateY(0); }
        }
        
        .reset-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo i {
            font-size: 60px;
            color: #e53935;
            background: #fee2e2;
            padding: 15px;
            border-radius: 50%;
        }
        
        .logo h1 {
            font-size: 28px;
            color: #0f172a;
            margin-top: 15px;
        }
        
        .logo p {
            color: #64748b;
            font-size: 14px;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #e53935;
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #e53935;
            box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            background: #c62828;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229,57,53,0.3);
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
            box-shadow: none;
        }
        
        .links {
            text-align: center;
            margin-top: 25px;
        }
        
        .links a {
            color: #e53935;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="logo">
                <i class="fas fa-key"></i>
                <h1>Nouveau mot de passe</h1>
                <p>Choisissez un nouveau mot de passe sécurisé</p>
            </div>
            
            <div id="message" class="message"></div>
            
            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            
            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            
            <button class="btn" id="resetBtn">Changer mon mot de passe</button>
            <button class="btn btn-secondary" onclick="goToLogin()">Retour à la connexion</button>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            window.SUPABASE_CONFIG.url,
            window.SUPABASE_CONFIG.key
        );
        
        // Récupérer le token depuis l'URL (hash)
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const type = hashParams.get('type');
        
        console.log("Token présent:", !!accessToken, "Type:", type);
        
        // Si on a un token de récupération, on définit la session
        if (accessToken && type === 'recovery') {
            supabase.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken
            }).then(() => {
                console.log("✅ Session restaurée");
            }).catch(e => {
                console.error("❌ Erreur session:", e);
                showMessage('error', 'Lien invalide ou expiré');
            });
        } else {
            showMessage('error', 'Lien de réinitialisation invalide');
        }
        
        function showMessage(type, text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
        }
        
        document.getElementById('resetBtn').addEventListener('click', async function() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (!password || !confirm) {
                showMessage('error', 'Veuillez remplir tous les champs');
                return;
            }
            
            if (password.length < 6) {
                showMessage('error', 'Le mot de passe doit contenir au moins 6 caractères');
                return;
            }
            
            if (password !== confirm) {
                showMessage('error', 'Les mots de passe ne correspondent pas');
                return;
            }
            
            try {
                const { error } = await supabase.auth.updateUser({
                    password: password
                });
                
                if (error) throw error;
                
                showMessage('success', '✅ Mot de passe mis à jour ! Redirection...');
                
                setTimeout(() => {
                    window.location.href = '/login/';
                }, 2000);
                
            } catch (error) {
                showMessage('error', '❌ ' + error.message);
            }
        });
        
        window.goToLogin = function() {
            window.location.href = '/login/';
        };
    </script>
</body>
</html>
