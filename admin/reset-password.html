<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation | Léman-Courses</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .reset-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo i {
            font-size: 60px;
            color: #e53935;
            background: #fee2e2;
            padding: 15px;
            border-radius: 50%;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #0f172a;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #e53935;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn:hover {
            background: #c62828;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message {
            background: #10b981;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .login-link a {
            color: #e53935;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="reset-box">
        <div class="logo">
            <i class="fas fa-key"></i>
        </div>
        
        <h2>Nouveau mot de passe</h2>
        
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
        </div>
        
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i> <span id="successText"></span>
        </div>
        
        <div class="form-group">
            <label>Nouveau mot de passe</label>
            <input type="password" id="password" placeholder="••••••••" minlength="6">
        </div>
        
        <div class="form-group">
            <label>Confirmer le mot de passe</label>
            <input type="password" id="confirmPassword" placeholder="••••••••" minlength="6">
        </div>
        
        <button class="btn" id="resetBtn" onclick="updatePassword()">
            <i class="fas fa-save"></i> Changer mon mot de passe
        </button>
        
        <div class="login-link">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Récupérer le hash de l'URL (contenant le token)
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const type = hashParams.get('type');
        
        // Si on a un token, on définit la session
        if (accessToken && type === 'recovery') {
            supabase.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken
            });
        }
        
        async function updatePassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            hideMessages();
            
            if (!password || !confirm) {
                showError('Veuillez remplir tous les champs');
                return;
            }
            
            if (password.length < 6) {
                showError('Le mot de passe doit contenir au moins 6 caractères');
                return;
            }
            
            if (password !== confirm) {
                showError('Les mots de passe ne correspondent pas');
                return;
            }
            
            const resetBtn = document.getElementById('resetBtn');
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mise à jour...';
            
            try {
                const { error } = await supabase.auth.updateUser({
                    password: password
                });
                
                if (error) throw error;
                
                showSuccess('✅ Mot de passe mis à jour ! Redirection...');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                showError('Erreur: ' + error.message);
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-save"></i> Changer mon mot de passe';
            }
        }
        
        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').style.display = 'flex';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function showSuccess(message) {
            document.getElementById('successText').textContent = message;
            document.getElementById('successMessage').style.display = 'flex';
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
    </script>
</body>
</html>
