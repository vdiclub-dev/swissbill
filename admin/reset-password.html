<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation | Léman-Courses</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Reprendre les mêmes styles */
        body { background: linear-gradient(135deg, #0f172a, #1e3a8a); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { background: white; border-radius: 20px; padding: 40px; max-width: 400px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Nouveau mot de passe</h2>
        <input type="password" id="password" placeholder="Nouveau mot de passe" style="width:100%; padding:12px; margin:10px 0;">
        <input type="password" id="confirmPassword" placeholder="Confirmer" style="width:100%; padding:12px; margin:10px 0;">
        <button class="btn" onclick="updatePassword()">Changer mon mot de passe</button>
    </div>

    <script>
        const supabase = window.supabase.createClient('URL', 'KEY');
        
        async function updatePassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (password !== confirm) {
                alert('Les mots de passe ne correspondent pas');
                return;
            }
            
            const { error } = await supabase.auth.updateUser({ password });
            
            if (error) {
                alert('Erreur: ' + error.message);
            } else {
                alert('Mot de passe mis à jour ! Redirection...');
                setTimeout(() => window.location.href = 'login.html', 2000);
            }
        }
    </script>
</body>
</html>
