<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe | Léman-Courses</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h2 { text-align: center; margin-bottom: 30px; color: #0f172a; }
        .form-group { margin-bottom: 20px; }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e53935;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover { background: #c62828; }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .message.error { background: #fee2e2; color: #991b1b; display: block; }
        .message.success { background: #d1fae5; color: #065f46; display: block; }
    </style>
</head>
<body>
    <div class="reset-box">
        <h2><i class="fas fa-key"></i> Nouveau mot de passe</h2>
        
        <div id="message" class="message"></div>
        
        <div class="form-group">
            <input type="password" id="password" placeholder="Nouveau mot de passe">
        </div>
        <div class="form-group">
            <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe">
        </div>
        
        <button class="btn" id="resetBtn">Changer mon mot de passe</button>
    </div>

    <!-- CHARGEMENT DE SUPABASE (UNE SEULE FOIS) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ===== CONFIGURATION AVEC NOM UNIQUE =====
        console.log("🚀 Page de réinitialisation");
        
        const PROJET_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const PROJET_CLE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        // Nom unique pour éviter les conflits
        const resetClient = window.supabase.createClient(PROJET_URL, PROJET_CLE);
        console.log("✅ Client créé");
        
        // Récupérer le token depuis l'URL
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const type = hashParams.get('type');
        
        console.log("Token présent:", !!accessToken, "Type:", type);
        
        // Si on a un token, on définit la session
        if (accessToken && type === 'recovery') {
            resetClient.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken
            }).then(() => {
                console.log("✅ Session restaurée");
            }).catch(e => {
                console.error("❌ Erreur session:", e);
            });
        }
        
        // Gestionnaire d'événement
        document.getElementById('resetBtn').addEventListener('click', async function() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const message = document.getElementById('message');
            
            message.className = 'message';
            
            if (!password || !confirm) {
                message.textContent = 'Veuillez remplir tous les champs';
                message.className = 'message error';
                return;
            }
            
            if (password.length < 6) {
                message.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                message.className = 'message error';
                return;
            }
            
            if (password !== confirm) {
                message.textContent = 'Les mots de passe ne correspondent pas';
                message.className = 'message error';
                return;
            }
            
            try {
                const { error } = await resetClient.auth.updateUser({
                    password: password
                });
                
                if (error) throw error;
                
                message.textContent = '✅ Mot de passe mis à jour ! Redirection...';
                message.className = 'message success';
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                message.textContent = '❌ ' + error.message;
                message.className = 'message error';
            }
        });
        
        console.log("✅ Script prêt");
    </script>
</body>
</html>
