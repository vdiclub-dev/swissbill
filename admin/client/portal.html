<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portail client – Swissbill</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
    header { background: #1976d2; color:white; padding:1rem; display:flex; justify-content:space-between; align-items:center; }
    h1 { margin:0; font-size:1.2rem; }
    main { padding:1.5rem; max-width:850px; margin:auto; }
    table { width:100%; border-collapse:collapse; margin-top:1rem; border-radius:8px; overflow:hidden; background:white; }
    th,td { text-align:left; padding:8px 12px; border-bottom:1px solid #eee; }
    th { background:#e3f2fd; color:#1976d2; }
    tr:hover { background:#fafafa; }
    button { background:#1976d2; border:none; color:white; border-radius:5px; padding:6px 10px; cursor:pointer; font-weight:600; }
  </style>
</head>
<body>
  <header>
    <h1>💼 Espace client</h1>
    <button id="logout">Déconnexion</button>
  </header>

  <main>
    <h2>Mes commandes</h2>
    <div id="loading">Chargement...</div>
    <table id="ordersTable" style="display:none;">
      <thead>
        <tr><th>ID</th><th>Date</th><th>Destination</th><th>Statut</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script type="module">
    import { supabase } from "/js/core/supabase-client.js";
    const db = supabase;
    const logoutBtn = document.getElementById("logout");
    const table = document.getElementById("ordersTable");
    const tbody = table.querySelector("tbody");
    const loading = document.getElementById("loading");

    logoutBtn.onclick = async () => { await db.auth.signOut(); location.href = "/login/index.html"; };

    // Vérifie session
    const { data: { session } } = await db.auth.getSession();
    if (!session) location.href = "/login/index.html";

    const { data: user } = await db.from("utilisateurs").select("*").eq("id", session.user.id).single();
    if (!user || user.role !== "client") {
      await db.auth.signOut();
      alert("Accès réservé aux clients");
      location.href = "/login/index.html";
    }

    // Charge les commandes du client
    async function loadOrders() {
      const { data, error } = await db
        .from("commandes")
        .select("*")
        .eq("client_id", user.id)
        .order("created_at", { ascending: false });

      if (error) { loading.textContent = "Erreur : " + error.message; return; }
      if (!data.length) { loading.textContent = "Aucune commande."; return; }

      table.style.display = "table";
      loading.style.display = "none";
      tbody.innerHTML = data.map(c => `
        <tr>
          <td>${c.id}</td>
          <td>${new Date(c.created_at).toLocaleDateString()}</td>
          <td>${c.destination || "-"}</td>
          <td>${c.statut || "—"}</td>
        </tr>
      `).join("");
    }

    loadOrders();
  </script>
</body>
</html>
