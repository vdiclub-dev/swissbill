<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Tableau de bord Swissbill</title>

  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
    header { background: #111; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
    h1 { margin: 0; font-size: 1.2rem; }
    main { padding: 2rem; max-width: 900px; margin: auto; }
    button { background: #d32f2f; color: white; border: none; border-radius: 4px; padding: 8px 14px; font-weight: bold; cursor: pointer; }
    button:hover { background: #b71c1c; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 6px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
    th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    th { background: #fafafa; font-weight: 600; color: #333; }
  </style>
</head>

<body>
  <header>
    <h1>🧭 Tableau admin – Swissbill</h1>
    <button id="logout">Déconnexion</button>
  </header>

  <main>
    <h2>Commandes récentes</h2>
    <div id="loading">Chargement...</div>
    <table id="ordersTable" style="display:none;">
      <thead>
        <tr><th>ID</th><th>Client</th><th>Destination</th><th>Statut</th><th>Chauffeur</th><th>Modifier</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script type="module">
    import { supabase } from "/js/core/supabase-client.js";

    const db = supabase;
    const logoutBtn = document.getElementById("logout");
    const table = document.getElementById("ordersTable");
    const tbody = table.querySelector("tbody");
    const loading = document.getElementById("loading");

    logoutBtn.onclick = async () => { await db.auth.signOut(); location.href = "/login/index.html"; };

    // Vérifie la session
    const { data: { session } } = await db.auth.getSession();
    if (!session) { location.href = "/login/index.html"; }

    const { data: profile } = await db.from("utilisateurs").select("*").eq("id", session.user.id).single();
    if (!["admin", "super_admin"].includes(profile.role)) {
      await db.auth.signOut();
      alert("Accès réservé aux administrateurs");
      location.href = "/login/index.html";
    }

    // Chargement des commandes
    async function loadOrders() {
      const { data, error } = await db.from("commandes").select("*").order("created_at", { ascending: false }).limit(15);
      if (error) { loading.textContent = "Erreur : " + error.message; return; }
      if (!data.length) { loading.textContent = "Aucune commande."; return; }

      table.style.display = "table";
      loading.style.display = "none";
      tbody.innerHTML = data.map(c => `
        <tr>
          <td>${c.id}</td>
          <td>${c.client || "-"}</td>
          <td>${c.destination || "-"}</td>
          <td>${c.statut || "—"}</td>
          <td>${c.chauffeur || "—"}</td>
          <td><button onclick='editOrder("${c.id}")'>✎</button></td>
        </tr>
      `).join("");
    }

    window.editOrder = async function(id) {
      const chauffeur = prompt("Nom du chauffeur à assigner :");
      if (!chauffeur) return;
      const { error } = await db.from("commandes").update({ chauffeur }).eq("id", id);
      if (error) alert("Erreur : " + error.message);
      else loadOrders();
    };

    loadOrders();
  </script>
</body>
</html>
