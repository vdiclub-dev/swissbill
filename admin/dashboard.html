<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion utilisateurs | Léman-Courses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <style>
        :root {
            --red:      #e8311a;
            --red-dark: #c0280f;
            --red-glow: rgba(232,49,26,0.2);
            --night:    #0a0a0f;
            --night2:   #111118;
            --night3:   #18181f;
            --surface:  #1e1e28;
            --border:   rgba(255,255,255,0.07);
            --border2:  rgba(255,255,255,0.12);
            --white:    #ffffff;
            --muted:    rgba(255,255,255,0.38);
            --muted2:   rgba(255,255,255,0.6);
            --green:    #22c55e;
            --blue:     #3b82f6;
            --yellow:   #f59e0b;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--night);
            color: var(--white);
            min-height: 100vh;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: var(--night2);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 22px; letter-spacing: 1px;
            color: var(--white); text-decoration: none;
            display: flex; align-items: center; gap: 10px;
        }
        .logo em { color: var(--red); font-style: normal; }
        .logo-mark {
            width: 34px; height: 34px; background: var(--red);
            border-radius: 8px; display: grid; place-items: center; font-size: 16px;
        }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .btn {
            font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 13px;
            padding: 9px 20px; border-radius: 10px; border: none;
            cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
            transition: all 0.2s; text-decoration: none; white-space: nowrap;
        }
        .btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border2); }
        .btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,0.3); }
        .btn-red { background: var(--red); color: var(--white); box-shadow: 0 4px 16px var(--red-glow); }
        .btn-red:hover { background: var(--red-dark); transform: translateY(-1px); }
        .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }

        /* ── LAYOUT ── */
        .page { max-width: 1300px; margin: 0 auto; padding: 40px; }

        /* ── HEADER ── */
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 32px;
        }
        .page-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 40px; letter-spacing: 1px; line-height: 1;
        }
        .page-title span { color: var(--muted); font-size: 16px; font-family: 'Outfit', sans-serif; font-weight: 300; display: block; margin-top: 4px; letter-spacing: 0; }

        /* ── STATS CARDS ── */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
        .stat-card {
            background: var(--night2); border: 1px solid var(--border2);
            border-radius: 18px; padding: 24px;
            transition: border-color 0.3s;
        }
        .stat-card:hover { border-color: rgba(232,49,26,0.3); }
        .stat-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .stat-card-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: grid; place-items: center; font-size: 18px;
        }
        .stat-card-icon.red    { background: rgba(232,49,26,0.12); color: var(--red); }
        .stat-card-icon.blue   { background: rgba(59,130,246,0.12); color: var(--blue); }
        .stat-card-icon.green  { background: rgba(34,197,94,0.12);  color: var(--green); }
        .stat-card-icon.yellow { background: rgba(245,158,11,0.12); color: var(--yellow); }
        .stat-card-num { font-family: 'Bebas Neue', cursive; font-size: 40px; letter-spacing: 1px; line-height: 1; }
        .stat-card-lbl { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 300; }

        /* ── SEARCH & FILTER BAR ── */
        .toolbar {
            display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .search-wrap {
            flex: 1; min-width: 200px;
            position: relative;
        }
        .search-wrap i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%); color: var(--muted); font-size: 14px;
        }
        .search-wrap input {
            width: 100%; padding: 11px 14px 11px 40px;
            background: var(--night2); border: 1px solid var(--border2);
            border-radius: 10px; font-family: 'Outfit', sans-serif;
            font-size: 14px; color: var(--white);
            transition: border-color 0.2s;
        }
        .search-wrap input::placeholder { color: var(--muted); }
        .search-wrap input:focus { outline: none; border-color: var(--red); }
        .filter-select {
            padding: 11px 16px; background: var(--night2);
            border: 1px solid var(--border2); border-radius: 10px;
            font-family: 'Outfit', sans-serif; font-size: 14px;
            color: var(--white); cursor: pointer;
        }
        .filter-select:focus { outline: none; border-color: var(--red); }
        .filter-select option { background: var(--night2); }

        /* ── TABLE ── */
        .table-wrap {
            background: var(--night2); border: 1px solid var(--border2);
            border-radius: 20px; overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--night3); }
        th {
            padding: 14px 20px; text-align: left;
            font-size: 11px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--muted);
        }
        td { padding: 16px 20px; border-top: 1px solid var(--border); font-size: 14px; }
        tr { transition: background 0.15s; }
        tbody tr:hover { background: rgba(255,255,255,0.02); }

        .user-cell { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 36px; height: 36px; border-radius: 10px;
            display: grid; place-items: center;
            font-family: 'Bebas Neue', cursive; font-size: 15px;
            flex-shrink: 0; letter-spacing: 0.5px;
        }
        .avatar.admin     { background: rgba(232,49,26,0.15); color: var(--red); }
        .avatar.chauffeur { background: rgba(59,130,246,0.15); color: var(--blue); }
        .avatar.magasinier{ background: rgba(34,197,94,0.15);  color: var(--green); }
        .avatar.client    { background: rgba(255,255,255,0.08); color: var(--muted2); }

        .user-name  { font-weight: 600; font-size: 14px; }
        .user-email { font-size: 12px; color: var(--muted); margin-top: 1px; }

        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 12px; border-radius: 100px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .badge.admin     { background: rgba(232,49,26,0.12); color: var(--red);    border: 1px solid rgba(232,49,26,0.2); }
        .badge.chauffeur { background: rgba(59,130,246,0.12); color: var(--blue);  border: 1px solid rgba(59,130,246,0.2); }
        .badge.magasinier{ background: rgba(34,197,94,0.12);  color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
        .badge.client    { background: rgba(255,255,255,0.05); color: var(--muted2); border: 1px solid var(--border2); }

        .actions { display: flex; gap: 6px; }
        .action-btn {
            width: 32px; height: 32px; border-radius: 8px; border: none;
            background: transparent; cursor: pointer;
            display: grid; place-items: center; font-size: 14px;
            color: var(--muted); transition: all 0.2s;
            border: 1px solid transparent;
        }
        .action-btn:hover.edit   { background: rgba(59,130,246,0.12); color: var(--blue);  border-color: rgba(59,130,246,0.2); }
        .action-btn:hover.delete { background: rgba(232,49,26,0.12);  color: var(--red);   border-color: rgba(232,49,26,0.2); }
        .action-btn:hover.pwd    { background: rgba(245,158,11,0.12); color: var(--yellow); border-color: rgba(245,158,11,0.2); }

        .empty-state {
            padding: 80px 20px; text-align: center;
        }
        .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.3; }
        .empty-text { font-size: 15px; color: var(--muted); }

        /* ── MODAL ── */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(10px);
            z-index: 500; align-items: center; justify-content: center; padding: 20px;
        }
        .modal.open { display: flex; }
        .modal-box {
            background: var(--night3); border: 1px solid var(--border2);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 460px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: boxIn 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes boxIn { from{opacity:0;transform:scale(0.94) translateY(16px)} to{opacity:1;transform:none} }
        .modal-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 28px;
        }
        .modal-title { font-family: 'Bebas Neue', cursive; font-size: 26px; letter-spacing: 1px; }
        .modal-close {
            width: 34px; height: 34px; background: var(--surface); border: none;
            border-radius: 50%; cursor: pointer; display: grid; place-items: center;
            font-size: 15px; color: var(--muted); transition: all 0.2s;
        }
        .modal-close:hover { background: var(--border2); color: var(--white); }
        .field { margin-bottom: 16px; }
        .field label {
            display: block; font-size: 11px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 8px;
        }
        .field input, .field select {
            width: 100%; padding: 12px 14px;
            background: var(--surface); border: 1.5px solid var(--border2);
            border-radius: 10px; font-family: 'Outfit', sans-serif;
            font-size: 14px; color: var(--white); transition: border-color 0.2s;
        }
        .field input::placeholder { color: rgba(255,255,255,0.2); }
        .field input:focus, .field select:focus { outline: none; border-color: var(--red); }
        .field select option { background: var(--night3); }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
        .modal-actions .btn { flex: 1; justify-content: center; padding: 13px; }

        /* ── CONFIRM MODAL ── */
        .confirm-box {
            background: var(--night3); border: 1px solid rgba(232,49,26,0.25);
            border-radius: 24px; padding: 40px; width: 100%; max-width: 380px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: boxIn 0.3s cubic-bezier(0.4,0,0.2,1);
            text-align: center;
        }
        .confirm-icon { font-size: 40px; margin-bottom: 16px; }
        .confirm-title { font-family: 'Bebas Neue', cursive; font-size: 24px; margin-bottom: 10px; }
        .confirm-text  { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
        .confirm-actions { display: flex; gap: 10px; }

        /* ── TOAST ── */
        .toast {
            position: fixed; top: 20px; right: 20px;
            padding: 14px 20px; border-radius: 12px;
            display: flex; align-items: center; gap: 10px;
            font-size: 14px; font-weight: 500;
            background: var(--night3); border: 1px solid var(--border2);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            z-index: 9999; transform: translateX(calc(100% + 40px));
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .toast.show { transform: translateX(0); }
        .toast.success .t-ico { color: var(--green); }
        .toast.error   .t-ico { color: var(--red); }
        .t-ico { font-size: 16px; }

        /* ── LOADER ── */
        .loader { display: none; position: fixed; inset: 0; background: rgba(10,10,15,0.8); backdrop-filter: blur(4px); place-items: center; z-index: 2000; }
        .loader.on { display: grid; }
        .spin { width: 40px; height: 40px; border: 2.5px solid var(--border2); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* ── RESPONSIVE ── */
        @media(max-width:900px) {
            .page { padding: 20px; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            .topbar { padding: 0 20px; }
        }
        @media(max-width:600px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 16px; }
            th:nth-child(3), td:nth-child(3) { display: none; }
        }
    </style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"><span class="t-ico" id="toastIco"></span><span id="toastTxt"></span></div>

<!-- Loader -->
<div class="loader" id="loader"><div class="spin"></div></div>

<!-- ═══ TOPBAR ═══ -->
<header class="topbar">
    <a href="dashboard.html" class="logo">
        <div class="logo-mark">🚚</div>
        Léman<em>-Courses</em>
    </a>
    <div class="topbar-right">
        <a href="dashboard.html" class="btn btn-ghost btn-sm">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>
    </div>
</header>

<!-- ═══ PAGE ═══ -->
<main class="page">

    <!-- Header -->
    <div class="page-header">
        <div class="page-title">
            UTILISATEURS
            <span>Gestion de tous les comptes</span>
        </div>
        <button class="btn btn-red" id="btnNouveau">
            <i class="fas fa-plus"></i> Nouvel utilisateur
        </button>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
        <div class="stat-card">
            <div class="stat-card-top">
                <div class="stat-card-icon red"><i class="fas fa-users"></i></div>
            </div>
            <div class="stat-card-num" id="statTotal">—</div>
            <div class="stat-card-lbl">Total utilisateurs</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-top">
                <div class="stat-card-icon blue"><i class="fas fa-truck"></i></div>
            </div>
            <div class="stat-card-num" id="statChauffeurs">—</div>
            <div class="stat-card-lbl">Chauffeurs</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-top">
                <div class="stat-card-icon green"><i class="fas fa-box"></i></div>
            </div>
            <div class="stat-card-num" id="statMagasiniers">—</div>
            <div class="stat-card-lbl">Magasiniers</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-top">
                <div class="stat-card-icon yellow"><i class="fas fa-user"></i></div>
            </div>
            <div class="stat-card-num" id="statClients">—</div>
            <div class="stat-card-lbl">Clients</div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Rechercher par nom, email…">
        </div>
        <select class="filter-select" id="filterRole">
            <option value="">Tous les rôles</option>
            <option value="admin">Administrateur</option>
            <option value="chauffeur">Chauffeur</option>
            <option value="magasinier">Magasinier</option>
            <option value="client">Client</option>
        </select>
    </div>

    <!-- Table -->
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Utilisateur</th>
                    <th>Téléphone</th>
                    <th>Rôle</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersList">
                <tr>
                    <td colspan="4">
                        <div class="empty-state">
                            <div class="empty-icon"><i class="fas fa-spinner fa-spin"></i></div>
                            <div class="empty-text">Chargement…</div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- ═══ MODAL UTILISATEUR ═══ -->
<div id="userModal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-box">
        <div class="modal-head">
            <div class="modal-title" id="modalTitle">NOUVEL UTILISATEUR</div>
            <button class="modal-close" data-close="userModal">✕</button>
        </div>
        <form id="userForm">
            <input type="hidden" id="userId">
            <div class="field">
                <label>Email *</label>
                <input type="email" id="userEmail" placeholder="prenom@exemple.ch" required autocomplete="off">
            </div>
            <div class="field" id="passwordField">
                <label>Mot de passe *</label>
                <input type="password" id="userPassword" placeholder="6 caractères min." minlength="6" autocomplete="new-password">
                <div class="field-hint" id="passwordHint">Requis pour un nouvel utilisateur</div>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>Nom</label>
                    <input type="text" id="userNom" placeholder="Dupont">
                </div>
                <div class="field">
                    <label>Prénom</label>
                    <input type="text" id="userPrenom" placeholder="Jean">
                </div>
            </div>
            <div class="field">
                <label>Téléphone</label>
                <input type="tel" id="userTel" placeholder="+41 79 000 00 00">
            </div>
            <div class="field">
                <label>Rôle</label>
                <select id="userRole">
                    <option value="client">Client</option>
                    <option value="chauffeur">Chauffeur</option>
                    <option value="magasinier">Magasinier</option>
                    <option value="admin">Administrateur</option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="submit" class="btn btn-red">
                    <i class="fas fa-save"></i> Enregistrer
                </button>
                <button type="button" class="btn btn-ghost" data-close="userModal">Annuler</button>
            </div>
        </form>
    </div>
</div>

<!-- ═══ MODAL MOT DE PASSE ═══ -->
<div id="pwdModal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-box">
        <div class="modal-head">
            <div class="modal-title">NOUVEAU MOT DE PASSE</div>
            <button class="modal-close" data-close="pwdModal">✕</button>
        </div>
        <form id="pwdForm">
            <input type="hidden" id="pwdUserId">
            <div class="field">
                <label>Nouveau mot de passe</label>
                <input type="password" id="newPassword" placeholder="6 caractères min." minlength="6" required>
            </div>
            <div class="modal-actions">
                <button type="submit" class="btn btn-red">
                    <i class="fas fa-key"></i> Changer
                </button>
                <button type="button" class="btn btn-ghost" data-close="pwdModal">Annuler</button>
            </div>
        </form>
    </div>
</div>

<!-- ═══ MODAL CONFIRMATION SUPPRESSION ═══ -->
<div id="confirmModal" class="modal" role="dialog" aria-modal="true">
    <div class="confirm-box">
        <div class="confirm-icon">🗑️</div>
        <div class="confirm-title">SUPPRIMER ?</div>
        <div class="confirm-text" id="confirmText">Cette action est irréversible.</div>
        <div class="confirm-actions">
            <button class="btn btn-red" id="confirmYes" style="flex:1;justify-content:center;">
                <i class="fas fa-trash"></i> Supprimer
            </button>
            <button class="btn btn-ghost" data-close="confirmModal" style="flex:1;justify-content:center;">Annuler</button>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    /* ── Supabase ── */
    if (!window.SUPABASE_CONFIG) {
        document.body.innerHTML = '<div style="padding:40px;color:red;">❌ config.js manquant</div>';
        return;
    }
    const db = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.key);

    /* ── State ── */
    let allUsers = [];

    /* ── Toast ── */
    const toastEl  = document.getElementById('toast');
    const toastIco = document.getElementById('toastIco');
    const toastTxt = document.getElementById('toastTxt');
    let toastTimer;
    function toast(type, msg) {
        clearTimeout(toastTimer);
        toastEl.className = 'toast ' + type + ' show';
        toastIco.textContent = type === 'success' ? '✓' : '✕';
        toastTxt.textContent = msg;
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 4000);
    }

    /* ── Loader ── */
    const loaderEl = document.getElementById('loader');
    const showLoad = () => loaderEl.classList.add('on');
    const hideLoad = () => loaderEl.classList.remove('on');

    /* ── Modal helpers ── */
    function openModal(id) {
        const m = document.getElementById(id);
        if (m) { m.style.display = 'flex'; m.classList.add('open'); }
    }
    function closeModal(id) {
        const m = document.getElementById(id);
        if (m) { m.style.display = 'none'; m.classList.remove('open'); }
    }

    document.querySelectorAll('[data-close]').forEach(btn => {
        btn.addEventListener('click', () => closeModal(btn.dataset.close));
    });
    document.querySelectorAll('.modal').forEach(m => {
        m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); });
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') document.querySelectorAll('.modal.open').forEach(m => closeModal(m.id));
    });

    /* ── Load users ── */
    async function loadUsers() {
        const { data, error } = await db
            .from('utilisateurs')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) { toast('error', error.message); return; }
        allUsers = data || [];
        updateStats();
        renderUsers(allUsers);
    }

    /* ── Stats ── */
    function updateStats() {
        document.getElementById('statTotal').textContent       = allUsers.length;
        document.getElementById('statChauffeurs').textContent  = allUsers.filter(u => u.role === 'chauffeur').length;
        document.getElementById('statMagasiniers').textContent = allUsers.filter(u => u.role === 'magasinier').length;
        document.getElementById('statClients').textContent     = allUsers.filter(u => u.role === 'client').length;
    }

    /* ── Render table ── */
    function renderUsers(users) {
        const tbody = document.getElementById('usersList');
        if (!users.length) {
            tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><div class="empty-icon"><i class="fas fa-users-slash"></i></div><div class="empty-text">Aucun utilisateur trouvé</div></div></td></tr>`;
            return;
        }
        tbody.innerHTML = users.map(u => {
            const initials = ((u.prenom?.[0] || '') + (u.nom?.[0] || '') || u.email[0]).toUpperCase();
            const fullName = [u.prenom, u.nom].filter(Boolean).join(' ') || '—';
            const roleLabel = { admin: 'Admin', chauffeur: 'Chauffeur', magasinier: 'Magasinier', client: 'Client' }[u.role] || u.role;
            return `
                <tr>
                    <td>
                        <div class="user-cell">
                            <div class="avatar ${u.role}">${initials}</div>
                            <div>
                                <div class="user-name">${fullName}</div>
                                <div class="user-email">${u.email}</div>
                            </div>
                        </div>
                    </td>
                    <td style="color:var(--muted2)">${u.telephone || '—'}</td>
                    <td><span class="badge ${u.role}">${roleLabel}</span></td>
                    <td>
                        <div class="actions">
                            <button class="action-btn edit"   title="Modifier"           onclick="editUser('${u.id}')"><i class="fas fa-pen"></i></button>
                            <button class="action-btn pwd"    title="Changer mot de passe" onclick="changePwd('${u.id}')"><i class="fas fa-key"></i></button>
                            <button class="action-btn delete" title="Supprimer"           onclick="askDelete('${u.id}', '${u.email}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    /* ── Search & filter ── */
    function applyFilters() {
        const q    = document.getElementById('searchInput').value.toLowerCase();
        const role = document.getElementById('filterRole').value;
        const filtered = allUsers.filter(u => {
            const matchQ = !q || u.email.toLowerCase().includes(q) ||
                (u.nom  || '').toLowerCase().includes(q) ||
                (u.prenom || '').toLowerCase().includes(q);
            const matchR = !role || u.role === role;
            return matchQ && matchR;
        });
        renderUsers(filtered);
    }
    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('filterRole').addEventListener('change', applyFilters);

    /* ── New user ── */
    document.getElementById('btnNouveau').addEventListener('click', () => {
        document.getElementById('modalTitle').textContent = 'NOUVEL UTILISATEUR';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('userPassword').required = true;
        document.getElementById('passwordHint').textContent = 'Requis pour un nouvel utilisateur';
        openModal('userModal');
    });

    /* ── Edit user ── */
    window.editUser = function (id) {
        const u = allUsers.find(x => x.id === id);
        if (!u) return;
        document.getElementById('modalTitle').textContent    = 'MODIFIER UTILISATEUR';
        document.getElementById('userId').value              = u.id;
        document.getElementById('userEmail').value           = u.email;
        document.getElementById('userPassword').value        = '';
        document.getElementById('userPassword').required     = false;
        document.getElementById('passwordHint').textContent  = 'Laisser vide pour ne pas changer';
        document.getElementById('userNom').value             = u.nom    || '';
        document.getElementById('userPrenom').value          = u.prenom || '';
        document.getElementById('userTel').value             = u.telephone || '';
        document.getElementById('userRole').value            = u.role;
        openModal('userModal');
    };

    /* ── Save user form ── */
    document.getElementById('userForm').addEventListener('submit', async e => {
        e.preventDefault();
        const id      = document.getElementById('userId').value;
        const email   = document.getElementById('userEmail').value.trim();
        const password= document.getElementById('userPassword').value;
        const nom     = document.getElementById('userNom').value.trim();
        const prenom  = document.getElementById('userPrenom').value.trim();
        const tel     = document.getElementById('userTel').value.trim();
        const role    = document.getElementById('userRole').value;

        showLoad();
        try {
            if (id) {
                // Modification
                const { error } = await db.from('utilisateurs')
                    .update({ email, nom: nom||null, prenom: prenom||null, telephone: tel||null, role })
                    .eq('id', id);
                if (error) throw error;
                toast('success', 'Utilisateur mis à jour');
            } else {
                // Création
                const { data: authData, error: authErr } = await db.auth.signUp({ email, password });
                if (authErr) throw authErr;
                const { error: dbErr } = await db.from('utilisateurs').insert([{
                    id: authData.user.id, email,
                    nom: nom||null, prenom: prenom||null,
                    telephone: tel||null, role
                }]);
                if (dbErr) throw dbErr;
                toast('success', 'Utilisateur créé');
            }
            closeModal('userModal');
            await loadUsers();
        } catch (err) {
            toast('error', err.message);
        } finally {
            hideLoad();
        }
    });

    /* ── Change password ── */
    window.changePwd = function (id) {
        document.getElementById('pwdUserId').value = id;
        document.getElementById('newPassword').value = '';
        openModal('pwdModal');
    };

    document.getElementById('pwdForm').addEventListener('submit', async e => {
        e.preventDefault();
        const id  = document.getElementById('pwdUserId').value;
        const pwd = document.getElementById('newPassword').value;
        showLoad();
        try {
            // Note: admin.updateUserById nécessite la service_role key
            // Ici on utilise une fonction RPC ou on informe l'admin
            const { error } = await db.rpc('admin_update_password', { user_id: id, new_password: pwd });
            if (error) throw error;
            toast('success', 'Mot de passe mis à jour');
            closeModal('pwdModal');
        } catch (err) {
            // Fallback : afficher un message explicatif
            toast('error', 'Nécessite la clé service_role — utilisez le dashboard Supabase');
        } finally {
            hideLoad();
        }
    });

    /* ── Delete ── */
    window.askDelete = function (id, email) {
        document.getElementById('confirmText').textContent = `Supprimer "${email}" ? Cette action est irréversible.`;
        document.getElementById('confirmYes').onclick = () => doDelete(id);
        openModal('confirmModal');
    };

    async function doDelete(id) {
        showLoad();
        try {
            const { error } = await db.from('utilisateurs').delete().eq('id', id);
            if (error) throw error;
            toast('success', 'Utilisateur supprimé');
            closeModal('confirmModal');
            await loadUsers();
        } catch (err) {
            toast('error', err.message);
        } finally {
            hideLoad();
        }
    }

    /* ── Init ── */
    loadUsers();

})();
</script>
</body>
</html>
