<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>Léman Driver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <style>
        :root {
            --red:     #e8311a;
            --red-dark:#c0280f;
            --night:   #0a0a0f;
            --night2:  #111118;
            --night3:  #18181f;
            --surface: #1e1e28;
            --border:  rgba(255,255,255,0.08);
            --border2: rgba(255,255,255,0.14);
            --white:   #ffffff;
            --muted:   rgba(255,255,255,0.38);
            --muted2:  rgba(255,255,255,0.65);
            --green:   #22c55e;
            --blue:    #3b82f6;
            --yellow:  #f59e0b;
            --orange:  #f97316;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; overflow:hidden; }
        body {
            font-family:'Outfit',sans-serif;
            background:var(--night);
            color:var(--white);
            display:flex; flex-direction:column;
            max-width:430px; margin:0 auto;
            position:relative;
        }

        /* ── STATUS BAR ── */
        .status-bar {
            background:var(--night2);
            padding:12px 20px;
            display:flex; align-items:center; justify-content:space-between;
            border-bottom:1px solid var(--border);
            flex-shrink:0;
        }
        .sb-logo {
            display:flex; align-items:center; gap:8px;
            font-family:'Bebas Neue',cursive; font-size:16px; letter-spacing:1px;
        }
        .sb-logo-mark { width:26px; height:26px; background:var(--red); border-radius:6px; display:grid; place-items:center; font-size:12px; }
        .sb-logo em { color:var(--red); font-style:normal; }
        .sb-right { display:flex; align-items:center; gap:10px; }
        .gps-indicator {
            display:flex; align-items:center; gap:5px;
            font-size:11px; font-weight:600;
        }
        .gps-dot { width:7px; height:7px; border-radius:50%; }
        .gps-dot.on  { background:var(--green); box-shadow:0 0 6px var(--green); animation:gpsPulse 1.5s infinite; }
        .gps-dot.off { background:var(--muted); }
        @keyframes gpsPulse { 0%,100%{opacity:1}50%{opacity:0.4} }

        /* ── SCREENS ── */
        .screen { display:none; flex:1; flex-direction:column; overflow:hidden; }
        .screen.active { display:flex; }

        /* ── LOGIN SCREEN ── */
        .login-screen {
            background:var(--night);
            align-items:center; justify-content:center;
            padding:32px 24px;
        }
        .login-hero {
            text-align:center; margin-bottom:40px;
        }
        .login-icon {
            width:80px; height:80px; background:var(--red);
            border-radius:20px; display:grid; place-items:center;
            font-size:36px; margin:0 auto 20px;
            box-shadow:0 8px 32px rgba(232,49,26,0.35);
        }
        .login-title { font-family:'Bebas Neue',cursive; font-size:32px; letter-spacing:2px; margin-bottom:8px; }
        .login-sub { font-size:14px; color:var(--muted); font-weight:300; }
        .login-form { width:100%; }
        .l-field { margin-bottom:16px; }
        .l-field label { display:block; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
        .l-field input {
            width:100%; padding:16px 18px;
            background:var(--night3); border:1.5px solid var(--border2);
            border-radius:14px; font-family:'Outfit',sans-serif;
            font-size:16px; color:var(--white);
            -webkit-appearance:none;
        }
        .l-field input:focus { outline:none; border-color:var(--red); }
        .l-field input::placeholder { color:rgba(255,255,255,0.2); }
        .btn-login {
            width:100%; padding:18px;
            background:var(--red); color:var(--white);
            border:none; border-radius:14px;
            font-family:'Outfit',sans-serif; font-size:16px; font-weight:700;
            display:flex; align-items:center; justify-content:center; gap:10px;
            cursor:pointer; margin-top:8px;
            box-shadow:0 6px 24px rgba(232,49,26,0.35);
            transition:all 0.2s;
        }
        .btn-login:active { transform:scale(0.98); }

        /* ── HOME SCREEN ── */
        .home-header {
            background:var(--night2); padding:16px 20px;
            border-bottom:1px solid var(--border); flex-shrink:0;
        }
        .driver-greeting { font-size:12px; color:var(--muted); margin-bottom:2px; }
        .driver-name { font-family:'Bebas Neue',cursive; font-size:24px; letter-spacing:1px; }
        .home-stats {
            display:grid; grid-template-columns:repeat(3,1fr);
            gap:1px; background:var(--border);
            border-bottom:1px solid var(--border); flex-shrink:0;
        }
        .hs-item { background:var(--night2); padding:14px 10px; text-align:center; }
        .hs-val { font-family:'Bebas Neue',cursive; font-size:26px; letter-spacing:1px; }
        .hs-lbl { font-size:10px; color:var(--muted); margin-top:2px; }

        /* Mission list */
        .missions-header {
            padding:14px 20px 8px;
            display:flex; align-items:center; justify-content:space-between;
            flex-shrink:0;
        }
        .missions-title { font-family:'Bebas Neue',cursive; font-size:16px; letter-spacing:1px; color:var(--muted2); }
        .missions-list { flex:1; overflow-y:auto; padding:0 12px 80px; }
        .missions-list::-webkit-scrollbar { display:none; }

        .mission-card {
            background:var(--night3); border:1px solid var(--border2);
            border-radius:16px; padding:16px; margin-bottom:10px;
            cursor:pointer; transition:all 0.2s;
            position:relative; overflow:hidden;
        }
        .mission-card::before {
            content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
        }
        .mission-card.pending    ::before { background:var(--yellow); }
        .mission-card.planned    ::before { background:var(--blue); }
        .mission-card.in_transit ::before { background:var(--purple, #a855f7); }
        .mission-card.urgent     ::before { background:var(--orange); }
        .mission-card:active { transform:scale(0.99); }

        .mc-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .mc-num { font-family:'Bebas Neue',cursive; font-size:14px; letter-spacing:1px; color:var(--muted2); }
        .mc-badge {
            font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
            padding:3px 10px; border-radius:100px;
        }
        .mc-badge.pending   { background:rgba(245,158,11,0.15); color:var(--yellow); }
        .mc-badge.planned   { background:rgba(59,130,246,0.15); color:var(--blue); }
        .mc-badge.urgent    { background:rgba(249,115,22,0.15); color:var(--orange); }
        .mc-badge.in_transit{ background:rgba(168,85,247,0.15); color:#a855f7; }
        .mc-badge.delivered { background:rgba(34,197,94,0.15);  color:var(--green); }

        .mc-route { margin-bottom:10px; }
        .mc-stop { display:flex; align-items:flex-start; gap:10px; padding:6px 0; }
        .mc-stop:first-child { border-bottom:1px dashed var(--border2); }
        .mc-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:3px; }
        .mc-dot.p { background:var(--blue); }
        .mc-dot.d { background:var(--red); }
        .mc-addr { font-size:13px; color:var(--muted2); line-height:1.4; }
        .mc-meta { display:flex; gap:10px; align-items:center; }
        .mc-meta-item { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:4px; }

        .mc-actions { display:flex; gap:8px; margin-top:12px; }
        .mc-btn {
            flex:1; padding:10px 8px; border-radius:10px; border:none;
            font-family:'Outfit',sans-serif; font-size:12px; font-weight:600;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
            transition:all 0.2s;
        }
        .mc-btn:active { transform:scale(0.97); }
        .mc-btn.nav    { background:rgba(59,130,246,0.15); color:var(--blue); }
        .mc-btn.start  { background:var(--orange); color:var(--white); }
        .mc-btn.pickup { background:var(--blue); color:var(--white); }
        .mc-btn.deliver{ background:var(--green); color:var(--night); font-weight:700; }
        .mc-btn.done   { background:rgba(34,197,94,0.1); color:var(--green); }

        /* Empty state */
        .empty-missions {
            flex:1; display:flex; flex-direction:column;
            align-items:center; justify-content:center; padding:40px;
            text-align:center;
        }
        .empty-ico { font-size:48px; opacity:0.15; margin-bottom:16px; }
        .empty-txt { font-size:14px; color:var(--muted); line-height:1.6; }

        /* ── MAP SCREEN ── */
        .map-screen { position:relative; }
        #driverMap { width:100%; height:100%; }
        .map-back {
            position:absolute; top:16px; left:16px; z-index:100;
            width:40px; height:40px;
            background:rgba(10,10,15,0.9); backdrop-filter:blur(10px);
            border:1px solid var(--border2); border-radius:10px;
            display:grid; place-items:center; cursor:pointer;
            color:var(--white); font-size:16px;
        }
        .map-order-panel {
            position:absolute; bottom:0; left:0; right:0; z-index:100;
            background:rgba(17,17,24,0.97); backdrop-filter:blur(20px);
            border-top:1px solid var(--border2);
            border-radius:20px 20px 0 0;
            padding:20px 20px calc(20px + var(--safe-bottom));
        }
        .mop-handle { width:36px; height:4px; background:var(--border2); border-radius:100px; margin:0 auto 16px; }
        .mop-title { font-family:'Bebas Neue',cursive; font-size:18px; letter-spacing:1px; margin-bottom:12px; }
        .mop-route { margin-bottom:14px; }
        .mop-stop { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
        .mop-stop:last-child { border:none; }
        .mop-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:3px; }
        .mop-dot.p { background:var(--blue); }
        .mop-dot.d { background:var(--red); }
        .mop-addr { font-size:13px; color:var(--muted2); line-height:1.4; flex:1; }
        .mop-eta { font-size:12px; font-weight:600; color:var(--yellow); }
        .mop-actions { display:flex; gap:10px; }
        .mop-btn {
            flex:1; padding:14px; border-radius:12px; border:none;
            font-family:'Outfit',sans-serif; font-size:14px; font-weight:700;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
            transition:all 0.2s;
        }
        .mop-btn:active { transform:scale(0.98); }
        .mop-btn.nav    { background:var(--blue); color:var(--white); }
        .mop-btn.deliver{ background:var(--green); color:var(--night); }

        /* ── CONFIRM DELIVERY SCREEN ── */
        .confirm-screen { padding:24px; overflow-y:auto; }
        .confirm-header { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
        .confirm-back { width:36px; height:36px; background:var(--night3); border:none; border-radius:10px; display:grid; place-items:center; color:var(--muted2); font-size:16px; cursor:pointer; }
        .confirm-title { font-family:'Bebas Neue',cursive; font-size:24px; letter-spacing:1px; }
        .confirm-order { background:var(--night3); border:1px solid var(--border2); border-radius:16px; padding:16px; margin-bottom:20px; }
        .co-num { font-family:'Bebas Neue',cursive; font-size:14px; letter-spacing:1px; color:var(--red); margin-bottom:8px; }
        .co-addr { font-size:13px; color:var(--muted2); display:flex; align-items:center; gap:8px; }

        /* Signature pad */
        .sig-wrap { margin-bottom:20px; }
        .sig-label { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
        .sig-canvas {
            width:100%; height:160px;
            background:var(--night3); border:1.5px solid var(--border2);
            border-radius:14px; cursor:crosshair; touch-action:none;
            display:block;
        }
        .sig-canvas.signed { border-color:var(--green); }
        .sig-actions { display:flex; justify-content:flex-end; margin-top:6px; }
        .sig-clear { font-size:12px; color:var(--muted); background:none; border:none; cursor:pointer; padding:4px; }

        /* Photo capture */
        .photo-wrap { margin-bottom:20px; }
        .photo-btn {
            width:100%; padding:16px; border-radius:14px;
            background:var(--night3); border:1.5px dashed var(--border2);
            color:var(--muted2); font-family:'Outfit',sans-serif; font-size:14px; font-weight:500;
            display:flex; align-items:center; justify-content:center; gap:10px;
            cursor:pointer; transition:all 0.2s;
        }
        .photo-btn:active { background:var(--surface); }
        .photo-preview { width:100%; height:140px; object-fit:cover; border-radius:14px; display:none; }

        /* Note */
        .note-wrap { margin-bottom:24px; }
        .note-input {
            width:100%; padding:14px 16px;
            background:var(--night3); border:1.5px solid var(--border2);
            border-radius:14px; font-family:'Outfit',sans-serif; font-size:14px;
            color:var(--white); resize:none; min-height:80px;
        }
        .note-input:focus { outline:none; border-color:var(--green); }
        .note-input::placeholder { color:rgba(255,255,255,0.2); }

        .btn-confirm-delivery {
            width:100%; padding:18px;
            background:var(--green); color:var(--night);
            border:none; border-radius:14px;
            font-family:'Outfit',sans-serif; font-size:16px; font-weight:700;
            display:flex; align-items:center; justify-content:center; gap:10px;
            cursor:pointer; box-shadow:0 6px 24px rgba(34,197,94,0.3);
            transition:all 0.2s; margin-bottom:16px;
        }
        .btn-confirm-delivery:active { transform:scale(0.98); }
        .btn-confirm-delivery:disabled { opacity:0.5; cursor:not-allowed; }

        /* ── SUCCESS SCREEN ── */
        .success-screen {
            align-items:center; justify-content:center;
            padding:40px 24px; text-align:center;
        }
        .success-anim {
            width:100px; height:100px;
            background:rgba(34,197,94,0.12); border:2px solid rgba(34,197,94,0.3);
            border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-size:48px; margin:0 auto 28px;
            animation:successPop 0.5s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes successPop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
        .success-title { font-family:'Bebas Neue',cursive; font-size:36px; letter-spacing:2px; margin-bottom:10px; color:var(--green); }
        .success-sub { font-size:15px; color:var(--muted); margin-bottom:36px; line-height:1.6; }
        .btn-back-home {
            padding:16px 40px; background:var(--red); color:var(--white);
            border:none; border-radius:14px; font-family:'Outfit',sans-serif;
            font-size:15px; font-weight:700; cursor:pointer;
        }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            background:var(--night2); border-top:1px solid var(--border);
            display:flex;
            padding-bottom:var(--safe-bottom);
            flex-shrink:0; position:relative; z-index:50;
        }
        .bn-item {
            flex:1; padding:12px 8px; display:flex; flex-direction:column;
            align-items:center; gap:4px; cursor:pointer;
            color:var(--muted); transition:color 0.2s;
        }
        .bn-item.active { color:var(--red); }
        .bn-item i { font-size:18px; }
        .bn-item span { font-size:10px; font-weight:600; letter-spacing:0.5px; }
        .bn-badge {
            position:absolute; top:8px; right:calc(50% - 22px);
            width:18px; height:18px; background:var(--red);
            border-radius:50%; display:grid; place-items:center;
            font-size:10px; font-weight:700; color:var(--white);
        }

        /* ── TOAST ── */
        .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-80px); padding:12px 20px; border-radius:100px; display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; background:var(--night3); border:1px solid var(--border2); box-shadow:0 12px 40px rgba(0,0,0,0.5); z-index:9999; transition:transform 0.4s cubic-bezier(0.4,0,0.2,1); white-space:nowrap; max-width:calc(100% - 32px); }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast.success { background:rgba(34,197,94,0.15); border-color:rgba(34,197,94,0.3); color:var(--green); }
        .toast.error   { background:rgba(232,49,26,0.15);  border-color:rgba(232,49,26,0.3);  color:var(--red); }
        .toast.info    { background:rgba(59,130,246,0.15);  border-color:rgba(59,130,246,0.3);  color:var(--blue); }

        /* Loader */
        .loader { display:none; position:fixed; inset:0; background:rgba(10,10,15,0.85); place-items:center; z-index:2000; }
        .loader.on { display:grid; }
        .spin { width:40px; height:40px; border:2.5px solid var(--border2); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* Leaflet dark */
        .leaflet-tile { filter:brightness(0.85) saturate(0.6) invert(1) hue-rotate(180deg); }
        .leaflet-container { background:#0a0a0f; }
        .leaflet-control-zoom { display:none; }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="loader" id="loader"><div class="spin"></div></div>

<!-- ═══ STATUS BAR ═══ -->
<div class="status-bar" id="statusBar" style="display:none;">
    <div class="sb-logo">
        <div class="sb-logo-mark">🚚</div>
        Léman<em>-Driver</em>
    </div>
    <div class="sb-right">
        <div class="gps-indicator">
            <div class="gps-dot off" id="gpsDot"></div>
            <span id="gpsLabel" style="color:var(--muted);font-size:11px;">GPS</span>
        </div>
        <button onclick="logout()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;">
            <i class="fas fa-sign-out-alt"></i>
        </button>
    </div>
</div>

<!-- ═══ SCREEN: LOGIN ═══ -->
<div class="screen login-screen active" id="screenLogin">
    <div class="login-hero">
        <div class="login-icon">🚚</div>
        <div class="login-title">LÉMAN DRIVER</div>
        <div class="login-sub">Application chauffeur</div>
    </div>
    <div class="login-form">
        <div class="l-field">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="chauffeur@leman-courses.ch" autocomplete="email" inputmode="email">
        </div>
        <div class="l-field">
            <label>Mot de passe</label>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-login" onclick="doLogin()">
            <i class="fas fa-sign-in-alt"></i> Se connecter
        </button>
    </div>
</div>

<!-- ═══ SCREEN: HOME (missions) ═══ -->
<div class="screen" id="screenHome">
    <div class="home-header">
        <div class="driver-greeting">Bonjour,</div>
        <div class="driver-name" id="driverName">Chauffeur</div>
    </div>
    <div class="home-stats">
        <div class="hs-item">
            <div class="hs-val" id="statMissions" style="color:var(--yellow)">0</div>
            <div class="hs-lbl">En attente</div>
        </div>
        <div class="hs-item">
            <div class="hs-val" id="statToday" style="color:var(--blue)">0</div>
            <div class="hs-lbl">Aujourd'hui</div>
        </div>
        <div class="hs-item">
            <div class="hs-val" id="statDone" style="color:var(--green)">0</div>
            <div class="hs-lbl">Livrés</div>
        </div>
    </div>
    <div class="missions-header">
        <div class="missions-title">MES MISSIONS</div>
        <button onclick="loadMissions()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div class="missions-list" id="missionsList"></div>
</div>

<!-- ═══ SCREEN: MAP ═══ -->
<div class="screen" id="screenMap">
    <div id="driverMap"></div>
    <div class="map-back" onclick="showScreen('home')"><i class="fas fa-arrow-left"></i></div>
    <div class="map-order-panel">
        <div class="mop-handle"></div>
        <div class="mop-title" id="mopTitle">TRANSPORT</div>
        <div class="mop-route" id="mopRoute"></div>
        <div class="mop-actions">
            <button class="mop-btn nav" id="mopNavBtn" onclick="openGPS()">
                <i class="fas fa-directions"></i> Navigation GPS
            </button>
            <button class="mop-btn deliver" id="mopDeliverBtn">
                <i class="fas fa-check"></i> Livré
            </button>
        </div>
    </div>
</div>

<!-- ═══ SCREEN: CONFIRM DELIVERY ═══ -->
<div class="screen confirm-screen" id="screenConfirm">
    <div class="confirm-header">
        <button class="confirm-back" onclick="showScreen('home')"><i class="fas fa-arrow-left"></i></button>
        <div class="confirm-title">CONFIRMER LIVRAISON</div>
    </div>

    <div class="confirm-order" id="confirmOrderInfo"></div>

    <!-- Signature -->
    <div class="sig-wrap">
        <div class="sig-label"><i class="fas fa-pen-nib"></i> Signature du destinataire</div>
        <canvas class="sig-canvas" id="sigCanvas"></canvas>
        <div class="sig-actions">
            <button class="sig-clear" onclick="clearSignature()"><i class="fas fa-eraser"></i> Effacer</button>
        </div>
    </div>

    <!-- Photo -->
    <div class="photo-wrap">
        <div class="sig-label"><i class="fas fa-camera"></i> Photo de confirmation</div>
        <img id="photoPreview" class="photo-preview" alt="">
        <button class="photo-btn" id="photoBtn" onclick="document.getElementById('photoInput').click()">
            <i class="fas fa-camera"></i> Prendre une photo
        </button>
        <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none;" onchange="handlePhoto(this)">
    </div>

    <!-- Note -->
    <div class="note-wrap">
        <div class="sig-label"><i class="fas fa-sticky-note"></i> Note de livraison (optionnel)</div>
        <textarea class="note-input" id="deliveryNote" placeholder="Laissé en réception, remis à…"></textarea>
    </div>

    <button class="btn-confirm-delivery" id="btnConfirmDelivery" onclick="confirmDelivery()">
        <i class="fas fa-check-circle"></i> Confirmer la livraison
    </button>
</div>

<!-- ═══ SCREEN: SUCCESS ═══ -->
<div class="screen success-screen" id="screenSuccess">
    <div class="success-anim">✅</div>
    <div class="success-title">LIVRÉ !</div>
    <div class="success-sub" id="successMsg">Transport confirmé avec succès.</div>
    <button class="btn-back-home" onclick="showScreen('home')">
        <i class="fas fa-home"></i> Retour aux missions
    </button>
</div>

<!-- ═══ BOTTOM NAV ═══ -->
<div class="bottom-nav" id="bottomNav" style="display:none;">
    <div class="bn-item active" id="bnHome" onclick="showScreen('home')">
        <i class="fas fa-home"></i>
        <span>Missions</span>
        <div class="bn-badge" id="bnBadge" style="display:none;">0</div>
    </div>
    <div class="bn-item" id="bnMap" onclick="showScreen('map')">
        <i class="fas fa-map"></i>
        <span>Carte</span>
    </div>
    <div class="bn-item" id="bnProfile" onclick="showProfile()">
        <i class="fas fa-user"></i>
        <span>Profil</span>
    </div>
</div>

<script>
(function () {
    'use strict';

    if (!window.SUPABASE_CONFIG) {
        document.body.innerHTML = '<div style="padding:40px;color:red;font-family:sans-serif;">❌ config.js manquant</div>';
        return;
    }
    const db = window.SUPABASE_CLIENT;

    /* ── State ── */
    let currentDriver  = null;
    let missions       = [];
    let currentMission = null;
    let gpsWatchId     = null;
    let myLat = null, myLng = null;
    let driverMap      = null;
    let driverMarker   = null;
    let routeLine      = null;
    let sigCtx         = null;
    let isDrawing      = false;
    let hasSig         = false;

    /* ── Toast ── */
    const toastEl = document.getElementById('toast');
    let toastTimer;
    function toast(type, msg) {
        clearTimeout(toastTimer);
        toastEl.className = 'toast ' + type + ' show';
        toastEl.innerHTML = `${type==='success'?'✓':type==='error'?'✕':'ℹ'} ${msg}`;
        toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3500);
    }
    const loaderEl = document.getElementById('loader');
    const showLoad = () => loaderEl.classList.add('on');
    const hideLoad = () => loaderEl.classList.remove('on');

    /* ── Screen navigation ── */
    const SCREENS_WITH_NAV = ['home','map','profile'];
    window.showScreen = function(name) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen' + name.charAt(0).toUpperCase() + name.slice(1))?.classList.add('active');

        // Bottom nav
        document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
        document.getElementById('bn' + name.charAt(0).toUpperCase() + name.slice(1))?.classList.add('active');

        const showNav = SCREENS_WITH_NAV.includes(name);
        document.getElementById('bottomNav').style.display = showNav ? 'flex' : 'none';
        document.getElementById('statusBar').style.display = name !== 'login' ? 'flex' : 'none';

        // Init map if switching to map screen
        if (name === 'map' && !driverMap) initDriverMap();
        if (name === 'map' && driverMap)  driverMap.invalidateSize();
    };

    /* ── LOGIN ── */
    window.doLogin = async function() {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd   = document.getElementById('loginPassword').value;
        if (!email || !pwd) { toast('error', 'Email et mot de passe requis'); return; }
        showLoad();
        try {
            const { data, error } = await db.auth.signInWithPassword({ email, password: pwd });
            if (error) throw error;

            const { data: user } = await db.from('utilisateurs').select('*').eq('id', data.user.id).single();
            if (!user || !['chauffeur','admin','super_admin'].includes(user.role)) {
                await db.auth.signOut();
                throw new Error('Accès réservé aux chauffeurs');
            }
            currentDriver = user;
            afterLogin();
        } catch(e) {
            toast('error', e.message);
        } finally { hideLoad(); }
    };

    async function checkExistingSession() {
        await new Promise(r => setTimeout(r, 400));
        const { data: { session } } = await db.auth.getSession();
        if (!session) return;
        const { data: user } = await db.from('utilisateurs').select('*').eq('id', session.user.id).single();
        if (user && ['chauffeur','admin','super_admin'].includes(user.role)) {
            currentDriver = user;
            afterLogin();
        }
    }

    function afterLogin() {
        const name = [currentDriver.prenom, currentDriver.nom].filter(Boolean).join(' ') || 'Chauffeur';
        document.getElementById('driverName').textContent = name;
        showScreen('home');
        loadMissions();
        startGPS();
    }

    window.logout = async function() {
        stopGPS();
        await db.auth.signOut();
        currentDriver = null; missions = [];
        showScreen('login');
        document.getElementById('statusBar').style.display = 'none';
        document.getElementById('bottomNav').style.display = 'none';
    };

    /* ── LOAD MISSIONS ── */
    window.loadMissions = async function() {
        if (!currentDriver) return;
        const { data } = await db
            .from('transport_orders_simple')
            .select('*')
            .eq('driver_id', currentDriver.id)
            .neq('status', 'delivered')
            .order('created_at', { ascending: true });
        missions = data || [];

        // Also load today's delivered
        const today = new Date().toISOString().slice(0,10);
        const { data: done } = await db
            .from('transport_orders_simple')
            .select('*')
            .eq('driver_id', currentDriver.id)
            .eq('status', 'delivered')
            .gte('delivered_at', today + 'T00:00:00');

        const totalToday = (data?.length||0) + (done?.length||0);
        document.getElementById('statMissions').textContent = missions.length;
        document.getElementById('statToday').textContent    = totalToday;
        document.getElementById('statDone').textContent     = done?.length||0;

        // Badge
        const badge = document.getElementById('bnBadge');
        if (missions.length > 0) {
            badge.textContent = missions.length;
            badge.style.display = 'grid';
        } else {
            badge.style.display = 'none';
        }

        renderMissions();
    };

    function renderMissions() {
        const el = document.getElementById('missionsList');
        if (!missions.length) {
            el.innerHTML = `<div class="empty-missions">
                <div class="empty-ico">🎉</div>
                <div class="empty-txt">Toutes vos missions sont terminées !<br>Excellent travail.</div>
            </div>`;
            return;
        }

        // Sort: urgent first, then by creation date
        const sorted = [...missions].sort((a,b) => {
            if (a.priority==='urgent' && b.priority!=='urgent') return -1;
            if (b.priority==='urgent' && a.priority!=='urgent') return  1;
            return new Date(a.created_at) - new Date(b.created_at);
        });

        el.innerHTML = sorted.map(m => {
            const status = m.priority==='urgent' ? 'urgent' : (m.status||'pending');
            const statusLabel = { pending:'En attente', planned:'Planifié', urgent:'🔥 URGENT', in_transit:'En route' }[status] || status;
            const pickup   = shortAddr(m.pickup_address);
            const delivery = shortAddr(m.delivery_address);
            const isInTransit = m.status === 'in_transit';

            return `<div class="mission-card ${status}" onclick="selectMission('${m.id}')">
                <div class="mc-top">
                    <span class="mc-num">${m.order_number||m.id.slice(0,8)}</span>
                    <span class="mc-badge ${status}">${statusLabel}</span>
                </div>
                <div class="mc-route">
                    <div class="mc-stop">
                        <div class="mc-dot p"></div>
                        <div class="mc-addr">${pickup}</div>
                    </div>
                    <div class="mc-stop">
                        <div class="mc-dot d"></div>
                        <div class="mc-addr">${delivery}</div>
                    </div>
                </div>
                <div class="mc-meta">
                    ${m.distance_km ? `<span class="mc-meta-item"><i class="fas fa-route"></i> ${m.distance_km}km</span>` : ''}
                    ${m.weight      ? `<span class="mc-meta-item"><i class="fas fa-weight-hanging"></i> ${m.weight}kg</span>` : ''}
                    ${m.package_type? `<span class="mc-meta-item"><i class="fas fa-box"></i> ${m.package_type}</span>` : ''}
                </div>
                <div class="mc-actions">
                    <button class="mc-btn nav"     onclick="event.stopPropagation();navToMission('${m.id}')">
                        <i class="fas fa-map"></i> Carte
                    </button>
                    ${!isInTransit
                        ? `<button class="mc-btn start" onclick="event.stopPropagation();startMission('${m.id}')">
                                <i class="fas fa-play"></i> Démarrer
                            </button>`
                        : `<button class="mc-btn deliver" onclick="event.stopPropagation();openConfirm('${m.id}')">
                                <i class="fas fa-check"></i> Livrer
                            </button>`
                    }
                </div>
            </div>`;
        }).join('');
    }

    function shortAddr(addr) {
        if(!addr) return '—';
        return addr.split(',').slice(0,2).join(',').trim();
    }

    /* ── SELECT MISSION ── */
    window.selectMission = function(id) {
        currentMission = missions.find(m => m.id === id);
        if (!currentMission) return;
        navToMission(id);
    };

    /* ── START MISSION ── */
    window.startMission = async function(id) {
        showLoad();
        try {
            const { error } = await db.from('transport_orders_simple')
                .update({ status:'in_transit', picked_up_at: new Date().toISOString() })
                .eq('id', id);
            if (error) throw error;
            toast('success', 'Mission démarrée !');
            await loadMissions();
        } catch(e) { toast('error', e.message); }
        finally { hideLoad(); }
    };

    /* ── NAV TO MISSION (map) ── */
    window.navToMission = function(id) {
        currentMission = missions.find(m => m.id === id);
        if (!currentMission) return;

        // Update map panel
        document.getElementById('mopTitle').textContent = currentMission.order_number || 'Transport';
        const pickup   = shortAddr(currentMission.pickup_address);
        const delivery = shortAddr(currentMission.delivery_address);
        document.getElementById('mopRoute').innerHTML = `
            <div class="mop-stop">
                <div class="mop-dot p"></div>
                <div class="mop-addr">${pickup}</div>
                <div class="mop-eta">${currentMission.duration_min||'?'} min</div>
            </div>
            <div class="mop-stop">
                <div class="mop-dot d"></div>
                <div class="mop-addr">${delivery}</div>
            </div>`;

        document.getElementById('mopDeliverBtn').onclick = () => openConfirm(currentMission.id);

        showScreen('map');
        setTimeout(() => {
            if (!driverMap) initDriverMap();
            drawMissionOnMap(currentMission);
        }, 200);
    };

    /* ── DRIVER MAP ── */
    function initDriverMap() {
        driverMap = L.map('driverMap', { zoomControl:false, attributionControl:false }).setView([46.5197, 6.6323], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(driverMap);
    }

    function drawMissionOnMap(mission) {
        if (!driverMap) return;

        // Clear previous
        if (routeLine) driverMap.removeLayer(routeLine);

        const pts = [];
        if (mission.pickup_lat) {
            L.marker([mission.pickup_lat, mission.pickup_lng], {
                icon: L.divIcon({
                    html:`<div style="width:14px;height:14px;background:#3b82f6;border:2px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>`,
                    className:'', iconSize:[14,14], iconAnchor:[7,7]
                })
            }).addTo(driverMap).bindPopup(`📍 Enlèvement: ${shortAddr(mission.pickup_address)}`);
            pts.push([mission.pickup_lat, mission.pickup_lng]);
        }
        if (mission.delivery_lat) {
            L.marker([mission.delivery_lat, mission.delivery_lng], {
                icon: L.divIcon({
                    html:`<div style="width:14px;height:14px;background:#e8311a;border:2px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>`,
                    className:'', iconSize:[14,14], iconAnchor:[7,7]
                })
            }).addTo(driverMap);
            pts.push([mission.delivery_lat, mission.delivery_lng]);
        }

        if (pts.length > 1) {
            routeLine = L.polyline(pts, { color:'#22c55e', weight:3, opacity:0.8, dashArray:'8 4' }).addTo(driverMap);
            driverMap.fitBounds(pts, { padding:[60,60] });
        } else if (pts.length === 1) {
            driverMap.setView(pts[0], 14);
        }

        // Add my position
        if (myLat) {
            if (driverMarker) driverMap.removeLayer(driverMarker);
            driverMarker = L.marker([myLat, myLng], {
                icon: L.divIcon({
                    html:`<div style="width:16px;height:16px;background:#f59e0b;border:3px solid white;border-radius:50%;box-shadow:0 0 12px rgba(245,158,11,0.6);animation:gpsPulse 1.5s infinite"></div><style>@keyframes gpsPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}</style>`,
                    className:'', iconSize:[16,16], iconAnchor:[8,8]
                })
            }).addTo(driverMap).bindPopup('📍 Ma position');
        }
    }

    /* ── OPEN GPS NAV ── */
    window.openGPS = function() {
        if (!currentMission) return;
        const dest = currentMission.status === 'in_transit'
            ? `${currentMission.delivery_lat},${currentMission.delivery_lng}`
            : `${currentMission.pickup_lat},${currentMission.pickup_lng}`;
        const addr = currentMission.status === 'in_transit'
            ? currentMission.delivery_address
            : currentMission.pickup_address;
        // Try Google Maps, fallback to Apple Maps
        const url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(addr||dest)}&travelmode=driving`;
        window.open(url, '_blank');
    };

    /* ── GPS TRACKING ── */
    function startGPS() {
        if (!navigator.geolocation) return;
        gpsWatchId = navigator.geolocation.watchPosition(
            pos => {
                myLat = pos.coords.latitude;
                myLng = pos.coords.longitude;
                document.getElementById('gpsDot').className   = 'gps-dot on';
                document.getElementById('gpsLabel').textContent = 'GPS';
                document.getElementById('gpsLabel').style.color = 'var(--green)';

                // Update driver marker on map
                if (driverMap && myLat) {
                    if (driverMarker) driverMap.removeLayer(driverMarker);
                    driverMarker = L.marker([myLat, myLng], {
                        icon: L.divIcon({
                            html:`<div style="width:16px;height:16px;background:#f59e0b;border:3px solid white;border-radius:50%;box-shadow:0 0 12px rgba(245,158,11,0.6)"></div>`,
                            className:'', iconSize:[16,16], iconAnchor:[8,8]
                        })
                    }).addTo(driverMap);
                }

                // Push position to Supabase every 30s
                if (currentDriver) {
                    pushPosition(myLat, myLng, pos.coords.speed);
                }
            },
            err => {
                document.getElementById('gpsDot').className = 'gps-dot off';
                console.warn('GPS error:', err.message);
            },
            { enableHighAccuracy:true, timeout:10000, maximumAge:5000 }
        );
    }

    function stopGPS() {
        if (gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
    }

    let lastPush = 0;
    async function pushPosition(lat, lng, speed) {
        const now = Date.now();
        if (now - lastPush < 30000) return; // max 1 push/30s
        lastPush = now;
        try {
            await db.from('driver_tracking').insert([{
                driver_id:   currentDriver.id,
                lat, lng,
                speed_kmh:   speed ? Math.round(speed * 3.6) : null,
                recorded_at: new Date().toISOString()
            }]);
        } catch(e) { /* silent */ }
    }

    /* ── CONFIRM DELIVERY ── */
    window.openConfirm = function(id) {
        currentMission = missions.find(m => m.id === id) || currentMission;
        if (!currentMission) return;

        document.getElementById('confirmOrderInfo').innerHTML = `
            <div class="co-num">${currentMission.order_number || 'Transport'}</div>
            <div class="co-addr"><div style="width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;"></div>
            ${shortAddr(currentMission.delivery_address)}</div>
            ${currentMission.destinataire_nom ? `<div class="co-addr" style="margin-top:6px;"><i class="fas fa-user" style="color:var(--muted);width:8px;"></i> ${currentMission.destinataire_nom}</div>` : ''}`;

        // Reset signature
        clearSignature();
        document.getElementById('photoPreview').style.display = 'none';
        document.getElementById('photoBtn').style.display     = 'flex';
        document.getElementById('deliveryNote').value         = '';
        hasSig = false;

        showScreen('confirm');
        setTimeout(initSignaturePad, 100);
    };

    /* ── SIGNATURE PAD ── */
    function initSignaturePad() {
        const canvas = document.getElementById('sigCanvas');
        const rect   = canvas.getBoundingClientRect();
        canvas.width  = rect.width  * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        sigCtx = canvas.getContext('2d');
        sigCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
        sigCtx.strokeStyle = '#ffffff';
        sigCtx.lineWidth   = 2.5;
        sigCtx.lineCap     = 'round';
        sigCtx.lineJoin    = 'round';

        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            return { x: (t.clientX - r.left), y: (t.clientY - r.top) };
        }

        canvas.addEventListener('mousedown',  e => { isDrawing=true; const p=getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); });
        canvas.addEventListener('mousemove',  e => { if(!isDrawing) return; const p=getPos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); hasSig=true; canvas.classList.add('signed'); });
        canvas.addEventListener('mouseup',    () => { isDrawing=false; });
        canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing=true; const p=getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); }, { passive:false });
        canvas.addEventListener('touchmove',  e => { e.preventDefault(); if(!isDrawing) return; const p=getPos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); hasSig=true; canvas.classList.add('signed'); }, { passive:false });
        canvas.addEventListener('touchend',   () => { isDrawing=false; });
    }

    window.clearSignature = function() {
        const canvas = document.getElementById('sigCanvas');
        if (sigCtx) sigCtx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.classList.remove('signed');
        hasSig = false;
    };

    /* ── PHOTO ── */
    window.handlePhoto = function(input) {
        const file = input.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const preview = document.getElementById('photoPreview');
        preview.src = url;
        preview.style.display = 'block';
        document.getElementById('photoBtn').style.display = 'none';
    };

    /* ── CONFIRM DELIVERY ── */
    window.confirmDelivery = async function() {
        if (!currentMission) return;

        showLoad();
        try {
            const note = document.getElementById('deliveryNote').value.trim();
            const { error } = await db.from('transport_orders_simple')
                .update({
                    status:       'delivered',
                    delivered_at:  new Date().toISOString(),
                    instructions:  note || currentMission.instructions || null,
                })
                .eq('id', currentMission.id);

            if (error) throw error;

            hideLoad();
            document.getElementById('successMsg').textContent =
                `Transport ${currentMission.order_number||''} livré avec succès. Merci !`;
            showScreen('success');
            await loadMissions();

        } catch(e) {
            hideLoad();
            toast('error', e.message);
        }
    };

    /* ── PROFILE ── */
    window.showProfile = function() {
        if (!currentDriver) return;
        toast('info', `${[currentDriver.prenom,currentDriver.nom].filter(Boolean).join(' ')} · ${currentDriver.role}`);
    };

    /* ── INIT ── */
    checkExistingSession();

})();
</script>
</body>
</html>
