<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospection IA | Colixo Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <style>
        :root {
            --red:#e8311a; --red-dark:#c0280f;
            --night:#0a0a0f; --night2:#111118; --night3:#18181f; --surface:#1e1e28;
            --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
            --white:#ffffff; --muted:rgba(255,255,255,0.38); --muted2:rgba(255,255,255,0.6);
            --green:#22c55e; --blue:#3b82f6; --yellow:#f59e0b; --orange:#f97316; --purple:#a855f7;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Outfit',sans-serif;background:var(--night);color:var(--white);display:flex;}
        
        /* Sidebar */
        .sidebar{width:240px;background:var(--night2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;padding:20px 0;}
        .logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:20px;}
        .logo h2{font-family:'Bebas Neue',cursive;font-size:24px;}
        .logo em{color:var(--red);font-style:normal;}
        .nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--muted2);text-decoration:none;transition:0.2s;}
        .nav-item:hover{background:var(--night3);color:var(--white);}
        .nav-item.active{background:rgba(232,49,26,0.1);color:var(--white);border-right:3px solid var(--red);}
        .main{margin-left:240px;flex:1;padding:24px;}
        
        /* Cards */
        .card{background:var(--night2);border:1px solid var(--border2);border-radius:16px;margin-bottom:24px;overflow:hidden;}
        .card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
        .card-title{font-family:'Bebas Neue',cursive;font-size:20px;}
        .card-body{padding:24px;}
        
        .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer;border:none;transition:0.2s;}
        .btn-red{background:var(--red);color:white;}
        .btn-green{background:var(--green);color:var(--night);}
        .btn-ghost{background:var(--surface);color:var(--muted2);border:1px solid var(--border2);}
        .btn-sm{padding:6px 12px;font-size:12px;}
        
        .field{margin-bottom:16px;}
        .field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
        .field input,.field select,.field textarea{width:100%;padding:12px;background:var(--night3);border:1px solid var(--border2);border-radius:10px;color:var(--white);font-size:14px;}
        .field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        
        .tbl{width:100%;border-collapse:collapse;}
        .tbl th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border);}
        .tbl td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.05);}
        .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
        .badge-nouveau{background:rgba(59,130,246,0.15);color:var(--blue);}
        .badge-contacte{background:rgba(245,158,11,0.15);color:var(--yellow);}
        .badge-repondu{background:rgba(34,197,94,0.15);color:var(--green);}
        .badge-rdv{background:rgba(168,85,247,0.15);color:var(--purple);}
        .badge-client{background:rgba(34,197,94,0.15);color:var(--green);}
        
        .toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;background:var(--night3);border-radius:10px;z-index:1000;transform:translateX(150%);transition:0.3s;}
        .toast.show{transform:translateX(0);}
        .loader{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:2000;}
        .loader.on{display:flex;}
        .spin{width:40px;height:40px;border:2px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .progress-bar{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;}
        .progress-fill{height:100%;background:var(--green);width:0%;transition:width 0.3s;}
        
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
        .stat-card{background:var(--night3);border-radius:12px;padding:20px;text-align:center;}
        .stat-number{font-family:'Bebas Neue',cursive;font-size:32px;color:var(--green);}
        .stat-label{font-size:12px;color:var(--muted);margin-top:4px;}
        
        @media(max-width:768px){.sidebar{width:70px;}.sidebar span{display:none;}.main{margin-left:70px;}.field-row{grid-template-columns:1fr;}}
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo"><h2>Colixo<em>Pro</em></h2></div>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
    <a href="prospection.html" class="nav-item active"><i class="fas fa-chart-line"></i><span>Prospection IA</span></a>
    <a href="campagnes.html" class="nav-item"><i class="fas fa-envelope"></i><span>Campagnes</span></a>
    <a href="prospects.html" class="nav-item"><i class="fas fa-users"></i><span>Prospects</span></a>
    <a href="templates.html" class="nav-item"><i class="fas fa-file-alt"></i><span>Templates</span></a>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-arrow-left"></i><span>Retour</span></a>
</aside>

<div class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <h1 style="font-family:'Bebas Neue',cursive;font-size:32px;">🤖 Prospection Automatique IA</h1>
        <button class="btn btn-ghost" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Retour</button>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">Total prospects</div></div>
        <div class="stat-card"><div class="stat-number" id="statContactes">0</div><div class="stat-label">Contactés</div></div>
        <div class="stat-card"><div class="stat-number" id="statReponses">0</div><div class="stat-label">Réponses</div></div>
        <div class="stat-card"><div class="stat-number" id="statTaux">0%</div><div class="stat-label">Taux de réponse</div></div>
    </div>

    <!-- Nouvelle campagne -->
    <div class="card">
        <div class="card-header">
            <div class="card-title"><i class="fas fa-magic"></i> Nouvelle campagne IA</div>
        </div>
        <div class="card-body">
            <div class="field-row">
                <div class="field"><label>Nom de la campagne</label><input type="text" id="campagneNom" placeholder="Ex: Prospection e-commerce Suisse"></div>
                <div class="field"><label>Secteur d'activité</label>
                    <select id="secteur">
                        <option value="">Tous secteurs</option>
                        <option value="ecommerce">E-commerce / Vente en ligne</option>
                        <option value="retail">Commerce de détail</option>
                        <option value="industrie">Industrie / Manufacturing</option>
                        <option value="services">Services professionnels</option>
                        <option value="restauration">Restauration / Horeca</option>
                        <option value="sante">Santé / Médical</option>
                    </select>
                </div>
            </div>
            <div class="field-row">
                <div class="field"><label>Région / Canton</label><input type="text" id="region" placeholder="Ex: Vaud, Genève, Suisse romande"></div>
                <div class="field"><label>Taille entreprise</label>
                    <select id="taille">
                        <option value="">Toutes tailles</option>
                        <option value="1-10">1-10 employés</option>
                        <option value="11-50">11-50 employés</option>
                        <option value="51-200">51-200 employés</option>
                        <option value="200+">200+ employés</option>
                    </select>
                </div>
            </div>
            <div class="field-row">
                <div class="field"><label>Sujet de l'email</label><input type="text" id="emailSujet" placeholder="Objet de l'email"></div>
                <div class="field"><label>Nombre de prospects max</label><input type="number" id="maxProspects" value="50" min="1" max="500"></div>
            </div>
            <div class="field"><label>Template d'email (personnalisé par IA)</label>
                <textarea id="emailTemplate" rows="4" placeholder="Bonjour {contact_nom},

Je me permets de vous contacter car nous avons remarqué que votre entreprise {entreprise_nom} pourrait bénéficier de nos services de livraison express...

Cordialement,
L'équipe Colixo"></textarea>
            </div>
            <div style="margin-top:16px;">
                <button class="btn btn-red" onclick="lancerRechercheIA()"><i class="fas fa-search"></i> Rechercher des prospects avec IA</button>
                <button class="btn btn-green" onclick="lancerCampagne()" style="margin-left:12px;"><i class="fas fa-paper-plane"></i> Lancer la campagne</button>
            </div>
        </div>
    </div>

    <!-- Liste des prospects trouvés -->
    <div class="card">
        <div class="card-header">
            <div class="card-title"><i class="fas fa-list"></i> Prospects identifiés</div>
            <div id="progression" style="font-size:12px;color:var(--muted);"></div>
        </div>
        <div class="card-body" style="padding:0;overflow-x:auto;">
            <div class="progress-bar" style="margin:0;"><div class="progress-fill" id="progressFill"></div></div>
            <table class="tbl">
                <thead>
                    <tr><th>Entreprise</th><th>Contact</th><th>Secteur</th><th>Score</th><th>Statut</th><th>Actions</th></tr>
                </thead>
                <tbody id="prospectsList">
                    <tr><td colspan="6" style="text-align:center;padding:40px;">Aucun prospect pour le moment</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<div class="loader" id="loader"><div class="spin"></div></div>

<script>
(function() {
    if(!window.SUPABASE_CONFIG) {
        document.body.innerHTML = '<div style="padding:40px;color:red;">config.js manquant</div>';
        return;
    }
    const db = window.SUPABASE_CLIENT;
    
    let currentProspects = [];
    let currentCampagneId = null;
    
    function toast(msg) {
        const t = document.getElementById('toast');
        t.innerHTML = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }
    
    function showLoad(show) {
        document.getElementById('loader').classList.toggle('on', show);
    }
    
    // Recherche de prospects via API (simulation avec données réelles)
    async function lancerRechercheIA() {
        const secteur = document.getElementById('secteur').value;
        const region = document.getElementById('region').value;
        const taille = document.getElementById('taille').value;
        const maxProspects = parseInt(document.getElementById('maxProspects').value);
        
        if(!secteur && !region) {
            toast('Veuillez indiquer au moins un critère (secteur ou région)');
            return;
        }
        
        showLoad(true);
        document.getElementById('progressFill').style.width = '0%';
        
        try {
            // Appel à une API externe de recherche d'entreprises (exemple avec Google Places / OpenCorporates)
            // Ici on simule avec des données d'exemple
            const prospectsTrouves = await rechercherEntreprisesEnLigne(secteur, region, taille, maxProspects);
            
            currentProspects = prospectsTrouves;
            afficherProspects();
            
            document.getElementById('progressFill').style.width = '100%';
            toast(`${currentProspects.length} prospects trouvés !`);
            
        } catch(e) {
            console.error(e);
            toast('Erreur lors de la recherche: ' + e.message);
        } finally {
            showLoad(false);
        }
    }
    
    // Recherche d'entreprises via API externe
    async function rechercherEntreprisesEnLigne(secteur, region, taille, maxProspects) {
        // Dans une version réelle, vous utiliseriez des APIs comme :
        // - Google Places API
        // - OpenCorporates
        // - Sirene API (France)
        // - Zefix (Suisse)
        
        // Pour l'instant, on simule avec des données d'exemple réalistes
        const entreprisesExemples = [
            { nom: "TechStore SA", site: "techstore.ch", email: "contact@techstore.ch", tel: "021 123 45 67", adresse: "Rue de la Gare 12", npa: "1003", ville: "Lausanne", secteur: "ecommerce", taille: "11-50", contact: "Jean Dupont", poste: "Directeur" },
            { nom: "Mode Express", site: "mode-express.ch", email: "info@mode-express.ch", tel: "022 345 67 89", adresse: "Rue du Marché 5", npa: "1204", ville: "Genève", secteur: "ecommerce", taille: "1-10", contact: "Marie Martin", poste: "Fondatrice" },
            { nom: "Alpes Logistique", site: "alpes-logistique.ch", email: "contact@alpes-logistique.ch", tel: "027 456 78 90", adresse: "Route de l'Industrie 8", npa: "1920", ville: "Martigny", secteur: "industrie", taille: "51-200", contact: "Pierre Dubois", poste: "Responsable logistique" },
            { nom: "Gourmet Suisse", site: "gourmet-suisse.ch", email: "commande@gourmet-suisse.ch", tel: "026 567 89 01", adresse: "Rue des Alpes 22", npa: "1700", ville: "Fribourg", secteur: "restauration", taille: "11-50", contact: "Sophie Blanc", poste: "Gérante" },
            { nom: "Bureau Concept", site: "bureau-concept.ch", email: "ventes@bureau-concept.ch", tel: "032 678 90 12", adresse: "Avenue du Parc 3", npa: "2000", ville: "Neuchâtel", secteur: "services", taille: "11-50", contact: "Lucas Girard", poste: "Commercial" },
            { nom: "MediCare SA", site: "medicare.ch", email: "contact@medicare.ch", tel: "091 789 01 23", adresse: "Chemin des Cliniques 15", npa: "1950", ville: "Sion", secteur: "sante", taille: "51-200", contact: "Dr. Anne Perret", poste: "Directrice médicale" },
            { nom: "SportZone", site: "sportzone.ch", email: "info@sportzone.ch", tel: "021 890 12 34", adresse: "Rue de la Plaine 45", npa: "1004", ville: "Lausanne", secteur: "ecommerce", taille: "11-50", contact: "Thomas Rochat", poste: "CEO" },
            { nom: "Artisan Bois", site: "artisan-bois.ch", email: "atelier@artisan-bois.ch", tel: "026 901 23 45", adresse: "Route des Artisans 7", npa: "1630", ville: "Bulle", secteur: "industrie", taille: "1-10", contact: "Daniel Castella", poste: "Artisan" },
        ];
        
        // Filtrer selon les critères
        let filtered = entreprisesExemples;
        if(secteur) filtered = filtered.filter(e => e.secteur === secteur);
        if(region) {
            const regions = region.toLowerCase().split(/[ ,]+/);
            filtered = filtered.filter(e => regions.some(r => e.ville.toLowerCase().includes(r)));
        }
        if(taille) filtered = filtered.filter(e => e.taille === taille);
        
        // Limiter et ajouter un score
        return filtered.slice(0, maxProspects).map(e => ({
            ...e,
            score: Math.floor(Math.random() * 100) + 20,
            statut: 'nouveau'
        }));
    }
    
    function afficherProspects() {
        const tbody = document.getElementById('prospectsList');
        if(!currentProspects.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;">Aucun prospect trouvé</td></tr>';
            return;
        }
        
        tbody.innerHTML = currentProspects.map((p, i) => `
            <tr>
                <td><strong>${p.nom}</strong><br><span style="font-size:11px;color:var(--muted);">${p.site || ''}</span></td>
                <td>${p.contact || '—'}<br><span style="font-size:11px;color:var(--muted);">${p.poste || ''}</span></td>
                <td>${p.secteur || '—'}</td>
                <td><span style="color:${p.score > 70 ? 'var(--green)' : p.score > 40 ? 'var(--yellow)' : 'var(--muted)'}">${p.score}%</span></td>
                <td><span class="badge badge-${p.statut === 'nouveau' ? 'nouveau' : 'contacte'}">${p.statut === 'nouveau' ? 'Nouveau' : 'Contacté'}</span></td>
                <td><button class="btn btn-ghost btn-sm" onclick="envoyerEmailIndividuel(${i})"><i class="fas fa-envelope"></i> Envoyer</button></td>
            </tr>
        `).join('');
    }
    
    // Lancer la campagne d'emailing
    async function lancerCampagne() {
        if(!currentProspects.length) {
            toast('Aucun prospect à contacter');
            return;
        }
        
        const nomCampagne = document.getElementById('campagneNom').value;
        const sujet = document.getElementById('emailSujet').value;
        const template = document.getElementById('emailTemplate').value;
        
        if(!nomCampagne) {
            toast('Veuillez donner un nom à la campagne');
            return;
        }
        if(!sujet) {
            toast('Veuillez définir un sujet d\'email');
            return;
        }
        
        showLoad(true);
        
        try {
            // Créer la campagne en base
            const { data: campagne, error } = await db.from('campagnes_prospection').insert([{
                nom: nomCampagne,
                criteres: {
                    secteur: document.getElementById('secteur').value,
                    region: document.getElementById('region').value,
                    taille: document.getElementById('taille').value
                },
                statut: 'en_cours',
                email_sender: 'prospection@colixo.ch',
                email_subject: sujet,
                email_template: template,
                total_prospects: currentProspects.length
            }]).select().single();
            
            if(error) throw error;
            currentCampagneId = campagne.id;
            
            // Enregistrer les prospects
            for(const p of currentProspects) {
                await db.from('prospects').insert([{
                    campagne_id: currentCampagneId,
                    entreprise_nom: p.nom,
                    entreprise_site: p.site,
                    entreprise_email: p.email,
                    entreprise_telephone: p.tel,
                    entreprise_adresse: p.adresse,
                    entreprise_npa: p.npa,
                    entreprise_ville: p.ville,
                    contact_nom: p.contact,
                    contact_post: p.poste,
                    secteur_activite: p.secteur,
                    taille_entreprise: p.taille,
                    score_potentiel: p.score,
                    statut: 'nouveau'
                }]);
            }
            
            // Envoyer les emails
            await envoyerEmailsCampagne();
            
        } catch(e) {
            toast('Erreur: ' + e.message);
        } finally {
            showLoad(false);
        }
    }
    
    // Envoyer les emails de la campagne
    async function envoyerEmailsCampagne() {
        const sujet = document.getElementById('emailSujet').value;
        const template = document.getElementById('emailTemplate').value;
        let envoyes = 0;
        
        for(let i = 0; i < currentProspects.length; i++) {
            const p = currentProspects[i];
            const progress = ((i+1) / currentProspects.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progression').innerHTML = `Envoi ${i+1}/${currentProspects.length}`;
            
            // Personnaliser l'email avec les données du prospect
            let emailContent = template
                .replace(/{contact_nom}/g, p.contact || 'Madame/Monsieur')
                .replace(/{entreprise_nom}/g, p.nom)
                .replace(/{site}/g, p.site || '')
                .replace(/{ville}/g, p.ville || '');
            
            // Générer un ID de tracking
            const trackId = btoa(`${p.email}_${Date.now()}_${i}`).replace(/=/g, '');
            
            // Ajouter le pixel de tracking
            const trackingPixel = `<img src="https://votre-domaine.com/track/${trackId}.png" width="1" height="1" style="display:none;">`;
            emailContent += trackingPixel;
            
            // Simulation d'envoi (dans la réalité, appeler une API d'envoi d'email)
            console.log(`📧 Envoi à ${p.email}: ${sujet}`);
            
            // Enregistrer l'email envoyé
            await db.from('emails_prospection').insert([{
                prospect_id: p.id,
                campagne_id: currentCampagneId,
                sujet: sujet,
                contenu: emailContent,
                track_id: trackId
            }]);
            
            // Mettre à jour le prospect
            await db.from('prospects').update({
                statut: 'contacte',
                email_envoye: true,
                email_envoye_le: new Date().toISOString()
            }).eq('id', p.id);
            
            envoyes++;
            
            // Pause pour éviter le spam
            await new Promise(r => setTimeout(r, 500));
        }
        
        // Mettre à jour la campagne
        await db.from('campagnes_prospection').update({
            emails_envoyes: envoyes,
            statut: 'terminee'
        }).eq('id', currentCampagneId);
        
        document.getElementById('progression').innerHTML = `✓ ${envoyes} emails envoyés !`;
        toast(`${envoyes} emails envoyés avec succès !`);
        
        chargerStats();
    }
    
    // Envoi individuel
    window.envoyerEmailIndividuel = async function(index) {
        const p = currentProspects[index];
        const sujet = document.getElementById('emailSujet').value || `Proposition Colixo pour ${p.nom}`;
        const template = document.getElementById('emailTemplate').value;
        
        let emailContent = template
            .replace(/{contact_nom}/g, p.contact || 'Madame/Monsieur')
            .replace(/{entreprise_nom}/g, p.nom)
            .replace(/{site}/g, p.site || '')
            .replace(/{ville}/g, p.ville || '');
        
        console.log(`📧 Envoi individuel à ${p.email}:`, emailContent);
        toast(`Email envoyé à ${p.email} (simulation)`);
        
        // Marquer comme contacté
        p.statut = 'contacte';
        afficherProspects();
    };
    
    // Charger les statistiques
    async function chargerStats() {
        const { data: prospects } = await db.from('prospects').select('*');
        const total = prospects?.length || 0;
        const contactes = prospects?.filter(p => p.statut === 'contacte' || p.email_envoye).length || 0;
        const reponses = prospects?.filter(p => p.statut === 'repondu').length || 0;
        const taux = contactes > 0 ? Math.round((reponses / contactes) * 100) : 0;
        
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statContactes').textContent = contactes;
        document.getElementById('statReponses').textContent = reponses;
        document.getElementById('statTaux').textContent = taux + '%';
    }
    
    window.lancerRechercheIA = lancerRechercheIA;
    window.lancerCampagne = lancerCampagne;
    
    chargerStats();
})();
</script>
</body>
</html>
