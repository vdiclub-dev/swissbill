<!DOCTYPE html>
<html>
<head>
    <title>Gestion utilisateurs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { font-family: system-ui; margin:0; padding:0; box-sizing:border-box; }
        body { background: #f1f5f9; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .topbar {
            background: white; padding: 20px; border-radius: 10px;
            display: flex; justify-content: space-between; margin-bottom: 20px;
            align-items: center;
        }
        
        .btn {
            background: #e53935; color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px;
        }
        
        .btn:hover { background: #c62828; }
        
        .btn-back {
            background: #64748b; color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 5px; display: inline-block;
        }
        
        table {
            width: 100%; background: white; border-radius: 10px;
            border-collapse: collapse; overflow: hidden;
            margin-top: 20px;
        }
        
        th { background: #f8fafc; padding: 15px; text-align: left; }
        td { padding: 15px; border-top: 1px solid #e2e8f0; }
        
        .role {
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;
            display: inline-block;
        }
        .role.admin { background: #fee2e2; color: #e53935; }
        .role.chauffeur { background: #dbeafe; color: #1e40af; }
        .role.magasinier { background: #d1fae5; color: #065f46; }
        .role.client { background: #f1f5f9; color: #475569; }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center; justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white; border-radius: 10px; padding: 30px;
            width: 90%; max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .modal-content h3 { margin-bottom: 20px; color: #0f172a; }
        
        .modal-content input,
        .modal-content select {
            width: 100%; padding: 12px; margin: 8px 0 15px;
            border: 2px solid #e2e8f0; border-radius: 8px;
            font-size: 14px;
        }
        
        .modal-content input:focus,
        .modal-content select:focus {
            outline: none; border-color: #e53935;
        }
        
        .modal-buttons {
            display: flex; gap: 10px; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h2><i class="fas fa-users" style="color:#e53935;"></i> Gestion des utilisateurs</h2>
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Retour</a>
        </div>
        
        <!-- BOUTON SANS onclick, avec ID -->
        <button class="btn" id="btnNouvelUtilisateur">
            <i class="fas fa-plus"></i> Nouvel utilisateur
        </button>
        
        <!-- TABLEAU -->
        <table>
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Rôle</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersList">
                <tr>
                    <td colspan="5" style="text-align:center; padding:40px; color:#64748b;">
                        Chargement...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <!-- MODAL FORMULAIRE -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">➕ Nouvel utilisateur</h3>
            
            <input type="hidden" id="userId">
            
            <label>Email *</label>
            <input type="email" id="userEmail" placeholder="email@exemple.com">
            
            <label>Mot de passe *</label>
            <input type="password" id="userPassword" placeholder="••••••••">
            
            <label>Nom</label>
            <input type="text" id="userNom" placeholder="Dupont">
            
            <label>Prénom</label>
            <input type="text" id="userPrenom" placeholder="Jean">
            
            <label>Rôle</label>
            <select id="userRole">
                <option value="client">👤 Client</option>
                <option value="chauffeur">🚚 Chauffeur</option>
                <option value="magasinier">📦 Magasinier</option>
                <option value="admin">👑 Administrateur</option>
            </select>
            
            <div class="modal-buttons">
                <button class="btn" id="btnEnregistrer" style="flex:2;">Enregistrer</button>
                <button class="btn-back" id="btnAnnuler" style="flex:1;">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION AVEC NOM UNIQUE =====
        console.log("🚀 Démarrage...");
        
        const PROJET_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const PROJET_CLE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        // Nom unique pour éviter les conflits
        const lemanClient = window.supabase.createClient(PROJET_URL, PROJET_CLE);
        console.log("✅ Client créé");
        
        // ===== ÉLÉMENTS DOM =====
        const modal = document.getElementById('userModal');
        const btnNouveau = document.getElementById('btnNouvelUtilisateur');
        const btnAnnuler = document.getElementById('btnAnnuler');
        const btnEnregistrer = document.getElementById('btnEnregistrer');
        
        // ===== FONCTIONS =====
        function ouvrirModal() {
            console.log("✅ Ouverture du formulaire");
            document.getElementById('modalTitle').textContent = '➕ Nouvel utilisateur';
            document.getElementById('userId').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userNom').value = '';
            document.getElementById('userPrenom').value = '';
            document.getElementById('userRole').value = 'client';
            modal.style.display = 'flex';
        }
        
        function fermerModal() {
            modal.style.display = 'none';
        }
        
     async function enregistrerUtilisateur() {
    const email = document.getElementById('userEmail').value;
    const password = document.getElementById('userPassword').value;
    const nom = document.getElementById('userNom').value || 'À définir';  // ← Valeur par défaut
    const prenom = document.getElementById('userPrenom').value || '';    // ← Optionnel
    const role = document.getElementById('userRole').value;
    
    if (!email || !password) {
        alert('❌ Email et mot de passe requis');
        return;
    }
    
    try {
        btnEnregistrer.disabled = true;
        btnEnregistrer.textContent = 'Création...';
        
        // 1. Créer dans Auth
        const { data: authData, error: authError } = await lemanClient.auth.signUp({
            email: email,
            password: password
        });
        
        if (authError) throw authError;
        
        // 2. Créer dans employes avec TOUS les champs obligatoires
        const { error: insertError } = await lemanClient
            .from('employes')
            .insert([{
                id: authData.user.id,
                email: email,
                nom: nom,                    // ← OBLIGATOIRE
                prenom: prenom,
                role: role
            }]);
        
        if (insertError) throw insertError;
        
        alert('✅ Utilisateur créé avec succès !');
        fermerModal();
        chargerUtilisateurs();
        
    } catch (error) {
        console.error('❌ Erreur:', error);
        alert('❌ ' + error.message);
    } finally {
        btnEnregistrer.disabled = false;
        btnEnregistrer.textContent = 'Enregistrer';
    }
}
        
        async function chargerUtilisateurs() {
            const { data: users, error } = await lemanClient
                .from('employes')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error('Erreur chargement:', error);
                return;
            }
            
            let html = '';
            if (users && users.length > 0) {
                users.forEach(u => {
                    html += `
                        <tr>
                            <td>${u.email}</td>
                            <td>${u.nom || '-'}</td>
                            <td>${u.prenom || '-'}</td>
                            <td><span class="role ${u.role || 'client'}">${u.role || 'client'}</span></td>
                            <td>
                                <button onclick="alert('Modifier ${u.email} (à implémenter)')" style="color:#3b82f6; border:none; background:none; cursor:pointer; margin-right:10px;">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="alert('Supprimer ${u.email} (à implémenter)')" style="color:#e53935; border:none; background:none; cursor:pointer;">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                html = '<tr><td colspan="5" style="text-align:center; padding:40px; color:#64748b;">Aucun utilisateur trouvé</td></tr>';
            }
            
            document.getElementById('usersList').innerHTML = html;
        }
        
        // ===== ATTACHEMENT DES ÉVÉNEMENTS =====
        btnNouveau.addEventListener('click', ouvrirModal);
        btnAnnuler.addEventListener('click', fermerModal);
        btnEnregistrer.addEventListener('click', enregistrerUtilisateur);
        
        // Fermer en cliquant dehors
        window.addEventListener('click', function(event) {
            if (event.target === modal) {
                fermerModal();
            }
        });
        
        // Charger les utilisateurs au démarrage
        chargerUtilisateurs();
        
        console.log("✅ Script prêt");
    </script>
</body>
</html>
