<!DOCTYPE html>
<html>
<head>
    <title>Gestion utilisateurs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { font-family: system-ui; margin:0; padding:0; box-sizing:border-box; }
        body { background: #f1f5f9; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .topbar {
            background: white; padding: 20px; border-radius: 10px;
            display: flex; justify-content: space-between; margin-bottom: 20px;
        }
        
        .btn {
            background: #e53935; color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px;
        }
        
        .btn:hover { background: #c62828; }
        
        .btn-back {
            background: #64748b; color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 5px; display: inline-block;
        }
        
        table {
            width: 100%; background: white; border-radius: 10px;
            border-collapse: collapse; overflow: hidden;
        }
        
        th { background: #f8fafc; padding: 15px; text-align: left; }
        td { padding: 15px; border-top: 1px solid #e2e8f0; }
        
        .role {
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;
        }
        .role.admin { background: #fee2e2; color: #e53935; }
        .role.chauffeur { background: #dbeafe; color: #1e40af; }
        .role.magasinier { background: #d1fae5; color: #065f46; }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center; justify-content: center;
        }
        
        .modal-content {
            background: white; border-radius: 10px; padding: 30px;
            width: 90%; max-width: 500px;
        }
        
        .modal-content input,
        .modal-content select {
            width: 100%; padding: 10px; margin: 10px 0;
            border: 1px solid #ddd; border-radius: 5px;
        }
        
        .modal-buttons {
            display: flex; gap: 10px; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h2><i class="fas fa-users"></i> Gestion des utilisateurs</h2>
            <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Retour</a>
        </div>
        
        <button class="btn" onclick="ouvrirFormulaire()">
            <i class="fas fa-plus"></i> Nouvel utilisateur
        </button>
        
        <div style="margin-top:20px;">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Nom</th>
                        <th>Prénom</th>
                        <th>Rôle</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersList"></tbody>
            </table>
        </div>
    </div>
    
    <!-- MODAL FORMULAIRE -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">➕ Nouvel utilisateur</h3>
            
            <input type="hidden" id="userId">
            
            <label>Email *</label>
            <input type="email" id="userEmail" placeholder="email@exemple.com">
            
            <label>Mot de passe *</label>
            <input type="password" id="userPassword" placeholder="••••••••">
            
            <label>Nom</label>
            <input type="text" id="userNom" placeholder="Dupont">
            
            <label>Prénom</label>
            <input type="text" id="userPrenom" placeholder="Jean">
            
            <label>Rôle</label>
            <select id="userRole">
                <option value="client">👤 Client</option>
                <option value="chauffeur">🚚 Chauffeur</option>
                <option value="magasinier">📦 Magasinier</option>
                <option value="admin">👑 Administrateur</option>
            </select>
            
            <div class="modal-buttons">
                <button class="btn" onclick="enregistrer()" style="flex:2;">Enregistrer</button>
                <button class="btn-back" onclick="fermerFormulaire()" style="flex:1;">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const SUPABASE_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ===== FONCTIONS GLOBALES =====
        window.ouvrirFormulaire = function() {
            console.log("✅ Ouverture du formulaire");
            
            // Réinitialiser
            document.getElementById('modalTitle').textContent = '➕ Nouvel utilisateur';
            document.getElementById('userId').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userNom').value = '';
            document.getElementById('userPrenom').value = '';
            document.getElementById('userRole').value = 'client';
            
            // Afficher la modal
            document.getElementById('userModal').style.display = 'flex';
        };
        
        window.fermerFormulaire = function() {
            document.getElementById('userModal').style.display = 'none';
        };
        
        window.enregistrer = async function() {
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;
            
            if (!email || !password) {
                alert('Email et mot de passe requis');
                return;
            }
            
            try {
                // Créer dans Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (authError) throw authError;
                
                // Créer dans employes
                const { error } = await supabase
                    .from('employes')
                    .insert([{
                        id: authData.user.id,
                        email: email,
                        nom: document.getElementById('userNom').value,
                        prenom: document.getElementById('userPrenom').value,
                        role: document.getElementById('userRole').value
                    }]);
                
                if (error) throw error;
                
                alert('✅ Utilisateur créé !');
                fermerFormulaire();
                chargerUtilisateurs();
                
            } catch (error) {
                alert('❌ ' + error.message);
            }
        };
        
        async function chargerUtilisateurs() {
            const { data: users } = await supabase
                .from('employes')
                .select('*')
                .order('created_at', { ascending: false });
            
            let html = '';
            users?.forEach(u => {
                html += `
                    <tr>
                        <td>${u.email}</td>
                        <td>${u.nom || '-'}</td>
                        <td>${u.prenom || '-'}</td>
                        <td><span class="role ${u.role}">${u.role}</span></td>
                        <td>
                            <button onclick="alert('Modifier ${u.email}')" style="color:#3b82f6; border:none; background:none; cursor:pointer;">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="alert('Supprimer ${u.email}')" style="color:#e53935; border:none; background:none; cursor:pointer;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            document.getElementById('usersList').innerHTML = html;
        }
        
        // Fermer la modal si on clique dehors
        window.onclick = function(event) {
            const modal = document.getElementById('userModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
        
        // Charger les utilisateurs au démarrage
        chargerUtilisateurs();
    </script>
</body>
</html>
