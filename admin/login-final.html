<!DOCTYPE html>
<html>
<head>
    <title>Connexion Léman-Courses</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: system-ui; max-width: 400px; margin: 50px auto; padding: 20px;">
    <h1 style="color: #e53935;">🔐 Connexion</h1>
    
    <div id="message" style="background: #f0f0f0; padding: 15px; border-radius: 8px; margin: 20px 0;">
        Entrez vos identifiants
    </div>
    
    <div style="background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px;">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px;">Email</label>
            <input type="email" id="email" value="vdiclub@gmail.com" style="width:100%; padding:10px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px;">Mot de passe</label>
            <input type="password" id="password" value="demo123" style="width:100%; padding:10px;">
        </div>
        
        <button id="loginButton" style="background:#e53935; color:white; border:none; padding:12px; width:100%; border-radius:5px; cursor:pointer;">
            Se connecter
        </button>
    </div>

    <script>
        // ===== AVEC UN NOM UNIQUE =====
        console.log("🚀 Démarrage...");
        
        // VOS NOUVELLES CLÉS ICI
        const PROJET_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const PROJET_CLE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        // Nom unique pour éviter les conflits
        const lemanClient = window.supabase.createClient(PROJET_URL, PROJET_CLE);
        console.log("✅ Client créé");
        
        // Attacher l'événement sans utiliser onclick dans le HTML
        document.getElementById('loginButton').addEventListener('click', async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');
            
            message.innerHTML = '⏳ Connexion en cours...';
            message.style.background = '#fef3c7';
            
            try {
                const { data, error } = await lemanClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    message.innerHTML = '❌ ' + error.message;
                    message.style.background = '#fee2e2';
                } else {
                    message.innerHTML = '✅ Connecté ! Redirection...';
                    message.style.background = '#d1fae5';
                    
                    setTimeout(() => {
                        window.location.href = '/admin/';
                    }, 1000);
                }
            } catch(e) {
                message.innerHTML = '💥 ' + e.message;
                message.style.background = '#fee2e2';
            }
        });
        
        console.log("✅ Écouteur attaché");
    </script>
</body>
</html>
