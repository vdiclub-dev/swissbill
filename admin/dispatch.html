    <style>
:root{
    --red:#e8311a;--night:#0a0a0f;--night2:#111118;--night3:#18181f;--surface:#1e1e28;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --white:#fff;--muted:rgba(255,255,255,0.35);--muted2:rgba(255,255,255,0.6);
    --green:#22c55e;--blue:#3b82f6;--yellow:#f59e0b;--purple:#a855f7;--orange:#f97316;
    --sidebar:220px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--night);color:var(--white);overflow:hidden;}
/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:var(--night2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.sidebar-logo .mark{width:32px;height:32px;background:var(--red);border-radius:8px;display:grid;place-items:center;font-size:14px;font-weight:700;flex-shrink:0;}
.sidebar-logo span{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1px;}
.sidebar-logo em{color:var(--red);font-style:normal;}
.nav-section{padding:8px 12px 4px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:9px;text-decoration:none;color:var(--muted2);font-size:13px;transition:all 0.2s;}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--white);}
.nav-item.active{background:rgba(232,49,26,0.12);color:var(--white);}
.nav-item i{width:16px;text-align:center;flex-shrink:0;}
.sidebar-bottom{margin-top:auto;padding:16px;border-top:1px solid var(--border);}
.user-chip{display:flex;align-items:center;gap:10px;}
.user-avatar{width:32px;height:32px;background:var(--red);border-radius:8px;display:grid;place-items:center;font-weight:700;font-size:12px;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:10px;color:var(--muted);}
.btn-logout{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:4px;transition:color 0.2s;}
.btn-logout:hover{color:var(--red);}
/* ── MAIN ── */
.main{margin-left:var(--sidebar);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 24px;flex-shrink:0;background:var(--night2);}
.page-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;}
.spacer{flex:1;}
/* ── LAYOUT ── */
.content{display:flex;flex:1;overflow:hidden;}
.panel-list{width:420px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-detail{flex:1;overflow-y:auto;padding:24px;}
/* ── SEARCH ── */
.search-bar{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;}
.search-bar input{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:9px 12px;color:var(--white);font-family:'Outfit',sans-serif;font-size:13px;}
.search-bar input:focus{outline:none;border-color:var(--red);}
.search-bar input::placeholder{color:var(--muted);}
.filter-bar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;}
.fchip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:none;color:var(--muted2);transition:all 0.2s;}
.fchip.active,.fchip:hover{background:rgba(232,49,26,0.15);border-color:rgba(232,49,26,0.4);color:var(--white);}
/* ── LIST ── */
.orders-list{flex:1;overflow-y:auto;}
.order-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.order-item:hover{background:rgba(255,255,255,0.03);}
.order-item.selected{background:rgba(232,49,26,0.08);border-left:3px solid var(--red);}
.oi-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.oi-num{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1px;}
.oi-date{font-size:11px;color:var(--muted);margin-left:auto;}
.oi-addr{font-size:12px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.oi-bottom{display:flex;align-items:center;gap:8px;margin-top:6px;}
.oi-client{font-size:11px;color:var(--muted);}
/* ── STATUS CHIPS ── */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;}
.chip.pending{background:rgba(245,158,11,0.15);color:var(--yellow);border:1px solid rgba(245,158,11,0.3);}
.chip.pending_validation{background:rgba(245,158,11,0.1);color:var(--yellow);border:1px solid rgba(245,158,11,0.2);}
.chip.planned{background:rgba(59,130,246,0.15);color:var(--blue);border:1px solid rgba(59,130,246,0.3);}
.chip.in_transit{background:rgba(168,85,247,0.15);color:var(--purple);border:1px solid rgba(168,85,247,0.3);}
.chip.delivered{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.chip.refused{background:rgba(232,49,26,0.15);color:var(--red);border:1px solid rgba(232,49,26,0.3);}
/* ── DETAIL ── */
.empty-detail{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:12px;}
.empty-detail i{font-size:48px;opacity:0.3;}
.detail-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px;}
.detail-num{font-family:'Bebas Neue',cursive;font-size:36px;letter-spacing:2px;line-height:1;}
.detail-meta{flex:1;}
.detail-meta .sub{font-size:13px;color:var(--muted2);margin-top:4px;}
/* ── TIMELINE ── */
.timeline{position:relative;padding-left:28px;margin:24px 0;}
.timeline::before{content:'';position:absolute;left:9px;top:0;bottom:0;width:2px;background:var(--border2);}
.tl-step{position:relative;margin-bottom:20px;}
.tl-step:last-child{margin-bottom:0;}
.tl-dot{position:absolute;left:-25px;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:9px;border:2px solid var(--border2);background:var(--night3);}
.tl-dot.done{background:var(--green);border-color:var(--green);color:var(--night);}
.tl-dot.active{background:var(--blue);border-color:var(--blue);color:var(--white);box-shadow:0 0 0 4px rgba(59,130,246,0.2);}
.tl-dot.pending{background:var(--night3);border-color:var(--border2);color:var(--muted);}
.tl-label{font-size:13px;font-weight:600;color:var(--white);}
.tl-label.pending{color:var(--muted);}
.tl-time{font-size:11px;color:var(--muted);margin-top:2px;}
/* ── INFO GRID ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.info-card{background:var(--night3);border:1px solid var(--border);border-radius:12px;padding:14px;}
.info-card.full{grid-column:1/-1;}
.info-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.info-val{font-size:14px;font-weight:500;color:var(--white);line-height:1.4;}
.info-val.muted{color:var(--muted2);}
/* ── SECTION TITLE ── */
.sec-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
/* ── DELIVERY RECORD ── */
.delivery-box{background:var(--night3);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px;}
.delivery-photo{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-top:10px;background:var(--night2);}
.sig-canvas{width:100%;height:80px;background:var(--night2);border-radius:8px;margin-top:8px;}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;transition:all 0.2s;text-decoration:none;}
.btn-red{background:var(--red);color:var(--white);}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--muted2);border:1px solid var(--border2);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);color:var(--white);}
.btn-sm{padding:6px 12px;font-size:12px;}
/* ── EMPTY ── */
.empty-list{display:flex;flex-direction:column;align-items:center;padding:40px 20px;color:var(--muted);gap:10px;font-size:13px;}
.empty-list i{font-size:32px;opacity:0.3;}
/* ── LOADER ── */
.loader{display:none;position:fixed;inset:0;background:rgba(10,10,15,0.8);place-items:center;z-index:2000;}
.loader.show{display:grid;}
/* ── MAPS LINK ── */
.maps-link{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);border-radius:8px;color:var(--blue);font-size:12px;font-weight:600;text-decoration:none;margin-top:8px;}
.maps-link:hover{background:rgba(59,130,246,0.2);}
@media(max-width:900px){
    .sidebar{display:none;}
    .main{margin-left:0;}
    .panel-list{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:40vh;}
    .content{flex-direction:column;}
}
    </style>
</head>

<script>
(function(){
'use strict';
if(!window.SUPABASE_CONFIG){document.body.innerHTML='<div style="padding:40px;color:red;">❌ config.js manquant</div>';return;}
var db=window.SUPABASE_CLIENT;

var allOrders=[];
var currentFilter='tous';
var currentId=null;
var entreprises={};

function esc(s){if(s==null)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fmt(d){if(!d)return'—';var dt=new Date(d);return dt.toLocaleString('fr-CH',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Zurich'});}
function fmtShort(d){if(!d)return'';var dt=new Date(d);return dt.toLocaleString('fr-CH',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Zurich'});}

var STATUS_LABEL={
    pending_validation:'En attente validation',
    pending:'En attente',
    planned:'Planifié',
    in_transit:'En route',
    delivered:'Livré',
    refused:'Refusé'
};

function chipHtml(o){
    var s=o.admin_status==='pending_validation'?'pending_validation':(o.status||'pending');
    var l=STATUS_LABEL[s]||s;
    return'<span class="chip '+s+'">'+esc(l)+'</span>';
}

// ── LOAD ──
async function load(){
    var[{data:orders},{data:ents}]=await Promise.all([
        db.from('transport_orders_simple').select('*').order('created_at',{ascending:false}),
        db.from('entreprises').select('id,nom')
    ]);
    allOrders=orders||[];
    (ents||[]).forEach(function(e){entreprises[e.id]=e.nom;});
    render();
    // Ré-ouvrir le détail si un ordre était sélectionné
    if(currentId){
        var o=allOrders.find(function(x){return x.id===currentId;});
        if(o)showDetail(o);
    }
}

// ── RENDER LIST ──
function render(){
    var q=(document.getElementById('q').value||'').toLowerCase().trim();
    var list=allOrders.filter(function(o){
        if(currentFilter!=='tous'){
            if(currentFilter==='pending_validation'&&o.admin_status!=='pending_validation')return false;
            if(currentFilter==='pending'&&(o.status!=='pending'||o.admin_status==='pending_validation'))return false;
            if(currentFilter==='planned'&&o.status!=='planned')return false;
            if(currentFilter==='in_transit'&&o.status!=='in_transit')return false;
            if(currentFilter==='delivered'&&o.status!=='delivered')return false;
        }
        if(q){
            var hay=(o.order_number||'')+(o.delivery_address||'')+(o.pickup_address||'')+(o.destinataire_nom||'');
            if(hay.toLowerCase().indexOf(q)<0)return false;
        }
        return true;
    });

    var el=document.getElementById('ordersList');
    if(!list.length){
        el.innerHTML='<div class="empty-list"><i class="fas fa-box-open"></i><span>Aucun résultat</span></div>';
        return;
    }
    el.innerHTML=list.map(function(o){
        var entNom=o.entreprise_id?entreprises[o.entreprise_id]||'—':'—';
        var addr=(o.delivery_address||'').split(',')[0]||'—';
        var selected=o.id===currentId?' selected':'';
        return'<div class="order-item'+selected+'" data-id="'+o.id+'">'
            +'<div class="oi-top"><span class="oi-num">'+esc(o.order_number||o.id.slice(0,8))+'</span>'+chipHtml(o)+'<span class="oi-date">'+fmtShort(o.created_at)+'</span></div>'
            +'<div class="oi-addr"><i class="fas fa-map-marker-alt" style="color:var(--red);margin-right:4px;font-size:10px;"></i>'+esc(addr)+'</div>'
            +'<div class="oi-bottom"><span class="oi-client"><i class="fas fa-building" style="margin-right:3px;"></i>'+esc(entNom)+'</span>'+(o.destinataire_nom?'<span style="margin-left:auto;font-size:11px;color:var(--muted2);">'+esc(o.destinataire_nom)+'</span>':'')+'</div>'
        +'</div>';
    }).join('');

    // Click handlers
    el.querySelectorAll('.order-item').forEach(function(item){
        item.addEventListener('click',function(){
            var id=this.getAttribute('data-id');
            var o=allOrders.find(function(x){return x.id===id;});
            if(o)showDetail(o);
        });
    });
}

// ── DETAIL ──
async function showDetail(o){
    currentId=o.id;
    // Marquer selected dans la liste
    document.querySelectorAll('.order-item').forEach(function(el){
        el.classList.toggle('selected',el.getAttribute('data-id')===o.id);
    });

    // Charger la livraison + chauffeur en parallèle
    var[{data:del},{data:drv}]=await Promise.all([
        db.from('deliveries').select('*').eq('order_id',o.id).maybeSingle(),
        o.driver_id?db.from('utilisateurs').select('prenom,nom,telephone').eq('id',o.driver_id).maybeSingle():{data:null}
    ]);

    var entNom=o.entreprise_id?entreprises[o.entreprise_id]:'—';
    var drvName=drv?((drv.prenom||'')+' '+(drv.nom||'')).trim():'—';

    // Timeline steps
    var steps=[
        {key:'created',label:'Commande reçue',time:o.created_at,done:true},
        {key:'validated',label:'Acceptée par Colixo',time:o.validated_at,done:!!o.validated_at||(o.admin_status==='accepted'||['planned','in_transit','delivered'].includes(o.status))},
        {key:'planned',label:'Chauffeur assigné',time:o.assigned_at,done:o.status==='planned'||o.status==='in_transit'||o.status==='delivered'},
        {key:'in_transit',label:'Enlèvement effectué',time:o.picked_up_at,done:o.status==='in_transit'||o.status==='delivered'},
        {key:'delivered',label:'Livré',time:o.delivered_at,done:o.status==='delivered'}
    ];

    var activeIdx=steps.reduce(function(a,s,i){return s.done?i:a;},0);

    var tlHtml=steps.map(function(s,i){
        var cls=s.done?(i<activeIdx?'done':'active'):'pending';
        if(o.status==='delivered')cls=s.done?'done':'pending';
        var icon=s.done?'✓':(i===activeIdx?'●':'○');
        return'<div class="tl-step">'
            +'<div class="tl-dot '+cls+'">'+icon+'</div>'
            +'<div class="tl-label'+(cls==='pending'?' pending':'')+'">'+esc(s.label)+'</div>'
            +(s.time&&s.done?'<div class="tl-time">'+fmt(s.time)+'</div>':'')
        +'</div>';
    }).join('');

    // Adresse Google Maps
    var mapsUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(o.delivery_address||'');

    // Preuve de livraison
    var deliveryHtml='';
    if(del){
        deliveryHtml='<div class="sec-title"><i class="fas fa-check-circle" style="color:var(--green);margin-right:6px;"></i>Preuve de livraison</div>'
            +'<div class="delivery-box">'
            +(del.note_livraison?'<div style="font-size:13px;color:var(--muted2);margin-bottom:10px;"><i class="fas fa-comment" style="margin-right:6px;"></i>'+esc(del.note_livraison)+'</div>':'')
            +(del.has_signature?'<div style="font-size:12px;color:var(--muted);margin-bottom:4px;">Signature :</div><canvas class="sig-canvas" id="sigCanvas"></canvas>':'')
            +(del.photo_data?'<div style="font-size:12px;color:var(--muted);margin:8px 0 4px;">Photo :</div><img class="delivery-photo" src="'+del.photo_data+'" alt="Photo livraison">':'')
            +(del.gps_lat&&del.gps_lng?'<a class="maps-link" href="https://www.google.com/maps?q='+del.gps_lat+','+del.gps_lng+'" target="_blank"><i class="fas fa-map-marker-alt"></i>Position GPS de livraison</a>':'')
        +'</div>';
    }

    document.getElementById('panelDetail').innerHTML=
        '<div class="detail-header">'
            +'<div>'
                +'<div class="detail-num">'+esc(o.order_number||o.id.slice(0,8))+'</div>'
                +'<div class="detail-meta"><div>'+chipHtml(o)+'</div><div class="sub">Créé le '+fmt(o.created_at)+'</div></div>'
            +'</div>'
            +'<div style="margin-left:auto;display:flex;gap:8px;align-items:flex-start;">'
                +'<a href="'+mapsUrl+'" target="_blank" class="btn btn-ghost btn-sm"><i class="fas fa-map-marker-alt"></i> Maps</a>'
                +(o.status!=='delivered'?'<a href="transports-dispatch.html" class="btn btn-ghost btn-sm"><i class="fas fa-truck"></i> Dispatch</a>':'')
            +'</div>'
        +'</div>'

        +'<div class="info-grid">'
            +'<div class="info-card">'
                +'<div class="info-label"><i class="fas fa-arrow-up" style="color:var(--blue);"></i> Enlèvement</div>'
                +'<div class="info-val">'+esc(o.pickup_address||'—')+'</div>'
            +'</div>'
            +'<div class="info-card">'
                +'<div class="info-label"><i class="fas fa-map-marker-alt" style="color:var(--red);"></i> Livraison</div>'
                +'<div class="info-val">'+esc(o.delivery_address||'—')+'</div>'
                +(o.destinataire_nom?'<div class="info-val muted" style="font-size:12px;margin-top:4px;">'+esc(o.destinataire_nom)+(o.destinataire_tel?' · '+esc(o.destinataire_tel):'')+'</div>':'')
                +'<a class="maps-link" href="'+mapsUrl+'" target="_blank"><i class="fas fa-external-link-alt"></i>Ouvrir dans Maps</a>'
            +'</div>'
            +'<div class="info-card">'
                +'<div class="info-label"><i class="fas fa-building"></i> Client</div>'
                +'<div class="info-val">'+esc(entNom)+'</div>'
            +'</div>'
            +'<div class="info-card">'
                +'<div class="info-label"><i class="fas fa-user"></i> Chauffeur</div>'
                +'<div class="info-val">'+(drv?esc(drvName):'<span style="color:var(--muted)">Non assigné</span>')+'</div>'
                +(drv&&drv.telephone?'<div class="info-val muted" style="font-size:12px;margin-top:4px;"><i class="fas fa-phone" style="margin-right:4px;"></i>'+esc(drv.telephone)+'</div>':'')
            +'</div>'
            +'<div class="info-card">'
                +'<div class="info-label"><i class="fas fa-box"></i> Colis</div>'
                +'<div class="info-val">'+(o.quantity||1)+' colis — '+(o.weight||'—')+' kg</div>'
            +'</div>'
            +'<div class="info-card">'
                +'<div class="info-label"><i class="fas fa-tag"></i> Service</div>'
                +'<div class="info-val">'+esc(o.service_type||o.speed||'Standard')+(o.night_delivery?' 🌙':'')+(o.price_chf?'<span style="color:var(--green);margin-left:8px;font-size:13px;">'+parseFloat(o.price_chf).toFixed(2)+' CHF</span>':'')+'</div>'
            +'</div>'
            +(o.instructions?'<div class="info-card full"><div class="info-label"><i class="fas fa-comment"></i> Instructions</div><div class="info-val muted">'+esc(o.instructions)+'</div></div>':'')
            +(o.distance_km||o.duration_min?'<div class="info-card"><div class="info-label"><i class="fas fa-road"></i> Itinéraire OSRM</div><div class="info-val">'+(o.distance_km?o.distance_km+' km':'—')+(o.duration_min?' · '+Math.floor(o.duration_min/60)+'h'+String(o.duration_min%60).padStart(2,'0'):'')+'</div></div>':'')
        +'</div>'

        +'<div class="sec-title"><i class="fas fa-route" style="margin-right:6px;"></i>Progression</div>'
        +'<div class="timeline">'+tlHtml+'</div>'

        +deliveryHtml;

    // Dessiner la signature si présente
    if(del&&del.has_signature&&del.signature_data){
        setTimeout(function(){
            var canvas=document.getElementById('sigCanvas');
            if(!canvas)return;
            var img=new Image();
            img.onload=function(){
                var ctx=canvas.getContext('2d');
                canvas.width=canvas.offsetWidth;
                canvas.height=80;
                ctx.drawImage(img,0,0,canvas.width,canvas.height);
            };
            img.src=del.signature_data;
        },100);
    }
}

// ── FILTRES ──
document.querySelectorAll('.fchip').forEach(function(btn){
    btn.addEventListener('click',function(){
        document.querySelectorAll('.fchip').forEach(function(b){b.classList.remove('active');});
        this.classList.add('active');
        currentFilter=this.getAttribute('data-f');
        render();
    });
});
document.getElementById('q').addEventListener('input',function(){render();});
document.getElementById('btnRefresh').addEventListener('click',function(){load();});

// ── HIGHLIGHT depuis URL ?highlight=id ──
var hlId=new URLSearchParams(location.search).get('highlight');

// ── INIT ──
(async function(){
    try{
        var _a=await db.auth.getSession();
        var cu=JSON.parse(localStorage.getItem('colixo_user')||'null');
        if(!_a.data.session&&!cu){window.location.href='../login/index.html';return;}
        var uid=(_a.data.session&&_a.data.session.user&&_a.data.session.user.id)||(cu&&cu.id);
        if(uid){
            var u=await db.from('utilisateurs').select('prenom,nom,role').eq('id',uid).maybeSingle();
            var me=(u&&u.data)||cu||{};
            var n=((me.prenom||'')+(me.nom?' '+me.nom:'')).trim()||'Admin';
            document.getElementById('sideName').textContent=n;
            document.getElementById('sideRole').textContent=me.role||'—';
            document.getElementById('sideAvatar').textContent=(n[0]||'A').toUpperCase();
        }
        await load();
        // Ouvrir l'ordre si highlight dans URL
        if(hlId){
            var ho=allOrders.find(function(x){return x.id===hlId;});
            if(ho){
                showDetail(ho);
                // Scroller vers l'item
                var el=document.querySelector('[data-id="'+hlId+'"]');
                if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
            }
        }
        // Realtime
        db.channel('suivi_rt')
            .on('postgres_changes',{event:'*',schema:'public',table:'transport_orders_simple'},function(){
                setTimeout(function(){load();},500);
            }).subscribe();
    }catch(ex){
        console.error(ex);
    }
})();
})();
</script>
</body>
</html>
