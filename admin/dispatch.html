<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch | Léman Dispatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <style>
        :root {
            --red:     #e8311a;
            --red-dark:#c0280f;
            --night:   #0a0a0f;
            --night2:  #111118;
            --night3:  #18181f;
            --surface: #1e1e28;
            --border:  rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.13);
            --white:   #ffffff;
            --muted:   rgba(255,255,255,0.38);
            --muted2:  rgba(255,255,255,0.6);
            --green:   #22c55e;
            --blue:    #3b82f6;
            --yellow:  #f59e0b;
            --orange:  #f97316;
            --purple:  #a855f7;
            --sidebar: 360px;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; }
        body { font-family:'Outfit',sans-serif; background:var(--night); color:var(--white); display:flex; flex-direction:column; }

        /* ── TOPBAR ── */
        .topbar { background:var(--night2); border-bottom:1px solid var(--border); padding:0 16px; height:54px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .logo { display:flex; align-items:center; gap:8px; font-family:'Bebas Neue',cursive; font-size:18px; letter-spacing:1px; color:var(--white); text-decoration:none; }
        .logo-mark { width:28px; height:28px; background:var(--red); border-radius:7px; display:grid; place-items:center; font-size:13px; }
        .logo em { color:var(--red); font-style:normal; }
        .sep { width:1px; height:22px; background:var(--border2); }
        .tb-title { font-family:'Bebas Neue',cursive; font-size:15px; letter-spacing:2px; color:var(--muted2); }
        .tb-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
        .btn { font-family:'Outfit',sans-serif; font-weight:600; font-size:12px; padding:7px 14px; border-radius:8px; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all 0.2s; text-decoration:none; white-space:nowrap; }
        .btn-ghost  { background:transparent; color:var(--muted2); border:1px solid var(--border2); }
        .btn-ghost:hover { color:var(--white); border-color:rgba(255,255,255,0.3); }
        .btn-red    { background:var(--red); color:var(--white); }
        .btn-red:hover { background:var(--red-dark); }
        .btn-green  { background:var(--green); color:var(--night); font-weight:700; }
        .btn-green:hover { filter:brightness(1.1); }
        .btn-yellow { background:var(--yellow); color:var(--night); font-weight:700; }
        .btn-blue   { background:var(--blue); color:var(--white); }

        /* ── LAYOUT ── */
        .layout { flex:1; display:flex; overflow:hidden; }

        /* ── SIDEBAR ── */
        .sidebar { width:var(--sidebar); flex-shrink:0; background:var(--night2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }

        /* Tabs */
        .tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
        .tab { flex:1; padding:11px 6px; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); cursor:pointer; text-align:center; border-bottom:2px solid transparent; transition:all 0.2s; }
        .tab.active { color:var(--white); border-bottom-color:var(--red); }
        .tab-pane { display:none; flex:1; flex-direction:column; overflow:hidden; }
        .tab-pane.active { display:flex; }

        /* Stats mini */
        .stats-mini { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); flex-shrink:0; }
        .sm { background:var(--night2); padding:10px 6px; text-align:center; cursor:pointer; transition:background 0.2s; }
        .sm:hover,.sm.active { background:var(--night3); }
        .sm-num { font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:1px; }
        .sm-lbl { font-size:9px; color:var(--muted); margin-top:1px; text-transform:uppercase; letter-spacing:0.5px; }

        /* Filter */
        .filter-bar { padding:10px; display:flex; gap:6px; flex-shrink:0; border-bottom:1px solid var(--border); }
        .filter-bar input { flex:1; padding:7px 10px; background:var(--night3); border:1px solid var(--border2); border-radius:7px; font-family:'Outfit',sans-serif; font-size:12px; color:var(--white); }
        .filter-bar input::placeholder { color:var(--muted); }
        .filter-bar input:focus { outline:none; border-color:var(--red); }
        .filter-sel { padding:7px 8px; background:var(--night3); border:1px solid var(--border2); border-radius:7px; font-family:'Outfit',sans-serif; font-size:12px; color:var(--white); }
        .filter-sel option { background:var(--night3); }

        /* Order list */
        .order-list { flex:1; overflow-y:auto; padding:6px; }
        .order-list::-webkit-scrollbar { width:3px; }
        .order-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:100px; }

        /* Order card */
        .order-card {
            background:var(--night3); border:1.5px solid var(--border2);
            border-radius:11px; padding:11px 12px; margin-bottom:6px;
            cursor:grab; position:relative; overflow:hidden;
            transition:all 0.2s; user-select:none;
        }
        .order-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
        .order-card.pending::before   { background:var(--yellow); }
        .order-card.planned::before   { background:var(--blue); }
        .order-card.urgent::before    { background:var(--orange); }
        .order-card.in_transit::before{ background:var(--purple); }
        .order-card.delivered::before { background:var(--green); }
        .order-card:hover { border-color:rgba(255,255,255,0.25); transform:translateX(2px); }
        .order-card.selected { border-color:var(--red); background:rgba(232,49,26,0.06); }
        .order-card.in-tour  { border-color:var(--green); background:rgba(34,197,94,0.06); opacity:0.7; }
        .order-card.dragging { opacity:0.4; transform:scale(0.98); }

        .oc-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
        .oc-num { font-family:'Bebas Neue',cursive; font-size:12px; letter-spacing:1px; color:var(--muted2); }
        .oc-badge { font-size:9px; font-weight:700; text-transform:uppercase; padding:2px 7px; border-radius:100px; }
        .oc-badge.pending   { background:rgba(245,158,11,0.15); color:var(--yellow); }
        .oc-badge.planned   { background:rgba(59,130,246,0.15);  color:var(--blue); }
        .oc-badge.urgent    { background:rgba(249,115,22,0.15);  color:var(--orange); }
        .oc-badge.in_transit{ background:rgba(168,85,247,0.15);  color:var(--purple); }
        .oc-badge.delivered { background:rgba(34,197,94,0.15);   color:var(--green); }
        .oc-stop { display:flex; align-items:center; gap:7px; padding:2px 0; }
        .oc-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
        .oc-dot.p { background:var(--blue); }
        .oc-dot.d { background:var(--red); }
        .oc-addr { font-size:11px; color:var(--muted2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .oc-footer { display:flex; gap:6px; margin-top:8px; }
        .oc-btn { flex:1; padding:6px; border-radius:6px; border:none; font-family:'Outfit',sans-serif; font-size:10px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px; }
        .oc-btn.map     { background:rgba(59,130,246,0.12); color:var(--blue); }
        .oc-btn.add     { background:rgba(34,197,94,0.12);  color:var(--green); }
        .oc-btn.assign  { background:rgba(245,158,11,0.12); color:var(--yellow); }
        .oc-btn.deliver { background:rgba(34,197,94,0.2);   color:var(--green); font-weight:700; }

        /* ── TOURS TAB ── */
        .tour-toolbar { padding:10px; display:flex; gap:6px; flex-shrink:0; border-bottom:1px solid var(--border); }
        .tours-wrap { flex:1; overflow-y:auto; padding:6px; }
        .tours-wrap::-webkit-scrollbar { width:3px; }
        .tours-wrap::-webkit-scrollbar-thumb { background:var(--border2); border-radius:100px; }

        /* Tour card */
        .tour-card {
            background:var(--night3); border:1.5px solid var(--border2);
            border-radius:14px; margin-bottom:8px; overflow:hidden;
            transition:border-color 0.2s;
        }
        .tour-card.drag-over { border-color:var(--green); background:rgba(34,197,94,0.05); }
        .tour-head { padding:12px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; }
        .tour-color-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
        .tour-name { font-family:'Bebas Neue',cursive; font-size:15px; letter-spacing:1px; flex:1; }
        .tour-count { font-size:10px; font-weight:700; padding:2px 8px; border-radius:100px; background:var(--surface); color:var(--muted2); }
        .tour-toggle { color:var(--muted); font-size:12px; transition:transform 0.2s; }
        .tour-card.expanded .tour-toggle { transform:rotate(180deg); }
        .tour-body { padding:0 10px 10px; display:none; }
        .tour-card.expanded .tour-body { display:block; }
        .tour-drop-zone {
            min-height:50px; border:1.5px dashed var(--border2);
            border-radius:10px; padding:8px;
            display:flex; flex-direction:column; gap:4px;
            transition:all 0.2s; margin-bottom:8px;
        }
        .tour-drop-zone.drag-over { border-color:var(--green); background:rgba(34,197,94,0.05); }
        .tour-drop-hint { text-align:center; padding:12px; font-size:11px; color:var(--muted); display:flex; align-items:center; justify-content:center; gap:6px; }
        .tour-order-item {
            background:var(--surface); border-radius:8px; padding:8px 10px;
            display:flex; align-items:center; gap:8px; font-size:12px;
        }
        .toi-num { font-family:'Bebas Neue',cursive; font-size:13px; color:var(--muted2); flex:1; }
        .toi-addr { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; }
        .toi-remove { background:none; border:none; cursor:pointer; color:var(--muted); font-size:12px; padding:2px 4px; transition:color 0.2s; }
        .toi-remove:hover { color:var(--red); }
        .tour-actions { display:flex; gap:6px; }
        .tour-meta { display:flex; gap:10px; margin-bottom:8px; }
        .tour-meta-item { font-size:11px; color:var(--muted); }
        .tour-driver-select { width:100%; padding:8px 10px; background:var(--surface); border:1px solid var(--border2); border-radius:8px; font-family:'Outfit',sans-serif; font-size:12px; color:var(--white); margin-bottom:8px; }
        .tour-driver-select option { background:var(--night3); }

        /* ── MAP ── */
        .map-wrap { flex:1; position:relative; }
        #map { width:100%; height:100%; }

        /* Map controls */
        .map-ctrl { position:absolute; top:12px; right:12px; z-index:100; display:flex; flex-direction:column; gap:5px; }
        .mc-btn { width:34px; height:34px; background:rgba(17,17,24,0.92); backdrop-filter:blur(10px); border:1px solid var(--border2); border-radius:8px; display:grid; place-items:center; color:var(--muted2); font-size:13px; cursor:pointer; transition:all 0.2s; }
        .mc-btn:hover { color:var(--white); border-color:rgba(255,255,255,0.3); }

        /* Legend */
        .map-legend { position:absolute; bottom:14px; left:12px; z-index:100; background:rgba(17,17,24,0.92); backdrop-filter:blur(10px); border:1px solid var(--border2); border-radius:11px; padding:10px 14px; }
        .leg-title { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
        .leg-item { display:flex; align-items:center; gap:7px; font-size:10px; color:var(--muted2); margin-bottom:3px; }
        .leg-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

        /* Order detail */
        .detail-panel {
            position:absolute; bottom:14px; right:12px; z-index:100;
            width:260px; background:rgba(17,17,24,0.96); backdrop-filter:blur(16px);
            border:1px solid var(--border2); border-radius:14px; padding:14px;
            display:none; animation:slideUp 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
        .detail-panel.show { display:block; }
        .dp-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .dp-num  { font-family:'Bebas Neue',cursive; font-size:15px; letter-spacing:1px; color:var(--red); }
        .dp-close { background:none; border:none; cursor:pointer; color:var(--muted); font-size:13px; }
        .dp-stop { display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-bottom:1px dashed var(--border2); }
        .dp-stop:last-of-type { border:none; }
        .dp-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:3px; }
        .dp-dot.p { background:var(--blue); }
        .dp-dot.d { background:var(--red); }
        .dp-addr { font-size:12px; color:var(--muted2); line-height:1.4; }
        .dp-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin:10px 0; }
        .dp-stat { background:var(--surface); border-radius:7px; padding:7px; text-align:center; }
        .dp-stat-val { font-family:'Bebas Neue',cursive; font-size:15px; color:var(--white); }
        .dp-stat-lbl { font-size:9px; color:var(--muted); margin-top:1px; }
        .dp-btns { display:flex; gap:6px; }
        .dp-btns .btn { flex:1; justify-content:center; padding:8px; font-size:11px; }

        /* ── MODAL ── */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(10px); z-index:500; align-items:center; justify-content:center; padding:20px; }
        .modal.open { display:flex; }
        .modal-box { background:var(--night3); border:1px solid var(--border2); border-radius:22px; padding:36px; width:100%; max-width:440px; box-shadow:0 40px 100px rgba(0,0,0,0.6); animation:boxIn 0.3s cubic-bezier(0.4,0,0.2,1); }
        @keyframes boxIn { from{opacity:0;transform:scale(0.94) translateY(14px)} to{opacity:1;transform:none} }
        .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
        .modal-title { font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:1px; }
        .modal-close { width:30px; height:30px; background:var(--surface); border:none; border-radius:50%; cursor:pointer; display:grid; place-items:center; font-size:13px; color:var(--muted); }
        .modal-close:hover { background:var(--border2); color:var(--white); }
        .field { margin-bottom:12px; }
        .field label { display:block; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
        .field input, .field select { width:100%; padding:10px 12px; background:var(--surface); border:1.5px solid var(--border2); border-radius:9px; font-family:'Outfit',sans-serif; font-size:13px; color:var(--white); transition:border-color 0.2s; }
        .field input:focus, .field select:focus { outline:none; border-color:var(--red); }
        .field select option { background:var(--night3); }
        .modal-actions { display:flex; gap:8px; margin-top:18px; }
        .modal-actions .btn { flex:1; justify-content:center; padding:11px; }

        /* Color picker */
        .color-picker { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
        .color-opt { width:28px; height:28px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:all 0.2s; }
        .color-opt.selected { border-color:var(--white); transform:scale(1.15); }

        /* Toast */
        .toast { position:fixed; top:16px; right:16px; padding:12px 18px; border-radius:10px; display:flex; align-items:center; gap:8px; font-size:13px; font-weight:500; background:var(--night3); border:1px solid var(--border2); box-shadow:0 12px 40px rgba(0,0,0,0.4); z-index:9999; transform:translateX(calc(100% + 40px)); transition:transform 0.4s cubic-bezier(0.4,0,0.2,1); }
        .toast.show { transform:translateX(0); }
        .toast.success .t-ico { color:var(--green); }
        .toast.error   .t-ico { color:var(--red); }
        .toast.info    .t-ico { color:var(--blue); }
        .t-ico { font-size:14px; }

        /* Loader */
        .loader { display:none; position:fixed; inset:0; background:rgba(10,10,15,0.85); backdrop-filter:blur(4px); place-items:center; z-index:2000; }
        .loader.on { display:grid; }
        .spin { width:40px; height:40px; border:2.5px solid var(--border2); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg)} }

        .empty-state { padding:40px 16px; text-align:center; }
        .empty-ico { font-size:32px; opacity:0.15; margin-bottom:10px; }
        .empty-txt { font-size:12px; color:var(--muted); line-height:1.6; }

        /* Leaflet dark */
        .leaflet-tile { filter:brightness(0.85) saturate(0.6) invert(1) hue-rotate(180deg); }
        .leaflet-container { background:#0a0a0f; }
        .leaflet-control-zoom { display:none; }
    </style>
</head>
<body>

<div class="toast" id="toast"><span class="t-ico" id="toastIco"></span><span id="toastTxt"></span></div>
<div class="loader" id="loader"><div class="spin"></div></div>

<!-- ═══ TOPBAR ═══ -->
<header class="topbar">
    <a href="dashboard.html" class="logo">
        <div class="logo-mark">🚚</div>
        Léman<em>-Dispatch</em>
    </a>
    <div class="sep"></div>
    <div class="tb-title">CARTE DISPATCH</div>
    <div class="tb-right">
        <button class="btn btn-yellow" onclick="openNewTour()">
            <i class="fas fa-plus"></i> Nouvelle tournée
        </button>
        <a href="new-transport.html" class="btn btn-red">
            <i class="fas fa-plus"></i> Transport
        </a>
        <a href="dashboard.html" class="btn btn-ghost">
            <i class="fas fa-th-large"></i>
        </a>
    </div>
</header>

<!-- ═══ LAYOUT ═══ -->
<div class="layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">

        <!-- Stats mini -->
        <div class="stats-mini">
            <div class="sm active" id="smAll" onclick="setFilter('')">
                <div class="sm-num" id="smNumAll">0</div>
                <div class="sm-lbl">Tous</div>
            </div>
            <div class="sm" id="smPending" onclick="setFilter('pending')">
                <div class="sm-num" id="smNumPending" style="color:var(--yellow)">0</div>
                <div class="sm-lbl">Attente</div>
            </div>
            <div class="sm" id="smUrgent" onclick="setFilter('urgent')">
                <div class="sm-num" id="smNumUrgent" style="color:var(--orange)">0</div>
                <div class="sm-lbl">Urgents</div>
            </div>
            <div class="sm" id="smDone" onclick="setFilter('delivered')">
                <div class="sm-num" id="smNumDone" style="color:var(--green)">0</div>
                <div class="sm-lbl">Livrés</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" data-tab="orders">📦 Transports</div>
            <div class="tab" data-tab="tours">🗺️ Tournées</div>
            <div class="tab" data-tab="drivers">🚗 Chauffeurs</div>
        </div>

        <!-- ── TAB ORDERS ── -->
        <div class="tab-pane active" id="tab-orders">
            <div class="filter-bar">
                <input type="text" id="searchOrders" placeholder="🔍 Rechercher…" oninput="applyFilters()">
                <select class="filter-sel" id="filterStatus" onchange="applyFilters()">
                    <option value="">Tous</option>
                    <option value="pending">En attente</option>
                    <option value="planned">Planifié</option>
                    <option value="urgent">Urgent</option>
                    <option value="in_transit">En route</option>
                    <option value="delivered">Livré</option>
                </select>
            </div>
            <div class="order-list" id="orderList"></div>
        </div>

        <!-- ── TAB TOURS ── -->
        <div class="tab-pane" id="tab-tours">
            <div class="tour-toolbar">
                <button class="btn btn-yellow" style="flex:1;justify-content:center;" onclick="openNewTour()">
                    <i class="fas fa-plus"></i> Nouvelle tournée
                </button>
                <button class="btn btn-ghost" onclick="autoGenerateTours()" title="Générer automatiquement">
                    <i class="fas fa-magic"></i>
                </button>
                <button class="btn btn-ghost" onclick="clearAllTourLines()" title="Effacer routes">
                    <i class="fas fa-eraser"></i>
                </button>
            </div>
            <div class="tours-wrap" id="toursList">
                <div class="empty-state">
                    <div class="empty-ico">🗺️</div>
                    <div class="empty-txt">Aucune tournée.<br>Cliquez "+ Nouvelle tournée"<br>ou glissez des transports ici.</div>
                </div>
            </div>
        </div>

        <!-- ── TAB DRIVERS ── -->
        <div class="tab-pane" id="tab-drivers">
            <div class="order-list" id="driverList"></div>
        </div>

    </aside>

    <!-- ── MAP ── -->
    <div class="map-wrap">
        <div id="map"></div>

        <!-- Controls -->
        <div class="map-ctrl">
            <div class="mc-btn" onclick="map.zoomIn()"  title="Zoom +"><i class="fas fa-plus"></i></div>
            <div class="mc-btn" onclick="map.zoomOut()" title="Zoom -"><i class="fas fa-minus"></i></div>
            <div class="mc-btn" onclick="fitAll()"       title="Voir tout"><i class="fas fa-expand"></i></div>
            <div class="mc-btn" id="btnToggleRoutes" onclick="toggleRoutes()" title="Routes" style="margin-top:6px;"><i class="fas fa-route"></i></div>
        </div>

        <!-- Legend -->
        <div class="map-legend">
            <div class="leg-title">Légende</div>
            <div class="leg-item"><div class="leg-dot" style="background:var(--yellow)"></div> En attente</div>
            <div class="leg-item"><div class="leg-dot" style="background:var(--blue)"></div> Planifié</div>
            <div class="leg-item"><div class="leg-dot" style="background:var(--orange)"></div> Urgent</div>
            <div class="leg-item"><div class="leg-dot" style="background:var(--purple)"></div> En route</div>
            <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div> Livré</div>
        </div>

        <!-- Detail panel -->
        <div class="detail-panel" id="detailPanel">
            <div class="dp-head">
                <div class="dp-num" id="dpNum">—</div>
                <button class="dp-close" onclick="closeDetail()"><i class="fas fa-times"></i></button>
            </div>
            <div id="dpRoute"></div>
            <div class="dp-stats" id="dpStats"></div>
            <div class="dp-btns" id="dpBtns"></div>
        </div>
    </div>

</div>

<!-- ═══ MODAL NOUVELLE TOURNÉE ═══ -->
<div id="modalTour" class="modal">
    <div class="modal-box">
        <div class="modal-head">
            <div class="modal-title" id="modalTourTitle">NOUVELLE TOURNÉE</div>
            <button class="modal-close" onclick="closeModal('modalTour')">✕</button>
        </div>
        <div class="field">
            <label>Nom de la tournée *</label>
            <input type="text" id="tourName" placeholder="Ex: Tournée Lausanne matin" required>
        </div>
        <div class="field">
            <label>Couleur</label>
            <div class="color-picker" id="colorPicker">
                <div class="color-opt selected" data-color="#22c55e" style="background:#22c55e;"></div>
                <div class="color-opt" data-color="#3b82f6" style="background:#3b82f6;"></div>
                <div class="color-opt" data-color="#f59e0b" style="background:#f59e0b;"></div>
                <div class="color-opt" data-color="#f97316" style="background:#f97316;"></div>
                <div class="color-opt" data-color="#a855f7" style="background:#a855f7;"></div>
                <div class="color-opt" data-color="#ec4899" style="background:#ec4899;"></div>
                <div class="color-opt" data-color="#14b8a6" style="background:#14b8a6;"></div>
                <div class="color-opt" data-color="#e8311a" style="background:#e8311a;"></div>
            </div>
        </div>
        <div class="field">
            <label>Chauffeur (optionnel)</label>
            <select id="tourDriver">
                <option value="">— Assigner plus tard —</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-green" onclick="createTour()"><i class="fas fa-check"></i> Créer</button>
            <button class="btn btn-ghost" onclick="closeModal('modalTour')">Annuler</button>
        </div>
    </div>
</div>

<!-- ═══ MODAL ASSIGNER CHAUFFEUR ═══ -->
<div id="modalAssign" class="modal">
    <div class="modal-box">
        <div class="modal-head">
            <div class="modal-title">ASSIGNER CHAUFFEUR</div>
            <button class="modal-close" onclick="closeModal('modalAssign')">✕</button>
        </div>
        <div id="assignOrderInfo" style="font-size:13px;color:var(--muted);margin-bottom:16px;"></div>
        <div class="field">
            <label>Chauffeur</label>
            <select id="assignDriver">
                <option value="">— Choisir —</option>
            </select>
        </div>
        <input type="hidden" id="assignOrderId">
        <div class="modal-actions">
            <button class="btn btn-green" onclick="doAssign()"><i class="fas fa-user-check"></i> Assigner</button>
            <button class="btn btn-ghost" onclick="closeModal('modalAssign')">Annuler</button>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    if (!window.SUPABASE_CONFIG) {
        document.body.innerHTML = '<div style="padding:40px;color:red;">❌ config.js manquant</div>';
        return;
    }
    const db = window.SUPABASE_CLIENT;

    /* ── State ── */
    let allOrders  = [];
    let chauffeurs = [];
    let tours      = []; // local tour objects
    let markers    = {};
    let routeLines = [];
    let showRoutes = true;
    let filterSt   = '';
    let filterQ    = '';
    let selectedColor = '#22c55e';
    let dragOrderId   = null;

    /* ── Helpers ── */
    const toastEl = document.getElementById('toast');
    let toastTimer;
    function toast(type, msg) {
        clearTimeout(toastTimer);
        toastEl.className = 'toast ' + type + ' show';
        document.getElementById('toastIco').textContent = type==='success'?'✓':type==='error'?'✕':'ℹ';
        document.getElementById('toastTxt').textContent = msg;
        toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 4000);
    }
    const loaderEl = document.getElementById('loader');
    const showLoad = () => loaderEl.classList.add('on');
    const hideLoad = () => loaderEl.classList.remove('on');

    const STATUS_COLORS = { pending:'#f59e0b', planned:'#3b82f6', urgent:'#f97316', in_transit:'#a855f7', delivered:'#22c55e' };
    const TOUR_COLORS   = ['#22c55e','#3b82f6','#f59e0b','#f97316','#a855f7','#ec4899','#14b8a6','#e8311a'];

    function shortAddr(a) { if(!a) return '—'; return a.split(',').slice(0,2).join(',').trim(); }

    /* ── Modals ── */
    function openModal(id)  { const m=document.getElementById(id); if(m){m.style.display='flex';m.classList.add('open');} }
    window.closeModal = id  => { const m=document.getElementById(id); if(m){m.style.display='none';m.classList.remove('open');} };
    document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', e=>{ if(e.target===m) window.closeModal(m.id); }));
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') document.querySelectorAll('.modal.open').forEach(m=>window.closeModal(m.id)); });

    /* ── Tabs ── */
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(x=>x.classList.remove('active'));
            t.classList.add('active');
            document.getElementById('tab-'+t.dataset.tab)?.classList.add('active');
        });
    });

    /* ── Color picker ── */
    document.querySelectorAll('.color-opt').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.color-opt').forEach(o=>o.classList.remove('selected'));
            opt.classList.add('selected');
            selectedColor = opt.dataset.color;
        });
    });

    /* ── MAP INIT ── */
    const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([46.5197, 6.6323], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function makeIcon(color, shape='circle', pulse=false) {
        const size = 12;
        const html = shape === 'square'
            ? `<div style="width:10px;height:10px;background:${color};border:2px solid white;border-radius:2px;transform:rotate(45deg);box-shadow:0 2px 6px rgba(0,0,0,0.4)"></div>`
            : `<div style="width:${size}px;height:${size}px;background:${color};border:2px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.5);${pulse?'animation:mp 1.2s ease-in-out infinite':''}"></div>
               ${pulse?`<div style="position:absolute;inset:-4px;border-radius:50%;border:2px solid ${color};opacity:0.4;animation:mr 1.2s ease-in-out infinite"></div>`:''}
               <style>@keyframes mp{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}@keyframes mr{0%{transform:scale(0.8);opacity:0.6}100%{transform:scale(2);opacity:0}}</style>`;
        return L.divIcon({ html:`<div style="position:relative;">${html}</div>`, className:'', iconSize:[size,size], iconAnchor:[size/2,size/2] });
    }

    /* ── LOAD DATA ── */
    async function loadAll() {
        const [{ data:orders }, { data:chauf }] = await Promise.all([
            db.from('transport_orders_simple').select('*').order('created_at',{ascending:false}),
            db.from('utilisateurs').select('*').eq('role','chauffeur')
        ]);
        allOrders  = orders||[];
        chauffeurs = chauf ||[];
        updateStats();
        applyFilters();
        renderMap();
        renderDrivers();
        populateDriverSelects();
        renderTours();
    }

    /* ── Stats ── */
    function updateStats() {
        document.getElementById('smNumAll').textContent     = allOrders.length;
        document.getElementById('smNumPending').textContent = allOrders.filter(o=>o.status==='pending').length;
        document.getElementById('smNumUrgent').textContent  = allOrders.filter(o=>o.priority==='urgent').length;
        document.getElementById('smNumDone').textContent    = allOrders.filter(o=>o.status==='delivered').length;
    }

    /* ── Filters ── */
    window.setFilter = function(st) {
        filterSt = st;
        document.querySelectorAll('.sm').forEach(s=>s.classList.remove('active'));
        document.getElementById(st==='urgent'?'smUrgent':st==='pending'?'smPending':st==='delivered'?'smDone':'smAll')?.classList.add('active');
        document.getElementById('filterStatus').value = st;
        applyFilters();
    };
    window.applyFilters = function() {
        filterQ  = document.getElementById('searchOrders').value.toLowerCase();
        filterSt = document.getElementById('filterStatus').value;
        renderOrderList();
    };

    /* ── Order list ── */
    function renderOrderList() {
        let list = [...allOrders];
        // Par défaut, masquer les transports déjà dans une tournée et les livrés (sauf si filtre)
        const inTourIds2 = new Set(tours.flatMap(t=>t.orderIds));
        if(!filterSt) list = list.filter(o=>o.status!=='delivered');
        if(filterSt==='urgent') list = list.filter(o=>o.priority==='urgent');
        else if(filterSt) list = list.filter(o=>o.status===filterSt);
        if(filterQ) list = list.filter(o=>
            (o.order_number||'').toLowerCase().includes(filterQ)||
            (o.pickup_address||'').toLowerCase().includes(filterQ)||
            (o.delivery_address||'').toLowerCase().includes(filterQ)
        );

        const el = document.getElementById('orderList');
        if(!list.length) {
            el.innerHTML = `<div class="empty-state"><div class="empty-ico">📦</div><div class="empty-txt">Aucun transport</div></div>`;
            return;
        }

        const inTourIds = new Set(tours.flatMap(t=>t.orderIds));

        el.innerHTML = list.map(o => {
            const st   = o.priority==='urgent'?'urgent':(o.status||'pending');
            const stl  = {pending:'Attente',planned:'Planifié',urgent:'🔥 URGENT',in_transit:'En route',delivered:'Livré'}[st]||st;
            const inTour = inTourIds.has(o.id);
            return `<div class="order-card ${st} ${inTour?'in-tour':''}"
                data-id="${o.id}"
                draggable="true"
                ondragstart="dragStart(event,'${o.id}')"
                ondragend="dragEnd(event)"
                onclick="selectOrder('${o.id}')">
                <div class="oc-top">
                    <span class="oc-num">${o.order_number||o.id.slice(0,8)}</span>
                    <span class="oc-badge ${st}">${inTour?'✓ Tourné':stl}</span>
                </div>
                <div class="oc-stop"><div class="oc-dot p"></div><div class="oc-addr">${shortAddr(o.pickup_address)}</div></div>
                <div class="oc-stop"><div class="oc-dot d"></div><div class="oc-addr">${shortAddr(o.delivery_address)}</div></div>
                <div class="oc-footer">
                    <button class="oc-btn map"    onclick="event.stopPropagation();focusOrder('${o.id}')"><i class="fas fa-map-marker-alt"></i> Carte</button>
                    <button class="oc-btn add"     onclick="event.stopPropagation();addToTourModal('${o.id}')"><i class="fas fa-plus"></i> Tournée</button>
                    <button class="oc-btn assign"  onclick="event.stopPropagation();openAssign('${o.id}')"><i class="fas fa-user"></i> Assigner</button>
                    ${st!=='delivered'?`<button class="oc-btn deliver" onclick="event.stopPropagation();markDelivered('${o.id}')"><i class="fas fa-check"></i></button>`:''}
                </div>
            </div>`;
        }).join('');
    }

    /* ── MAP ── */
    function renderMap() {
        Object.values(markers).forEach(m=>{ if(m.p) map.removeLayer(m.p); if(m.d) map.removeLayer(m.d); if(m.l) map.removeLayer(m.l); });
        markers = {};
        const bounds = [];

        allOrders.forEach(o => {
            const color = STATUS_COLORS[o.priority==='urgent'?'urgent':(o.status||'pending')]||STATUS_COLORS.pending;
            const isUrgent = o.priority==='urgent';
            const isPending = o.status==='pending'||o.priority==='urgent';
            const mg = {};

            if(o.pickup_lat && o.pickup_lng) {
                mg.p = L.marker([o.pickup_lat,o.pickup_lng],{icon:makeIcon(color,'circle',isPending)})
                    .addTo(map).on('click',()=>selectOrder(o.id))
                    .bindTooltip(`<b>${o.order_number||'—'}</b><br>📍 ${shortAddr(o.pickup_address)}`,{direction:'top'});
                bounds.push([o.pickup_lat,o.pickup_lng]);
            }
            if(o.delivery_lat && o.delivery_lng) {
                mg.d = L.marker([o.delivery_lat,o.delivery_lng],{icon:makeIcon(color,'square')})
                    .addTo(map).on('click',()=>selectOrder(o.id))
                    .bindTooltip(`<b>${o.order_number||'—'}</b><br>🏁 ${shortAddr(o.delivery_address)}`,{direction:'top'});
                bounds.push([o.delivery_lat,o.delivery_lng]);
            }
            if(o.pickup_lat && o.delivery_lat) {
                mg.l = L.polyline([[o.pickup_lat,o.pickup_lng],[o.delivery_lat,o.delivery_lng]],{color,weight:1.5,opacity:0.3,dashArray:'4 6'}).addTo(map);
                routeLines.push(mg.l);
            }
            markers[o.id] = mg;
        });

        if(bounds.length) { try { map.fitBounds(bounds,{padding:[40,40]}); } catch(e){} }
    }

    function fitAll() {
        const bounds = allOrders.reduce((b,o)=>{
            if(o.pickup_lat)   b.push([o.pickup_lat,o.pickup_lng]);
            if(o.delivery_lat) b.push([o.delivery_lat,o.delivery_lng]);
            return b;
        },[]);
        if(bounds.length) map.fitBounds(bounds,{padding:[40,40]});
    }

    window.toggleRoutes = function() {
        showRoutes = !showRoutes;
        document.getElementById('btnToggleRoutes').classList.toggle('active',showRoutes);
        routeLines.forEach(l => showRoutes ? map.addLayer(l) : map.removeLayer(l));
    };

    /* ── SELECT ORDER ── */
    window.selectOrder = function(id) {
        document.querySelectorAll('.order-card').forEach(c=>c.classList.remove('selected'));
        const card = document.querySelector(`.order-card[data-id="${id}"]`);
        if(card) { card.classList.add('selected'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }
        const o = allOrders.find(x=>x.id===id);
        if(!o) return;
        showDetail(o);
    };

    window.focusOrder = function(id) {
        const o = allOrders.find(x=>x.id===id);
        if(!o||!o.pickup_lat) { toast('info','Pas de coordonnées GPS pour ce transport'); return; }
        map.flyTo([o.pickup_lat,o.pickup_lng],14,{duration:1});
        selectOrder(id);
    };

    /* ── DETAIL PANEL ── */
    function showDetail(o) {
        const st = o.priority==='urgent'?'urgent':(o.status||'pending');
        const stl = {pending:'En attente',planned:'Planifié',urgent:'URGENT',in_transit:'En route',delivered:'Livré'}[st]||st;
        document.getElementById('dpNum').textContent = o.order_number||o.id.slice(0,8);
        document.getElementById('dpRoute').innerHTML = `
            <div class="dp-stop"><div class="dp-dot p"></div><div class="dp-addr">${shortAddr(o.pickup_address)}</div></div>
            <div class="dp-stop"><div class="dp-dot d"></div><div class="dp-addr">${shortAddr(o.delivery_address)}</div></div>`;
        document.getElementById('dpStats').innerHTML = `
            <div class="dp-stat"><div class="dp-stat-val">${o.distance_km||'—'}</div><div class="dp-stat-lbl">km</div></div>
            <div class="dp-stat"><div class="dp-stat-val">${o.price_chf||'—'}</div><div class="dp-stat-lbl">CHF</div></div>
            <div class="dp-stat"><div class="dp-stat-val" style="font-size:10px;font-family:'Outfit',sans-serif;">${stl}</div><div class="dp-stat-lbl">Statut</div></div>`;
        document.getElementById('dpBtns').innerHTML = `
            ${o.pickup_lat?`<button class="btn btn-blue" onclick="focusOrder('${o.id}')"><i class="fas fa-crosshairs"></i></button>`:''}
            <button class="btn btn-ghost" onclick="openAssign('${o.id}')"><i class="fas fa-user-plus"></i> Assigner</button>
            ${st!=='delivered'?`<button class="btn btn-green" onclick="markDelivered('${o.id}')"><i class="fas fa-check"></i> Livré</button>`:''}`;
        document.getElementById('detailPanel').classList.add('show');
    }
    window.closeDetail = () => document.getElementById('detailPanel').classList.remove('show');

    /* ── MARK DELIVERED ── */
    window.markDelivered = async function(id) {
        showLoad();
        try {
            const { error } = await db.from('transport_orders_simple')
                .update({status:'delivered',delivered_at:new Date().toISOString()}).eq('id',id);
            if(error) throw error;
            toast('success','Marqué comme livré ✓');
            await loadAll();
            window.closeDetail();
        } catch(e) { toast('error',e.message); }
        finally { hideLoad(); }
    };

    /* ── ASSIGN DRIVER ── */
    window.openAssign = function(id) {
        const o = allOrders.find(x=>x.id===id);
        if(!o) return;
        document.getElementById('assignOrderId').value = id;
        document.getElementById('assignOrderInfo').textContent = `${o.order_number||id.slice(0,8)} · ${shortAddr(o.pickup_address)} → ${shortAddr(o.delivery_address)}`;
        openModal('modalAssign');
    };

    window.doAssign = async function() {
        const id       = document.getElementById('assignOrderId').value;
        const driverId = document.getElementById('assignDriver').value;
        if(!driverId) { toast('error','Choisissez un chauffeur'); return; }
        showLoad();
        try {
            const { error } = await db.from('transport_orders_simple')
                .update({ driver_id:driverId, status:'planned', assigned_at:new Date().toISOString() })
                .eq('id',id);
            if(error) throw error;
            toast('success','Chauffeur assigné ✓');
            window.closeModal('modalAssign');
            await loadAll();
        } catch(e) { toast('error',e.message); }
        finally { hideLoad(); }
    };

    /* ── TOURS ── */
    window.openNewTour = function() {
        document.getElementById('tourName').value = '';
        selectedColor = '#22c55e';
        document.querySelectorAll('.color-opt').forEach(o=>o.classList.remove('selected'));
        document.querySelector('.color-opt[data-color="#22c55e"]')?.classList.add('selected');
        openModal('modalTour');
    };

    window.createTour = function() {
        const name = document.getElementById('tourName').value.trim();
        if(!name) { toast('error','Donnez un nom à la tournée'); return; }
        const driverId = document.getElementById('tourDriver').value||null;
        const tour = {
            id: 'tour-' + Date.now(),
            name, color:selectedColor,
            driverId, orderIds:[], expanded:true
        };
        tours.push(tour);
        window.closeModal('modalTour');
        renderTours();
        switchTab('tours');
        toast('success',`Tournée "${name}" créée — glissez des transports dedans !`);
    };

    /* ── DRAG & DROP ── */
    window.dragStart = function(e, id) {
        dragOrderId = id;
        e.dataTransfer.effectAllowed = 'copy';
        setTimeout(()=>{ const el=document.querySelector(`.order-card[data-id="${id}"]`); if(el) el.classList.add('dragging'); },0);
    };
    window.dragEnd = function(e) {
        document.querySelectorAll('.order-card.dragging').forEach(el=>el.classList.remove('dragging'));
        document.querySelectorAll('.tour-drop-zone.drag-over,.tour-card.drag-over').forEach(el=>el.classList.remove('drag-over'));
        dragOrderId = null;
    };

    function setupDropZone(zone, tourId) {
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
        zone.addEventListener('drop', e => {
            e.preventDefault(); zone.classList.remove('drag-over');
            if(!dragOrderId) return;
            addOrderToTour(tourId, dragOrderId);
        });
    }

    window.addOrderToTour = function addOrderToTour(tourId, orderId) {
        const tour = tours.find(t=>t.id===tourId);
        if(!tour) return;
        if(tour.orderIds.includes(orderId)) { toast('info','Transport déjà dans cette tournée'); return; }
        tour.orderIds.push(orderId);
        renderTours();
        renderOrderList();
        drawTourOnMap(tour);
        toast('success','Transport ajouté à la tournée ✓');
    }

    window.addToTourModal = function(orderId) {
        if(!tours.length) { toast('info','Créez d\'abord une tournée'); return; }
        if(tours.length===1) { addOrderToTour(tours[0].id, orderId); return; }
        // If multiple tours, show selection
        const sel = tours.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
        const div = document.createElement('div');
        div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:600;backdrop-filter:blur(8px)';
        div.innerHTML=`<div style="background:var(--night3);border:1px solid var(--border2);border-radius:20px;padding:32px;min-width:300px;box-shadow:0 40px 100px rgba(0,0,0,0.6);">
            <div style="font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1px;margin-bottom:16px;">CHOISIR TOURNÉE</div>
            <select id="tourSelectModal" style="width:100%;padding:10px 12px;background:var(--surface);border:1.5px solid var(--border2);border-radius:9px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--white);margin-bottom:16px;">${sel}</select>
            <div style="display:flex;gap:8px;">
                <button onclick="const tid=document.getElementById('tourSelectModal').value;if(tid){window.addOrderToTour(tid,'${orderId}');this.closest('[style*=fixed]').remove();}else{alert('Choisissez une tournée');}" style="flex:1;padding:11px;background:var(--green);color:var(--night);border:none;border-radius:9px;font-family:'Outfit',sans-serif;font-weight:700;cursor:pointer;"><i class='fas fa-check'></i> Confirmer</button>
                <button onclick="this.closest('[style*=fixed]').remove();" style="flex:1;padding:11px;background:var(--surface);color:var(--muted2);border:1px solid var(--border2);border-radius:9px;font-family:'Outfit',sans-serif;cursor:pointer;">Annuler</button>
            </div></div>`;
        div.addEventListener('click', e=>{ if(e.target===div) div.remove(); });
        document.body.appendChild(div);
    };

    /* ── RENDER TOURS ── */
    function renderTours() {
        const el = document.getElementById('toursList');
        if(!tours.length) {
            el.innerHTML=`<div class="empty-state"><div class="empty-ico">🗺️</div><div class="empty-txt">Aucune tournée.<br>Cliquez "+ Nouvelle tournée"<br>ou glissez des transports ici.</div></div>`;
            return;
        }
        el.innerHTML = tours.map(tour => {
            const orders = tour.orderIds.map(id=>allOrders.find(o=>o.id===id)).filter(Boolean);
            const driver = chauffeurs.find(c=>c.id===tour.driverId);
            const driverName = driver ? `${driver.prenom||''} ${driver.nom||''}`.trim() : '— Non assigné';
            return `<div class="tour-card ${tour.expanded?'expanded':''}" id="tc-${tour.id}">
                <div class="tour-head" onclick="toggleTour('${tour.id}')">
                    <div class="tour-color-dot" style="background:${tour.color}"></div>
                    <div class="tour-name" style="color:${tour.color}">${tour.name}</div>
                    <div class="tour-count">${orders.length} stop${orders.length!==1?'s':''}</div>
                    <i class="fas fa-chevron-down tour-toggle"></i>
                </div>
                <div class="tour-body">
                    <!-- Driver select -->
                    <select class="tour-driver-select" onchange="setTourDriver('${tour.id}', this.value)">
                        <option value="">🚗 Assigner un chauffeur…</option>
                        ${chauffeurs.map(c=>`<option value="${c.id}" ${c.id===tour.driverId?'selected':''}>${c.prenom||''} ${c.nom||''}</option>`).join('')}
                    </select>
                    <!-- Drop zone -->
                    <div class="tour-drop-zone" id="dz-${tour.id}">
                        ${orders.length===0
                            ? `<div class="tour-drop-hint"><i class="fas fa-hand-point-up"></i> Glissez des transports ici</div>`
                            : orders.map((o,i) => `
                                <div class="tour-order-item">
                                    <span style="color:${tour.color};font-family:'Bebas Neue',cursive;font-size:13px;width:18px;text-align:center;">${i+1}</span>
                                    <span class="toi-num">${o.order_number||o.id.slice(0,8)}</span>
                                    <span class="toi-addr">${shortAddr(o.delivery_address)}</span>
                                    <button class="toi-remove" onclick="removeFromTour('${tour.id}','${o.id}')"><i class="fas fa-times"></i></button>
                                </div>`).join('')
                        }
                    </div>
                    <!-- Tour meta -->
                    <div class="tour-meta">
                        <span class="tour-meta-item"><i class="fas fa-user" style="color:${tour.color}"></i> ${driverName}</span>
                        <span class="tour-meta-item"><i class="fas fa-box"></i> ${orders.length} transport${orders.length!==1?'s':''}</span>
                    </div>
                    <!-- Actions -->
                    <div class="tour-actions">
                        <button class="btn btn-green btn-sm" onclick="saveTour('${tour.id}')" style="flex:1;justify-content:center;">
                            <i class="fas fa-save"></i> Sauvegarder
                        </button>
                        <button class="btn btn-blue btn-sm" onclick="drawTourOnMap(tours.find(t=>t.id==='${tour.id}'))">
                            <i class="fas fa-map"></i>
                        </button>
                        <button class="btn btn-ghost btn-sm" onclick="deleteTour('${tour.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');

        // Setup drop zones
        tours.forEach(tour => {
            const dz = document.getElementById('dz-'+tour.id);
            if(dz) setupDropZone(dz, tour.id);
        });
    }

    window.toggleTour = function(id) {
        const tour = tours.find(t=>t.id===id);
        if(tour) { tour.expanded = !tour.expanded; renderTours(); }
    };

    window.removeFromTour = function(tourId, orderId) {
        const tour = tours.find(t=>t.id===tourId);
        if(!tour) return;
        tour.orderIds = tour.orderIds.filter(id=>id!==orderId);
        renderTours();
        renderOrderList();
        clearTourLines(tourId);
        if(tour.orderIds.length > 0) drawTourOnMap(tour);
        toast('info','Transport retiré de la tournée');
    };

    window.setTourDriver = function(tourId, driverId) {
        const tour = tours.find(t=>t.id===tourId);
        if(tour) { tour.driverId = driverId||null; renderTours(); }
    };

    window.deleteTour = function(id) {
        tours = tours.filter(t=>t.id!==id);
        clearTourLines(id);
        renderTours();
        renderOrderList();
        toast('info','Tournée supprimée');
    };

    /* ── SAVE TOUR ── */
    window.saveTour = async function(tourId) {
        const tour = tours.find(t=>t.id===tourId);
        if(!tour) return;
        if(!tour.orderIds.length) { toast('error','Ajoutez des transports à la tournée'); return; }

        showLoad();
        try {
            // 1. Créer la tournée dans tours table
            const tourPayload = {
                name: tour.name,
                status: 'active',
                total_distance_km: null,
                total_duration_min: null,
                optimized: false
            };
            // Ajouter driver_id seulement si la colonne existe
            if(tour.driverId) tourPayload.driver_id = tour.driverId;

            const { data: tourRec, error: tourErr } = await db.from('tours').insert([tourPayload]).select().single();

            if(tourErr) {
                // Si erreur colonne driver_id, réessayer sans
                delete tourPayload.driver_id;
                const { data: tourRec2, error: tourErr2 } = await db.from('tours').insert([tourPayload]).select().single();
                if(tourErr2) throw tourErr2;
            }

            // 2. Mettre à jour tous les transports — driver_id + status + tour_id
            for(const orderId of tour.orderIds) {
                await db.from('transport_orders_simple').update({
                    status: 'planned',
                    driver_id: tour.driverId||null,
                    assigned_at: new Date().toISOString()
                }).eq('id', orderId);
            }

            toast('success', `Tournée "${tour.name}" sauvegardée — ${tour.orderIds.length} transports assignés ✓`);

            // Update tour id to real DB id
            tour.dbId = tourRec.id;

            await loadAll();
            renderTours();

        } catch(e) {
            toast('error', e.message);
        } finally {
            hideLoad();
        }
    };

    /* ── AUTO GENERATE TOURS ── */
    window.autoGenerateTours = function() {
        const pending = allOrders.filter(o=>o.status==='pending'&&o.pickup_lat&&o.delivery_lat);
        if(!pending.length) { toast('info','Aucun transport avec coordonnées GPS à optimiser'); return; }

        // Simple clustering by pickup city
        const groups = {};
        pending.forEach(o => {
            const city = (o.pickup_address||'').split(',').slice(-3,-1).join(',').trim()||'Autres';
            if(!groups[city]) groups[city]=[];
            groups[city].push(o.id);
        });

        let created = 0;
        Object.entries(groups).forEach(([city, ids], i) => {
            const color = TOUR_COLORS[i % TOUR_COLORS.length];
            tours.push({ id:'tour-auto-'+Date.now()+i, name:`Tournée ${city.slice(0,20)}`, color, driverId:null, orderIds:ids, expanded:true });
            created++;
        });

        renderTours();
        renderOrderList();
        switchTab('tours');
        toast('success', `${created} tournée${created>1?'s':''} générée${created>1?'s':''} automatiquement !`);
    };

    /* ── MAP TOUR LINES ── */
    const tourLines = {};
    function clearTourLines(tourId) {
        if(tourLines[tourId]) { tourLines[tourId].forEach(l=>map.removeLayer(l)); tourLines[tourId]=[]; }
    }
    window.clearAllTourLines = function() {
        Object.keys(tourLines).forEach(clearTourLines);
        toast('info','Routes effacées');
    };
    function drawTourOnMap(tour) {
        if(!tour) return;
        clearTourLines(tour.id);
        const lines = [];
        const pts   = [];
        const orders = tour.orderIds.map(id=>allOrders.find(o=>o.id===id)).filter(Boolean);
        orders.forEach(o => {
            if(o.pickup_lat)   pts.push([o.pickup_lat,   o.pickup_lng]);
            if(o.delivery_lat) pts.push([o.delivery_lat, o.delivery_lng]);
        });
        if(pts.length > 1) {
            const line = L.polyline(pts, {color:tour.color, weight:3, opacity:0.85, dashArray:'8 4'}).addTo(map);
            lines.push(line);
            map.fitBounds(pts, {padding:[60,60]});
        }
        tourLines[tour.id] = lines;
    }

    /* ── DRIVERS TAB ── */
    function renderDrivers() {
        const el = document.getElementById('driverList');
        if(!chauffeurs.length) {
            el.innerHTML=`<div class="empty-state"><div class="empty-ico">🚗</div><div class="empty-txt">Aucun chauffeur actif</div></div>`;
            return;
        }
        el.innerHTML = chauffeurs.map(c => {
            const assigned = allOrders.filter(o=>o.driver_id===c.id&&o.status!=='delivered').length;
            return `<div style="background:var(--night3);border:1px solid var(--border2);border-radius:11px;padding:11px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;">
                <div style="width:34px;height:34px;border-radius:9px;background:rgba(34,197,94,0.15);color:var(--green);display:grid;place-items:center;font-family:'Bebas Neue',cursive;font-size:14px;flex-shrink:0;">${(c.prenom?.[0]||'C').toUpperCase()}</div>
                <div style="flex:1;">
                    <div style="font-weight:600;font-size:13px;">${c.prenom||''} ${c.nom||''}</div>
                    <div style="font-size:11px;color:var(--muted)">${assigned} mission${assigned!==1?'s':''} en cours</div>
                </div>
                <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;${assigned>0?'background:rgba(59,130,246,0.15);color:var(--blue);border:1px solid rgba(59,130,246,0.3)':'background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2)'}">
                    ${assigned>0?'En mission':'Disponible'}
                </span>
            </div>`;
        }).join('');
    }

    /* ── POPULATE SELECTS ── */
    function populateDriverSelects() {
        const opts = '<option value="">— Choisir —</option>' + chauffeurs.map(c=>`<option value="${c.id}">${c.prenom||''} ${c.nom||''}</option>`).join('');
        document.getElementById('assignDriver').innerHTML  = opts;
        document.getElementById('tourDriver').innerHTML    = '<option value="">— Assigner plus tard —</option>' + chauffeurs.map(c=>`<option value="${c.id}">${c.prenom||''} ${c.nom||''}</option>`).join('');
    }

    /* ── SWITCH TAB ── */
    function switchTab(name) {
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${name}"]`)?.classList.add('active');
        document.getElementById('tab-'+name)?.classList.add('active');
    }

    /* ── REALTIME ── */
    db.channel('dispatch_orders')
        .on('postgres_changes',{event:'*',schema:'public',table:'transport_orders_simple'},()=>loadAll())
        .subscribe();

    /* ── INIT ── */
    loadAll();

})();
</script>
</body>
</html>
