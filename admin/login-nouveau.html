<!DOCTYPE html>
<html>
<head>
    <title>Connexion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: system-ui; max-width: 300px; margin: 100px auto;">
    <h2>🔑 Connexion</h2>
    
    <div id="status" style="padding: 10px; background: #f0f0f0; margin: 10px 0;"></div>
    
    <input id="email" value="vdiclub@gmail.com" style="width:100%; padding:8px; margin:5px 0;">
    <input id="password" type="password" value="demo123" style="width:100%; padding:8px; margin:5px 0;">
    
    <button onclick="connecter()" style="width:100%; padding:10px; background:#e53935; color:white; border:none;">
        Se connecter
    </button>

    <script>
        // === METTEZ VOS NOUVELLES CLÉS ICI ===
        const SUPABASE_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';  // ← À CHANGER
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';                 // ← À CHANGER
        
        console.log("URL:", SUPABASE_URL);
        console.log("Clé (début):", SUPABASE_KEY.substring(0,20) + "...");
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.connecter = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status');
            
            status.innerHTML = '⏳ Connexion...';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                status.innerHTML = '✅ Connecté !';
                setTimeout(() => { window.location.href = '/admin/'; }, 1000);
                
            } catch(error) {
                status.innerHTML = '❌ ' + error.message;
            }
        };
    </script>
</body>
</html>
