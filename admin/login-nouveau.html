<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TEST ULTIME</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: system-ui; max-width: 400px; margin: 50px auto; padding: 20px;">
    <h1 style="color: #e53935;">🧪 TEST ULTIME</h1>
    
    <div id="resultat" style="background: #f1f5f9; padding: 15px; border-radius: 8px; margin: 20px 0;">
        Cliquez sur le bouton
    </div>
    
    <div style="background: white; border: 2px solid #e2e8f0; border-radius: 10px; padding: 20px;">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Email</label>
            <input type="email" id="emailTest" value="vdiclub@gmail.com" style="width: 100%; padding: 10px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Mot de passe</label>
            <input type="password" id="passwordTest" value="demo123" style="width: 100%; padding: 10px;">
        </div>
        
        <button id="testButton" style="background: #e53935; color: white; border: none; padding: 12px 20px; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer; margin-bottom: 10px;">
            🧪 TESTER LA CONNEXION
        </button>
        
        <button id="resetButton" style="background: #f59e0b; color: white; border: none; padding: 12px 20px; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer;">
            🔑 RÉINITIALISER MOT DE PASSE
        </button>
    </div>

    <script>
        // ===== SCRIPT SANS AUCUN CONFLIT =====
        console.log("🔥 NOUVEAU SCRIPT - " + new Date().toISOString());
        
        const SUPABASE_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        // Client avec nom unique
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log("✅ Client créé avec un nom unique");
        
        // ===== TEST DE CONNEXION =====
        document.getElementById('testButton').addEventListener('click', async function() {
            console.log("🟢 BOUTON CONNEXION CLIQUE");
            
            const email = document.getElementById('emailTest').value;
            const password = document.getElementById('passwordTest').value;
            const resultat = document.getElementById('resultat');
            
            resultat.innerHTML = '⏳ Connexion en cours...';
            resultat.style.background = '#fef3c7';
            
            try {
                console.log("🔐 Tentative avec:", email);
                
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    console.error("❌ Erreur:", error);
                    resultat.innerHTML = '❌ ' + error.message;
                    resultat.style.background = '#fee2e2';
                } else {
                    console.log("✅ Succès:", data);
                    resultat.innerHTML = '✅ Connecté: ' + data.user.email;
                    resultat.style.background = '#d1fae5';
                }
                
            } catch(e) {
                console.error("💥 Exception:", e);
                resultat.innerHTML = '💥 ' + e.message;
                resultat.style.background = '#fee2e2';
            }
        });
        
        // ===== RÉINITIALISATION MOT DE PASSE =====
        document.getElementById('resetButton').addEventListener('click', async function() {
            console.log("🟢 BOUTON RÉINITIALISATION CLIQUE");
            
            const email = document.getElementById('emailTest').value;
            const resultat = document.getElementById('resultat');
            
            resultat.innerHTML = '⏳ Envoi de l\'email...';
            resultat.style.background = '#fef3c7';
            
            try {
                console.log("🔐 Demande de réinitialisation pour:", email);
                
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/admin/reset-password.html'
                });
                
                if (error) {
                    console.error("❌ Erreur:", error);
                    resultat.innerHTML = '❌ ' + error.message;
                    resultat.style.background = '#fee2e2';
                } else {
                    console.log("✅ Email envoyé");
                    resultat.innerHTML = '✅ Email envoyé à ' + email + '! Vérifiez votre boîte (spams inclus)';
                    resultat.style.background = '#d1fae5';
                }
                
            } catch(e) {
                console.error("💥 Exception:", e);
                resultat.innerHTML = '💥 ' + e.message;
                resultat.style.background = '#fee2e2';
            }
        });
        
        console.log("✅ Écouteurs attachés");
    </script>
</body>
</html>
