<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TEST CONNEXION</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: system-ui; max-width: 400px; margin: 50px auto; padding: 20px;">
    <h1 style="color: #e53935;">🔧 TEST CONNEXION</h1>
    
    <div id="resultat" style="background: #f1f5f9; padding: 15px; border-radius: 8px; margin: 20px 0;">
        Prêt à tester...
    </div>
    
    <div style="background: white; border: 2px solid #e2e8f0; border-radius: 10px; padding: 20px;">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Email</label>
            <input type="email" id="email" value="admin@leman-courses.ch" style="width: 100%; padding: 10px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Mot de passe</label>
            <input type="password" id="password" value="demo123" style="width: 100%; padding: 10px;">
        </div>
        
        <button onclick="testerConnexion()" style="background: #e53935; color: white; border: none; padding: 12px 20px; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer;">
            🚀 TESTER LA CONNEXION
        </button>
    </div>

    <script>
        console.log("🔥 SCRIPT DE TEST CHARGÉ");
        
        const SUPABASE_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        window.testerConnexion = async function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultat = document.getElementById('resultat');
            
            resultat.innerHTML = '⏳ Connexion en cours...';
            resultat.style.background = '#fef3c7';
            
            console.log("🔐 Tentative avec:", email);
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    console.error("❌ ERREUR:", error);
                    resultat.innerHTML = '❌ ERREUR: ' + error.message;
                    resultat.style.background = '#fee2e2';
                } else {
                    console.log("✅ SUCCÈS:", data);
                    resultat.innerHTML = '✅ SUCCÈS! Connecté en tant que: ' + data.user.email;
                    resultat.style.background = '#d1fae5';
                }
                
            } catch(e) {
                console.error("💥 FATAL:", e);
                resultat.innerHTML = '💥 ERREUR: ' + e.message;
                resultat.style.background = '#fee2e2';
            }
        };
    </script>
</body>
</html>
