<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Léman-Courses</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Gardez votre style existant */
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo i {
            font-size: 60px;
            color: #e53935;
            background: #fee2e2;
            padding: 15px;
            border-radius: 50%;
        }
        h2 { text-align: center; margin-bottom: 10px; color: #0f172a; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover { background: #c62828; }
        .btn:disabled { background: #f5b5b5; cursor: not-allowed; }
        .links { text-align: center; margin-top: 25px; }
        .links a { color: #e53935; text-decoration: none; }
        .forgot-password { text-align: right; margin-bottom: 15px; }
        .forgot-password a { color: #64748b; font-size: 13px; text-decoration: none; }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .success-message {
            background: #10b981;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo"><i class="fas fa-truck"></i></div>
        <h2>Bienvenue</h2>
        <div class="subtitle">Connectez-vous à votre espace</div>
        
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
        </div>
        
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i> <span id="successText"></span>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="email" placeholder="votre@email.com" value="admin@leman-courses.ch">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Mot de passe</label>
            <input type="password" id="password" placeholder="********" value="demo123">
        </div>
        
        <div class="forgot-password">
            <a href="#" onclick="window.showForgotModal()">
                <i class="fas fa-key"></i> Mot de passe oublié ?
            </a>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-user-tag"></i> Je suis</label>
            <select id="role">
                <option value="admin">👑 Administrateur</option>
                <option value="client">👤 Client</option>
                <option value="chauffeur">🚚 Chauffeur</option>
                <option value="magasinier">📦 Magasinier</option>
            </select>
        </div>
        
        <button class="btn" id="loginBtn" onclick="window.login()">
            <i class="fas fa-sign-in-alt"></i> Se connecter
        </button>
        
        <div class="links">
            <a href="../client/signup.html">
                <i class="fas fa-user-plus"></i> Créer un compte client
            </a>
        </div>
    </div>
    
    <!-- MODAL MOT DE PASSE OUBLIÉ -->
    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-key"></i> Réinitialiser le mot de passe</h3>
            <div class="form-group">
                <label>Votre email</label>
                <input type="email" id="resetEmail" placeholder="votre@email.com">
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="window.sendResetEmail()">
                    <i class="fas fa-paper-plane"></i> Envoyer
                </button>
                <button class="btn" style="background:#64748b;" onclick="window.closeForgotModal()">
                    <i class="fas fa-times"></i> Annuler
                </button>
            </div>
        </div>
    </div>

    <!-- UN SEUL SCRIPT ICI -->
    <script>
        // ===== UN SEUL SCRIPT =====
        console.log("🚀 DÉMARRAGE");
        
        // Configuration Supabase
        const SUPABASE_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        // Création du client (UNE SEULE FOIS)
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log("✅ Supabase créé");
        
        // ===== FONCTIONS GLOBALES =====
        window.login = async function() {
            console.log("🟢 CLIC SUR LOGIN");
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) {
                document.getElementById('errorText').textContent = 'Champs requis';
                document.getElementById('errorMessage').style.display = 'flex';
                return;
            }
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                console.log("✅ Connecté:", data.user.email);
                document.getElementById('successText').textContent = 'Connexion réussie !';
                document.getElementById('successMessage').style.display = 'flex';
                
                setTimeout(() => {
                    window.location.href = '../admin/';
                }, 1000);
                
            } catch (error) {
                console.error("❌", error);
                document.getElementById('errorText').textContent = error.message;
                document.getElementById('errorMessage').style.display = 'flex';
                
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
            }
        };
        
        window.showForgotModal = function() {
            document.getElementById('forgotModal').style.display = 'flex';
        };
        
        window.closeForgotModal = function() {
            document.getElementById('forgotModal').style.display = 'none';
        };
        
        window.sendResetEmail = async function() {
            const email = document.getElementById('resetEmail').value.trim();
            if (!email) return alert('Email requis');
            
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/admin/reset-password.html'
                });
                if (error) throw error;
                alert('✅ Email envoyé !');
                window.closeForgotModal();
            } catch (error) {
                alert('❌ ' + error.message);
            }
        };
        
        // Test de la fonction
        console.log("✅ Fonction login disponible:", typeof window.login === 'function');
    </script>
</body>
</html>
