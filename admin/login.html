<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Léman-Courses</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(-20px); }
            to { opacity:1; transform:translateY(0); }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo i {
            font-size: 60px;
            color: #e53935;
            background: #fee2e2;
            padding: 15px;
            border-radius: 50%;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #0f172a;
        }
        
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
            box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn:hover {
            background: #c62828;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229,57,53,0.3);
        }
        
        .btn:disabled {
            background: #f5b5b5;
            cursor: not-allowed;
            transform: none;
        }
        
        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .links a {
            color: #e53935;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            margin: 5px 0;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
        
        .forgot-password {
            text-align: right;
            margin-bottom: 15px;
        }
        
        .forgot-password a {
            color: #64748b;
            font-size: 13px;
            text-decoration: none;
        }
        
        .forgot-password a:hover {
            color: #e53935;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            border-left: 4px solid #e53935;
        }
        
        .success-message {
            background: #10b981;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            border-left: 4px solid #065f46;
        }
        
        .demo-info {
            margin-top: 20px;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #475569;
        }
        
        .demo-info p {
            margin: 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .demo-info i {
            color: #e53935;
            width: 16px;
        }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
        }
        
        .modal h3 {
            margin-bottom: 20px;
            color: #0f172a;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal .btn-secondary {
            background: #64748b;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <i class="fas fa-truck"></i>
        </div>
        
        <h2>Bienvenue</h2>
        <div class="subtitle">Connectez-vous à votre espace</div>
        
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>
        
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="email" placeholder="votre@email.com" value="admin@leman-courses.ch">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Mot de passe</label>
            <input type="password" id="password" placeholder="********" value="demo123">
        </div>
        
        <div class="forgot-password">
            <a href="#" onclick="showForgotModal()">
                <i class="fas fa-key"></i> Mot de passe oublié ?
            </a>
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-user-tag"></i> Je suis</label>
            <select id="role">
                <option value="admin">👑 Administrateur</option>
                <option value="client">👤 Client</option>
                <option value="chauffeur">🚚 Chauffeur</option>
                <option value="magasinier">📦 Magasinier</option>
            </select>
        </div>
        
        <button class="btn" id="loginBtn" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> Se connecter
        </button>
        
        <div class="links">
            <a href="../client/signup.html">
                <i class="fas fa-user-plus"></i> Créer un compte client
            </a>
        </div>
        
        <div class="demo-info">
            <p><i class="fas fa-info-circle"></i> <strong>Comptes de test :</strong></p>
            <p><i class="fas fa-user"></i> admin@leman-courses.ch / demo123 (Admin)</p>
            <p><i class="fas fa-user"></i> client@leman-courses.ch / demo123 (Client)</p>
            <p><i class="fas fa-user"></i> chauffeur@leman-courses.ch / demo123 (Chauffeur)</p>
        </div>
    </div>
    
    <!-- MODAL MOT DE PASSE OUBLIÉ -->
    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-key"></i> Réinitialiser le mot de passe</h3>
            
            <div class="form-group">
                <label>Votre email</label>
                <input type="email" id="resetEmail" placeholder="votre@email.com">
            </div>
            
            <div class="modal-buttons">
                <button class="btn" onclick="sendResetEmail()">
                    <i class="fas fa-paper-plane"></i> Envoyer
                </button>
                <button class="btn btn-secondary" onclick="closeForgotModal()">
                    <i class="fas fa-times"></i> Annuler
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // ===== CONFIGURATION - UNE SEULE FOIS =====
        console.log("🚀 Initialisation...");
        
        const SUPABASE_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        // UNE SEULE création du client Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        console.log("✅ Supabase prêt");
        
        // ===== FONCTIONS GLOBALES =====
        window.login = async function() {
            console.log("🔑 Tentative de connexion");
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            hideMessages();
            
            if (!email || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                console.log("✅ Connecté:", data.user.email);
                
                localStorage.setItem('user', JSON.stringify({
                    id: data.user.id,
                    email: email,
                    loggedIn: true
                }));
                
                showSuccess('Connexion réussie !');
                
                setTimeout(() => {
                    window.location.href = '../admin/';
                }, 1000);
                
            } catch (error) {
                console.error('❌', error);
                
                if (error.message.includes('Invalid login')) {
                    showError('Email ou mot de passe incorrect');
                } else {
                    showError('Erreur: ' + error.message);
                }
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
            }
        };
        
        window.showForgotModal = function() {
            document.getElementById('forgotModal').style.display = 'flex';
        };
        
        window.closeForgotModal = function() {
            document.getElementById('forgotModal').style.display = 'none';
        };
        
        window.sendResetEmail = async function() {
            const email = document.getElementById('resetEmail').value.trim();
            
            if (!email) {
                alert('Veuillez saisir votre email');
                return;
            }
            
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/admin/reset-password.html'
                });
                
                if (error) throw error;
                
                alert('✅ Email envoyé ! Vérifiez votre boîte.');
                closeForgotModal();
                
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        };
        
        // ===== GESTION MESSAGES =====
        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').style.display = 'flex';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function showSuccess(message) {
            document.getElementById('successText').textContent = message;
            document.getElementById('successMessage').style.display = 'flex';
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        // ===== FERMER MODAL =====
        window.onclick = function(event) {
            const modal = document.getElementById('forgotModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
        
        // ===== ENTRÉE =====
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                window.login();
            }
        });
        
        console.log("✅ Script prêt, login disponible");
    </script>
    
</body>
</html>
