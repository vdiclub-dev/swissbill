<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Connexion Léman-Courses</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: system-ui; max-width: 400px; margin: 50px auto;">
    <h2 style="color: #e53935;">Connexion</h2>
    
    <div style="background: #f1f5f9; padding: 15px; border-radius: 8px; margin: 20px 0;" id="message">
        Entrez vos identifiants
    </div>
    
    <div style="border: 2px solid #e2e8f0; border-radius: 10px; padding: 20px;">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px;">Email</label>
            <input type="email" id="email" value="vdiclub@gmail.com" style="width: 100%; padding: 10px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px;">Mot de passe</label>
            <input type="password" id="password" value="demo123" style="width: 100%; padding: 10px;">
        </div>
        
        <button id="loginBtn" style="background: #e53935; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer;">
            Se connecter
        </button>
    </div>

    <script>
        // ===== CONFIGURATION CORRECTE =====
        console.log("🚀 Démarrage...");
        
        // URL CORRECTE (avec https://)
        const SUPABASE_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        console.log("URL:", SUPABASE_URL);
        console.log("Clé (début):", SUPABASE_KEY.substring(0, 20) + "...");
        
        try {
            // Création du client
            const lemanAuth = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log("✅ Client Supabase créé avec succès");
            
            // Attacher l'événement
            document.getElementById('loginBtn').addEventListener('click', async function() {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const message = document.getElementById('message');
                
                console.log("🔐 Tentative de connexion pour:", email);
                message.innerHTML = '⏳ Connexion en cours...';
                message.style.background = '#fef3c7';
                
                try {
                    const { data, error } = await lemanAuth.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) {
                        console.error("❌ Erreur:", error);
                        message.innerHTML = '❌ ' + error.message;
                        message.style.background = '#fee2e2';
                    } else {
                        console.log("✅ Succès:", data.user.email);
                        message.innerHTML = '✅ Connecté ! Redirection...';
                        message.style.background = '#d1fae5';
                        
                        setTimeout(() => {
                            window.location.href = '/admin/';
                        }, 1000);
                    }
                    
                } catch(e) {
                    console.error("💥 Exception:", e);
                    message.innerHTML = '💥 ' + e.message;
                    message.style.background = '#fee2e2';
                }
            });
            
            console.log("✅ Écouteur d'événement attaché");
            
        } catch(e) {
            console.error("❌ Erreur création client:", e);
            document.getElementById('message').innerHTML = '❌ Erreur configuration Supabase';
        }
    </script>
</body>
</html>
