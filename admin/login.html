<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Léman-Courses</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ... Vos styles existants ... */
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo i {
            font-size: 60px;
            color: #e53935;
            background: #fee2e2;
            padding: 15px;
            border-radius: 50%;
        }
        h2 { text-align: center; margin-bottom: 10px; color: #0f172a; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e53935;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #e53935;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover { background: #c62828; }
        .links { text-align: center; margin-top: 25px; }
        .links a { color: #e53935; text-decoration: none; }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo"><i class="fas fa-truck"></i></div>
        <h2>Bienvenue</h2>
        <div class="subtitle">Connectez-vous à votre espace</div>
        
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="votre@email.com" value="vdiclub@gmail.com">
        </div>
        
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="********" value="demo123">
        </div>
        
        <div class="form-group">
            <label>Je suis</label>
            <select id="role">
                <option value="admin">Administrateur</option>
                <option value="client">Client</option>
                <option value="chauffeur">Chauffeur</option>
            </select>
        </div>
        
        <button class="btn" onclick="login()">Se connecter</button>
        
        <div class="links">
            <a href="../client/signup.html">Créer un compte</a>
        </div>
    </div>

    <!-- ===== CODE À METTRE ICI ===== -->
    <script>
        // CONFIGURATION SUPABASE
        const SUPABASE_URL = 'https://iubbsnntcreneakbdkmv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1YmJzbm50Y3JlbmVha2Jka212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzI1MDYsImV4cCI6MjA4ODE0ODUwNn0.FzMgCZxNIej1skSIc8UAGiODcZEZW1GCWZwBfonm_1Y';
        
        // CRÉATION DU CLIENT
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // FONCTION DE CONNEXION
        window.login = async function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const selectedRole = document.getElementById('role').value;
            
            if (!email || !password) {
                alert('Veuillez remplir tous les champs');
                return;
            }
            
            try {
                // 1. AUTHENTIFICATION
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                // 2. RÉCUPÉRER LE RÔLE
                const { data: employe } = await supabase
                    .from('employes')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();
                
                const role = employe?.role || selectedRole;
                
                // 3. REDIRECTION
                if (role === 'admin') {
                    window.location.href = '../admin/';
                } else if (role === 'client') {
                    window.location.href = '../client/';
                } else if (role === 'chauffeur') {
                    window.location.href = '../chauffeur/';
                } else {
                    window.location.href = '../';
                }
                
            } catch (error) {
                document.getElementById('errorText').textContent = error.message;
                document.getElementById('errorMessage').style.display = 'flex';
            }
        };
    </script>
</body>
</html>
